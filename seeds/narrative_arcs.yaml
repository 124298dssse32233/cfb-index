# Narrative Arc Board — hand-authored seeds (Signature Bets S3.4).
#
# Each arc has exactly three acts (Discovery / Ascent / Coronation
# variants are fine; pick what fits). Voice per SIGNATURE_BETS §2:
# declarative, opinionated, no exclamation, no hype adjectives.
#
# Key is player_id (as string for YAML safety). Adding arcs is a pure
# YAML edit; no code change required. Auto-gen (V2) writes to the same
# shape behind a flag-for-review gate.

arcs:
  "4788":
    player_name: CJ Carr
    season: 2025
    acts:
      - title: Discovery
        week_range: Weeks 1-4
        inflection: >-
          The Miami game — 221 passing yards in a 24-27 loss — was the
          inflection. Early-season volatility gave way to a template:
          keep the offense on schedule, live to the next series.
        synthesis: >-
          From preseason question mark to verified starter. Efficiency
          was the surprise; the traditional counting stats lagged by design.

      - title: Ascent
        week_range: Weeks 5-9
        inflection: >-
          Back-to-back 80th-percentile YPA games against top-30 defenses
          moved him into the Heisman radar.
        synthesis: >-
          Peak Heisman Heat arrived in early November. The WEPA curve
          broke toward historic; decision-making rose from 47th to 83rd
          pct in one month of film.

      - title: Coronation
        week_range: Weeks 10-13
        inflection: >-
          Heisman finalist at 22. The selection committee's short list
          validated the efficiency story the analytics community had
          been writing since Week 5.
        synthesis: >-
          The freshman-phenom narrative closed; the multi-year-star
          narrative opened. Returning value metric tops the 96th pct
          entering 2026.

  "2431":
    player_name: Fernando Mendoza
    season: 2025
    acts:
      - title: Arrival
        week_range: Weeks 1-4
        inflection: >-
          Big Ten debut — the first of six 300-yard passing games
          cleared any doubt that the transfer would translate.
        synthesis: >-
          Indiana's portal bet paid off inside the first quarter of
          the season. Volume and efficiency traveled together.

      - title: Ascent
        week_range: Weeks 5-9
        inflection: >-
          Late-October run against Nebraska + Wisconsin locked in top-5
          YPA standing inside the P4+ND cohort.
        synthesis: >-
          The conversation shifted from "useful transfer" to "Heisman
          trajectory." Media cohort volume doubled week-over-week at
          peak.

      - title: Recognition
        week_range: Weeks 10-13
        inflection: >-
          Heisman Trophy Finalist nod capped the season's re-rating.
          Draft boards followed.
        synthesis: >-
          The program's highest-profile QB finish in the modern era.
          Returning-QB scenarios flipped from hypothetical to live
          portal-watch the day after the ceremony.

  "6626":
    player_name: Darian Mensah
    season: 2025
    acts:
      - title: Transplant
        week_range: Weeks 1-4
        inflection: >-
          Duke's portal bet opened with a 400-yard game that confirmed
          the Tulane tape translated.
        synthesis: >-
          The first four weeks answered "is this a Tulane number or a
          Duke number?" — it was both.

      - title: Consolidation
        week_range: Weeks 5-9
        inflection: >-
          Three consecutive 300-plus passing games against ACC defenses
          moved Mensah into Heisman-fringe conversations.
        synthesis: >-
          Volume stayed elite; decision-making tightened. Efficiency
          metrics trailed by a week then caught up.

      - title: Verification
        week_range: Weeks 10-13
        inflection: >-
          Year-end 3,900+ yards clinched a top-10 volume mark in the
          ACC era and anchored Mensah's NFL-conversation ticket.
        synthesis: >-
          Duke's rebuild shifts from "surprise" to "system." The
          portal gamble plus the Manning Award watch list rewrite the
          program's ceiling heading into 2026.

  "202":
    player_name: Carson Beck
    season: 2025
    acts:
      - title: Resettlement
        week_range: Weeks 1-4
        inflection: >-
          Miami opener re-established Beck's baseline after the Georgia
          chapter; 320 yards + 3 TDs on 28 attempts.
        synthesis: >-
          The move to Coral Gables reset the tape; the same QB brain
          in a faster offense. Early-season variance was expected; the
          floor held.

      - title: Calibration
        week_range: Weeks 5-9
        inflection: >-
          A Clemson game with 4 TDs + 0 INTs was the quietest elite
          game of the ACC year — the film traveled more than the
          box score.
        synthesis: >-
          ACC defenses adjusted; Beck adjusted back. Interception rate
          fell to top-15 in the conference by Week 9.

      - title: Contention
        week_range: Weeks 10-13
        inflection: >-
          Year-end 3,800+ yards with ~90 PCT made Beck the second
          ACC QB in a decade to clear both thresholds.
        synthesis: >-
          The pre-season Heisman favorite ended as the cohort's
          steadiness pick. Draft-room sentiment matches.

  "11876":
    player_name: Drew Mestemaker
    season: 2025
    acts:
      - title: Unheralded
        week_range: Weeks 1-4
        inflection: >-
          North Texas opener with 4 TDs + 350 yards broke out of AAC
          obscurity inside two drives.
        synthesis: >-
          The preseason didn't carry Mestemaker; September did. The
          numbers caught up to what the tape suggested from Week 1.

      - title: Recognition
        week_range: Weeks 5-9
        inflection: >-
          Back-to-back 400-yard games against C-USA + AAC defenses
          pushed the cumulative volume past every starting QB in the
          conference.
        synthesis: >-
          The Group-of-5 conversation widened: "Which AAC QB gets the
          P4 transfer-portal call first?"

      - title: Ascension
        week_range: Weeks 10-13
        inflection: >-
          Year-end 4,300+ yards clinched the nation's single-season
          passing-volume lead among all FBS QBs.
        synthesis: >-
          Manning Award watch-list entry landed in a compressed window
          vs peers; the off-season conversation flipped to whether the
          system or the QB drove the number.
