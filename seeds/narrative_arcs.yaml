# Narrative Arc Board — hand-authored seeds (Signature Bets S3.4).
#
# Each arc has exactly three acts (Discovery / Ascent / Coronation
# variants are fine; pick what fits). Voice per SIGNATURE_BETS §2:
# declarative, opinionated, no exclamation, no hype adjectives.
#
# Key is player_id (as string for YAML safety). Adding arcs is a pure
# YAML edit; no code change required. Auto-gen (V2) writes to the same
# shape behind a flag-for-review gate.

arcs:
  "4788":
    player_name: CJ Carr
    season: 2025
    acts:
      - title: Discovery
        week_range: Weeks 1-4
        inflection: >-
          The Miami game — 221 passing yards in a 24-27 loss — was the
          inflection. Early-season volatility gave way to a template:
          keep the offense on schedule, live to the next series.
        synthesis: >-
          From preseason question mark to verified starter. Efficiency
          was the surprise; the traditional counting stats lagged by design.

      - title: Ascent
        week_range: Weeks 5-9
        inflection: >-
          Back-to-back 80th-percentile YPA games against top-30 defenses
          moved him into the Heisman radar.
        synthesis: >-
          Peak Heisman Heat arrived in early November. The WEPA curve
          broke toward historic; decision-making rose from 47th to 83rd
          pct in one month of film.

      - title: Coronation
        week_range: Weeks 10-13
        inflection: >-
          Heisman finalist at 22. The selection committee's short list
          validated the efficiency story the analytics community had
          been writing since Week 5.
        synthesis: >-
          The freshman-phenom narrative closed; the multi-year-star
          narrative opened. Returning value metric tops the 96th pct
          entering 2026.

  "2431":
    player_name: Fernando Mendoza
    season: 2025
    acts:
      - title: Arrival
        week_range: Weeks 1-4
        inflection: >-
          Big Ten debut — the first of six 300-yard passing games
          cleared any doubt that the transfer would translate.
        synthesis: >-
          Indiana's portal bet paid off inside the first quarter of
          the season. Volume and efficiency traveled together.

      - title: Ascent
        week_range: Weeks 5-9
        inflection: >-
          Late-October run against Nebraska + Wisconsin locked in top-5
          YPA standing inside the P4+ND cohort.
        synthesis: >-
          The conversation shifted from "useful transfer" to "Heisman
          trajectory." Media cohort volume doubled week-over-week at
          peak.

      - title: Recognition
        week_range: Weeks 10-13
        inflection: >-
          Heisman Trophy Finalist nod capped the season's re-rating.
          Draft boards followed.
        synthesis: >-
          The program's highest-profile QB finish in the modern era.
          Returning-QB scenarios flipped from hypothetical to live
          portal-watch the day after the ceremony.

  "6626":
    player_name: Darian Mensah
    season: 2025
    acts:
      - title: Transplant
        week_range: Weeks 1-4
        inflection: >-
          Duke's portal bet opened with a 400-yard game that confirmed
          the Tulane tape translated.
        synthesis: >-
          The first four weeks answered "is this a Tulane number or a
          Duke number?" — it was both.

      - title: Consolidation
        week_range: Weeks 5-9
        inflection: >-
          Three consecutive 300-plus passing games against ACC defenses
          moved Mensah into Heisman-fringe conversations.
        synthesis: >-
          Volume stayed elite; decision-making tightened. Efficiency
          metrics trailed by a week then caught up.

      - title: Verification
        week_range: Weeks 10-13
        inflection: >-
          Year-end 3,900+ yards clinched a top-10 volume mark in the
          ACC era and anchored Mensah's NFL-conversation ticket.
        synthesis: >-
          Duke's rebuild shifts from "surprise" to "system." The
          portal gamble plus the Manning Award watch list rewrite the
          program's ceiling heading into 2026.

  "202":
    player_name: Carson Beck
    season: 2025
    acts:
      - title: Resettlement
        week_range: Weeks 1-4
        inflection: >-
          Miami opener re-established Beck's baseline after the Georgia
          chapter; 320 yards + 3 TDs on 28 attempts.
        synthesis: >-
          The move to Coral Gables reset the tape; the same QB brain
          in a faster offense. Early-season variance was expected; the
          floor held.

      - title: Calibration
        week_range: Weeks 5-9
        inflection: >-
          A Clemson game with 4 TDs + 0 INTs was the quietest elite
          game of the ACC year — the film traveled more than the
          box score.
        synthesis: >-
          ACC defenses adjusted; Beck adjusted back. Interception rate
          fell to top-15 in the conference by Week 9.

      - title: Contention
        week_range: Weeks 10-13
        inflection: >-
          Year-end 3,800+ yards with ~90 PCT made Beck the second
          ACC QB in a decade to clear both thresholds.
        synthesis: >-
          The pre-season Heisman favorite ended as the cohort's
          steadiness pick. Draft-room sentiment matches.

  "11876":
    player_name: Drew Mestemaker
    season: 2025
    acts:
      - title: Unheralded
        week_range: Weeks 1-4
        inflection: >-
          North Texas opener with 4 TDs + 350 yards broke out of AAC
          obscurity inside two drives.
        synthesis: >-
          The preseason didn't carry Mestemaker; September did. The
          numbers caught up to what the tape suggested from Week 1.

      - title: Recognition
        week_range: Weeks 5-9
        inflection: >-
          Back-to-back 400-yard games against C-USA + AAC defenses
          pushed the cumulative volume past every starting QB in the
          conference.
        synthesis: >-
          The Group-of-5 conversation widened: "Which AAC QB gets the
          P4 transfer-portal call first?"

      - title: Ascension
        week_range: Weeks 10-13
        inflection: >-
          Year-end 4,300+ yards clinched the nation's single-season
          passing-volume lead among all FBS QBs.
        synthesis: >-
          Manning Award watch-list entry landed in a compressed window
          vs peers; the off-season conversation flipped to whether the
          system or the QB drove the number.

  "3800":
    player_name: Trinidad Chambliss
    season: 2025
    acts:
      - title: Emergence
        week_range: Weeks 1-4
        inflection: >-
          Ole Miss's opener against a ranked SEC opponent answered
          the transfer question inside the first half.
        synthesis: >-
          Kiffin's portal bet turned into an SEC-leading efficiency
          story. YPA ranked top-3 inside the conference by Week 4.

      - title: SEC Validation
        week_range: Weeks 5-9
        inflection: >-
          The October road stretch through LSU + Auburn showed the
          arm and the brain were travel-proof.
        synthesis: >-
          Chambliss's stock climbed faster than any SEC QB not named
          Manning by volume + cohort-adjusted efficiency.

      - title: Recognition
        week_range: Weeks 10-13
        inflection: >-
          3,900+ passing yards + a Heisman finalist trajectory turned
          Ole Miss's portal story into the season's biggest
          transfer-ROI case study.
        synthesis: >-
          The freshman-phenom narrative opened for 2026; Kiffin's
          scheme carries the volume, Chambliss carries the variance.

  "1309":
    player_name: Jayden Maiava
    season: 2025
    acts:
      - title: Opportunity
        week_range: Weeks 1-4
        inflection: >-
          USC's first drive of Week 1 told every defense what kind of
          year this would be — pace + vertical routes + tempo.
        synthesis: >-
          Riley's Air Raid found the ceiling QB it was built for.
          The offense ran at the league's fastest tempo inside of a
          month.

      - title: Recalibration
        week_range: Weeks 5-9
        inflection: >-
          A mid-season Pac-expansion stretch pushed Maiava into the
          national YPA conversation; a road game at Michigan set the
          schedule-adjusted ceiling.
        synthesis: >-
          The offense adapted to heavier pressure looks; decision-
          making numbers rose alongside attempts.

      - title: Ambition
        week_range: Weeks 10-13
        inflection: >-
          3,700+ yards with a top-10 YPA inside the P4+ND cohort
          closed USC's year on a Heisman-proximate note.
        synthesis: >-
          Riley's system shipped the numbers. Maiava's 2026 return
          question is now a conference-reshaping variable.

  "1354":
    player_name: Ty Simpson
    season: 2025
    acts:
      - title: Inheritance
        week_range: Weeks 1-4
        inflection: >-
          Alabama's first start post-Milroe answered the heir-apparent
          question; Simpson played on schedule, not in highlights.
        synthesis: >-
          DeBoer's scheme demanded efficiency, not volume. Simpson
          delivered both without a single two-INT game through
          September.

      - title: Consolidation
        week_range: Weeks 5-9
        inflection: >-
          A three-game stretch against top-25 SEC defenses pushed
          Simpson into the conference's top-5 YPA readings.
        synthesis: >-
          The SEC's best pass-game offenses earned their numbers
          against top-10 defenses. Simpson's entry into that club
          made the Heisman conversation active.

      - title: Completion
        week_range: Weeks 10-13
        inflection: >-
          Iron Bowl win + bowl invite capped the season. No Alabama
          QB since Bryce Young hit this many top-tier efficiency
          markers in a single year.
        synthesis: >-
          The torch transition is complete. 2026 Heisman boards open
          with Simpson near the top of the cohort.

  "2873":
    player_name: Dante Moore
    season: 2025
    acts:
      - title: Reset
        week_range: Weeks 1-4
        inflection: >-
          Oregon's tempo found its QB — the Week 2 game against a
          ranked opponent confirmed Moore was the scheme's ceiling
          player.
        synthesis: >-
          Lanning + Stein's system translated to a QB whose ceiling
          was the cohort, not the conference. UCLA tape stayed
          relevant only in context.

      - title: Ascent
        week_range: Weeks 5-9
        inflection: >-
          A back-to-back ranked-opponent stretch pushed Moore to a
          top-10 QBR reading in the P4+ND cohort.
        synthesis: >-
          The explosive-play rate climbed with the tempo; turnovers
          stayed flat. Efficiency + volume traveled together — rare.

      - title: Coronation
        week_range: Weeks 10-13
        inflection: >-
          Year-end 3,500+ yards + a top-10 finish in the P4+ND
          cohort make the 2026 Heisman baseline live.
        synthesis: >-
          The Oregon identity — fast + efficient — has its QB.
          Moore's 2026 question is what he can do with a full
          offseason inside the system.

  "2865":
    player_name: Arch Manning
    season: 2025
    acts:
      - title: Launch
        week_range: Weeks 1-4
        inflection: >-
          First year as a full-time starter; the family name
          absorbed the first month of attention until the tape
          started showing his own identity.
        synthesis: >-
          The learning curve showed; the Week 4 breakout was a
          marker for the rest of the season. Sarkisian + Flood's
          scheme gave Manning the runway he needed.

      - title: Adjustment
        week_range: Weeks 5-9
        inflection: >-
          A two-game stretch against ranked SEC defenses tested the
          decision-making; Manning answered with a top-5 red-zone
          TD rate inside the conference.
        synthesis: >-
          Volume numbers stayed modest by design; efficiency crept
          into top-10 territory. The offensive system kept him on
          schedule.

      - title: Validation
        week_range: Weeks 10-13
        inflection: >-
          3,100+ yards + a clean INT rate closed a debut-starter
          season with national watch-list consideration.
        synthesis: >-
          The family-name tax is paid; the sophomore year opens with
          top-5 Heisman odds on every major book. The scheme travel
          is now the variable, not the QB.
