# Fan Intelligence source registry seed. See FAN_INTEL_SOURCE_STRATEGY.md §3, §4.
#
# Two kinds of entries:
#   - FIXED global sources (one row each): cfbd, wiki_pv, kalshi, etc.
#   - TEMPLATE family rows (source_id ends with "_template"): board_template,
#     campus_template, substack_template, beat_template, athletics_template,
#     locked_on_template, radio_template. Per-team instantiations are
#     inserted later from priority_teams + per-family seed files; they inherit
#     tier / max_publication_form / cohort_weights from the template.
#
# cohort_weights keys (STRATEGY §4):
#   generation axis: boomer_gen_x, millennial, gen_z, college_age
#   lens axis:       analytics, recruiting, gambling, casual_vibes, die_hard, media_class
#   geography axis:  local_market, national_narrative, alumni_diaspora, hbcu_community
#
# max_publication_form: numeric | aggregate | rank | citation  (STRATEGY §5)
# tier: A | B | C | D  (STRATEGY §3)
# ingest_method: api_official | api_unofficial | rss | firehose | cowork_manual

sources:

  # ---------------- Tier A — numeric publication OK ----------------
  - source_id: cfbd
    name: College Football Data API (Patreon tier)
    platform: cfbd
    tier: A
    ingest_method: api_official
    terms_url: https://collegefootballdata.com/terms
    license: Patreon-$10/mo
    retention_days: null
    max_publication_form: numeric
    cohort_weights_rationale: >
      CFBD lines/volume data is analytics- and gambling-tilted by nature;
      audience is media + bettors, per Pew 2023 sports-bettor demographics.
    cohort_weights:
      analytics: 0.60
      recruiting: 0.20
      gambling: 0.70
      die_hard: 0.30
      media_class: 0.10
      local_market: 0.10
      national_narrative: 0.70

