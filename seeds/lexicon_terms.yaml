# Curated fan-slang watchlist for lexicon_term_daily (Fan Intelligence suite).
#
# Governance: this is an EDITORIAL copy layer (see docs/design-system/40-noir-subbrand.md
# §5/§10). Review quarterly against the tracker's own trend data — when a term's corpus
# usage decays, retire it here; when new slang emerges in lexicon_weekly spikes, add it.
# Variants are matched case-insensitively on word boundaries against normalized
# title+body text (non-alphanumerics collapse to spaces, so "he's him" == "he s him").
#
# group  = stable key used in lexicon_term_daily.term_group (never rename; retire+add)
# label  = display label for renderers
# variants = surface forms counted into the group (spans deduped, no double counting)
terms:
  - group: so_back
    label: "we're so back"
    variants: ["we're so back", "we are so back", "so back"]
  - group: so_over
    label: "it's so over"
    variants: ["it's so over", "it is so over", "so over"]
