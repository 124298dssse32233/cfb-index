# Kalshi + Polymarket contracts.
#
# Kalshi entries store an EVENT ticker (e.g. KXNCAAF-27 = CFP champion event).
# The adapter calls /events/{ticker} and fans each event out into its
# per-outcome binary markets (KXNCAAF-27-OSU, -TEX, …). Do NOT put a single
# market ticker here — /markets/{event_ticker} 404s (that endpoint wants a
# market ticker), which silently 0-rowed the adapter before 2026-05-28.
#
# Offseason reality (verified 2026-05-28 against live Kalshi API): every CFB
# event below is OPEN with active markets, but all markets are 0-volume /
# null-price until the season starts (~Aug). Zero observation rows in the
# offseason is therefore CORRECT, not a 404 and not stale tickers. Rows begin
# flowing automatically once the markets go liquid — no seed change needed.
#
# needs_research: true  → adapter skips the entry entirely (no live equivalent
#                         found; revisit if Kalshi lists it).
# 12 Kalshi events live · 2 with no live series · 1 Polymarket-style set (10).

