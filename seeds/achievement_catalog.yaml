# Achievement catalog — Signature Bets S2.6 / S2.7. Each row is a
# single achievement spec. The detector key maps to a Python function
# in src/cfb_rankings/bets/achievements.py#_DETECTORS.

achievements:
  - id: achievement_dual_threat
    display_name: Dual Threat
    icon_slug: dual
    description: Top-50 in both WEPA passing-per-dropback AND WEPA rushing-per-carry.
    target_rarity: 0.05
    position_filter: QB
    detector: dual_threat

  - id: achievement_money_efficiency
    display_name: Money Efficiency
    icon_slug: money
    description: Top-5 in YPA among P4 + Notre Dame QBs (min 150 attempts).
    target_rarity: 0.05
    position_filter: QB
    detector: money_efficiency

  - id: achievement_program_benchmark
    display_name: Program Benchmark
    icon_slug: program
    description: >-
      Season leader for the program at the player's position across the
      headline volume metric (passing yards / rushing yards / receiving yards).
    target_rarity: 0.10
    position_filter: null
    detector: program_benchmark

  - id: achievement_mirror_elite
    display_name: Mirror-Match Elite
    icon_slug: mirror
    description: >-
      Closest historical fingerprint is 95%+ similar AND the match
      holds a Heisman-finalist or All-American honor.
    target_rarity: 0.02
    position_filter: null
    detector: mirror_elite

  - id: achievement_volume_king
    display_name: Volume King
    icon_slug: volume
    description: >-
      2,500+ passing yards, 1,200+ rushing yards, or 900+ receiving
      yards in a single season (position-appropriate threshold).
    target_rarity: 0.12
    position_filter: null
    detector: volume_king

  - id: achievement_honors_badge
    display_name: Honors Badge
    icon_slug: honors
    description: >-
      Recognized on a major honors list (Heisman, All-American, Davey
      O'Brien, Maxwell, Walter Camp, Nagurski, Biletnikoff).
    target_rarity: 0.05
    position_filter: null
    detector: honors_badge
