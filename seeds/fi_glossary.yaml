# Fan Intelligence Glossary — definitions for the `?` glossary icons
# Sourced from the FI methodology + PLAYER_PAGE_SIGNATURE_BETS.md §4 Bet #5.
# Each term: name, slug, one_line (≤15 words), full (~60 words),
# micro_example (1 sentence), see_also (list of related slugs).
#
# Edit here; `python manage.py build-site` regenerates assets/js/bets/fi-glossary-data.js
# and adds anchors to /methodology/fan-intelligence.html#glossary-<slug>.

terms:
  - name: Belief Dial
    slug: belief-dial
    one_line: How much a cohort believes in a player, 0–100, with sample + confidence attached.
    full: >-
      The Belief Dial is our summary of a fan cohort's confidence in a
      player, mapped to a 0–100 scale. It blends weighted sentiment across
      qualifying mentions, adjusts for sarcasm risk, and is gated by a
      minimum effective sample. Below the floor we show "Awaiting Signal"
      rather than a fabricated number; above it we ship the dial with its
      sample size so readers can weight it themselves.
    micro_example: >-
      Carr's own-fan Belief Dial sits at 72 (n=142, high confidence) — grounded
      optimism, not blind faith.
    see_also: [sarcasm-risk, fan-pulse, cohort-divergence]

  - name: Respect Gap
    slug: respect-gap
    one_line: Gap between national/media respect and what cohort-level belief says a player has earned.
    full: >-
      Respect Gap is the signed difference between national or media
      consensus on a player (polls, watch lists, market odds) and the
      aggregated belief score from cohorts that cover them closely. A
      positive gap means the national view trails the on-the-ground
      signal; a negative gap means hype is outrunning the evidence. It is
      a diagnostic, not a rating — designed to surface stories.
    micro_example: >-
      Carr's +14 Respect Gap this week: fans and beat writers have moved
      before the national polls have.
    see_also: [reality-check, fan-pulse, main-character]

  - name: Reality Gap
    slug: reality-gap
    one_line: Gap between fan belief and empirical on-field production — feelings vs. film.
    full: >-
      Reality Gap is the signed distance between a cohort's Belief Dial
      and the player's cohort-adjusted on-field output (EPA, success rate,
      WEPA per play). Positive means fans are higher than the tape;
      negative means fans are sleeping on a performer the numbers love.
      The metric is framed as tension, not truth — both inputs are signals
      and both can move.
    micro_example: >-
      A -9 Reality Gap for a mid-rung QB usually means the eye-test misses
      an efficient, low-variance operator.
    see_also: [belief-dial, reality-check, respect-gap]

  - name: Rival Heat
    slug: rival-heat
    one_line: How much rival fanbases are fixating on this player, scored against a 15-year baseline.
    full: >-
      Rival Heat measures the volume and intensity of mentions from
      rival fanbases, normalized against the same rivals' baseline chatter
      about any opposing player. The score is 0–100, with canonical
      rival-obsession players (think the 2018 Clemson Trevor Lawrence
      lead-up) scoring 90+. Sub-cohorts break the heat apart by specific
      rival when the sample supports it.
    micro_example: >-
      Rival Heat 83 — Michigan fans talk about Carr 4.2× more than the
      average opposing QB they've faced since 2018.
    see_also: [cohort-divergence, main-character, fan-pulse]

  - name: Cohesion
    slug: cohesion
    one_line: How aligned a fanbase is with itself — agreement minus in-fighting, 0–100.
    full: >-
      Cohesion measures intra-fanbase agreement: how tightly one cohort's
      statements cluster around the same belief axis. High cohesion means
      the locker room of fans is singing one song. Low cohesion means a
      fractured base (starter debate, coaching take, portal anxiety). It
      is independent of whether the shared feeling is positive — you can
      have cohesive pessimism.
    micro_example: >-
      Cohesion 88 after the NC semifinal loss: Notre Dame fans uniformly
      frustrated, not splintered.
    see_also: [fan-pulse, swing, sarcasm-risk]

  - name: Sarcasm Risk
    slug: sarcasm-risk
    one_line: Probability a stream of fan text is sarcastic — dampens belief when high.
    full: >-
      Sarcasm Risk is the share of a cohort's qualifying mentions our
      classifier marks as ironic or sarcastic. It is shown as low /
      medium / high and is used to discount the Belief Dial when it would
      otherwise absorb a stream of "oh sure he's a Heisman lock" takes at
      face value. It is never perfect; we disclose the level so readers
      can apply their own adjustment.
    micro_example: >-
      Belief Dial 61 with Sarcasm Risk HIGH — the real number is probably
      10–15 points softer than it looks.
    see_also: [belief-dial, cohesion, fan-pulse]

  - name: Swing
    slug: swing
    one_line: Week-over-week change in Fan Pulse, signed — the fastest-moving belief delta.
    full: >-
      Swing is the signed change in a cohort's Fan Pulse from the prior
      publication window. Large positive swings flag breakout moments;
      large negative swings flag backlash. We publish swing alongside the
      current Pulse so a reader can see both the level and the trajectory
      without chart-reading, and we floor-rule both independently.
    micro_example: >-
      Swing +18 after the Texas A&M game — the inflection point that
      turned a question-mark QB into a starter.
    see_also: [fan-pulse, belief-dial, main-character]

  - name: Main Character
    slug: main-character
    one_line: The single player most-discussed by a cohort this week, regardless of sentiment.
    full: >-
      Main Character is a recognition metric, not a quality metric: it
      names the player a cohort spent the most of its attention on this
      week. Offense-breaking QB, coach-in-crisis, portal story, Heisman
      darling, villain — any of them qualify. Pairing Main Character with
      sentiment color tells you whether the spotlight is warm, cold, or
      chaotic.
    micro_example: >-
      Main Character of the Week: Arch Manning (Texas), national cohort,
      85% negative — the offense's struggles became the national story.
    see_also: [rival-heat, swing, fan-pulse]

  - name: Fanbase Archetype
    slug: fanbase-archetype
    one_line: Short editorial label for the mood-shape of a fanbase in a given week.
    full: >-
      A Fanbase Archetype is a named editorial pattern — "Grounded
      Optimism," "Anxious Dynasty," "Rebuild Patience," "Siege Mentality" —
      that describes the mood-shape of a cohort this week. Archetypes are
      derived from belief, cohesion, swing, and sarcasm-risk together;
      they are shorthand meant to make the data legible at a glance,
      never a replacement for the underlying numbers.
    micro_example: >-
      "Grounded Optimism" — Belief 72, Cohesion 88, Swing +4, Sarcasm Low.
      Confident but not frothy.
    see_also: [belief-dial, cohesion, swing]

  - name: Cohort Divergence
    slug: cohort-divergence
    one_line: How much cohorts disagree with each other about the same team or player this week.
    full: >-
      Cohort Divergence is the dispersion of belief across the qualifying
      cohorts on a given (team, week) or (player, week) cell. A high
      score means own-fans, rivals, national, and media are reading the
      same events differently — the story where "who you ask" matters.
      Low divergence means consensus. Either is informative; divergence
      is a pointer to a deeper read.
    micro_example: >-
      Georgia Week 8: own-fan belief 78, national 41, media 55 — the
      second-highest Cohort Divergence of the season.
    see_also: [fan-pulse, respect-gap, reality-gap]

  - name: Fan Pulse
    slug: fan-pulse
    one_line: Cohort-weighted aggregate of belief this week, the top-line mood number.
    full: >-
      Fan Pulse is the headline aggregate for a cohort's week: a
      sample-gated, sarcasm-adjusted blend of the qualifying mentions'
      sentiment. It is the same machinery as the Belief Dial but surfaced
      at the cohort or team level rather than per-player. When a page
      shows a single mood number, it is almost always Fan Pulse.
    micro_example: >-
      Fan Pulse 61 (n=142, Sarcasm LOW) — the own-fan cohort is
      cautiously positive after a mid-season stumble.
    see_also: [belief-dial, swing, cohesion]

  - name: Reality Check
    slug: reality-check
    one_line: How belief compares to independent signals like market odds, polls, and prior results.
    full: >-
      Reality Check is our cross-reference against external signals —
      Kalshi and PolyMarket odds, AP/Coaches polls, SP+ projections, and
      prior-season production. It is presented as a single label (Aligned,
      Ahead, Behind, Contradicts) with the underlying deltas one click
      away. The goal is honesty about where our cohort signal and the
      broader world are in and out of step.
    micro_example: >-
      Reality Check: AHEAD — fan Belief Dial 78 with market odds +450
      implying only 18% — one of them is early, both are data.
    see_also: [respect-gap, reality-gap, fan-pulse]
