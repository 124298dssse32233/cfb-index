<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="Vibe Shift card for Tulane week 15">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#006547" stop-opacity="1"/>
      <stop offset="100%" stop-color="#006547" stop-opacity="0.82"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg-grad)"/>
