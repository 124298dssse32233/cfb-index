# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Oklahoma owns the highest winning percentage of the modern era and seven national titles, built on a Land Rush mythology made literal — the Sooner Schooner, a covered wagon pulled by two white ponies, rides onto the field after every score, the only mascot of its kind in the sport."
  the_origin: "A territory-era program in Norman that Bud Wilkinson turned into a juggernaut in the 1950s, including the 47-game winning streak (1953-1957) that still stands as the longest in major college football history."
  golden_ages:
    - { era: "1947–1963 (Bud Wilkinson)", what: "Three national titles and the record 47-game winning streak" }
    - { era: "1973–1988 (Barry Switzer)", what: "Three national championships and the wishbone dynasty" }
    - { era: "1999–2016 (Bob Stoops)", what: "The 2000 national title and a sustained return to the sport's elite" }
  legends:
    - { name: Bud Wilkinson, role: coach, why: "Built the dynasty and the 47-game streak; the program's foundational coach" }
    - { name: Barry Switzer, role: coach, why: "Three titles with the wishbone; still an institutional presence on campus" }
    - { name: Billy Sims, role: player, why: "1978 Heisman; one of the program's seven, tied for most of any school" }
  canonical_moments:
    - { name: "The 47-game streak", year: 1957, what: "Wilkinson's Sooners run off the longest winning streak in major college history", handling: glory }
    - { name: "The 2000 national title", year: 2001, what: "Stoops beats Florida State in the Orange Bowl for the program's seventh championship", handling: glory }
    - { name: "The 34-24 Playoff collapse", year: 2025, what: "Oklahoma leads Alabama 17-0 in its CFP game, then loses 34-24 at home", handling: heartbreak }
  the_place: "Gaylord Family Oklahoma Memorial Stadium (cap 83,489) in Norman, where the Sooner Schooner circles the field after every score and 'Boomer Sooner' doubles as the fight song and the universal greeting."
  brand_of_football: "Crown-program-in-transition: historically explosive and tempo-driven, now reconfigured for an SEC line of scrimmage — confident about the standard, practical about what the new league demands."
  cultural_footprint: "A statewide identity built on Land Rush mythology — the program is how Oklahoma sees itself nationally, and the only place in the sport where the mascot is a Conestoga wagon at a gallop."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: In year three of the SEC, Oklahoma went 10-3 and returned to the 12-team
    Playoff under Brent Venables — a vindication after the doubt the league move invited. Behind transfer QB John
    Mateer (2,885 passing yards, 431 rushing, after a midseason hand injury) and new coordinator Ben Arbuckle, the
    Sooners started 5-0, then in the CFP led Alabama 17-0 before losing 34-24, dropping Venables to 0-5 in the
    postseason. Mateer returns for 2026. The program is back in the field; the open question is whether it can win
    its new league and chase the eighth title that would make the move look like destiny.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
  sources:
    - https://en.wikipedia.org/wiki/2025_Oklahoma_Sooners_football_team
    - https://www.on3.com/news/oklahomas-playoff-loss-stings-but-brent-venables-proved-the-doubters-wrong-in-2025/
    - https://tide1009.com/brent-venables-cfp-loss-alabama-oklahoma/

