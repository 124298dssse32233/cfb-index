program_name: Oklahoma
program_tier: 1

emotional_core:
  primary: restoration    # year three in the SEC answered the doubters — the climb back to the top is the live story
  secondary: grievance    # the "they don't belong in this league" take the move invited
  core_variant: dynasty-restoration
  one_line: "The Sooners are the seven-title program that crossed leagues and made the Playoff in year three of the SEC — then watched a 17-0 lead and the doubt they came to bury both slip away in one half against Alabama."

self_image:
  archetype: blue-blood-living-up
  standard_gap_frame: "Seven national championships and 50 league titles vs a move to the SEC that demanded the program prove, all over again, that the standard travels — and a Playoff that ended the moment a 17-0 lead became a 34-24 loss."

the_wound:
  name: "The 34-24 collapse"
  detail: "The Sooners reached the 12-team Playoff in 2025 and led Alabama 17-0 early — then surrendered 27 straight points and lost 34-24 at home, dropping Brent Venables to 0-5 in the postseason and turning a vindicating year into one half the fanbase can't unsee."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the league it chose to join and end the long wait for No. 8 — a championship that says the move was a coronation, not a gamble."
  drought: { since: 2000, unit: national_title }

the_chip:
  villain: national_media
  text: "Ever since the leagues changed, the take has been that the Sooners showed up late and out of their depth; the fanbase points to a Playoff berth in year three and says the doubters got the answer, then chose not to hear it because the last half went the wrong way."

the_delusion:
  tone: load-bearing
  text: "Sooner fans believe the program carries the standard into any league it joins — that seven titles and the deepest winning tradition in the sport are portable, and that the SEC was always going to bend to Norman rather than the other way around."

the_grudge_texture:
  rival: texas
  texture: blood-feud   # the Red River Rivalry — at the State Fair, on neutral ground, now both in the SEC

the_coach_relationship: total-trust   # Venables's 2025 Playoff run earned the room's belief despite the postseason record
the_internal_fracture: vindication vs ceiling — the room that says the Playoff berth proves Venables built it right vs the room that says 0-5 in the postseason and a blown 17-point lead mean the program is back in the field but not yet back on top
register: crown-program-in-transition   # DRAFT (from voice_register) — confirmed
never_use:   # DRAFT from profile — LAW, do not violate in any authored line
  - Oklahoma as generic Big-12 framing (they're SEC as of 2024)
  - Bedlam as a still-annual rivalry framing (the series is on hiatus post-realignment)
  - Barry Switzer as a museum artifact (he is active in the program's public life)
  - scrappy
  - Cinderella
  - plucky
  - crown as a boast (it is a structural fact, not a performance)
