emotional_core:
  primary: honor        # the keeper of the oldest championship tradition
  secondary: restoration # 2024 return to prestige after a drought
  one_line: "Yale football is the program that invented football (Walter Camp), won 27 national titles, and just claimed the first automatic FCS playoff bid in Ivy League history — still proving it belongs at the highest level."

self_image:
  archetype: blue-blood-living-up
  standard_gap_frame: "27 national championships, the winningest all-time record (.698), 100 consensus All-Americans, and the 2025 FCS playoff bid vs the Ivy League's no-scholarship ceiling."

the_wound:
  name: "The 44-year drought without an FCS playoff appearance — until 2025"
  detail: "Yale went 1982–2024 without an automatic playoff bid while playing division football. The program that invented college football had to wait longer than some FBS programs existed to get back to postseason football. That changed in 2025, when an undefeated Yale beat an undefeated Harvard to earn the first-ever automatic Ivy playoff bid."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the Ivy League and prove the Bulldogs still belong in the conversation with the best programs in America. The 2025 playoff bid is the first brick in a new edifice."
  drought: { since: 1982, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Yale invented football with Walter Camp, but Harvard gets all the credit. Yale won 27 championships to everyone else's handful, but the Bulldogs are treated like a footnote. The 2025 playoff bid is Yale saying: we're not a historical curiosity; we're a living program."

the_delusion:
  tone: self-aware
  text: "That Yale could go back to winning national championships the way it did in the 1880s — and the fanbase half-believes it. The Bulldogs know the Ivy League's democratic structure makes it impossible, but they have 27 national titles and 100 All-Americans saying otherwise."

the_grudge_texture:
  rival: harvard
  texture: championship    # The Game (1875–): the rivalry that invented rivalry rules

the_coach_relationship: legends-shadow   # living under Walter Camp (Father of Football) and Howard Jones
the_internal_fracture: null
