# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Tulane is the founding southern blue blood that walked away — a charter SEC member that hosted the first Sugar Bowls, then de-emphasized, nearly drowned after Katrina, and improbably rebuilt itself all the way into the first 12-team College Football Playoff."
  the_origin: "An elite private university in uptown New Orleans with a deep football pedigree — undefeated 1931 and 1934 teams, a founding role in the SEC and the Sugar Bowl — that gradually fell out of the big time and spent decades as a hard-luck program in a pro-sports city."
  golden_ages:
    - { era: "1929-1934", what: "Undefeated seasons, a national-title claim, and a founding hand in the SEC and the Sugar Bowl" }
    - { era: "2022-2025 (Fritz, then Sumrall)", what: "A 12-2 Cotton Bowl run and No. 9 finish in 2022, then back-to-back AAC titles and the program's first Playoff berth in 2025" }
  legends:
    - { name: Willie Fritz, role: coach, why: "Engineered the modern revival, culminating in the 2022 Cotton Bowl win over USC" }
    - { name: Michael Pratt, role: player, why: "The quarterback who led the 2022 worst-to-first turnaround and Cotton Bowl run" }
    - { name: Shaun King, role: player, why: "The QB of the unbeaten 1998 team — the prior high-water mark before the modern rise" }
  canonical_moments:
    - { name: "The 2023 Cotton Bowl", year: 2023, what: "Tulane beats USC 46-45 to cap a 12-2 worst-to-first season — the resurrection's signature win", handling: glory }
    - { name: "The first Playoff berth", year: 2025, what: "An AAC title and an 11-3 record send Tulane to the first 12-team CFP, the first Louisiana team ever to make it", handling: glory }
    - { name: "Post-Katrina near-death", year: 2005, what: "Hurricane Katrina scatters the team across the country and nearly ends the program", handling: wound }
  the_place: "Yulman Stadium — the on-campus home Tulane returned to in 2014 after decades sharing the Superdome, putting football back in the heart of uptown New Orleans."
  brand_of_football: "New Orleans resilience — physical, opportunistic, defense-and-run football built by program-resurrectors, with a chip earned from coming back from the brink."
  cultural_footprint: "A symbol of New Orleans's recovery and a founding piece of southern football history — the academically elite private school that proved a G5 program can claw into the Playoff, and a coaching launchpad the sport now raids."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Tulane went 11-3 in 2025, won its second straight AAC title with a
    34-21 win over North Texas, and became the first Louisiana program to reach the College Football Playoff,
    entering as the No. 11 seed before losing 41-10 at Ole Miss in the first round. QB Jake Retzlaff, a BYU
    transfer, ran for 16 TDs and threw for 14. But Jon Sumrall left for Florida the moment the run ended —
    coaching the Playoff game on his way out the door — and Tulane promoted Will Hall to keep the resurrection
    going. The question in New Orleans: can the Green Wave finally keep the coach who wins?
