program_name: Tulane
program_tier: 3

emotional_core:
  primary: restoration    # the old southern power that nearly died and clawed all the way back to the Playoff
  secondary: grievance    # a founding SEC member that left, and now beats on the Playoff door from outside the club
  core_variant: dynasty-restoration
  one_line: "Tulane helped found the Sugar Bowl and the SEC, then nearly drowned — a hurricane-battered, win-starved program that came back from the dead to make the first 12-team Playoff, becoming the first Louisiana team ever to crash the field."

self_image:
  archetype: blue-blood-fallen
  standard_gap_frame: "A founding SEC member that hosted the first Sugar Bowls vs decades of losing seasons and near-extinction after Hurricane Katrina — only recently rebuilt into a back-to-back conference champion."

the_wound:
  name: "Talent that keeps leaving as soon as it works"
  detail: "Tulane finally got good again — a 2022 Cotton Bowl run, an 11-3 2025, back-to-back AAC titles — but the success keeps walking out the door: Willie Fritz left for Houston, then Jon Sumrall left for Florida the moment he reached the Playoff, forcing Tulane to promote Will Hall and start the cycle again."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Make the revival permanent — win a Playoff game, keep the next coach long enough to build a dynasty in New Orleans, and turn the program from a stepping-stone back into a destination."
  drought: { since: 1998, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Across town and up the road sits LSU, the SEC giant that swallowed all of Louisiana's football oxygen after Tulane walked away from the conference. Fans believe the state forgot the Green Wave existed — and that crashing the Playoff was the loudest possible way to remind everyone New Orleans has a team of its own."

the_delusion:
  tone: earnest
  text: "The fanbase believes New Orleans can sustain a real winner — that an academically elite private school in a football-mad city can keep reaching the Playoff even as the sport's money tilts toward the giants, and that the program's founding pedigree means it belongs there."

the_grudge_texture:
  rival: lsu
  texture: killed-by-realignment   # the Battle for the Rag — dormant since Tulane left the SEC in 1966 and LSU took the state

the_coach_relationship: hot-seat-churn   # not a hot seat but a revolving door — Tulane keeps losing winning coaches to bigger jobs
the_internal_fracture: stepping-stone vs destination — the faction proud just to be a coach-launching contender again vs the faction desperate to finally keep the coach who wins
register: new-orleans-green-wave-historic   # DRAFT (from voice_register) — confirm
