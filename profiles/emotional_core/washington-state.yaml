emotional_core:
  primary: deprival        # the conference left and took the access; WSU was abandoned in Pullman and made to claw back
  secondary: grievance     # the schools that ran got a soft landing while the loyal ones got cut adrift
  one_line: "Washington State is the program realignment left for dead — when the Pac-12 collapsed, Pullman got abandoned with Oregon State, and the Cougars spent two years as a conference of two before rebuilding the league themselves."

self_image:
  archetype: orphaned
  standard_gap_frame: "A 1997 Rose Bowl team and Mike Leach's Air Raid relevance vs a 2023 abandonment that left the program with two conference games and no league at all."

the_wound:
  name: "Left behind in the Pac-12 collapse"
  detail: "In 2023 the Pac-12's biggest names bolted for the Big Ten and Big 12, and Washington State — too remote, too small a market — got no invitation. WSU and Oregon State were the only two left holding the conference's name, forced to schedule against a borrowed league while everyone who ran cashed in."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Make the rebuilt Pac-12 work and get back to a major bowl — to turn survival into a real league and prove the program was worth keeping all along."
  drought: { since: 2003, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Cougar fans watched the bigger schools sprint to richer leagues and leave the loyal ones behind, and they have not forgotten which neighbor pulled the ladder up. They say the ones who ran abandoned the conference; the Cougs are the ones who kept it alive."

the_delusion:
  tone: load-bearing
  text: "Coug fans believe Pullman is a real football town that the powerful simply found inconvenient — that the rebuilt Pac-12 they're anchoring will prove the program belonged at the big-league table the whole time, and that the snub was about geography, not merit."

the_grudge_texture:
  rival: washington
  texture: killed-by-realignment   # the Apple Cup — the in-state rival fled to the Big Ten and left WSU behind

the_coach_relationship: savior   # Kirby Moore hired to lead the program into the rebuilt league after a revolving door
the_internal_fracture: rebuild-the-league vs resent-the-betrayal — the faction energized to make the new Pac-12 thrive vs the faction that can't get past being abandoned and keeps a running list of who left
