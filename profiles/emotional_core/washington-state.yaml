story_canon:
  the_unique_thing: "When the Pac-12 collapsed in 2023, Washington State and Oregon State were the only two schools left behind — and rather than disband, they held the conference's name and have rebuilt it from scratch, an eight-team Pac-12 launching in 2026. The orphans became the founders."
  the_origin: "A land-grant university in remote Pullman, in the wheat country of eastern Washington's Palouse — the most isolated major-conference campus in the country, eight hours from anywhere, fiercely proud of being hard to get to."
  golden_ages:
    - { era: "1997–2003", what: "Back-to-back Rose Bowl-caliber teams; a 1997 Pac-10 title and Rose Bowl trip, plus quarterbacks Ryan Leaf and later Drew Bledsoe's legacy" }
    - { era: "2012–2019 (Mike Leach)", what: "The Air Raid era that made WSU nationally relevant and fun — an 11-2 peak in 2018" }
  legends:
    - { name: Mike Leach, role: coach, why: "Brought the Air Raid to Pullman and made the program a national must-watch; an enduring cultural figure" }
    - { name: Ryan Leaf, role: player, why: "Quarterbacked the 1997 Rose Bowl team and became the No. 2 overall NFL pick" }
    - { name: Gardner Minshew, role: player, why: "The mustachioed face of the Air Raid's 2018 11-win season" }
  canonical_moments:
    - { name: "The 1997 Rose Bowl run", year: 1997, what: "A Pac-10 title and the program's most famous season behind Ryan Leaf", handling: glory }
    - { name: "Left behind in realignment", year: 2023, what: "The Pac-12 dissolves and WSU gets no Power-conference invitation, reduced to a two-team league with Oregon State", handling: wound }
    - { name: "The 11-2 Leach peak", year: 2018, what: "Washington State wins 11 games and finishes ranked in the Air Raid's best season", handling: glory }
  the_place: "Martin Stadium on the Palouse — small, loud, and gloriously remote; getting to a Pullman game is itself a statement of devotion."
  brand_of_football: "Go Cougs — Air Raid heritage, a chip-on-the-shoulder remoteness, and a fanbase whose 'Coug It' self-deprecation hides a fierce loyalty to a place the powerful overlooked."
  cultural_footprint: "The emotional test case of college realignment — the program that proved a loyal fanbase in a small market would refuse to disappear, and rebuild a conference out of the wreckage."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: After two seasons as half of a two-team Pac-12 with Oregon State, Washington
    State anchors a rebuilt eight-team Pac-12 launching in 2026 (adding Boise State, Colorado State, Fresno State,
    San Diego State, Utah State, and Texas State). The program went 7-6 in 2025 — winning the Famous Idaho Potato
    Bowl 34-21 over Utah State — under first-year coach Jimmy Rogers, who then left for Iowa State after one season.
    WSU hired Missouri offensive coordinator Kirby Moore, a Prosser, Washington native, in December 2025 to lead it
    into the new league. The question in Pullman: can the orphan turn survival into a real conference?
