  archetype: lovable-have-not
  standard_gap_frame: "A small Methodist university with 135 years of football, a Prairie Wolves mascot born in 2000, a remarkable 30-year coaching tenure under Brian Keller (1996–2025), and a 515–478–42 all-time record that reflects decades of regional respectability without national prominence."

the_wound:
  name: "The end of the Keller era — transition into the unknown"
  detail: "Brian Keller coached Nebraska Wesleyan for 30 years (1996–2025), the longest tenure at any Division III program in that span. His retirement in December 2025 ended an era and left the fanbase wondering whether another coach can replicate the stability and competence Keller built."
