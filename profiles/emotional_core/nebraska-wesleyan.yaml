the_dream:
  text: "Continuity. Another era of stability and competence like the Keller years. Nebraska Wesleyan's dream is less about winning a championship than about finding the next coach who can stay, build, and sustain."
  drought: { since: 2000, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Fans here believe nebraska's big-time football programs (Nebraska Cornhuskers, UNK Lopers) dominate the state narrative and media cycles. Nebraska Wesleyan knows it will never be the state's story, only a small footnote in Lincoln's football landscape."

the_delusion:
  tone: self-aware
  text: "That the 30-year Keller era was replicable, that another coach can come in and build a decade of stability. The fanbase knows it's rare, knows Keller was exceptional, but believes the program's fundamental competence can attract a successor coach."

