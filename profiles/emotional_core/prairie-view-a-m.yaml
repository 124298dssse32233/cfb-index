the_wound:
  name: "The pre-2025 SWAC championship drought"
  detail: "Prairie View had not won a SWAC championship since 2009 — 16 years of competitive football but no titles. The 2025 season under new coach Tremaine Jackson broke the spell: 10-3 overall, 7-1 SWAC West Division, defeated Jackson State 23-21 in the championship game."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Build a consistent SWAC contender; prove the 2025 championship was the start of a new era, not a flash in the pan; reach the Celebration Bowl annually and compete for the black college national title."
  drought: { since: 2009, unit: conference_title }

the_chip:
  villain: none
  text: "Fans here believe prairie View has multiple SWAC titles in its history but had gone 16 years without one. The chip is that the program knows it can win at this level and refuses to accept a return to the pre-2025 drought; the 2025 title is proof the standard is achievable."

the_delusion:
  tone: earnest
  text: "The fanbase believes that a program with this much history and this much recent success is built to be a SWAC power — that the 2025 championship with a new coach and a portal-built roster proves the formula works, and the next three years are about consistency."

the_grudge_texture:
  rival: texas-southern
  texture: championship   # the Labor Day Classic for the Durley-Nicks Trophy; recent dominance

the_coach_relationship: total-trust   # Tremaine Jackson, first season, already a championship; the room believes completely
the_internal_fracture: immediate-standards vs patience — the faction that says 2025 proved the program is a contender and next year must be a playoff run vs the faction cautioning one season is a sample size
register: emerging-contender — new coach, new standard, championship DNA reactivated
