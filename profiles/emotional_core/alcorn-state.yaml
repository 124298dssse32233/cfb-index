# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep canon ──
story_canon:
  the_unique_thing: "Alcorn State is the Mississippi HBCU that has won five black college national championships (1968, 1969, 1974, 1984, 2014) and has established itself as a SWAC powerhouse. Hall of Famer Steve McNair (dual-threat QB, NFL legend) is an Alcorn State product. The program has won 13 SWAC titles and produced three College Football Hall of Famers (Marino Casem, Steve McNair, Doug Porter)."
  the_origin: "A land-grant university in Lorman, Mississippi that joined the SWAC in 1961 and built itself into a dynasty under coach Marino Casem. Alcorn State proved that a SWAC program could win at the national level and compete for multiple championships across eras."
  golden_ages:
    - { era: "1968–1974 (Marino Casem)", what: "Three consecutive national championships (1968, 1969, 1974) and the foundation of the modern program" }
    - { era: "1984 (Marino Casem)", what: "The fourth national championship under Casem; two-decade dynasty" }
    - { era: "2014", what: "The most recent black college national championship" }
  legends:
