    - { name: "The 1984 national championship", year: 1984, what: "Alcorn's fourth national title; the capstone of Casem's dynasty", handling: glory }
    - { name: "The 2014 national championship", year: 2014, what: "Alcorn State's most recent black college national championship", handling: glory }
  the_place: "Casem-Spinks Stadium in Lorman, Mississippi (cap 22,500); home of Alcorn's tradition."
  brand_of_football: "Championship-proven: a program that has won national titles across multiple eras and remains a SWAC power; Marino Casem's legacy is the foundation."
  cultural_footprint: "Alcorn State is the Mississippi HBCU that proved five times it could win a black college national championship. The program's legacy includes Hall of Famer Steve McNair and is anchored by Marino Casem's coaching dynasty. Alcorn is a peer to any HBCU program."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Alcorn State is in the second season under head coach Cedric Thomas (11-12
