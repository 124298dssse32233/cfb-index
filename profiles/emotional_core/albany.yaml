story_canon:
  the_unique_thing: "The Bob Ford era — a single coach who built the entire modern program from Division III in 1970 and stayed for 44 seasons (265 wins), turning a tiny Northeast school into an FCS power and seeding a 100-coach coaching factory."
  the_origin: "In 1970, Bob Ford arrived at Albany State College (a commuter school in upstate New York) and built the program from scratch across five decades — from Division III through Division II to FCS, never leaving, never wavering."
  golden_ages:
    - { era: "1970–2013 (Bob Ford)", what: "265 wins, six Northeast Conference championships, a coaching factory that seeded over 100 assistant coaches into college and professional football" }
    - { era: "2023", what: "Shared CAA championship and FCS semifinals — the program's first FCS playoff run, 44 years into Division I" }
  legends:
    - { name: Bob Ford, role: coach, why: "44-year tenure building the program from nothing; 265 wins; only coach in program history through the modern era" }
    - { name: Jared Verse, role: player, why: "2023 All-American; transferred to Florida State and became the highest NFL draft pick (19th overall by LA Rams in 2024)" }
    - { name: Gary Jones, role: player, why: "Single-season rushing record: 1,509 yards and 22 touchdowns (2002)" }
  canonical_moments:
    - { name: "2023 CAA Championship", year: 2023, what: "11-4 record, shared CAA title with Villanova and Richmond", handling: glory }
    - { name: "2023 FCS Semifinals", year: 2023, what: "First FCS playoff run in school history; lost to South Dakota State", handling: glory }
    - { name: "Bob Ford's 44-year tenure", year: 2013, what: "Longest-tenured coach in program history; built modern UAlbany entirely", handling: glory }
  the_place: "University at Albany — Bleecker Stadium in upstate New York; 'The Great Danes' identity rooted in the Northeast's college town legacy."
  brand_of_football: "Steady method — a program that climbs by getting better every year, not by buying talent; Bob Ford's coaching tree as organizational DNA."
  cultural_footprint: "Proof that a tiny Northeast commuter school can stack real FCS canon — five playoff appearances in the last two seasons, a shared CAA crown, and the template for slow-build excellence."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: UAlbany went 6-6 (4-4 CAA) in 2024 after the breakthrough 2023 run. The question in Albany: was 2023 the ceiling or the floor? The program is in a post-Ford era transitioning through
    new leadership with the weight of a Northeast legacy — five decades of steady method now measured against the playoffs they finally reached. Can they return?
