  one_line: "UAlbany is the Great Dane program that climbed from the Northeast to FCS playoff semifinals — proof that steady, 44-year-old method beats flash."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A program that built itself through five decades of steady improvement vs the flashier FCS programs that bought their way in."

the_wound:
  name: "The 2024 reset"
  detail: "After reaching the FCS semifinals in 2023 and sharing the CAA title, UAlbany regressed to 6-6 in 2024. The question: was 2023 the peak of the Ford era legacy, or the beginning of a new standard?"
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Return to the FCS playoffs and prove the 2023 run was no accident — another CAA title, another deep playoff run, and cement UAlbany as a permanent FCS force."
  drought: { since: 2023, unit: conference_title }

the_chip:
  villain: national_media
  text: "Fans here believe bob Ford coached for 44 years and never made the FCS playoffs. UAlbany waited decades and finally broke through in 2023. The Danes carry the chip of a program that nobody expected to get here, and won't be underestimated again."

the_delusion:
  tone: self-aware
  text: "The fanbase believes that UAlbany can consistently compete with the East Coast powers who've been FCS for longer — that the method and the program culture Ford built can stay competitive in a conference full of older FBS-refugee programs."

the_grudge_texture:
  rival: stony-brook
  texture: little-brother

the_coach_relationship: legends-shadow
the_internal_fracture: "legacy-pride vs new-standard — the faction proud of what Ford built vs the faction demanding the recent success become the floor, not the ceiling"
register: albany-great-dane-northeast-breakthrough

