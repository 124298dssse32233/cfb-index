# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "South Florida had the fastest rise in modern college football. The program played its first game in 1997 and was ranked No. 2 in the country by 2007 — a decade from nonexistent to one win from the national-title conversation. No major program ever climbed that far that fast."
  the_origin: "A commuter university in Tampa that didn't field football until 1997, built from scratch by Jim Leavitt into a Big East team that shocked the sport by 2007 — then lost its way after Leavitt's 2010 firing and spent a decade trying to find the altitude again."
  golden_ages:
    - { era: "2005–2007 (Jim Leavitt)", what: "The meteoric rise — Big East relevance, a 2007 run to No. 2 with wins over Auburn and West Virginia, Matt Grothe at quarterback" }
    - { era: "2025 (Alex Golesh)", what: "A 9-4 reclamation built on a top-ten scoring offense (43 ppg) and back-to-back ranked wins to open the year" }
  legends:
    - { name: "Jim Leavitt", role: coach, why: "The founding coach who built USF from its first game in 1997 to No. 2 in the country" }
    - { name: "Matt Grothe", role: player, why: "The quarterback of the 2007 rise and the program's all-time leading passer" }
  canonical_moments:
    - { name: "USF reaches No. 2", year: 2007, what: "After beating Auburn in overtime and toppling West Virginia, the 10-year-old program climbs to No. 2 in the country — the high point of the fastest rise in modern football", handling: glory }
    - { name: "Two ranked wins in eight days", year: 2025, what: "USF opens the season routing No. 25 Boise State 34-7, then wins at Florida 18-16 on a walk-off field goal — its first ranked wins since 2016 — and enters the AP poll at No. 18", handling: glory }
    - { name: "Golesh leaves for Auburn", year: 2025, what: "The coach who rebuilt the program departs before the bowl game, which USF loses — a familiar twist for a program that keeps losing what it builds", handling: wound }
  the_place: "Raymond James Stadium in Tampa — the Buccaneers' NFL home that USF shares as a tenant; 2026 is the Bulls' final season there before an on-campus stadium opens, a program at last building a house of its own."
  brand_of_football: "Explosive and fast — the Golesh-era identity was a top-ten scoring offense and tempo; the Bulls play to outscore, in a recruiting-rich state that gives them the speed to do it."
  cultural_footprint: "Proof of how fast a program can be willed into being — USF is the modern case study in startup football, the Tampa school that crashed the national conversation a decade after kickoff and has chased that feeling ever since."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Alex Golesh rebuilt USF into a 9-4, top-ten-scoring team in 2025 — opening
    with ranked wins over Boise State and at Florida, reaching No. 18 — then left for Auburn in late November
    before a Cure Bowl loss to Old Dominion. USF hired former Ohio State OC Brian Hartline (a six-year, $21M deal)
    to keep the momentum, with 2026 set as the Bulls' last season at Raymond James before their new on-campus home.
