emotional_core:
  primary: restoration    # the program that rocketed to No. 2, crashed, and in 2025 finally rebuilt back into a ranked, explosive team
  secondary: spectacle    # the 43-points-a-game show that made the Bulls must-watch again
  core_variant: regime-reset
  one_line: "South Florida went from not existing in 1996 to No. 2 in the country by 2007 — then spent a decade in the wreckage, until a 2025 offense that hung 43 a game and beat two ranked teams in eight days put the Bulls back on the map."

self_image:
  archetype: riser-proving
  standard_gap_frame: "The fastest rise in modern football history — unranked-to-No.-2 in eleven years — against the long fall that followed, and a 2025 reclamation that reached No. 18 before its coach left."

the_wound:
  name: "The lost decade after No. 2 — and the coach who just walked out"
  detail: "USF climbed from a 1997 startup to No. 2 in 2007, then collapsed: the Leavitt firing, losing seasons, near-irrelevance. Alex Golesh finally rebuilt the Bulls into a 9-4, top-ten-scoring team in 2025 — and then left for Auburn in late November before the bowl, which USF lost. The Bulls open 2026 under Brian Hartline, hoping the momentum survived the exit."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the American and crack the rankings to stay — finish the climb back so the 2007 peak reads as a preview, not a fluke the program could never repeat."
  drought: { since: 2007, unit: relevance }

the_chip:
  villain: national_media
  text: "Bulls fans remember being No. 2 in the country and then being written off entirely — and they remember 2025, when USF beat Boise State and Florida in eight days and made the doubters look up again. They'll tell you nobody believed the rebuild until the scoreboard forced it."

the_delusion:
  tone: earnest
  text: "Tampa fans believe a young program in talent-rich Florida is a sleeping power — that with the right offense and an NFL stadium to fill, USF can be a Big-12-or-better program any season now. The 2007 ride taught them the rise can come fast, and they're sure it can come again."

the_grudge_texture:
  rival: central-florida
  texture: little-brother   # the War on I-4 with UCF — the in-state, attitude-laden grudge that means the most in Tampa

the_coach_relationship: savior   # Alex Golesh resurrected the program in 2023-2025 (then left for Auburn); Brian Hartline inherits the build
the_internal_fracture: momentum vs whiplash — the faction riding the 2025 breakthrough vs the faction bracing for another reset after losing the coach who built it
