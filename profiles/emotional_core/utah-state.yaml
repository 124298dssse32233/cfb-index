  archetype: perennial-almost
  standard_gap_frame: "A 2012 top-16 finish and a 2021 conference title vs the coaching turmoil and losing seasons that followed, and a roster Bronco Mendenhall had to rebuild from scratch."

the_wound:
  name: "The years of churn before the reset"
  detail: "Utah State's 2021 Mountain West title gave way to staff upheaval and instability, and Bronco Mendenhall inherited a program that needed rebuilding. His first year, 2025, went 6-7 (4-4 Mountain West) with a Famous Idaho Potato Bowl loss to Washington State — a steadying season, not yet a winning one."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Walk into the new Pac-12 as a winner, not a tourist — a bowl, a winning record, the altitude in Logan loud for a team that belongs at the bigger table."
  drought: { since: 2021, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Aggie fans have spent forever as the state's third program, behind Utah and BYU, told Logan is too small and too cold to matter. They'll point to the Pac-12 invitation and ask which little brother is moving up now."

the_delusion:
  tone: earnest
  text: "The fanbase believes the altitude and the atmosphere in Logan are a genuine home-field weapon — that visitors wilt at 4,700 feet, and that a steadied roster plus a proven coach makes the Aggies a sneaky problem for anyone who overlooks them."

the_grudge_texture:
  rival: byu
  texture: little-brother   # the Old Wagon Wheel — and the in-state resentment of the bigger, better-funded Cougars

the_coach_relationship: savior   # Bronco Mendenhall — a proven program-builder hired to steady the churn and carry USU into the Pac-12
the_internal_fracture: patience vs urgency — give Mendenhall time to rebuild for the Pac-12 jump vs the faction that wants the Aggies winning the moment they arrive
