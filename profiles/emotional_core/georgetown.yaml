  detail: "Georgetown football was overshadowed by basketball and erased from the Washington D.C. sports landscape. The cross-town rivalry with Howard (two DC Cup awards, 2008-2009) vanished when Howard left the conference. Georgetown is not wounded by recent collapse but by decades of irrelevance in its own city."
