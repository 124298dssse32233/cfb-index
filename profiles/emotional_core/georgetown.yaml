  villain: big_brother
  text: "The chip is basketball's shadow. Georgetown basketball made 'Hoya Saxa' iconic; football gets to be the second sport on campus. The fanbase believes football can follow the same path basketball did."

the_delusion:
  tone: self-aware
  text: "The fanbase believes that Georgetown's Jesuit academic rigor and D.C. location make football recruitment easier. (The reality: Georgetown has never been a major football draw and d.c. has never been a football hub.)"

