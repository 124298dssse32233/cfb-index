# ── STORY CANON (doc 64) — what makes this program unique & amazing. ──
story_canon:
  the_unique_thing: "The Hoya Saxa chant and the 1874 founding make Georgetown football one of America's oldest programs, yet it's been invisible for decades. Georgetown's unique thing is the gap between historical legitimacy and modern irrelevance."
  the_origin: "Georgetow football was founded in 1874 (first game 1887) as one of the oldest FCS programs in America. Located in Washington, D.C., it was a major power before basketball overshadowed it."
  golden_ages:
    - { era: "1940 (Orange Bowl era)", what: "Georgetown reached the Orange Bowl, losing 14-7 to Mississippi State — a moment of national relevance" }
    - { era: "1965-1968 (Bill Carpenter era)", what: "Hall of Famer Bill Carpenter played quarterback for Georgetown, setting multiple records" }
  legends:
    - { name: "Bill Carpenter", role: "player", why: "Hall of Famer QB 1965-1968 who set multiple records and became the most famous Georgetown football player" }
  canonical_moments:
    - { name: "1940 Orange Bowl", year: 1940, what: "Georgetown reached the Orange Bowl, losing 14-7 to Mississippi State", handling: glory }
    - { name: "Bill Carpenter Era", year: 1965, what: "Hall of Famer Bill Carpenter played for Georgetown, the most famous modern Georgetown player", handling: glory }
  the_place: "Cooper Field in Washington, D.C., home of a program buried in the capital's basketball-centric sports landscape."
  brand_of_football: "Historic but invisible — a program with legitimate lineage but zero modern cultural footprint in the nation's capital."
  cultural_footprint: "Georgetown football is what happens when a historic program gets overshadowed by basketball and never reclaims attention. The Hoyas name is synonymous with basketball, not football."
  the_ongoing_story: >
    LIVE ARC — 2026-06-13: Georgetown finished 6-6 (3-4 Patriot League) in 2025, improving from the 5-6 (2-4) record in 2024. Coach Rob Sgarlata entered his 10th season; the program is slowly ascending out of irrelevance. The question in D.C.: can football build any momentum, or is basketball's shadow permanent?
  research_checklist:
    - The Bill Carpenter (Hall of Famer) era and his significance
    - The 1940 Orange Bowl and Georgetown's only moment of national football relevance
    - The Howard rivalry and the DC Cup (2008-2009) and why it disappeared
    - The basketball-football dynamic and why hoops overshadowed football
    - The Hoya Saxa chant and its connection to football vs. basketball
