emotional_core:
  primary: deprival       # the most distinctive look in the sport attached to a team that can't break through the Big Ten middle
  secondary: restoration  # the live hope: a record-setting freshman QB chose to stay and build
  one_line: "Maryland has the most striking identity in college football — the state flag stitched into the jersey — and a team that keeps coming up short of letting the look mean what it could."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "A pro-tier visual brand and DMV recruiting turf vs a 4-8, 1-8 Big Ten season that left the Terrapins near the bottom of the league for the fourth time in five years."

the_wound:
  name: "The Big Ten weight"
  detail: "Since leaving the ACC for the Big Ten in 2014, Maryland has mostly lived in the league's lower half. 2025 bottomed out at 4-8 (1-8 Big Ten) in Mike Locksley's seventh year — a season that asked whether the program can ever be more than a recruiting feeder for the conference's heavyweights."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Turn DMV talent into a team that finally matters in November — a winning Big Ten record, a bowl that feels like a step up instead of a ceiling."
  drought: { since: 2014, unit: relevance }

the_chip:
  villain: big_brother
  text: "The fanbase watches the same DMV recruits it should own get pulled away by Ohio State and Penn State and Michigan, then sees those programs run the league — the sense that Maryland is a supplier to the powers it's supposed to be competing with."

the_delusion:
  tone: earnest
  text: "The fanbase believes the talent base and the brand are real enough that the right quarterback changes everything — and that Malik Washington, the freshman who broke the program passing record and chose to stay, is that quarterback."

the_grudge_texture:
  rival: penn-state
  texture: killed-by-realignment   # the ACC move severed Maryland's old rivalries; the Big Ten ones never replaced them

the_coach_relationship: hot-seat-churn   # Locksley survives a 4-8 into year eight, but the seat is warm
the_internal_fracture: patience vs frustration — give Locksley and a young QB time vs the fatigue of waiting for a breakthrough that never arrives
register: dc-mid-atlantic-deprival
