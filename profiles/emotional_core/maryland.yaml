story_canon:
  the_unique_thing: "The Maryland state flag on the uniform — the boldest, most instantly recognizable visual identity in the sport, the black-gold-red-white quadrants that make the Terrapins unmistakable even to people who don't follow the team."
  the_origin: "The land-grant flagship of Maryland in College Park, a 1953 national champion that won across the ACC for decades before leaving for the Big Ten and the visual rebrand that became its signature."
  golden_ages:
    - { era: "1951–1955 (Jim Tatum)", what: "The 1953 national championship and the program's competitive peak" }
    - { era: "2001–2003 (Ralph Friedgen)", what: "An ACC title run and a 2002 Orange Bowl appearance" }
  legends:
    - { name: Randy White, role: player, why: "Outland and Lombardi winner; the program's greatest defensive player and a Pro Football Hall of Famer" }
    - { name: Ralph Friedgen, role: coach, why: "Maryland alum who led the early-2000s ACC peak and Orange Bowl" }
    - { name: Boomer Esiason, role: player, why: "The program's most famous quarterback and a long-time NFL star" }
  canonical_moments:
    - { name: "The 1953 national championship", year: 1953, what: "Maryland's lone national title under Jim Tatum", handling: glory }
    - { name: "The 2002 Orange Bowl run", year: 2001, what: "Friedgen's first year delivers an ACC title and a BCS bowl berth", handling: glory }
    - { name: "The Big Ten move", year: 2014, what: "Maryland leaves the ACC for the Big Ten — financial security, but severed rivalries and a tougher ceiling", handling: heartbreak }
  the_place: "SECU Stadium in College Park — Testudo the terrapin out front, the state-flag look in the stands, a DMV crowd that swells for the league's marquee visitors."
  brand_of_football: "Visually unmistakable, identity-forward football — a program whose look outruns its results, built on Mid-Atlantic speed and DMV skill talent."
  cultural_footprint: "Fear the Turtle — the DMV's Big Ten outpost, a program whose state-flag uniforms are studied as a design landmark even by people indifferent to its record."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Maryland went 4-8 (1-8 Big Ten) in 2025, Mike Locksley's seventh year, who
    returns for an eighth season despite the slide. The hope is freshman QB Malik Washington, who set program
    freshman records (2,963 passing yards, 17 TDs) and announced he'll return for 2026. The question in College
    Park: can Locksley build a winner around a young star, or is the brand destined to outshine the team again?
