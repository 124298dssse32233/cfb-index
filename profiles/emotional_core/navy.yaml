emotional_core:
  primary: honor          # the only program where the players will literally go to war; the game is the point
  secondary: house-money  # an 11-2 season that wasn't supposed to happen, and a win over Army that crowns it
  one_line: "Navy is the program where every man on the field has signed up to serve — and where a 17-16 December comeback over Army means more than any ranking the rest of the sport plays for."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A service academy bound by height, weight, and a five-year military commitment, beating ranked teams with an offense the rest of the sport stopped running decades ago."

the_wound:
  name: "The recruiting math never changes"
  detail: "Navy can't outbid anyone in a transfer-portal, NIL era — every recruit must qualify for the Naval Academy and owe years of active service. The Midshipmen win in spite of constraints no other FBS program faces, and a down year is always one roster crunch away."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Keep the Commander-in-Chief's Trophy in Annapolis and finally win the American outright — a conference title the program has never claimed since joining the league in 2015 — sending another class into the fleet having beaten the teams that had every advantage."
  drought: { since: 2015, unit: conference_title }

the_chip:
  villain: national_media
  text: "Fans hear the option offense called a relic every December — and then watch the Midshipmen, with players half the size of their opponents, go 11-2 and beat a ranked Army team, and wait for the analysts to admit the constraints are the point, not the excuse."

the_delusion:
  tone: load-bearing
  text: "The brigade believes the academy makes them tougher, not smaller — that a roster of future officers who will run the triple option until your defense breaks can outlast anyone, and that no opponent wants it more than men who'll serve their country after the final whistle."

the_grudge_texture:
  rival: army
  texture: blood-feud   # Army-Navy — the most honored rivalry in American sports

the_coach_relationship: forever-ours   # Niumatalolo's long era, now Newberry carrying the academy identity
the_internal_fracture: tradition vs adaptation — the faction that says the triple option and the academy way are sacred vs the faction that wants the scheme modernized to keep pace with a changing sport
