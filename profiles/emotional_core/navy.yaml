# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The Army-Navy game — the most honored rivalry in American sports, where every player on both sidelines has committed to serve in uniform after graduation. There is no transfer portal, no NIL bidding war, no escape hatch — just a triple option run by future officers, and a December Saturday the whole country stops to watch."
  the_origin: "The football team of the United States Naval Academy in Annapolis, playing since 1879 — independent for 134 years before joining the American in 2015, defined always by the brigade, the service commitment, and the game against Army."
  golden_ages:
    - { era: "1960–1963 (Bellino & Staubach)", what: "Two Heisman Trophies in four years — Joe Bellino in 1960, Roger Staubach in 1963 — and a national-title-contending run" }
    - { era: "2009–2019 (Ken Niumatalolo)", what: "The winningest era in program history, perfecting the triple option and stacking wins over Army" }
  legends:
    - { name: Roger Staubach, role: player, why: "1963 Heisman winner, Naval officer, then NFL Hall of Famer — the academy's signature figure" }
    - { name: Ken Niumatalolo, role: coach, why: "The program's all-time wins leader; the keeper of the triple-option identity" }
    - { name: Joe Bellino, role: player, why: "1960 Heisman winner, the first of Navy's two" }
  canonical_moments:
    - { name: "Staubach's Heisman", year: 1963, what: "Roger Staubach wins the Heisman and leads Navy to a Cotton Bowl and a national-title-game stage", handling: glory }
    - { name: "Back-to-back over Army", year: 2025, what: "Navy rallies from 16-7 down to beat a ranked Army 17-16, its first consecutive wins in the series since 2014-15, retaining the Commander-in-Chief's Trophy", handling: glory }
  the_place: "Navy-Marine Corps Memorial Stadium in Annapolis — where the brigade of midshipmen marches in, and where the alma maters are sung side by side after Army-Navy regardless of the score."
  brand_of_football: "The triple option — a disciplined, run-first, assignment-perfect attack the rest of the sport abandoned, weaponized by undersized players who simply execute longer than you can."
  cultural_footprint: "More than a team — a representation of the Navy and the country. The Army-Navy game closes the regular season every year as a national ritual, and these players go to war, not the pros."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Navy went 11-2 in 2025 (7-1 American) under third-year coach Brian
    Newberry, won the Liberty Bowl 35-13 over Cincinnati, and rallied to beat a ranked Army 17-16 in December —
    a second straight win over its rival behind QB Blake Horvath. The Midshipmen enter 2026 needing to replace
    Horvath while chasing the one prize that's eluded them: an outright American Conference championship.
