  name: "The long winter of irrelevance"
  detail: "For most of the modern era Illinois was the Big Ten's forgotten program — a 2008 Rose Bowl blowout and a 2007 fluke aside, decades of losing seasons and empty Octobers that taught the fanbase to expect nothing and brace for the bottom falling out."
