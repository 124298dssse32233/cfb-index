  text: "Illini fans are tired of being the Big Ten game nobody previews and the program penciled in as a loss; even at 9-4 they hear the analysts wait for the regression, and they want the respect a two-year climb has earned."

the_delusion:
  tone: earnest
  text: "The faithful believe Champaign can be a genuine Big Ten power again — that a fertile in-state and Chicago-area recruiting base plus a proven coach means Grange's program was only ever sleeping, not finished."

