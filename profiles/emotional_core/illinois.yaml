story_canon:
  the_unique_thing: "Red Grange — the 'Galloping Ghost.' On October 18, 1924, at the dedication of Memorial Stadium, Grange scored four touchdowns in the first twelve minutes against Michigan, a performance so legendary it helped make college football a national sport. No program has a more foundational figure."
  the_origin: "A Big Ten charter member and one of college football's oldest programs, claiming five national titles in the pre-modern era and a place at the very founding of the sport's mythology through Grange and coach Bob Zuppke."
  golden_ages:
    - { era: "1923–1925 (Red Grange)", what: "The Galloping Ghost era — national titles and the most famous individual run in the sport's history" }
    - { era: "1983 & 2001", what: "Big Ten championships and Rose Bowl trips — the modern program's rare peaks" }
  legends:
    - { name: Red Grange, role: player, why: "The Galloping Ghost — the four-TD Michigan game; the player who helped make the sport national" }
    - { name: Dick Butkus, role: player, why: "The archetypal middle linebacker; the award is named for him" }
    - { name: Bob Zuppke, role: coach, why: "Four national titles and the coach of the Grange era" }
  canonical_moments:
    - { name: "Grange's four TDs vs Michigan", year: 1924, what: "Four touchdowns in twelve minutes at Memorial Stadium's dedication", handling: glory }
    - { name: "2001 Big Ten championship", year: 2001, what: "An outright Big Ten title and a Rose Bowl berth under Ron Turner", handling: glory }
    - { name: "Music City Bowl over Tennessee", year: 2025, what: "A 30-28 win to cap consecutive nine-win seasons, a school first", handling: glory }
  the_place: "Memorial Stadium in Champaign — its 200 columns each engraved with the name of an Illinois student or alum who died in World War I, dedicated in 1924 on the day Grange ran wild."
  brand_of_football: "Under Bielema, throwback Big Ten football — a power running game, a stout defense, and ball control; a physical identity that suits the program's heartland roots."
  cultural_footprint: "A founding piece of college football's lore through Grange, and the cradle of two iconic defenders — Butkus and Simeon Rice — in a state that breeds linebackers."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Illinois went 9-4 (5-4 Big Ten) in 2025 and beat Tennessee 30-28 in the Music
    City Bowl, giving Bret Bielema back-to-back nine-win seasons for the first time in school history. QB Luke Altmyer
    starred (2,717 yards, 22 TDs, 6 INTs). The Illini peaked at No. 17 but were humbled 63-10 by Indiana, the
    season's reminder of the gap to the Big Ten's elite. Champaign enters 2026 relevant for the first time in a
    generation, asking whether Bielema can make it last.
