  one_line: "Columbia football survived the worst losing streak in sports history (44 games, 1983–1988), stayed true to Ivy principles, and just won a shared national championship in 2024 — the ultimate redemption story."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "One of the oldest programs in American football, a 1933 national champion, and a 2024 Ivy co-champion vs a 44-game losing streak that defines the program's identity more than Lou Little ever could."

the_wound:
  name: "The 44-game losing streak (1983–1988) — the worst in sports history"
  detail: "Between 1983 and 1988, Columbia lost 44 consecutive games. The streak lasted 5 years and 44 games, earning Columbia a permanent place on ESPN's list of worst teams ever (ranked #4). One game saw Columbia lose 49–17 to Harvard despite leading 17–0 with five minutes left in the third quarter. The wound is permanently part of the program's identity."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Prove the 44-game streak was an anomaly, not the program's destiny. Winning a shared Ivy League championship in 2024 was that proof — Columbia is back."
  drought: null

the_chip:
  villain: none
  text: "Fans here believe columbia doesn't have a chip against anyone. The Lions' rival is their own history. Every win is a repudiation of the 44-game streak, not a grudge against another program. Every Ivy title is proof that the worst team ever can become a champion again."

the_delusion:
  tone: load-bearing
  text: "That the 1933 Lou Little team and the 2024 championship team are the real Columbia, and the 44-game streak was just a terrible moment in a long narrative. Columbia fans believe in redemption — and the 2024 title proves it works."

the_grudge_texture:
  rival: yale
  texture: little-brother    # historic rivalry, but Columbia was never the peer

the_coach_relationship: total-trust   # Jon Poppe brought the program back to relevance
the_internal_fracture: null
