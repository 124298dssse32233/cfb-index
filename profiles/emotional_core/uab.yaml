emotional_core:
  primary: redemption     # the program that was killed and came back — the comeback IS the identity
  secondary: restoration  # post-Clark, trying to get the resurrection magic back after three losing years
  one_line: "UAB is the program its own university shut down — then brought back from the dead and watched win a conference title, a comeback story no other program in the sport can claim."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A 2018 conference championship two years after literal extinction vs three straight losing seasons and a mid-2025 coaching firing that asks whether the resurrection has run out of road."

the_wound:
  name: "The shutdown — and the slide back toward it"
  detail: "In 2014 UAB's own administration cancelled the football program; fans and donors forced it back for 2017, and Bill Clark won a conference title in 2018. But the post-Clark years went the other way — a 2-4 start in 2025 got Trent Dilfer fired, and the Blazers limped to 4-8, a third straight losing season that revived the old fear the program is fighting for its life again."
  handling: never-a-punchline
  freshness: this-era

the_dream:
  text: "Prove the comeback wasn't a one-time miracle — a winning season, a bowl, a program that looks permanent instead of provisional."
  drought: { since: 2021, unit: bowl }

the_chip:
  villain: big_brother
  text: "UAB fans never forget that their own university system — the one that answers to Tuscaloosa — tried to bury the program. Every season the Blazers exist at all, they say, is a win over the people who wanted them gone."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes a program that survived being shut down can survive anything — that the comeback proved the city wants this team enough to keep saving it, no matter how the standings look."

the_grudge_texture:
  rival: memphis
  texture: little-brother   # the longtime conference foe; UAB's interim-era upset of Memphis in 2025 was its proudest win

the_coach_relationship: savior   # Bill Clark — the man who won the resurrection title — is the standard every coach is measured against
the_internal_fracture: gratitude vs ambition — the faction grateful the program merely exists vs the faction that says surviving isn't the same as competing
