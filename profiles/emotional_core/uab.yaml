# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "UAB is the only program in modern major-college football that was shut down by its own university and brought back from the dead — cancelled in 2014, revived in 2017, and a conference champion by 2018. The resurrection isn't a chapter; it's the whole identity."
  the_origin: "An urban commuter university in Birmingham that built a football program in the shadow of Alabama and Auburn, then had it taken away and fought to get it back."
  golden_ages:
    - { era: "2017–2018 (Bill Clark return)", what: "The resurrected program goes from zero football to an 11-3 Conference USA championship in two seasons" }
    - { era: "2020–2021", what: "Sustained conference contention and the move into Protective Stadium, the program's first dedicated home" }
  legends:
    - { name: Bill Clark, role: coach, why: "Coached the team into the shutdown, then back out of it to a conference title — the architect of the comeback" }
  canonical_moments:
    - { name: "The shutdown", year: 2014, what: "UAB's administration cancels the football program after a winning season", handling: wound }
    - { name: "The resurrection title", year: 2018, what: "Two years after extinction, UAB wins the Conference USA championship", handling: glory }
    - { name: "Protective Stadium opens", year: 2021, what: "The Blazers finally get a dedicated downtown home", handling: glory }
  the_place: "Protective Stadium — a downtown Birmingham venue the program got only after coming back from the dead, a permanence the city had to build to keep the team."
  brand_of_football: "Resurrection football — a program whose whole stylistic soul is that it exists at all, playing with the chip of a team that was told it shouldn't."
  cultural_footprint: "Birmingham's own Division-I football team — proof a city will fight to save a program its institutions tried to erase, and a rallying point for an urban university that wanted something to call its own."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: UAB fired Trent Dilfer at 2-4 in October 2025 and finished 4-8, a third
    straight losing season. Offensive coordinator Alex Mortensen went interim, beat Memphis in his first game,
    and was named the permanent head coach in December 2025. The question in Birmingham: can a first-time head
    coach restore the resurrection-era magic, or has the comeback story stalled.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
