emotional_core:
  primary: grief          # the coach who ended a century of losing just left — and took the roster with him
  secondary: restoration  # Jimmy Rogers inherits the rebuild of what Campbell built
  one_line: "Iowa State spent a hundred years as the program that couldn't, then Matt Campbell made it matter — and in 2025 Ames had to watch the man who fixed everything pack up for Penn State."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A century of competitive irrelevance ending in the Campbell era's bowl runs and top-15 rankings vs the gut-drop of watching the architect leave and starting the climb over from scratch."

the_wound:
  name: "Losing Matt Campbell to Penn State"
  detail: "After ending generations of losing and pushing Iowa State into the national conversation, Matt Campbell left for Penn State at the end of 2025 — and the roster largely followed him out the door. Ames is left with the oldest fear in Cyclone country: that the good years were on loan, and the program reverts to what it always was."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Prove the Campbell decade rewired the program for good — that a once-hopeless job can hold its altitude under Jimmy Rogers, win the Big 12 it has never won, and stop being college football's lovable hard-luck story."
  drought: { since: 1912, unit: conference_title }

the_chip:
  villain: big_brother
  text: "The chip is shaped like the team across the state — Iowa State fans are tired of being the little sibling in their own Cy-Hawk rivalry, the program everyone roots for but nobody fears. They wanted Campbell's era to flip that for good, and now they have to defend it all over again."

the_delusion:
  tone: earnest
  text: "Cyclone fans believe the love is the moat — that the most patient, most-loyal fanbase in the league will keep showing up and keep the program from sliding back, that the Campbell years changed who Iowa State is and not just how it played. They've earned the right to believe it."

the_grudge_texture:
  rival: iowa
  texture: little-brother   # the Cy-Hawk — the in-state big brother that has owned the narrative for generations

the_coach_relationship: savior   # Campbell WAS the savior; Jimmy Rogers inherits the job of being the next one
the_internal_fracture: faith-in-the-foundation vs fear-of-the-reversion — the faction that believes Campbell permanently changed the program vs the faction quietly bracing for a slide back to the bad old days
register: ames-quiet-cyclone-arrival   # plainspoken, grateful, hard-loyal Midwestern patience — never loud, never entitled
