# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Iowa State is the program that lost for the better part of a century and turned that hard-luck loyalty into one of the most-loved stories in the sport — then watched Matt Campbell finally make it win, only to lose him to a blue blood. Its home is named for Jack Trice, the only Big 12 stadium named for an African-American athlete, who died from injuries in a 1923 game."
  the_origin: "A land-grant ag school in Ames that fielded football for over a century with almost nothing to show for it competitively — defined less by trophies than by the singular, dignified story of Jack Trice and a fanbase that kept turning up anyway."
  golden_ages:
    - { era: "2017–2025 (Matt Campbell)", what: "The first sustained winning of the modern era — bowl games, top-15 finishes, a Big 12 title-game appearance, and Brock Purdy" }
  legends:
    - { name: Matt Campbell, role: coach, why: "Ended a century of losing and made Iowa State a national name — the most important figure in program history before leaving for Penn State" }
    - { name: Brock Purdy, role: player, why: "The face of the Campbell rise who went from Ames to a Super Bowl starting QB — proof the program could make stars" }
    - { name: Jack Trice, role: player, why: "Iowa State's first African-American athlete, who died of injuries from a 1923 game; the stadium bears his name" }
  canonical_moments:
    - { name: "Jack Trice's last game", year: 1923, what: "Trice is fatally injured at Minnesota; his letter the night before becomes the program's moral cornerstone", handling: wound }
    - { name: "First Big 12 Championship Game berth", year: 2020, what: "Campbell's Cyclones reach the league title game for the first time ever, capped by a Fiesta Bowl win", handling: glory }
    - { name: "Campbell leaves for Penn State", year: 2025, what: "The architect of the rise departs after an 8-4, top-12 season, and the roster largely follows", handling: heartbreak }
  the_place: "Jack Trice Stadium — the only Power-conference stadium named for an African-American athlete — and the sprawling, devoted tailgate lots that turned out for the program through a century of losing."
  brand_of_football: "Tough, gap-sound, develop-and-keep football — a program that out-coaches and out-recruits its hard-luck history through patience rather than blue-chip talent."
  cultural_footprint: "The sport's model of loyalty without reward — a fanbase beloved for showing up regardless of the scoreboard, and a stadium that stands as one of college football's most meaningful memorials."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Iowa State went 8-4 (5-4 Big 12) in 2025 and climbed to No. 12 in the AP
    poll, but Matt Campbell left for Penn State at season's end after compiling the best winning percentage in
    school history (72-55), and much of the roster followed him. Jimmy Rogers takes over a stripped-down program
    in 2026 with a heavy rebuild ahead. The question in Ames: did Campbell change Iowa State for good, or was the
    good era his to take with him?
  research_checklist:
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
