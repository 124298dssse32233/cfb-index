emotional_core:
  primary: redemption     # a program that nearly died, rebuilt itself on faith, and won a Big 12 title doing it
  secondary: restoration  # holding the rebuild together through a 5-7 slip back
  one_line: "Baylor is the program that scaled the mountaintop, collapsed all the way to the bottom, and then climbed back to a Big 12 title — proof in Waco that a faith-rooted rebuild could outlast the era that nearly ended it."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A 2013-2015 offensive juggernaut and a 2021 Big 12 title and Sugar Bowl against decades as a Southwest and Big 12 also-ran — a program whose ceiling has only briefly outrun its history."

the_wound:
  name: "The 2025 regression under Aranda"
  detail: "Four years after the Big 12 title, Baylor slid to 5-7 in 2025 despite Sawyer Robertson leading the nation in passing yards — a defense that ranked near the bottom of FBS dragged the Bears below .500, reviving the question of whether the Aranda revival had stalled."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Get back to the top of the Big 12 — a second conference title in the Aranda era and a New Year's bowl, proof the 2021 championship was a foundation Waco can build on rather than a peak it slid down from."
  drought: { since: 2021, unit: conference_title }

the_chip:
  villain: national_media
  text: "Bears fans say the country still files Baylor under one chapter of its past and refuses to look at what the program rebuilt — they say Waco won a Big 12 title the honest way and never got credit for the climb."

the_delusion:
  tone: earnest
  text: "The fanbase believes Baylor is a sleeping power held back only by bad luck and a thin defense — that the faith-and-culture identity Dave Aranda built means the next title run is always closer than the record suggests."

the_grudge_texture:
  rival: tcu
  texture: blood-feud   # the Revivalry — two Waco/Fort Worth private schools 90 miles apart who genuinely loathe it
the_coach_relationship: total-trust   # Baylor publicly recommitted to Dave Aranda after 2025, citing program stability
the_internal_fracture: faith in the rebuild vs frustration with the ceiling — the faction that trusts Aranda's culture and the 2021 title vs the faction that sees a 5-7 defense and wonders if the climb has topped out
