story_canon:
  the_unique_thing: "The full arc of college football in one program — the world's largest Baptist university went from decades of irrelevance to a Heisman and an offensive revolution, crashed to the very bottom, and rebuilt itself on faith into a Big 12 champion; few programs have lived the entire range of the sport's highs and lows so completely."
  the_origin: "A private Baptist school in Waco, long a Southwest Conference and Big 12 also-ran, transformed first by Art Briles' record-setting offense and then rebuilt by Dave Aranda's defense-and-culture program after the lowest point in its history."
  golden_ages:
    - { era: "2011–2015 (Art Briles)", what: "RG3's 2011 Heisman and a record-shattering offense that won Big 12 titles in 2013 and 2014" }
    - { era: "2021 (Dave Aranda)", what: "A 12-2 Big 12 championship and a Sugar Bowl win — proof the program could win again on its own terms" }
  legends:
    - { name: "Robert Griffin III", role: player, why: "The 2011 Heisman winner who put Baylor on the national map for the first time in generations" }
    - { name: Dave Aranda, role: coach, why: "Rebuilt the program from the bottom into a 2021 Big 12 champion and Sugar Bowl winner" }
    - { name: "Mike Singletary", role: player, why: "Two-time All-American linebacker, the Hall of Famer who is the program's all-time defensive icon" }
  canonical_moments:
    - { name: "RG3's Heisman", year: 2011, what: "Robert Griffin III wins Baylor's first Heisman Trophy — the moment Waco arrived", handling: glory }
    - { name: "The 2021 Big 12 title", year: 2021, what: "A goal-line stand seals a 21-16 win over Oklahoma State for the championship, then a 21-7 Sugar Bowl rout of Ole Miss — the redemption complete", handling: glory }
  the_place: "McLane Stadium on the banks of the Brazos River — sailgaters arriving by boat, the bear claw, and a faith-rooted pregame that makes Baylor unlike anywhere else in the Big 12."
  brand_of_football: "Two distinct identities fused — the Briles-lineage tempo offense (a quarterback-driven attack that led the nation in passing in 2025) and the Aranda culture-and-defense rebuild; at its best, explosive on offense and disciplined on the other side."
  cultural_footprint: "The world's largest Baptist university and a program whose faith identity is structural to who it is — a redemption story the rest of college football watched in full, from the heights to the depths and back to a title."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Baylor slid to 5-7 (3-6 Big 12) in 2025 even as quarterback Sawyer
    Robertson led the nation in passing yards (3,210, 29 TDs); a defense that ranked near the bottom of FBS
    (31.9 points allowed per game) sank the season. Baylor publicly retained Dave Aranda, citing program
    stability. He enters 2026 needing to fix the defense and prove the Big 12 title was a foundation rather
    than a peak the program has slid away from.
