emotional_core:
  primary: contentment    # a quietly excellent MAC program that just keeps winning bowls and moving on
  secondary: restoration  # three head coaches in three seasons, and the bowl streak survived all of it
  one_line: "Ohio just won its seventh straight bowl game — the second-longest active streak in the country — under its third head coach in three years, a quietly relentless program that loses its coaches to bigger jobs and keeps winning anyway."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "The 2024 MAC title and the longest active bowl streak this side of the blue bloods vs a ceiling that keeps poaching the coaches who build it."

the_wound:
  name: "The program that can't keep a coach"
  detail: "Tim Albin won Ohio its first MAC title since 1968 in 2024, then immediately left for Charlotte. His successor Brian Smith went 8-4 but was fired for cause in December 2025 amid a misconduct investigation. Defensive coordinator John Hauser, the third head coach in three seasons, won the Frisco Bowl on his first night running the team."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Hold the line through the churn and add another MAC banner — turn the bowl streak and the 2024 title into a program that's too good to keep raiding."
  drought: { since: 2024, unit: conference_title }

the_chip:
  villain: none
  text: "Athens doesn't carry a grudge so much as a quiet pride: the Bobcats keep getting their coaches stolen by bigger programs, and they keep reloading and winning bowls. The fanbase has stopped apologizing for being good in a league nobody watches."

the_delusion:
  tone: earnest
  text: "Bobcat fans believe the program is bigger than any one coach — that the bowl streak and the 2024 title prove Athens itself is the constant, and the next hire will keep the machine running no matter who keeps poaching them."

the_grudge_texture:
  rival: miami-oh
  texture: blood-feud   # the Battle of the Bricks — the oldest rivalry in the MAC

the_coach_relationship: hot-seat-churn   # three head coaches in three seasons
the_internal_fracture: pride in the bowl streak vs frustration at the coaching turnstile — the room split between celebrating a quietly elite MAC program and resenting that it can never keep the people who make it one
