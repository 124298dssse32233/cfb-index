# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Peden Stadium's hill. Tucked into the Appalachian foothills of southeast Ohio, the Bobcats' stadium has a grass berm where students sprawl on game days — one of the most charming, distinctly small-college settings in the FBS, in a college town as picturesque as any in the sport."
  the_origin: "The oldest university in Ohio, in the Appalachian river town of Athens, with a football program that became the MAC's model of quiet durability — never the league's biggest brand, always one of its hardest outs."
  golden_ages:
    - { era: "2005–2020 (Frank Solich)", what: "The Nebraska-bred coach's long run of bowl trips and MAC Championship Game appearances that made Ohio a fixture" }
    - { era: "2021–2025 (Albin to the bowl streak)", what: "The 2024 MAC title — the first since 1968 — and a seven-game bowl winning streak" }
  legends:
    - { name: Frank Solich, role: coach, why: "Former Nebraska head coach who spent 16 years making Ohio a permanent MAC contender — the program's defining modern figure" }
    - { name: Tim Albin, role: coach, why: "Solich's longtime lieutenant who won the 2024 MAC title, the program's first in 56 years, before leaving for Charlotte" }
  canonical_moments:
    - { name: "2024 MAC Championship", year: 2024, what: "Ohio routed Miami (OH) 38-3 — the largest margin in MAC title-game history and the program's first conference crown since 1968", handling: glory }
    - { name: "2025 Frisco Bowl win", year: 2025, what: "Beat 10-win UNLV 17-10 under interim coach John Hauser for a seventh straight bowl victory", handling: glory }
  the_place: "Peden Stadium in Athens — the grass hill, the foothills backdrop, and one of the most genuinely scenic game-day settings in college football."
  brand_of_football: "Southeast-Ohio tough — a physical, well-coached, low-drama MAC program built on continuity of culture even when the head coach keeps changing."
  cultural_footprint: "The MAC's quiet standard-bearer — proof that a small Appalachian school can run one of the most consistent mid-major programs in the country and a bowl streak the blue bloods would envy."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Ohio finished 2025 at 9-4 (6-2 MAC), narrowly missing the title game on
    tiebreakers, then beat UNLV 17-10 in the Frisco Bowl for its seventh straight bowl win. The season was defined
    by upheaval off the field: head coach Brian Smith — himself a 2024 promotion after Tim Albin won the MAC title
    and left for Charlotte — was fired for cause in December amid a misconduct investigation. Defensive coordinator
    John Hauser, the program's third head coach in three seasons, won the bowl as interim and was promoted to the
    permanent job, inheriting a program that keeps winning through its own revolving door.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
