status: live            # todo | drafted | authored | reviewed | live
slug: washington
team_id: 365
program_name: Washington
program_tier: 2

emotional_core:
  primary: restoration    # rebuilding contender altitude after the coach and roster that built it left at once
  secondary: house-money  # the 2023 title-game run as proof, even if the team that did it is gone
  core_variant: regime-reset
  one_line: "Washington played for the national championship one January and then watched the coach, the Heisman quarterback, and half the roster walk out the door — and the program's whole identity now is the bet that the altitude it reached in 2023 was a choice it can make again, not lightning it caught once."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A 2023 run to the national-title game and back-to-back Don James-era dominance vs a program that lost its coaching staff, its quarterback, and its conference all in one off-season and has to prove the peak wasn't a one-time event."

the_wound:
  name: "Losing the 2023 team all at once"
  detail: "Months after playing for the title, Kalen DeBoer left for Alabama, Michael Penix Jr. went to the NFL, and the roster scattered into a new conference. Jedd Fisch inherited a near-total rebuild and went 6-7 in the 2024 Big Ten debut before steadying to 9-4 in 2025 with a LA Bowl win over Boise State — progress, but still short of the 2023 ceiling."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Get back to the championship stage and finish it this time — prove the 2023 run was the start of a contender, not the high-water mark of one."
  drought: { since: 1991, unit: national_title }

the_chip:
  villain: national_media
  text: "Fans heard their 2023 run reframed the moment DeBoer left — that the season was a fluke of one coach and one quarterback, that the West Coast program would shrink back to the middle. They believe Husky Stadium on the water and the program's history say otherwise, and they're tired of having to re-prove it."

the_delusion:
  tone: earnest
  text: "The fanbase believes contender altitude is a decision the program can keep making — that the talent, the waterfront fortress, and Demond Williams Jr.'s arm mean 2023 was a blueprint, and that the Big Ten move is an upgrade rather than the end of the run."

the_grudge_texture:
  rival: oregon
  texture: blood-feud   # the Pacific Northwest's defining rivalry, carried into the Big Ten together

the_coach_relationship: savior   # Jedd Fisch hired to rebuild from the DeBoer exit; the 9-4 2025 turn bought belief
the_internal_fracture: foundation vs artifact — the faction that says 2023 is a floor Fisch is rebuilding toward vs the faction that fears it was a singular season the program can't recreate
register: edge-case-contender — confident about the peaks, honest about the drift-years, aware the altitude has always outrun the geography
never_use:   # DRAFT from profile — LAW, do not violate in any authored line
  - Pacific Northwest as a geographic diminishment
  - small-program framing
  - Go Dawgs as equivalent to Georgia's (it's the Huskies here too)
  - Michael Penix Jr. as a retrospective artifact (he is present in program memory)
  - Cinderella
  - scrappy (at this tier)
  - reductive framings of the DeBoer exit (he left for Alabama; that is the fact)

# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Husky Stadium sits on the shore of Lake Washington — the only major venue in the country fans can sail to. They tie up their boats at 'The Dock,' tailgate on the water, and walk in through the waterfront entrance, the Cascades and Lake Washington framing one of the most beautiful settings in the sport."
  the_origin: "The University of Washington has played football since 1889, but its identity was forged by Don James from 1975-1992 — 'The Dawgfather' — whose disciplined, defense-driven program won a share of the 1991 national title and made the Huskies a West Coast power."
  golden_ages:
    - { era: "1975–1992 (Don James)", what: "Sustained dominance capped by the 1991 co-national championship and a 12-0 season" }
    - { era: "2023 (Kalen DeBoer)", what: "A run to the national-title game behind Heisman finalist Michael Penix Jr." }
  legends:
    - { name: Don James, role: coach, why: "The Dawgfather; built the program's standard and the 1991 champion" }
    - { name: Michael Penix Jr., role: player, why: "The quarterback of the 2023 title-game run — present in program memory, not a closed chapter" }
    - { name: Steve Emtman, role: player, why: "The dominant defensive lineman at the heart of the 1991 national champions" }
  canonical_moments:
    - { name: "1991 national championship", year: 1992, what: "An undefeated, defense-led co-national title — the Don James peak", handling: glory }
    - { name: "2023 title-game run", year: 2024, what: "Washington reaches the national-championship game before falling to Michigan", handling: heartbreak }
    - { name: "The 2024 exodus", year: 2024, what: "DeBoer to Alabama, Penix to the NFL, the roster scattered into the Big Ten", handling: wound }
  the_place: "Husky Stadium (cap 70,083) — the waterfront venue on Lake Washington, fans arriving by boat to 'The Dock,' 'Tequila' after every touchdown, and 'Bow Down to Washington' to close it out."
  brand_of_football: "Edge-case-contender — a program that pairs Don James's defense-and-discipline heritage with the modern aerial peaks of the DeBoer-Penix era; built to outperform its zip code."
  cultural_footprint: "The Pacific Northwest's standard-bearer and its argument that national altitude is a choice, not a geography — the sailgate and the waterfront stadium among the most distinctive scenes in the sport."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: After the 2023 national-title-game run, Kalen DeBoer left for Alabama and
    Michael Penix Jr. departed for the NFL, leaving Jedd Fisch a rebuild and a new Big Ten home. Fisch went 6-7 in
    the 2024 debut, then steadied to 9-4 in 2025 — quarterback Demond Williams Jr. powering a top-20 scoring offense —
    capped by a LA Bowl win over Boise State. The question entering 2026 is whether Fisch can rebuild the program
    back to its 2023 altitude inside a brutal Big Ten road schedule.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
  sources:
    - https://en.wikipedia.org/wiki/2025_Washington_Huskies_football_team
    - https://gohuskies.com/staff-directory/jedd-fisch/6098
    - https://en.wikipedia.org/wiki/2024_Washington_Huskies_football_team

