story_canon:
  the_unique_thing: "The startup story — Campbell didn't play football until 2008 and climbed from non-scholarship Pioneer League through the Big South to the CAA in just 15 years, the fastest reclassification arc in modern FCS. Every win is genuinely new territory."
  the_origin: "Campbell University started football in 2008 under Dale Steele as a non-scholarship Pioneer League program. The Camels went 14-41 in five founding seasons, then reclassified to the scholarship Big South in 2018 and won back-to-back conference titles that same year."
  golden_ages:
    - { era: "2018-2019 (Big South breakout)", what: "Back-to-back Big South championships in the program's first two scholarship seasons; Caleb Snead 2018 Consensus All-American" }
    - { era: "2020 (NFL breakthrough)", what: "Julian Hill becomes first Campbell player to make an NFL roster (Miami Dolphins); Brevin Allen becomes first to play in an NFL game (LA Chargers)" }
  legends:
    - { name: Dale Steele, role: coach, why: "Founded the program in 2008 and posted 14-41 as the builder of the foundation" }
    - { name: Mike Minter, role: coach, why: "Led Big South reclassification and back-to-back conference titles; 49 wins over 11 seasons" }
    - { name: Caleb Snead, role: player, why: "2018 Consensus All-American wide receiver — highest individual honor in program history" }
    - { name: Julian Hill, role: player, why: "First Campbell player on an NFL roster (Miami Dolphins, 2020)" }
  canonical_moments:
    - { name: "Program founded", year: 2008, what: "Campbell fields its first football team in the non-scholarship Pioneer League", handling: glory }
    - { name: "2018 Big South Championship", year: 2018, what: "First conference title in the program's first scholarship season; Caleb Snead All-American", handling: glory }
    - { name: "2019 Big South Championship", year: 2019, what: "Back-to-back conference crowns in only the program's second scholarship season", handling: glory }
    - { name: "2020 NFL breakthrough", year: 2020, what: "Julian Hill becomes the first Campbell player to make an NFL roster", handling: glory }
  the_place: "Barker-Lane Stadium in Buies Creek, North Carolina (6,200 capacity) — the stadium that watched a program grow from scratch to conference champion."
  brand_of_football: "The aggressive climb — a program that chose the leap over incremental growth, betting that reclassifying fast was the only way to matter."
  cultural_footprint: "The proof-of-concept that a rural North Carolina school with no football history can build an FCS program in one generation — every milestone is the first of its kind."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Campbell went 2-10 (2-6 CAA) in 2025 under first-year head coach
    Braxton Harris, the program's second straight losing season after Mike Minter was let go following the
    3-9 2024 campaign. Harris, who previously led Houston Christian, inherits a roster still finding its footing
    in the CAA's competitive landscape. The question in Buies Creek is whether the infrastructure from the
    Big South era — the recruiting footprint, the stadium, the scholarship depth — is enough to eventually
    compete in the CAA, or whether the gap between a 17-year-old program and century-old peers is simply
    too wide to close on this timeline.
