  one_line: "Campbell is the Fighting Camels who built a football program from scratch in 2008 and climbed from non-scholarship Pioneer League to CAA in 17 years — every winning season feels like found money."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A 17-year-old program that went from zero to CAA in one generation vs peers who have been playing since the 1890s — the Camels are still writing the first lines of their story."

the_wound:
  name: "The 2025 reset under Braxton Harris"
  detail: "Campbell went 2-10 (2-6 CAA) in 2025 — the program's second straight losing season and the first full year under new head coach Braxton Harris after Mike Minter was fired following an 11-season tenure. For a program still proving it belongs in the CAA, back-to-back 2-win seasons test the faith that the aggressive reclassification was the right call."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win seven games, make the FCS playoffs, and prove the 2023 CAA jump was earned — the Camels want one moment that puts Buies Creek on the FCS map."
  drought: { since: 2019, unit: conference_title }

the_chip:
  villain: blue_bloods
  text: "The fanbase says Campbell started with nothing in 2008 while every other CAA program had 50 to 100 years of history — the Camels believe the climb itself proves they belong, even when the scoreboard disagrees."

the_delusion:
  tone: self-aware
  text: "Fans believe that a program only 17 years old can jump from Pioneer League to CAA and compete within a decade — that the Caleb Snead All-American and the back-to-back Big South titles mean the foundation is real, not borrowed time."

