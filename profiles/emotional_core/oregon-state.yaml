# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Oregon State refused to disappear. When the Pac-12 emptied out, the Beavers and Washington State were the only two schools left — and instead of folding, they sued, kept the conference's name and assets, and started rebuilding a league from scratch. No program in modern college football has had to survive its own conference dying around it."
  the_origin: "A land-grant school in Corvallis, Oregon, long the smaller sibling in a state dominated by its Eugene rival — a program defined for decades by 'the Civil War' and by stretches of losing, until a turn-of-the-century resurgence put it briefly among the nation's best."
  golden_ages:
    - { era: "1999–2001 (Dennis Erickson)", what: "An 11-1 season in 2000 capped by a 41-9 Fiesta Bowl rout of Notre Dame and a No. 4 final ranking" }
    - { era: "2021–2022 (Jonathan Smith)", what: "A return to 10 wins in 2022 and bowl relevance before realignment hit" }
  legends:
    - { name: Dennis Erickson, role: coach, why: "Engineered the 2000 Fiesta Bowl season — the program's modern high-water mark" }
    - { name: Chad Johnson, role: player, why: "The future NFL star receiver of the Fiesta Bowl team — Oregon State's most famous football alum" }
    - { name: Jonathan Smith, role: coach, why: "Alum who rebuilt the Beavers to 10 wins before leaving for Michigan State as realignment loomed" }
  canonical_moments:
    - { name: "2000 Fiesta Bowl rout of Notre Dame", year: 2001, what: "Oregon State 41, Notre Dame 9 — the 11-1 season's exclamation point and the program's modern peak", handling: glory }
    - { name: "The Pac-12 holdout", year: 2024, what: "Left with only Washington State, Oregon State sued, kept the conference, and refused to fold", handling: glory }
    - { name: "The 2025 collapse", year: 2025, what: "A 2-10 season and an 0-7 start that cost Trent Bray his job — the football price of survival", handling: wound }
  the_place: "Reser Stadium in Corvallis — a rebuilt west grandstand and a fanbase that filled it through the holdout years, when showing up was itself the statement."
  brand_of_football: "Corvallis-tough — a blue-collar, run-first, defense-minded identity built on out-working programs with more resources, now stretched thin by a roster that has to be rebuilt twice over."
  cultural_footprint: "The realignment era's defining survivor story — proof that a program can be abandoned by its conference and still refuse to vanish, a rallying point for every school that fears being left behind."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Oregon State went 2-10 (1-1) in 2025 after an 0-7 start; head coach Trent
    Bray was fired seven games in, with Robb Akey finishing as interim. On December 3, the Beavers hired Alabama
    co-offensive coordinator JaMarcus Shephard as head coach — his first head job. Off the field, Oregon State and
    Washington State are rebuilding the Pac-12 with new members slated to join, meaning Shephard inherits two
    rebuilds at once: a 2-10 roster and a conference that doesn't fully exist yet.
