emotional_core:
  primary: deprival       # the conference left without them — a P5 program stranded by realignment
  secondary: grievance    # everybody else got a life raft; Corvallis got told to fend for itself
  one_line: "Oregon State is the program the Pac-12 left behind — ten schools sprinted for the exits and the Beavers were handed the keys to the wreckage, then went 2-10 trying to rebuild a league from two."

self_image:
  archetype: orphaned
  standard_gap_frame: "A 2000 Fiesta Bowl team and the 2024 holdout that refused to fold vs a 2025 collapse and the long climb back to a conference that doesn't fully exist yet."

the_wound:
  name: "Left behind in the Pac-12 collapse"
  detail: "When ten Pac-12 schools announced departures for 2024, only Oregon State and Washington State were left holding a 108-year-old conference with no other members. The Beavers won the legal fight to keep the brand, then spent 2025 paying the football cost: a 2-10 season, a 0-7 start, and Trent Bray fired seven games in."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Rebuild the league and the team at once — restock a rebuilt Pac-12, win it, and prove a program nobody wanted is still a program."
  drought: { since: 2008, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Oregon walked into the Big Ten and left the Civil War behind without a backward glance. The fanbase in Corvallis hasn't forgotten which neighbor abandoned the rivalry — or that the Beavers stayed when staying was the hard thing."

the_delusion:
  tone: load-bearing
  text: "Beaver Believers say the program that refused to die in 2023 can't be killed by anyone — that surviving the conference's collapse was the hard part, and the wins are just a matter of time now that the worst is behind them."

the_grudge_texture:
  rival: oregon
  texture: killed-by-realignment   # the Civil War, severed when Oregon left for the Big Ten

the_coach_relationship: savior   # JaMarcus Shephard inherits the rebuild after Bray's firing
the_internal_fracture: stay-the-course patience with the rebuilt-Pac-12 plan vs the fear that orphan status is permanent — that a two-team conference and a 2-10 roster can't recruit its way back to relevance
