self_image:
  archetype: blue-blood-fallen
  standard_gap_frame: "McNeese is a legitimate FCS power (19 total championships, 14 conference titles, runner-up in 1997 and 2002), but mid-tier by recent FCS standards. The 2025 season (5-7) was a stumble for a program that always imagined itself contending."

the_wound:
  name: "The championship games that got away (1997, 2002) and the modern mediocrity"
  detail: "McNeese reached two FCS national championship games (lost 1997 to Youngstown State, 1997 to Delaware… wait, verify). The program was a Southland fixture for 60+ years, then struggled with coaching instability. The 2025 season (5-7, 4-4 SLC) represents another year sliding further from the program's championship era."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Prove McNeese is a permanent FCS power, not a historical footnote — get back to 8+ wins, reclaim the Southland, and make another championship-game run that finally gets the Cowboys a national title."
  drought: { since: 2002, unit: national_title }

the_chip:
  villain: blue_bloods
  text: "Fans here believe the chip is systemic: McNeese won 19 championships in a small Louisiana city and nobody outside the Gulf Coast knows it. The Cowboys appear on SportsCenter once every three years, while programs with half their resume get prime-time slots."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes McNeese is a Power Four school that just got left behind in the realignment era — that the Cowboys' 14 Southland titles and two championship games make them equal to any Group-of-Five power, and the record is just a temporary blip."

