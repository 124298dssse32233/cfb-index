emotional_core:
  primary: disbelief      # ranked for the first time since 1959 — 12 wins out of nowhere, then the coach left
  secondary: restoration  # 'Mean Green' canon finally cashing a check after decades in the wilderness
  one_line: "North Texas is the program named for Joe Greene's 'Mean Green' that broke a 66-year ranking drought in 2025 — 12 wins, a poll appearance, and then the coach who built it gone to Oklahoma State before the celebration ended."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A historic 12-2 season and a national ranking against decades as a forgotten G5 program that won its last conference titles two decades ago and never made a poll across the entire careers of its fans."

the_wound:
  name: "Built it, then watched it leave"
  detail: "Eric Morris took the Mean Green from afterthought to 12-2, a No. 24 ranking, and an American title-game berth — then left for Oklahoma State after the regular season, taking Burlsworth-winning QB Drew Mestemaker with him to Stillwater. Denton's best season ever ended with the architects walking out the door."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Prove 2025 wasn't a fluke — win the American outright, stay ranked, and finally turn the 'Mean Green' name into a program that keeps its coaches instead of losing them the moment it gets good."
  drought: { since: 2004, unit: conference_title }

the_chip:
  villain: blue_bloods
  text: "Fans note that the moment North Texas finally got good — the first ranking since 1959, 12 wins, a Burlsworth Trophy quarterback — a power-conference school simply reached down and took the coach and the QB, the way the big programs always do."

the_delusion:
  tone: earnest
  text: "The fanbase believes the Mean Green have arrived for real — that Denton, in the heart of recruit-rich North Texas, can be a permanent G5 power, and that 2025 was the proof the program's potential was never the problem, only the patience."

