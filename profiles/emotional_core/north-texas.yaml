# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The 'Mean Green' — the only program whose nickname became NFL legend. North Texas's 1960s defense earned the name, and when alum Joe Greene reached Pittsburgh, fans turned it into 'Mean Joe Greene,' immortalizing a college team's identity through one of pro football's greatest players."
  the_origin: "A large public university in Denton, in the recruit-rich heart of the Dallas-Fort Worth Metroplex, playing football since 1913 — a program forever rich in nearby talent and poor in national recognition."
  golden_ages:
    - { era: "2001–2004 (Darrell Dickey)", what: "Four consecutive Sun Belt championships and four straight New Orleans Bowls — only the 11th program ever to win four leagues in a row" }
    - { era: "2025 (Eric Morris)", what: "A 12-2 season, the first AP ranking since 1959, and an American Conference title-game berth — the best year in program history" }
  legends:
    - { name: Joe Greene, role: player, why: "The defensive tackle whose Denton roots gave 'Mean Green' to the NFL; a Steelers and Pro Football Hall of Fame icon" }
    - { name: Darrell Dickey, role: coach, why: "Won four straight Sun Belt titles (2001-04), the program's only sustained championship run" }
    - { name: Drew Mestemaker, role: player, why: "The 2025 Burlsworth Trophy winner and American Offensive Player of the Year who led the FBS in passing during the breakthrough season" }
  canonical_moments:
    - { name: "Four straight Sun Belt titles", year: 2004, what: "North Texas caps four consecutive conference championships under Darrell Dickey, a rare college feat", handling: glory }
    - { name: "Ranked for the first time since 1959", year: 2025, what: "The Mean Green crack the AP poll, ending the longest active ranking drought of any FBS program", handling: glory }
    - { name: "Morris leaves for Oklahoma State", year: 2025, what: "After the best regular season ever, head coach Eric Morris departs for a power-conference job, QB Drew Mestemaker following him", handling: heartbreak }
  the_place: "DATCU Stadium (opened 2011 as Apogee Stadium) in Denton — the program's first dedicated on-campus home after six decades at Fouts Field, a wind-turbine-powered venue in the Metroplex."
  brand_of_football: "High-octane Air Raid passing under Eric Morris — a wide-open, points-in-bunches identity that took a talent-rich but overlooked program to its first ranking in two generations."
  cultural_footprint: "The program that gave 'Mean Green' to American sports vocabulary, sitting on a goldmine of DFW talent — and, in 2025, finally cashing the potential everyone always said it had."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: North Texas went 12-2 in 2025 (7-1 American), earned its first AP ranking
    since 1959, reached the American title game (a 34-21 loss to Tulane), and won the New Mexico Bowl 49-47 over
    San Diego State. Then head coach Eric Morris left for Oklahoma State and Burlsworth-winning QB Drew Mestemaker
    followed him to Stillwater — leaving Denton to hire a new staff and prove the program's best-ever season
    was a foundation, not a one-year flash.
