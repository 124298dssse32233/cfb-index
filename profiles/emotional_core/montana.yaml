story_canon:
  the_unique_thing: "The Brawl of the Wild — the fourth-oldest rivalry in FCS history (first played 1897, 129 years ago), a trophy named after the Great Divide (the continental watershed between east and west), and the singular defining game in college football's most beautiful state. Montana-MSU is not a conference game; it's a state identity battle."
  the_origin: "The University of Montana in Missoula built a football program in 1897 by playing neighbor Montana State. The Grizzlies climbed to national prominence in the 1990s under Jerry Hauck, winning FCS national championships in 1995 and 2001."
