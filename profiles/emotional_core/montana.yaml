  one_line: "Montana is the Big Sky blue-blood that won two FCS national championships and went 25 years without losing more than one conference game in a row — and now watches Montana State hoist the 2025 trophy, a humiliation that defines this moment."

self_image:
  archetype: blue-blood-fallen
  standard_gap_frame: "A program that owned the FCS for two decades (1995, 2001 national titles + 12 consecutive Big Sky championships 1997–2008) now faces a rival who has supplanted it, a fall from dominance that stings like no other."

the_wound:
  name: "Montana State's 2025 championship and 41-year exile from glory"
  detail: "Montana last won the FCS national championship in 2001 (13–6 vs Furman). In 2025, Montana State — the rival, the neighbor, the little brother — won the FCS title (35–34 OT vs Illinois State). Montana went 13–2 but lost the playoff semifinal to the Bobcats 48–23. The pain is not the loss to a rival — it's the loss to a rival who is now the national champion, breaking a 41-year trophy drought while Montana watches."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Reclaim the Brawl of the Wild, return to the FCS Finals, prove that Montana — not Montana State — is the Treasure State's true program."
  drought: { since: 2001, unit: national_title }

the_chip:
  villain: big_brother
  text: "Fans here believe montana State is not the chip — they're the mirror. The real chip is the national media that wrote Montana off as yesterday's power and elevated the Bobcats. Montana carries the resentment of a program that built an empire and lost custody of it."

the_delusion:
  tone: self-aware
  text: "The fanbase believes Bobby Kennedy's first year as head coach (2026) can recalibrate the program, that losing Jerry Hauck (who retired Feb 2026) creates a reset moment, and that the Grizzlies can storm back to the Finals. Fans know the Bobcats are defending champs, and believe the Grizzlies are better anyway."

