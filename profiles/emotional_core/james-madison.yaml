  the_origin: "A big public university in Harrisonburg, Virginia that became an FCS dynasty — national titles in 2004, 2016 and 2019 — then accepted the FBS invitation in 2022 and immediately dominated the Sun Belt, the next chapter in the App State–style mid-major ascent."
  golden_ages:
    - { era: "2004 & 2016–2019", what: "Three FCS national championships and a run of dominance under multiple coaches" }
