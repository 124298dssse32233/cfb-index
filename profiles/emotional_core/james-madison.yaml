  legends:
    - { name: Curt Cignetti, role: coach, why: "Drove the FCS-to-FBS transition and the early dominance before taking the formula to Indiana" }
    - { name: Bob Chesney, role: coach, why: "Took JMU to a Sun Belt title and the Playoff in 2025 before leaving for UCLA" }
    - { name: Mickey Matthews, role: coach, why: "Won the 2004 FCS national title — the program's first championship era" }
  canonical_moments:
