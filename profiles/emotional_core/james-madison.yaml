emotional_core:
  primary: disbelief      # four years up from FCS and already in the College Football Playoff — is this real?
  secondary: grievance    # the snubs that came before the breakthrough still sting
  one_line: "James Madison is the program that climbed out of the FCS in 2022 and was in the College Football Playoff by 2025 — a rise so fast that Harrisonburg still says it out loud just to believe it."

self_image:
  archetype: riser-proving
  standard_gap_frame: "Three FCS national titles and an instant FBS power vs a sport that kept it out of bowls for years on transition rules and only grudgingly let it into the room — now an actual Playoff team."

the_wound:
  name: "The bowl bans during the FBS climb"
  detail: "JMU went 19-4 in its first two FBS seasons and was barred from bowl games both years by transition rules — kept out of the postseason despite outplaying the teams that got in. By the time the gate finally opened, the program had a grievance ready-made."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win a Playoff game and turn the fastest FBS rise in the sport into something permanent — make a mid-major from the Shenandoah Valley a fixture in the national bracket, not a one-time crasher."
  drought: { since: 2019, unit: national_title }

the_chip:
  villain: committee
  text: "The grievance is the rulebook: the same sport that kept JMU out of bowls on transition technicalities, then made the Dukes climb into the Playoff anyway. Fans remember exactly who told them to wait their turn — and they took the turn themselves."

the_delusion:
  tone: earnest
  text: "The fanbase believes the Cignetti formula outlived Cignetti — that the way JMU builds, develops and out-prepares means the rise is structural, not luck, and a new coach won't slow it. They watched it survive one departure already, and they're betting it survives the next."

the_grudge_texture:
  rival: old-dominion
  texture: border-war   # the Virginia rivalry, the in-state game JMU most wants to own at the FBS level

the_coach_relationship: hot-seat-churn   # Cignetti to Indiana, then Chesney to UCLA — JMU keeps winning and keeps watching coaches cash in
the_internal_fracture: trust-the-machine vs fear-the-brain-drain — the faction that believes the program is bigger than any one coach vs the faction tired of being a launchpad for whoever wins big in Harrisonburg
register: harrisonburg-dukes-fcs-titles-fbs-ascent   # purple-clad, brash, chip-on-shoulder Valley pride that just learned it belongs
