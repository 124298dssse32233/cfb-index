  brand_of_football: "Built-not-bought — fast, disciplined, develop-and-out-prepare football, the mid-major machine that keeps winning no matter which coach is running it."
  cultural_footprint: "The new template for mid-major ambition — proof that an FCS dynasty can become a Playoff team in four years, and a Virginia program that refuses to accept a Group-of-Five ceiling."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: James Madison went 12-2 (8-0 Sun Belt) in 2025, won the Sun Belt title
    31-14 over Troy, finished No. 19 in the polls, and made the program's first College Football Playoff, falling
    51-34 to Oregon in the first round. Head coach Bob Chesney then left for UCLA, and JMU hired former Florida and
    Louisiana coach Billy Napier to replace him. The 2026 question in Harrisonburg: is the rise the program's, or
    does it leave with every coach who wins here?
