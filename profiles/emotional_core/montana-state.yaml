  text: "Fans here believe montana State has spent four decades proving that a small-school Bobcat football program can beat anyone on a neutral field. The chip is that the world expected the national championship to belong to Montana, not Bozeman."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes the 2025 national championship is not a miracle — it's proof that the Bobcats built a program that was always championship-caliber, just waiting for the moment. The fanbase believes more titles are coming; the 2025 team was the beginning, not a fluke."

