never_use:
  - Montana State never won an FCS championship before 2025 — the 1984 title is real (defeated LSU 19–17 in the I-AA Finals)
  - The Bobcats are in their first year of contention — they made multiple Big Sky championships and playoffs (2017–2020)
  - Brent Vigen is a new coach — he was in his 6th season in 2025 (61–12 record), making the 2025 championship a team-builder's capstone
  - The 2025 championship is a one-year upset — the Bobcats went 8–0 Big Sky (undefeated conference) before the national tournament

story_canon:
  the_unique_thing: "The 2025 FCS National Championship — Montana State defeated Illinois State 35–34 in overtime on January 4, 2026, in the Severe Weather Overtime thriller that broke a 41-year championship drought. QB Justin Lamson won the Consensus All-America honors and FCS Championship Game MVP. The Bobcats went 14–2 (8–0 Big Sky) and proved a small-school program from Bozeman could dominate the national stage."
  the_origin: "Montana State in Bozeman was established as a land-grant university and played football since the 1890s. The program's first national championship was 1984 (defeating LSU), followed by 41 years of being a consistent Big Sky competitor but never returning to the Finals."
