  name: "41 years without a national title (1984–2025)"
  detail: "Montana State's last national championship was 1984 (over LSU 19–17 in the I-AA Finals). For 41 years, the Bobcats watched Montana hoist the Brawl trophy and the FCS trophy. The wound was not one of failure — it was of waiting, of being good enough to matter but not good enough to win it all, of watching a rival own the narrative. That wound is now healed."
