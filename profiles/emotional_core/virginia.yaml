emotional_core:
  primary: disbelief       # 122 years and the program had never won 11 games — then it did, the season nobody saw coming
  secondary: restoration   # Tony Elliott climbing from near-fired to the best season in school history
  one_line: "Virginia is the program that waited 122 years for its first 11-win season — then beat an SEC team in the Gator Bowl to seal it, the year a coach on the brink became the best in school history."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A century-plus with a single ACC title (1989-95 George Welsh) and zero 11-win seasons vs a 2025 that went 11-3, finished ranked, and rewrote the program record book in one autumn."

the_wound:
  name: "The grief the program carries"
  detail: "Virginia football's hardest year was 2022, when three players were killed in an on-campus shooting and the season was cut short — a loss that reshaped what the program means to Charlottesville and made the 2025 breakthrough feel like something earned, not just won."
  handling: never-a-punchline
  freshness: this-era

the_dream:
  text: "Turn the best season in school history into the first sustained run the program has ever had — an ACC title and a permanent seat at the conference's top table, not a one-year visit."
  drought: { since: 1995, unit: conference_title }

the_chip:
  villain: national_media
  text: "Cavalier fans spent years hearing their program treated as an afterthought at the bottom of the ACC. They say 2025 — eleven wins, a bowl scalp of an SEC team — was the answer to everyone who assumed Virginia football would never amount to anything."

the_delusion:
  tone: earnest
  text: "Hoo fans believe Charlottesville can be a real football town — that a school this selective, in a state this rich with talent, was always one right staff away from winning big, and that Tony Elliott just proved it can stay."

the_grudge_texture:
  rival: virginia-tech
  texture: border-war   # the Commonwealth Cup — the in-state battle for Virginia, the rivalry that defines the program locally

the_coach_relationship: forever-ours   # Tony Elliott went from hot seat to the best season in school history; the fanbase is all-in
the_internal_fracture: believers vs the burned — the faction that thinks Elliott built something real vs the faction that's seen Virginia tease relevance before and won't trust an 11-win year until it happens twice
