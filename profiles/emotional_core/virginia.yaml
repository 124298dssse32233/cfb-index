# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Virginia waited 122 years — its entire football history — for an 11-win season, and got it in 2025, beating a ranked SEC opponent in the Gator Bowl to do it. No program in the sport made its fans wait longer for that number."
  the_origin: "The University of Virginia, founded by Thomas Jefferson in 1819, fielded football from the 1880s as a Jeffersonian academical-village school in Charlottesville — tradition-bound, patient, and slow to ever be a football town."
  golden_ages:
    - { era: "1989–1995 (George Welsh)", what: "Virginia's most competitive stretch — a share of the 1989 ACC title and the program's only sustained run at the top of the league" }
    - { era: "2025 (Tony Elliott)", what: "The first 11-win season in school history, a final ranking, and the first bowl win over an SEC opponent" }
  legends:
    - { name: George Welsh, role: coach, why: "The winningest coach in program history; made Virginia an ACC contender for the first time" }
    - { name: Tony Elliott, role: coach, why: "Took a program off the hot seat to the greatest season it has ever had" }
    - { name: Chandler Morris, role: player, why: "The transfer quarterback and Gator Bowl MVP who quarterbacked the record-breaking 2025 team" }
  canonical_moments:
    - { name: "The first 11-win season", year: 2025, what: "Virginia goes 11-3, the most wins in the program's 122-year history", handling: glory }
    - { name: "Gator Bowl win over Missouri", year: 2025, what: "A 13-7 victory over No. 25 Missouri — the program's first bowl win over an SEC team — that sealed the record season", handling: glory }
    - { name: "The 2022 tragedy", year: 2022, what: "Three football players are killed in an on-campus shooting and the season is cut short — the program's defining grief", handling: heartbreak }
  the_place: "Scott Stadium in Charlottesville, where the Good Old Song is sung arm-in-arm after scores and 'Wahoowa' carries — an academical-village setting that took 122 years to feel like a real football home."
  brand_of_football: "Wahoowa — a portal-built, scheme-driven program that finally married Virginia's recruiting access to a staff that could win in the ACC; identity through resilience as much as style."
  cultural_footprint: "A program bound to Jeffersonian tradition and, since 2022, to a grief that reframed what the team means to Charlottesville — and a 2025 breakthrough that gave the city something joyful to hold."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Tony Elliott returns for 2026 after the best season in school history —
    11-3 (7-2 ACC), a final ranking, and a 13-7 Gator Bowl win over No. 25 Missouri, the program's first 11-win
    year and first bowl win over an SEC team. Quarterback Chandler Morris (Gator Bowl MVP) was denied a seventh
    year of eligibility by the NCAA and is gone; Virginia brought in Beau Pribula (Missouri) and Eli Holstein
    (Pittsburgh) to compete for the job. The question in Charlottesville is whether the breakthrough was a year
    or the start of an era.
