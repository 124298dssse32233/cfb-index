# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The Hog Call — 'Woo Pig Sooie,' the most distinctive sound in the sport — bonding a fanbase with no in-state Power rival and a diaspora scattered across the country; Arkansas is the rare program that is an entire state's team, and the Call is the thing that gathers it."
  the_origin: "The University of Arkansas, the state's only major program, raised to national power by Frank Broyles, whose 1964 team went 11-0 and won the program's lone national championship."
  golden_ages:
    - { era: "1958–1976 (Frank Broyles)", what: "144 wins, seven Southwest Conference titles, and the 1964 national championship" }
    - { era: "2006–2011 (Houston Nutt / Bobby Petrino)", what: "Darren McFadden's Heisman runner-up years and Petrino's 2011 11-2 Cotton Bowl team" }
  legends:
    - { name: Frank Broyles, role: coach, why: "The 1964 national title, the program's defining figure, later its legendary athletic director" }
    - { name: Darren McFadden, role: player, why: "Two-time Heisman runner-up, the most electric back in school history" }
    - { name: Lou Holtz, role: coach, why: "Took over in 1977 and led the Hogs to an Orange Bowl rout of Oklahoma in his first season" }
  canonical_moments:
    - { name: "The 1964 national championship", year: 1964, what: "Broyles' 11-0 team wins the program's only national title", handling: glory }
    - { name: "The Miracle on Markham", year: 2002, what: "Matt Jones to DeCori Birmingham in the final seconds beats LSU — the signature modern Razorback play", handling: glory }
    - { name: "The 2012 Petrino exit", year: 2012, what: "A motorcycle crash and scandal end the Petrino era just as the program had climbed to top-5 expectations — the great what-if wound", handling: heartbreak }
  the_place: "Donald W. Reynolds Razorback Stadium in Fayetteville (and a long tradition of games in Little Rock) — the Hogs running out behind the Razorback, 70,000 calling the Hogs in unison across the Ozarks."
  brand_of_football: "SEC physicality with a passing-game streak — from Broyles' option roots to the McFadden-era power run game to Petrino's vertical attack; at its best, downhill and bruising."
  cultural_footprint: "The state of Arkansas's singular sporting identity — no pro team, no in-state Power rival, one program everyone rallies behind; the Hog Call as a cultural artifact that follows alumni nationwide."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Arkansas went 2-10 in 2025 and fired Sam Pittman after a 56-13 home
    loss to Notre Dame; interim coach Bobby Petrino went winless the rest of the way amid a seven-game losing
    streak. On November 30, 2025 the program hired Ryan Silverfield, who won 50 games in six years at Memphis,
    as its 35th head coach. He enters 2026 rebuilding a roster and a fanbase still chasing the first real SEC
    breakthrough — and now sharing a conference again with old Southwest rival Texas.
