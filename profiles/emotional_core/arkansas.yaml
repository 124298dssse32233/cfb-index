program_name: Arkansas
program_tier: 3

emotional_core:
  primary: deprival       # an entire state's program, a single 1964 title, and decades of being the SEC's odd man out
  secondary: grievance    # the only Power program with no in-state rival, perpetually fighting to matter in a loaded league
  one_line: "Arkansas is an entire state's only major program — no in-state rival, a fanbase scattered nationwide that all answers the same Hog Call — chasing the first real glory since a national title sixty years gone, now under a brand-new coach."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "A 1964 national championship and a proud Southwest Conference past against a thirty-year SEC stretch of brief peaks and long stretches of finishing in the league's middle or worse."

the_wound:
  name: "The 2-10 collapse and Pittman's firing"
  detail: "In 2025 the Razorbacks went 2-10, fired the beloved Sam Pittman after a 56-13 home loss to Notre Dame, lost out the rest of the way under interim Bobby Petrino, and turned the program over to Ryan Silverfield — the latest reset in a search for an SEC ceiling that keeps slipping away."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Break through in the SEC at last — a division-caliber season, a New Year's Six bowl, the first conference-level glory since the league swallowed the program whole."
  drought: { since: 1964, unit: national_title }

the_chip:
  villain: big_brother
  text: "Hog fans say the bluebloods of the SEC have spent thirty years treating Arkansas as a guaranteed win on the schedule — the league's outsider with no neighbor to lean on — and they call the Hogs every week, daring anyone to keep overlooking the whole state's team."

the_delusion:
  tone: earnest
  text: "The fanbase believes the right coach turns Arkansas into a perennial SEC contender overnight — that the talent base, the booster money, and the most devoted travel crowd in the conference mean the Hogs are always one hire from finally arriving."

the_grudge_texture:
  rival: texas
  texture: border-war   # the old Southwest Conference blood feud, freshly relit by Texas joining the SEC in 2024
the_coach_relationship: savior   # Ryan Silverfield arrives from Memphis as the latest hoped-for fix
the_internal_fracture: loyalty vs ceiling — the faction that loved folksy Sam Pittman and hated to see him go vs the faction that decided affection was no substitute for an SEC ceiling the Hogs never reached under him
register: razorback-southern-passion   # DRAFT (from voice_register) — confirm
