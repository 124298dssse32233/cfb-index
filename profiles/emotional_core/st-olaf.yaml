  the_origin: "St. Olaf College, founded 1874, a small Norwegian Lutheran liberal-arts school in Northfield, Minnesota, began playing football in the early 1900s and established its legendary rivalry with Carleton in 1931—a continuous 105-year series that defines the program's identity."
