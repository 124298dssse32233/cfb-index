  texture: killed-by-realignment   # the Battle for the Valley — the oldest rival, now stranded in the MW as Fresno leaves for the Pac-12

the_coach_relationship: savior   # Matt Entz arrived and immediately delivered 9-4 and a bowl title
the_internal_fracture: prove-it vs pride — the faction hungry to win in the Pac-12 and validate the leap now vs the faction that just wants to savor finally getting the power-league seat the program always claimed it deserved
