  primary: grievance      # "Anyone, Anytime, Anywhere" — a program built on demanding the giants give it a game
  secondary: restoration  # the Entz turnaround to 9-4 and a bowl title, then the leap into the Pac-12
  core_variant: the-ceiling
  one_line: "Fresno State is the Valley program whose whole identity is a dare — Anyone, Anytime, Anywhere — and it just answered a down stretch with a nine-win bowl-winning season and a ticket to the Pac-12."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "A Carr-brothers QB factory and a 'we'll play anybody' swagger vs a G5 ceiling that, until the 2026 Pac-12 move, kept the Bulldogs out of the rooms where titles get decided."

the_wound:
  name: "The post-2018 slide"
  detail: "After Jeff Tedford's 2018 Mountain West championship, Fresno cooled into ordinary seasons and coaching turnover before Matt Entz's first year in 2025 restored it to 9-4 and an Arizona Bowl win — the live proof that the Valley standard had slipped and then snapped back."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win in the Pac-12, send another quarterback to Sundays, and prove the Valley belongs in a power league after a generation of being told it didn't."
  drought: { since: 2018, unit: conference_title }

the_chip:
  villain: blue_bloods
  text: "Bulldog fans built a whole ethos around it: Fresno would drive into anybody's stadium and dare the name-brand programs to schedule them back. They say the giants ducked the Valley for years, and the Pac-12 invite is the door finally cracking open."

the_delusion:
  tone: earnest
  text: "Fresno fans believe the Valley quietly out-produces the blue bloods — that the talent coming out of California's Central Valley and the program's QB pipeline mean the Bulldogs were always a power, just stuck in the wrong league waiting for someone to notice."

the_grudge_texture:
