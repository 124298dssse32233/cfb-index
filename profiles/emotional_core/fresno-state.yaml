story_canon:
  the_unique_thing: "Fresno State is the program that turned a scheduling philosophy into a personality — Pat Hill's 'Anyone, Anytime, Anywhere' meant the Bulldogs would load up the bus and play any blue blood in any stadium, a G5 program that refused to act like one and dared the giants to give it a game."
  the_origin: "A Central Valley land-grant school that became California's loudest non-power program — built on local Valley talent, a famous quarterback pipeline, and a swaggering willingness to schedule up that defined it for a generation."
  golden_ages:
    - { era: "1997–2011 (Pat Hill)", what: "The 'Anyone, Anytime, Anywhere' era — marquee upsets, bowl regularity, and the Carr-brothers QB pipeline" }
    - { era: "2018 (Jeff Tedford)", what: "A 12-2 Mountain West championship season and a Las Vegas Bowl win — the program's modern peak" }
  legends:
    - { name: Pat Hill, role: coach, why: "Defined the program's identity with 'Anyone, Anytime, Anywhere' and made Fresno a feared road test" }
    - { name: David Carr, role: player, why: "Led the program to national ranking and became the No. 1 overall NFL draft pick in 2002" }
    - { name: Derek Carr, role: player, why: "The second Carr to star in Fresno and reach the NFL — the pipeline's signature pair" }
  canonical_moments:
    - { name: "2001 top-10 run", year: 2001, what: "David Carr's Bulldogs beat ranked opponents on the road and crack the top 10 — the 'Anyone, Anytime, Anywhere' apex", handling: glory }
    - { name: "2018 Mountain West title", year: 2018, what: "Tedford's 12-2 team wins the conference and the Las Vegas Bowl", handling: glory }
    - { name: "The 2025 reset", year: 2025, what: "Matt Entz's first year goes 9-4 with an Arizona Bowl win over Miami (OH) ahead of the Pac-12 move", handling: glory }
  the_place: "Valley Children's Stadium (Bulldog Stadium) — a sunken bowl in the Central Valley heat that packs in one of the most loyal G5 crowds in the West, the 'V' and the red-and-blue a Valley institution."
  brand_of_football: "Tough, schedule-up, prove-it football — a program that defines itself by punching at blue bloods and producing NFL quarterbacks out of an overlooked corner of California."
  cultural_footprint: "The football heart of California's Central Valley — an agricultural region with no pro team, where Bulldog Saturdays are the main event and the 'Anyone, Anytime, Anywhere' chip is civic identity."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Matt Entz's debut in 2025 went 9-4 (5-3 MW) with an 18-3 Arizona Bowl win
