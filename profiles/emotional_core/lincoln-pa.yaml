story_canon:
  the_unique_thing: "Lincoln University is the oldest degree-granting HBCU in America, founded in 1854 (before the Civil War, before Morehouse, before any other HBCU). Football is one activity in a 172-year legacy of African American education and excellence. It is the institution, not the football program, that defines Lincoln's place in history."
  the_origin: "Lincoln University was founded in 1854 as the Ashmun Institute in Oxford, Pennsylvania, specifically to provide higher education to African American students. It became Lincoln University in 1866. Football was added later, in 1898. The institution predates modern HBCU football by 44 years."
