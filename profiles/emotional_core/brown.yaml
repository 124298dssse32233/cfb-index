emotional_core:
  primary: contentment  # small program with its own legacy
  secondary: restoration # post-winless seasons rebuild
  one_line: "Brown football is the Ivy program that invented the 'de-fense!' chant, featured the Iron Men of 1926, and competes without pretension — proof that a smaller school can do excellence its own way."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "Four Ivy League championships and genuine football tradition vs the reality of being the most modestly-resourced Ivy program — and being okay with that."

the_wound:
  name: "Two consecutive winless Ivy seasons before the Perry coaching change"
  detail: "Before James Perry's arrival in 2018, Brown went through a stretch of two consecutive winless Ivy League campaigns. For a program with the Iron Men legacy, the hit came less from losing and more from the loss of identity — the Bears seemed to have forgotten who they were."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Return to regular Ivy League contention. Four conference titles in program history is proof Brown can compete; the goal is steady, sustainable excellence without the churn."
  drought: null

the_chip:
  villain: none
  text: "Fans here believe there is no chip. Brown doesn't resent the bigger Ivy programs. The Bears have their own identity: the program that gave the world the 'de-fense!' chant, the one that plays football because football is worth playing, not because it's a path to something else."

the_delusion:
  tone: self-aware
  text: "That being the smallest Ivy program is actually an advantage — Brown fans believe that running a program with less money and fewer resources and still competing makes the wins more meaningful. It's a little delusional, but it's genuine."

the_grudge_texture:
  rival: yale
  texture: championship    # Yale is the geographic and historical rival

the_coach_relationship: total-trust   # James Perry brought stability after instability
the_internal_fracture: null
register: brown-providence-bears-de-fense
never_use:
  - Lowest-resourced Ivy — Brown has real tradition (Iron Men, four titles, de-fense chant)
  - Irrelevant — four Ivy League championships proves sustained success

