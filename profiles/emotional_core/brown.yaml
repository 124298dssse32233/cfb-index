  the_origin: "Brown started football in 1878 and built a program on the principle that competitive excellence doesn't require big money or big resources — just commitment."
  golden_ages:
    - { era: "1926 (Iron Men)", what: "The famous Iron Men of 1926 went 9–0–1 without substitutions; a legend of resilience and toughness" }
