# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The Grove — ten acres of oak-shaded tents, chandeliers, and Sunday dress that ESPN has called the best tailgate in America. For most of the program's life the party outshone the team; 2025 was the first year the football finally matched the setting."
  the_origin: "A Mississippi land-grant school in Oxford whose football peaked under Johnny Vaught in the 1950s-60s — SEC titles and a claimed national championship in 1960 — then spent half a century chasing that ghost while the Grove became the program's true brand."
  golden_ages:
    - { era: "1947–1970 (Johnny Vaught)", what: "Six SEC titles and the 1960 claimed national championship — the program's untouchable peak" }
    - { era: "2020–2025 (Lane Kiffin)", what: "The modern resurgence: 11 wins in 2024, then a 13-2 first Playoff team in 2025" }
  legends:
    - { name: Johnny Vaught, role: coach, why: "Built the only era of sustained dominance — 190 wins, six SEC titles, the 1960 title" }
    - { name: Archie Manning, role: player, why: "The quarterback the speed limit on campus is named for (18 mph for his jersey); the face of Ole Miss football" }
    - { name: Lane Kiffin, role: coach, why: "Took the Rebels to their first Playoff before leaving for LSU — the modern resurrection and the modern wound" }
  canonical_moments:
    - { name: "The 1960 claimed national title", year: 1960, what: "Vaught's undefeated peak — the championship the program still measures itself against", handling: glory }
    - { name: "First College Football Playoff berth", year: 2025, what: "Beat Tulane 41-10 and Georgia 39-34 before falling to Miami 31-27 in the Fiesta Bowl semifinal", handling: glory }
    - { name: "Kiffin leaves for LSU mid-run", year: 2025, what: "The coach who finally broke through departs before the Playoff ends", handling: heartbreak }
  the_place: "Vaught-Hemingway Stadium and, beside it, the Grove — where the Walk of Champions brings the team through a corridor of fans before kickoff, and the tailgate is the institution the football has spent decades trying to deserve."
  brand_of_football: "Aristocratic-Southern with a portfolio now — the program that long sold the experience finally pairing it with a 13-win product; under Kiffin it ran a fast, fearless, points-first offense."
  cultural_footprint: "The Grove made Ole Miss a national brand independent of wins — a Southern gameday ideal televised every fall, the rare program whose tailgate is more famous than any single victory."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Ole Miss finished 2025 at 13-2, ranked No. 3 in both polls — its best
    season since the early 1960s — and made the program's first College Football Playoff (beat Tulane 41-10,
    beat Georgia 39-34 in the Sugar Bowl quarterfinal, lost to Miami 31-27 in the Fiesta Bowl semifinal). Lane
    Kiffin accepted the LSU job on November 30, was denied his request to coach through the Playoff, and
    defensive coordinator Pete Golding was promoted to permanent head coach, carrying the team through the
    postseason. Golding now enters 2026 trying to prove Oxford can keep a winner — that the breakthrough belonged
    to the program, not just the man who left.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
