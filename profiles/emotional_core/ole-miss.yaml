# AUTHORED 2026-06-13 from live web research — see story_canon.sources.

emotional_core:
  primary: disbelief      # the best season in 60 years, won without the coach who built it
  secondary: grievance    # the man who finally took them there walked to LSU mid-run
  one_line: "Ole Miss reached its first College Football Playoff and came within four points of the semifinal — then watched Lane Kiffin leave for LSU before the snow had melted, and finished the run anyway."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "A 13-2 season, a top-3 finish, the best year since the early 1960s — and the haunting question of whether the program can ever keep the coach who finally got it there."

the_wound:
  name: "Kiffin walked to LSU mid-Playoff"
  detail: "Lane Kiffin took Ole Miss to its first-ever Playoff in 2025, then accepted the LSU job on November 30 — asking to coach through the postseason, getting told no, and leaving defensive coordinator Pete Golding to carry the program's best team in six decades to the Fiesta Bowl. The Rebels lost 31-27 to Miami one round from the title game."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Hold the altitude Kiffin reached — return to the Playoff under Golding and prove the breakthrough was the program, not the man who left."
  drought: { since: 1962, unit: national_title }

the_chip:
  villain: blue_bloods
  text: "For decades the fanbase heard that Oxford was a tailgate with a football team attached — a beautiful place that didn't win enough to deserve the Grove. They point now at a 13-2 Playoff team and dare anyone to say it again."

the_delusion:
  tone: self-aware
  text: "The fanbase believes Oxford is the best place in America to spend a Saturday whether the Rebels win or not — that the Grove would still be worth the trip at 6-6, and 2025 just proved they can have both."

the_grudge_texture:
  rival: mississippi-state
  texture: blood-feud   # the Egg Bowl — the in-state hatred that defines both programs

the_coach_relationship: savior   # Golding inherits a program that finally tasted the top, and must hold it
the_internal_fracture: keep-Golding faith vs the fear that Ole Miss is a stepping-stone job — that any coach who wins here leaves, and the breakthrough was a borrowed season
register: aristocratic-southern-with-portfolio   # DRAFT (from voice_register) — confirm
