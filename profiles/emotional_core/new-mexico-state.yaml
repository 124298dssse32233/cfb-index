# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The 57-year bowl drought — from the 1960 Sun Bowl to the 2017 Arizona Bowl, the longest in FBS history. New Mexico State's identity is endurance itself: a program that outlasted conference homelessness, losing decades, and near-extinction, and is still playing."
  the_origin: "A land-grant university in Las Cruces, founded 1888 in the high Chihuahuan desert near the Mexican border — the borderland Aggies, defined by isolation, scarcity, and stubborn persistence."
  golden_ages:
    - { era: "1958–1960 (Warren Woodson)", what: "An undefeated 11-0 1960 season and back-to-back Sun Bowl wins — the program's lone historic peak" }
    - { era: "2022–2023 (Jerry Kill)", what: "A 10-win 2023, a Conference USA championship-game appearance, and a bowl win — the best modern stretch" }
  legends:
    - { name: Warren Woodson, role: coach, why: "Led the unbeaten 1960 team; College Football Hall of Famer and the architect of the program's golden age" }
    - { name: Jerry Kill, role: coach, why: "Engineered the 2023 miracle — 10 wins and a conference title game — out of one of the sport's hardest jobs" }
  canonical_moments:
    - { name: "The 1960 perfect season", year: 1960, what: "New Mexico State goes 11-0 and wins the Sun Bowl — the last bowl it would see for 57 years", handling: glory }
    - { name: "The drought ends", year: 2017, what: "The Aggies win the Arizona Bowl, ending the longest bowl drought in FBS history at 57 years", handling: glory }
  the_place: "Aggie Memorial Stadium in Las Cruces — desert heat, the Organ Mountains on the horizon, and a fanbase that kept showing up through decades that gave them almost nothing back."
  brand_of_football: "Scrappy and opportunistic — a program that has never had the resources to dictate terms, winning when it wins through grit, a hot quarterback, and sheer refusal to fold."
  cultural_footprint: "The endurance story of college football — a program that survived being left without a conference, near the bottom of the sport, and never stopped fielding a team; proof that simply persisting is its own kind of canon."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: After Jerry Kill's 10-win 2023 and a Conference USA title-game run,
    Tony Sanchez went 3-9 in 2024 and 4-8 in 2025 (2-6 Conference USA), a hard fall back toward the floor.
    Las Cruces is asking whether 2023 was a one-coach miracle or a foundation — and whether the borderland
    Aggies can finally build something that survives a coaching change.
