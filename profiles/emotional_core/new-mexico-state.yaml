  one_line: "New Mexico State is the program that went 57 years between bowl games and survived everything college football could throw at it — a borderland school whose triumph is that it's still standing at all."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "An undefeated 1960 Sun Bowl team and Jerry Kill's stunning 2023 run against a half-century of the longest bowl drought in the sport and years stranded without a conference to call home."

the_wound:
  name: "The post-Kill regression"
  detail: "Jerry Kill took the Aggies to 10 wins and a Conference USA title game in 2023, then stepped away. Tony Sanchez went 3-9 in 2024 and 4-8 in 2025 — proof of how fragile the program's good years are, and how quickly the floor returns."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Build something that lasts longer than one coach — a settled conference home and a bowl run that doesn't take half a century to repeat, the way Jerry Kill briefly made everyone believe."
  drought: { since: 2017, unit: bowl }

the_chip:
  villain: national_media
  text: "Fans are tired of being college football's punchline for losing — the program everyone schedules as a guaranteed win — and remember that Jerry Kill's 2023 team walked into that reputation and won ten games anyway."

the_delusion:
  tone: earnest
  text: "The fanbase believes Las Cruces can be a real football town again — that the 1960 perfect season and the 2023 miracle weren't flukes but proof, and that the right coach and a stable league turn the borderland Aggies into a program nobody pencils in as an easy win."

