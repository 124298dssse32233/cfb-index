emotional_core:
  primary: restoration      # climbing back from a down year after decades of drought
  secondary: standard       # honest mid-tier competition in an honest league
  one_line: "Valparaiso is the Indiana program that competed for FCS playoff bids in the 2000s and 2010s but went 2–10 in 2025 — now rebuilding under new coach Andy Waddle with the Hoosier Helmet Trophy rivalry against Butler anchoring the annual conversation."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "Three playoff runs in 2008–2010 vs a down 2025 season and a 407–552–27 all-time record — the program that was once respectable is now fighting to find its baseline again."

the_wound:
  name: "The name change that nobody asked for (2021)"
  detail: "Valparaiso dropped the Crusaders name in 2021 and rebranded as the Beacons — a necessary decision but one that severed the program's 100-year identity. The wound is loss of continuity: a century of tradition, gone, not because of failure but because the program had to choose ethics over history."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Climb back to the Dave Cecchini era (2008–2010) standard — three playoff runs in three years, proof that Valparaiso can compete at the highest FCS tier. A 6–6 or 7–5 season would announce that Waddle can rebuild the program."
  drought: { since: 2010, unit: bowl }

the_chip:
  villain: none
  text: "Fans here believe valparaiso has no chip. The program is struggling to find its footing after the 2021 rebranding and two decades removed from its last playoff run."

the_delusion:
  tone: self-aware
  text: "The fanbase believes the 2008–2010 playoff runs mean the program has the blueprint to compete again. They know Waddle is year one and the 2–10 season is real, but they believe the infrastructure for respectability still exists — it just needs time."

the_grudge_texture:
  rival: butler
  texture: championship   # the Hoosier Helmet Trophy since 2006; annual conference rivalry

the_coach_relationship: total-trust   # Andy Waddle in year one; program gives new coaches time to build
the_internal_fracture: crusaders-nostalgia vs beacon-future — the faction mourning the pre-2021 identity vs the faction committed to the rebranding
register: valparaiso-beacons-formerly-crusaders-hoosier-helmet-2008-2010-playoff-runs
