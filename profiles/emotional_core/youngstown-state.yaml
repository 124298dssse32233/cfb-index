emotional_core:
  primary: grievance
  secondary: restoration
  core_variant: the-ceiling
  one_line: "Youngstown State is the historic FCS dynasty of the Jim Tressel era — four national titles and a Steel City identity — that watched college football rise above it and could never climb back."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "Four FCS national championships in the 1990s and a decade of Valley dominance vs the reality of modern FCS irrelevance, a program forever living in Tressel's shadow."

the_wound:
  name: "The post-Tressel collapse"
  detail: "Jim Tressel left Youngstown State for Ohio State after 1999, taking the championship DNA with him. The Penguins won one more title in 2002, but the magic was gone. Three decades later, Youngstown State has become a middling Valley program, competitive but not championship-caliber, a program that defined itself by national titles but now scraps for conference relevance. The wound is knowing you were great, watching your coach become legendary elsewhere, and never recovering."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Return to the championship conversations, win a Valley title, make a playoff run that reminds the sport that Youngstown State was the standard-bearer of FCS football."
  drought: { since: 2002, unit: national_title }

the_chip:
  villain: none
  text: ""

the_delusion:
  tone: self-aware
  text: "The Steel City fanbase believes the Penguins can still hunt for championships, that the four titles of the 1990s prove the program has championship DNA, even if the evidence of the last 20 years suggests that era is unrepeatable."

the_grudge_texture:
  rival: akron
  texture: blood-feud

the_coach_relationship: legends-shadow
the_internal_fracture: championship-pedigree-vs-rebuilding-patience — the faction that cites four titles as proof the Penguins can win again vs the faction accepting the program is in a different era
