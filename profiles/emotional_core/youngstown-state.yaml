  - No history (Youngstown State is one of the most decorated FCS programs ever)

# ── STORY CANON (doc 64) ──
story_canon:
  the_unique_thing: "Youngstown State won four FCS national championships under Jim Tressel in the 1990s (1991, 1993, 1994, 1997) — one of the most dominant dynasties in FCS history — turning a working-class Ohio steel town into a college football power and launching Tressel to legendary status."
  the_origin: "A city university in Youngstown, Ohio that built a football program in the 1970s and early 1980s, eventually climbing under coach Bill Narduzzi before Tressel transformed the program into a national power."
  golden_ages:
    - { era: "1991-1997 (Tressel Era)", what: "Four FCS national championships, the most dominant dynasty of the era, transforming Youngstown State into a college football power" }
    - { era: "2001-2002 (Post-Tressel)", what: "One final championship under Carmine Cormier in 2002, the last gasp of the dynasty era" }
  legends:
    - { name: Jim Tressel, role: coach, why: "Won four FCS national championships in the 1990s, the architect of the Penguins dynasty who later became legendary at Ohio State" }
    - { name: Ahmad Bradshaw, role: player, why: "Star running back of the Tressel era who became an NFL All-Pro" }
  canonical_moments:
    - { name: "1991 National Championship", year: 1991, what: "Youngstown State wins the first of four titles under Jim Tressel, establishing the dynasty", handling: glory }
    - { name: "1997 National Championship", year: 1997, what: "Tressel's final championship year, capping off a seven-year run of dominance", handling: glory }
    - { name: "2002 National Championship", year: 2002, what: "Carmine Cormier wins the Penguins' fourth and final national title, the end of the dynasty era", handling: glory }
  the_place: "Stambaugh Stadium in Youngstown, Ohio — the home of Penguin football and a symbol of the Steel City's college football pride."
  brand_of_football: "Tressel-style FCS football — disciplined, tough, physical football built on running the ball and championship-caliber defense. The Penguins made themselves a national power through out-working and out-toughing opponents."
  cultural_footprint: "Youngstown State brought college football glory to the Steel City and proved that a regional university could compete at the highest level of the FCS. Jim Tressel's success launched a legendary coaching career that defined college football's approach to disciplined, winning football."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Youngstown State went 8-5 in 2025 under head coach Doug Phillips in his seventh season, continuing a pattern of consistent but unremarkable Valley mediocrity. The Penguins are competitive in conference play but far removed from the championship teams of the 1990s and early 2000s. The program remains known for the Tressel legacy and four national titles, but the current era is defined by the gap between those championships and the reality of modern FCS football.
