# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Between the Hedges and Uga — Sanford Stadium's privet hedges and the unbroken line of live English bulldogs since 1956 — wrapped around the program that waited 41 years between titles and then won two in a row. Georgia's identity is earned dominance that still remembers the drought."
  the_origin: "A flagship SEC program (founded 1892) with mid-century success and a golden age under Vince Dooley and Herschel Walker — then a 41-year national-title drought that defined two generations until Kirby Smart broke it."
  golden_ages:
    - { era: "1964–1988 (Dooley)", what: "The Dooley era and the 1980 national title behind Herschel Walker" }
    - { era: "2016– (the Smart Dynasty)", what: "Back-to-back national titles (2021, 2022) and sustained SEC dominance" }
  legends:
    - { name: Vince Dooley, role: coach, why: "Built the modern program and won the 1980 title" }
    - { name: Herschel Walker, role: player, why: "1982 Heisman, the greatest Bulldog, the engine of the 1980 title" }
    - { name: Kirby Smart, role: coach, why: "Winningest coach by percentage; broke the 41-year drought and won back-to-back" }
  canonical_moments:
    - { name: "The 2021 title (over Alabama)", year: 2021, what: "Georgia beats Alabama for its first national title in 41 years", handling: glory }
    - { name: "The 2022 repeat", year: 2022, what: "Back-to-back titles — the first in the sport since 2011-12 Alabama", handling: glory }
    - { name: "The 41-year wait", year: 1980, what: "From the 1980 title to 2021, the defining institutional memory for two generations of Dawgs", handling: wound }
  the_place: "Sanford Stadium — 'Between the Hedges' (cap 92,746) — and Uga, the live mascot in continuous lineage since 1956."
  brand_of_football: "Kirby Smart's identity: run it, stop the run, recruit and retain the deepest roster in the sport, win with discipline rather than birthright."
  cultural_footprint: "The SEC's most numerically dense traveling base; a program whose 41-year wait makes its current dominance feel earned, not assumed."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Georgia went 12-2 in 2025 with back-to-back SEC titles, but a 39-34 Sugar
    Bowl loss to Ole Miss ended another playoff run short of the championship. QB Gunner Stockton returns after
    leading the Dawgs to the SEC crown in his first year as starter; Smart retooled the secondary with transfers
    and kept RB Nate Frazier. Georgia opens 2026 a consensus top-tier team — and the live question is whether the
    Smart dynasty is a two-title peak or a sustained window, with the national-title drought now three seasons deep.
  research_checklist:
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
