emotional_core:
  primary: standard       # entitlement to dominance — but EARNED, with a 41-year memory underneath it
  secondary:              # standard carries it; the frustration is the wound, not a second core
  one_line: "Georgia chased a national title for forty years, won back-to-back, and now measures a 12-2 SEC champion as a disappointment."

self_image:
  archetype: blue-blood-living-up
  standard_gap_frame: "Back-to-back titles (2021-22) and a decade as the sport's most consistent program vs a championship drought that's quietly reached three seasons."

the_wound:
  name: "The can't-finish-it stretch since the back-to-back"
  detail: "After closing a 41-year title loop in 2021-22, three straight seasons of SEC dominance have ended short of the mountaintop — the 2024 quarterfinal loss to Notre Dame, then a 39-34 Sugar Bowl loss to Ole Miss in 2025."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "A third title — and the dynasty word the back-to-back earned and the January misfires keep deferring."
  drought: { since: 2022, unit: national_title }

the_chip:
  villain: national_media
  text: "The growing take that the regular-season machine can't close in January anymore — that the Smart dynasty peaked at two. The fanbase has heard it three straight winters, and it stings precisely because it isn't yet refutable."

the_delusion:
  tone: earnest
  text: "That the back-to-back-SEC machine is one or two plays from another title — that the playoff misfires are variance, not a finishing problem. Forty years of waiting taught this fanbase to trust the process."

the_grudge_texture:
  rival: florida
  texture: championship   # the Jacksonville neutral-site rivalry, long decided SEC supremacy (Auburn is the blood-feud secondary)

the_coach_relationship: total-trust   # Kirby Smart — winningest by percentage, the program's standard made flesh
the_internal_fracture: title-or-bust vs count-the-blessings — the faction that calls a 12-2 SEC champion a failure vs the faction that remembers the 41-year wait and refuses to
register: dominant-hungry — earned confidence with a 41-year memory; never birthright-entitled the way Alabama is, always "we remember what it felt like to not be here"
