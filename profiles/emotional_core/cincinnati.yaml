# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Cincinnati broke the glass ceiling — the first team from outside the power conferences (and outside Notre Dame) to reach the College Football Playoff, going undefeated in 2021 and forcing the sport to admit a program like theirs could belong."
  the_origin: "An urban university in Ohio with a football history dating to the 19th century, long a strong-but-overlooked program that became a Big East and then American power before its 2021 breakthrough and 2023 jump to the Big 12."
  golden_ages:
    - { era: "2021 (Luke Fickell)", what: "A 13-1 season, an American title, and a College Football Playoff berth — the first ever for a Group of Five program" }
    - { era: "2008–2009 (Brian Kelly)", what: "Back-to-back Big East titles and a BCS Orange/Sugar Bowl run — the program's first modern peak" }
  legends:
    - { name: Luke Fickell, role: coach, why: "Built the 2021 Playoff team — the coach who broke the ceiling" }
    - { name: Sauce Gardner, role: player, why: "Shutdown corner of the 2021 team, a top-five NFL draft pick and All-Pro — the face of the breakthrough" }
    - { name: Desmond Ridder, role: player, why: "The quarterback who led the program to its Playoff season" }
  canonical_moments:
    - { name: "First G5 Playoff berth", year: 2021, what: "Undefeated Cincinnati becomes the first non-power program to reach the College Football Playoff", handling: glory }
    - { name: "Beating Notre Dame in South Bend", year: 2021, what: "A road win over the Irish that powered the Playoff case", handling: glory }
    - { name: "Cotton Bowl loss to Alabama", year: 2021, what: "A 27-6 semifinal defeat ends the undefeated run", handling: heartbreak }
  the_place: "Nippert Stadium — one of the oldest continuously used on-campus stadiums in the country, a tight, urban bowl wedged into the heart of campus where the noise sits right on top of the field."
  brand_of_football: "Defense-and-edge football — the identity Fickell's 2021 team built, physical and corner-rich (Sauce Gardner the archetype), carried now into the Big 12 grind."
  cultural_footprint: "The proof of concept for the have-nots — every Group of Five program that argued it deserved a Playoff shot pointed at 2021 Cincinnati; the team that changed what was thought possible."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Cincinnati's Big 12 era has been a grind since the 2021 high — a 5-7
    missed bowl in 2024, then a 7-6 in 2025 that ended with a 35-13 Liberty Bowl loss to Navy. Scott
    Satterfield enters his fourth season in 2026 with new coordinators and a roster reshaped by the portal,
    still chasing the question the move to a Power league asked: can the program that broke into the Playoff
    once get back there from inside the Big 12?
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
