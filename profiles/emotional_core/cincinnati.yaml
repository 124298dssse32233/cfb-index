emotional_core:
  primary: grievance       # the program that broke down the door to the Playoff and still gets treated like a guest
  secondary: restoration   # the live fight to get back to the heights of 2021 after a bumpy Big 12 arrival
  core_variant: the-ceiling
  one_line: "Cincinnati is the first program from outside the power structure to crash the College Football Playoff — then spent its reward, a Big 12 invitation, learning how hard it is to do it again with the bar that high."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A 13-1 Playoff team in 2021 that beat the whole sport's gatekeeping vs a Big 12 debut that has so far produced 5-7 and 7-6 — proof the climb never stops being uphill."

the_wound:
  name: "Proving the Big 12 move was worth it"
  detail: "After the 2021 breakthrough, Cincinnati's Power-conference reality has been a grind — a 5-7 missed bowl in 2024, then a 7-6 in 2025 capped by a 35-13 Liberty Bowl loss to Navy — with the fanbase still waiting for the Big 12 to feel like the upgrade it was sold as."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the Big 12 and get back to the Playoff — not as the plucky outsider this time, but as a Power-conference program that earned its seat and intends to keep it."
  drought: { since: 2021, unit: relevance }

the_chip:
  villain: committee
  text: "Bearcat fans remember being told for years a team like theirs could never make the Playoff — so they made it, undefeated, the first ones in — and they say the people who tried to keep them out still haven't given them full credit for kicking down the door."

the_delusion:
  tone: earnest
  text: "The fanbase believes 2021 wasn't a ceiling but a preview — that a program that already proved it can play at the very top will get back there in the Big 12, and that the slow start in a Power league is a transition, not a verdict."

the_grudge_texture:
  rival: miami-oh
  texture: blood-feud   # the Victory Bell — the most-played rivalry in FBS, a true border feud

the_coach_relationship: hot-seat-churn   # post-Fickell, Scott Satterfield's Big 12 results have kept the seat from cooling
the_internal_fracture: trust-the-rebuild vs the-Fickell-standard — the faction giving Satterfield time to build a Big 12 winner vs the faction that measures everything against the 2021 Playoff team and won't accept .500
register: cincinnati-luke-fickell-cfp-believer
