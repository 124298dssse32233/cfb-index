emotional_core:
  primary: grievance      # the committee-snub of an undefeated team is the load-bearing trauma
  secondary: restoration  # the long climb back from the 2024 free-fall, still unfinished
  core_variant: the-snub
  one_line: "Florida State went 13-0 in 2023 and got left out of the Playoff anyway — the first undefeated power-conference champion ever snubbed — and the program has been falling and clawing back from that betrayal ever since."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "A 14-year top-five streak and two undefeated national titles in the Bowden era vs a 2024 collapse to 2-10 the season after going 13-0 — the widest single-year drop a recent power has taken."

the_wound:
  name: "The 2023 snub and the wreckage it triggered"
  detail: "Florida State finished 13-0 and won the ACC, then the committee left it out of the four-team Playoff for one-loss Alabama and Texas — the only undefeated Power Five champ ever excluded. The roster gutted, opted out of the Orange Bowl, lost it 63-3, and cratered to 2-10 in 2024; a 5-7 stumble in 2025 (after starting the year beating Alabama and climbing to No. 7) showed the climb back isn't done."
  handling: dated-grievance
  freshness: this-era

the_dream:
  text: "Win the thing the committee said didn't count — a Playoff berth earned so cleanly no room full of people can vote it away."
  drought: { since: 2013, unit: national_title }

the_chip:
  villain: committee
  text: "Fans will tell you the sport changed its own rules to keep them out — that a perfect season and a conference title weren't enough because the committee decided, in a back room, that the Seminoles didn't pass an eye test. They expanded the Playoff the very next year; the bracket that would have included them came one season too late."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes the 1990s blueprint is dormant, not dead — that the talent base, the brand, and Tallahassee's recruiting footprint mean the dynasty is one right roster away, and that 2024 was an aberration rather than a verdict."

the_grudge_texture:
  rival: florida
  texture: blood-feud   # the in-state war for the Sunshine State's recruits and bragging rights

the_coach_relationship: hot-seat-churn   # Norvell rode the 2023 high to a near-firing; retained for 2026 amid an explicit "comprehensive assessment"
the_internal_fracture: trust-the-architect vs cut-the-cord — the faction that says Norvell built the 2023 team and earned the rebuild vs the faction that watched 2024-2025 and wants the program to move on
register: dynasty-in-recovery — proud, aggrieved, refusing the word that rhymes with the floor; speaks of the 90s as fact, not nostalgia
