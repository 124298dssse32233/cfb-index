# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The most sustained run of excellence the sport has ever seen: from 1987 to 2000, Florida State finished in the AP top five every single year — fourteen straight seasons no other program has matched — anchored by Bobby Bowden, the war chant, and Chief Osceola planting a flaming spear at midfield."
  the_origin: "A former women's college in Tallahassee that took up football in 1947 and, under Bobby Bowden from 1976, willed itself into a national superpower — 'wide-right' heartbreaks against Miami giving way to the 1993 breakthrough and a 90s dynasty."
  golden_ages:
    - { era: "1987–2000 (Bowden)", what: "Fourteen consecutive top-five AP finishes — the longest such streak in history — and national titles in 1993 and 1999" }
    - { era: "2013 (Jimbo Fisher)", what: "A 14-0 wire-to-wire national championship behind Heisman QB Jameis Winston" }
  legends:
    - { name: Bobby Bowden, role: coach, why: "Built the dynasty from nothing; the field at Doak Campbell bears his name" }
    - { name: Deion Sanders, role: player, why: "Prime Time — the swagger and two-way brilliance that defined the brand" }
    - { name: Charlie Ward, role: player, why: "1993 Heisman, the quarterback of the first title team" }
    - { name: Jameis Winston, role: player, why: "2013 Heisman and the 14-0 national champion" }
  canonical_moments:
    - { name: "First national title", year: 1993, what: "Bowden's breakthrough — the dynasty's coronation after years of near-misses", handling: glory }
    - { name: "Wide Right I", year: 1991, what: "A missed field goal hands Miami the game — the recurring heartbreak that defined the rivalry before the titles came", handling: heartbreak }
    - { name: "The 13-0 snub", year: 2023, what: "An undefeated ACC champion left out of the four-team Playoff — the program's modern grievance", handling: wound }
  the_place: "Doak Campbell Stadium (cap ~79,560) — the largest continuous brick structure in the country, the war chant rolling through it, and Osceola riding Renegade to plant the spear before kickoff."
  brand_of_football: "Speed, swagger, and the spear — Florida State football has always been about looking faster and louder than the opponent, the Deion Sanders cool grafted onto a program that hits."
  cultural_footprint: "The standard-bearer for the modern ACC and a fixture of college football's golden 90s; the Seminole brand — unconquered, the spear, the chant — is one of the most recognizable in the sport."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Florida State went 13-0 in 2023, won the ACC, and was infamously left out
    of the four-team Playoff. The roster opted out of the Orange Bowl (lost 63-3) and the program collapsed to
    2-10 in 2024. In 2025, FSU opened by upsetting Alabama 31-17 and rose to No. 7 before sliding to 5-7 (2-6 ACC)
    and missing a bowl. Mike Norvell (36-30 in six seasons) was retained for 2026 after a public "comprehensive
    assessment," and the open question in Tallahassee is whether the 2023 team was the floor of a revival or the
    last gasp of one.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
