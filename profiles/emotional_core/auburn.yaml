slug: auburn
team_id: 140
program_name: Auburn
program_tier: 2

emotional_core:
  primary: grievance      # the defiance — refusing the state's shadow — is the permanent Auburn core
  secondary: restoration  # the live work is a fourth coaching reset trying to convert resources into wins
  core_variant: the-chronic-chip
  one_line: "Auburn is the program that lives in the same state, recruits the same ground, and refuses the role the rivalry tries to assign it — now on its fourth coach in a decade, betting an offense-minded outsider can finally cash the resources in."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "A 2010 national title, two Heismans and a Jordan-Hare that swallows ranked teams whole vs a 5-7 season, a coach fired in November, and a decade of starting over before the last build could finish."

the_wound:
  name: "The Freeze firing and the reset under it"
  detail: "Hugh Freeze was let go in November 2025 at 15-19 — fired mid-season after a 4-5 start and an SEC record that never matched the recruiting — the third straight regime to leave Auburn searching, and proof the resources still aren't translating into Saturdays."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Turn the talent and the money into a season that contends — an SEC run, a third star on the program, and an end to the cycle of promising builds that never reach year four."
  drought: { since: 2013, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Auburn fans know exactly what the ledger says across the state and refuse to wear the role it implies; the chip is that the same recruiting ground and the same league bid go to two programs, and one of them is told to be grateful for the scraps. War Eagle is said with an edge for a reason."

the_delusion:
  tone: self-aware
  text: "Auburn fans believe the program is always one right hire and one wild Saturday from the top of the sport — that a place this loud and this stocked is built to do the impossible on cue, even as they admit the last three coaches all said the same thing."

the_grudge_texture:
  rival: alabama
  texture: blood-feud   # the Iron Bowl — same state, same recruiting ground, an annual identity event

the_coach_relationship: hot-seat-churn   # Tuberville→Chizik→Malzahn→Harsin→Freeze→Golesh; the cycle is the relationship
the_internal_fracture: patience vs proof — the room that says a new staff with a real offense and a portal QB deserves time vs the room that's watched four resets and wants a contender now, not another year-one promise
register: defiant-underdog-with-teeth   # DRAFT (from voice_register) — confirmed
never_use:   # DRAFT from profile — LAW, do not violate in any authored line
  - little-brother framing
  - glorified ag-school framing
  - Cinderella
  - scrappy (at this tier)
  - plucky
  - Kick Six as a we-own-the-rivalry boast (it was one play and the other side has decades
    of ledger)
  - Bo knows as a copy device detached from Bo Jackson the person

# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Auburn is the program that specializes in the impossible Saturday — the 2013 'Kick Six' and 'Prayer at Jordan-Hare' in a single month, Bo Jackson and Cam Newton, a place where the most chaotic outcomes in the sport feel like home games, all rolled in toilet paper at Toomer's Corner."
  the_origin: "A land-grant school in Auburn, Alabama whose football grew up in the same state and the same recruiting ground as its archrival; Ralph 'Shug' Jordan built the modern program and the 1957 national title, and the identity hardened around being the state's defiant other half."
  golden_ages:
    - { era: "1957 (Shug Jordan)", what: "The program's first claimed national championship and the foundation of the modern identity" }
    - { era: "1983–1989 (Pat Dye)", what: "SEC titles, Bo Jackson's 1985 Heisman, and the move of the Iron Bowl into Jordan-Hare" }
    - { era: "2010 (Gene Chizik)", what: "A 14-0 national championship behind Cam Newton's Heisman season — the crown jewel" }
  legends:
    - { name: Bo Jackson, role: player, why: "1985 Heisman; the most electric athlete in program history (on-field legacy)" }
    - { name: Cam Newton, role: player, why: "2010 Heisman and the undefeated national title — the modern peak" }
    - { name: Pat Dye, role: coach, why: "Brought the Iron Bowl home to Jordan-Hare and built the 1980s SEC contender" }
  canonical_moments:
    - { name: "The Kick Six", year: 2013, what: "Chris Davis returns a missed field goal 109 yards to beat Alabama as time expires", handling: glory }
    - { name: "The Prayer at Jordan-Hare", year: 2013, what: "A tipped Hail Mary beats No. 7 Georgia weeks before the Kick Six", handling: miracle }
    - { name: "The 2010 national title", year: 2011, what: "Newton's undefeated Tigers win the BCS championship over Oregon", handling: glory }
  the_place: "Jordan-Hare Stadium (cap 88,043), where the eagle flies before kickoff, the student section chants 'War Eagle,' and the program celebrates by rolling Toomer's Corner in toilet paper."
  brand_of_football: "Defiant-underdog-with-teeth: physical, opportunistic, comfortable taking a swing at a bigger program; a culture built opposite Alabama's in the same state and proud of the edge that requires."
  cultural_footprint: "The state's other identity — proof that two programs can share a recruiting footprint and a league bid while one of them refuses, loudly, to be defined by the other."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Auburn went 5-7 (1-7 SEC) in 2025 and fired Hugh Freeze in November at 15-19
    overall; DJ Durkin finished the year as interim. On Nov. 30 Auburn hired USF's Alex Golesh — a former Tennessee
    coordinator with one of the FBS's most explosive offenses — and Golesh brought his USF quarterback Byrum Brown
    (3,158 passing yards, 1,008 rushing in 2025) through the portal. Facing heavy roster turnover, Golesh is the
    fourth head coach of the post-Malzahn decade, betting that a real scheme and a dual-threat QB finally convert
    Auburn's resources into the contender the program keeps starting over to find.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
  sources:
    - https://en.wikipedia.org/wiki/2025_Auburn_Tigers_football_team
    - https://www.si.com/college-football/auburn-fires-coach-hugh-freeze-4-5-start-2025-season
    - https://atozsports.com/college-football/auburn-tigers-news/auburn-tigers-finally-elite-transfer-portal-talent-new-head-coach-alex-golesh-usf-bull-bryson-washington-jeremiah-cobb-byrum-brown/

