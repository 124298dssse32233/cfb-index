    taboos: The 2013 Kick Six is a real memory that can be referenced; it should not be leaned on as evidence
      the rivalry ledger favors Auburn, because it does not. The 2011 Toomer's Oaks poisoning (by an Alabama
      fan) is a real story and should be handled with care, not humor. Bryan Harsin's tenure is recent and
      not a target for light mockery — the program and the athletic department have moved on. Any implication
      that Auburn is "Alabama's little brother" reads as a rival's line and…
    fans_culture: 'The Auburn fanbase is structurally defiant — a culture built opposite Alabama''s in the
      same state, with the same recruiting footprint, for the same SEC bid. The register tilts toward earned-not-given:
      Auburn fans know what the ledger says against Alabama, and the fans'' relationship with their own
      identity is closer to a fight-song than a dynasty-song. "War Eagle" is greeting and parting; "All
      In" is the recruiting-era stock phrase; the toomer''s corner toilet-paper rolling…'
    voice_ethos: 'The voice is defiant-underdog-with-teeth: proud, edged, unwilling to accept the state''s
      little-brother framing, and comfortable taking a swing. Auburn does not apologize for itself, does
      not pretend to be Alabama, and does not romanticize losing. "War Eagle" is said with a straight face
      and a sharp edge; performative humility reads as phony in Auburn just as it does in Tuscaloosa. Identity
      phrase: **"Auburn is the program the SEC West cannot schedule around."** Mantra:…'
    narratives: The Hugh Freeze bet is the single open narrative thread. Freeze arrived with a top-tier
      recruiting profile and a reputation for offensive innovation paired with off-field risk; his record
      in three seasons at Auburn is uneven, his recruiting has been strong, and the program's fan intelligence
      is measuring whether 2026 is the year the infrastructure converts into a 10-win SEC-contender season.
      The roster, the schedule, and the NIL operation are all aligned with that question.…
