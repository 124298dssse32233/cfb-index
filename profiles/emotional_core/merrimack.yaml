the_wound:
  name: "Conference instability and the revolving-door coach curse"
  detail: "Merrimack has played in five different conferences in 27 years (EFC 1997–2000, NE-10 2001–2018, NEC 2019–2023, Independent 2024+). The program has also churned through five head coaches in that span, including Mike Gennetti's arrival in 2024 (the fifth coach). The wound is permanent instability — never staying in one home long enough to build a culture."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Prove the 2021 Holy Cross win (biggest in program history) was a sign of the program's potential, not an anomaly. Build sustained success as an FCS Independent and stabilize the coaching situation."
  drought: { since: 2009, unit: national_title }

the_chip:
  villain: none
  text: "Fans here believe merrimack doesn't have a chip against specific rivals. The program's rival is instability itself — proving that a team can build real culture despite constant conference changes and coaching turnover."

the_delusion:
  tone: self-aware
  text: "That the 2021 Holy Cross victory proved Merrimack can compete with ranked programs and build toward that level consistently. The fanbase believes the program has been sleeping; the right coaching and stability will wake it up."

