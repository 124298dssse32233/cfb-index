status: live            # todo | drafted | authored | reviewed | live
slug: tennessee
team_id: 151
program_name: Tennessee
program_tier: 2

emotional_core:
  primary: restoration    # the program rebuilding the muscle memory of what it once was
  secondary: grievance    # a decade of being told the giant was permanently asleep
  core_variant: dynasty-restoration
  one_line: "Tennessee remembers exactly what it was — a national champion, the SEC's loudest fall Saturday, Peyton in the huddle — and after a decade in the wilderness it's writing the sequel, even after the quarterback meant to headline it walked out over money."

self_image:
  archetype: sleeping-giant
  standard_gap_frame: "Six national titles, the 1998 championship, and one of the sport's great traditions vs a decade (2008-2020) of losing seasons and coaching churn that the SEC spent every year reminding it about."

the_wound:
  name: "The Iamaleava departure"
  detail: "Days before the 2025 spring game, quarterback Nico Iamaleava missed practice in an NIL standoff and transferred to UCLA, leaving the restoration's centerpiece gone over a contract dispute. Heupel rebuilt around App State transfer Joey Aguilar, who threw for the third-most yards in a Vols season ever, but an 8-5 finish and a Music City Bowl loss to Illinois showed how thin the margin still is."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Stand on the Tennessee River with a championship again — not the memory of one, but a Playoff run that puts the Vols back where they sat in 1998."
  drought: { since: 1998, unit: national_title }

the_chip:
  villain: national_media
  text: "Fans spent a decade hearing the program eulogized — that the giant was done, that the wilderness was the new normal, that the fight song was the only thing left worth showing on TV. They never believed it, and the Heupel years are the receipt they keep waving."

the_delusion:
  tone: earnest
  text: "The fanbase believes the restoration is one quarterback and one schedule break from complete — that Knoxville is still a destination program where the talent of 1998 is a recruiting promise, not a museum exhibit, and that the next champion is a matter of when."

the_grudge_texture:
  rival: alabama
  texture: blood-feud   # the Third Saturday in October — and the 2022 win that broke a 15-year losing streak

the_coach_relationship: savior   # Josh Heupel pulled the program out of the wilderness and made it a Playoff team
the_internal_fracture: patience vs urgency — the faction that says the rebuild is real and accelerating vs the faction that wants Alabama-and-Georgia results now and reads every loss as proof the gap won't close
register: restoration-era-orange — confident, aware of what's been rebuilt, neither nostalgic nor apologetic; an engineer's progress report, not a victory speech
never_use:   # DRAFT from profile — LAW, do not violate in any authored line
  - Rocky Top as a caption instead of a cultural fact
  - Wait till next year as resignation register
  - Phil Fulmer as a historical artifact (he is alive and institutional)
  - Peyton Manning as a detached trophy (he is present)
  - the 2008 Kiffin year as a laugh line
  - turned the corner as filler framing
  - orange as a joke color

# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The Vol Navy and 'Rocky Top' — Tennessee is the only program whose fans sail to the game, mooring a fleet of boats on the Tennessee River outside Neyland Stadium, while the most instantly recognizable fight song in college sports plays on a loop. The checkerboard end zones and 100,000-plus in orange make it one of the sport's true cathedrals."
  the_origin: "A flagship state university in Knoxville whose football identity was forged by Robert Neyland in the 1920s-50s — defense, field position, the 'Game Maxims' — building the standard that the stadium and the program still carry his name to honor."
  golden_ages:
    - { era: "1938–1951 (Neyland)", what: "National championships in 1938, 1940, 1950 and 1951 — the foundation era" }
    - { era: "1994–1998 (Fulmer)", what: "Peyton Manning's run capped by the 1998 national championship under Phillip Fulmer" }
  legends:
    - { name: Robert Neyland, role: coach, why: "The architect; the stadium bears his name and the program still cites his maxims" }
    - { name: Peyton Manning, role: player, why: "The cultural and recruiting foundation of the modern program; a present, active presence on campus" }
    - { name: Phillip Fulmer, role: coach, why: "Won the 1998 national title and remains an institutional figure" }
  canonical_moments:
    - { name: "1998 national championship", year: 1999, what: "Tennessee beats Florida State in the Fiesta Bowl for its most recent title", handling: glory }
    - { name: "52-49 over Alabama", year: 2022, what: "Tennessee ends a 15-year losing streak to the Tide; fans tear down the goalposts and float them in the river", handling: glory }
    - { name: "The wilderness years", year: 2012, what: "A decade of losing seasons and coaching churn that the restoration is answering", handling: wound }
  the_place: "Neyland Stadium (cap 101,915) — third-largest on-campus venue in the country, checkerboard end zones, the Vol Walk pregame, and the Vol Navy moored on the river outside."
  brand_of_football: "Restoration-era-orange — Heupel's fast, vertical, points-in-bunches offense layered over a defense-and-field-position heritage; a program that plays like it's making up for lost time."
  cultural_footprint: "The gravity center of East Tennessee and one of the SEC's signature fanbases — 'Rocky Top' a cultural fact, the checkerboards and the Vol Navy among the sport's most distinctive traditions."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Josh Heupel's restoration hit turbulence in 2025 when QB Nico Iamaleava
    left for UCLA in an NIL dispute before the spring game. App State transfer Joey Aguilar took over and threw
    for 3,565 yards (third-most in a Vols season, behind only Manning and Bray), but Tennessee finished 8-5 and
    lost the Music City Bowl to Illinois. The question entering 2026 is whether the restoration can clear the
    next rung — a Playoff run and the SEC's elite tier — or whether the talent gap with Alabama and Georgia holds.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
  sources:
    - https://www.espn.com/college-football/story/_/id/44787682/why-nico-iamaleava-left-tennessee-joined-ucla
    - https://www.rockytopinsider.com/2026/01/01/joey-aguilar-finishes-top-three-in-all-time-tennessee-passing-statistic/
    - https://en.wikipedia.org/wiki/2025_Tennessee_Volunteers_football_team

