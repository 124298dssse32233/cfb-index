# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "North Carolina hired Bill Belichick — the most accomplished coach in NFL history, six Super Bowl rings, to run a college program at a basketball school. No hire in the sport's history was bolder or more improbable, and the eyes of all of football are now on Chapel Hill to see whether the genius translates."
  the_origin: "The nation's oldest public university, chartered 1789 in Chapel Hill — a basketball blue blood whose football program has 138 years of history but has always lived in the long shadow of the gym."
  golden_ages:
    - { era: "1980–1981 (Dick Crum / Lawrence Taylor)", what: "An 11-1 ACC championship in 1980 and a top-ten finish — the program's last conference title and its high-water mark" }
    - { era: "1992–1997 (Mack Brown's first tenure)", what: "Back-to-back top-ten seasons in 1996-97; the era that proved UNC football could be nationally relevant" }
  legends:
    - { name: Lawrence Taylor, role: player, why: "The greatest defensive player in football history; his #98 is honored at Kenan and his 1980 team won the last ACC title" }
    - { name: Mack Brown, role: coach, why: "Built modern UNC football across two tenures; the program's defining coach until his 2024 firing" }
    - { name: Bill Belichick, role: coach, why: "Six-time Super Bowl champion; the most stunning hire in college football history, now running the program" }
  canonical_moments:
    - { name: "The 1980 ACC title", year: 1980, what: "Lawrence Taylor's 11-1 Tar Heels win the ACC and finish top ten — still the last conference championship in program history", handling: glory }
    - { name: "Belichick hired", year: 2024, what: "North Carolina hires Bill Belichick, the boldest move any program has ever made, betting an NFL legend can build a college winner", handling: glory }
    - { name: "The 4-8 first year", year: 2025, what: "Belichick's debut ends 4-8, snapping a six-year bowl streak amid a coordinator purge and a tabloid storyline", handling: wound }
  the_place: "Kenan Memorial Stadium — tucked in the pines of campus, the most picturesque setting in the ACC, where a basketball school keeps funding the football experiment."
  brand_of_football: "Historically finesse and skill-position rich; now, under Belichick, a deliberate NFL-style rebuild — pro structure, pro discipline, and the patience the experiment demands."
  cultural_footprint: "The ultimate test case of whether a basketball school can will itself into football relevance by hiring the biggest name available — the most-watched program-building experiment in the sport."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Bill Belichick's first season ended 4-8 (2-6 ACC), ending a six-year bowl
    streak. UNC fired coordinators Freddie Kitchens and Mike Priefer, hired Bobby Petrino to run the offense, and
    reshaped the roster — losing QBs Gio Lopez and Bryce Baker to the portal while signing Wisconsin transfer
    Billy Edwards Jr. Entering year two of a five-year bet, Chapel Hill is asking whether the genius will translate
    to college football, or whether the most famous hire in the sport's history was a mismatch from the start.
