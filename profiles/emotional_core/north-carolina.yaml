emotional_core:
  primary: spectacle      # the basketball school that hired the most famous NFL coach alive — and it went sideways
  secondary: disbelief    # a 4-8 first year and a Jordon Hudson circus nobody in Chapel Hill imagined
  one_line: "North Carolina is the basketball school that stunned the sport by hiring Bill Belichick — six Super Bowl rings walking into a football program that had never quite committed, and a 4-8 first year that turned a coronation into a spectacle."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "138 years of football, a 1980 top-ten team, and a genuine NFL talent record against zero outright ACC titles in the modern era and a program forever ranked behind the gym next door."

the_wound:
  name: "The Belichick first year"
  detail: "The boldest hire in college football history opened 4-8 (2-6 ACC), ending a six-year bowl streak — three season-opening losses by a combined 120-33, a 19.3-points-per-game offense, a coordinator purge, and a tabloid storyline around Belichick's personal life that swallowed the football."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Vindicate the bet — turn the most-watched coaching experiment in the sport into the program's first conference title since Lawrence Taylor's 1980 team, and finally make football matter as much as the banners in the Smith Center."
  drought: { since: 1980, unit: conference_title }

the_chip:
  villain: national_media
  text: "Fans grew tired of being a national punchline — the basketball school in over its head, the tabloid story, the 4-8 schadenfreude — and want the people enjoying the experiment's stumble to remember it's only year one of a five-year bet."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes the genius will eventually be the genius — that the greatest defensive mind in football history just needs a full recruiting cycle and the right quarterback, and that the names lining up to play for Belichick will turn a 4-8 embarrassment into a program nobody laughs at."

the_grudge_texture:
  rival: nc-state
  texture: blood-feud   # the in-state Tobacco Road rivalry with the Wolfpack

the_coach_relationship: savior   # the all-in, sport-shaking bet that this hire is the answer
the_internal_fracture: faith vs buyer's remorse — the faction that says a six-ring legend deserves the full build vs the faction that watched a 4-8 circus and wonders if a 73-year-old NFL coach was ever the right fit for college football
