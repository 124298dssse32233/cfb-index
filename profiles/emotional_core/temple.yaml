# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Temple is the North Philadelphia commuter school that built a tough, blue-collar football identity inside a basketball city — 'Temple Made,' a program defined less by trophies than by the kind of overlooked, hard-edged players it turns into winners, and the coaches it produces for everyone else."
  the_origin: "An urban Philadelphia university with deep, scattered football history — Pop Warner coached here a century ago — that became a modern story when Al Golden and then Matt Rhule rebuilt it from a national punchline into an AAC champion."
  golden_ages:
    - { era: "2015-2016 (Matt Rhule)", what: "Back-to-back 10-win seasons and the 2016 AAC championship — the modern peak" }
    - { era: "2009-2011 (Al Golden)", what: "The first rebuild from irrelevance back to bowl eligibility" }
  legends:
    - { name: Matt Rhule, role: coach, why: "Built the 2016 AAC champion and the program's modern identity before leaving for Baylor and the NFL" }
    - { name: Bill Cosby-era and Pop Warner deep history, role: coach, why: "Pop Warner coached at Temple in the 1930s, anchoring the program's century-old roots" }
  canonical_moments:
    - { name: "The 2016 AAC championship", year: 2016, what: "Temple wins the conference title under Matt Rhule — the program's modern high point", handling: glory }
    - { name: "Beating No. 9 Penn State", year: 2015, what: "Temple knocks off rival Penn State for the first time since 1941 in front of a packed Lincoln Financial Field", handling: glory }
    - { name: "The post-Rhule collapse", year: 2022, what: "A run of two- and three-win seasons that erased the late-2010s gains", handling: wound }
  the_place: "Lincoln Financial Field — Temple shares the Eagles' NFL stadium, a downtown big-league stage for a program that plays like it has something to prove in it."
  brand_of_football: "Philadelphia blue-collar — physical, defense-first, chip-on-the-shoulder football that mirrors the city; 'Temple Made' as both a slogan and an attitude."
  cultural_footprint: "A coaching factory and an underdog flag for North Philly — the program that proves a commuter school in a pro-sports town can build something the city claims as its own."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: K.C. Keeler — a 275-game career winner who built Sam Houston into an
    FCS power and a bowl-winning FBS newcomer — took over Temple in 2025 and went 5-7 (3-5 American) in year
    one, earning his 275th career win along the way. Crucially, he lost no starters to the transfer portal
    afterward and is adding pieces like Penn State QB transfer Jaxon Smolik. The question in Philadelphia:
    can a proven program-builder drag the Owls back to the Rhule-era heights, faster than anyone expects?
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
