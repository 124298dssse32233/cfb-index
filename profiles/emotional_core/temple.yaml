emotional_core:
  primary: restoration    # the gritty Philly program clawing back toward the Rhule-era highs after years in the cellar
  secondary: honor        # the blue-collar identity matters more than the trophies — Temple Made is a code
  core_variant: perpetual-rebuild
  one_line: "Temple is the North Philadelphia program that Matt Rhule dragged to an AAC title and a top-25 ranking, then watched slide back to the bottom — and is now handing the rebuild to a 275-win coach who refuses to be realistic about how fast the Owls can climb."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "A 2016 AAC championship and back-to-back 10-win seasons under Matt Rhule vs a multi-year stretch of last-place finishes that erased almost all of it."

the_wound:
  name: "The post-Rhule freefall"
  detail: "After Rhule's 2016 AAC title and the program's late-2010s peak, Temple fell apart — a string of two- and three-win seasons that gutted the roster and the relevance, until K.C. Keeler arrived in 2025, went 5-7 in year one, and notably lost zero starters to the transfer portal afterward."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Get back to where Rhule had it — bowl games, an AAC title push, and a Philadelphia program that the city's pro teams have to share the spotlight with again."
  drought: { since: 2016, unit: conference_title }

the_chip:
  villain: national_media
  text: "Fans are sick of being the program everyone treats as a coaching stepping-stone — the place a Rhule or an Addazio uses to get to the next job. They want Keeler's refusal to be realistic to mean Temple finally keeps a winner instead of exporting one."

the_delusion:
  tone: earnest
  text: "The fanbase believes 'Temple Made' is a real competitive edge — that a roster of overlooked Philly-tough players, coached by a man who's won everywhere, can out-want more talented teams, and that Keeler holding his whole roster through the portal is the first proof it's working."

the_grudge_texture:
  rival: navy
  texture: little-brother   # the AAC scrap Temple wants to own — the rivalry that means most in the conference

the_coach_relationship: savior   # K.C. Keeler, a 275-game winner, is the rebuild's whole premise
the_internal_fracture: patience vs proof — the faction giving Keeler time to rebuild from a 5-7 base vs the faction that remembers the Rhule highs and wants a bowl now
