the_chip:
  villain: big_brother
  text: "Fans here believe for 70 years, CWU was a GNAC power. When the conference died, the assumption was that the Wildcats were too regional, too small, too Pacific-Northwest for the modern game. The 2025 LSC championship was the answer: the mountain came to Texas and won."

the_delusion:
  tone: self-aware
  text: "That a program born in the Pacific Northwest could dominate Division II's toughest conference on the first try. The fanbase knew better—rebuilding takes time—but they also believed the GNAC pedigree was real and portable. 2025 proved it."

