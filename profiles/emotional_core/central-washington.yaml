  detail: "The Great Northwest Athletic Conference dropped football after 2021, erasing a 70-year home. Central Washington had to migrate to the Lone Star Conference as a football-only member in 2022, an exile from the Pacific Northwest and the assumption that the Wildcats would spend years rebuilding in a new league."
