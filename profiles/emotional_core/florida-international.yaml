emotional_core:
  primary: house-money    # a young Miami commuter program that just had its best year in ages, expecting nothing
  secondary: deprival     # starved for relevance in a city that only has eyes for the Hurricanes
  one_line: "Florida International is the Miami commuter school that sold its stadium's name to Pitbull and just had its best season in years — a program that wins by surprising even itself."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A 2002-born program with a famous benefactor's name on the stadium vs a perennial place at the bottom of the South Florida pecking order, behind Miami and even the other young school across town."

the_wound:
  name: "The long quiet before 2025"
  detail: "FIU hadn't reached a bowl since 2019 or finished above .500 since 2018 — years of irrelevance in its own city — until Willie Simmons' first season went 7-6 and ended the drought, a stretch long enough that fans had learned to expect nothing."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Stack winning seasons instead of one-off surprises, win a conference, and make a corner of football-obsessed Miami care about the team that isn't the Hurricanes."
  drought: { since: 2018, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Panther fans live in the shadow of Miami and share a city that barely knows they exist; they say the only way FIU gets noticed is by winning, so they treat every bowl bid and every Shula Bowl scalp as a claim on attention nobody hands them."

the_delusion:
  tone: self-aware
  text: "FIU fans believe Miami's bottomless talent pool is theirs to tap too — that the right coach and a little buzz could make the Panthers a legitimate second football program in the city, even as they know the Hurricanes will always get first call."

the_grudge_texture:
  rival: florida-atlantic
  texture: little-brother   # the Shula Bowl — two young South Florida programs scrapping to be the bigger little school

the_coach_relationship: savior   # Willie Simmons arrived and immediately delivered the first winning year since 2018
the_internal_fracture: belief vs caution — the faction that thinks Simmons' 7-6 is the start of something real vs the faction that's been burned before and waits to see it sustained
