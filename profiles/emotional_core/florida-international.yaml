# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Florida International is the only program in the country whose stadium is named after a rapper — FIU sold the naming rights to Miami-born Pitbull, turning 'Pitbull Stadium' into a one-of-a-kind branding move that captures the whole identity: a young, scrappy Miami program willing to do something nobody else would to get noticed."
  the_origin: "Founded in 2002 as one of the newest programs in major-college football, FIU is a Miami commuter school that built its team from nothing in a city already owned by the Hurricanes, fighting for relevance from day one."
  golden_ages:
    - { era: "2010–2011 (Mario Cristobal)", what: "Two bowl appearances, a Sun Belt co-championship, and the first sustained success in program history" }
    - { era: "2018 (Butch Davis)", what: "A 9-4 season and a Bahamas Bowl win — the program's most wins in a year" }
  legends:
    - { name: Mario Cristobal, role: coach, why: "Built FIU's first winning era before becoming a Power-conference head coach; the program's foundational name" }
    - { name: T.Y. Hilton, role: player, why: "Cristobal-era star receiver and return man who became a four-time NFL Pro Bowler" }
  canonical_moments:
    - { name: "2010 Sun Belt title run", year: 2010, what: "Cristobal's Panthers win a share of the Sun Belt and reach the program's first bowl", handling: glory }
    - { name: "2018 Bahamas Bowl season", year: 2018, what: "Butch Davis leads FIU to nine wins and a bowl title — the program's high-water mark", handling: glory }
    - { name: "The 2025 breakthrough", year: 2025, what: "Willie Simmons' first year goes 7-6, the first winning season since 2018 and first bowl since 2019", handling: glory }
  the_place: "Pitbull Stadium (formerly Riccardo Silva Stadium) in University Park — a modest, sun-baked Miami venue made famous by the rapper whose name now sits atop it."
  brand_of_football: "Underdog Miami football — built on local South Florida speed and a willingness to be loud, brash, and unconventional to claim a sliver of attention in a crowded market."
  cultural_footprint: "The team for the half of Miami that didn't go to the U — a young, diverse, commuter-campus program reaching for a foothold in one of the richest talent regions in the country."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Willie Simmons' debut season in 2025 went 7-6 (5-3 Conference USA),
    clinching FIU's first bowl since 2019 and first winning season since 2018, and beating FAU 38-28 in the Shula
    Bowl — before falling to UTSA in the First Responder Bowl. Year two is about proving the breakthrough wasn't a
    fluke: turning one surprising season into the program's first real run of relevance in its own city.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
