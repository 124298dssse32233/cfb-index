story_canon:
  the_unique_thing: "The Monon Bell—an annual Thanksgiving game with Wabash for a 300-pound cast-iron bell trophy, the oldest continuous college football rivalry in America (since 1890) and one of the sport's most sacred traditions."
  the_origin: "DePauw, founded in 1837 in Greencastle, Indiana, began playing football in 1884 as the first team ever to play in Indiana. The rivalry with Wabash, 20 miles away, started in 1890 as a natural regional clash. In 1932, the two schools commissioned a bell—a cast-iron Schlag bell, 300 pounds, engraved 'Monon Bell'—to commemorate the trophy, and it has been contested every Thanksgiving ever since."
