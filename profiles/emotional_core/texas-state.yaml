  name: "The decade nobody noticed"
  detail: "Texas State reclassified to FBS in 2012 and then spent a decade as a losing-record afterthought with no bowl appearances, the kind of program outsiders used as a schedule-filler — a stretch only erased when GJ Kinne arrived in 2023 and immediately won."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Make San Marcos belong in a Power conference — win in the Pac-12, become the program in Texas that recruits the I-35 corridor away from the bigger names, and never go back to being a footnote."
  drought: { since: 2012, unit: conference_title }

