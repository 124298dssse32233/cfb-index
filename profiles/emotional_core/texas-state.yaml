story_canon:
  the_unique_thing: "Texas State is the youngest FBS program to crash a Power conference — the 2012 newcomer that spent a decade as a Sun Belt afterthought, then went from no bowl history to three straight bowl wins under GJ Kinne and a 2026 invitation to the revamped Pac-12 as its flagship Texas school."
  the_origin: "A San Marcos university (the old Southwest Texas State, where LBJ went to college) that reclassified from FCS to FBS in 2012 and joined the Sun Belt — a true modern arrival with shallow football roots and everything still to build."
  golden_ages:
    - { era: "2023-2025 (GJ Kinne)", what: "Three consecutive winning seasons and three straight bowl wins — the first three bowl victories in program history" }
  legends:
    - { name: GJ Kinne, role: coach, why: "Turned a perennial Sun Belt also-ran into a three-time bowl winner and a Power-conference invitee in three years" }
  canonical_moments:
    - { name: "The 2023 First Responder Bowl", year: 2023, what: "GJ Kinne's first team wins the program's first-ever bowl game in his debut season", handling: glory }
    - { name: "The Armed Forces Bowl win over Rice", year: 2025, what: "A 41-10 rout caps a 7-6 season and a third straight bowl win", handling: glory }
    - { name: "The Pac-12 invitation", year: 2025, what: "Texas State is announced as a Pac-12 member effective July 2026 — its leap to a Power conference", handling: glory }
  the_place: "UFCU Stadium (the old Bobcat / Jim Wacker field) in San Marcos — a fast-growing program's home on the I-35 corridor between Austin and San Antonio, the heart of its recruiting pitch."
  brand_of_football: "Newcomer swagger — GJ Kinne's fast, modern, confident offense, built to punch above a young program's weight and recruit the talent-rich Texas triangle."
  cultural_footprint: "Proof that a brand-new FBS program can climb to a Power seat in a single decade — the rare riser whose realignment story is upward, not exile."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Texas State went 7-6 in 2025 (3-5 Sun Belt), beating Rice 41-10 in the
