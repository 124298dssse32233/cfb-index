  villain: national_media
  text: "Fans have heard it for a decade — that Texas State is the newcomer that doesn't matter, the FBS arrival nobody respects. Getting the Pac-12 nod over older, bigger programs is the answer they wanted, and they want Kinne to prove San Marcos earned the upgrade."

the_delusion:
  tone: earnest
  text: "The fanbase believes Texas State can be the flagship of the new Pac-12 — that a fast-rising program sitting on the recruit-rich I-35 corridor between Austin and San Antonio is perfectly placed to become a Power-conference player while everyone's still treating it like a newcomer."

