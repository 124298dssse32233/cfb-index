    formally leaves the Sun Belt to join the revamped Pac-12 effective July 1, 2026, becoming the league's
    flagship Texas member. Kinne enters his fourth season tasked with proving San Marcos belongs at the Power
    level — the biggest upgrade in the program's short history.
