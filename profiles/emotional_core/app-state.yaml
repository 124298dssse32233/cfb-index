emotional_core:
  primary: grievance      # disrespect as fuel — the G5 giant-killer with a 40-year-old point to prove
  secondary: restoration  # the live Loggains rebuild after a 5-8 stumble
  core_variant: the-ceiling
  one_line: "App State is the mountain program that walked into the Big House and beat Michigan — and has spent every year since insisting the giant-killer belongs."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "Three FCS national titles and the most famous upset in the sport vs a Group-of-Five ceiling that says none of it counts at the level that matters."

the_wound:
  name: "The 2025 collapse — and the G5 ceiling underneath it"
  detail: "A program built on punching up went 5-8 in Dowell Loggains' first season — a 4-2 start, then six losses in seven — a stumble that fed the oldest fear in Boone: that the giant-killer's best days were the mountain-FCS ones."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Prove the mountain still slays giants — another Sun Belt title, another marquee scalp, a bowl that forces the blue bloods to look up."
  drought: { since: 2019, unit: conference_title }

the_chip:
  villain: blue_bloods
  text: "Fans here believe the chip is one game wide and forty years deep: App State walked into Michigan Stadium in 2007 and won, and the blue bloods have spent every year since pretending it was an accident. Boone hasn't forgotten, and won't let them."

the_delusion:
  tone: self-aware
  text: "That the mountain could hang with anybody on the right Saturday — that the gap between App State and the giants is a scheduling quirk, not a resource chasm. The fanbase knows better, and believes it anyway."

the_grudge_texture:
  rival: georgia-southern
  texture: blood-feud   # the fiercest rivalry in the Sun Belt — two mountain/south neighbors who genuinely hate it

the_coach_relationship: hot-seat-churn   # post-Jerry-Moore, App State has churned coaches (Satterfield→Drinkwitz→Clark→Loggains)
the_internal_fracture: punch-up-pride vs rebuild-patience — the faction that wants App State swinging at giants and winning the Sun Belt now vs the faction giving Loggains time to rebuild a 5-8 roster
