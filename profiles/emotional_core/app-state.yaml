story_canon:
  the_unique_thing: "The 2007 Michigan upset — the FCS team that walked into the Big House and beat the #5 team in the country, the most famous upset in college-football history. App State's entire identity is that anyone can be beaten on the right Saturday in the mountains."
  the_origin: "A small mountain school in Boone, North Carolina that became an FCS dynasty under Jerry Moore — three straight national titles (2005-2007) — shocked Michigan in 2007, then climbed to FBS in 2014 and made itself a Sun Belt power."
  golden_ages:
    - { era: "2005–2007 (Jerry Moore)", what: "Three consecutive FCS national championships, capped by the 2007 Michigan upset" }
    - { era: "2018–2019", what: "Sun Belt championships and a sustained FBS rise" }
  legends:
    - { name: Jerry Moore, role: coach, why: "Three FCS titles and the Michigan upset — the architect of the App State identity" }
    - { name: Armanti Edwards, role: player, why: "The quarterback who beat Michigan and won two FCS titles" }
  canonical_moments:
    - { name: "The 2007 Michigan upset", year: 2007, what: "App State beats #5 Michigan 34-32 in Ann Arbor — the biggest upset in the sport's history", handling: glory }
    - { name: "Three straight FCS titles", year: 2007, what: "The 2005-2007 dynasty under Jerry Moore", handling: glory }
  the_place: "Kidd Brewer Stadium — 'The Rock' — in the Blue Ridge Mountains, and 'Take the Stairs,' the mountain-program ethos."
  brand_of_football: "The giant-killer — a program that defines itself by punching up, built on the belief that the mountain levels anybody."
  cultural_footprint: "Proof that a small mountain school can stack real canon — three titles and the upset every G5 program has cited ever since as evidence the giants bleed."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: App State went 5-8 (2-6 Sun Belt) in Dowell Loggains' first season — a
    4-2 start that collapsed to six losses in seven. Loggains enters year two rebuilding hard: 66 newcomers (35
    from the portal), a new QB in Purdue/Arkansas transfer Malachi Singleton, and a mandate to fix an offense that
    managed 5.2 yards a play. The question in Boone: can the giant-killer climb back to a Sun Belt contender, or
    has the mountain gone quiet?
