emotional_core:
  primary: deprival       # nine years adrift as an independent, just back in a conference, starting from zero
  secondary: restoration  # the MAC return is the first real structure in a decade — a place to rebuild toward
  one_line: "UMass spent nearly a decade as a homeless independent and just rejoined a conference — and the first season back, a winless one, was less a verdict than the price of finally having somewhere to climb from."

self_image:
  archetype: orphaned
  standard_gap_frame: "A flagship research university with two FCS national titles vs an FBS program that played nine years with no conference, no stakes, and a revenue gap it had to explain at every turn."

the_wound:
  name: "The winless return"
  detail: "UMass went 0-12 in 2025, Joe Harasymiak's first year and the program's first full season back in the MAC after the long independent stretch — a hard floor for a roster rebuilding from the ground up, played in the program's signature small-stadium intimacy at McGuirk."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Climb the rung above — win a conference game, then string enough together to reach bowl eligibility, a height the program has never touched since joining the FBS in 2012."
  drought: { since: 2012, unit: bowl }

the_chip:
  villain: national_media
  text: "Outsiders ask why UMass is even at this level — and the fanbase answers that running football at a flagship has always meant explaining itself to people who'd rather it disappear, and showing up anyway."

the_delusion:
  tone: earnest
  text: "The fanbase believes the MAC return finally gives the program a ladder worth climbing — that with real conference stakes and a second-year staff, UMass plays for the rung above itself, exactly as it always has."

the_grudge_texture:
  rival: uconn
  texture: border-war   # the New England flagship rivalry, two state schools with a long, bitter ledger

the_coach_relationship: savior   # Harasymiak is the fresh start the program is betting on
the_internal_fracture: ambition vs sustainability — the faction that wants UMass to commit fully to FBS football vs the faction asking whether the investment ever matches the level
register: scrappy-proud
