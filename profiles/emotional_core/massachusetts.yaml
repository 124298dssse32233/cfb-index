story_canon:
  the_unique_thing: "The 1998 national championship — Mark Whipple's team won the I-AA (FCS) title, the high-water mark of a program that has spent its FBS years searching for a foothold ever since. UMass knows it can win at the top of a level; the question has always been which level."
  the_origin: "The land-grant flagship of Massachusetts in the Pioneer Valley, an FCS power that won national titles in 1964 and 1998 before making the leap to the FBS in 2012 — a leap that cost it the conference home it spent nearly a decade without."
  golden_ages:
    - { era: "1998 (Mark Whipple)", what: "The I-AA national championship — the program's defining title" }
    - { era: "1978–1998 (Yankee Conference era)", what: "A sustained FCS power with conference titles and deep playoff runs" }
  legends:
    - { name: Mark Whipple, role: coach, why: "Coached the 1998 national champions; the most successful coach in program history" }
    - { name: Victor Cruz, role: player, why: "Pioneer Valley product who became a Super Bowl-winning NFL receiver" }
  canonical_moments:
    - { name: "The 1998 national championship", year: 1998, what: "Whipple's UMass wins the I-AA title", handling: glory }
    - { name: "The FBS leap", year: 2012, what: "UMass moves up to the FBS — ambition that traded a conference home for nine independent years", handling: heartbreak }
  the_place: "Warren McGuirk Alumni Stadium in Amherst — a 17,000-seat home that creates genuine intimacy, Sam the Minuteman and the Rise as One chant carrying a small-but-real New England gameday."
  brand_of_football: "Grounded, identity-forward flagship football — a program that plays for the rung above itself and knows exactly which rung that is, without performing the part."
  cultural_footprint: "Rise as One — the football identity of the Massachusetts flagship, a program structurally honest about the FBS revenue divide and committed to the level anyway."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: UMass went 0-12 in 2025, Joe Harasymiak's first season and the program's
    first full year back in the MAC after the long independent stretch — the program's first winless campaign,
    and the price of rebuilding a roster while finally rejoining a conference. Entering 2026, Harasymiak's
    second year, the realistic ladder starts at winning a conference game and climbs toward the bowl
    eligibility UMass has never reached since going FBS.
