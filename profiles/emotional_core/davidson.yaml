slug: davidson
team_id: null
program_name: Davidson
program_tier: 5

emotional_core:
  primary: restoration      # the first rebuilding year after a long dormancy
  secondary: disbelief      # how a school this elite is even playing football
  one_line: "Davidson is the ultra-selective North Carolina college that revived football in 1996 after a half-century gap — a team that exists because the school decided academics were the whole point, and football belonged inside that frame."

self_image:
  archetype: sleeping-giant
  standard_gap_frame: "A Patriot League school with Princeton-level admissions (2% acceptance) competing in the non-scholarship Pioneer League — proof that prestige and FCS football can coexist if you choose the right league."

the_wound:
  name: "The 50-year football absence (1947–1996)"
  detail: "Davidson dropped football in 1947 and didn't return until 1996 — a half-century gap that meant no traditions, no rivalry memory, no rooted fan culture. The wound is not a wound; it's the blank slate the program has to fill."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Build a fan base and tradition inside the FCS frame. A bowl bid or playoff appearance would be historic — the goal is to make 100 years from now look back and say football was always Davidson."
  drought: { since: 1945, unit: bowl }

the_chip:
  villain: none
  text: "Fans here believe davidson has no chip. The program was born in non-scholarship FCS and has no inferiority complex — it chose the Pioneer League because it matches the school's values."

the_delusion:
  tone: self-aware
  text: "The fanbase believes the program can compete in the Pioneer League despite being younger than most of its rivals. They know they're starting from scratch, and they believe that's actually the honest position to start from."

the_grudge_texture:
  rival: none
  texture: blood-feud   # no traditional rival yet; rivalries are being built

the_coach_relationship: total-trust   # Thakkar in year one; program gives new coaches the blank slate they need
the_internal_fracture: none significant — the program is too young to have factions
register: davidson-wildcats-academics-first-football-as-choice
