self_image:
  archetype: perennial-almost
  standard_gap_frame: "A fanbase and a gameday atmosphere that look major-college vs a conference address that keeps the Pirates filed under mid-pack, no matter how loud Dowdy-Ficklen gets."

the_wound:
  name: "The wilderness before Harrell"
  detail: "ECU spent stretches of the late 2010s and early 2020s buried below .500 and irrelevant nationally — the long flat patch that made even Pirate Nation wonder if the program's best days were a generation gone, before Blake Harrell pulled it back to 9-4 and a Military Bowl win in 2025."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the American outright, crash a New Year's bowl, and force the sport to admit that the loudest building in eastern North Carolina deserves a bigger stage."
  drought: { since: 2008, unit: conference_title }

the_chip:
  villain: national_media
  text: "Pirate Nation has heard it for decades — too small, too remote, too G5 to matter. ECU fans treat that doubt as fuel, and the 2025 nine-win season was the latest receipt they shove back across the table."

the_delusion:
  tone: earnest
  text: "Pirate Nation believes the atmosphere is the program — that the purple-clad sellouts and the boat-rocking energy in Greenville mean ECU is a sleeping major just waiting for the wins and the league to catch up to its fans."

the_grudge_texture:
  rival: nc-state
