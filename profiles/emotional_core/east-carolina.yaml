story_canon:
  the_unique_thing: "East Carolina is the program whose fanbase is bigger than its address — Dowdy-Ficklen turns purple and deafening for a school in a tobacco town most of the country can't find on a map, the textbook case of a fan culture that outruns its conference."
  the_origin: "A regional teachers college in Greenville that grew into eastern North Carolina's football flagship, building a chip-on-the-shoulder identity from decades of being told a school its size shouldn't draw or matter the way it does."
  golden_ages:
    - { era: "1991 (Bill Lewis)", what: "An 11-1 Peach Bowl season and a top-10 final ranking — the program's signature year of national arrival" }
    - { era: "2008–2009 (Skip Holtz)", what: "Back-to-back Conference USA championships, the first conference title in 32 years" }
  legends:
    - { name: Bill Lewis, role: coach, why: "Led the 1991 11-1 team that finished ranked ninth — the high-water mark of the program" }
    - { name: Chris Johnson, role: player, why: "Explosive Pirate back who became an NFL 2,000-yard rusher" }
  canonical_moments:
    - { name: "The 1991 Peach Bowl season", year: 1991, what: "11-1 and a No. 9 final ranking — proof a small eastern-NC school could finish in the top ten", handling: glory }
    - { name: "2008 C-USA title", year: 2008, what: "ECU beats Tulsa 27-24 for its first conference championship in 32 years", handling: glory }
    - { name: "The 2025 turnaround", year: 2025, what: "Blake Harrell's first full year ends 9-4 with a Military Bowl win over Pittsburgh", handling: glory }
  the_place: "Dowdy-Ficklen Stadium — 'Purple Haze,' the pirate-flag sea, the cannon firing after every score, one of the loudest and most committed mid-major gameday environments in the sport."
  brand_of_football: "Chip-fueled, no-respect football — a program that plays like it has something to prove every Saturday because, in its own telling, it always has."
  cultural_footprint: "The pride of eastern North Carolina — a region with no pro team and one big-time program, where ECU football is the dominant cultural institution, not a side interest."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Blake Harrell, promoted to the full-time job in late 2024, led ECU to 9-4
    (6-2 American) in 2025 and a 23-17 Military Bowl win over Pittsburgh, with a defense that allowed the fewest
    points per game at the school since 1999. He enters 2026 in year two with the program restored to relevance
    and Pirate Nation pushing for an outright American title and a national look.
