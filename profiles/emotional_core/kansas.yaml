emotional_core:
  primary: house-money    # the basketball blue blood whose football joy is pure bonus
  secondary: restoration  # the Leipold rebuild that woke the program up, now steadying after two 5-7 years
  one_line: "Kansas is a basketball cathedral that, for a few Jalon Daniels seasons, made football matter in Lawrence — every win a bonus on top of a banner-filled gym that never needed the gridiron at all."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A program with one of the worst football histories in the Power conferences vs a Leipold revival that produced a 2023 bowl team and Heisman buzz — anything good here is found money."

the_wound:
  name: "The long fall after the 2008 Orange Bowl"
  detail: "Kansas won the Orange Bowl to cap a 12-1 season in 2007, then collapsed into one of the bleakest stretches in major-college football — a decade-plus of double-digit losses before Lance Leipold arrived. The 2025 team's 5-7 finish, missing a bowl for a second straight year, was a reminder of how thin the margin still is."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Keep football alive as a real thing in Lawrence — stack bowl seasons, win games that matter on a fall Saturday, and prove the Daniels-era spark wasn't a borrowed moment in a basketball town."
  drought: { since: 2008, unit: bowl }

the_chip:
  villain: national_media
  text: "Fans are tired of being told their school only cares from November to March — that football is a hobby in a basketball town. They point at the Orange Bowl banner and the Leipold revival and ask to be taken seriously between the whistles, too."

the_delusion:
  tone: self-aware
  text: "The fanbase believes the program can be a basketball school AND a football program at once — that 'Rock Chalk' can mean both, and the Leipold years proved Lawrence will show up for the gridiron if it's given something to show up for. They know which sport pays the bills, and they want both anyway."

the_grudge_texture:
  rival: missouri
  texture: killed-by-realignment   # the Border War, one of the sport's oldest rivalries, gutted by conference realignment

the_coach_relationship: savior   # Lance Leipold dragged the program off the floor; Lawrence credits him for the revival
the_internal_fracture: football-as-bonus vs football-as-priority — the faction that treats every football win as gravy on a basketball school vs the faction that wants the program funded and serious year-round
register: lawrence-rock-chalk-leipold-rebuild   # warm, self-deprecating, basketball-first Lawrence pride that learned to love football late
never_use:   # DRAFT from profile — LAW, do not violate in any authored line
  - Basketball-only school — Lance Leipold's bowl wins ended that frame
  - Always 1-11 — 2023 9-4 + bowl championship disprove the floor

