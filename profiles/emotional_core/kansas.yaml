story_canon:
  the_unique_thing: "Kansas is one of college basketball's holiest grounds — the place James Naismith, the inventor of the game, coached — whose football program has lived its whole life in that shadow, making the rare good football season feel like a bonus the school never strictly needed."
  the_origin: "A flagship public university in Lawrence whose athletic identity was forged in Allen Fieldhouse, not on the gridiron — a football program with one of the thinnest trophy cases in the Power conferences, punctuated by a single, glorious 2007 season."
  golden_ages:
    - { era: "1968 (Pepper Rodgers/Bobby Douglass)", what: "An Orange Bowl team and one of the program's best seasons of the old era" }
    - { era: "2007 (Mark Mangino)", what: "A 12-1 season capped by an Orange Bowl win — the high-water mark of modern KU football" }
    - { era: "2021–2023 (Lance Leipold)", what: "The revival — from the depths to a 2023 bowl team and Jalon Daniels Heisman buzz" }
  legends:
    - { name: Mark Mangino, role: coach, why: "Coached the 2007 Orange Bowl team, the best season in modern program history" }
    - { name: Gale Sayers, role: player, why: "The 'Kansas Comet,' a College and Pro Football Hall of Famer — the program's greatest player" }
    - { name: Jalon Daniels, role: player, why: "The face of the Leipold revival; left as a top-two passer in school history after six seasons" }
  canonical_moments:
    - { name: "2008 Orange Bowl win", year: 2008, what: "Kansas beats Virginia Tech to finish 12-1 and No. 7 — the peak of modern KU football", handling: glory }
    - { name: "Gale Sayers era", year: 1964, what: "The Kansas Comet's All-America years define the program's greatest individual talent", handling: glory }
    - { name: "Jalon Daniels' final game", year: 2025, what: "A six-season starter ends his career in a loss to Utah as KU misses a bowl at 5-7", handling: heartbreak }
  the_place: "David Booth Kansas Memorial Stadium in Lawrence — long the quieter neighbor to Allen Fieldhouse, recently rebuilt as the program tries to give football a home worthy of the Rock Chalk name."
  brand_of_football: "Spread-it-out, score-in-bunches football under Leipold — an offense-first identity built to make a basketball school's football fun to watch."
  cultural_footprint: "The birthplace of basketball coaching wearing a football helmet — a program whose meaning is inseparable from the gym next door, where every football high feels like found joy."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Kansas went 5-7 (3-6 Big 12) in 2025, missing a bowl for a second straight
    season, as six-year starter Jalon Daniels closed his career — leaving as the program's second all-time leader
    in passing yards and touchdowns. Lance Leipold, the coach credited with reviving the program from the depths,
    now faces life after Daniels. The question in Lawrence: was the Daniels-era spark the new normal, or a borrowed
    moment in a basketball town?
