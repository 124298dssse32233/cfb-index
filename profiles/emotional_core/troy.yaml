emotional_core:
  primary: standard       # in the Sun Belt, Troy expects to win the league — anything less is a letdown
  secondary: grievance    # the small Alabama school that beats the SEC and refuses to be called little
  one_line: "Troy is the little Alabama school that walks into Death Valley and beats LSU — a Sun Belt power that expects to win its league, and spent 2025 one step short, falling in the conference title game after a four-win turnaround."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "Multiple Sun Belt titles, a 12-2 season in 2022, and the 2017 win at LSU vs a 2025 that ended one game short — beaten in the Sun Belt Championship after winning the West."

the_wound:
  name: "One step short in 2025"
  detail: "Gerad Parker engineered a four-win improvement and a Sun Belt West title in 2025, then Troy lost the conference championship to James Madison 31-14 and dropped its bowl to Jacksonville State 17-13 — a strong year that stopped just short of the trophy Troy measures itself by."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Get back to the top of the Sun Belt — win the conference outright again, bank another marquee scalp, and remind everyone that the small school from south Alabama belongs above its budget."
  drought: { since: 2018, unit: conference_title }

the_chip:
  villain: blue_bloods
  text: "Troy's whole self-image is built on one thing: walking into an SEC stadium as a heavy underdog and winning. Fans believe the big Alabama programs and the national media see Troy as a paycheck opponent, and there is nothing they enjoy more than proving otherwise on a Saturday in Baton Rouge or Athens."

the_delusion:
  tone: self-aware
  text: "The fanbase believes Troy punches above its weight class as a matter of identity — that a tiny athletics budget in south Alabama can keep producing Sun Belt champions and SEC-slaying upsets, and that the gap between Troy and the giants is smaller than the brand names suggest."

the_grudge_texture:
  rival: south-alabama
  texture: border-war   # the Battle for the Belt — the in-state Sun Belt rivalry that means the most

the_coach_relationship: savior   # Gerad Parker delivered a four-win jump and a division title in year two
the_internal_fracture: contender-or-pretender — the faction that sees the West title as proof Troy is back near the top vs the faction stung that 2025 ended a game short of the trophy
register: troy-trojans-sun-belt-perennial   # DRAFT (from voice_register) — confirm
