story_canon:
  the_unique_thing: "Troy is the small south-Alabama school that made giant-killing its brand — most famously walking into Tiger Stadium and beating LSU in 2017 — a Sun Belt program that treats marquee road upsets of SEC powers as its signature, not a fluke."
  the_origin: "A Troy, Alabama university that reclassified to FBS in 2001 and quickly became one of the Sun Belt's most consistent programs, building an identity on toughness, recruiting the Deep South, and refusing to be intimidated by bigger names."
  golden_ages:
    - { era: "2016-2018 (Neal Brown)", what: "Three straight 10+ win seasons, Sun Belt titles, and the 2017 upset at LSU" }
    - { era: "2022-2023 (Jon Sumrall)", what: "A 12-2 season, a New Mexico Bowl win, and back-to-back Sun Belt championships" }
  legends:
    - { name: Neal Brown, role: coach, why: "Built the modern Troy power and engineered the 2017 win at LSU before leaving for West Virginia" }
    - { name: Jon Sumrall, role: coach, why: "Won back-to-back Sun Belt titles and a 12-2 season before leaving for Tulane" }
  canonical_moments:
    - { name: "The upset at LSU", year: 2017, what: "Troy goes into Tiger Stadium and beats LSU — the program's defining giant-killing", handling: glory }
    - { name: "The 2022 Sun Belt title", year: 2022, what: "Jon Sumrall's 12-2 team wins the conference and the New Mexico Bowl", handling: glory }
    - { name: "Losing the 2025 title game", year: 2025, what: "Troy wins the West but falls to James Madison 31-14 in the Sun Belt Championship", handling: heartbreak }
  the_place: "Veterans Memorial Stadium in Troy, Alabama — an intimate Deep South venue where a small school stages its big-name ambitions."
  brand_of_football: "Deep-South Sun Belt grit — physical, fearless, recruiting-savvy football built to spring upsets and contend for conference titles on a fraction of an SEC budget."
  cultural_footprint: "The Sun Belt's giant-killer and a proving ground for rising coaches — Neal Brown and Jon Sumrall both used Troy to launch bigger careers, and the LSU upset remains a touchstone for every G5 fanbase that dreams of an SEC scalp."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Second-year coach Gerad Parker engineered a four-win improvement in 2025,
    winning the Sun Belt West, before Troy fell to James Madison 31-14 in the conference championship and lost
    the Salute to Veterans Bowl to Jacksonville State 17-13, finishing 8-6. Parker enters his third season in
    2026 with the program back near the top of the league and the same standing question: can Troy turn a
    division title into the conference trophy it measures itself by?
