    - { name: "2025 independent farewell", year: 2025, what: "Pioneers go 8-4 in their final independent season before CAA membership — a winning capstone for the pre-CAA era", handling: glory }
  the_place: "Campus Field in Fairfield, Connecticut — the home that Nofri built into a consistent FCS winner over 14 seasons."
  brand_of_football: "Disciplined, program-first, Nofri-system football — consistent winning through 14 seasons without a big budget or national attention, built on the belief that the right system wins anywhere."
  cultural_footprint: "The Connecticut FCS program that won quietly in the NEC and as an independent for over a decade — now the newest CAA member, arriving with more winning pedigree than most programs that enter major FCS conferences."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Sacred Heart went 8-4 in 2025 — Mark Nofri's 14th season as head
    coach and the program's final year as an FCS independent before joining the CAA in 2026. The 8-4
    result is the Pioneers' best recent record and a winning send-off from the independent era. The 2026
    season is the program's true debut — competing in the CAA against Rhode Island, New Hampshire, and
    the rest of the conference's established programs. Nofri enters the CAA chapter having built more
    winning seasons than losing ones across his tenure; the question is whether the system translates
    to conference football at the FCS's highest mid-major level.
