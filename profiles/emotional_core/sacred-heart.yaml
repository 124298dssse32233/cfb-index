story_canon:
  the_unique_thing: "Sacred Heart is the FCS program that spent 14 years under one coach (Mark Nofri) winning consistently in the NEC and as an independent — and joins the CAA in 2026 as an established program testing itself in the FCS's most competitive conference for the first time."
  the_origin: "Sacred Heart University started football in 1999 and competed in the Northeast Conference (NEC). Mark Nofri was named head coach in 2012 and built the program into an NEC contender, winning a co-championship in 2013 in his second year and returning to winning records repeatedly. The Pioneers went independent before joining the CAA in 2026."
  golden_ages:
    - { era: "2013 (NEC co-championship and first FCS playoff)", what: "Sacred Heart wins a shared NEC title and earns its first-ever FCS playoff bid, losing in the first round to Fordham" }
    - { era: "2025 (8-4 independent farewell)", what: "Sacred Heart goes 8-4 in Nofri's 14th season as an independent — the program's best recent record heading into CAA membership" }
  legends:
    - { name: Mark Nofri, role: coach, why: "14 seasons of consistent winning, two NEC co-championships, and the architect who brought Sacred Heart to CAA membership" }
  canonical_moments:
