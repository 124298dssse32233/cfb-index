  one_line: "Sacred Heart is the Connecticut Catholic school that started FCS football in 1999, went independent for a decade, and joins the CAA in 2026 — the Pioneers are a winning program on the verge of testing itself against the FCS's most competitive conference."

self_image:
  archetype: riser-proving
  standard_gap_frame: "An 8-4 independent season in 2025 and 14 seasons under Mark Nofri who built the program into consistent winners — now stepping into the CAA in 2026 to find out what the Pioneers are actually worth."

the_wound:
  name: "Independent limbo — winning seasons without a conference home or marquee postseason moment"
  detail: "Sacred Heart spent years in the NEC and then as an FCS independent, earning winning records without a conference championship to define the era. The program's one postseason appearance (2013, first round loss to Fordham) remains its only FCS playoff moment. Joining the CAA in 2026 is both an opportunity and a test."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win a CAA game in year one and build toward a conference title — prove that the Nofri-era winning culture translates from the independent schedule to the FCS's premier mid-major conference."
  drought: { since: 2013, unit: relevance }

the_chip:
  villain: national_media
  text: "Fans say Sacred Heart has been winning games in FCS for 26 years and no one in national media has paid attention — they believe joining the CAA in 2026 is the program finally demanding the spotlight it has earned through consistent winning."

the_delusion:
  tone: self-aware
  text: "They believe that 14 seasons of Nofri-era competitiveness — including NEC titles and 8-win independent seasons — proves Sacred Heart can compete in the CAA right away, and that the only reason they haven't been taken seriously is the independent scheduling."

