the_wound:
  name: "The 2020 suspension"
  detail: "After 74 continuous years (1946–2020), Maine Maritime's football was suspended due to pandemic financial pressures. Sub-varsity play (2023–2024) bridged the gap, but the official program pause represented a genuine loss for the maritime community."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Restore Maine Maritime football to its 74-year legacy — prove that the Mariners mission requires the program, that service and athletics belong together."
  drought: { since: 2020, unit: relevance }

the_chip:
  villain: none
  text: "Fans here believe the chip is one of restoration: Maine Maritime plays for vindication of the service mission, proof that maritime officers need the discipline and team-building of college football."

the_delusion:
  tone: self-aware
  text: "The fanbase — and the academy — believes that a 0-10 inaugural 2025 is a beginning, not a portent. Fans know the foundation is being built, and they're grateful it's being built at all."

the_grudge_texture:
  rival: husson
  texture: blood-feud   # Maine regional, Conference of New England rivals

the_coach_relationship: savior   # Nick Sheehan tasked with rebuilding from zero
