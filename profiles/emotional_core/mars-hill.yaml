the_dream:
  text: "Prove that Kevin Barnette isn't a successor but a founder of a new Lions era — win the SAC, establish a new tradition that honors Clifton but belongs to Barnette."
  drought: { since: 1993, unit: relevance }

the_chip:
  villain: none
  text: "Mars Hill's chip is being haunted by continuity — 32 years under Clifton set a bar so high that even success under Barnette risks reading as a falloff. The Lions carry the weight of a legacy they have to honor while writing their own story."

the_delusion:
  tone: self-aware
  text: "The fanbase believes that Kevin Barnette, a Mars Hill alum and a defender under Clifton for 31 years, carries some of the 32-year magic in him; that the transition won't be as hard as it looks because Barnette was there the whole time."

