  detail: "Tim Clifton coached Mars Hill football for 32 years (1993–2024), a tenure that made him the longest-serving college football coach in North Carolina and defined what the Lions were. When he retired, the program lost not just a coach but an entire identity. Kevin Barnette, a Mars Hill native, took over in a program where everyone had known only Clifton."
