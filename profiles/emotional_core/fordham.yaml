# ── STORY CANON (doc 64) — what makes this program unique & amazing. ──
story_canon:
  the_unique_thing: "The 'Seven Blocks of Granite' — the 1936 offensive line that featured Vince Lombardi (who became a legend and namesake of the Super Bowl trophy). It's the most famous line in college football history and Fordham football is defined by being the program that produced it."
  the_origin: "Fordham football dates to the 1800s. The program is embedded in Rose Hill campus in the Bronx, the historic Jesuit institution that was a national power in the 1930s-1960s."
  golden_ages:
    - { era: "1936 (Seven Blocks era)", what: "The 'Seven Blocks of Granite' offensive line featuring Vince Lombardi, the most famous line in college football history" }
    - { era: "1940s-1950s", what: "Continued national relevance under legendary coach" }
    - { era: "2013-2023", what: "Four FCS playoff appearances in a decade, the most recent playoff era" }
  legends:
    - { name: "Vince Lombardi", role: "player", why: "1936 'Seven Blocks of Granite' offensive lineman who became a legendary coach and namesake of the Super Bowl trophy" }
  canonical_moments:
