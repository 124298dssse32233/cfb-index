    - { name: "1940 Orange Bowl", year: 1940, what: "Fordham reached the Orange Bowl, losing 14-7 to Mississippi State", handling: glory }
  the_place: "Rose Hill campus in the Bronx, a historic Jesuit institution with 1925 Fordham-red bedrock walls. Coffey Field is the home stadium. The campus is New York City football."
  brand_of_football: "Urban Jesuit tradition — a program that once meant something nationally and has never recaptured it."
  cultural_footprint: "The program that produced Vince Lombardi and the Super Bowl name, yet can't win games in the Patriot League. A cautionary tale of how legacy alone doesn't sustain modern success."
  the_ongoing_story: >
    LIVE ARC — 2026-06-13: Fordham collapsed to 1-11 (1-6 Patriot League) in 2025 after competitive seasons in the early 2020s. Coach Joe Conlin and the staff underwent major restructuring with new defensive and offensive coordinators. The program enters 2026 desperate to escape the reputation of failure and prove the Seven Blocks legacy still resonates in the modern Patriot League.
