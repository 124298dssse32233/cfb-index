  the_unique_thing: "Hope is the Flying Dutchmen—a program named after the phonetic blend of Dutch heritage and school identity—who have won back-to-back perfect regular seasons (10-0 in 2024 and 2025) and contest the Wooden Shoes trophy with Kalamazoo (since 1910, hand-carved trophy since 1931)."
  the_origin: "Hope College, founded in 1866 by Dutch settlers in Holland, Michigan, began playing football in the late 1800s. The 'Flying Dutchmen' nickname, coined in 1958 after a basketball victory, blends the Dutch heritage with athletic ambition. The program competes in the MIAA and has accumulated multiple conference titles. The Wooden Shoes rivalry with Kalamazoo (since 1910, trophy since 1931) is one of the MIAA's most storied traditions."
