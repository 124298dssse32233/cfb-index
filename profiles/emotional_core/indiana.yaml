emotional_core:
  primary: disbelief      # the basketball school that won a football national title and still can't say it out loud
  secondary: standard     # disbelief curdling into a brand-new, terrifying expectation
  one_line: "Indiana is the reigning national champion — a sentence a century-long basketball school still has no muscle memory for saying."

self_image:
  archetype: riser-proving
  standard_gap_frame: "One conference title in 130 years of football vs a 16-0 national championship — and the brand-new burden of having to prove it wasn't lightning in a bottle."

the_wound:
  name: "A century as the Big Ten's football afterthought"
  detail: "From 1887 to 2023 Indiana had never won 11 games or reached the playoff; the football program was a punchline at a basketball blue blood. Cignetti inverted it in two seasons — but the long irrelevance is the backdrop every win is still measured against."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Prove it's real — that a 'basketball school' can stay a national power, not regress to a century of mean."
  drought: { since: 2025, unit: national_title }

the_chip:
  villain: national_media
  text: "The same voices who called 2024 a fluke and 2025 a soft schedule are still waiting for Indiana to fall back to earth. Cignetti's answer — roughly, 'I win, look it up' — became the fanbase's whole posture."

the_delusion:
  tone: earnest
  text: "That one title makes Indiana a permanent power — that the basketball school is a football school now, for good. After 130 years of nothing, the fanbase has earned the right to believe it."

the_grudge_texture:
  rival: purdue
  texture: border-war   # the Old Oaken Bucket — in-state, the one rivalry that predates the relevance

the_coach_relationship: savior   # Curt Cignetti IS the program's relevance — 27-2 in two years, the architect
the_internal_fracture: permanent-power vs impostor-syndrome — the believers who think the title made Indiana a blue blood vs the hedgers braced for regression to the mean
register: a basketball school that won it all — disbelieving swagger, Cignetti-blunt, allergic to being called a fluke
never_use:   # DRAFT from profile — LAW, do not violate in any authored line
  - Football is an afterthought — Curt Cignetti's 2024 ended that
  - Basketball-only program — 11-win 2024 contradicts permanently

# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The basketball school that won a football national title. Indiana — one conference title in its first 130 years of football — went 16-0 in 2025 behind a 64-year-old former James Madison coach and the school's first Heisman winner. The most improbable champion in modern college football."
  the_origin: "A basketball blue blood (the Bob Knight legacy) whose football program was a century-long Big Ten punchline — until Curt Cignetti arrived from James Madison in 2024, went 11-1 for the first CFP berth in program history, then 16-0 for the title."
  golden_ages:
    - { era: "2024–2025 (Cignetti)", what: "An 11-1 first-ever CFP appearance, then a 16-0 national championship — the program's entire golden age compressed into two seasons" }
  legends:
    - { name: Curt Cignetti, role: coach, why: "Arrived from James Madison and built the most improbable champion in modern CFB in two years (27-2)" }
    - { name: Fernando Mendoza, role: player, why: "Quarterback, the school's first Heisman winner, the trigger of the 16-0 title" }
  canonical_moments:
    - { name: "The 16-0 title", year: 2025, what: "Indiana beats Miami 27-21 for its first national championship, never trailing in the playoff — routing Alabama 38-3 and Oregon 56-22 en route", handling: glory }
    - { name: "The first CFP berth", year: 2024, what: "An 11-1 debut under Cignetti — the first playoff appearance in program history", handling: glory }
  the_place: "Memorial Stadium (the Crimson Out) — for a century the quietest big stadium in the Big Ten, suddenly its loudest."
  brand_of_football: "Cignetti's process: proven veteran production over recruiting-ranking upside, players who absorb coaching immediately — the portal-era blueprint rivals are now openly copying."
  cultural_footprint: "Living proof that the portal era can let a 'basketball school' win it all in two years — the most-studied program-building case in the sport."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Indiana is the reigning national champion (16-0, 2025), the first 16-0
    modern major champion — beating Alabama 38-3, Oregon 56-22, and Miami 27-21 in the final, never trailing in
    the playoff, behind Heisman QB Fernando Mendoza. Cignetti (27-2 in two years, ex-James Madison) says his
    "total focus" is 2026, where Indiana is favored to return to the CFP. The question is no longer "do they
    belong" but "can a program with no muscle memory for this defend it" — disbelief hardening into expectation.
    (Supersedes the 2024-era seed below, which predates the title.)
  research_checklist:
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
