emotional_core:
  primary: grievance      # the pugnacious SEC have-not, chip permanently on the shoulder, swinging up at a league that keeps it down
  secondary: deprival     # a century-plus and still no conference title; the ceiling always one rung below the SEC's best
  core_variant: the-chronic-chip
  one_line: "South Carolina is the SEC's hardest-luck believer — a program that has never won a conference championship in over a century, fights like it might at any moment, and watched a preseason-No.-13 season with a Heisman-hyped quarterback crater to 4-8."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "The 11-win peaks of the early-2010s, against a present where preseason top-15 hype became 4-8 — the gap between what Gamecock fans are promised every August and what usually arrives in November."

the_wound:
  name: "The 2025 collapse"
  detail: "South Carolina opened 2025 ranked No. 13 with quarterback LaNorris Sellers a Heisman contender and finished 4-8 (1-7 SEC). Sellers regressed and was sacked a career-high 43 times; Shane Beamer fired his offensive coordinator mid-season and enters 2026 squarely on the hot seat. The fanbase's oldest fear — that the ceiling is real — got loud again."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the thing the program has never won — a conference championship, the first in a history that runs back over a hundred years, and finally clear the rung it has always lived just beneath."
  drought: { since: 1969, unit: conference_title }

the_chip:
  villain: blue_bloods
  text: "Gamecock fans have spent generations as the SEC's welcome mat for Georgia, Clemson, and the rest — and they wear the grievance like a badge. They'll tell you nobody fights harder for less, and that the program that should never be respected keeps refusing to go quietly."

the_delusion:
  tone: load-bearing
  text: "Every August, Columbia convinces itself this is the year the ceiling breaks — that the talent, the SEC pedigree, and the next quarterback finally deliver the breakthrough. The faithful have been burned this way for decades and they still believe it, because believing it is the whole identity."

the_grudge_texture:
  rival: clemson
  texture: blood-feud   # the Palmetto Bowl — the in-state, year-round, families-divided hatred that defines South Carolina football

the_coach_relationship: hot-seat-churn   # Shane Beamer rode a 2022-2024 high into a 4-8 2025 that put his seat among the hottest in the sport
the_internal_fracture: faith vs fatigue — the faction that buys the preseason hype every year vs the faction worn raw by another top-15 promise collapsing to 4-8
register: cocky-rooster-with-history   # DRAFT (from voice_register) — confirm
