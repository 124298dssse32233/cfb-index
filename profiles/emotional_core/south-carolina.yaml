# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "South Carolina has played football since 1892 and won exactly one conference championship — the 1969 ACC title — in all that time. The Gamecocks are the SEC's eternal almost: a fervent, capacity-crowd fanbase that has never had a league title to celebrate, and has built an entire identity out of the wanting."
  the_origin: "A flagship state university in Columbia that spent twenty years as an independent before joining the SEC in 1992, where it found its true home — a conference brutal enough to match the chip the program already carried."
  golden_ages:
    - { era: "2010–2013 (Steve Spurrier peak)", what: "Three straight 11-win seasons, a 2010 SEC East title, and wins over No. 1 Alabama — the highest the program has ever climbed" }
    - { era: "1969 (Paul Dietzel)", what: "A 6-0 ACC run to the program's only conference championship" }
  legends:
    - { name: "George Rogers", role: player, why: "The 1980 Heisman Trophy winner — South Carolina's singular individual glory" }
    - { name: "Steve Spurrier", role: coach, why: "Built the 2010-2013 peak, the best sustained stretch in program history" }
    - { name: "Jadeveon Clowney", role: player, why: "The No. 1 NFL Draft pick and author of 'The Hit' vs Michigan — a generational Gamecock talent" }
  canonical_moments:
    - { name: "George Rogers wins the Heisman", year: 1980, what: "The Gamecock running back takes home the Heisman Trophy — still the program's proudest individual moment", handling: glory }
    - { name: "The Clowney Hit", year: 2013, what: "Jadeveon Clowney's helmet-dislodging Outback Bowl tackle of Michigan's Vincent Smith — the most-replayed play in school history", handling: glory }
    - { name: "1969 ACC championship", year: 1969, what: "South Carolina's lone conference title in more than a century of football", handling: glory }
  the_place: "Williams-Brice Stadium in Columbia (cap ~77,000) — and 'Sandstorm,' the Darude anthem that turns the night crowd into a wall of waving towels, one of the loudest entrances in the sport."
  brand_of_football: "SEC grit with a chip — physical, defense-and-quarterback-driven, perpetually punching up at the league's blue bloods; a program that defines itself by the fight rather than the trophy case."
  cultural_footprint: "The pugnacious soul of a football-mad state split down the middle with Clemson; a fanbase whose loyalty is famously immune to results, defined by the Palmetto Bowl and the wait for a breakthrough that never quite comes."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: South Carolina opened 2025 ranked No. 13 with LaNorris Sellers a Heisman
    contender, then collapsed to 4-8 (1-7 SEC); Sellers threw for 2,437 yards and 13 touchdowns and was sacked
    a career-high 43 times, and Shane Beamer fired OC Mike Shula mid-year. Despite NFL Draft and transfer-portal
    interest — including Miami rumors — Sellers and pass rusher Dylan Stewart both returned for 2026, with Beamer
    on the hot seat and the fanbase bracing for one more swing at the ceiling.
