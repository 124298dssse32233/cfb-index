story_canon:
  the_unique_thing: "Wyoming plays its home games at 7,220 feet — War Memorial Stadium is the highest-elevation venue in major college football, where the thin air, the cold, and the eight-hour drive to anywhere turn a visit to Laramie into a genuine ordeal."
  the_origin: "The University of Wyoming in Laramie is the entire state's only Division I program — Wyoming has no other major-college team and no pro franchise, so the Cowboys are the whole state's football, played higher and colder than anyone else's."
  golden_ages:
    - { era: "1966–1968 (Lloyd Eaton)", what: "A 10-1 1967 team that reached the Sugar Bowl and rose into the national top ten — the program's historic peak" }
    - { era: "2014–2023 (Craig Bohl)", what: "A run of bowl trips and toughness, and the development of Josh Allen from unrecruited to a top-10 NFL draft pick" }
  legends:
    - { name: Josh Allen, role: player, why: "Came to Laramie with almost no recruiting interest and left as the No. 7 overall NFL draft pick — the program's modern calling card" }
    - { name: Craig Bohl, role: coach, why: "Restored Wyoming to a steady bowl program and developed its most famous player" }
    - { name: Cowboy Joe, role: player, why: "The live pony mascot — the four-legged face of the program's frontier identity" }
  canonical_moments:
    - { name: "The 1967 Sugar Bowl season", year: 1967, what: "A 10-1 record and a Sugar Bowl berth — Wyoming's high-water mark and a top-ten national finish", handling: glory }
    - { name: "Josh Allen's rise", year: 2017, what: "An overlooked quarterback becomes a first-round NFL prospect, putting Laramie back on the map", handling: glory }
    - { name: "The 4-8 backslide", year: 2025, what: "A bowl-less season in Jay Sawvel's second year that tested the program's toughness identity", handling: wound }
  the_place: "War Memorial Stadium in Laramie — 7,220 feet up, the highest venue in major college football, where altitude and cold are part of the home-field advantage and the Cowboy Joe pony circles the field after scores."
  brand_of_football: "Cowboy Tough — physical, cold-weather, frontier football built on the literal and figurative high ground, where grit is the program's identity and its recruiting pitch."
  cultural_footprint: "An entire state's only big-time team, carried by a fanbase that drives across the empty West to fill a high-plains stadium — football as the shared identity of a place with little else on the national stage."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Jay Sawvel returns for 2026 after a 4-8 (2-6 Mountain West) second season
    that missed a bowl. Wyoming stays in the Mountain West as a legacy anchor — with New Mexico, UNLV, and Air
