emotional_core:
  primary: honor           # toughness as identity — the highest, hardest place to play, where grit is the whole brand
  secondary: restoration   # clawing back to a bowl after a 4-8 slip, with the realignment exits clearing room at the top
  one_line: "Wyoming plays the highest home games in major college football — 7,220 feet up in Laramie, where the thin air and the cold are the program's best recruit, and 'Cowboy Tough' is a literal description."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A 1967 Sugar Bowl team and Josh Allen's first-round launch vs a 2025 that finished 4-8 and missed a bowl — the gap between the program's proud peaks and a frontier-football floor."

the_wound:
  name: "The 4-8 slip after the Bohl steadiness"
  detail: "Craig Bohl built a decade of bowl trips and toughness, then handed off to Jay Sawvel — and 2025 backslid to 4-8, no bowl, the kind of season that tests whether the program's altitude-and-grit identity still wins games or just describes them."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Get back to a bowl and contend in a Mountain West suddenly missing its biggest names — to seize the opening realignment left and make Laramie a place nobody wants to visit again."
  drought: { since: 1988, unit: conference_title }

the_chip:
  villain: national_media
  text: "Cowboy fans are tired of being filed under 'cold, remote, forgettable' by people who've never had to play a December night in Laramie. They say the altitude humbles every recruiting-ranking darling who comes to War Memorial thinking it'll be easy."

the_delusion:
  tone: earnest
  text: "Cowboy fans believe Wyoming's home-field edge is a genuine weapon no one else has — that the 7,220-foot altitude and frontier cold are worth a couple of wins a year, and that a tough, well-coached team can own a Mountain West the big names just abandoned."

the_grudge_texture:
  rival: colorado-state
  texture: border-war   # the Border War for the Bronze Boot — the bitter Wyoming-Colorado State rivalry

the_coach_relationship: hot-seat-churn   # Jay Sawvel inherited the Bohl program and a 4-8 year puts the heat on
the_internal_fracture: patience vs pressure — the faction giving Sawvel time to rebuild what Bohl steadied vs the faction that won't accept a 4-8, bowl-less season from a program that prides itself on toughness
