emotional_core:
  primary: restoration    # the Napier-era peak is the measuring stick; the live arc is climbing back to it
  secondary: grievance    # the Sun Belt's most decorated recent program, still treated as mid-pack
  core_variant: perpetual-rebuild
  one_line: "Louisiana won four straight Sun Belt titles when Billy Napier was in Lafayette — and has spent every year since trying to prove the dynasty was the program, not the man who left for Florida."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "Four consecutive Sun Belt championships and a #19 final ranking in 2021 vs a 6-7 bowl-loss season in 2025 that asked whether the ceiling left with Napier."

the_wound:
  name: "The post-Napier slide"
  detail: "Billy Napier won four straight Sun Belt titles (2018-2021) and a #19 finish, then left for Florida. Michael Desormeaux, his hand-picked successor, slipped to 6-7 in 2025 — a losing record capped by a 20-13 loss to Delaware in the 68 Ventures Bowl — and Lafayette is asking whether the standard was ever the program's or only the coach's."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Reclaim the Napier altitude — a fifth Sun Belt banner and a top-25 finish that proves Lafayette is a destination, not a launchpad."
  drought: { since: 2021, unit: conference_title }

the_chip:
  villain: national_media
  text: "Fans point to four straight conference titles and a top-20 ranking and ask why the national conversation still files them under generic Sun Belt mid-pack — as if the best run any Sun Belt program ever stacked never happened."

the_delusion:
  tone: earnest
  text: "The fanbase believes the four-title core is the real Louisiana and 2025 was the dip, not the truth — that Desormeaux is one good portal class from putting the Cajuns back on top of the league they used to own."

the_grudge_texture:
  rival: louisiana-tech
  texture: border-war   # the in-state Battle for the Wagon Wheel

the_coach_relationship: legends-shadow   # every Cajuns coach now lives under what Napier built
the_internal_fracture: patience vs urgency — give Desormeaux time to rebuild the Napier machine vs the worry that the window already closed when Napier walked
