emotional_core:
  primary: spectacle       # the teal turf, the chicken-dance mascot, the unbeaten Cinderella month — a program that became must-watch
  secondary: restoration   # the post-Chadwell drift, a coach fired, and a new staff trying to get the magic back
  one_line: "Coastal Carolina is the program that turned a teal field, a rooster mascot, and one undefeated month in 2020 into the most fun story college football had ever seen from a school that barely existed at this level."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "An 11-1 season ranked No. 14 in the country on teal turf in 2020 vs a present of 6-7, a fired coach, and a fan base wondering if the magic was the place or the man who built it."

the_wound:
  name: "The Beck era ends in a losing season"
  detail: "Coastal went 6-7 in 2025 — a season that ended with three straight blowout losses (51-7 at South Carolina, 59-10 to James Madison) and an Independence Bowl defeat — and Tim Beck was fired before it was even over, closing a 20-18 run that never recaptured the heights of 2020."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Get the teal back on the national map — another Sun Belt title, another month where the country can't look away from the Chanticleers, and proof the 2020 dream wasn't a one-time thing."
  drought: { since: 2020, unit: conference_title }

the_chip:
  villain: blue_bloods
  text: "Chanticleer fans heard the whole sport ask 'where is that?' during the 2020 run — and they say the same people who couldn't find Conway on a map were the ones most eager to call the whole thing an accident the moment it ended."

the_delusion:
  tone: self-aware
  text: "The fanbase believes the teal turf is a real home-field weapon — that opponents genuinely lose their footing, and themselves, on that field — and they lean into the gimmick precisely because it unsettles teams that think they're too big for Conway."

the_grudge_texture:
  rival: app-state
  texture: border-war   # two Carolinas Sun Belt neighbors; the rivalry Coastal grew into on its FBS rise

the_coach_relationship: hot-seat-churn   # Chadwell left for Liberty, Beck fired mid-season; the new Ryan Beard era starts cold
the_internal_fracture: it-was-Chadwell vs it-was-Coastal — the faction that thinks the 2020 magic walked out the door with Jamey Chadwell vs the faction that believes the teal, the place, and the identity can produce another riser
register: conway-chanticleer-teal-turf
