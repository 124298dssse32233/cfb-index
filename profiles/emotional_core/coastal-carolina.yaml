story_canon:
  the_unique_thing: "The teal turf and the 2020 dream — Coastal Carolina played its home games on a stunning teal field and rode an 11-1 season to a No. 14 final ranking, beating undefeated BYU 22-17 in a hastily scheduled instant classic that made the Chanticleers the most delightful story in the sport."
  the_origin: "A young coastal university in Conway, South Carolina with a literary mascot — the Chanticleer, the proud rooster from Chaucer's Canterbury Tales — that reclassified to FBS in 2017 and almost immediately became a Sun Belt phenomenon."
  golden_ages:
    - { era: "2020 (Jamey Chadwell)", what: "An 11-1 season, a Sun Belt East title, a No. 14 final AP ranking, and a College GameDay visit to Conway — the program's national arrival" }
  legends:
    - { name: Jamey Chadwell, role: coach, why: "Architect of the triple-option-tinged 2020 dream team; the coach the whole era is measured against" }
    - { name: Grayson McCall, role: player, why: "The dual-threat QB and Sun Belt Player of the Year who ran the 2020 magic" }
  canonical_moments:
    - { name: "Beating undefeated BYU on the teal", year: 2020, what: "A 22-17 win over No. 13 BYU in a game scheduled days earlier, stopped at the one-yard line as time expired", handling: glory }
    - { name: "GameDay comes to Conway", year: 2020, what: "ESPN College GameDay visits the teal-turf Chanticleers — national arrival for a program four years into FBS", handling: glory }
  the_place: "Brooks Stadium in Conway — home of the famous teal playing surface, a vivid, disorienting home field that became the program's visual signature and self-styled home-field weapon."
  brand_of_football: "Joyful, tempo-and-option football — the Chadwell-era identity of trickery, ground game, and showmanship, played on teal in front of a chicken-dancing crowd; college football as pure fun."
  cultural_footprint: "The feel-good story of 2020 — in a pandemic season that needed one, a rooster-mascot school on a teal field gave the sport its joy, and made 'Coastal Carolina' a name everyone suddenly knew."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Coastal's post-Chadwell drift came to a head in 2025 — a 6-7 season
    that cratered down the stretch (a 59-10 home loss to James Madison, an Independence Bowl defeat) and got
    Tim Beck fired before it ended, capping a 20-18 tenure. The program hired Missouri State's Ryan Beard as
    its fifth head coach. The 2026 question in Conway: can a new staff get the teal magic back, or did the
    2020 lightning leave with the coach who bottled it?
  research_checklist:   # what to look up (web) when we author this team together
