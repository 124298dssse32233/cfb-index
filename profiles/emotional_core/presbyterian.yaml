status: live            # todo | drafted | authored | reviewed | live
slug: presbyterian
team_id: null
program_name: Presbyterian
program_tier: 5

emotional_core:
  primary: restoration      # the program climbing to its highest-ever FCS season
  secondary: honor          # a program reclaiming traditions dormant since D-II
  one_line: "Presbyterian is the South Carolina college that went 10–2 in 2025 — the third 10-win season in program history and the first since transitioning from the Big South to the Pioneer League, a small program proving it can win at FCS."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A 10–2 season with a PFL title shot vs a program that jumped from the Big South and spent half a century dormant in lower divisions — proof of concept that a small private school can climb to FCS respect."

the_wound:
  name: "The 57-year dormancy with rival Newberry (1913–2006)"
  detail: "Presbyterian and Newberry played 95 games for the Bronze Derby (1913–2006), with Presbyterian holding a 57–33–5 record. Then the programs diverged into different conferences, and the rivalry went silent for 19 years. The wound is not defeat; it's the severing of the program's oldest blood-feud tradition."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Win the Pioneer League championship in 2026 and make the FCS playoffs — cement the 10-win season as the foundation of a new era, not a one-off. Prove that Presbyterian's climb is real and sustainable."
  drought: { since: 2023, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Presbyterian's chip is the chip of the rising mid-tier — the programs that beat you then get ranked and forget about you. The 10–2 season comes after years of grinding. The fanbase wants the national conversation to acknowledge that this rise is real."

the_delusion:
  tone: self-aware
  text: "The fanbase believes the 10–2 season is not a fluke, that the program can sustain this altitude, and that FCS playoff berths are now in reach. They know they're rising from small-school roots, but they believe the climb is real, not a mirage."

the_grudge_texture:
  rival: newberry
  texture: killed-by-realignment   # Bronze Derby rivalry (1913–2006, 95 games, Presbyterian 57–33–5); dormant 19 years

the_coach_relationship: total-trust   # Steve Englehart in fourth year; program stable and climbing
the_internal_fracture: sustainability-vs-one-off — the faction trusting Englehart's long-term plan vs the faction fearing the 10-win season is an outlier
register: presbyterian-blue-hose-bronze-derby-newberry-100-year-sleep-rising
never_use:   # LAW — do not violate in any authored line
  - "Has won multiple recent titles — 2025 is the first PFL title win in program history (championship-round TBD)"
  - "Is a perennial FCS playoff team — 10–2 in 2025 is breakthrough, not baseline"
  - "Regularly beats ranked teams — one 2025 win over Davidson (unranked)"
  - "Will sustain 10-win seasons — breakthrough year; sustainability is unproven"
  - "Is no longer climbing — 10–2 is the peak of the arc, not the floor"

