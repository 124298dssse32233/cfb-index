story_canon:
  the_unique_thing: "Presbyterian football slept for half a century after the Bronze Derby rivalry with Newberry died (1913–2006), then woke up: the program went 10–2 in 2025, the third double-digit-win season in history and the first since transitioning to the Pioneer League."
  the_origin: "A Presbyterian Church-founded college in Clinton, South Carolina established in 1880 that built football into a regional power. The program is famous for the Bronze Derby rivalry against Newberry (1913–2006, 95 games, Presbyterian 57–33–5) and for fading after the rivalry ended."
  golden_ages:
    - { era: "1913–2006 (Bronze Derby era)", what: "95 games against archrival Newberry, with Presbyterian holding a 57–33–5 record — the defining century of the program" }
    - { era: "2025 (10–2 season)", what: "The program's third 10-win season and the first after transitioning to the Pioneer League — proof of athletic resurgence" }
  legends:
    - { name: Steve Englehart, role: coach, why: "The architect of the 2025 breakthrough; in his fourth year, building Presbyterian into FCS respectability" }
  canonical_moments:
    - { name: "Bronze Derby rivalry (1913–2006)", year: 2006, what: "95 games against Newberry; Presbyterian holds a 57–33–5 series advantage — the defining tradition", handling: glory }
    - { name: "2025 10–2 season", year: 2025, what: "Presbyterian goes 10–2, the third double-digit-win season in history and the first since moving to the Pioneer League", handling: glory }
  the_place: "Bailey Memorial Stadium in Clinton, South Carolina — the on-campus home where the Blue Hose built the Bronze Derby legacy and are now building a new era."
  brand_of_football: "Small-school honor with growing FCS respect — the program that proved a 140-year-old South Carolina college can climb from dormancy to conference contention through coaching consistency and talent identification."
  cultural_footprint: "Presbyterian is the model of the small-private-school resurrection — a program that slept through the 2000s–2010s and woke up in the Pioneer League to claim its highest-ever FCS season."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Presbyterian went 10–2 (6–2 PFL) in 2025 under Steve Englehart in his fourth year — a breakthrough
    season that marks the program's third double-digit-win year in history and the first since transitioning to the Pioneer League. Collin
    Hurst led the offense; the defense stabilized late in the season. Englehart's continuity (four years in place) paid off. The question
    in Clinton: can Presbyterian sustain this altitude and return to a PFL championship game in 2026, or was 2025 an outlier climb from
    a program still learning the FCS tier?
  research_checklist:
    - the program's 3–7 most iconic games/plays (Bronze Derby classics, 2025 upset wins, Newberry matchups)
    - the legendary coaches + players (Englehart, Bronze Derby-era coaches, 2025 team captains)
    - the unique tradition / identity / the one amazing thing (Bronze Derby 95 games, 10-win breakthrough, South Carolina private prestige)
    - the origin + the golden-age dynasty eras (1913–2006 Bronze Derby, 2025 FCS breakthrough)
    - the current-era storyline (Englehart's year four and the question of sustainability)
