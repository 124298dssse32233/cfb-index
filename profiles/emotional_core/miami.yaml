story_canon:
  the_unique_thing: "The U — the swaggering, brash, talent-stacked dynasty that owned college football from the 1980s into the 2000s and changed the sport's attitude forever. Miami is the program whose identity is the most magnetic and most resented era the game has had."
  the_origin: "A commuter school that became a juggernaut under Howard Schnellenberger and Jimmy Johnson — five national titles between 1983 and 2001, the brashest dynasty the sport has seen."
  golden_ages:
    - { era: "1983–1991", what: "Four national titles under Schnellenberger, Johnson, and Erickson — the birth of The U" }
    - { era: "2000–2001", what: "The 2001 title and one of the most talented rosters in college-football history" }
  legends:
    - { name: Jimmy Johnson, role: coach, why: "Built the brash 1980s dynasty that changed the sport" }
    - { name: Ed Reed, role: player, why: "The soul of the 2001 dynasty defense" }
  canonical_moments:
    - { name: "The 2001 national title", year: 2001, what: "One of the most talented teams ever caps The U's last championship", handling: glory }
    - { name: "Wide Right", year: 1991, what: "The Miami-FSU field-goal heartbreaks that defined the era's fiercest rivalry", handling: glory }
    - { name: "The 2025 title-game loss", year: 2025, what: "27-21 to Indiana at home — one game short of the restoration", handling: heartbreak }
  the_place: "Hard Rock Stadium — and the memory of the Orange Bowl, where The U was born and went years without losing."
  brand_of_football: "Speed, swagger, and South Florida talent — the brash identity that changed college football's attitude, now in a modern rebuild under a native son."
  cultural_footprint: "The U — a cultural force beyond football (the '30 for 30,' the turnover chain, the hip-hop-era swagger); the program that made attitude part of the sport."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Miami went 13-3 in 2025 and reached its first national-championship game
    since 2001 — at home, at Hard Rock Stadium — losing 27-21 to undefeated Indiana, undone by an interception at
    the Indiana 6 with 44 seconds left. Mario Cristobal, the native-son coach, calls 2026 "unfinished business," and
    an anonymous ACC coach makes Miami the conference favorite. The closest The U has come to back — and the fuel
    for the year.
