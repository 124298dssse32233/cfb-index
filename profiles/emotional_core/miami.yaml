emotional_core:
  primary: grief          # The U faded 25 years ago — a former rock star insisting the next album is the one
  secondary: restoration  # 2025 was the closest it's come back, and the cruelest near-miss
  one_line: "Miami was one game — at home, in the title game — from bringing The U all the way back, and lost it to Indiana by six. Twenty-five years of waiting, and the album still isn't the one."

self_image:
  archetype: blue-blood-fallen
  standard_gap_frame: "Five national titles and the most swaggering dynasty the sport has seen (1983-2001) vs a quarter-century without a championship — ended one game short, at home, in 2025."

the_wound:
  name: "The 2025 title game — six points, at home, from The U being back"
  detail: "Miami reached its first national-championship game since 2001 — at Hard Rock Stadium, its own building — and lost 27-21 to undefeated Indiana, an interception at the Hoosiers' 6 with 44 seconds left ending it. The closest The U has come to all the way back, and the cruelest."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Finish it — the sixth title, The U restored, the swagger earned again instead of remembered."
  drought: { since: 2001, unit: national_title }

the_chip:
  villain: national_media
  text: "Fans here believe the take that 'The U' is nostalgia — that the swagger died with the 80s and 90s and Miami has coasted on old highlights for twenty years. The 2025 run was the program's argument that the chip is back; the loss left it unsettled."

the_delusion:
  tone: earnest
  text: "The fanbase believes The U is one season from being The U again — that the talent-rich South Florida pipeline and the 2025 run mean the dynasty is restartable, not a memory. Twenty-five years of insisting the next album is the one."

the_grudge_texture:
  rival: florida-state
  texture: blood-feud   # the Wide Right games — the rivalry that defined both programs' peaks

the_coach_relationship: savior   # Mario Cristobal, the native son who got The U back to the title game
the_internal_fracture: back-for-real vs same-old-Canes — the faction that says the title game proves The U is restored vs the faction braced for the heartbreak that always follows the tease
register: 80s-renegade-modern-rebuild
