emotional_core:
  primary: grievance       # the series lead that won't translate to modern dominance
  secondary: restoration
  core_variant: the-snub
  one_line: "The half of The Rivalry that won the first game 56-0 and has been chasing vindication ever since."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "82 all-time series wins vs. Lehigh (82-74-5) yet Lehigh dominated the recent decade and has won the last two in the rivalry."

the_wound:
  name: "The inability to translate series dominance into modern championship"
  detail: "Lafayette is 82-74-5 all-time against Lehigh and won the first game 56-0 in 1884. Yet Lehigh has dominated in the 2020s, won the 160th game 38-14 in 2024, and claimed the Patriot League title when Lafayette finished 2-4 in conference. The wound is the gap between historical superiority and modern irrelevance. Lafayette has the better all-time record but Lehigh gets to claim the present."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win The Rivalry again and prove the historical edge still matters — reclaim the narrative from Lehigh and the modern Patriot League."
  drought: { since: 2024, unit: relevance }

the_chip:
  villain: big_brother
  text: "Lehigh. The fanbase reminds itself: Lafayette won 82 of the 160 games and won the first game 56-0 — the program that started The Rivalry should be running it. Instead, Lehigh has taken the narrative and the recent wins. The fanbase says: we should be better."

the_delusion:
  tone: load-bearing
  text: "Fans cling to the all-time series lead (82-74-5) as proof that Lafayette should be winning now — that history has weight in a rivalry defined by the moment. They know Lehigh has built something better in the present, but they believe anyway."

the_grudge_texture:
  rival: lehigh
  texture: blood-feud

the_coach_relationship: savior   # John Troxell named Patriot League Coach of Year 2024, signed extension
the_internal_fracture: history-obsession vs. present-focused — the faction that clings to the 82-74-5 advantage vs. those accepting Lehigh is better right now
register: patriotic-grievance
