# ── STORY CANON (doc 64) — what makes this program unique & amazing. ──
story_canon:
  the_unique_thing: "The half of The Rivalry that started it all — Lafayette won the first game 56-0 in 1884 and holds the all-time series edge 82-74-5. The Rivalry IS college football's most-played matchup (160 meetings), and Lafayette IS its origin point."
  the_origin: "Lafayette football began in 1884, the same year Lehigh-Lafayette played the first game. The program is embedded in Easton, Pennsylvania, part of the Lehigh Valley identity."
  golden_ages:
    - { era: "1884-1980s", what: "Lafayette dominated the all-time series and won the first game 56-0" }
    - { era: "Early 2000s", what: "Lafayette remained competitive as The Rivalry evolved" }
  legends:
    - { name: "Coach John Troxell", role: "coach", why: "Named Patriot League Coach of the Year 2024 and Eddie Robinson National Coach of the Year finalist; signed contract extension through 2031" }
  canonical_moments:
    - { name: "The First Game (1884)", year: 1884, what: "Lafayette defeated Lehigh 56-0 in the inaugural Rivalry game, winning with dominance that has never been repeated", handling: glory }
    - { name: "160 Games of The Rivalry", year: 2024, what: "The 160th Rivalry game played (November 23, 2024); Lafayette lost 38-14 and Lehigh claimed the Patriot League title", handling: wound }
  the_place: "Easton, Pennsylvania — the Lehigh Valley home where The Rivalry began and defined two towns' football identity for 140 years."
  brand_of_football: "The original, the first, the historical victor — a program defined by being the senior partner in The Rivalry."
  cultural_footprint: "Lafayette football is inseparable from The Rivalry. It's the program that started it all and is defined by the gap between that historic beginning and the modern inability to finish."
  the_ongoing_story: >
    LIVE ARC — 2026-06-13: Lafayette finished 8-4 (6-1 Patriot League) in 2025, improving from 6-6 (2-4) in 2024. Coach John Troxell, named Patriot League Coach of the Year in 2024 and Eddie Robinson National Coach of the Year finalist, signed a contract extension through 2031. The program is ascending, but lost the 160th Rivalry game to Lehigh 38-14 and finished second in the conference. Troxell's extension signals belief in the rebuild; the question is whether Lafayette can reclaim the modern Patriot League after decades of watching Lehigh rise.
  research_checklist:
    - The Rivalry origin (1884, Lafayette's 56-0 win) and its place in college football lore
    - The all-time series record (82-74-5 in Lafayette's favor) and what that means
    - John Troxell's coaching success and philosophy
    - The Lehigh transition and why Lehigh is now better
    - The Easton, PA identity and The Rivalry's cultural footprint
  sources:
    - https://en.wikipedia.org/wiki/The_Rivalry_(Lafayette%E2%80%93Lehigh)
    - https://lehighsports.com/news/2024/11/23/football-lehigh-rolls-to-38-14-win-in-rivalry160-secures-13th-patriot-league-title
    - https://en.wikipedia.org/wiki/2025_Lafayette_Leopards_football_team
    - https://patriotleague.org/

