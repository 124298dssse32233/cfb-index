the_wound:
  name: "The Achilles that stole the breakout"
  detail: "After Fran Brown's electric 10-3 debut in 2024, QB Steve Angeli was leading the nation in passing through four games in 2025 — and tore his Achilles in the second half of an upset of Clemson; Syracuse, just 3-1 to that point, lost its last eight to finish 3-9, last in the ACC."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Turn the Fran Brown energy into something that lasts — an ACC title, a return to the Orange's place among the names that matter, not just a good year that injuries take away."
