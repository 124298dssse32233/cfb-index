the_chip:
  villain: national_media
  text: "Fans are tired of being the program everyone files under 'historic Northeast football' and forgets — the place pundits treat as a recruiting pit stop, a job Fran Brown is supposed to use as a launchpad rather than a destination. They want him to prove the doubters and the bigger jobs wrong."

the_delusion:
  tone: earnest
  text: "The fanbase believes Fran Brown is different — that the home-state recruiter who signed the highest-ranked class in school history is building something real, and that a healthy Angeli plus Brown's energy means the 44 legacy finally gets a modern chapter worthy of it."

