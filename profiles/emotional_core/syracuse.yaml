# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The number 44 — the jersey Jim Brown, Ernie Davis, and Floyd Little all wore, retired into the rafters as a single shared legend. Syracuse is the program that produced the first Black Heisman winner (Davis, 1961) and treats one number as the soul of the whole institution."
  the_origin: "An upstate New York football power that won the 1959 national title 11-0 under Ben Schwartzwalder, became a running-back factory, and spent decades playing indoors in the Carrier Dome — the loudest, strangest home-field in the sport."
  golden_ages:
    - { era: "1959-1961 (Schwartzwalder)", what: "An 11-0 national title and Ernie Davis's Heisman — the first won by a Black player" }
    - { era: "1987-2001 (Pasqualoni / late MacPherson)", what: "Donovan McNabb, Marvin Harrison, sustained top-25 relevance and Big East titles" }
  legends:
    - { name: Ernie Davis, role: player, why: "The first Black Heisman winner (1961); his number 44 is the program's sacred text" }
    - { name: Jim Brown, role: player, why: "Arguably the greatest football player ever, who also wore 44 at Syracuse" }
    - { name: Donovan McNabb, role: player, why: "The QB who carried the 1990s Orange and became a face of the program nationally" }
  canonical_moments:
    - { name: "The 1959 national championship", year: 1959, what: "An 11-0 season and Syracuse's only consensus national title", handling: glory }
    - { name: "Ernie Davis wins the Heisman", year: 1961, what: "The first Heisman awarded to a Black player", handling: glory }
    - { name: "Angeli's torn Achilles", year: 2025, what: "The QB leading the nation in passing goes down upsetting Clemson; an 8-game losing streak follows", handling: heartbreak }
  the_place: "The JMA Wireless Dome (the old Carrier Dome) — the only domed stadium in the Power conferences, where the noise has no roof to escape through and the 44 banners hang above it all."
  brand_of_football: "Northeast grit indoors — a running-back tradition reborn under Fran Brown as a fast, physical, defense-and-attitude program built on relentless recruiting."
  cultural_footprint: "The historic flagship of Northeast college football and a landmark in the sport's racial history — the 44 legacy and Ernie Davis's story carry meaning far beyond the box score."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Fran Brown's electric 10-3 debut in 2024 gave way to a brutal 2025:
    QB Steve Angeli led the nation in passing through four games before tearing his Achilles in an upset of
    Clemson, and a 3-1 start collapsed into an eight-game losing streak and a 3-9 finish, last in the ACC.
    Yet Brown then signed the highest-ranked recruiting class in school history, and a healthy Angeli returns
    for 2026. The bet in the Dome: that 2025 was an injury, not a ceiling.
