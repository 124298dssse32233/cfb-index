story_canon:
  the_unique_thing: "Quarterback U — NC State developed Philip Rivers, Russell Wilson, and Mike Glennon in roughly a decade, an NFL-quarterback pipeline no other ACC program can match. The talent has always been real; the conference title has not come since 1979."
  the_origin: "A land-grant agricultural and engineering university in Raleigh, founded 1887 — the working, technical school of the Research Triangle, the loud red wolf among Tobacco Road's blue bloods."
  golden_ages:
    - { era: "2000–2003 (Philip Rivers / Chuck Amato)", what: "The most talented modern Wolfpack run — four straight bowls and a quarterback who'd rewrite the record book" }
    - { era: "1973–1979 (Lou Holtz era and after)", what: "The program's last ACC championships, capped by the 1979 title" }
  legends:
    - { name: Philip Rivers, role: player, why: "The program's passing king and the face of Quarterback U; a four-year starter and NFL star" }
    - { name: Russell Wilson, role: player, why: "ACC Rookie of the Year, Super Bowl champion — the most accomplished QB the building produced" }
    - { name: Roman Gabriel, role: player, why: "The 1960s star who established NC State's quarterback tradition decades before Rivers" }
  canonical_moments:
    - { name: "The 1979 ACC title", year: 1979, what: "NC State beats Duke to claim the conference — the last ACC championship Raleigh has won", handling: glory }
    - { name: "Wilson's departure", year: 2011, what: "Russell Wilson leaves for Wisconsin amid a baseball/coaching standoff, then wins a Rose Bowl elsewhere — the one who got away", handling: heartbreak }
  the_place: "Carter-Finley Stadium — 'the Howl,' the wolf siren, and a red-clad crowd in the heart of the Research Triangle, fighting for oxygen against the blue next door."
  brand_of_football: "Quarterback-driven and defensively stout under Dave Doeren — 'Brick by Brick,' a patient, development-first build that prizes the long game over the splash."
  cultural_footprint: "The technical, agricultural counterweight to Tobacco Road's basketball royalty — a fanbase whose chip is the conviction that NC State has produced more than it's ever been credited for."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: NC State went 8-5 in 2025 (4-4 ACC) and won the Gasparilla Bowl 31-7
    over Memphis behind sophomore QB CJ Bailey, who threw for 3,105 yards and 31 total touchdowns and chose to
    return for 2026 rather than enter the portal. Dave Doeren, in his 13th season and the program's all-time
    wins leader, is back for year 14 — with the 1979 ACC drought, the longest in the conference, still unbroken.
