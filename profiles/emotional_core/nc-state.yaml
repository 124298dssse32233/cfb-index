  name: "The 2002 team that didn't break through"
  detail: "Philip Rivers' four-year run produced the most talented Wolfpack teams of the modern era and a string of bowl wins, but never an ACC title or a major-bowl breakthrough — the standing reminder that talent in Raleigh has rarely translated to a conference crown."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Win the ACC outright for the first time since 1979 and finish a top-ten season — to convert a decade of nine-win near-misses into the breakthrough Raleigh has been promised, brick by brick."
