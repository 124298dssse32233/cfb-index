the_chip:
  villain: national_media
  text: "Fans are tired of being the forgotten school on Tobacco Road — the one nobody mentions when the cameras find Carolina blue and Duke's gym, even after producing more starting NFL quarterbacks than either of them."

the_delusion:
  tone: earnest
  text: "The fanbase believes the 'Brick by Brick' build is finally close — that with CJ Bailey back, Doeren's patient program is one elite recruiting class and one healthy November from the ACC title that's eluded Raleigh for over four decades."

