emotional_core:
  primary: restoration     # a brand-new program clawing back from a 1-11 floor toward the bowl team it briefly was
  secondary: deprival      # the biggest city without a long football history, still waiting for the program to match the metro
  core_variant: first-ascension
  one_line: "Charlotte is the youngest program in the Power footprint — football didn't exist here until 2013 — trying to build, almost from scratch, a tradition the rest of the sport had a century-long head start on."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A 2019 bowl bid in just the program's seventh season vs a 2025 collapse to 1-11 that exposed how little foundation a decade-old program really has."

the_wound:
  name: "The 1-11 first year of the Albin era"
  detail: "Tim Albin arrived from a MAC-champion Ohio program and went 1-11 (0-8 American) in his debut — a single win that laid bare how far the young 49ers still are from the bowl team they flashed in 2019."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Get back to a bowl and stick there — turn a purpose-built stadium and a booming metro into a program that wins in the American and finally outgrows the newcomer label."
  drought: { since: 2019, unit: bowl }

the_chip:
  villain: national_media
  text: "Niner fans say the rest of the sport treats a program this young like it doesn't count — and they point to the biggest, fastest-growing city in the Carolinas and ask why a metro this size shouldn't eventually have a real football team."

the_delusion:
  tone: earnest
  text: "The fanbase believes the city makes the program inevitable — that a market this big and this rich, with a purpose-built stadium already standing, will sooner or later force Charlotte into a winner, the way the metro forced its way into everything else."

the_grudge_texture:
  rival: old-dominion
  texture: little-brother   # two same-aged programs born together in C-USA; the rivalry the 49ers actually grew up with, renewed for 2027

the_coach_relationship: savior   # Tim Albin, the MAC-champion hire the program is betting the rebuild on
the_internal_fracture: patience-with-the-build vs expect-results-now — the faction that knows a 2013-born program needs time and infrastructure vs the faction that watched a 1-11 year and wants wins from a coach who just won a MAC title
register: charlotte-49ers-fbs-newcomer-2015
