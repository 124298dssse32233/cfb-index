# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Charlotte is football from nothing — a program that didn't exist until 2013, the rare modern startup in a major American city, building a tradition in real time while everyone around it inherited a century of theirs."
  the_origin: "An urban research university in the country's fast-growing Charlotte metro that launched football in 2013 (in a purpose-built on-campus stadium funded in part by Panthers owner Jerry Richardson), jumped to FBS by 2015, and adopted the '49ers' and 'Forever Niner' identity tied to the city's gold-rush history."
  golden_ages:
    - { era: "2019 (Will Healy)", what: "A 7-6 season and the program's first bowl bid (Bahamas Bowl) in just its seventh year of football — the high point so far" }
  legends:
    - { name: Will Healy, role: coach, why: "Took the young program to its first bowl in 2019 — the era fans point to" }
    - { name: Aaron McAllister, role: player, why: "Early-era defensive standout from the program's formative FBS seasons" }
  canonical_moments:
    - { name: "First football game", year: 2013, what: "Charlotte plays its inaugural game, a program born from nothing", handling: glory }
    - { name: "First bowl bid", year: 2019, what: "A 7-6 season earns a Bahamas Bowl berth in only the seventh year of football", handling: glory }
  the_place: "Jerry Richardson Stadium — a purpose-built, on-campus venue opened with the program in 2013, named for the Panthers owner who helped fund it; one of the newest football homes in the FBS."
  brand_of_football: "Startup football — a program still defining its style, leaning on transfers and turnover, building an identity from scratch in a pro-sports city that had no college-football habit."
  cultural_footprint: "The college-football experiment in a big metro — proof of whether a major modern city without football tradition can will a program into being, 'Forever Niner' as a brand built rather than inherited."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Charlotte hired Tim Albin — fresh off a MAC championship at Ohio — and
    his debut went 1-11 (0-8 American), a brutal floor that exposed how thin the foundation still is for a
    program barely a decade old. Albin returns for year two in 2026 with a roster heavy on portal turnover and
    a mandate to rebuild toward the bowl relevance the 49ers briefly tasted in 2019 — the question being
    whether a proven winner can accelerate a build that has no century of history to lean on.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
