# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The triple-option dynasty: Erk Russell's Eagles won six FCS national titles (1985-2000) running an offense nobody at the level could stop, and seeded a coaching tree — Paul Johnson, Brian VanGorder, a generation of option disciples — that carried the scheme to Navy, Georgia Tech and beyond."
  the_origin: "Football was dropped in 1941 and dormant for four decades until Erk Russell, Georgia's famed defensive coordinator, came to Statesboro in 1981, built a program from nothing, and turned a no-name commuter school into an FCS juggernaut almost overnight."
  golden_ages:
    - { era: "1985–1990 (Erk Russell)", what: "Three FCS national titles in six years — a program that didn't exist in 1980 dominating the level" }
    - { era: "1999–2000 (Paul Johnson)", what: "Two more rings running the flexbone option — six total, an FCS dynasty" }
  legends:
    - { name: Erk Russell, role: coach, why: "Built the program from scratch and won the first three titles; 'GATA' and the bald-headed bleed are his" }
    - { name: Paul Johnson, role: coach, why: "Perfected the triple-option, won two titles, then took it to Navy and Georgia Tech" }
    - { name: Adrian Peterson, role: player, why: "Eagles' option workhorse — FCS all-time touchdown machine, four-time All-American" }
  canonical_moments:
    - { name: "First national title", year: 1985, what: "A program four years old wins the I-AA championship under Erk Russell", handling: glory }
    - { name: "First FBS season, Sun Belt title", year: 2014, what: "9-3 and a Sun Belt crown in the very first year up — the move-up done right", handling: glory }
    - { name: "Birmingham Bowl over App State", year: 2025, what: "29-10 over the blood rival to cap a 7-6 bowl season under Helton", handling: glory }
  the_place: "Allen E. Paulson Stadium and 'Beautiful Eagle Creek' — the ditch behind the end zone that became a tailgating shrine; 'GATA' (Get After Their A**) is the program's creed."
  brand_of_football: "The option as identity — a downhill, ball-control, grind-you-out offense born under Russell and Johnson; even in the modern spread era, Statesboro's soul is the flexbone."
  cultural_footprint: "Proof that a commuter school with no football four decades ago can build a real dynasty — and the wellspring of the triple-option's modern coaching tree."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Georgia Southern went 7-6 (4-4 Sun Belt) in Clay Helton's fourth season and
    won the Birmingham Bowl 29-10 over blood rival Appalachian State. Georgia Southern extended Helton through 2029,
    betting on stability after the rocky early-FBS years. The Eagles enter 2026 a steady Sun Belt bowl team chasing
    the conference crown that's eluded them since their dream debut in 2014.
