  core_variant: the-ceiling
  one_line: "Georgia Southern won six national titles running the option through everybody, and Statesboro still carries the chip of a program told all of it stopped counting the day it joined the big league."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "Six FCS national championships and a triple-option lineage that spawned a coaching tree vs a Sun Belt newcomer's ceiling that files every ring under 'before it mattered.'"

the_wound:
  name: "The dynasty that gets an asterisk"
  detail: "Eagles fans grew up on Erk Russell and six rings; the FBS world hears 'six titles' and adds the silent qualifier — at a lower level. The 2017-2021 stretch of losing seasons after the move up nearly proved the doubters' point before Clay Helton steadied it."
  handling: referenceable
  freshness: generational

the_dream:
  text: "A Sun Belt championship and a New Year's-adjacent bowl that makes the option dynasty read as a beginning, not a museum."
  drought: { since: 2014, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Statesboro is two hours from Athens and a world away from the recruiting machine that never once scheduled them; Eagles fans wear the snub like a letterman jacket and would trade a season to take Georgia's measure for one Saturday."

the_delusion:
  tone: self-aware
  text: "Eagle fans will tell you the right option quarterback on a cold November night could still gash anybody in the country — that the offense the giants never solved didn't expire, it just changed conferences."

the_grudge_texture:
  rival: app-state
  texture: blood-feud   # the Sun Belt's nastiest — two mountain-and-south neighbors who genuinely hate it; GS won the 2025 Birmingham Bowl meeting 29-10

the_coach_relationship: forever-ours   # Helton, once SoCal's punching bag, has become Statesboro's steadying hand — extended through 2029
the_internal_fracture: option-purists vs the modern-spread truce — the faction that still wants the triple-option back as identity vs the faction content to win Helton's way as long as it wins
