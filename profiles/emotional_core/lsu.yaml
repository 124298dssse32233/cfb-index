# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Saturday night in Death Valley — Tiger Stadium after dark, 100,000 at their loudest, the most intimidating environment in the sport. LSU is where Louisiana's bottomless football talent meets a night game that feels like a coronation or an execution."
  the_origin: "The flagship of the most football-fertile state per capita in America; a program that won under Paul Dietzel (1958), then Nick Saban (2003), Les Miles (2007), and Ed Orgeron's perfect 2019 team."
  golden_ages:
    - { era: "2003–2007", what: "Saban's 2003 title and Les Miles's 2007 title" }
    - { era: "2019 (Orgeron)", what: "A 15-0 perfect season behind Joe Burrow — one of the greatest teams ever assembled" }
  legends:
    - { name: Joe Burrow, role: player, why: "The 2019 Heisman and the perfect season — the modern LSU peak" }
    - { name: Billy Cannon, role: player, why: "LSU's 1959 Heisman and the Halloween punt-return legend" }
  canonical_moments:
    - { name: "The 2019 perfect season", year: 2019, what: "15-0 and a national title behind Joe Burrow's record-shattering offense", handling: glory }
    - { name: "The 2007 title (Les Miles)", year: 2007, what: "A two-loss national championship and the Mad Hatter's gambles", handling: glory }
  the_place: "Tiger Stadium — 'Death Valley' — at night: the loudest, most intimidating home environment in college football."
  brand_of_football: "NFL talent and night-game chaos — LSU mines the deep Louisiana pipeline and plays its biggest games under the lights, where the program is at its most dangerous."
  cultural_footprint: "The Saturday-night center of a football-mad state; a program whose talent base means it is never rebuilding, only between coaches."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: LSU fired Brian Kelly on Oct 26, 2025 — the day after a 49-25 home loss to
    Texas A&M — eating a $54M buyout, then hired Lane Kiffin away from Ole Miss (55-19 over six years, Ole Miss's
    first-ever CFP berth in 2025). QB Garrett Nussmeier exhausted his eligibility for the NFL Draft; Kiffin rebuilt
    the room through the portal, headlined by Arizona State transfer Sam Leavitt. The bet: that the boldest hire in
    the sport finally ends LSU's boom-bust.
  research_checklist:
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
  sources:
