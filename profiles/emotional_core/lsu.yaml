emotional_core:
  primary: standard       # championship pedigree + the loudest night in the sport — anything less than contention is unacceptable
  secondary: restoration  # the live Kiffin bet to end the boom-bust
  one_line: "LSU has three national titles since 2003 and the loudest night in football — and just ate a $54M buyout to bet that Lane Kiffin is the wild card who finally ends the boom-bust."

self_image:
  archetype: blue-blood-living-up
  standard_gap_frame: "Three national titles since 2003 (2003, 2007, 2019) and a bottomless Louisiana talent pipeline vs a boom-bust pattern that fires a coach every few years chasing the next perfect season."

the_wound:
  name: "The boom-bust — a title, then a teardown"
  detail: "LSU's championship seasons (the 15-0 2019 team especially) are followed by collapses and firings — Orgeron out two years after a title, Brian Kelly fired in October 2025 the day after a 49-25 home loss to Texas A&M. Greatness here is real but never sustained."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Bottle the 2019 magic for good — a fourth title, and a coach who makes Death Valley at night the center of the sport every November."
  drought: { since: 2019, unit: national_title }

the_chip:
  villain: national_media
  text: "The take that LSU is a sleeping giant that keeps hiring wrong — all that talent, all that money, a revolving door of coaches. The fanbase made the boldest bet in the sport that Lane Kiffin is the answer to the joke."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes the talent alone should mean titles — that Louisiana produces enough NFL players that LSU is one right coach from a dynasty, not a decade. The 2019 team is the proof it clings to."

the_grudge_texture:
  rival: alabama
  texture: championship   # the SEC measuring-stick games — Saban's LSU roots make it personal

the_coach_relationship: savior   # Lane Kiffin, the boldest hire in the sport, the new bet to end the cycle
the_internal_fracture: win-now-at-any-cost vs we-keep-doing-this — the faction thrilled LSU paid anything for Kiffin vs the faction exhausted by the fire-and-hire cycle
register: bayou-aristocrat-with-fangs
