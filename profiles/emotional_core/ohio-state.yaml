emotional_core:
  primary: standard       # the Midwest's standing answer — a national-title mandate every year
  secondary:              # standard carries it; the Michigan question is the wound
  one_line: "Ohio State treats every autumn as a national-title mandate — and every November against Michigan as the real season, no matter what the trophy case says."

self_image:
  archetype: blue-blood-living-up
  standard_gap_frame: "Nine national titles — the most recent in 2024 — and a perennial top-five roster vs a four-year stretch of losing the one game the program organizes itself around."

the_wound:
  name: "The Michigan losing streak (2021-2024)"
  detail: "Four straight losses to Michigan from 2021 to 2024 — including 2024, the year Ohio State went on to win the national title anyway — the one failure a championship couldn't fully erase."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Hold the standard — title after title — and end The Game on Ohio State's terms."
  drought: { since: 2024, unit: national_title }

the_chip:
  villain: national_media
  text: "Fans here believe the take that the titles are hollow as long as Michigan owns The Game — a narrative the 2024 championship was supposed to silence and somehow didn't. In Columbus, the asterisk is the rivalry, not the trophy."

the_delusion:
  tone: load-bearing
  text: "Buckeye fans believe anything short of a national title is a failed season — and that the Michigan losses are noise against eight championships, not a pattern. The standard admits no exceptions, which is exactly why it hurts."

the_grudge_texture:
  rival: michigan
  texture: blood-feud   # The Game — the rivalry the program organizes its entire season around

the_coach_relationship: total-trust   # Ryan Day won the 2024 title, resolving the "can't win the big one" question
the_internal_fracture: title-or-failure vs beat-Michigan-first — the faction for whom only a championship counts vs the faction for whom The Game is the whole point, trophy or not
register: dynastic-industrial — precise, unsentimental, institutional, allergic to both underdog framings and pageantry; "the standard is the standard"
