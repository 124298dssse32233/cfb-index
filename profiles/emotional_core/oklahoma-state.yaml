# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Boone Pickens. The oilman alumnus poured a half-billion dollars into Oklahoma State athletics — the largest gift in the history of college sports at the time — turning a perennial also-ran into a program with the facilities of a blue blood. Few schools owe their modern existence so completely to one donor's checkbook."
  the_origin: "An agricultural school in Stillwater that lived for most of the 20th century in Oklahoma's shadow, then was rebuilt — first by Pickens money, then by Mike Gundy — into one of the Big 12's most consistent winners."
  golden_ages:
    - { era: "2010–2014 (Gundy peak)", what: "The 2011 Big 12 title, a 12-1 Fiesta Bowl season, and a No. 3 final ranking" }
    - { era: "2005–2024 (Mike Gundy)", what: "Two decades of bowl seasons and Big 12 relevance — the program's most sustained success" }
  legends:
    - { name: Mike Gundy, role: coach, why: "21 seasons, the 2011 Big 12 title, the most wins in program history — and the 'I'm a man, I'm 40' moment" }
    - { name: Barry Sanders, role: player, why: "The 1988 Heisman winner and one of the greatest college running backs ever — the program's untouchable icon" }
    - { name: Boone Pickens, role: coach, why: "Not a coach, but the donor whose gifts built the modern program; the stadium bore his name" }
  canonical_moments:
    - { name: "2011 Big 12 championship", year: 2011, what: "Beat No. 13 Oklahoma 44-10 in Bedlam to clinch the title, then won the Fiesta Bowl and finished No. 3", handling: glory }
    - { name: "Barry Sanders' 1988 Heisman", year: 1988, what: "The most statistically dominant season by a college running back in history", handling: glory }
    - { name: "Gundy fired amid the 1-11 collapse", year: 2025, what: "The 21-year coach let go after a 1-2 start became a winless Big 12 season", handling: wound }
  the_place: "Boone Pickens Stadium in Stillwater — the orange-out crowds and Bedlam atmosphere, a venue funded into the modern era by the donor whose name it carried."
  brand_of_football: "Stillwater-tough and Gundy-built — for years an up-tempo, high-scoring Big 12 attack paired with a chip-on-the-shoulder defense; now a brand to be rebuilt from scratch."
  cultural_footprint: "Pistol Pete, the cowboy mythology, and the rural-Oklahoma loyalty of a fanbase that defined itself by being its own program — not the other school's little brother."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Oklahoma State cratered to 1-11 (0-9 Big 12) in 2025, losing its final ten
    games. Mike Gundy was fired on September 23 after 21 seasons; Doug Meacham finished as interim. On November 25,
    the Cowboys hired North Texas head coach Eric Morris — the first time since 1969 OSU hired a sitting head coach,
    and the first time ever from an FBS program. Morris inherited a roster gutted by the portal (85-plus new players
    in the overhaul) and the job of restoring a program that the Gundy collapse left at its lowest point in a
    generation.
