# AUTHORED 2026-06-13 from live web research — see story_canon.sources.

emotional_core:
  primary: restoration    # the Gundy era ended in rubble; year one of putting it back together
  secondary: grief        # 20 years of one man's mullet, gone three games into a 1-11 wreck
  core_variant: regime-reset
  one_line: "Oklahoma State spent twenty years as Mike Gundy's program — then fired him three games into a 1-11 collapse and handed a flattened roster to Eric Morris, the first sitting FBS coach Stillwater has ever hired."

self_image:
  archetype: riser-proving
  standard_gap_frame: "The 2011 Fiesta Bowl team that finished No. 3 and the two-decade run of winning seasons vs a winless Big 12 year that erased it all in a single autumn."

the_wound:
  name: "The 1-11 collapse and the end of Gundy"
  detail: "Mike Gundy, the program's identity for 21 seasons, was fired on September 23 after a 1-2 start curdled into the worst year in modern memory: 1-11 overall, 0-9 in the Big 12, ten straight losses. The man who built Oklahoma State into a sustained winner left as the season that ended his tenure became the program's lowest point in a generation."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Get the Cowboys back to bowl season and Big 12 contention — rebuild a winner from a roster torn down to the studs, and make the Gundy years a foundation rather than a peak."
  drought: { since: 2011, unit: conference_title }

the_chip:
  villain: big_brother
  text: "The fanbase spent a generation insisting Stillwater was its own program, not a satellite of the school 80 miles south. A 1-11 season handed Oklahoma every easy joke — and the room is daring Morris to make the rivalry feel like a rivalry again."

the_delusion:
  tone: earnest
  text: "Cowboy loyalists believe the Gundy-era foundation — the facilities, the donor base, the orange-out crowds — means this is a one-year crater, not a decline; that the right hire turns 1-11 back into a winner fast, because the program underneath the record is still real."

the_grudge_texture:
  rival: oklahoma
  texture: little-brother   # Bedlam — the in-state grievance against the bigger Oklahoma program

the_coach_relationship: savior   # Eric Morris inherits a flattened program after the Gundy era ended
the_internal_fracture: gratitude for the Gundy era vs the conviction that it had run its course — the room split between honoring 20 years and admitting the last one made the firing necessary
register: stillwater-loyal-mike-gundy   # DRAFT (from voice_register) — confirm
