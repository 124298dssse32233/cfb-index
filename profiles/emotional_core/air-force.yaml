story_canon:
  the_unique_thing: "Air Force runs the triple option at 7,258 feet with a roster of cadets who will commission as officers — the program where the offense, the altitude, and the institution are all the same argument: that discipline and conditioning can beat raw talent on the right Saturday."
  the_origin: "Founded with the Academy in 1955 and elevated by Fisher DeBerry (1984-2006), who turned the wishbone into a permanent Mountain West weapon and made the Falcons the winningest of the three service academies in head-to-head Trophy play."
  golden_ages:
    - { era: "1984–2006 (Fisher DeBerry)", what: "169 wins, a 1985 12-1 season and Bluebonnet Bowl, and the most Commander-in-Chief's Trophies of any academy" }
    - { era: "2007–present (Troy Calhoun)", what: "An academy grad's two-decade run of bowl trips, 10-win seasons, and sustained Mountain West relevance" }
  legends:
    - { name: Fisher DeBerry, role: coach, why: "Built the modern Falcons; 169 wins and the option identity the program still runs" }
    - { name: Troy Calhoun, role: coach, why: "Academy graduate, 19 seasons, the longest-tenured coach in program history and a living institution" }
    - { name: Chad Hennings, role: player, why: "Outland Trophy winner, fighter pilot, A-10 combat veteran — the literal embodiment of the academy ideal" }
  canonical_moments:
    - { name: "The 1985 12-1 season", year: 1985, what: "DeBerry's peak — a Bluebonnet Bowl win and a top-5 ranking, the high-water mark of academy football", handling: glory }
    - { name: "The 19-game opening-day streak", year: 2025, what: "Air Force opened a season with a win for the 19th straight year — second-longest in the nation behind Ohio State — before the 2025 slide", handling: glory }
  the_place: "Falcon Stadium, carved into the Rampart Range at 7,258 feet — the thin Colorado air is a recruited advantage, plus the cadet wing, the fly-overs, and the parachute team dropping the game ball."
  brand_of_football: "Triple-option precision — assignment football run by future officers; misdirection, cut blocks, and conditioning weaponized to wear down bigger, more talented rosters by the fourth quarter."
  cultural_footprint: "Football as the Academy's most visible recruiting and pride ritual — every Saturday a salute, every senior a commissioning officer, the Trophy a measure of service-branch honor rather than a poll."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Air Force went 4-8 (3-5 Mountain West) in 2025, Troy Calhoun's 19th
    season — a 1-5 start that the defense salvaged late, holding five of the last six opponents under 21 points.
    A 34-31 loss to Navy handed the Commander-in-Chief's Trophy to Annapolis. Entering 2026, Calhoun — now
    the dean of academy coaches — faces the question of whether a triple-option roster can still win the
    Trophy and reach a bowl in the portal era, or whether the model needs modernizing to stop the slide.
