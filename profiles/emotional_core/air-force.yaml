emotional_core:
  primary: honor          # the academy mission first; football is the salute, the trophy is the prize
  secondary: restoration  # claw back the Commander-in-Chief's Trophy after a 4-8 slip
  one_line: "Air Force plays football the way the Academy does everything — disciplined, undersized, and aimed at one trophy that means more than any ranking: the Commander-in-Chief's, decided against Army and Navy."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "The service-academy team that fields 5,000 future officers against rosters stocked with NFL bodies — built to win the Trophy and bowl games, never to chase a national title it was never structured to reach."

the_wound:
  name: "The 2025 slide and a Trophy handed to Navy"
  detail: "After winning 19 straight season openers, the Falcons cratered to 4-8 in 2025 — their defense finally tightened late, but a 34-31 loss to Navy in El Paso handed the Commander-in-Chief's Trophy to Annapolis, the prize the Academy measures its falls against."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win back the Commander-in-Chief's Trophy from Navy and Army, return to a December bowl, and prove the triple-option still bends bigger, faster programs at altitude."
  drought: { since: 2023, unit: conference_title }

the_chip:
  villain: national_media
  text: "Falcons fans say the talking heads write the academy off every August — too small, too slow, the offense from another century — then act surprised when those cadets out-discipline a more talented roster on a Saturday in Colorado Springs."

the_delusion:
  tone: earnest
  text: "The fanbase believes effort, conditioning, and altitude can erase a recruiting-star gap that a spreadsheet says is unbridgeable — that a roster of future officers, drilled to the snap, can simply out-want anyone."

the_grudge_texture:
  rival: navy
  texture: championship   # the Commander-in-Chief's Trophy three-way — the only title that truly matters here
the_coach_relationship: total-trust   # Troy Calhoun, an academy grad, is institution as much as coach
the_internal_fracture: tradition vs adaptation — the faction that wants the option run pure and the Trophy defended above all vs the faction that says the academy must modernize the offense and embrace the portal to stop the 4-8 seasons
