emotional_core:
  primary: redemption
  secondary: house-money
  one_line: "Stony Brook went 0-10 in 2023, hired Billy Cosh, went 8-4 the next year, and finished 6-6 in 2025 — the Seawolves are the most dramatic FCS turnaround story in recent memory, still figuring out whether the Cosh era is a rebuild or the beginning of something real."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A program with four straight Big South titles (2009-2012) and two FCS playoff wins that collapsed to 0-10 before Billy Cosh's immediate turnaround — the Seawolves know their ceiling and are chasing it again from Long Island."

the_wound:
  name: "The 0-10 collapse of 2023"
  detail: "Stony Brook went winless in 2023 — a complete program implosion that led to the firing of Chuck Priore after years of below-.500 finishes. The 0-10 season was the nadir of a program that had won four straight conference titles from 2009 to 2012. The wound is recent and remembered; the Cosh era is the direct response."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Return to the FCS playoffs and revive the Big South dynasty standard — win nine or more games in the CAA and prove Stony Brook is a returning FCS power, not a one-year bounce."
  drought: { since: 2018, unit: relevance }

the_chip:
  villain: committee
  text: "The room says Stony Brook won four straight conference titles, made multiple FCS playoff runs, and still gets treated as an afterthought from Long Island — that the 2023 collapse was a coaching problem, not a program problem, and Cosh has already proven it by going 8-4 in year one."

the_delusion:
  tone: self-aware
  text: "Fans say Billy Cosh's immediate 8-4 turnaround from 0-10 means the program culture is sound and the talent was always there — they believe the 6-6 2025 sophomore slide is noise, and Stony Brook will be back in the FCS playoff picture within two seasons."

the_grudge_texture:
  rival: albany
  texture: blood-feud

the_coach_relationship: savior
the_internal_fracture: turnaround-believers vs prove-it-skeptics — the faction fully bought in on Billy Cosh after the 8-4 miracle vs the faction that saw the 0-10 foundation and needs a playoff bid before extending full faith

