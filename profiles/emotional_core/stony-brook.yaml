story_canon:
  the_unique_thing: "The most dramatic FCS turnaround in recent memory — Stony Brook went 0-10 in 2023, hired Billy Cosh, went 8-4 the next season (winning CAA Coach of the Year), and did it all from a state research university on Long Island that most people think of as a basketball campus."
  the_origin: "Stony Brook transitioned to Division I in 1999 and immediately built a dynasty — winning NEC and Big South championships and making multiple FCS playoff runs. The program joined the CAA in 2013, had two solid seasons, then spent five-plus years below .500 before the 2023 collapse and the Cosh rebuild."
  golden_ages:
    - { era: "2009-2012 (Big South dynasty)", what: "Four straight Big South championships and multiple FCS playoff wins — the program's peak, including two postseason victories" }
    - { era: "2024 (Cosh miracle turnaround)", what: "From 0-10 in 2023 to 8-4 in 2024 — Billy Cosh wins CAA Coach of the Year in his first season, Roland Dempster rushes for 1,332 yards and 18 TDs" }
  legends:
    - { name: Chuck Priore, role: coach, why: "Built the 2009-2012 dynasty — four straight conference titles and the foundation that made Stony Brook an FCS playoff program" }
    - { name: Billy Cosh, role: coach, why: "Turned a 0-10 disaster into an 8-4 season in one year — the fastest FCS turnaround in the modern era; CAA Coach of the Year 2024" }
    - { name: Roland Dempster, role: player, why: "All-American running back who ran for 1,332 yards and 18 TDs in the 2024 turnaround season" }
  canonical_moments:
    - { name: "2009-2012 Big South four-peat", year: 2012, what: "Four straight Big South championships and the program's FCS playoff breakthrough era", handling: glory }
    - { name: "2023 winless season", year: 2023, what: "Stony Brook goes 0-10 — the nadir of the program's history and the end of the Priore era", handling: wound }
    - { name: "2024 turnaround — 8-4", year: 2024, what: "Billy Cosh's first season: from 0-10 to 8-4, the most dramatic FCS single-season turnaround in recent memory", handling: glory }
  the_place: "LaValle Stadium in Stony Brook, New York — the Long Island home of a program whose championship history is one of FCS's underappreciated stories."
  brand_of_football: "Run-first, defense-focused, blue-collar Long Island football — the Cosh system built around Roland Dempster and the run game that shocked the CAA in 2024."
  cultural_footprint: "The FCS program that proved Long Island football is real — four straight Big South titles, a miracle turnaround, and a rivalry with Albany that defines the program's identity in the CAA era."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Stony Brook finished 6-6 (4-4 CAA) in 2025 — Billy Cosh's
    second season, a step back from the 8-4 miracle year but still a winning record for a program that
    was winless just two years earlier. The Seawolves averaged 238.2 passing yards per game (4th in CAA)
    and 19 touchdown passes in 2024; the 2025 slide suggests defensive regression from Cosh's first year.
    The rivalry with Albany — the Battle for the Apple — remains the emotional center of Stony Brook's
    CAA schedule. The program enters 2026 needing a 7-plus win season to prove the turnaround era is
    sustainable, not a one-year wonder.
