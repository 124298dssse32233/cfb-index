story_canon:
  the_unique_thing: "Utah is the original BCS-buster turned conference-conqueror — the program that went undefeated twice as a so-called outsider, then joined the Pac-12 and won it back-to-back, proving over and over that toughness and culture beat recruiting rankings."
  the_origin: "A Salt Lake City program that spent decades in the Mountain West, defined itself by grit and a relentless defense, and used two perfect BCS seasons to force its way into the power-conference world."
  golden_ages:
    - { era: "2004 (Urban Meyer) / 2008 (Kyle Whittingham)", what: "Two undefeated BCS-busting seasons — Meyer's 12-0 Fiesta Bowl team and Whittingham's 13-0 Sugar Bowl team that beat Alabama" }
    - { era: "2021–2022 (Whittingham)", what: "Back-to-back Pac-12 championships and Rose Bowl trips — the conference-killer at its peak" }
  legends:
    - { name: Kyle Whittingham, role: coach, why: "21 years, the 2008 undefeated Sugar Bowl team, two Pac-12 titles — the architect of modern Utah" }
    - { name: Alex Smith, role: player, why: "The quarterback of the 2004 undefeated team and the #1 overall NFL Draft pick" }
  canonical_moments:
    - { name: "The Sugar Bowl over Alabama", year: 2009, what: "Whittingham's 13-0 Utes blow out Alabama to finish undefeated", handling: glory }
    - { name: "Back-to-back Pac-12 titles", year: 2022, what: "Utah wins the conference it was told it didn't belong in — twice", handling: glory }
    - { name: "Whittingham to Michigan", year: 2025, what: "After 21 years, the program's defining coach leaves for a bigger job", handling: wound }
  the_place: "Rice-Eccles Stadium — the Mighty Utah Student Section ('the MUSS'), the Block U on the mountainside, a loud, hard place to play in the Wasatch."
  brand_of_football: "Wasatch grit — physical, defense-first, special-teams-obsessed football that out-toughs more talented teams; the culture is the scheme."
  cultural_footprint: "Salt Lake City's secular football identity in a state where BYU carries the religious flag — the program that proved a Mountain West outsider could climb to the very top of the sport on culture alone."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Utah went 11-2 (7-2 Big 12) in 2025, beating Nebraska 44-21 in the Las
    Vegas Bowl behind All-Big 12 QB Devon Dampier, who returns for 2026. Then Kyle Whittingham left after 21
    years to coach Michigan, and Utah promoted longtime defensive coordinator Morgan Scalley — a 20-year staffer
    — to head coach. The question on the Wasatch: does the toughness-first culture Whittingham built survive
    the man who built it.
