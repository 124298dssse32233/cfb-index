emotional_core:
  primary: grievance      # the program nobody believes in that keeps out-toughing the room and conquering its conference
  secondary: honor        # a 21-year culture handed from Whittingham to the man who lived it for two decades
  core_variant: the-chronic-chip
  one_line: "Utah is the program that walks into every league it joins and wins it on toughness — and just watched the coach who built that culture over 21 years leave for Michigan, handing the keys to the man beside him the whole time."

self_image:
  archetype: riser-proving
  standard_gap_frame: "An undefeated 2008 BCS season and back-to-back Pac-12 titles vs a national reputation that still treats Utah as a regional curiosity rather than the conference-conquering program its record says it is."

the_wound:
  name: "Losing Whittingham to Michigan"
  detail: "After 21 years, Kyle Whittingham left Utah in December 2025 to become head coach at Michigan — not a retirement, a departure to a bigger job. Utah promoted 20-year staffer and defensive coordinator Morgan Scalley to replace him, betting the culture is in the building and not just the man. The transition lands on a high: an 11-2 season capped by a 44-21 Las Vegas Bowl win over Nebraska."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the Big 12 the way they won the Pac-12 — prove the toughness travels, the culture outlasts the coach, and the program belongs in the national conversation it keeps getting left out of."
  drought: { since: 2022, unit: conference_title }

the_chip:
  villain: national_media
  text: "Utah fans are tired of being the program the country keeps underrating — the conference-killer everyone treats as a fluke until it does it again. They'll tell you the Utes have out-toughed bluer blood than anyone wants to admit."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes the culture is bigger than any one coach — that Whittingham built something in the building that Morgan Scalley simply inherits, and that Utah will keep out-working and out-hitting programs with twice the recruiting stars."

the_grudge_texture:
  rival: byu
  texture: blood-feud   # the Holy War — the genuine, religiously-charged in-state hatred with BYU

the_coach_relationship: legends-shadow   # Morgan Scalley steps out of Kyle Whittingham's 21-year shadow; every move now measured against the era he served in
the_internal_fracture: continuity-faith vs uncertainty — the faction sure Scalley keeps the machine running vs the faction nervous that 21 years of culture left with the man who built it
