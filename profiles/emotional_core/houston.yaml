emotional_core:
  primary: grievance      # the Cougars spent decades locked out of the big-money league next door
  secondary: restoration  # finally in the Big 12, Willie Fritz just delivered a 10-win season to prove they belong
  core_variant: the-ceiling
  one_line: "Houston is the program that once put up 100 points and produced Andre Ware's Heisman, then spent thirty years on the wrong side of the velvet rope — and is finally answering the bell in the Big 12 with a ten-win season."

self_image:
  archetype: riser-proving
  standard_gap_frame: "Run-and-Shoot glory and a 1989 Heisman vs three decades shut out of a power conference while Texas and Texas A&M pulled away — a long climb the Big 12 invite finally interrupted."

the_wound:
  name: "Left behind in realignment"
  detail: "When the Southwest Conference broke up in 1996, Houston — a Houston-based program with real history — was left out of the Big 12 while the in-state powers were waved in, condemning the Cougars to two decades of mid-major exile despite living in one of the country's richest talent beds."
  handling: referenceable
  freshness: generational

the_dream:
  text: "A Big 12 championship and a Playoff bid that erases the 'mid-major' tag for good — the trophy that says the wait in the cold was worth it."
  drought: { since: 2006, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Cougar fans watched Texas and Texas A&M get the invitations and the TV money while a program in the nation's fourth-largest city was told to wait its turn; they carry the snub of being the third team in their own state into every Big 12 Saturday."

the_delusion:
  tone: earnest
  text: "The faithful believe the deepest recruiting city in America has been theirs to mine all along — that with a power-conference platform finally under them, Houston has the talent at its doorstep to out-grow the very programs that locked them out."

the_grudge_texture:
  rival: rice
  texture: border-war   # the Bayou Bucket — the in-city Houston rivalry, the trophy that's most personal

the_coach_relationship: savior   # Willie Fritz arrived and in year two delivered the 10-win Big 12 breakthrough
the_internal_fracture: built-different pride vs power-conference impatience — fans who cherish the scrappy climb vs fans who now demand the program act and recruit like the big-league member it became
register: cougar-h-cogs-up
