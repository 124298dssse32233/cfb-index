  - Case Keenum's program only — Tom Herman's 2015 era extended the canon

# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The Run-and-Shoot scoreboard machine: Houston's late-1980s offense under Jack Pardee and John Jenkins put up video-game numbers — including a 95-point game and Andre Ware's 1989 Heisman, the first won by an African-American quarterback — and rewrote what offense could look like."
  the_origin: "A commuter-and-urban university in the nation's fourth-largest city, a charter member of the Southwest Conference's later years, that built an outsized football identity on offense and the deepest high-school talent pool in America."
  golden_ages:
    - { era: "1976–1984 (Bill Yeoman)", what: "The Veer offense, SWC titles, and the program's first sustained national relevance" }
    - { era: "1987–1990 (Pardee / Jenkins)", what: "The Run-and-Shoot, the 95-point game, and Andre Ware's 1989 Heisman" }
  legends:
    - { name: Andre Ware, role: player, why: "1989 Heisman winner; the face of the Run-and-Shoot explosion" }
    - { name: Case Keenum, role: player, why: "The NCAA's all-time leader in passing yards and touchdowns; the modern program's icon" }
    - { name: Bill Yeoman, role: coach, why: "Inventor of the Veer offense and the program's winningest coach" }
  canonical_moments:
    - { name: "Ware wins the Heisman", year: 1989, what: "Houston's first and only Heisman, the first by a Black quarterback", handling: glory }
    - { name: "Peach Bowl over Florida State", year: 2015, what: "Tom Herman's 13-1 Cougars beat FSU 38-24 — the high-water mark of the mid-major era", handling: glory }
    - { name: "Big 12 breakthrough", year: 2025, what: "A 10-win season in just their third year in the league, capped by a 38-35 bowl win over LSU", handling: glory }
  the_place: "Space City Financial Stadium (formerly TDECU Stadium) on the urban campus — an intimate, loud on-campus home in the middle of Houston, a city of pro teams the Cougars compete with for attention."
  brand_of_football: "Offense as identity — from Yeoman's Veer to Pardee's Run-and-Shoot to Keenum's air raid, Houston's brand is points; under Fritz it's added a physical, ball-control toughness."
  cultural_footprint: "The hometown college team of a sprawling pro-sports city, and a historic platform for the Black quarterback — Ware's Heisman a landmark the program still carries with pride."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Houston went 10-3 in 2025 — its first 10-win season since 2021 — and beat LSU
    38-35 in its bowl game under second-year coach Willie Fritz, tying for fourth in the Big 12. Houston joined the
    Big 12 in 2023 after decades shut out of a power league. Reloading through the portal (including ex-Tulane back
    Makhi Hughes) and ranked in early 2026 top-25 projections, the Cougars enter the season as a genuine Big 12
    contender chasing the program's first power-conference title.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
