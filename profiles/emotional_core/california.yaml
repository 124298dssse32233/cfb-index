emotional_core:
  primary: deprival        # the world's best public university with a football program that never quite matches the brain power
  secondary: disbelief     # a coast-to-coast ACC seat for a Berkeley school the old conference left behind — still surreal
  one_line: "California is the best public university on earth fielding a football team that won the most chaotic play in the sport's history and has spent the 43 years since chasing a moment that big."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "The Play, an Aaron Rodgers near-perfect 2004, and a No. 4 national ranking that year vs a present of 7-6 seasons, a fired coach, and a 2,500-mile commute to a conference that isn't the Pac."

the_wound:
  name: "Wilcox out after the slow fade"
  detail: "The 2025 Bears started 4-1 and finished 7-6 with a Hawaii Bowl loss, and the late slide cost Justin Wilcox his job after nine years and a 48-55 record — the longest-tenured coach in the West cut loose, with Oregon's Tosh Lupoi, a Cal alum, hired to start over."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Be a football school that matches the academic name — a Rose Bowl, a conference title, one more season where Berkeley produces a top-five team and the country has to take Cal seriously again."
  drought: { since: 2006, unit: conference_title }

the_chip:
  villain: national_media
  text: "Fans here believe old Blues will tell you the rankings forget Cal exists between rivalry weeks — that a school this good at everything else gets written off in football by people who can't name a single thing about the program except a five-lateral play from 1982."

the_delusion:
  tone: earnest
  text: "The fanbase believes Berkeley should be a football power — that the best public school on the planet, in talent-soaked California, ought to win, and that the right coach and the right year will finally make the program live up to the diploma."

the_grudge_texture:
  rival: stanford
  texture: blood-feud   # the Big Game and the Stanford Axe — the rivalry The Play belongs to

the_coach_relationship: savior   # Tosh Lupoi, the alum brought home from Oregon to rebuild
the_internal_fracture: do-it-the-Berkeley-way vs win-at-all-costs — the faction proud that Cal stays academically pristine and clean even if it caps the ceiling vs the faction that wants the program to spend, transfer, and win like a real Power-conference team
register: berkeley-old-blues-academic-bears
