# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The Play — Cal's five-lateral kickoff return through the Stanford band to win the 1982 Big Game on the final snap, the single most famous and chaotic ending in college-football history, owned forever by Berkeley."
  the_origin: "The flagship of the University of California system in Berkeley — the world's top public university and a hotbed of Nobel laureates — fielding football in the Bay Area since the 19th century, where 'Go Bears' has always carried an academic accent."
  golden_ages:
    - { era: "1920s (Wonder Teams)", what: "Andy Smith's 'Wonder Teams' went years without a loss — the program's deepest historical run of dominance" }
    - { era: "2004 (Jeff Tedford / Aaron Rodgers)", what: "A 10-2 season and a No. 4 ranking behind a near-perfect Aaron Rodgers — Cal's modern peak" }
  legends:
    - { name: Aaron Rodgers, role: player, why: "The 2004 quarterback who became an NFL MVP and the program's most famous modern player" }
    - { name: Joe Roth, role: player, why: "The 1970s QB who played through terminal cancer; his No. 12 is retired and honored every year" }
    - { name: Jeff Tedford, role: coach, why: "Led the 2000s resurgence, including the No. 4 2004 team" }
  canonical_moments:
    - { name: "The Play", year: 1982, what: "Five laterals and a kickoff return through the Stanford band beat the Cardinal as time expires", handling: miracle }
    - { name: "Joe Roth's final season", year: 1976, what: "Roth plays out a season while dying of cancer; his jersey is retired", handling: heartbreak }
    - { name: "2004 No. 4 ranking", year: 2004, what: "Rodgers' Bears climb to No. 4 and just miss a Rose Bowl bid", handling: glory }
  the_place: "California Memorial Stadium — built directly atop the Hayward Fault in the Berkeley hills, with a view of the Bay and the Campanile beyond the rim; a venue literally split by an earthquake fault line."
  brand_of_football: "Bay Area football with a Berkeley conscience — talented, occasionally explosive, defined as much by The Play's improvisational chaos and the program's academic pride as by any single style."
  cultural_footprint: "Where elite academia meets big-time football — a program that carries the brand of the world's best public university, and whose Joe Roth tribute and clean-program ethos give it a moral identity rare in the sport."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Cal closed its first chapter in the ACC — the cross-country home the
    program landed in after the Pac-12's collapse — by going 7-6 in 2025 and firing nine-year coach Justin
    Wilcox after a late slide and a Hawaii Bowl loss. The Bears brought home alum Tosh Lupoi from Oregon as
    the 35th head coach. With a winnable 2026 slate and a fresh staff, the question in Berkeley is whether a
    homecoming hire can finally turn a Power-conference seat into Power-conference results.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
  sources:
    - https://en.wikipedia.org/wiki/2025_California_Golden_Bears_football_team
    - https://www.on3.com/news/california-fires-head-football-coach-justin-wilcox/
    - https://en.wikipedia.org/wiki/The_Play_(American_football)

