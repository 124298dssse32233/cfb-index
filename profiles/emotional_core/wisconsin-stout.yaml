  canonical_moments:
    - { name: "Clayt Birmingham era", year: 2010, what: "Beginning of 15-season tenure as head coach, the longest-running leadership in the modern WIAC", handling: glory }
  the_place: "Johnson Field — the home of Stout football and a program known for steady execution."
  brand_of_football: "Stable, disciplined, blue-collar execution — Stout football is about doing things right, game after game, season after season, without expecting national attention."
  cultural_footprint: "The program that proves stability can be respectable without being great — Stout represents consistent, competent Division III football that matters in the WIAC but hasn't yet mattered nationally."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: UW-Stout went 6-5 in 2025 under 15th-year coach Clayt Birmingham. The Blue
    Devils remain a steady WIAC presence but continue the conference-title drought that stretches back to 1985. With
    River Falls winning a national championship and Platteville winning back-to-back WIAC titles, Stout's stable 6-5
    seasons feel like a program at a crossroads: continue the stability under Birmingham, or make a coaching change
    seeking breakthrough. For now, Stout is the program that shows up and competes, without ascending to the next level.
