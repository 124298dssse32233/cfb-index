emotional_core:
  primary: honor
  secondary: contentment
  core_variant: null
  one_line: "The program with the steady coach: UW-Stout is defined by Clayt Birmingham's 15 seasons of competent, stable football — no titles, but no chaos either."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "Stout is the WIAC program that does what it's supposed to do — wins 5-6 games, stays respectable, builds a culture. No national titles, no Stagg Bowls, no historic upsets. Just competent Division III football played with dignity, for 15 years under the same coach in a conference where that stability is increasingly rare."

the_wound:
  name: "The respectability without breakthrough"
  detail: "Stout has been good enough to matter within the WIAC but has never broken through nationally. Fifteen seasons under one coach should produce a Stagg Bowl run, a conference title, something that marks an era. Instead, the Blue Devils are the steady program in a conference where the other teams are winning championships and national titles. The wound is knowing you belong, just never quite ascending."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Win a WIAC championship. Get to a Stagg Bowl. Prove that Stout's 15-year stability can translate into one elite season that changes the program's legacy from 'steady' to 'championship contender.'"
  drought: { since: 1985, unit: conference_title }

the_chip:
  villain: none
  text: "Fans believe Stout football belongs at the table with WIAC powers, and the next window could be the one that breaks through."

the_delusion:
  tone: earnest
  text: "That Stout, with the right year, could be a Stagg Bowl team. That the stability and execution Birmingham has built are the foundation for a breakthrough. The fanbase believes it because the alternative — accepting 'good program, never great' — is harder to live with."

the_grudge_texture:
  rival: null
  texture: none

the_coach_relationship: forever-ours
the_internal_fracture: stability-pride vs breakthrough-hunger — the faction satisfied with consistent winning seasons and a respected coach vs the faction frustrated that 15 years of Clayt Birmingham hasn't produced a single championship
register: stout-steady-birmingham-forever-ours
never_use:
  - Bottom-tier WIAC program (6-5 record and consistent play proves respectability)
  - Never had a chance (15-year stability under one coach creates opportunities)

story_canon:
  the_unique_thing: "The consistency: Clayt Birmingham has been the head coach for 15 seasons, the longest-tenured coach in the modern WIAC, building a stable program that competes year after year without breakthrough."
  the_origin: "A Wisconsin-Stout program that became a steady WIAC presence over decades, reaching its modern stability through the Birmingham era starting in the early 2010s. Stout is the program built on respect and execution, not flash."
  golden_ages:
    - { era: "2010s-2020s (Clayt Birmingham)", what: "15 seasons of consistent 5-6 win records and stable football; the era of respectability" }
  legends:
