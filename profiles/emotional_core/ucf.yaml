emotional_core:
  primary: grievance      # the program that went undefeated, got locked out of the Playoff, and declared itself champion anyway
  secondary: restoration  # now in the Big 12, trying to turn the disruptor swagger into a winning Power-Four record
  core_variant: the-ceiling
  one_line: "UCF is the program that finished 13-0, watched the sport refuse to consider it, and hung a national-championship banner anyway — a swagger it dragged all the way into the Big 12."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A 13-0 self-declared 2017 title and a hard-won seat at the Power-Four table vs back-to-back losing seasons in the Big 12 that ask whether the riser can actually win at the level it fought to reach."

the_wound:
  name: "Earning the seat, then struggling in it"
  detail: "UCF spent a decade demanding to be taken seriously and got its wish — a 2023 jump to the Big 12. But the Power-Four reality has been hard: a 4-8 first year, and a 5-7 (2-7) 2025 under returning architect Scott Frost that missed a bowl, the swagger running into a tougher schedule than the AAC ever offered."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win in the Big 12 the way they once won in the American — a bowl, a winning record, proof the seat at the big table was earned and not borrowed."
  drought: { since: 2023, unit: bowl }

the_chip:
  villain: committee
  text: "The 2017 snub is foundational scripture in Orlando: an undefeated team the system wouldn't even rank highest among one-loss blue bloods. Knights fans will tell you the banner is real, the title is theirs, and the committee can keep pretending otherwise."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes the 2017 national championship is legitimate and earned — that an undefeated season is an undefeated season, and that the program out-grew the Group of Five precisely because it refused to accept the ceiling everyone else assigned it."

the_grudge_texture:
  rival: south-florida
  texture: blood-feud   # the War on I-4 — the in-state, in-city Florida rivalry that defines UCF's grievance energy

the_coach_relationship: legends-shadow   # Scott Frost — architect of the 13-0 — returned in 2025; every UCF coach lives under the 2017 standard, and now Frost lives under his own
the_internal_fracture: vindication vs realism — the faction insisting the program belongs in the Power Four on swagger vs the faction worried two losing Big 12 years prove otherwise
register: orlando-charge-on-knights-believer   # DRAFT (from voice_register) — confirm
