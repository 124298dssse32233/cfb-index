story_canon:
  the_unique_thing: "UCF is the program that went 13-0 in 2017, got shut out of the Playoff, and declared itself national champion anyway — banner, rings, parade and all. No other program has ever weaponized a snub into an identity that fully."
  the_origin: "A massive young commuter university in Orlando that grew from a 1979 startup program into the largest school in the country, and decided the fastest way to be taken seriously was to refuse to wait for permission."
  golden_ages:
    - { era: "2017 (Scott Frost)", what: "A perfect 13-0 season, a Peach Bowl win over Auburn, and a self-declared national championship" }
    - { era: "2018 (Josh Heupel)", what: "12-1 and a Fiesta Bowl berth — proof the 2017 run was a methodology, not a fluke" }
  legends:
    - { name: Scott Frost, role: coach, why: "Built the 13-0 team and the self-declared title; returned to UCF in 2025" }
    - { name: McKenzie Milton, role: player, why: "The quarterback of the undefeated era — and the gruesome 2018 injury that became its emotional center" }
  canonical_moments:
    - { name: "The self-declared national championship", year: 2017, what: "13-0, a Peach Bowl win over Auburn, and a banner UCF hung itself", handling: glory }
    - { name: "The McKenzie Milton injury", year: 2018, what: "The face of the program suffers a catastrophic leg injury vs USF", handling: heartbreak }
    - { name: "The Big 12 jump", year: 2023, what: "UCF leaves the American for the Power-Four Big 12 — the ascent completed", handling: glory }
  the_place: "FBC Mortgage Stadium — 'the Bounce House' — an on-campus venue that literally bounces when the Orlando student section jumps."
  brand_of_football: "Disruptor swagger — fast, brash, chip-on-the-shoulder offense from a program that decided being told no was the whole point."
  cultural_footprint: "The proof-of-concept for every Group-of-Five program that ever felt locked out — UCF turned a snub into a banner and a banner into a Power-Four invitation, and Orlando claims it as the city's own."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Scott Frost, architect of the 13-0 season, returned to UCF in 2025 and
    went 5-7 (2-7 Big 12), missing a bowl after a 4-8 first year in the league. Frost is signed through 2029.
    The question in Orlando: can the man who built the swagger make it win in the Power Four, or is the gap
    between the AAC and the Big 12 wider than the banner suggests.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
