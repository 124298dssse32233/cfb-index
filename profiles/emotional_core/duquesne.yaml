  text: "The fanbase carries the weight of Pittsburgh's dominance in the same city. Duquesne is the other program, the Jesuit school that once beat Pitt, then lost the rivalry for 86 years. The City Game's return is validation—and every loss to Pitt reinforces the gap."

the_delusion:
