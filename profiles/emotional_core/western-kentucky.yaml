emotional_core:
  primary: contentment     # a program that quietly makes a bowl every single year and is at peace being the steady one
  secondary: grievance     # the chip of being Kentucky's other program, forever overshadowed by Lexington
  one_line: "Western Kentucky is the program that just makes a bowl, every year, no drama — seven straight under Tyson Helton, the latest a New Orleans Bowl win, while the rest of the state only watches Lexington."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A 2002 national championship at the FCS level and Jeff Brohm's pass-happy 2015-16 peak vs a Conference USA ceiling that says the steady bowl trips don't count where it matters."

the_wound:
  name: "Living in Kentucky's shadow"
  detail: "There is a whole state of basketball blue between Bowling Green and any national football spotlight, and the Hilltoppers' biggest fight is for attention they rarely get — a reliably-good program in a state that only looks toward Lexington's basketball and, lately, Wildcat football."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Win Conference USA again and crash a January bowl conversation — to turn 'reliably good' into a season the whole state, for once, has to notice."
  drought: { since: 2016, unit: conference_title }

the_chip:
  villain: national_media
  text: "Hilltopper Nation knows the joke — that people hear 'Kentucky football' and never think of Bowling Green. They say the program that wins eight or nine games like clockwork deserves more than to be the state's footnote, and they keep the receipts."

the_delusion:
  tone: self-aware
  text: "Hilltopper fans believe Bowling Green is quietly one of the best jobs in the Group of Five — a quarterback factory that can hang with anyone on the right night. They know the resources are modest, and they trust the program to keep overachieving anyway."

the_grudge_texture:
  rival: middle-tennessee
  texture: blood-feud   # the 100 Miles of Hate — the I-65/I-24 rivalry with MTSU, the game that means most

the_coach_relationship: total-trust   # Tyson Helton has made a bowl every year; the fanbase trusts the steady hand
the_internal_fracture: steady-is-enough vs swing-for-more — the faction content with a bowl every December vs the faction that remembers the Brohm-era fireworks and wants a league title, not just bowl eligibility
