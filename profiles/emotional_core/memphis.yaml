story_canon:
  the_unique_thing: "The 2019 peak — a 12-2 season, the AAC championship, and a Cotton Bowl berth under Mike Norvell, the year Memphis announced itself as a program that wins big and means it, fused to a Grit-and-Grind city identity borrowed from its NBA team."
  the_origin: "An urban program in Memphis, Tennessee that climbed from Conference USA into the American and built, in the late 2010s, one of the most consistent Group-of-Five winners in the country."
  golden_ages:
    - { era: "2016–2019 (Mike Norvell)", what: "The rise to a 12-2 AAC champion and Cotton Bowl team" }
    - { era: "2019–2025 (Ryan Silverfield)", what: "Sustained success including back-to-back 10-win seasons in 2023 and 2024" }
  legends:
    - { name: Mike Norvell, role: coach, why: "Built the 2019 AAC-champion peak before leaving for Florida State" }
    - { name: DeAngelo Williams, role: player, why: "Record-setting running back; the program's most iconic player" }
    - { name: Ryan Silverfield, role: coach, why: "50-25 over six years with two 10-win seasons before Arkansas hired him" }
  canonical_moments:
    - { name: "The 2019 AAC championship", year: 2019, what: "A 12-2 season, the conference title, and a Cotton Bowl berth — the program's modern high point", handling: glory }
    - { name: "Beating Arkansas, then losing the coach", year: 2025, what: "Memphis beats Arkansas 32-31, and Arkansas responds by hiring Silverfield away", handling: wound }
  the_place: "Simmons Bank Liberty Stadium in Memphis — a city venue with a Beale Street postgame culture, football as one more thing the city does loud."
  brand_of_football: "Up-tempo, explosive offense fused to a Grit-and-Grind toughness ethos — Memphis scores, and wears its city's identity on its sleeve."
  cultural_footprint: "Go Tigers Go — the football pride of a basketball-loving city, a program that turned sustained winning into a civic identity and a chip about being overlooked."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Memphis went 8-5 (4-4 American) in 2025 — Ryan Silverfield beat Arkansas
    32-31, then Arkansas hired him, and the Tigers lost the Gasparilla Bowl 31-7 to NC State under interim coach
    Reggie Howard. Memphis then hired Charles Huff, fresh off a one-year turnaround at Southern Miss, to keep the
    machine running. The 2026 question: does sustained Memphis success survive another coaching change, and can
    Huff finally force the bigger door open?
