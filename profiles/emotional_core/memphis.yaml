emotional_core:
  primary: grievance      # a program that builds winners and keeps getting passed over for the big invitation
  secondary: restoration  # a coaching change after the latest poacher, betting the machine keeps running
  core_variant: the-ceiling
  one_line: "Memphis builds 10-win teams and watches them get raided — for the players, for the coach, for the conference invite that never comes — and the chip is that the city keeps producing winners the powers keep treating as a parts bin."

self_image:
  archetype: riser-proving
  standard_gap_frame: "Back-to-back 10-win seasons in 2023 and 2024 and an 8-5 follow-up vs a program still outside the power structure, watching its head coach get hired away again."

the_wound:
  name: "Silverfield to Arkansas"
  detail: "Ryan Silverfield went 50-25 over six seasons, beat Arkansas 32-31 in Memphis in 2025 — and then Arkansas hired him away. The Tigers finished 8-5, lost the Gasparilla Bowl 31-7 to NC State under an interim, and turned the program over to Charles Huff: proof again that success at Memphis is something other programs come to harvest."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the American outright again and force the door — a conference title and a New Year's-tier bowl that makes the city impossible to leave off the list."
  drought: { since: 2019, unit: conference_title }

the_chip:
  villain: blue_bloods
  text: "The fanbase watches every realignment shuffle leave Memphis on the outside while it out-wins programs that got the call — the sense that the city beats people who'll never have to share a conference with it."

the_delusion:
  tone: earnest
  text: "The fanbase believes the program is a sustained-success machine bigger than any one coach — that even after Silverfield walked, Memphis keeps winning, because the city and the talent base are the engine, not the man holding the headset."

the_grudge_texture:
  rival: mississippi-state
  texture: border-war   # the Battle for the Bones — the Memphis–Mississippi State trophy game

the_coach_relationship: savior   # Charles Huff arrives to keep the machine running after Silverfield's exit
the_internal_fracture: trust-the-machine vs fear-the-drain — the faith that Memphis reloads through any departure vs the fatigue of being everyone else's hire-and-poach pool
register: memphis-grit-grind-tigers
