story_canon:
  the_unique_thing: "Brian Urlacher came from here — the Hall of Fame linebacker was a Lobo before he was a Chicago Bears legend, and New Mexico's defensive identity has carried his shadow ever since. Add a home field a mile above sea level, and the Lobos have always had two weapons: a defense and the thin air."
  the_origin: "The University of New Mexico in Albuquerque, founded 1889, playing football since 1892 — the Lobos at high altitude in the high desert, a wolf-pack defensive identity in one of the Mountain West's toughest jobs."
  golden_ages:
    - { era: "1998–2008 (Rocky Long)", what: "A UNM alum builds the program's most stable modern era — multiple bowls, the 2007 New Mexico Bowl shutout, and the 3-3-5 defense" }
    - { era: "2025 (Jason Eck)", what: "Nine wins, a Mountain West co-first finish, and a bowl in year one — the best season in nearly two decades" }
  legends:
    - { name: Brian Urlacher, role: player, why: "Pro Football Hall of Famer; the greatest defender the program ever produced, an All-American Lobo in 1999" }
    - { name: Rocky Long, role: coach, why: "A UNM alum and the program's defensive identity, who delivered its most sustained modern success and the 3-3-5 scheme" }
  canonical_moments:
    - { name: "2007 New Mexico Bowl shutout", year: 2007, what: "Rocky Long's 9-4 Lobos blank Nevada 23-0 in the New Mexico Bowl — a high point of the program's best modern era", handling: glory }
    - { name: "Eck's first-year miracle", year: 2025, what: "Picked 11th of 12, New Mexico goes 9-4, ties for first, ends a long bowl drought, and Jason Eck wins MW Coach of the Year", handling: glory }
  the_place: "University Stadium ('The Pit' of football, at roughly 5,100 feet) in Albuquerque — a mile-high desert venue where the thin air is meant to wear visiting offenses down by the fourth quarter."
  brand_of_football: "Defense and altitude — a wolf-pack, 3-3-5 defensive heritage from the Rocky Long years, now paired with Jason Eck's revival on both sides of the ball."
  cultural_footprint: "The flagship state university's football program in a basketball-leaning, geographically isolated market — a survivor's identity that just had its proudest day in a generation."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: In Jason Eck's first season, New Mexico went 9-4 (6-2 Mountain West),
    tied for first after a preseason 11th-of-12 projection, ended a bowl drought dating to 2016, and Eck was
    named MW Coach of the Year before a 20-17 overtime Rate Bowl loss to Minnesota. The 2026 question in
    Albuquerque: was this the start of a sustained climb, or the kind of one-year spike the Lobos have seen flame out before?
