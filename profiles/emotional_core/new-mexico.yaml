emotional_core:
  primary: restoration    # the worst job in the Mountain West just had its best first-year coach ever
  secondary: disbelief    # 9 wins and a bowl from a team picked 11th of 12 — nobody saw it coming
  core_variant: perpetual-rebuild
  one_line: "New Mexico is the program that hadn't seen a bowl since 2016 and was picked dead last — then went nine wins, tied for first, and won Mountain West Coach of the Year in Jason Eck's very first season."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A nine-win 2025 and a Mountain West title chase against a decade of losing, a revolving door of coaches, and a reputation as one of the toughest jobs in the conference."

the_wound:
  name: "The lost decade"
  detail: "Between Rocky Long's 2007 bowl team and Jason Eck's 2025 arrival, New Mexico went without a bowl game for the better part of two decades — years of losing seasons and coaching turnover that made the 2025 breakthrough feel almost unbelievable."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Make 2025 the start of something, not a one-off — back-to-back bowls, a Mountain West title, and proof that the altitude in Albuquerque can be a home-field weapon again instead of a footnote."
  drought: { since: 2016, unit: bowl }

the_chip:
  villain: national_media
  text: "Fans relish that a team the preseason poll buried at 11th of 12 tied for first and earned Coach of the Year — and they want every analyst who wrote the Lobos off to explain how they missed it."

the_delusion:
  tone: earnest
  text: "The fanbase believes 2025 proved the doubters wrong for good — that Jason Eck has cracked the code on the league's hardest job, that the thin air at University Stadium is a real edge, and that the Lobos belong in the Mountain West conversation now, not the cellar."

