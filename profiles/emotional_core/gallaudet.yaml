story_canon:
  the_unique_thing: "Gallaudet University is the world's only university where all academic programs and services are designed for deaf and hard-of-hearing students. It is the birthplace of American Sign Language (ASL). And its football program invented the huddle in 1894 when deaf QB Paul D. Hubbard realized that his signed play-calls were readable by the opposing sideline—he invented the circular formation to conceal his signals, and the innovation became universal by the 1920s and is now standard in all football at all levels."
  the_origin: "Gallaudet University, founded 1864 in Washington, DC, is the world's only institution where all academic and residential programs are designed for deaf and hard-of-hearing students. The football program dates to the 1880s and has competed continuously, serving as a proof point that deaf athletes are elite athletes."
