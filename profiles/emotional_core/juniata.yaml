the_chip:
  villain: none
  text: "Fans here believe the chip is internal: Juniata had one perfect moment (1973 runner-up) and has never come close since. That gap haunts the program."

the_delusion:
  tone: self-aware
  text: "Juniata fans believe the 1973 runner-up finish proves the program can win — that one more rebuild, one more coach, the Eagles can climb out of the basement."

the_grudge_texture:
