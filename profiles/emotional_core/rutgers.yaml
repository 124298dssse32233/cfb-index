emotional_core:
  primary: honor          # the birthplace of the sport — Rutgers played the first college football game ever, and carries that title like a family name
  secondary: deprival     # the founder who never got to win it: a Big Ten member still chasing its first division/conference crown
  one_line: "Rutgers held the first college football game in history — November 6, 1869, against Princeton — and ever since has been the program that gave the sport to the world and then watched the world get better at it."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "The school that invented the game, against a present where 'almost bowl-eligible in the Big Ten' is the honest ceiling — 5-7 in 2025, with a bowl bid declined."

the_wound:
  name: "The founder who can't quite arrive"
  detail: "Rutgers spent 150 years on the sport's margins, then bought into the Big Ten in 2014 expecting the rising tide to lift it. The 2025 team went 5-7 (2-7 Big Ten) and turned down a bowl bid against Georgia Southern; Greg Schiano cleared out his defensive staff after the unit collapsed. The founder is still looking for its first real Big Ten breakthrough."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win something that matters in the league it paid to join — a New Year's-level season that proves the program that started the sport belongs at the front of it, the way the 2006 team briefly forced everyone to look."
  drought: { since: 2006, unit: relevance }

the_chip:
  villain: big_brother
  text: "Rutgers fans are weary of being the Big Ten's welcome mat — the school the blue bloods schedule for a comfortable Saturday. They'll remind you who held the first game ever, and that the founder doesn't need anyone's permission to stay."

the_delusion:
  tone: earnest
  text: "Scarlet Knights fans genuinely believe Greg Schiano is the one man who can will Rutgers into the league's top half — that the program that invented football can, on the right roster, out-tough teams with twice its history in the conference. They've watched him build it twice and trust he can finish it."

the_grudge_texture:
  rival: princeton
  texture: border-war   # the first-ever opponent, 1869 — the original New Jersey rivalry, even if Princeton long ago left big-time football

the_coach_relationship: forever-ours   # Greg Schiano: the program-builder across two eras (2001-2011, 2020-present), Rutgers' defining modern figure
the_internal_fracture: heritage vs results — the faction that treasures the 1869 founder identity and Schiano's culture-build vs the faction that says invention is nice but the Big Ten only counts wins
register: piscataway-first-game-1869-believer   # DRAFT (from voice_register) — confirm
