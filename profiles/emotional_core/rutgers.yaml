# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Rutgers played the first college football game in history. On November 6, 1869, in New Brunswick, Rutgers beat Princeton 6-4 under soccer-like rules — the moment the entire sport traces itself to. No other program can say it was there at the very start, because there was no start before Rutgers."
  the_origin: "Chartered in 1766 as one of America's nine colonial colleges, Rutgers gave the sport its first game in 1869, then spent more than a century as a regional Eastern independent before Greg Schiano dragged it into national relevance in the 2000s and into the Big Ten in 2014."
  golden_ages:
    - { era: "2005–2009 (Schiano I)", what: "The breakthrough years — an 11-2 2006 season, Ray Rice, the Louisville upset, six straight bowls" }
    - { era: "1869", what: "The birth of the sport itself — the first game ever played" }
  legends:
    - { name: "Greg Schiano", role: coach, why: "Built Rutgers into a national name in the 2000s and returned in 2020 to rebuild it again — the program's defining modern figure" }
    - { name: "Ray Rice", role: player, why: "The 2006 star who ran for 1,794 yards and made Rutgers must-watch television" }
  canonical_moments:
    - { name: "The first college football game", year: 1869, what: "Rutgers beats Princeton 6-4 in New Brunswick — the first game in the sport's history", handling: glory }
    - { name: "Pandemonium in Piscataway", year: 2006, what: "Undefeated, 15th-ranked Rutgers rallies from 25-7 down to beat No. 3 Louisville 28-25 on a late Jeremy Ito field goal; fans storm the field", handling: glory }
    - { name: "The 2006 Texas Bowl", year: 2006, what: "Rutgers wins the first bowl in program history, capping an 11-2 breakthrough season", handling: glory }
  the_place: "SHI Stadium in Piscataway (cap ~52,000) — and the campus marker noting that the first football game ever was played a short walk away; the founder's ground."
  brand_of_football: "Schiano-ball: physical, defense-first, special-teams-obsessed, built on toughness and a culture-first program identity rather than star power."
  cultural_footprint: "The sport's birthplace — Rutgers' claim to the first game is its permanent civic identity, the line every New Jersey fan leads with, the reason the program matters even in a 5-7 year."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Greg Schiano, in his second Rutgers era since 2020, went 5-7 (2-7 Big Ten)
    in 2025 and declined a bowl bid against Georgia Southern. The defense's collapse cost his coordinator and most
    of that staff in the offseason. Entering 2026 with a tougher schedule, the pressure is real: the founder is
    still chasing a signature Big Ten season, and the patience for the rebuild is thinning.
