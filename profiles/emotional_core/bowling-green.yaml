  the_unique_thing: "Bowling Green is the launchpad — the place Urban Meyer's head-coaching career started in 2001-2002 before Utah, Florida, and Ohio State, and now the only MAC program coached by a Heisman Trophy winner in Eddie George. The Falcons keep producing names bigger than their conference."
  the_origin: "A northwest-Ohio state school in the football-soaked MAC, built into a power in the 1950s-60s by Doyt Perry, whose name is on the stadium and whose standard still defines what 'good' means in Bowling Green."
  golden_ages:
    - { era: "1955–1964 (Doyt Perry)", what: "A 77-11-5 run, an undefeated 9-0 1959 team that finished No. 20 in the AP poll — the program's high-water mark" }
    - { era: "2001–2002 (Urban Meyer)", what: "Meyer's first head job: a 17-6 turnaround that launched one of the great coaching careers in the sport" }
  legends:
    - { name: Doyt Perry, role: coach, why: "Built the dynasty; the stadium bears his name and his standard" }
    - { name: Urban Meyer, role: coach, why: "Started his head-coaching career here in 2001 before becoming a national-champion coach" }
    - { name: Josh Harris, role: player, why: "Early-2000s dual-threat QB who quarterbacked the Meyer-era resurgence" }
  canonical_moments:
    - { name: "Undefeated 1959", year: 1959, what: "Perry's 9-0 team finishes ranked No. 20 in the AP poll", handling: glory }
    - { name: "Meyer's arrival", year: 2001, what: "Urban Meyer's first head-coaching season begins a career that ends in national titles", handling: glory }
    - { name: "2015 MAC Championship", year: 2015, what: "Dino Babers' high-scoring Falcons win the league title before he leaves for Syracuse", handling: glory }
  the_place: "Doyt L. Perry Stadium — named for the coach who built the program — in northwest Ohio, the heart of MAC country, where 'Ay Ziggy Zoomba' (a fight song since the 1920s) frames a small-school, big-history gameday."
  brand_of_football: "MAC offense-forward football — the program that gave Dino Babers and Urban Meyer their starts has long leaned into tempo and scoring, a development lab as much as a team."
  cultural_footprint: "The coaching cradle — a program whose footprint on the sport is measured less in trophies than in the careers it launched, Urban Meyer chief among them."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Bowling Green made the splashiest hire in the MAC, bringing in 1995
    Heisman winner Eddie George from Tennessee State. His debut went 4-8 (2-6 MAC), a transition season on a
