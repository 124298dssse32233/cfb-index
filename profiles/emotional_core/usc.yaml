story_canon:
  the_unique_thing: "USC is 'Tailback U' — a continuous lineage of Heisman running backs from O.J. Simpson forward, eleven national titles, seven Heismans, and more Pro Football Hall of Famers than any college program, all staged in the Los Angeles Coliseum with Traveler galloping after every score."
  the_origin: "A Los Angeles program that became a national power under Howard Jones in the 1920s-30s, then a glamour dynasty under John McKay in the 1960s-70s — Trojan iconography, the Coliseum, and a brand fused with the entertainment capital around it."
  golden_ages:
    - { era: "1960–1975 (John McKay)", what: "Four national titles, the Tailback U identity, and the Sam Cunningham game that helped integrate Southern football" }
    - { era: "2001–2009 (Pete Carroll)", what: "Back-to-back-era dominance, Heismans, and the program's last run as the team that owned Saturday night" }
  legends:
    - { name: John McKay, role: coach, why: "Built the glamour dynasty and the Tailback U lineage" }
    - { name: O.J. Simpson, role: player, why: "1968 Heisman; the start of the running-back tradition (on-field legacy)" }
    - { name: Pete Carroll, role: coach, why: "The early-2000s dynasty that defined the modern brand" }
  canonical_moments:
    - { name: "The Bush Push", year: 2005, what: "USC survives Notre Dame on a last-second goal-line shove during the Carroll dynasty", handling: glory }
    - { name: "The 2005 Rose Bowl", year: 2006, what: "Vince Young's fourth-down run beats USC 41-38 to end the dynasty's run at a third straight title", handling: heartbreak }
    - { name: "Reggie's Heisman restored", year: 2024, what: "The 2005 Heisman is returned to Bush — a long-awaited piece of institutional vindication", handling: glory }
  the_place: "The Los Angeles Memorial Coliseum — host of three Olympics (1932, 1984, 2028) — where Traveler the white horse circles the field, the Spirit of Troy plays 'Conquest' after wins, and kickoff is a celebrity event over a serious football environment."
  brand_of_football: "Hollywood-dynastic: pedigreed, skill-rich, SoCal-specific; a program that speaks as one of the sport's half-dozen all-time names and treats the marquee as its natural address."
  cultural_footprint: "The program that turned Los Angeles entertainment sensibility into a football brand — now testing, in the Big Ten, whether that identity travels to a Midwestern-anchored league."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Lincoln Riley's restoration moved up to a 9-4 finish (7-2 Big Ten) in 2025,
    ending with No. 16 USC losing the Alamo Bowl to TCU 30-27 in overtime after blowing a fourth-quarter lead.
    Quarterback Jayden Maiava — 3,711 yards, 24 touchdowns, a nation-leading 91.2 QBR and All-Big Ten honors —
    returns, and USC signed the No. 1 recruiting class of the Riley era. After four seasons (35-18), 2026 has
    hardened into a "Playoffs or bust" referendum on whether Riley is the long-arc answer or a multi-year bridge.
