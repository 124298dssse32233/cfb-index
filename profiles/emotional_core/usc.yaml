slug: usc
team_id: 316
program_name: USC
program_tier: 1

emotional_core:
  primary: restoration    # the whole arc is Riley climbing the program back toward the Saturday nights it used to own
  secondary: deprival     # a half-decade of relevance lost to sanctions still shapes the impatience
  core_variant: dynasty-restoration
  one_line: "USC is the program that once owned Saturday night in Los Angeles — a Tailback U of Heismans and Hall of Famers — inching back toward the marquee and tired of telling fans the next step is coming."

self_image:
  archetype: blue-blood-fallen
  standard_gap_frame: "Eleven titles, seven Heismans and more pro Hall of Famers than any program vs a stretch that's traded the Coliseum's primetime aura for 9-4 seasons and an overtime bowl loss, with the climb still unfinished."

the_wound:
  name: "The Alamo Bowl overtime loss"
  detail: "An ascending 9-4 season ended with No. 16 USC blowing a fourth-quarter lead and falling to TCU 30-27 in overtime — the kind of one-score finish that, to a fanbase used to closing games, felt like proof the program isn't all the way back yet."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Own the marquee again — a Big Ten title, a Playoff berth, and a season that turns the Coliseum at kickoff back into the most important room in the sport."
  drought: { since: 2004, unit: national_title }

the_chip:
  villain: national_media
  text: "The fanbase has spent fifteen years hearing the program eulogized as a faded brand coasting on its zip code; they say the talent pipeline, the recruiting and the city were never the problem, and they're done being framed as a name that used to matter."

the_delusion:
  tone: load-bearing
  text: "USC fans believe the program is one season from owning the sport again — that Los Angeles, the Coliseum and the Tailback U lineage are advantages no rebuild can dull, and that the marquee belongs to the Trojans by right whenever they decide to take it back."

the_grudge_texture:
  rival: notre-dame
  texture: championship   # the Jeweled Shillelagh — the intersectional blue-blood series, decided in triple-OT in 2024

the_coach_relationship: savior   # Riley arrived with universal acclaim as the man hired to restore the Carroll-era glamour
the_internal_fracture: trajectory vs timeline — the room that sees a 9-4 climb and a No. 1 recruiting class as the build working vs the room that says four years in, with this roster and this city, "ascending" is no longer an acceptable word
register: hollywood-dynastic   # DRAFT (from voice_register) — confirmed
never_use:   # DRAFT from profile — LAW, do not violate in any authored line
  - scrappy
  - underdog
  - Cinderella
  - plucky Trojans (their plucky period was Homer)
  - Reggie Bush scandal as lead reference (the title was restored in 2024)
  - USC kids just show up in uniforms from central casting (too outsider-Hollywood)
  - Hollywood as a punchline about the program

