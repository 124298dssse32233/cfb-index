  one_line: "Army's whole season bends toward one Saturday in December — Beat Navy — and in 2025 the Black Knights lost it 17-16, surrendering the Commander-in-Chief's Trophy and the only standard West Point truly keeps."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "A 2024 breakthrough — 12-2, the Commander-in-Chief's Trophy, a top-25 finish — against a 2025 reset to 7-6 in a new conference, the recurring service-academy ceiling that no roster of cadets can fully outrun."

the_wound:
  name: "The 2025 step back and a Navy loss that cost the Trophy"
  detail: "A year after a 12-2 dream season, Army fell to 7-6 in its first year in the American Conference, and lost to Navy 17-16 in December — handing Annapolis back-to-back Commander-in-Chief's Trophies and stinging the one result West Point cares about most."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Beat Navy, reclaim the Commander-in-Chief's Trophy, and prove the 12-2 season was a foundation and not a fluke — sustained relevance for the option in a Power-adjacent league."
  drought: { since: 2024, unit: conference_title }

the_chip:
  villain: national_media
  text: "Black Knights fans say the sport treats Army as a quaint December novelty — a parade of cadets and a salute — and forgets that those same cadets went 12-2 and won the Trophy a year ago; they say the respect never arrives until the scoreboard forces it."

the_delusion:
  tone: earnest
  text: "The fanbase believes the Corps of Cadets — drilled, disciplined, every man bound for service — can out-execute and out-condition any roster of bigger, faster recruits, that West Point's standard of duty translates straight to the fourth quarter."

