story_canon:
  the_unique_thing: "Army's season is organized around one game — Beat Navy — played in an NFL stadium with the entire Corps of Cadets in the stands and the President often in attendance; no other program in the sport subordinates everything to a single rivalry the way West Point does."
  the_origin: "Football at West Point since 1890, a national power in the 1910s-40s, then forged into the modern era by the wartime Blanchard-Davis teams — two Heisman winners on the same backfield and consecutive national titles in 1944 and 1945."
  golden_ages:
    - { era: "1944–1946 (Blaik / Blanchard & Davis)", what: "Mr. Inside and Mr. Outside, two Heismans, and back-to-back national championships" }
    - { era: "2014–present (Jeff Monken)", what: "From the depths to repeated bowl wins, a 2018 11-2, and a 2024 12-2 American Conference title and Trophy season" }
  legends:
    - { name: "Doc Blanchard & Glenn Davis", role: player, why: "Mr. Inside and Mr. Outside — back-to-back Heisman winners on the 1944-45 national champions" }
    - { name: Earl "Red" Blaik, role: coach, why: "Built the wartime dynasty; the architect of Army's golden age" }
    - { name: Jeff Monken, role: coach, why: "Rebuilt a moribund program into a consistent winner and the 2024 12-2 Trophy team" }
  canonical_moments:
    - { name: "Back-to-back national titles", year: 1945, what: "Blanchard and Davis lead Army to consecutive national championships at the peak of the war years", handling: glory }
    - { name: "The 2024 breakthrough", year: 2024, what: "12-2, a conference championship, the Commander-in-Chief's Trophy, and a top-25 finish — the best modern Army season", handling: glory }
    - { name: "The 2025 Navy loss", year: 2025, what: "A 17-16 defeat to Navy hands Annapolis the Trophy and ends the season on the wound West Point feels most", handling: heartbreak }
  the_place: "Michie Stadium above the Hudson at West Point — the gray stone, the cadet wing marching on, and the Army-Navy game itself staged on the sport's biggest neutral stages, a national civic ritual."
  brand_of_football: "Disciplined triple-option — clock-eating, assignment-perfect, built on conditioning and ball control by a roster of future officers; football as an extension of the academy's standard of execution."
  cultural_footprint: "America's Game — the Army-Navy rivalry as the sport's most patriotic institution, every player headed to active-duty service, the season a salute that transcends the standings."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: After a breakthrough 12-2 in 2024, Army reset to 7-6 (4-4) in 2025,
    its first year in the American Conference, and beat UConn 41-16 in the Fenway Bowl. But the season's
    defining result was a 17-16 loss to Navy that handed Annapolis the Commander-in-Chief's Trophy.
    Jeff Monken, now in his 12th year and 19-8 since 2024, enters 2026 trying to prove the 12-2 was a
    floor rather than a peak — and to take the Trophy back.
