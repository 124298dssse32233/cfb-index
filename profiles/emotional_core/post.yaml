  the_unique_thing: "A brand-new Division II program born in 2021 from a club-sport Sprint Football legacy (1994-2020). Post represents what a small private school can build when it commits to varsity athletics — in four years, they went from club status to a Northeast-10 member competing against 100-year-old programs."
  the_origin: "Post University fielded Sprint Football (7-on-7 club format) from 1994-2020, then transitioned to full Division II varsity football in 2021. They competed as an independent and in 2023-24 before joining the Northeast-10 in 2024."
  golden_ages:
    - { era: "2024 inaugural NE10 season", what: "Post earns its first home win (41-24 vs West Virginia Wesleyan), four players named NE10 All-Conference (Joshua Tracey, Michael Gabettie, Myles Snead, Adonis White)" }
