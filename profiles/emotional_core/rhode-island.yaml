story_canon:
  the_unique_thing: "The most dramatic FCS redemption arc of the decade — Rhode Island went 17 years without a winning season, then won back-to-back CAA championships in 2024 and 2025 under Jim Fleming, including the program's first outright conference title since 1985 (going 8-0 in conference play in 2025)."
  the_origin: "Rhode Island has played football since 1893 and was a Yankee Conference power in the 1950s and early 1980s, winning conference titles in 1952, 1953, 1955, 1957, 1981, 1984, and 1985. After the 1985 title, the program fell into a 17-year winning-season drought from 2001 to 2017. Jim Fleming arrived in 2014 and rebuilt the program into a CAA champion."
  golden_ages:
    - { era: "1950s Yankee Conference era", what: "Rhode Island wins four Yankee Conference championships in the 1950s — the program's first golden age" }
    - { era: "1981-1985 (second Yankee era)", what: "Three Yankee Conference titles in five years; 1985 title is the last conference championship before a 40-year drought" }
    - { era: "2024-2025 (Fleming dynasty)", what: "Back-to-back CAA championships; 11 wins in 2025; first outright conference title since 1985; Eddie Robinson Award finalist" }
  legends:
    - { name: Jim Fleming, role: coach, why: "Ended the 17-year winning-season drought, built back-to-back CAA champions, Eddie Robinson Award finalist — the architect of the program's rebirth" }
    - { name: Marquis Buchanan, role: player, why: "2024 All-American wide receiver; cornerstone of the CAA championship offense" }
    - { name: Devin Farrell, role: player, why: "Quarterback of the 2024-2025 CAA championship teams; paired with Buchanan to form the conference's top passing attack" }
  canonical_moments:
    - { name: "2018 first winning season in 17 years", year: 2018, what: "Rhode Island ends a 17-year winning-season drought under Jim Fleming — the turning point in the modern program's history", handling: glory }
    - { name: "2024 CAA championship", year: 2024, what: "Rhode Island wins the program's first CAA title — the first conference championship since 1985", handling: glory }
    - { name: "2025 CAA championship (8-0)", year: 2025, what: "Rams go undefeated in conference play for the first time since 1985 and win back-to-back CAA titles; 11-3 overall", handling: glory }
  the_place: "Meade Stadium in Kingston, Rhode Island — the campus home of a program that spent 17 years building toward a CAA championship from the bottom of FCS."
  brand_of_football: "Disciplined, system-complete, championship-caliber — Jim Fleming's program wins with a balanced passing game (Farrell-to-Buchanan) and a defense that holds up late in seasons."
  cultural_footprint: "The FCS redemption story of the decade — 17 years without a winning season, then back-to-back CAA titles, proof that patience and the right coach can transform even the most dormant programs."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Rhode Island went 11-3 (8-0 CAA) in 2025 — back-to-back CAA
    champions, undefeated in conference play for the first time since 1985, and advancing to the FCS
    second round before losing 26-47 to UC Davis. Jim Fleming was named a finalist for the Eddie Robinson
    Award — the top coaching honor in FCS. The Rams' next challenge is converting two conference titles
    into a genuine FCS quarterfinal or semifinal run. QB Devin Farrell and WR Marquis Buchanan return
    as the core of a program that looks like the CAA's dominant program entering 2026.
