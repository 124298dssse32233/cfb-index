emotional_core:
  primary: redemption
  secondary: house-money
  one_line: "Rhode Island is the program that went 17 years without a winning season, then won back-to-back CAA championships in 2024 and 2025 under Jim Fleming — the Rams are proof that patience and the right coach can turn four decades of dormancy into a dynasty."

self_image:
  archetype: riser-proving
  standard_gap_frame: "Back-to-back CAA championships (2024-2025), 11 wins in 2025, and a program-first conference title after a 40-year drought — the Rams have turned one of FCS's great long-suffering programs into the conference's current standard bearer."

the_wound:
  name: "The 17-year winless-season drought — ended 2018"
  detail: "Rhode Island did not have a winning season from 2001 through 2017 — a 17-year trough that made the program one of FCS's most dormant mid-majors. Jim Fleming arrived in 2014, and his first winning season in 2018 ended the drought. The Rams have not looked back — but the weight of those 17 years shapes how the fanbase understands every winning season."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Build a sustained dynasty from the CAA titles — prove that back-to-back championships are the beginning of an era, not a two-year peak, and make the FCS quarterfinals or beyond."
  drought: { since: 1985, unit: conference_title }

the_chip:
  villain: national_media
  text: "The fanbase says Rhode Island went 17 years without a winning season and no one cared when they were losing, and now that they're back-to-back CAA champions, national FCS media is still slow to treat Kingston like an elite address — the room believes they've earned the noise they're not getting."

the_delusion:
  tone: load-bearing
  text: "They believe the 17-year drought is the origin story, not a liability — that a program that broke out of it with back-to-back titles is the most dramatic FCS redemption arc of the decade, and that Jim Fleming has built something that will outlast any comparison to the lean years."

the_grudge_texture:
  rival: new-hampshire
  texture: border-war

the_coach_relationship: savior
the_internal_fracture: title-winner vs deeper-run-demanders — the faction satisfied with back-to-back CAA championships as validation vs the faction that believes the program must advance past the second round of the FCS playoffs to earn a permanent elite reputation

register: rhode-island-rams-kingston-caa-champion-redemption-fleming
