emotional_core:
  primary: restoration     # the live arc: a marquee hire to drag the program back to the Beamer-era standing
  secondary: grief         # mourning the years between then and now — the slow drift from a top-10 fixture to a 3-9 team
  core_variant: regime-reset
  one_line: "Virginia Tech is the program that runs out to Enter Sandman in front of 65,000 still chasing the altitude of the Frank Beamer years — and just bet its restoration on James Franklin, hired the same fall both he and the Hokies hit bottom."

self_image:
  archetype: blue-blood-fallen
  standard_gap_frame: "Twelve straight bowls and a 1999 national-title-game run vs a 3-9 collapse in 2025 that started 0-3 and got the head coach fired in September."

the_wound:
  name: "The 0-3 collapse that ended the Pry era"
  detail: "Virginia Tech opened 2025 with three straight losses — including a home defeat to Old Dominion — its worst start in nearly four decades, and fired Brent Pry the next day. The Hokies limped to 3-9 under an interim staff while the crowd at Lane Stadium booed a program that used to terrify people."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Climb back to where the program lived under Beamer — a conference contender that travels well, wins ten, and makes Lane Stadium a place visitors dread again."
  drought: { since: 2010, unit: conference_title }

the_chip:
  villain: national_media
  text: "Hokie fans are tired of being written up as a faded name, a program whose best days are spoken about in the past tense. They say the foundation never left — it just needed a coach who could finally use it."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes Virginia Tech is a sleeping power one right hire from returning to the top ten — that the brand, the entrance, and the recruiting footprint were always there, and that James Franklin is the proof the wait is over."

the_grudge_texture:
  rival: virginia
  texture: border-war   # the Commonwealth Cup — the in-state fight for Virginia, the game that defines the season locally

the_coach_relationship: savior   # James Franklin hired as the man to end the drift; the whole fanbase is staking the future on him
the_internal_fracture: faith vs fatigue — the faction electrified by the Franklin hire vs the faction that's watched a decade of "this is the year we're back" and won't believe it until Lane Stadium is feared again
