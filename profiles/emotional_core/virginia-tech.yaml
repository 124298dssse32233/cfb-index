story_canon:
  the_unique_thing: "Enter Sandman — 65,000 people jumping in unison as Metallica drops at Lane Stadium, the single most famous entrance in college football, the sound of a program built on defense, special teams, and a lunch-pail identity Frank Beamer made national."
  the_origin: "A land-grant military-tradition school in the Blue Ridge town of Blacksburg that Frank Beamer turned from a regional afterthought into a sustained national power across the 1990s and 2000s."
  golden_ages:
    - { era: "1995–2011 (Frank Beamer)", what: "Twelve straight bowl games, a 1999 national-title-game run with Michael Vick, and 'Beamerball' — defense and special teams as a brand" }
  legends:
    - { name: Frank Beamer, role: coach, why: "Built the program from nothing into a national fixture; the namesake of Beamerball and the foundation everything since is measured against" }
    - { name: Michael Vick, role: player, why: "The electric freshman quarterback who carried the 1999 team to the national title game and remade the program's profile" }
    - { name: Bruce Smith, role: player, why: "The 1984 Outland Trophy winner and Hall of Fame defensive end — the original proof Virginia Tech could produce the best" }
  canonical_moments:
    - { name: "The 1999 national-title-game run", year: 1999, what: "An undefeated regular season behind freshman Michael Vick, ending in the BCS title game against Florida State", handling: glory }
    - { name: "Enter Sandman becomes tradition", year: 2000, what: "Lane Stadium adopts the Metallica entrance that becomes the sport's signature pregame ritual", handling: glory }
    - { name: "The 0-3 start and a firing", year: 2025, what: "A three-loss September, an Old Dominion home defeat, and the end of the Brent Pry era", handling: wound }
  the_place: "Lane Stadium, hewn from Hokie Stone, where Enter Sandman turns kickoff into an earthquake — routinely rated among the loudest, most intimidating venues in the country."
  brand_of_football: "Beamerball — hard-nosed defense, game-breaking special teams, and a blue-collar lunch-pail identity that prizes effort over flash."
  cultural_footprint: "The emotional center of a school bound together by tradition and, since 2007, by resilience — a fanbase whose loyalty runs deeper than any single season's record."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Virginia Tech opened 2025 at 0-3, fired Brent Pry the day after a home loss
    to Old Dominion, and finished 3-9 (2-6 ACC) under interim coach Philip Montgomery. In November the Hokies
    landed the offseason's biggest hire — James Franklin, fired by Penn State mid-2025 after 104 wins there — and
    he is rebuilding the roster aggressively through the portal, even bringing Brent Pry back as his defensive
    coordinator. The 2026 quarterback is unsettled. Blacksburg is staking its whole restoration on Franklin
    being the man to make Lane Stadium feared again.
