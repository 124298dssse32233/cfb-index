emotional_core:
  primary: spectacle     # the dominant era that defines the program
  secondary: standard    # excellence expected
  one_line: "Susquehanna is the Landmark flagship that won four consecutive conference titles (2022–2025), went perfect in conference play (27–0), reached a NCAA Division III Semifinal, and redefined what a small D3 program can achieve."

self_image:
  archetype: blue-blood-living-up
  standard_gap_frame: "Four straight Landmark titles, 27–0 Landmark play, NCAA Semifinal reach (2024) vs. the reality: even the best D3 programs have a ceiling."

the_wound:
  name: "The Perkovich transition (2026 departure to UAlbany)"
  detail: "Tom Perkovich, the architect of four straight titles and 95 career wins, accepted the UAlbany FBS head coaching job for 2026. This is a transition moment, not a wound—but it marks the end of an era."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Sustain the dominant Landmark era under new leadership and prove the 2022–2025 run is the program's new standard, not a one-coach fluke."
  drought: { since: 2021, unit: national_title }  # only one year without title since 2022

the_chip:
  villain: none
  text: "Fans here believe no chip; Susquehanna is confident in its dominance. The only rival is the coaching departure."

the_delusion:
  tone: self-aware
  text: "Susquehanna fans believe the 2022–2025 era is sustainable without Perkovich—that the program has built a foundation strong enough to transcend one coach."

the_grudge_texture:
  rival: wilkes
  texture: championship    # developing rivalry in Landmark; Wilkes is consistent #2

the_coach_relationship: legends-shadow   # transitional moment post-Perkovich; new coach inherits dynasty
the_internal_fracture: perkovich-dependency-vs-program-strength — between those attributing success to Tom and those believing the program is bigger than one coach
register: earnest-dominant
never_use:
  - "Lucky (27–0 Landmark play and 12-win season are structural, not luck)"
  - "Vulnerable (the program's dominance is real; Perkovich's departure is a transition, not a collapse)"

