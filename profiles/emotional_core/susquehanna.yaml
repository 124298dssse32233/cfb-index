  the_unique_thing: "Susquehanna is the best D3 program of the 2022–2025 era—four straight Landmark championships, 27–0 conference record, a 12-win season (2024), and a NCAA Division III Semifinal appearance (2024). The program rewrote what a small D3 school can achieve."
  the_origin: "Susquehanna University was founded in 1773 in Selinsgrove, Pennsylvania. The football program joined the Landmark Conference as a founding member in 2023 and has since dominated the conference with unprecedented success."
  golden_ages:
