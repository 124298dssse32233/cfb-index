  brand_of_football: "Elite small-school football—Susquehanna plays with Big Time College intensity on a D3 platform; balanced, well-coached, program-first culture."
  cultural_footprint: "The proof that a small D3 program can achieve unprecedented dominance and compete in NCAA tournaments like a power conference team; Susquehanna rewrote the D3 ceiling."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Susquehanna finished 11–3 in 2025, losing to Johns Hopkins 34–28 in the NCAA Division III Quarterfinals after winning four straight Landmark championships (2022–2025). Head coach Tom Perkovich, who led the program to 95 career wins and the 2024 NCAA Semifinal appearance, accepted the head coaching position at UAlbany (FBS) for 2026. The program transitions into a new era with a new head coach while maintaining Landmark dominance. The 2026 question: can Susquehanna continue its four-year run under new leadership, or does the program enter a decline?
