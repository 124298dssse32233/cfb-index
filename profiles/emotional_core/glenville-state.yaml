story_canon:
  the_unique_thing: "Pioneer Pete, the live male senior dressed in full frontier regalia (coonskin cap, buckskin, rifle) who represents West Virginia's Appalachian heritage. The tradition has run since 1933 and is non-negotiable to Glenville's identity. A woman first played Pioneer Pete in 1990-91. The football program orbits this mascot, not the other way around."
  the_origin: "A small West Virginia liberal-arts college founded 1872. The 'Pioneers' nickname was adopted in 1927-28 by coach John L. 'Bugs' Teets to evoke the frontier spirit of West Virginia. The live Pioneer Pete mascot debuted 1933 and has been the heart of Glenville identity ever since."
