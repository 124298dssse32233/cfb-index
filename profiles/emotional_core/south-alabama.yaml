emotional_core:
  primary: house-money    # a program born in 2009 with no history to honor and nothing to lose — every win is found money
  secondary: restoration  # but the live arc is a 4-8 step back that needs fixing after a bowl-winning 2024
  one_line: "South Alabama is one of the youngest programs in the sport — its first football game was in 2009 — and it has spent fifteen years writing a history from a blank page on the Gulf Coast in Mobile."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A program with no golden age to chase, against the ordinary growing pains of building one — a 7-6 bowl winner in 2024 that slipped to 4-8 in 2025."

the_wound:
  name: "The 2025 step back"
  detail: "Major Applewhite's first year (2024) ended 7-6 with a bowl win over Western Michigan in Montgomery. Year two fell to 4-8 (3-5 Sun Belt West), though the Jaguars won three of their last five — a stumble that put a young program's upward trajectory in question and turned up the heat on a still-new staff."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the Sun Belt — put the first conference championship banner in a building that has never had one, and turn a 16-year-old program into a real one."
  drought: { since: 2009, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Jaguar fans live in the shadow of Alabama and Auburn, where the whole state's football identity already lives. They'll tell you South Alabama built a program from literally nothing in their lifetime, and that being the new team in Mobile beats being nobody's team at all."

the_delusion:
  tone: earnest
  text: "Mobile fans believe a city this football-rich — the Gulf Coast that feeds talent to half the SEC — can will a Power-level program into existence around the only school that's truly its own. They're sure the recruiting base alone makes the Jaguars' ceiling far higher than fifteen years of history suggests."

the_grudge_texture:
  rival: troy
  texture: little-brother   # the Battle for the Belt — in-state Sun Belt sibling Troy, the older, more-established neighbor

the_coach_relationship: hot-seat-churn   # Major Applewhite's 4-8 second year cooled the optimism from a 7-6 debut
the_internal_fracture: patience vs urgency — the faction that says a program this young needs time vs the faction that tasted a 2024 bowl and won't accept regression
