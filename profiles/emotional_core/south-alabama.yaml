# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "South Alabama is one of the youngest football programs in the country — it played its first game in 2009 and jumped to the FBS by 2012. Almost everything in its record book is a 'first.' The Jaguars are what it looks like to build a major-college program, from scratch, in real time, in the football-soaked Gulf Coast."
  the_origin: "The University of South Alabama in Mobile launched football in 2009 under Joey Jones, won its earliest games as a startup independent, and climbed to the Sun Belt and the FBS within a few seasons — a program with no past, only a beginning."
  golden_ages:
    - { era: "2009–2013 (Joey Jones, the founding)", what: "From the first game to FBS membership and the first bowl trips — the program literally coming into existence" }
    - { era: "2023–2024", what: "Back-to-back bowl seasons, including a 2024 bowl win over Western Michigan in Major Applewhite's first year — the modern high point" }
  legends:
    - { name: "Joey Jones", role: coach, why: "The founding head coach who started the program from nothing in 2009 and walked it into the FBS" }
    - { name: "Gerald Everett", role: player, why: "A second-round NFL Draft pick (2017) and the program's first marquee pro — proof the young Jaguars could develop NFL talent" }
    - { name: "Jalen Tolbert", role: player, why: "A 2022 third-round NFL Draft pick at receiver — a modern South Alabama star" }
  canonical_moments:
    - { name: "The first game", year: 2009, what: "South Alabama plays the first football game in school history, beginning a program from a blank page", handling: glory }
    - { name: "Hancock Whitney Stadium opens", year: 2020, what: "The Jaguars open their own on-campus stadium after a decade sharing Mobile's Ladd-Peebles — a young program finally putting down roots", handling: glory }
    - { name: "2024 bowl win", year: 2024, what: "Major Applewhite's debut season ends with a bowl victory over Western Michigan — the program's strongest recent statement", handling: glory }
  the_place: "Hancock Whitney Stadium (opened 2020, cap ~25,000) on the USA campus — the first home the Jaguars ever owned, after a decade playing in the city's aging Ladd-Peebles Stadium."
  brand_of_football: "A modern Sun Belt spread identity, still defining itself — a program young enough that its style is being written, not inherited."
  cultural_footprint: "Mobile's own team — the only Division I program in a Gulf Coast city that produces SEC talent by the dozen, fighting to claim a slice of a state that lives and dies with Alabama and Auburn."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Major Applewhite's debut went 7-6 with a bowl win over Western Michigan in
    2024; year two slipped to 4-8 (3-5 Sun Belt West) in 2025, though South Alabama won three of its last five.
    Entering 2026, Applewhite's third season, the young program is trying to steady its climb and chase the
    conference title it has never won.
