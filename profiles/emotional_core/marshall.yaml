emotional_core:
  primary: honor          # the program that rebuilt from a plane crash; resilience IS the identity
  secondary: restoration  # the live arc: rebuilding the roster a coach gutted on his way out
  one_line: "Marshall is the program that buried a team in 1970 and built a champion out of the grief — a place where football is a memorial, and where rebuilding from nothing is the oldest thing it knows how to do."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A Sun Belt champion in 2024 vs a 2025 roster so hollowed by departures that survival, not contention, became the season's standard."

the_wound:
  name: "Southern Airways Flight 932"
  detail: "On November 14, 1970, a plane crash killed 75 — the entire football team, coaches, and boosters. Huntington rebuilt from the ashes; the program is a living memorial, and every season is played downstream of that loss."
  handling: never-a-punchline
  freshness: all-time

the_dream:
  text: "Honor the ones who never came home the only way Huntington knows — by building winners, season after season, no matter who walks out the door."
  drought: { since: 2024, unit: conference_title }

the_chip:
  villain: none
  text: "Marshall doesn't need a national villain — the fanbase carries its own standard, set in 1970 and proven every time the program rebuilds from nothing and wins anyway."

the_delusion:
  tone: earnest
  text: "The fanbase believes Huntington will always rebuild — that a program forged out of a 1970 tragedy can survive a coach gutting the roster, because resilience isn't a hope here, it's the founding fact."

the_grudge_texture:
  rival: ohio
  texture: border-war   # the Battle for the Bell — the long-running Marshall–Ohio grudge

the_coach_relationship: hot-seat-churn   # Pruett's dynasty, then Holliday, then Huff (who left), now Gibson
the_internal_fracture: loyalty vs realism — the faith that the Herd always rebuilds vs the worry that the Huff exodus left a hole even Huntington's resilience can't fill fast
register: huntington-thundering-herd-honor
