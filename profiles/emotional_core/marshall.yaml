# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "We Are Marshall — the program rebuilt from the 1970 plane crash that killed nearly the entire team. No other program's identity is so completely the story of resurrection from tragedy; the 2006 film carried it into the wider culture."
  the_origin: "A football program in Huntington, West Virginia that lost its team in the 1970 crash, rebuilt from scratch over five years under a young staff, and rose into a Division I-AA dynasty before its FBS run."
  golden_ages:
    - { era: "1996–2004 (Bob Pruett)", what: "Six MAC championships and a dominant mid-major run" }
    - { era: "1996–1999", what: "The Randy Moss and Chad Pennington era — one of the great mid-major skill duos ever" }
  legends:
    - { name: Bob Pruett, role: coach, why: "Architect of the MAC dynasty; six conference titles" }
    - { name: Randy Moss, role: player, why: "Generational wide receiver who put Marshall on the national map" }
    - { name: Chad Pennington, role: player, why: "The quarterback of the dynasty; later a first-round NFL pick" }
  canonical_moments:
    - { name: "Southern Airways Flight 932", year: 1970, what: "The crash that killed 75, including the entire team — the founding wound the program is built around", handling: wound }
    - { name: "The 2024 Sun Belt championship", year: 2024, what: "Marshall wins the league under Charles Huff before the coach's abrupt departure", handling: glory }
  the_place: "Joan C. Edwards Stadium in Huntington — and the Memorial Fountain on campus, shut off each November 14 in remembrance, the literal heart of the program's identity."
  brand_of_football: "Resilient, tough, opportunistic mid-major football — built less on a single style than on the program's defining capacity to rebuild and win regardless of circumstance."
  cultural_footprint: "The ultimate football-resurrection story — a program whose grief became national folklore through 'We Are Marshall,' and a fanbase for whom every season is, quietly, a memorial."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Charles Huff won the 2024 Sun Belt title, then left for Southern Miss days
    later — roughly 50 players entered the portal, ~21 followed Huff, and Marshall withdrew from its bowl. Tony
    Gibson, hired from NC State, inherited a stripped roster and went 5-7 (3-5 Sun Belt) in his first season
    rebuilding from almost nothing. Entering 2026, Gibson's task is the oldest one in Huntington: build a winner
    back up from the ground.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
