story_canon:
  the_unique_thing: "Toledo is the MAC's most quietly relentless winner — a program that once went 35 games without a regular-season loss (1969-1972) and has spent half a century as one of the conference's permanent contenders, playing in the oldest, most distinctive stadium in the league."
  the_origin: "A northwest Ohio university whose Glass Bowl, built in the WPA era in 1937, became the home of a remarkably steady football program — never flashy, almost always competitive in the MAC."
  golden_ages:
    - { era: "1969-1972 (Frank Lauterbur / Jack Murphy)", what: "A 35-game regular-season unbeaten streak — one of the longest in the sport's history" }
    - { era: "2016-2022 (Jason Candle)", what: "MAC championships in 2017 and 2022 and sustained contention; Candle becomes the winningest coach in school history" }
  legends:
    - { name: Jason Candle, role: coach, why: "The program's all-time wins leader; two MAC titles before leaving for UConn after 2025" }
    - { name: Chuck Ealey, role: player, why: "The undefeated quarterback of the 1969-1971 streak who never lost a college game" }
  canonical_moments:
    - { name: "The 35-game unbeaten streak", year: 1971, what: "Toledo runs three full seasons without a regular-season loss", handling: glory }
    - { name: "The 2017 MAC championship", year: 2017, what: "Candle's Rockets win the conference title", handling: glory }
    - { name: "Blowing the I-75 lead", year: 2025, what: "Toledo leads Bowling Green 21-0 and loses 28-23 in the Battle of I-75", handling: heartbreak }
  the_place: "The Glass Bowl — a 1937 WPA-era stone stadium nestled into the campus, named for the city's glass industry, one of the oldest and most characterful venues in the MAC."
  brand_of_football: "MAC-stalwart steadiness — disciplined, well-coached, year-in-year-out competitive football, the conference's model of consistency rather than spectacle."
  cultural_footprint: "Glass City pride — a program that gives a mid-sized Ohio industrial city a reliably good football team, and a MAC institution that other programs raid for coaches precisely because it's run so well."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Toledo went 8-4 (6-2 MAC) in 2025 but blew a 21-0 lead to lose the
    Battle of I-75 to Bowling Green 28-23. Then Jason Candle — the winningest coach in program history, with
    MAC titles in 2017 and 2022 — left after a decade to become head coach at UConn. Toledo turned to Mercer's
    Mike Jacobs, a Maumee native and former Ohio State offensive lineman, to keep the MAC's most consistent
    machine running. The question in the Glass Bowl: can the institution survive losing the man who defined it?
  research_checklist:   # what to look up (web) when we author this team together
