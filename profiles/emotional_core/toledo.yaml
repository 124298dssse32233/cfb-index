emotional_core:
  primary: deprival       # the MAC's most reliable program just lost the coach who WAS the program for a decade
  secondary: standard     # in the MAC, Toledo measures itself by winning the league, not just reaching bowls
  one_line: "Toledo is the MAC's quiet machine — a Glass Bowl program that has won more than almost anyone in the conference for fifty years — and now it's starting over, after Jason Candle became the school's winningest coach ever and promptly left for UConn."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "A 1969-1972 unbeaten streak and a half-century of MAC contention vs the reality that the conference titles came in 2017 and 2022, not as often as a program this consistent thinks it deserves."

the_wound:
  name: "Candle's exit and the Bowling Green collapse"
  detail: "In 2025 Toledo went 8-4 but blew a 21-0 lead to rival Bowling Green and lost the Battle of I-75 28-23; then Jason Candle, the winningest coach in school history, left after a decade to take the UConn job — leaving the Rockets to hand the program to Mercer's Mike Jacobs."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Keep the machine running without the man who built the modern version of it — win the MAC again, hold the Battle of I-75, and prove Toledo's consistency was the program, not just the coach."
  drought: { since: 2022, unit: conference_title }

the_chip:
  villain: national_media
  text: "Fans know the drill — the national conversation treats the MAC as a place big jobs go shopping for coaches, and Toledo as the supplier rather than the contender. They want the new staff to prove the Rockets are a destination worth respecting, not just a launchpad."

the_delusion:
  tone: earnest
  text: "The fanbase believes Toledo is bigger than any one coach — that fifty years of winning football in the Glass Bowl is an institution that reloads, and that a new man inheriting a stocked roster can keep the Rockets exactly where they've always been: near the top of the MAC."

the_grudge_texture:
  rival: bowling-green
  texture: blood-feud   # the Battle of I-75 — the most-played, most-even rivalry in the MAC

the_coach_relationship: legends-shadow   # whoever follows Candle coaches under the program's all-time wins leader
the_internal_fracture: reload vs rebuild — the faction that believes the program's consistency survives any coaching change vs the faction bracing for a step back without Candle
register: glass-bowl-rockets-mac-stalwart   # DRAFT (from voice_register) — confirm
