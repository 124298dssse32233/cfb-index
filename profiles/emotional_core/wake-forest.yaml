story_canon:
  the_unique_thing: "Wake Forest is the smallest school in the Power conferences — about 5,400 undergraduates — and it has spent two decades beating bigger programs by developing overlooked recruits, including a quarterback pipeline that has sent Riley Skinner, John Wolford, and Sam Hartman into the pros."
  the_origin: "A small private Baptist-founded university in Winston-Salem, North Carolina, that for most of its history was the ACC's quiet member — until Jim Grobe, and then Dave Clawson, made development its whole identity."
  golden_ages:
    - { era: "2006–2008 (Jim Grobe)", what: "An ACC championship and an Orange Bowl trip in 2006 — the high-water mark, built entirely on player development" }
    - { era: "2017–2022 (Dave Clawson)", what: "Six straight bowls, an 11-3 peak in 2021, and the redshirt-everyone slow-mesh offense that produced NFL quarterbacks" }
  legends:
    - { name: Jim Grobe, role: coach, why: "Coached the 2006 ACC champions and Orange Bowl team — the program's greatest season" }
    - { name: Dave Clawson, role: coach, why: "Built a decade of bowls and the development model that defines modern Wake Forest" }
    - { name: Sam Hartman, role: player, why: "The record-setting quarterback who became the face of the Clawson-era offense" }
  canonical_moments:
    - { name: "The 2006 ACC championship and Orange Bowl", year: 2006, what: "Wake Forest wins the ACC and reaches the Orange Bowl — the most improbable major-bowl run of its era", handling: glory }
    - { name: "The 11-3 peak", year: 2021, what: "A program-best modern season behind the slow-mesh offense and a Top-25 finish", handling: glory }
    - { name: "Dickert's nine-win debut", year: 2025, what: "A new coach goes 9-4 and wins the Duke's Mayo Bowl, proving the model survived Clawson's exit", handling: glory }
  the_place: "Allegacy Federal Credit Union Stadium in Winston-Salem — a modest, intimate venue that fits the program's quiet, no-fuss identity."
  brand_of_football: "Go Deacs — patient, development-first football: redshirt early, run the slow-mesh, turn three-star recruits into draft picks, and out-execute schools with deeper talent."
  cultural_footprint: "The standing proof that the smallest program in a major league can keep winning on patience and player development — the ACC's quietest overachiever."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Jake Dickert, hired from Washington State after Dave Clawson stepped away,
    went 9-4 (4-4 ACC) in his first season and won the Duke's Mayo Bowl 43-29 over Mississippi State — the most
    wins ever by a Wake Forest first-year coach — and signed a long-term extension in December 2025. Bowl MVP
    quarterback Robby Ashford is out of eligibility, and the 2026 starter is unsettled. The question in
    Winston-Salem: was the dream debut the floor of a Dickert era, or a one-year high?
