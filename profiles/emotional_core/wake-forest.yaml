emotional_core:
  primary: contentment     # the smallest school in the league quietly does the most with the least — and is fine being underestimated
  secondary: restoration   # a new coach proving the Clawson development model survived the handoff
  one_line: "Wake Forest is the smallest school in the Power conferences and the program that keeps winning anyway — the place that turns three-star quarterbacks into NFL draft picks and just won nine games in a brand-new coach's first try."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "An Orange Bowl trip and a 2006 ACC title from a 5,400-student campus vs a league of state schools five times its size — the gap Wake closes with patience instead of talent advantages."

the_wound:
  name: "The fear the magic walked out the door with Clawson"
  detail: "Dave Clawson built a decade of development and bowl trips, then stepped away after 2024 — and Winston-Salem braced for the slide that usually follows when a small program loses the coach who made it work. Whether the model was Clawson or the place was the live question entering 2025."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the ACC again and reach a major bowl — to prove the 2006 Orange Bowl wasn't a one-time lightning strike but something the program can build toward on purpose."
  drought: { since: 2006, unit: conference_title }

the_chip:
  villain: national_media
  text: "Wake fans are used to being the team analysts forget to mention and the campus visitors can't find. They say being overlooked is a feature — the Deacons recruit the players everyone else passed on and develop them into the picture nobody saw coming."

the_delusion:
  tone: self-aware
  text: "Deacon fans believe the slow-developed, redshirt-everyone Wake way beats recruiting-rankings football over time — that the program can keep manufacturing nine-win teams and NFL quarterbacks from the league's smallest pool. They know the math is against them, and they trust the model anyway."

the_grudge_texture:
  rival: nc-state
  texture: little-brother   # the in-state Tobacco Road fight Wake plays as the smallest, most overlooked of North Carolina's ACC schools

the_coach_relationship: savior   # Jake Dickert proved the model survives him in year one; the fanbase is sold
the_internal_fracture: trust-the-model vs fear-the-fall — the faction that saw a 9-win debut as proof the program is bigger than any one coach vs the faction still bracing for the day the development pipeline finally runs dry
