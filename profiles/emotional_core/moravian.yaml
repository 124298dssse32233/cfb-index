  text: "Fans here believe no external chip; Moravian's pride is in breaking the 9-year drought, not in vindication against anyone."

the_delusion:
  tone: earnest
  text: "Moravian fans believe the 2024 breakthrough is real—that the program has found footing in Landmark and will sustain postseason contention."

the_grudge_texture:
