the_chip:
  villain: national_media
  text: "The fanbase knows Showtime is globally recognized while the football team remains a footnote. Every Bison loss feels like a wound to institutional pride—the disconnect between what Howard is and what its football program achieves."

the_delusion:
  tone: earnest
  text: "That the cultural gravity of the institution and the Showtime band's global reach will eventually translate to sustained football dominance—the fanbase believes Howard's time is coming, and a culture change can restore the Bison to title contention."

