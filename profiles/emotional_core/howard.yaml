  the_place: "William H. Greene Stadium on the Howard University campus in Washington, D.C.—a stage where Showtime's halftime performances are as anticipated as the game itself."
  brand_of_football: "HBCU prestige football—Howard plays for institutional pride and cultural representation, where the marching band's excellence sets a standard that the team chases."
  cultural_footprint: "Howard is the HBCU that proves performing arts and athletics are inseparable—Showtime is globally iconic, and the football program carries the weight of that legacy."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Howard went 5–7 (2–3 MEAC) in 2025, a disappointing season that reflects broader institutional struggles competing for MEAC titles against rising peers like South Carolina State and Delaware State. Head coach Larry Scott returns for his sixth season, tasked with proving he can elevate football recruiting to match the institutional prestige of Showtime. QB Tyriq Starks leads a young offense. The key narrative: can Howard leverage its Washington, D.C. location, institutional prestige, and Showtime's global reach to build a consistent winner? Or does the football program remain secondary to the band's cultural dominance?
