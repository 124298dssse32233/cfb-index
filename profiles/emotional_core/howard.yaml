story_canon:
  the_unique_thing: "Showtime Marching Band—the world-renowned Howard University marching ensemble, central to the Chadwick A. Boseman College of Fine Arts. Showtime includes the Dazzlin' Diamonds baton twirlers, Flashy Flags, Ooh La La! dancers, and Thunder Machine percussion. The ensemble is globally recognized for choreography, musicality, and elaborate productions; Showtime is not a marching band—it's a cultural institution."
  the_origin: "Howard University was founded in 1867 as one of the first Historically Black Universities. The football program was established in the early 1900s as part of the athletic tradition. Showtime Marching Band emerged as a cultural centerpiece of HBCU identity, representing Howard's commitment to excellence in the performing arts."
