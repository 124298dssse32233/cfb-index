the_wound:
  name: "The credibility gap"
  detail: "Howard's Showtime Marching Band is globally respected, the football program is not. The 2025 season (5–7) felt like a continuation of a wound: the Bison have won just a handful of MEAC titles in the modern era, and recruiting struggles against peers who deliver on-field success alongside cultural prestige. For a program housed in the Chadwick A. Boseman College of Fine Arts, the football field has become a secondary stage."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Prove that Howard football can be a platform worthy of the Showtime legacy—a MEAC title that forces national media to take the Bison seriously, not just the band."
