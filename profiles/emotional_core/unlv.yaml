emotional_core:
  primary: restoration    # the longtime doormat turned legitimate Mountain West power overnight
  secondary: spectacle    # Las Vegas, Allegiant Stadium, an offense built to entertain
  core_variant: perpetual-rebuild
  one_line: "UNLV is the desert program that spent decades as a punchline and is now the best team in the Mountain West that can't win the Mountain West — three straight title-game losses to Boise State, all in the brightest lights in college football."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A sudden run of double-digit-win seasons and back-to-back conference title-game trips vs the fact that Boise State keeps slamming the door, plus a program history that was mostly losing before 2023."

the_wound:
  name: "The title game keeps ending the same way"
  detail: "UNLV went 10-3 in Dan Mullen's first year, 2025, and reached the Mountain West championship game — only to lose 38-21 to Boise State, the Rebels' third straight title-game defeat to the Broncos, then fell to Ohio 17-10 in the Frisco Bowl. The program is good enough to get to the last game and hasn't yet been good enough to win it."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Finally take the last step — beat Boise State, win the Mountain West outright, and put a championship next to the Las Vegas lights."
  drought: { since: 1994, unit: conference_title }

the_chip:
  villain: national_media
  text: "Rebels fans are tired of being treated as a novelty act — the casino-town team nobody took seriously. They'll tell you UNLV has been one of the best stories in the Group of Five for three years running, even if the rankings keep forgetting."

the_delusion:
  tone: earnest
  text: "The fanbase believes Las Vegas is a sleeping football giant — that with Allegiant Stadium, the city's money and the right coach, the Rebels are a year away from being the program everyone else in the Mountain West fears."

the_grudge_texture:
  rival: boise-state
  texture: championship   # the Broncos are the wall between UNLV and the title — three straight title-game losses

the_coach_relationship: savior   # Barry Odom rebuilt the program (2023), Dan Mullen kept it climbing (2024-) — coaching is the engine of the rise
the_internal_fracture: contender-now vs prove-it — the faction that says the title-game runs make UNLV a real power vs the faction that says it isn't real until Boise State is finally beaten
