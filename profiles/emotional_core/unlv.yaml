story_canon:
  the_unique_thing: "UNLV plays its home games in Allegiant Stadium — a $2 billion NFL palace it shares with the Raiders — and turned itself, almost overnight, from one of the worst programs in the FBS into the Mountain West's most exciting team, all under the brightest lights in the sport."
  the_origin: "A young university in the entertainment capital of the world, where football long played second fiddle to the Runnin' Rebels basketball dynasty — until a 2020s rebuild gave Las Vegas a football team worth watching."
  golden_ages:
    - { era: "1984 / 1994", what: "The program's early Big West peaks — the closest UNLV came to conference glory before the modern era" }
    - { era: "2023–2025 (Odom / Mullen)", what: "Three straight winning seasons, a share of the 2023 Mountain West title, and back-to-back title-game appearances" }
  legends:
    - { name: Barry Odom, role: coach, why: "Engineered the 2023 turnaround that made UNLV relevant, then left for Purdue" }
    - { name: Anthony Colandrea, role: player, why: "The 2025 Mountain West Offensive Player of the Year who ran Dan Mullen's high-scoring offense" }
  canonical_moments:
    - { name: "The 2023 turnaround", year: 2023, what: "Barry Odom takes a doormat to nine wins and a share of the Mountain West title", handling: glory }
    - { name: "The title-game losses to Boise State", year: 2025, what: "A third straight Mountain West championship-game defeat to the Broncos, 38-21", handling: heartbreak }
  the_place: "Allegiant Stadium — the Raiders' NFL home on the Las Vegas Strip, where a college program plays in front of pro-stadium lights and a tourist-and-local crowd."
  brand_of_football: "Vegas spectacle — a fast, high-scoring, entertainment-first offense that fits the city, built to put on a show as much as win a game."
  cultural_footprint: "Las Vegas's own football team — proof that a town defined by basketball, casinos and tourism can build a Saturday football identity, and that the Strip can host a real college program."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: UNLV went 10-3 in Dan Mullen's first season, 2025, reached the Mountain
    West championship game, and lost 38-21 to Boise State — a third straight title-game loss to the Broncos —
    then fell to Ohio 17-10 in the Frisco Bowl. QB Anthony Colandrea was named Mountain West Offensive Player
    of the Year. The question in Las Vegas: can Mullen finally break through Boise State and turn three years
    of contention into the program's first conference championship of the modern era.
