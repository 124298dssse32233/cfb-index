emotional_core:
  primary: honor        # the keeper of Pop Warner's legacy
  secondary: standard   # living up to five national titles
  one_line: "Cornell football is the program that Pop Warner built into a dynasty (five national titles, three undefeated seasons), and still plays the game the way he taught it — with intelligence, tradition, and pride in the sport itself."

self_image:
  archetype: blue-blood-living-up
  standard_gap_frame: "Five national championships, the legacy of Pop Warner, and the Ivy League's sixth-most played rivalry (Penn) vs the reality of being one of the smaller Ivy programs competing for championships."

the_wound:
  name: "The weight of Pop Warner's legacy — can any coach live up to it?"
  detail: "Pop Warner coached Cornell (1904–1906) and built one of college football's first dynasties. The program then posted three consecutive undefeated seasons (1920–1923) under Gil Dobie. Cornell has never found a coach who matched that standard in the modern era. The wound is generational: greatness that happened once, long ago."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Recapture Ivy League dominance and remind people why Pop Warner's Cornell was a dynasty. The 1988 and 1990 shared Ivy titles are proof the program can still compete."
  drought: { since: 1990, unit: conference_title }

the_chip:
  villain: big_brother
  text: "The fanbase believes Penn holds the sixth-most played rivalry in college football history against Cornell, and that Penn has won more Ivy titles in the modern era. Cornell built the foundation of Ivy football, but Penn has claimed more championships since 1956. That gap between historical pedigree and modern success fuels the Big Red."

the_delusion:
  tone: self-aware
  text: "That Cornell could have continued Pop Warner's dynasty if the Ivy League had allowed it — and the fanbase half-believes it. The program knows what it could have been; the Ivy League's structure prevents it from finding out."

the_grudge_texture:
  rival: penn
  texture: championship    # the sixth-most played rivalry in college football history

the_coach_relationship: legends-shadow   # every coach lives under Pop Warner's shadow
the_internal_fracture: null
