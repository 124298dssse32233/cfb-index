emotional_core:
  primary: redemption      # the prodigal coach who broke their hearts in 2007 came home to fix it — a story too good to script
  secondary: grievance     # an entire state's chip against everyone who treats Morgantown as flyover football
  one_line: "West Virginia is an entire state's only big-time team, and it just hired back the coach who broke its heart in 2007 and bolted — Rich Rodriguez, home in Morgantown to finish what the Backyard Brawl interrupted."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "A 2007 team one home win from the national championship game vs the years since of good-not-great Big 12 finishes and a 4-8 reset — the gap between almost-immortal and merely respectable."

the_wound:
  name: "The 2007 Backyard Brawl"
  detail: "Ranked No. 2 and a home win over 4-7 Pitt from the BCS title game, West Virginia lost 13-9 in the season's biggest stunner — and two weeks later Rich Rodriguez left for Michigan. The closest the program ever came to the summit became its deepest scar, and the man at the center of it is now the head coach again."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Finish what 2007 started — a Big 12 title and the league's spot in the Playoff, the breakthrough the program has chased since the night Pitt took it away."
  drought: { since: 2011, unit: conference_title }

the_chip:
  villain: national_media
  text: "Mountaineer fans are tired of their state's only major team being treated as an afterthought, a hard place to recruit, a name from the past. They say Morgantown is the loudest Saturday nobody outside the state bothers to watch — and they wear the slight like armor."

the_delusion:
  tone: load-bearing
  text: "Mountaineer fans believe Rich Rodriguez can recreate the magic of his first tenure — that the coach who built the 2005-2007 peak will out-scheme the Big 12 again, and that an entire state's faith is enough to drag the program back to the edge of a title it nearly won."

the_grudge_texture:
  rival: pittsburgh
  texture: blood-feud   # the Backyard Brawl — geographic hatred, the 2007 wound, and the most personal game on the schedule

the_coach_relationship: savior   # Rich Rodriguez, the prodigal son, hired to restore the program he once left for Michigan
the_internal_fracture: forgiveness vs the grudge — the faction thrilled to have Rodriguez home and the faction that never forgave 2007 and watched a 4-8 first year with arms crossed
register: appalachian-blue-collar-loud   # DRAFT (from voice_register) — confirm
