story_canon:
  the_unique_thing: "West Virginia is the only major-college football team in the entire state — there is no other — which makes the Mountaineers a whole state's singular Saturday, and makes Country Roads at the end of a Milan Puskar Stadium night the most communal sound in the sport."
  the_origin: "A land-grant university in Morgantown serving a small, fiercely proud Appalachian state with no NFL or major pro team of its own — so football became the entire state's shared identity."
  golden_ages:
    - { era: "2005–2007 (Rich Rodriguez)", what: "The spread-option peak — a 2006 Sugar Bowl rout of Georgia, Pat White and Steve Slaton, and a team that came within a home upset of the BCS title game" }
    - { era: "1988 & 1993 (Don Nehlen)", what: "Two undefeated regular seasons and national-title-game contention — the program's first golden era" }
  legends:
    - { name: Pat White, role: player, why: "The quarterback of the mid-2000s peak; four bowl wins and the face of the spread-option era" }
    - { name: Don Nehlen, role: coach, why: "Built West Virginia into a national name with two unbeaten regular seasons" }
    - { name: Major Harris, role: player, why: "The electric 1988 quarterback who defined the program's first run at a title" }
  canonical_moments:
    - { name: "The 2006 Sugar Bowl", year: 2006, what: "West Virginia stuns Georgia 38-35 to announce the spread-option era nationally", handling: glory }
    - { name: "The 2007 Backyard Brawl", year: 2007, what: "No. 2 WVU, a home win from the BCS title game, loses 13-9 to 4-7 Pitt — the program's deepest heartbreak", handling: heartbreak }
    - { name: "Rodriguez beats Pitt at last", year: 2025, what: "In his first Backyard Brawl since 2007, the returned Rich Rodriguez beats Pitt 31-24 in overtime", handling: glory }
  the_place: "Milan Puskar Stadium (Mountaineer Field) in Morgantown, where the night games are an Appalachian roar and the postgame singing of 'Take Me Home, Country Roads' binds a whole state together."
  brand_of_football: "Let's go, Mountaineers — loud, blue-collar, spread-option in its soul; a coal-country toughness and a fanbase whose couch-burning intensity is famous and earned."
  cultural_footprint: "A state's entire sporting identity in one program — no pro team, no rival flagship, just the Mountaineers, carried by a fanbase that treats every Saturday as the state's own."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: West Virginia fired Neal Brown after 2024 and brought back Rich Rodriguez,
    home in Morgantown for the first time since he left for Michigan after the 2007 heartbreak. His first year back
    was rough — 4-8 (2-7 Big 12), an offense that looked overmatched — though it included a cathartic 31-24
    overtime win over Pitt, his first Backyard Brawl since 2007. With the quarterback room reshuffled (Nicco
    Marchiol transferred out after injury; Scotty Fox Jr. played most of the year) and a veteran portal arm
    planned, 2026 is the prove-it year for the prodigal coach.
