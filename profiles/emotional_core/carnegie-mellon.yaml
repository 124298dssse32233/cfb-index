story_canon:
  the_unique_thing: "Carnegie Mellon is the only major college football program where every player is also a world-class engineer, computer scientist, or mathematician — the roboticist's football team."
  the_origin: "Founded in Pittsburgh in 1900, CMU football has always been secondary to the university's elite STEM mission. The program defines itself by producing Rhodes Scholars, NASA engineers, and tech leaders, not NFL draft picks."
  golden_ages:
    - { era: "1989 PAC Championship", what: "The program's last conference title; marked the peak of a quiet, competent era" }
    - { era: "2021–2022", what: "Back-to-back PAC championships and NCAA tournament returns after a 32-year drought; recent resurgence" }
  legends:
    - { name: "CMU Computer Science Department", role: "program identity", why: "The true heart of the program — players are trained here, not just on the field" }
  canonical_moments:
    - { name: "1989 PAC Championship", year: 1989, what: "CMU's last conference title before the 32-year drought", handling: glory }
    - { name: "2021 PAC Championship return", year: 2021, what: "After 32 years, CMU returns to the postseason under Ryan Larsen", handling: glory }
    - { name: "Centennial Conference arrival", year: 2025, what: "CMU joins Centennial as associate member, finding new conference home", handling: glory }
  the_place: "Gesling Stadium in Pittsburgh — a program embedded in a STEM campus where the student body is uninterested in sports but deeply invested in academic excellence."
  brand_of_football: "Intellectual football — disciplined, cerebral, played by the smartest athletes in the room. Not flashy; precise."
  cultural_footprint: "Proof that a world-class university can field competitive football without compromising its academic mission; a program that asks, 'What happens when the smartest people play?'"
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Carnegie Mellon joined the Centennial Conference in 2025 as an associate member, leaving behind 95 years in the Presidents' Athletic Conference. The transition follows back-to-back PAC championships in 2021–2022 under coaches Ryan Larsen and Ben Gibboney. The 2025 question in Pittsburgh: can CMU establish itself in the Centennial, and does a program built on academic excellence + quiet football success belong in a more competitive conference?
  research_checklist:
    - CMU's 1989 PAC championship legacy
    - 2021–2022 PAC championship returns
    - Current 2025 Centennial Conference transition
