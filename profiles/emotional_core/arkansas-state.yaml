# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The coaching factory — Arkansas State won five straight Sun Belt titles (2011-2015) under a revolving door of coaches who each left after one year for a bigger job: Hugh Freeze to Ole Miss, Gus Malzahn to Auburn, Bryan Harsin to Boise State and later Auburn. No program in the sport produced more head-coaching talent per win, and lost them all."
  the_origin: "A Jonesboro program that became the Indians, then rebranded as the Red Wolves in 2008, and built a Sun Belt dynasty in the 2010s that doubled as the best coaching incubator in the Group of Five."
  golden_ages:
    - { era: "2011–2015", what: "Five consecutive Sun Belt championships — the league's defining dynasty" }
    - { era: "Freeze / Malzahn / Harsin / Anderson", what: "A coaching tree that staffed the SEC, each hired away after a single title season" }
  legends:
    - { name: Gus Malzahn, role: coach, why: "Won the 2012 Sun Belt, then left for Auburn and a national-title game — the archetype of the A-State launchpad" }
    - { name: Hugh Freeze, role: coach, why: "2011 Sun Belt champion in his one season before Ole Miss; the tree's first branch" }
    - { name: Butch Jones, role: coach, why: "The coach who finally stayed, steadying the program back to bowl games" }
  canonical_moments:
    - { name: "Five straight Sun Belt titles", year: 2015, what: "The 2011-2015 dynasty — the most dominant run in conference history", handling: glory }
    - { name: "The coaching carousel", year: 2013, what: "Three head coaches in three years, each leaving for a Power job after winning the league — the program's blessing and its curse", handling: wound }
  the_place: "Centennial Bank Stadium in Jonesboro — the Red Wolves' den in the Arkansas Delta, 'Wolves Up' across a fanbase that has watched its coaches walk out the door for a decade."
  brand_of_football: "Up-tempo, spread-it-out offense — the Malzahn-Freeze DNA that the program kept exporting; modern, fast, and built to outscore in a high-scoring league."
  cultural_footprint: "The Group of Five's coaching incubator — proof that a small Delta school can build champions and the men who coach them, even as it watches the talent leave; the Red Wolves rebrand a rare mid-major identity remake that stuck."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Arkansas State went 7-6 (5-3 Sun Belt) in 2025 under Butch Jones,
    starting 1-4 against a schedule that included Power foes Arkansas and Iowa State, then winning six of
    its last eight and beating Missouri State 34-28 in the Xbox Bowl. Jones, now in his sixth season — a
    rare display of continuity after the carousel years — enters 2026 trying to climb back toward the top
    of a Sun Belt the Red Wolves once owned.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
