emotional_core:
  primary: grievance      # the Sun Belt dynasty that built coaches for everyone else and never got the credit
  secondary: restoration  # Butch Jones clawing the program back to bowls after the dynasty faded
  core_variant: the-ceiling
  one_line: "Arkansas State won five straight Sun Belt titles and turned its sideline into a coaching factory — Malzahn, Freeze, Harsin, all hired away — a program that built champions and head coaches for everyone but itself."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "Five consecutive conference titles and a coaching tree that staffs the SEC against a decade since, the program watching its own blueprint enrich bigger schools."

the_wound:
  name: "The long fade since the dynasty"
  detail: "After five straight Sun Belt championships from 2011-2015 — each won under a coach who immediately left for a bigger job — Arkansas State spent the years since chasing that height, sliding into losing seasons before Butch Jones steadied it; the 2025 team started 1-4 before rallying to 7-6 and a bowl win."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Win the Sun Belt again — break the decade-long drought, prove Jonesboro can keep a champion together instead of feeding the bigger programs, and get back to the top of the league it once owned."
  drought: { since: 2016, unit: conference_title }

the_chip:
  villain: blue_bloods
  text: "Red Wolves fans say the power programs treat Arkansas State as a vending machine — pull a coach, take the blueprint, move on — and never once look back; Jonesboro says it built the tree the SEC harvests, and it's tired of getting none of the fruit."

the_delusion:
  tone: self-aware
  text: "The fanbase believes Jonesboro can finally keep a winner — that the next breakout coach stays long enough to rebuild the dynasty instead of bolting for a bigger paycheck; they've watched it happen five times and believe it anyway."

