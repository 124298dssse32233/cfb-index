emotional_core:
  primary: restoration
  secondary: honor
  core_variant: regime-reset
  one_line: "North Carolina A&T is the winningest HBCU program in football history — seven Black college national championships and a 2017 undefeated season — now rebuilding in the CAA after leaving the MEAC that made them legends."

self_image:
  archetype: blue-blood-fallen
  standard_gap_frame: "Seven HBCU national championships (including a 12-0 season in 2017) and MEAC dominance vs two straight losing seasons in the CAA — the Aggies carry the most decorated HBCU resume in the sport and are working to translate it to a new conference."

the_wound:
  name: "The CAA transition and the first-year Gibbs stumble"
  detail: "NC A&T won five MEAC championships and four HBCU national titles between 2014 and 2019, then left for the Big South and eventually the CAA. The 2025 season under first-year head coach Shawn Gibbs produced a 2-10 record (2-6 CAA). The program that was dominant in HBCU football for a decade is struggling to find its footing in its new conference home."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the CAA and prove the Aggie standard travels — that the program that went 12-0 in 2017 can become a CAA champion and bring the HBCU championship culture to the FCS's most competitive conference."
  drought: { since: 2019, unit: conference_title }

the_chip:
  villain: blue_bloods
  text: "The fanbase says NC A&T holds the HBCU record with seven national championships and a Pro Bowl running back in Tarik Cohen — that the program earned its place in the CAA on merit, not nostalgia, and will prove it once the roster catches up to the ambition."

the_delusion:
  tone: earnest
  text: "They believe the championship DNA that produced a 12-0 season in 2017 and Tarik Cohen is still in Greensboro — that NC A&T is too talented a recruiting market and too proud a program to stay at the bottom of the CAA for long."

the_grudge_texture:
  rival: norfolk-state
  texture: blood-feud

the_coach_relationship: hot-seat-churn
the_internal_fracture: HBCU-identity-pride vs CAA-integration-ambition — the faction that celebrates the MEAC championship era as the true measure of the program vs the faction that believes competing in the CAA is the path to FCS relevance that the championships deserve

