story_canon:
  the_unique_thing: "The winningest HBCU program in college football — seven Black college national championships, including a 12-0 undefeated 2017 season and a record 59-13 from 2014 to 2019 — built in Greensboro, North Carolina, the heart of HBCU football country."
  the_origin: "NC A&T has played football since 1924 and joined the MEAC in 1971. The program's modern golden age began in 1999 under Head Coach Bill Hayes — an undefeated MEAC season and HBCU national title — and peaked between 2014 and 2019 with five MEAC championships and four HBCU national titles. The Aggies left the MEAC for the Big South in 2021 and joined the CAA in 2023."
  golden_ages:
    - { era: "1999 (Hayes title)", what: "NC A&T goes undefeated in MEAC play for the first and only time in program history, wins 11 games and earns the HBCU national championship" }
    - { era: "2014-2019 (dynasty peak)", what: "Five MEAC championships and four HBCU national titles in six years — 59-13 record — the most dominant stretch in HBCU football history in the modern era" }
    - { era: "2017 (undefeated season)", what: "NC A&T goes 12-0, wins the MEAC and the Celebration Bowl over Grambling — the program's best season by record" }
  legends:
    - { name: Tarik Cohen, role: player, why: "MEAC record 5,619 career rushing yards; 2018 NFL Pro Bowl selection with the Chicago Bears; the defining modern player in program history" }
    - { name: Rod Broadway, role: coach, why: "Led the 2014-2019 dynasty — five MEAC titles and four HBCU national championships; most successful coach in the modern NC A&T era" }
  canonical_moments:
    - { name: "2017 undefeated season", year: 2017, what: "NC A&T finishes 12-0, wins the MEAC and defeats Grambling in the Celebration Bowl — the program's best season", handling: glory }
    - { name: "1999 HBCU championship", year: 1999, what: "First undefeated MEAC season in program history; 11 wins and Black college national title under Bill Hayes", handling: glory }
    - { name: "Tarik Cohen NFL Pro Bowl", year: 2018, what: "Tarik Cohen earns a Pro Bowl selection with the Chicago Bears in his rookie season — peak individual achievement from an Aggie", handling: glory }
    - { name: "2025 CAA debut — 2-10", year: 2025, what: "First-year coach Shawn Gibbs posts 2-10 (2-6 CAA) — the hard floor of the CAA transition era", handling: wound }
  the_place: "Truist Stadium in Greensboro, North Carolina — home attendance averaging 12,282 in 2025 (18th-highest in all FCS), proof that Aggie fans show up even in transition."
  brand_of_football: "Physical, HBCU-proud, talent-pipeline football — a program that develops NFL players and runs the table in HBCU football when the roster matches the ambition."
  cultural_footprint: "The defining HBCU football program of the 2010s — NC A&T's 59-13 run and seven national titles are the benchmark against which all HBCU football is measured, and Tarik Cohen is the Pro Bowl proof that Greensboro develops NFL talent."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: NC A&T went 2-10 (2-6 CAA) in 2025 under first-year head coach
    Shawn Gibbs — the program's second straight losing season and the clearest evidence yet that the CAA
    transition is a rebuild, not a continuation of the MEAC dynasty. Average home attendance of 12,282
    (18th in all FCS) shows the fan base's faith; the on-field results have not yet matched it.
    The rivalry with Norfolk State — scheduled as a non-conference game since leaving the MEAC — remains
    the emotional anchor of the Aggie schedule. Gibbs enters year two with the mandate to show a floor
    and build toward the winning that the program's HBCU legacy demands.
