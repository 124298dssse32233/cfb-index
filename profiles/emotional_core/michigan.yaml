emotional_core:
  primary: standard       # the winningest program measures every year against the whole ledger, not the last one
  secondary: restoration  # the live work is rebuilding institutional stability after the year off the field went wrong
  one_line: "Michigan is the sport's winningest program — the keeper of the record book — handing the keys to a 21-year Utah builder and a sophomore phenom to steady a house that just shook from the inside."

self_image:
  archetype: blue-blood-living-up
  standard_gap_frame: "More wins than any program in the sport's history and the 2023 national title vs a 9-4 finish, a Citrus Bowl collapse to Texas, and a coaching change forced by an off-field reckoning rather than a record."

the_wound:
  name: "The coaching upheaval"
  detail: "Sherrone Moore was dismissed for cause in December 2025 amid an off-field investigation; Michigan moved quickly to hire Kyle Whittingham, fresh off 21 seasons at Utah, as its 22nd head coach — a hard, sudden reset in a program that prizes order above almost everything."
  handling: never-a-punchline
  freshness: this-era

the_dream:
  text: "Convert the deepest history in the sport into a second title of the era — Whittingham's stability plus Underwood's ceiling, back to The Game won and the Playoff entered as expected."
  drought: { since: 2023, unit: national_title }

the_chip:
  villain: national_media
  text: "The fanbase has heard for two years that the 2023 title carries an asterisk and that Michigan is a story the rest of the sport gets to narrate; Michigan Men say the ledger answers all of it, and that the program that has done this longer than anyone doesn't need the panels' permission."

the_delusion:
  tone: load-bearing
  text: "Michigan fans believe the institution outlasts any single season — that more all-time wins than anyone means the standard is permanent, the down year is a recalibration, and a sophomore quarterback and a proven coach put the Big House back where it belongs by default."

the_grudge_texture:
  rival: ohio-state
  texture: blood-feud   # The Game — the sport's defining rivalry, raw and year-round

the_coach_relationship: savior   # Whittingham arrives as the steady hand brought in to restore order after the upheaval
the_internal_fracture: patience vs urgency — the room that says a 21-year program-builder needs a season to install his culture vs the room that says Michigan, with the record book and a five-star quarterback, should never schedule a rebuild
register: proud-institutional   # DRAFT (from voice_register) — confirmed
