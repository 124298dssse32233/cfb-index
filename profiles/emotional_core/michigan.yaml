# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Michigan has won more games than any program in the history of college football and owns the highest all-time win percentage among programs with 1,000-plus games — it is, literally, the keeper of the record book, and it plays the sport's defining rivalry in front of the largest crowd in the Western Hemisphere."
  the_origin: "One of the founding programs of the sport; Fielding Yost's 'point-a-minute' teams (1901-1905) won early national titles and the first Rose Bowl, and the winged helmet and 'The Victors' fixed an identity that has barely changed in a century."
  golden_ages:
    - { era: "1901–1926 (Yost)", what: "The 'point-a-minute' dynasty, the first Rose Bowl, and the architecture of the brand" }
    - { era: "1969–1989 (Bo Schembechler)", what: "The Ten Year War with Ohio State and the modern Michigan identity" }
    - { era: "2021–2023 (Harbaugh)", what: "Three straight wins over Ohio State capped by the 2023 national title — the first in 26 years" }
  legends:
    - { name: Bo Schembechler, role: coach, why: "Defined modern Michigan; 'Those who stay will be champions' and 'The Team, The Team, The Team'" }
    - { name: Charles Woodson, role: player, why: "1997 Heisman winner and the centerpiece of the last pre-2023 national title" }
    - { name: Tom Harmon, role: player, why: "1940 Heisman; the early icon of the program's national stature" }
  canonical_moments:
    - { name: "The 2023 national title", year: 2024, what: "Michigan beats Washington for its first championship in 26 years, vindicating the Harbaugh era", handling: glory }
    - { name: "Three straight over Ohio State", year: 2023, what: "Michigan wins The Game three years running (2021-2023) before the title run", handling: glory }
    - { name: "The punt", year: 2015, what: "A botched snap on a punt hands Michigan State a last-second win; 'the punt' carries weight to this day", handling: heartbreak }
  the_place: "Michigan Stadium — 'The Big House' — capacity 107,601, the largest stadium in the Western Hemisphere, where the team touches the M Club banner and the crowd sings 'The Victors' after every score."
  brand_of_football: "Proud-institutional: physical, disciplined, historically run-first; a program that speaks in the register of an alumni magazine and treats winning as the continuation of what it has always done."
  cultural_footprint: "College football's institutional memory — the program that keeps the records, including the record of having more of them than anyone, and a national alumni diaspora ('Michigan Men') that runs through every major market."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Michigan finished 2025 at 9-4, losing the Citrus Bowl to Texas 41-27 in a
    fourth-quarter collapse. The bigger story was off the field: Sherrone Moore was dismissed for cause in December
    2025 amid an off-field investigation, and Michigan hired 21-year Utah coach Kyle Whittingham as its 22nd head
    coach on a five-year deal. Sophomore quarterback Bryce Underwood — the former No. 1 recruit who threw for 2,229
    yards with growing pains as a freshman — returns to lead a program betting that a steady, proven coach turns a
    turbulent year into a fast reset. 2026 is the referendum on whether the standard reasserts itself.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
