emotional_core:
  primary: restoration    # a 3-9 team rebuilt into a 9-4 bowl team, timed perfectly to walk into a power conference
  secondary: house-money  # the California G5 program that spent years on the doorstep finally gets its power-conference seat
  core_variant: perpetual-rebuild
  one_line: "San Diego State is the program that gave football Air Coryell and Marshall Faulk, built a stadium of its own at Snapdragon, and — after a 3-9 bottom and a 9-4 rebuild — finally walks through the door into the Pac-12 in 2026."

self_image:
  archetype: riser-proving
  standard_gap_frame: "Don Coryell's small-college national titles and Marshall Faulk's records, against a long stretch as a very good Mountain West program that kept getting passed over — until the Pac-12 invite came."

the_wound:
  name: "The doorstep years — the realignment bridesmaid"
  detail: "For a decade SDSU built like a power program — a 12-win 2016, a College Football Playoff-adjacent reputation, a brand-new Snapdragon Stadium in 2022 — and watched bigger leagues form, dissolve, and reform without it. The 2024 season bottomed at 3-9 under new coach Sean Lewis before the rebuild and the Pac-12 invitation arrived together."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the new Pac-12 and prove the seat was earned — that the program of Coryell and Faulk was always a power program waiting for a power conference to admit it."
  drought: { since: 2016, unit: conference_title }

the_chip:
  villain: national_media
  text: "Aztec fans are tired of being the program everyone respects and nobody ranks — the California school with two Hall-of-Fame names in its past that kept getting filed under 'G5.' They'll tell you the Pac-12 invite just made official what they always knew."

the_delusion:
  tone: earnest
  text: "San Diego fans believe the Pac-12 jump changes everything overnight — that a beautiful new stadium, a Southern California recruiting base, and a 9-4 rebuild make the Aztecs an instant contender in the reborn league. They're sure the ceiling was always conference-level, just waiting on the invitation."

the_grudge_texture:
  rival: fresno-state
  texture: border-war   # the Oil Can / California MW rivalry — and now Pac-12 housemates again

the_coach_relationship: savior   # Sean Lewis took a 3-9 team to 9-4 and a bowl in year two, into the Pac-12 era
the_internal_fracture: arrival vs proof — the faction that treats the Pac-12 seat as the destination reached vs the faction that says nothing's proven until the Aztecs actually win in it
