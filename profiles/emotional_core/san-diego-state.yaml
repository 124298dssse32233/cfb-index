# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "San Diego State is where the modern passing game was born. Don Coryell built 'Air Coryell' here in the 1960s before taking it to the NFL — the lineage that runs through every spread offense since — and a decade-plus later Marshall Faulk rewrote the record book in an Aztec uniform. Two of football's most important names share one campus."
  the_origin: "A commuter-era state school in San Diego that Don Coryell turned into a small-college power in the 1960s, then a program that produced NFL stars and lived for decades as the best team in Southern California that the blue bloods kept overlooking."
  golden_ages:
    - { era: "1961–1972 (Don Coryell)", what: "A 104-19-2 run, undefeated teams, small-college national championships, and the birth of Air Coryell" }
    - { era: "2015–2016 (Rocky Long)", what: "Back-to-back double-digit-win seasons and the 2016 Mountain West championship — the modern peak" }
  legends:
    - { name: "Don Coryell", role: coach, why: "Invented the modern vertical passing game at SDSU before revolutionizing the NFL — the Aztecs' founding genius" }
    - { name: "Marshall Faulk", role: player, why: "Pro Football Hall of Famer; as a freshman led the nation in rushing and scoring at SDSU" }
    - { name: "Rocky Long", role: coach, why: "The 3-3-5 defensive architect who delivered the 2016 Mountain West title" }
  canonical_moments:
    - { name: "Faulk's record day", year: 1991, what: "As a freshman, Marshall Faulk runs for 386 yards and seven touchdowns vs Pacific — one of the great individual games in college history", handling: glory }
    - { name: "2016 Mountain West championship", year: 2016, what: "SDSU caps a 11-win season with the conference title — the program's modern high point", handling: glory }
    - { name: "Snapdragon Stadium opens", year: 2022, what: "The Aztecs open their own purpose-built home in Mission Valley after years sharing an NFL stadium — a program planting its flag", handling: glory }
  the_place: "Snapdragon Stadium (cap ~35,000), opened in 2022 in Mission Valley — SDSU's first dedicated home, the physical proof of a program building for the big time after decades as a tenant in the Chargers' old stadium."
  brand_of_football: "A Coryell passing pedigree married to Rocky Long's gambling 3-3-5 defense — historically a stout, physical Mountain West identity, now modernizing under Sean Lewis's up-tempo offense."
  cultural_footprint: "Southern California's flagship state-school football program — the team San Diego claims as its own in an NFL-less city, and a coaching tree (Coryell) that shaped the entire pro and college passing game."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Sean Lewis followed a 3-9 debut (2024) with a 9-4 bounce-back in 2025,
    losing a wild 49-47 New Mexico Bowl to North Texas in the Aztecs' final Mountain West game. In 2026 SDSU joins
    the rebuilt Pac-12 alongside Boise State, Fresno State and Colorado State — the power-conference invitation the
    program chased for years. Year three for Lewis opens with the Aztecs picked to contend in the new league.
