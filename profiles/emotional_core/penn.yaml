emotional_core:
  primary: honor        # the Ivy power that won 18 conference titles
  secondary: standard   # living the expectation of sustained excellence
  one_line: "Penn football is the oldest active stadium program (Franklin Field, 1895), a seven-time national champion, and the Ivy League's most successful conference program since joining in 1956 — proof that elite academics and football excellence can coexist."

self_image:
  archetype: blue-blood-living-up
  standard_gap_frame: "College football's most historic program, 888 wins, seven national titles, 18 Ivy League conference championships vs the no-scholarship rule that prevents the Crimson from recapturing their national dominance."

the_wound:
  name: "The unfinished championship narrative — national titles only before the Ivy League era"
  detail: "Penn won seven national championships (1894–1924), but all of them came before the Ivy League even existed (1956). Since joining the Ivy, Penn has won 18 conference titles but zero national championships. The program's legacy is pre-Ivy; its present is Ivy-constrained."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Prove that an Ivy League program can stack national-championship-era pedigree with modern conference dominance. Win the Ivy, win consistently, and remind people that Penn is college football's original powerhouse, not just a historical footnote."
  drought: { since: 1924, unit: national_title }

the_chip:
  villain: big_brother
  text: "Fans here believe penn built college football (literally: Franklin Field is the oldest active stadium), but Yale gets the Walter Camp credit and Harvard gets the prestige. Penn has won more Ivy titles than any peer and has a 20-game conference winning streak (2001–2004), but the program is treated like the Ivy League's best-kept secret."

the_delusion:
  tone: self-aware
  text: "That Penn could have won national championships in the modern era if the Ivy League had allowed scholarships. The fanbase knows it's impossible under Ivy rules, but the program's pre-1956 record suggests otherwise — and that gap between what-could-have-been and what-is fuels the program."

the_grudge_texture:
  rival: cornell
  texture: championship    # the sixth-most played rivalry in college football history

the_coach_relationship: legends-shadow   # Al Bagnoli (1991–2019) won 10 Ivy titles; long shadow
the_internal_fracture: null
