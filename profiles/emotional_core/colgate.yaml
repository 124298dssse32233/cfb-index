  tone: earnest
  text: "Fans believe the Kerr legacy is something that can be reclaimed with the right coach — that the Andy Kerr stadium and the 1932 team mean the program is destined to be good again. They know the game has moved on; Colgate football competes in a different era, but they believe the legacy will find its way back."

