story_canon:
  the_unique_thing: "The 1940s bowl dynasty and the 89-game consecutive-scoring streak: Catawba won back-to-back Tangerine Bowls (1947, 1948) and set a national consecutive-scoring record of 89 games (1947–1949) that held against Yale's 72-game mark. The Indians proved a Piedmont school could build a national identity."
  the_origin: "Catawba was founded in 1851 in Salisbury, North Carolina. Football came in the early 1900s and became a regional power. Under Gordon Kirkland in the 1940s, the program reached its peak."
  golden_ages:
    - { era: "1946–1947 (Gordon Kirkland)", what: "Two consecutive Tangerine Bowl victories (1947, 1948) and an 89-game consecutive-scoring streak that became a national footnote" }
  legends:
    - { name: Gordon Kirkland, role: coach, why: "Built the 1946–1947 bowl teams that defined Catawba football" }
  canonical_moments:
    - { name: "1947 Tangerine Bowl victory", year: 1947, what: "Catawba defeats Marshall 31–6 in the Tangerine Bowl, capping an 11–1 season", handling: glory }
    - { name: "89-game consecutive-scoring record", year: 1949, what: "The streak breaks but stands as a national record for decades, breaking Yale's 72-game mark", handling: glory }
  the_place: "Shuford Stadium in Salisbury, North Carolina — home of the Indians and a Piedmont landmark."
  brand_of_football: "Bowl-winning, scoring-machine football from the 1940s — a team that could run and score and win in December when it mattered."
  cultural_footprint: "Evidence that a small Piedmont college could build a real national identity in the 1940s — and that records set in that era can echo for generations."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Catawba went 5–1 overall and 3–1 SAC in 2025, its best start since 2017,
    under head coach Tyler Haines in his third season. Haines orchestrated the largest turnaround in the SAC during
    2023 and has the program ascending toward bowl eligibility. The Indians are no longer a basement program; they're
    climbing back toward the Tangerine Bowl era in the modern SAC.
