emotional_core:
  primary: house-money    # 2024 was a gift nobody saw coming — picked last, won the league, made the Playoff
  secondary: restoration  # holding onto relevance after a regression and the loss of the stars who built it
  one_line: "Arizona State was picked dead-last in the Big 12 and instead won the thing — an 11-3 league-champion, first-ever Playoff team built on Cam Skattebo's shoulders, the most joyful out-of-nowhere season the desert has had."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A program that went 3-9 and 2-19 over Kenny Dillingham's first stretch, then 11-3 with a Playoff berth — the gap is between that one perfect season and a history of being the desert's overlooked second team."

the_wound:
  name: "The 2025 comedown after the dream"
  detail: "The year after the Playoff run, Arizona State slid to 8-5 — Sam Leavitt broke his foot against Baylor, had season-ending surgery and entered the transfer portal, Cam Skattebo was gone to the NFL, and a Sun Bowl loss to Duke (42-39) closed a season that asked whether 2024 was the start of something or a one-off."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Prove 2024 wasn't lightning in a bottle — win the Big 12 again, get back to the Playoff, and make Tempe a place top recruits choose on purpose rather than a surprise."
  drought: { since: 2024, unit: conference_title }

the_chip:
  villain: national_media
  text: "Sun Devil fans say the sport picked them last in 2024 and treated the title that followed as a fluke all season — they say the preseason polls still won't take Tempe seriously, and they relish being the team nobody respects until kickoff."

the_delusion:
  tone: self-aware
  text: "The fanbase believes Dillingham, a Tempe kid coaching his hometown school, can keep conjuring 11-win seasons out of a roster the rankings undervalue — that the 2024 magic is repeatable on culture and energy even after the stars who powered it left."

the_grudge_texture:
  rival: arizona
  texture: border-war   # the Territorial Cup — the oldest trophy rivalry in college football
the_coach_relationship: savior   # Kenny Dillingham, hometown son, dragged ASU from 3-9 to the Playoff
the_internal_fracture: believer vs realist — the faction that sees a sustainable Dillingham program vs the faction bracing for regression to the mean now that Skattebo and Leavitt are gone
register: tempe-sun-devil-fork-up   # DRAFT (from voice_register) — confirm
