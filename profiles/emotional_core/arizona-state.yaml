# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Pat Tillman — the Sun Devil linebacker who walked away from an NFL contract to enlist after 9/11 and died in service; no program in the sport carries a person who means more, and ASU's identity is bound to his name as much as to any trophy."
  the_origin: "A Tempe program that became a 1970s Western power under Frank Kush, peaked with the 1996 Rose Bowl team, and — after long stretches of mediocrity — was reborn in 2024 by a hometown coach."
  golden_ages:
    - { era: "1970s (Frank Kush)", what: "An undefeated 1975 Fiesta Bowl season and the program's first national prominence; the stadium bears his name" }
    - { era: "1996 (Bruce Snyder)", what: "An 11-1 Pac-10 title and a Rose Bowl appearance led by Jake Plummer, nearly a national title" }
    - { era: "2024 (Kenny Dillingham)", what: "Picked last in the Big 12, won it — 11-3, the program's first College Football Playoff berth" }
  legends:
    - { name: Pat Tillman, role: player, why: "Walked away from the NFL to enlist; killed in Afghanistan — the program's soul and moral center" }
    - { name: Jake Plummer, role: player, why: "Quarterback of the 1996 Rose Bowl team, the gunslinger who took ASU to the brink of a title" }
    - { name: Frank Kush, role: coach, why: "Built ASU into a power; the stadium field carries his name" }
    - { name: Cam Skattebo, role: player, why: "The bruising back who carried the 2024 Playoff team and finished a Heisman finalist" }
  canonical_moments:
    - { name: "The 1996 Rose Bowl season", year: 1996, what: "11-1, a Pac-10 title and a Rose Bowl berth — a near-perfect run to the doorstep of a national title", handling: glory }
    - { name: "The 2024 Big 12 title and Playoff berth", year: 2024, what: "Picked last, won the league and reached the first 12-team Playoff — the great modern Sun Devil season", handling: glory }
    - { name: "Tillman's enlistment and death", year: 2004, what: "The Sun Devil who chose service over the NFL and gave his life — the program's enduring identity", handling: wound }
  the_place: "Mountain America Stadium in Tempe — Sun Devil Stadium of old, carved into the desert against Tempe Butte, 'A' Mountain glowing maroon and gold, the brutal early-season desert heat as a home-field weapon."
  brand_of_football: "High-energy, hometown-fueled football under Dillingham — fast, emotional, chip-on-the-shoulder; a 2024 identity built on a downhill run game and a defense that hit above its recruiting ranking."
  cultural_footprint: "The desert's emotional program — Pat Tillman's legacy, Sparky and the Fork-Up, a fan culture that treats being doubted as fuel and the 2024 run as proof the underestimation was always wrong."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: A year after the dream 11-3 Big 12 title and Playoff run, Arizona State
    fell to 8-5 (6-3) in 2025. Sam Leavitt suffered a season-ending foot injury against Baylor and entered the
    transfer portal; backup Jeff Sims, who started down the stretch, then declared for the NFL Draft. With
    Cam Skattebo also gone, a Sun Bowl loss to Duke (42-39) closed the year. Kenny Dillingham enters 2026
    rebuilding the quarterback room and trying to prove the breakthrough was a foundation, not a fluke.
