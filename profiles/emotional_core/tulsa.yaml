emotional_core:
  primary: restoration    # the private school that once played in BCS-buster conversations, clawing back to bowl level
  secondary: grievance    # the smallest-enrollment program in the FBS, perpetually told it doesn't belong
  core_variant: perpetual-rebuild
  one_line: "Tulsa is the tiny Oklahoma private school that out-scored everybody for a decade — and is trying, under a first-year coach, to remember how the offense used to feel like a track meet."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "An early-2010s run of double-digit-win seasons and conference titles vs a decade since, mostly spent fighting for bowl eligibility in a reshuffled American."

the_wound:
  name: "The long slide from the Graham/Blankenship peak"
  detail: "From the 2010 Conference USA title and Bill Blankenship's 11-3 in 2012, Tulsa has had one truly memorable team since (a 2020 AAC title-game run) and otherwise churned coaches and losing records — a 4-8 (1-7) first year under Tre Lamb in 2025 the latest reminder the offense isn't humming the way it once did."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Get the scoreboard spinning again — a winning season, a bowl, the feeling that the smallest school in the league can still out-gun the room."
  drought: { since: 2016, unit: bowl }

the_chip:
  villain: national_media
  text: "Tulsa fans are tired of being the program everyone forgets is in the FBS — the 4,000-student private school nobody schedules out of respect. They'll remind you it has more bowl history than schools five times its size."

the_delusion:
  tone: earnest
  text: "The fanbase believes the right offensive coach turns Tulsa back into a track meet overnight — that the talent finds its way to Chapman Stadium and the scoreboard does the rest, the way it did under Graham."

the_grudge_texture:
  rival: smu
  texture: little-brother   # the in-conference border resentment — SMU left for the ACC, Tulsa stayed; the bigger-money private school next door

the_coach_relationship: hot-seat-churn   # Graham left, then Blankenship/Montgomery/Wilson/now Lamb — a program that can't hold a coach who wins
the_internal_fracture: patience vs nostalgia — give Tre Lamb time to rebuild a 4-8 roster vs the faction that wants the Graham-era points back now
