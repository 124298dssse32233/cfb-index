story_canon:
  the_unique_thing: "Tulsa is one of the smallest schools in the FBS — a ~4,000-student Oklahoma private university — that spent a decade as one of the most explosive offenses in the country, proof that a tiny enrollment can still light up a scoreboard."
  the_origin: "A private university in a city that loves its only Division-I football team; the Golden Hurricane built their identity on wide-open, pass-happy offense long before the rest of the sport caught up."
  golden_ages:
    - { era: "2007–2010 (Todd Graham)", what: "An up-tempo offense, a 2010 Conference USA title and 10-3 finish — the Air Raid era that put Tulsa on the national radar" }
    - { era: "2012 (Bill Blankenship)", what: "An 11-3 season capped by a Liberty Bowl win — the program's last truly great year" }
  legends:
    - { name: Todd Graham, role: coach, why: "Architected the up-tempo era that defined modern Tulsa football" }
    - { name: Paul Smith, role: player, why: "The quarterback who ran the record-setting offenses of the late 2000s" }
  canonical_moments:
    - { name: "The Liberty Bowl season", year: 2012, what: "11-3 and a Liberty Bowl win under Bill Blankenship — the high-water mark", handling: glory }
    - { name: "The 2010 Conference USA title", year: 2010, what: "Todd Graham's 10-3 team wins the league and a bowl", handling: glory }
    - { name: "The 2020 AAC title-game run", year: 2020, what: "A surprise pandemic-year climb to the American championship game", handling: glory }
  the_place: "Skelly Field at H.A. Chapman Stadium — an intimate on-campus venue in midtown Tulsa where a small school feels its football team up close."
  brand_of_football: "Track-meet offense — Tulsa's identity, when it's right, is points: tempo, the deep ball, a scoreboard that won't sit still."
  cultural_footprint: "The third Oklahoma football program — neither Norman nor Stillwater — that gives Tulsa its own Division-I Saturday and a private-school pride that punches above its enrollment."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Tre Lamb arrived from East Tennessee State and went 4-8 (1-7 American) in
    his first season, 2025 — a hard reset for a roster short on the firepower that once defined the program.
    The question in Tulsa: can Lamb, a proven FCS turnaround coach, rebuild the offense back to bowl level and
    end a long stretch of irrelevance for the smallest school in the league.
