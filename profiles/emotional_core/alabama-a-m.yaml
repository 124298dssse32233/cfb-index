# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep canon ──
story_canon:
  the_unique_thing: "Alabama A&M is the HBCU that won a black college national championship with an undefeated 2020 season (5-0) and has accumulated 14 total conference titles (12 from the SIAC era 1962-1991, 2 from SWAC 2006 and 2020). Pro Football Hall of Famer John Stallworth is an Alabama A&M product. The program has appeared in seven SWAC East Division championships."
  the_origin: "A land-grant university in Normal, Alabama that began football in 1912 and built a tradition spanning over a century. Alabama A&M competed in the SIAC, then joined the SWAC and has been competitive throughout."
  golden_ages:
    - { era: "1962–1991 (SIAC era)", what: "12 conference championships across the Southern Intercollegiate Athletic Conference era" }
    - { era: "2006", what: "SWAC championship" }
    - { era: "2020", what: "Undefeated 5-0 season and black college national championship" }
  legends:
    - { name: John Stallworth, role: player, why: "Pro Football Hall of Famer; showed Alabama A&M's capacity to produce elite NFL talent" }
  canonical_moments:
    - { name: "The 2020 national championship", year: 2020, what: "Alabama A&M went 5-0 and won the black college national championship", handling: glory }
    - { name: "The 2006 SWAC title", year: 2006, what: "SWAC championship under SWAC era", handling: glory }
    - { name: "14 conference titles", year: 2020, what: "12 SIAC titles + 2 SWAC titles; proof of sustained success", handling: glory }
  the_place: "Louis Crews Stadium in Normal, Alabama (home of the Bulldogs)."
  brand_of_football: "Capability-proven: a program that has won at the highest HBCU level and is searching for the second act; the 2020 championship set the standard."
  cultural_footprint: "Alabama A&M is the HBCU that proved it could win a black college national championship in the modern era. The 2020 season is the reference point; the next phase is about making it repeatable."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Alabama A&M went 4-8 (1-7 SWAC East) in 2025 under first-year head coach
    Sam Shade. The program is rebuilding after the 2020 undefeated national championship season. The 2025 stumble
    raises questions about consistency, but Alabama A&M's long history (1912 origin, 14 conference titles, 2020
    national championship) suggests the program has the infrastructure to recover. Shade is tasked with recreating
    the winning culture from 2020 and establishing consistent SWAC East contention.
  research_checklist:
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
