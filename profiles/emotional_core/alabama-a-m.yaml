the_wound:
  name: "The 2025 fourth-quarter collapse"
  detail: "Alabama A&M went 4-8 (1-7 SWAC East) in 2025 under first-year coach Sam Shade (.333 winning percentage), with the team unable to convert the 2020 championship foundation into sustained SWAC contention. The program knows it can win at the national level but hasn't proven it's a consistent SWAC power."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Rebuild on the 2020 national championship foundation; prove it wasn't a one-year anomaly; return to consistent SWAC East contention; show that Alabama A&M is capable of winning multiple titles in this era."
  drought: { since: 2020, unit: conference_title }

the_chip:
  villain: none
  text: "Fans here believe alabama A&M knows it can win a national championship (2020 proof) but can't seem to parlay that into a dynasty. The chip is the frustration of a program that has tasted the peak and knows the standard exists but can't replicate it every year."

the_delusion:
  tone: self-aware
  text: "The fanbase believes that a program with a 2020 national championship and 14 conference titles in its history is always one good coaching hire away from returning to the peak. The 2020 season proved it's possible; the next era is about making it repeatable."

