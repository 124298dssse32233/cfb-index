emotional_core:
  primary: disbelief       # a program that didn't exist in 2010 is now winning bowls — the city still can't believe it has this
  secondary: restoration   # the live arc: clawing the Traylor magic back after a wobble to .500
  one_line: "UTSA is the program San Antonio willed into existence in a decade — no football before 2011, a 12-2 ranked season by 2021, and a third straight bowl win to prove the city's team is permanent."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A 2021 12-2 Conference USA championship and a top-25 ranking vs a 2025 that needed a bowl win just to finish above .500 — the gap between arriving and staying."

the_wound:
  name: "The plateau after the breakthrough"
  detail: "After back-to-back 12-2 and 11-3 seasons that announced UTSA as the model FBS newcomer, the Roadrunners settled into the muddle of the middle — a 7-6 finish in 2025 that only became a winning year by routing FIU 57-20 in the First Responder Bowl. The fear in San Antonio is that the rocket-ship rise has leveled off."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Get back to the top of the league and into the national conversation the 2021 team owned — to prove the climb wasn't a moment but a floor."
  drought: { since: 2021, unit: conference_title }

the_chip:
  villain: none
  text: "The fanbase's chip isn't aimed at a rival or the media — it's the founding insult, the years outsiders assumed San Antonio's seventh-largest-city market would never field a real team. Every bowl win is the answer they keep needing to give."

the_delusion:
  tone: earnest
  text: "Roadrunner fans believe San Antonio is a sleeping Power-conference market — that a city this size with the Alamodome behind it is one good run from forcing the big leagues to notice. They say the ceiling was never Conference USA."

the_grudge_texture:
  rival: texas-state
  texture: little-brother   # the I-35 Texas-on-the-rise feud — two young Texas programs fighting over the same ground

the_coach_relationship: savior   # Jeff Traylor built the identity from raw material; he IS the program's adulthood
the_internal_fracture: arrival vs ambition — the faction grateful UTSA is a winning FBS program at all vs the faction that tasted 2021 and refuses to call a 7-6 bowl team a good year
register: san-antonio-roadrunners-jeff-traylor   # DRAFT (from voice_register) — confirm
