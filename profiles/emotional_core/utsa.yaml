  the_origin: "San Antonio, the largest U.S. city long without its own FBS program, founded a team at the University of Texas at San Antonio — first snap in 2011 inside the NFL-grade Alamodome, Larry Coker the founding coach."
  golden_ages:
    - { era: "2021–2022 (Jeff Traylor)", what: "12-2 and 11-3 back-to-back, the 2021 Conference USA title, a top-25 AP ranking, and UTSA's arrival as the model FBS newcomer" }
  legends:
    - { name: Jeff Traylor, role: coach, why: "Took a young program to a 12-2 conference title and made winning the expectation; the architect of UTSA's adulthood" }
    - { name: Frank Harris, role: player, why: "The winningest quarterback in program history and the face of the 2021-2022 peak" }
    - { name: Larry Coker, role: coach, why: "The founding head coach who put the first UTSA team on the field in 2011" }
  canonical_moments:
    - { name: "First-ever game", year: 2011, what: "UTSA plays its first football game in the Alamodome in front of 56,000 — a city's team comes to life", handling: glory }
    - { name: "Conference USA championship", year: 2021, what: "A 12-2 season and the program's first conference title, capped by a top-25 ranking", handling: glory }
    - { name: "First Responder Bowl rout", year: 2025, what: "A 57-20 win over FIU for a third straight bowl victory, salvaging a winning season", handling: glory }
  the_place: "The Alamodome — an NFL-sized indoor stadium downtown, far bigger than a young program needs, a statement that San Antonio built this to last."
  brand_of_football: "Birds Up — a fast, modern, recruiting-rich Texas program that mines a giant untapped metro and plays with the confidence of a team that knows it's the city's own."
  cultural_footprint: "Proof that a major American city can will a football program into existence and make it matter in a single decade — San Antonio's team, not a hand-me-down."
