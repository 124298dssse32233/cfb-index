story_canon:
  the_unique_thing: "Southern Miss is where Brett Favre became Brett Favre — a Hattiesburg kid who walked on, won the job, and launched a Hall-of-Fame career from a small Mississippi campus. Pair that with 21 consecutive winning seasons (1988-2010) and you have one of the most accomplished G5 programs in the sport's history."
  the_origin: "A working-class state school in Hattiesburg that built a reputation as a giant-slayer and a quarterback factory — beating ranked SEC teams on the road for decades and developing NFL talent the bigger programs overlooked."
  golden_ages:
    - { era: "1988–2010 (the streak)", what: "Twenty-one consecutive winning seasons — one of the longest such streaks in the modern game" }
    - { era: "2011 (Larry Fedora)", what: "A 12-2 Conference USA championship season and a final AP ranking around No. 19 — the program's modern peak" }
  legends:
    - { name: "Brett Favre", role: player, why: "The Pro Football Hall of Fame quarterback who came up at Southern Miss — the program's defining name" }
    - { name: "Reggie Collier", role: player, why: "The dual-threat quarterback who made Southern Miss a national giant-killer in the early 1980s" }
  canonical_moments:
    - { name: "Favre's rise", year: 1987, what: "A Hattiesburg walk-on wins the starting job and begins the path to the Hall of Fame — the story every Eagle fan leads with", handling: glory }
    - { name: "2011 Conference USA title", year: 2011, what: "A 12-2 season and a C-USA championship vault Southern Miss to a top-20 finish — the modern high point", handling: glory }
    - { name: "The 1-11 bottom", year: 2024, what: "After Will Hall is fired mid-season, Southern Miss falls to 1-11 — the lowest point in a long fall from the winning-seasons streak", handling: wound }
  the_place: "M.M. Roberts Stadium — 'The Rock' — in Hattiesburg, the loud, low-slung home where Southern Miss built its giant-slaying reputation."
  brand_of_football: "Tough, opportunistic, quarterback-driven — historically a program that punched up at the SEC and developed pro talent; the identity Blake Anderson's pass-first staff is trying to restore."
  cultural_footprint: "The pride of working-class south Mississippi and a genuine quarterback cradle — the school that gave the NFL a Hall of Famer and spent two decades proving a G5 program could simply refuse to lose."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: After a 1-11 2024 (two coaches in one season), Charles Huff arrived and
    went 7-6 in 2025, returning Southern Miss to a bowl (a New Orleans Bowl loss to Western Kentucky) — then left
    after one year for Memphis, the program's own blood rival. Blake Anderson, the 2025 offensive coordinator and
    a former Sun Belt-title head coach, was promoted to keep the rebuild from resetting yet again in 2026.
