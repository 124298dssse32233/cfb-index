emotional_core:
  primary: honor          # the program that gave the world Brett Favre and ran off 21 straight winning seasons — pride carried like an heirloom
  secondary: grief        # the live ache: that streak is long over, 2024 cratered to 1-11, and the coaching door keeps spinning
  one_line: "Southern Miss is where Brett Favre learned to throw it — a Hattiesburg program that once strung together 21 straight winning seasons and now fights to remember it's a place that wins."

self_image:
  archetype: blue-blood-fallen
  standard_gap_frame: "Twenty-one consecutive winning seasons (1988-2010) and a top-20 ranking in 2011, against a 1-11 bottom in 2024 — the distance a proud G5 power has fallen, and is clawing back from."

the_wound:
  name: "The fall — and a coaching door that won't stop spinning"
  detail: "The 21-year winning streak ended in 2011, and the program bottomed at 1-11 in 2024 under two coaches in one season. Charles Huff arrived and went 7-6 in 2025, dragging Southern Miss back to a bowl — then left for Memphis after a single year, with Blake Anderson promoted to keep the rebuild from resetting again."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Get back to a conference title and a national ranking — restore the program of Favre and the winning-seasons streak to the standard that made it a name, not a memory."
  drought: { since: 2011, unit: conference_title }

the_chip:
  villain: national_media
  text: "Eagle fans are tired of being filed under forgotten — the program that developed an NFL Hall of Famer and won for two straight decades, now treated like it never mattered. They'll tell you Southern Miss has more pedigree than the leagues that look past it."

the_delusion:
  tone: earnest
  text: "Hattiesburg believes the winning is in the program's bones — that a place with this much history and 'The Rock' behind it is one good staff away from being a Sun Belt power again. The fanbase is sure the 1-11 was rock bottom, not the real ceiling."

the_grudge_texture:
  rival: memphis
  texture: blood-feud   # the Black and Blue Bowl — the program's fiercest, named for the teams' colors and the violence of the games

the_coach_relationship: hot-seat-churn   # the door keeps spinning — Will Hall fired mid-2024, Charles Huff left for Memphis after one year, Blake Anderson promoted
the_internal_fracture: pride vs patience — the faction that says Favre and the streak make this a winning program by birthright vs the faction exhausted by coaching churn and losing seasons
