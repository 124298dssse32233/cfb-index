the_wound:
  name: "The weight of rivalry immortality"
  detail: "Coe has built an identity around the Cornell rivalry that dates to 1891 — the longest living rivalry west of the Mississippi. But that same rivalry's immortality has locked Coe into a regional narrative, never quite stepping into the national spotlight. The Kohawks are perpetually 'great for Iowa,' not 'great for Division III.'"
  handling: referenceable
  freshness: this-era

the_dream:
  text: "A national championship. Coe has made it to playoffs consistently, but the 26 conference titles have never translated into a Tier-1 national championship run."
