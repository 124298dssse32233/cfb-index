the_chip:
  villain: national_media
  text: "Fans here believe coe's 135-year rivalry with Cornell is the deepest in college football west of the Mississippi, but only Iowa knows about it. The national media focuses on Ohio, the South, the Midwest's Big Ten. Coe's tradition is invisible to everyone outside the region."

the_delusion:
  tone: self-aware
  text: "That the next recruiting class or coaching hire will finally be the one that breaks through to a national championship. The fanbase knows Coe is good, knows they compete at the highest level of Division III, and believes anyway that this could be the year."

