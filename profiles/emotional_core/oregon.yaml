emotional_core:
  primary: spectacle      # the flashiest brand in the sport — relevance and style as the win
  secondary: standard     # the rising expectation that the brand should finally close
  one_line: "Oregon is the flashiest brand in football — Nike money, the deepest portal hauls, back-to-back Playoffs — and still has no national title to silence the room."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "Two national-title-game appearances, a Heisman, the sport's most famous brand and richest backer vs zero national championships — the one thing the money can't buy."

the_wound:
  name: "The 56-22 semifinal — the brand humbled by a basketball school"
  detail: "Oregon made the Playoff for the second straight year in 2025 (11-1, the #5 seed) and got routed 56-22 by eventual champion Indiana in the Peach Bowl semifinal — the flashiest program in the sport blown out by a school that had never mattered, the title drought extended again."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the one thing the brand has never had — a national title, the ring that turns 'the coolest program' into a great one."
  drought: { since: 1894, unit: national_title }

the_chip:
  villain: national_media
  text: "The take that all the money and flash still haven't bought the one thing that matters — that Oregon is a great brand and a very good team, not a champion. The fanbase wants the ring that ends the distinction."

the_delusion:
  tone: earnest
  text: "The fanbase believes the brand, the facilities, and the talent make a title inevitable now — that back-to-back Playoffs prove Oregon has finally arrived as a blue blood. The ring is the only thing left to make it true."

the_grudge_texture:
  rival: washington
  texture: blood-feud   # the Oregon-Washington rivalry, now carried into the Big Ten

the_coach_relationship: total-trust   # Dan Lanning — the young star building a perennial power
the_internal_fracture: arrived vs almost — believers who think back-to-back Playoffs mean Oregon is a blue blood now vs the realists who note the brand still has zero rings and just got blown out in the semi
register: innovative-fashion-forward
