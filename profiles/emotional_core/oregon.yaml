      lost the conference's cultural identity. The "uniforms over substance" criticism is outside-media
      reductiveness; the fanbase deflects with the program's on-field record. The Phil Knight…
    fans_culture: 'The fanbase is Pacific Northwest-concentrated (Oregon state + Washington + California
      Bay Area alumni) with a national following built on the 2009–2014 title-game era. Geography is smaller-base
      than Ohio State or Alabama by absolute numbers, but intensity-per-fan is top-tier in CFB. Autzen''s
      noise level is the fanbase''s physical signature. Gameday register is flash-forward: the uniforms
      arrive each week as their own narrative; the hype videos produced by the athletic…'
    voice_ethos: 'The voice is innovative-fashion-forward: aware of its own style, unapologetic about the
      uniform rotation, confident about the tempo-and-talent model, and specifically not apologetic about
      the Nike/Knight structural advantage. Oregon does not speak as an underdog; the program speaks as
      the West Coast''s designated innovator and now as a Big Ten contender. The register is "yes, the jerseys
      are different every week; the scoreboard is too." Identity phrase: **"Oregon is the…'
    narratives: The 2024 Big Ten Championship — year one in the conference — is the current era's signature.
      The CFP quarterfinal loss to Ohio State (41-21) was the season's wound. The 2026 question is whether
      Lanning's program compounds (sustained Big Ten contender) or regresses (one-hit Pac-12-refugee cycle).
      Dillon Gabriel's departure after 2024 and the Dante Moore transition at quarterback is the roster
      narrative. NIL funding via Division Street remains top-tier in the Big Ten.
