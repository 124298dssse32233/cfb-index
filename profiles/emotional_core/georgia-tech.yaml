story_canon:
  the_unique_thing: "The engineering school that won a national championship — Georgia Tech's 1990 title under Bobby Ross, an academic powerhouse that competes at the highest level of the sport while admitting almost none of the academic exceptions its rivals do."
  the_origin: "Founded in football's earliest days, Tech's roots run to John Heisman himself — the namesake of the trophy coached here and oversaw the famous 222-0 win over Cumberland in 1916, still the most lopsided game in college football history."
  golden_ages:
    - { era: "1951–1956 (Bobby Dodd)", what: "Bobby Dodd's run including the 1952 national title and a string of bowl wins" }
    - { era: "1990 (Bobby Ross)", what: "11-0-1 and a share of the national championship — the modern crown jewel" }
  legends:
    - { name: John Heisman, role: coach, why: "The trophy's namesake coached at Tech; the 222-0 Cumberland game is his" }
    - { name: Bobby Dodd, role: coach, why: "Hall-of-Fame coach the stadium is named for; the 1952 national title" }
    - { name: Calvin Johnson, role: player, why: "'Megatron' — the greatest receiver in program history and a future Hall of Famer" }
  canonical_moments:
    - { name: "The 1990 national championship", year: 1990, what: "Bobby Ross's Jackets go 11-0-1 and share the title", handling: glory }
    - { name: "222-0 over Cumberland", year: 1916, what: "The most lopsided game in college football history, under Heisman", handling: glory }
    - { name: "Eight-overtime classic vs Georgia", year: 2024, what: "Tech finally breaks through in an instant-classic rivalry marathon", handling: glory }
  the_place: "Bobby Dodd Stadium at Historic Grant Field — the oldest on-campus stadium in major college football, sitting in the middle of midtown Atlanta with the skyline as its backdrop, home of the Ramblin' Wreck."
  brand_of_football: "Cerebral and adaptable — for years the nation's last great triple-option holdout under Paul Johnson, now a modern, physical spread under Key; either way, the identity is out-preparing programs with more talent."
  cultural_footprint: "The Ramblin' Wreck, the 1930 Model A Ford that leads the team out; an engineering culture that frames football as another problem to be solved smarter than the opponent."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Georgia Tech went 9-3 in the 2025 regular season — its best start (8-0) since
    1966 and first nine-win regular season since 2014 — before falling to BYU 25-21 in the Pop-Tarts Bowl. QB Haynes
    King was ACC Player of the Year and finished 10th in the Heisman vote. Tech is the only program to finish fourth
    or better in the ACC each of the last three years. Alum head coach Brent Key has the Jackets entering 2026 as a
    genuine ACC-title and Playoff contender.
