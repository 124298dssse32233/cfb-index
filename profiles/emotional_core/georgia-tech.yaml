emotional_core:
  primary: restoration    # the engineering school that won it all in '90 is suddenly winning again under one of its own
  secondary: grievance    # the little-brother chip toward Georgia that never sleeps
  core_variant: dynasty-restoration
  one_line: "Georgia Tech is the engineering school that out-thinks you on Saturday — a 1990 national champion that spent two decades in the wilderness and, under alum Brent Key and Haynes King, has clawed its way back to top-of-the-ACC relevance."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "A national title in 1990 and four claimed all-time vs three decades of mid-tier ACC purgatory — until a homegrown coach pulled the program back to a 9-win season and an ACC-runner-up finish in 2025."

the_wound:
  name: "The fourth-and-goal fumble"
  detail: "Georgia Tech's modern history with Georgia is a catalog of near-misses — most famously the 2014 collapse and a string of games lost in the final minutes — that hardened the fear of being permanently the smaller school across town, even after the program's recent climb."
  handling: referenceable
  freshness: generational

the_dream:
  text: "An ACC championship and a Playoff bid that proves the 2025 climb was the floor of a new era, not a one-year spike."
  drought: { since: 2009, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Tech fans live two miles from a program with more recruits, more money and more rings, and 'To Hell With Georgia' isn't a chant so much as a worldview — the engineers against the football factory down Highway 78."

the_delusion:
  tone: self-aware
  text: "The faithful believe smarter beats bigger — that a school full of engineers can scheme and develop its way past the blue-chip machines, and that Key proving it in 2025 is the start of something durable, not a fluke."

the_grudge_texture:
  rival: georgia
  texture: little-brother   # Clean, Old-Fashioned Hate since 1893 — the longest uninterrupted rivalry in the Deep South, and Georgia owns the recent ledger

the_coach_relationship: forever-ours   # Brent Key is a former Tech offensive lineman; the alum-made-good who restored belief
the_internal_fracture: keep-it-real vs dream-big — the faction grateful just to be relevant again vs the faction that wants the program swinging for an ACC title and a Playoff berth now
