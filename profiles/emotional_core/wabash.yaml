story_canon:
  the_unique_thing: "Wabash is the only all-male college competing in Division III football, and they are the co-owner of the Monon Bell—a 140-year rivalry with DePauw, and every Thanksgiving is a battle for a 300-pound cast-iron bell."
  the_origin: "Wabash College, founded in 1832 in Crawfordsville, Indiana, began playing football on October 25, 1884, when they defeated Butler 4-0. The Little Giants nickname was adopted in 1904. The program grew into a small-college power, and the rivalry with DePauw (20 miles away) began in 1890. In 1932, the two schools commissioned the Monon Bell—a 300-pound cast-iron bell—and it has been contested every Thanksgiving ever since. Wabash is unique: the only all-male college in Division III football."
