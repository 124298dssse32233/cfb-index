status: live            # todo | drafted | authored | reviewed | live
slug: morehead-state
team_id: null
program_name: Morehead State
program_tier: 5

emotional_core:
  primary: honor          # the only public school in an all-private conference, carrying regional pride
  secondary: restoration  # climbing back to respectability after a lean decade
  one_line: "Morehead State is the only public university in the all-private Pioneer League — a regional Kentucky power building back to the standard that won four straight conference titles in the 2000s."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "Four straight Pioneer Football League South titles (2002–2005) and a last-second OVC championship game loss to archrival Eastern Kentucky vs a public school buffeted by state budget cycles and now rebuilding to a competitive baseline."

the_wound:
  name: "The long climb back to the 2000s standard"
  detail: "Morehead State won four straight conference titles in 2002–2005 and competed consistently through the 2010s, but the past decade has seen the program slide toward the middle of the PFL. The wound is not acute; it's the long fade from regional power to steady-state competitor."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Return to the 2002–2005 standard of four straight conference titles and regional pride. A 7–5 season with a bowl bid would announce that Morehead is climbing back to the altitude that made it the eastern Kentucky flagship."
  drought: { since: 2005, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Morehead's chip is the chip of a public school in a private league — the feeling that the all-private Pioneer League doesn't quite recognize a public university's fiscal and political constraints. The school competes with state budget cycles as much as with talent identification."

the_delusion:
  tone: self-aware
  text: "The fanbase believes the 2002–2005 standard is reachable again, that Jason Woodman is the coach to get there, and that a public school can still compete in an all-private conference. They know the state budget is always a headwind, but they believe the program's base is strong enough to overcome it."

the_grudge_texture:
  rival: eastern-kentucky
  texture: killed-by-realignment   # last-second 1966 OVC championship loss; EKU went FBS, Morehead to PFL, rivalry dormant

the_coach_relationship: total-trust   # Jason Woodman contract extended December 2024; program stable
the_internal_fracture: budget-vs-ambition — the tension between state funding constraints and the program's desire to be a regional power
register: morehead-state-eagles-only-public-school-pioneer-league-eastern-kentucky-rival
