  the_unique_thing: "Morehead State is the only public university in the all-private Pioneer League — a regional Kentucky power that won four straight PFL South titles (2002–2005) and still competes despite budget cycles that private schools don't face."
  the_origin: "A public university in Morehead, Kentucky founded in 1922 that built football into a regional power through the 1960s–1980s. The program joined the Pioneer League in 1993 and won four straight South division titles in the early 2000s."
  golden_ages:
    - { era: "1962, 1966 (OVC era)", what: "Two Ohio Valley Conference titles in the 1960s, including a last-second championship game loss to archrival Eastern Kentucky" }
    - { era: "2002–2005 (four straight South titles)", what: "Four consecutive Pioneer Football League South division titles, the program's modern high-water mark" }
  legends:
