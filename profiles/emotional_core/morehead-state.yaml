    - { name: "1966 OVC championship game", year: 1966, what: "Morehead loses a last-second OVC championship game to Eastern Kentucky — a defining rivalry moment", handling: heartbreak }
    - { name: "2002–2005 four straight South titles", year: 2005, what: "Four consecutive Pioneer Football League South division titles", handling: glory }
  the_place: "Phil Simms Stadium in Morehead, Kentucky — recently renamed in October 2025 to honor the legendary NFL quarterback who played there."
  brand_of_football: "Public-school honor in a private league — the program that competes with fewer resources than its peers, yet sustains excellence through institutional commitment and Appalachian regional pride."
  cultural_footprint: "Morehead State is the example of what a public regional university can achieve in FCS non-scholarship football — proof that state school identity doesn't mean second-tier competition."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Morehead State went 6–6 (4–4 PFL) in 2025 under Jason Woodman in his second year — a respectable
    record that showed stability after a 7–5 finish in 2024. Woodman's contract was extended in December 2024, signaling institutional
    confidence. The 6–6 record is solid but reflects the program's current tier: competitive in the Pioneer League but not yet ascending
    toward the 2002–2005 standard of four straight conference titles. The question in Morehead: can Woodman continue the climb toward
    a 7–5 or 8–4 season that would prove the program is rebuilding to its former altitude?
