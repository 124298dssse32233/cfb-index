# ── STORY CANON (doc 64) — what makes this program unique & amazing. ──
story_canon:
  the_unique_thing: "The Spider name (since 1919) and the 1881 founding make Richmond one of the oldest FCS programs. The program is known for consecutive CAA dominance in 2023-2024 and rejoining the Patriot League in 2025 after 17 years in the CAA."
  the_origin: "Richmond football was founded in 1881, making it one of the oldest FCS programs. The Spiders name dates to 1919. The program became a CAA founding member in 2007 and dominated that conference for two decades."
  golden_ages:
    - { era: "2007-2024", what: "CAA membership and consistent competitiveness, including back-to-back conference titles 2023-2024" }
    - { era: "2024", what: "Perfect 8-0 CAA record, undefeated before the conference transition" }
  legends:
    - { name: "Coach Russ Huesman", role: "coach", why: "Ninth-year coach leading Richmond through the CAA dominance and now into Patriot League, built a sustained competitive program" }
  canonical_moments:
    - { name: "2024 CAA Dominance", year: 2024, what: "Richmond finished 8-0 in the CAA, back-to-back conference champions before moving to the Patriot League", handling: glory }
    - { name: "Patriot League Transition", year: 2025, what: "Richmond joined the Patriot League as an associate member (other sports remain CAA), reuniting with William & Mary rivalry", handling: glory }
  the_place: "Robins Stadium in Richmond, Virginia — home of a program rejoining regional alignment."
  brand_of_football: "Sustained excellence — a program that built 17 years of CAA consistency and is now proving that translates to the Patriot League."
  cultural_footprint: "Richmond represents a new era of Patriot League growth, bringing in a CAA powerhouse that chose to move based on geographic and competitive fit."
  the_ongoing_story: >
    LIVE ARC — 2026-06-13: Richmond finished its final CAA season (2024) with an 8-0 record and back-to-back conference titles, then joined the Patriot League in 2025 as an associate member in football. Coach Russ Huesman (ninth season) is leading the transition. The program opened the home slate September 20 vs. VMI and hosted Holy Cross October 18 for the first Patriot League home game. The question in Richmond: can the program establish the same dominance in the Patriot League that it had in the CAA?
  research_checklist:
    - The 2024 perfect 8-0 CAA record and back-to-back titles
    - The 17-year CAA membership and what it meant
    - The William & Mary rivalry (120 meetings since 1898) and the reunion
    - Russ Huesman's coaching philosophy and track record
    - The Virginia Tech rivalry (since 1897) and its significance
