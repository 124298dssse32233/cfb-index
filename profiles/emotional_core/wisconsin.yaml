# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The running-back factory — Wisconsin turned 'establish the run' from cliché into a two-decade identity, producing a conveyor belt of 1,000-yard backs (Ron Dayne, Montee Ball, Melvin Gordon, Jonathan Taylor) behind a perpetual NFL-pipeline offensive line. No program made the run game more of a worldview. Add 'Jump Around' shaking Camp Randall between the third and fourth quarters and you have the most distinctive home identity in the Big Ten."
  the_origin: "A flagship Wisconsin university that became a national program under Barry Alvarez, who took over a moribund team in 1990 and built it on the offensive line and the running back — three Rose Bowl wins in the 1990s that set the template every Badger team since has run."
  golden_ages:
    - { era: "1993–1999 (Barry Alvarez)", what: "Three Rose Bowl appearances, two wins, and Ron Dayne's 1999 Heisman as the NCAA career rushing king" }
    - { era: "2010–2012", what: "Three straight Rose Bowl trips and the 2011-2012 Big Ten Championship Game wins" }
  legends:
    - { name: Barry Alvarez, role: coach, why: "Built the program from nothing; the field at Camp Randall bears his name" }
    - { name: Ron Dayne, role: player, why: "1999 Heisman winner and the NCAA's career rushing leader at the time — the back the factory was named for" }
    - { name: Jonathan Taylor, role: player, why: "The modern era's defining back; one of the most productive rushers in college history" }
  canonical_moments:
    - { name: "Dayne's Heisman", year: 1999, what: "Ron Dayne breaks the NCAA career rushing record and wins the Heisman at Camp Randall", handling: glory }
    - { name: "First Rose Bowl win", year: 1994, what: "Alvarez's program wins the Rose Bowl, announcing Wisconsin as a national factor", handling: glory }
    - { name: "37-0 to Iowa", year: 2025, what: "A shutout loss that crystallized the program's worst season in a generation", handling: wound }
  the_place: "Camp Randall Stadium (cap ~76,000) — built on a Civil War training ground, 'Jump Around' (House of Pain) erupting before the fourth quarter, the Fifth Quarter band show after wins, and Bucky Badger's pushups for every point."
  brand_of_football: "Blue-collar-running-game-cathedral — the line and the back, three yards and a cloud of dust, physical football as a stated identity rather than a phase; defense that gets out of the offense's way."
  cultural_footprint: "The Big Ten's purest expression of the run-it-and-line-up ethos and a cultural touchstone — 'Jump Around,' the Fifth Quarter, the cheesehead — a program beloved for refusing to be anything other than itself."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Wisconsin went 4-8 (2-7 Big Ten) in Luke Fickell's third season, losing six
    straight at one stretch and getting shut out 37-0 by Iowa, with QB Billy Edwards Jr. hurt and four quarterbacks
    pressed into duty behind a remade offense. It was the program's worst season in a generation and left Fickell's
    seat on fire. The open question: does Wisconsin reclaim the running-game identity that built it, or is the factory
    floor permanently retooled?
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
