slug: wisconsin
team_id: 275
program_name: Wisconsin
program_tier: 2

emotional_core:
  primary: grief          # the loss of the identity that made the program what it was
  secondary: restoration  # the unfinished argument over whether to reclaim it
  one_line: "Wisconsin spent twenty years building the same machine — a 250-pound running back behind a 320-pound line, three yards and a cloud of dust — and watched a new staff trade it for a passing game that went 4-8, leaving the fanbase to wonder whether the thing that made the Badgers the Badgers is recoverable."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "Two decades as the Big Ten West's bully — a running-back and offensive-line factory that bullied into Rose Bowls — vs a 4-8 floor in 2025 and an offense that abandoned the run for an identity that didn't take."

the_wound:
  name: "The 2025 collapse and the identity that went with it"
  detail: "Wisconsin finished 4-8 (2-7 Big Ten) in Luke Fickell's third year, dropping six straight in the middle of the schedule and getting shut out 37-0 by Iowa. Quarterback injuries forced four passers onto the field behind a remade scheme — the running-game program now searching for any identity at all, on the program's worst footing in a generation."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the league trophy again the way the program earned the last ones — by lining up, running it down the field, and daring the rest of the Big Ten to stop a machine they always knew was coming."
  drought: { since: 2012, unit: conference_title }

the_chip:
  villain: national_media
  text: "Fans heard it for years — that the program was a throwback that couldn't keep up, too plodding for the modern game, a system that printed yards against everyone but the playoff teams. Wisconsin always answered by running it down their throats anyway, which is exactly the answer the 2025 team couldn't give."

the_delusion:
  tone: earnest
  text: "The fanbase believes the blueprint still works — that the running-back factory and the offensive-line pipeline are dormant, not obsolete, and that the right staff lining up and committing to the run gets Wisconsin straight back to bullying the Big Ten."

the_grudge_texture:
  rival: minnesota
  texture: border-war   # Paul Bunyan's Axe — the most-played rivalry in FBS, a literal border war for the trophy

the_coach_relationship: hot-seat-churn   # Fickell's seat is on fire after a 4-8 third year and the 37-0 Iowa loss
the_internal_fracture: identity vs adaptation — the faction that wants Wisconsin to go back to smashmouth and the line-and-back factory vs the faction that says the modern game demands the offense Fickell tried to build
register: blue-collar-running-game-cathedral — plain-spoken, physical, proud of the work; treats the run game as a worldview, not a tactic
