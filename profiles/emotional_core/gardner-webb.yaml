  the_unique_thing: "Gardner-Webb joined the FCS from Division II in 2008 and won a Big South championship in 2022 — the program's first FCS playoff appearance, proving that relentless small-school building can result in major-conference titles at the FCS level."
  the_origin: "A small university in Boiling Springs, North Carolina that transitioned from Division II to FCS in 2008, beginning a fourteen-year climb to FCS relevance under the leadership of coach Cris Reisert."
