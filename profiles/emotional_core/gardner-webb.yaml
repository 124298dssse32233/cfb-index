emotional_core:
  primary: restoration
  secondary: redemption
  core_variant: first-ascension
  one_line: "Gardner-Webb is the North Carolina Bulldog program that climbed from Division II to FCS in 2008 and won its first Big South championship in 2022, proving small-school relentlessness can build something."

self_image:
  archetype: riser-proving
  standard_gap_frame: "From Division II obscurity to a Big South championship in 2022 and a historic FCS playoff appearance — the Bulldogs are still proving they belong at the highest level of the FCS."

the_wound:
  name: "The FCS adjustment"
  detail: "Gardner-Webb joined the FCS in 2008 and spent fourteen years building toward relevance before winning the Big South championship in 2022. The wound is the long climb, the decades of being the newest and smallest program at the level, the constant proving you belong. And the deeper wound came when head coach Cris Reisert stepped down in December 2025, just as the program seemed to be establishing itself."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Sustain Big South contention, build a second FCS playoff appearance, and prove that the journey from Division II to FCS power is not a one-year story but the foundation for a program."
  drought: { since: 2022, unit: conference_title }

the_chip:
  villain: blue_bloods
  text: "The FCS establishment treated Gardner-Webb as the newest and smallest, and the fanbase believes they were overlooked as a Division II refugee who had no business competing. The Bulldogs won a conference title to prove otherwise."

the_delusion:
  tone: self-aware
  text: "The fanbase believes that Gardner-Webb's 2022 Big South championship proved they can sustain relevance, that the climb from Division II means something, and that the Bulldogs have found their level — even though the coaching change raises questions about whether the momentum will last."

the_grudge_texture:
  rival: liberty
  texture: championship

the_coach_relationship: hot-seat-churn
the_internal_fracture: momentum-preservation-vs-rebuild — the faction defending the 2022 title run vs the faction rebuilding after Reisert's departure
register: north-carolina-boiling-springs-bulldog-climber
