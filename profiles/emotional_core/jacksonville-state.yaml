emotional_core:
  primary: house-money    # three years in FBS, three nine-win seasons — every bit of this is gravy
  secondary: disbelief    # the little Alabama school that wasn't supposed to be here keeps winning
  one_line: "Jacksonville State jumped to the FBS in 2023 and just won nine games for the third year running — a little Alabama school playing with house money and refusing to act overwhelmed by any of it."

self_image:
  archetype: riser-proving
  standard_gap_frame: "An FCS program three years removed from the move up vs a Conference USA where it has already reached two title games and won bowls — winning faster than newcomers are supposed to."

the_wound:
  name: "Losing Rich Rodriguez right as it got good"
  detail: "Rich Rodriguez built the FBS jump into instant winning, then bolted back to West Virginia after 2024 — the kind of departure that usually resets a young program. The quiet fear in Jacksonville: that a small school is just a launchpad, a place coaches and players use on the way to somewhere bigger."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the Conference USA title outright after two trips to the game — and prove a tiny Alabama school can be a permanent FBS winner, not a feel-good novelty that fades once the league catches up."
  drought: { since: 2023, unit: conference_title }

the_chip:
  villain: national_media
  text: "Fans hear the program dismissed as an FCS refugee that wandered up a level — never mind two CUSA title-game trips and three straight nine-win seasons. They've stopped waiting for the respect and started just stacking the wins."

the_delusion:
  tone: self-aware
  text: "The fanbase believes the place is built to keep winning no matter who's coaching — that Charles Kelly is the fourth straight to win nine in his debut because the program, not the man, is the thing. They half-know that's a lot to ask of a school this size, and they say it anyway."

the_grudge_texture:
  rival: troy
  texture: border-war   # two Alabama programs, the Ol' School Bell on the line

the_coach_relationship: forever-ours   # the program keeps producing nine-win debuts; the fans trust the place over any one coach
the_internal_fracture: dream-bigger vs stay-grateful — the faction that wants a CUSA crown and a Group-of-Five ceiling-break now vs the faction still pinching itself that a tiny school is winning in FBS at all
register: jacksonville-al-gamecocks-fbs-newcomer   # scrappy, grateful, chip-on-shoulder small-Alabama-town pride
