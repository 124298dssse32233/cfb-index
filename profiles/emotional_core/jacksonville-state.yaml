story_canon:
  the_unique_thing: "Jacksonville State is one of the sport's freshest FBS arrivals — a small school in Jacksonville, Alabama that moved up in 2023 and immediately won, posting nine wins in each of its first three FBS seasons and reaching two Conference USA title games before most newcomers find their footing."
  the_origin: "A longtime FCS power in the Ohio Valley and ASUN that built a reputation as a giant-killer — famously stunning Florida State in 2017 — then accepted the FBS invitation, joined Conference USA in 2023, and hit the ground winning."
  golden_ages:
    - { era: "2013–2021 (FCS power)", what: "Multiple conference titles, deep FCS playoff runs, and the 2017 upset of Florida State" }
    - { era: "2023–2025 (FBS arrival)", what: "Three straight nine-win seasons, two CUSA Championship Game trips, and back-to-back bowl appearances" }
  legends:
    - { name: Rich Rodriguez, role: coach, why: "Built the FBS jump into instant winning before returning to West Virginia — the architect of the rise" }
    - { name: Charles Kelly, role: coach, why: "Won nine games in his 2025 debut, the fourth straight Gamecock coach to win nine in year one" }
    - { name: Zerrick Cooper, role: player, why: "The QB who led the late-FCS-era Gamecocks and embodied the giant-killer identity" }
  canonical_moments:
    - { name: "Upset of Florida State", year: 2017, what: "FCS Jacksonville State stuns Florida State in Tallahassee — the program's giant-killer calling card", handling: glory }
    - { name: "New Mexico Bowl title", year: 2024, what: "JSU wins its first FBS bowl under Rich Rodriguez, capping a 9-win debut FBS-bowl season", handling: glory }
    - { name: "Salute to Veterans Bowl over Troy", year: 2025, what: "Charles Kelly's Gamecocks beat in-state Troy 17-13 to reclaim the Ol' School Bell and finish 9-5", handling: glory }
  the_place: "Burgess-Snow Field at JSU Stadium in Jacksonville, Alabama — a small, loud Calhoun County home where 'Rock the House' is the mantra and the program out-punches its enrollment."
  brand_of_football: "Giant-killer-turned-grinder — fast, physical, fearless football from a program built on the belief that a small school can out-hit anybody on the right Saturday."
  cultural_footprint: "Proof that an FCS program can move up and win immediately — the most recent multi-tier ascent in the sport, and a point of fierce pride for a small Alabama town that owns the Gamecock name."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Jacksonville State went 9-5 (7-1 Conference USA) in 2025 under first-year
    head coach Charles Kelly, lost the CUSA Championship Game 19-15 to Kennesaw State, then beat in-state Troy
    17-13 in the Salute to Veterans Bowl — a third straight nine-win season and second straight bowl in only its
    third FBS year. Rich Rodriguez left for West Virginia after 2024 and Kelly didn't miss a beat. The 2026 goal
    in Jacksonville: turn two CUSA title-game trips into an outright championship.
