# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "UTEP is the most geographically isolated program in major-college football — a mining-heritage university on the far western corner of Texas, where El Paso meets Juárez — and its proudest sports moment is a basketball one: the 1966 Texas Western title with the first all-Black starting five to win an NCAA championship, a landmark of the civil-rights era."
  the_origin: "Founded as the Texas State School of Mines, the program carries a literal mining identity — the Miners, the orange and blue, the 'Picks Up' hand sign — football grown in a borderland city closer to four other state capitals than to most of Texas."
  golden_ages:
    - { era: "2004–2005 (Mike Price)", what: "Back-to-back bowl seasons and an 8-win year — the program's last sustained football success" }
    - { era: "1965–1966 (basketball, Don Haskins)", what: "Texas Western wins the NCAA basketball title with the first all-Black starting five — the program's most important moment in any sport" }
  legends:
    - { name: Mike Price, role: coach, why: "Led the mid-2000s bowl teams — the last era of real UTEP football success" }
    - { name: Don Haskins, role: coach, why: "The basketball coach of the 1966 title team; the towering figure in UTEP/Texas Western sports history" }
  canonical_moments:
    - { name: "The 1966 Texas Western championship", year: 1966, what: "The first all-Black starting five wins the NCAA basketball title — a civil-rights landmark and UTEP's defining moment", handling: glory }
    - { name: "Mike Price's bowl run", year: 2005, what: "Back-to-back bowl seasons restore football pride to El Paso", handling: glory }
  the_place: "Sun Bowl Stadium — carved into a Franklin Mountains hillside, a dual-use venue that hosts the Sun Bowl every December and the Miners every fall."
  brand_of_football: "Borderland grind — hard-nosed, isolated, underdog football from a city that has to want it on its own, hundreds of miles from anywhere else."
  cultural_footprint: "El Paso's team and a binational point of pride on the Texas-Mexico border — a program whose 1966 basketball title gave the whole city a place in American sports history that its football has never quite matched."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: UTEP went 2-10 (1-7 Conference USA) in 2025, Scotty Walden's second
    season — a brutal year for the young coach. 2025 was the program's last in Conference USA; UTEP moves to
    the Mountain West in 2026. The question in El Paso: can Walden mine the borderland for talent and build a
    winner at the most isolated job in the country, in a tougher new league.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
