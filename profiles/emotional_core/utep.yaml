emotional_core:
  primary: deprival       # the most isolated program in the FBS, football glory always just out of reach
  secondary: restoration  # a young coach and a new conference — a fresh start after a brutal stretch
  one_line: "UTEP is the desert outpost on the far western tip of Texas — the most isolated program in major-college football, whose proudest banner is a basketball one, and whose football team keeps reaching for a winning season it can't quite hold."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "Mike Price's mid-2000s bowl teams and a fiercely loyal borderland fanbase vs long stretches of losing — including a 2-10 finish in 2025 — and a football history thinner than the program's mining-town pride."

the_wound:
  name: "The football glory that never lasts"
  detail: "UTEP's best football is decades old — Mike Price's 2004-2005 bowl teams the last sustained success — and the recent years have been grim. A 2-10 (1-7 Conference USA) finish in 2025, Scotty Walden's second season, was the latest in a long run of losing for a program that has never been able to keep a winning era going."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Build a winner that sticks — a bowl, a winning season, a reason for El Paso to pack the Sun Bowl for its own team and not just the game it hosts."
  drought: { since: 2021, unit: bowl }

the_chip:
  villain: national_media
  text: "Miners fans know their program is the one the rest of the country forgets exists — 600 miles from the nearest power program, in a city the maps put in the corner. They'll tell you El Paso shows up anyway, and that the isolation is a badge, not an excuse."

the_delusion:
  tone: earnest
  text: "The fanbase believes the borderland is an untapped recruiting goldmine — that the right young coach mines El Paso and Juárez and west Texas for talent the bigger programs ignore, and turns the most isolated job in the country into an advantage."

the_grudge_texture:
  rival: new-mexico-state
  texture: border-war   # the Battle of I-10 — the desert rivalry with NMSU, the only real neighbor for hundreds of miles

the_coach_relationship: savior   # Scotty Walden — the young hire brought in to mine the borderland and rebuild from the bottom
the_internal_fracture: patience vs exhaustion — give Scotty Walden time to build through the Mountain West move vs a fanbase worn down by years of losing
