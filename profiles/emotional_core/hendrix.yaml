story_canon:
  the_unique_thing: "Hendrix football is a resurrection story: the program began in 1906, played through the 1930s-1940s era, then went dormant in 1941. For 32 years, there was no football at Hendrix. The program returned in 1973 and has been climbing ever since. In 2025, Hendrix returned to the SCAC after a 13-year absence with a 6-4 record and a 4-2 conference mark—proof that resurrection is real and the Warriors belong."
  the_origin: "Hendrix College, a small Methodist-affiliated liberal-arts college in Conway, Arkansas, began playing football in 1906, competed through the 1930s-1940s (renamed from Bulldogs to Warriors in 1933 after a merger with Henderson-Brown), then the program went dormant in 1941. It remained dormant until 1973, when football returned to Hendrix. The program has been rebuilding ever since, competing in various conferences, and recently returned to the SCAC."
