    - { name: "The 2025 SWAC East Division championship", year: 2025, what: "Eddie Robinson Jr.'s team won the SWAC East Division; proof of the rebuild", handling: glory }
  the_place: "Hornets Stadium in Montgomery, Alabama (home of the Hornets); 125 years of tradition."
  brand_of_football: "Capability-proven: a program that has won at the highest HBCU level and is rebuilding under the Robinson family lineage; the 2025 division title suggests the foundation is solid."
  cultural_footprint: "Alabama State is the HBCU with one of the oldest football traditions (1901) and a 1991 national championship. The program is rebuilding under Eddie Robinson Jr., nephew of legendary Grambling coach Eddie Robinson, and the 2025 SWAC East Division championship suggests a new chapter is underway."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Alabama State won the 2025 SWAC East Division championship under head coach
    Eddie Robinson Jr. in his fourth season (overall record 30-16, .652 winning percentage). The program has a long
    history dating back to 1901 and won a black college national championship in 1991 with an 11-0-1 record. Eddie
    Robinson Jr. is the nephew of legendary Grambling coach Eddie Robinson and is tasked with rebuilding Alabama
    State into a SWAC contender. The 2025 SWAC East Division title is the first evidence that the rebuild is working
