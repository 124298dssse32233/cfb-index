story_canon:
  the_unique_thing: "Alabama State is the HBCU that won a black college national championship with an undefeated 11-0-1 season in 1991 under coach Houston Markham. The program has six total conference titles and 125 years of history dating back to 1901. Coach Eddie Robinson Jr. (nephew of legendary Grambling coach Eddie Robinson) is in his fourth season and won the 2025 SWAC East Division championship, suggesting a rebuild is underway."
  the_origin: "A historically black university in Montgomery, Alabama that began football in 1901, one of the oldest HBCU programs. Alabama State competed in various conferences and has been a SWAC member since joining the conference."
  golden_ages:
    - { era: "1901–1990 (foundational era)", what: "125 years of continuous football competition; multiple conference championships" }
    - { era: "1991 (national championship)", what: "Undefeated 11-0-1 season and black college national championship under Houston Markham" }
    - { era: "2025 (division championship)", what: "SWAC East Division title under Eddie Robinson Jr. in year four" }
  legends:
