  detail: "Alabama State won the black college national championship in 1991 with an 11-0-1 record under coach Houston Markham; the program has been competitive but has not won another national title or returned to consistent championship contention in 34 years. Eddie Robinson Jr.'s 2025 SWAC East Division championship suggests the program is rebuilding the standard."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Build on the 2025 SWAC East Division championship; prove Eddie Robinson Jr.'s rebuild is sustainable; return to SWAC contention and the Celebration Bowl; honor the 1991 championship legacy by competing annually for titles."
  drought: { since: 1991, unit: national_title }

the_chip:
  villain: blue_bloods
  text: "The fanbase knows Alabama State won a national championship in 1991 and refuses to accept a new permanent ceiling; the 2025 SWAC East Division title is proof the standard is within reach. The program proved it can reach the peak and the next chapter is about getting back."

the_delusion:
  tone: self-aware
  text: "The fanbase believes that a program with a 1991 national championship, six conference titles, and 125 years of history is always capable of competing for SWAC titles — that the standard was set and Eddie Robinson Jr.'s division championship in 2025 proves it's repeatable."

