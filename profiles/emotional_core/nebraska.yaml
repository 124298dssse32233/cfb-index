story_canon:
  the_unique_thing: "The sellout streak and the walk-on pipeline — Nebraska has sold out Memorial Stadium for every game since 1962, the longest streak in sports, and built three 1990s titles on home-grown walk-ons. The most loyal fanbase in America, attached to a program that hasn't mattered in a generation."
  the_origin: "A Great Plains power built by Bob Devaney and perfected by Tom Osborne — five national titles, capped by a 60-3 run from 1993-1997 and three championships in four years."
  golden_ages:
    - { era: "1970–1971 (Devaney)", what: "Back-to-back national titles" }
    - { era: "1993–1997 (Osborne)", what: "Three titles in four years and a 60-3 record — the Blackshirts and the option dynasty" }
  legends:
    - { name: Tom Osborne, role: coach, why: "The 1990s dynasty — three titles, 255 wins, the program's soul" }
    - { name: Tommie Frazier, role: player, why: "The option QB of the 94-95 titles and the legendary Fiesta Bowl run" }
  canonical_moments:
    - { name: "The 1990s dynasty", year: 1995, what: "Three titles in four years (1994, 1995, 1997) and a 60-3 run", handling: glory }
    - { name: "The fall", year: 2003, what: "The post-Osborne decline that became a quarter-century of irrelevance", handling: wound }
  the_place: "Memorial Stadium — the sellout streak since 1962 (the longest in sports), the 'Sea of Red,' the third-largest city in Nebraska on game day."
  brand_of_football: "The option and the Blackshirts — Osborne's power-option and a defense of home-grown walk-ons; a brand of football the modern game left behind, which is half the grief."
  cultural_footprint: "The state's identity — the Sea of Red, the sellout streak, the walk-on ethos; proof that loyalty can outlast relevance by decades."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Nebraska went 7-5 in 2025, bowl-eligible for a second straight year under
    Matt Rhule — modest progress for a fanbase that hasn't won a conference title since 1999. The gut-punch: legacy
    QB Dylan Raiola broke his leg in November, then transferred to Oregon, the franchise centerpiece gone. Rhule turns
    to the portal and a fresh QB battle, with the eternal question hanging over Lincoln: is the sleeping giant finally
    waking, or is this another false dawn?
  research_checklist:
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
