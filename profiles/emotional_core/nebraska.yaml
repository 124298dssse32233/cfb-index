  archetype: blue-blood-fallen
  standard_gap_frame: "Five national titles and a 60-3 run from 1993-1997 vs a quarter-century without a conference title and no real relevance since the dynasty fell."

the_wound:
  name: "The fall from the '90s — and the Raiola defection"
  detail: "Nebraska's 1990s dynasty (three titles in four years, a 60-3 run) gave way to a quarter-century of decline; the 2025 team went 7-5, and the franchise QB the program built around — legacy recruit Dylan Raiola — broke his leg, then transferred to Oregon, the latest gut-punch for the most loyal fanbase in the sport."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Matter in November again — a division race, a New Year's bowl, the first real whisper that the giant is finally awake."
  drought: { since: 1999, unit: conference_title }

the_chip:
  villain: national_media
  text: "The take that Nebraska is a museum — a great history and a hollow present, coasting on a sellout streak and 1990s highlights. The fanbase answers with the streak itself: still there, still full, still waiting."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes the sleeping giant is one right coach, one right quarterback, from waking — that the tradition, the walk-on pipeline, and the sellout streak mean Nebraska is owed a return to relevance. It has believed this every August for twenty-five years."

