story_canon:
  the_unique_thing: "ULM owns one of the most famous upsets in college-football history — 'The Shock in Little Rock,' a 34-31 overtime win over #8 Arkansas in 2012 — the proof that a tiny north-Louisiana program can fell a giant on the right Saturday."
  the_origin: "A Monroe, Louisiana school once known as Northeast Louisiana that won an FCS national title in 1987, climbed to FBS, and rebranded as the Warhawks in 2006 — small-budget football in the Bayou State's third football town."
  golden_ages:
    - { era: "1987 (Pat Collins)", what: "An NCAA Division I-AA (FCS) national championship — the program's lone title" }
    - { era: "2012 (Todd Berry)", what: "8-5, an Independence Bowl trip, and the Arkansas upset — the high point of the FBS era" }
  legends:
    - { name: Kolton Browning, role: player, why: "The quarterback who accounted for 481 yards and the game-winning overtime scramble against Arkansas" }
    - { name: Todd Berry, role: coach, why: "Raised the program's national profile and led the 2012 run" }
  canonical_moments:
    - { name: "The Shock in Little Rock", year: 2012, what: "ULM stuns #8 Arkansas 34-31 in overtime, rallying from 21 down", handling: glory }
    - { name: "The 1987 FCS national championship", year: 1987, what: "Northeast Louisiana wins the I-AA title", handling: glory }
  the_place: "Malone Stadium in Monroe — an intimate Sun Belt venue on the banks of the Ouachita, where a small school packs in for its one Division-I team."
  brand_of_football: "Underdog opportunism — a program built to spring the upset, dangerous on the day it catches a bigger team looking past it."
  cultural_footprint: "North Louisiana's football team — neither LSU nor New Orleans — a region's proof that the giants can be beaten, cited every time a Sun Belt school walks into an SEC stadium."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: ULM went 3-9 (1-7 Sun Belt) in 2025, Bryant Vincent's second season,
    after a 5-7 first year that started 5-1 and collapsed. Vincent also took on an interim athletic-director
    role in August 2025, an unusual dual hat. The question in Monroe: can the program climb back toward bowl
    contention on the smallest budget in the league, or does it stay defined by a single great Saturday.
