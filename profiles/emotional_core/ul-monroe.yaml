  core_variant: the-ceiling
  one_line: "ULM is the north-Louisiana program that walked into Little Rock and stunned #8 Arkansas in overtime — one perfect Saturday it has spent a decade-plus trying to feel again."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A 1987 FCS national title and the 'Shock in Little Rock' vs a modern reality of bottom-of-the-Sun-Belt finishes and a single bowl trip since 2012."

the_wound:
  name: "Living on one upset"
  detail: "ULM's defining modern memory — the 2012 overtime win over #8 Arkansas, 'The Shock in Little Rock' — is now thirteen-plus years old, and the program has mostly struggled since. A 3-9 (1-7 Sun Belt) finish in 2025, Bryant Vincent's second year, was the latest reminder that the magic Saturday hasn't had many sequels."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Build a team that wins more than it loses — a bowl, a Sun Belt run, the feeling that Monroe's program can do it for a season and not just a Saturday."
  drought: { since: 2012, unit: bowl }

the_chip:
  villain: blue_bloods
  text: "ULM fans know the power-conference programs schedule them as a paycheck and a guaranteed win — and they'll remind you the Warhawks once cashed that check the other way, walking into an SEC stadium and walking out with the upset of the year."

the_delusion:
  tone: earnest
  text: "The fanbase believes Monroe is one good Saturday from doing it again — that the program that shocked Arkansas can shock anybody, and that the next marquee scalp is always one upset away."

