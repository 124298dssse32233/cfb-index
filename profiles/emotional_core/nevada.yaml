emotional_core:
  primary: restoration    # the program that invented the Pistol and produced Kaepernick, trying to climb back
  secondary: grievance    # a real innovation legacy that the sport adopted and forgot where it came from
  core_variant: perpetual-rebuild
  one_line: "Nevada is the program that invented the Pistol offense in Reno and handed it to the whole sport — then watched everyone run its idea while the Wolf Pack itself slid back to the bottom of the Mountain West."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A 13-win 2010 season, an AP top-15 finish, and an offense that changed football against back-to-back losing years and a 3-9 present at the bottom of the league it once climbed."

the_wound:
  name: "Two straight three-win years"
  detail: "Jeff Choate went 3-10 in 2024 and 3-9 in 2025 — two seasons at the bottom of the Mountain West for a program that once finished ranked and beat Boise State. The fear in Reno is that the great era is receding into history."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Get back to a bowl and back into the Mountain West race — to feel Mackay roar the way it did in 2010, when the Wolf Pack's own invention carried it to the program's greatest night."
  drought: { since: 2010, unit: relevance }

the_chip:
  villain: national_media
  text: "Fans point out that half of college football borrowed the Pistol from a chalkboard in Reno, and that nobody outside the Mountain West remembers the offense was theirs — or that they once put a future Super Bowl quarterback on the biggest stage."

the_delusion:
  tone: earnest
  text: "The fanbase believes the magic is still in the building — that the program that invented the Pistol and launched Colin Kaepernick is one right hire and one big quarterback away from another 2010, and that the altitude at Mackay still belongs to them."

the_grudge_texture:
  rival: unlv
  texture: blood-feud   # the Battle for Nevada / Fremont Cannon — the most intense intrastate rivalry in the West

the_coach_relationship: hot-seat-churn   # post-Ault churn — Polian, Norvell, Choate, with the great era long gone
the_internal_fracture: legacy vs reality — the faction that clings to the Ault/Kaepernick golden age as proof of what Nevada is vs the faction that sees two 3-win years and wants a clear-eyed rebuild
