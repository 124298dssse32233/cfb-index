story_canon:
  the_unique_thing: "The Pistol offense was born here — Chris Ault drew it up in Reno in 2005, and within years it had spread from college fields to the NFL. No other mid-major can say it changed how the entire sport plays offense."
  the_origin: "The University of Nevada in Reno, playing since 1896 — the 'Battle Born' Wolf Pack at altitude in the high desert, a program defined by one coaching genius and one revolutionary idea."
  golden_ages:
    - { era: "2010 (Chris Ault / Colin Kaepernick)", what: "A 13-1 season, a WAC title, the 'Mackay Miracle' over No. 3 Boise State, and an AP top-15 finish — the program's greatest year" }
    - { era: "2005–2012 (the Pistol era)", what: "Ault's invention powers a sustained run of bowl teams and the program's national peak" }
  legends:
    - { name: Chris Ault, role: coach, why: "28 seasons, the architect of the program and inventor of the Pistol offense; the field at Mackay bears his name" }
    - { name: Colin Kaepernick, role: player, why: "The dual-threat star who ran the Pistol to a 13-win 2010 and then to a Super Bowl with the 49ers" }
  canonical_moments:
    - { name: "The Mackay Miracle", year: 2010, what: "Nevada erases a 17-point deficit to beat No. 3 Boise State 34-31 in OT after a missed field goal — the program's signature night", handling: glory }
    - { name: "The Pistol debuts", year: 2005, what: "Chris Ault unveils the Pistol offense in Reno, a formation that would spread across college football and into the NFL", handling: glory }
  the_place: "Mackay Stadium at altitude in Reno — high-desert thin air, the Sierra backdrop, and the memory of the Boise State night when the place shook."
  brand_of_football: "The Pistol — Ault's hybrid of the shotgun and the I-formation, a run-first, downhill identity that the Wolf Pack gave to the rest of football."
  cultural_footprint: "Proof that a mid-major in the high desert can invent something the giants copy — and a reminder, every time an NFL team lines up in the Pistol, of where the idea started."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Nevada went 3-9 in 2025 (2-6 Mountain West) under second-year coach
    Jeff Choate, a marginal step up from his 3-10 debut but a second straight losing year at the bottom of the
    league. Fifteen years removed from the 13-win Kaepernick team, Reno is asking whether the program that
    invented the Pistol can climb back to a bowl — or whether its greatest era is now only a memory.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
