# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Pitt is one of college football's oldest powers — national titles claimed across the 1910s, 1930s, and a consensus 1976 championship, plus the heritage of Tony Dorsett and Dan Marino — wearing the same blue and gold as a city that built the modern game. It predates the Steelers; it helped invent football in Western Pennsylvania."
  the_origin: "An urban research university in Pittsburgh whose football tradition runs back to the dawn of the sport — Pop Warner and Jock Sutherland built early-century dynasties, and the program has worn its working-class steel-town identity ever since."
  golden_ages:
    - { era: "1973–1981 (Majors/Sherrill)", what: "Tony Dorsett's Heisman, the 1976 national championship, and a run of top-10 finishes with Dan Marino" }
    - { era: "2021 (Pat Narduzzi)", what: "An 11-win ACC championship season behind Heisman-finalist QB Kenny Pickett" }
  legends:
    - { name: Tony Dorsett, role: player, why: "1976 Heisman winner and national champion — the greatest player in program history" }
    - { name: Dan Marino, role: player, why: "The Pittsburgh kid who became a Hall of Fame quarterback — the program's most iconic name" }
    - { name: Pat Narduzzi, role: coach, why: "The long-tenured coach who delivered the 2021 ACC title, the program's first conference crown in the Power-conference era" }
  canonical_moments:
    - { name: "The 1976 national title", year: 1976, what: "Dorsett's Heisman season and Pitt's consensus national championship — the program's defining glory", handling: glory }
    - { name: "2021 ACC Championship", year: 2021, what: "An 11-win season and a conference title behind Kenny Pickett — proof the old power could still win one", handling: glory }
  the_place: "Acrisure Stadium on the Allegheny — shared with the Steelers, where the Panthers wear the same colors as the city's NFL team and carry a football heritage older than the franchise."
  brand_of_football: "Steel-city blue-collar — a physical, defense-first program that wears its working-class roots and a chip about being overlooked, built in the image of the city that built American football."
  cultural_footprint: "A foundational program of the sport's early history hidden inside a modern afterthought — the heritage of Dorsett, Marino, and a national title that the fanbase guards against a country that keeps forgetting it."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Pittsburgh went 8-5 (6-2 ACC) in 2025 under 11th-year coach Pat Narduzzi,
    finishing with a 23-17 Military Bowl loss to East Carolina. The season's story was at quarterback: Eli Holstein
    opened the year, but true freshman Mason Heintschel took over in October and broke out — including a 423-yard,
    freshman-record passing game in a 53-34 win over NC State — to power a four-game winning streak. The Panthers
    also fell to West Virginia in an overtime Backyard Brawl. Pitt enters 2026 with a freshman QB its fans hope is
    the answer to the long wait for relevance.
