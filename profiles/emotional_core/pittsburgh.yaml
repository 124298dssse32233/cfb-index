# AUTHORED 2026-06-13 from live web research — see story_canon.sources.

emotional_core:
  primary: grievance      # an old national power that the country keeps forgetting is still here
  secondary: house-money  # a true freshman QB nobody recruited dragging the season back to life
  core_variant: the-chronic-chip
  one_line: "Pittsburgh is the old power the sport keeps forgetting — a 1976 national champion that the country talks about like it vanished — and in 2025 an 18-year-old freshman named Mason Heintschel reminded everyone the Panthers are still in the room."

self_image:
  archetype: blue-blood-fallen
  standard_gap_frame: "Dorsett's 1976 national title and the Marino-era glory vs decades as an ACC afterthought the national broadcast forgets to mention."

the_wound:
  name: "The forgotten power"
  detail: "Pitt won a national title in 1976 and produced Tony Dorsett and Dan Marino, then spent the modern era as an overlooked program whose history outweighs its present. The 2021 ACC title under Pat Narduzzi briefly broke the silence; the wound is that the country still acts like Pitt football is a question mark, not a heritage."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Win another ACC title and force the sport to remember — turn Heintschel's emergence into the run that puts Pitt back among the names that get said first, not last."
  drought: { since: 1976, unit: national_title }

the_chip:
  villain: national_media
  text: "The fanbase has heard the program written off as an afterthought for two decades and bristles every time, because Pitt was a national power before half the programs dismissing it existed. They don't want sympathy; they want the country to remember the receipts."

the_delusion:
  tone: earnest
  text: "Panther fans believe the program is one quarterback away from being a real one again — and after watching a true freshman throw for 423 in a single game, they say Heintschel might be exactly the quarterback that ends the long wait."

the_grudge_texture:
  rival: west-virginia
  texture: blood-feud   # the Backyard Brawl — the border rivalry that defines the program

the_coach_relationship: forever-ours   # Pat Narduzzi, the long-tenured coach who delivered the 2021 ACC title
the_internal_fracture: Narduzzi loyalty vs Narduzzi fatigue — the room split between crediting him with the 2021 title and the freshman QB find, and the faction that wants more than 8-win seasons from a program with this history
register: pittsburgh-steel-city-blue-collar   # DRAFT (from voice_register) — confirm
