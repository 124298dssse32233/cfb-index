  detail: "Marist football arrived at the Pioneer League in 2010 and has never breached the tier above respectability. The wound is not dramatic; it's the quiet reality that one conference title in 13 years means the program has plateaued at a predictable level."
  handling: dated-grievance
  freshness: generational

the_dream:
  text: "Win 7 games and compete for the second playoff slot. The dream is concrete but modest — a season that shows year-over-year improvement and finishes .500 in conference."
