  archetype: riser-proving
  standard_gap_frame: "A Lutheran college in rural Iowa that climbed from perennial ARC contender to sustained NCAA playoff participant in three seasons, shedding the identity of 'always good, never great' in the Winter era."

the_wound:
  name: "The pre-Winter decades — consistent near-miss"
  detail: "Before Chris Winter arrived in 2021, Wartburg had won 14 ARC titles but never reached a national semifinal, never hosted a playoff game, never made the fanbase believe the Knights could truly compete for a national championship. The program was perpetually 'good for Iowa,' not 'good for Division III.' Winter changed the entire identity in three seasons."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "A national championship. Winter has taken the Knights to two Division III semifinals in his first three seasons (2022, 2023); the next step is finishing one of those runs."
  drought: { since: 1974, unit: national_title }

the_chip:
  villain: big_brother
  text: "Fans here believe iowa's other successful college football programs — Iowa, Iowa State — dominate the state narrative and media cycles. Wartburg knows it's the best-kept secret in Division III, and the chip is that the national media barely knows the Knights exist despite back-to-back playoff success."

the_delusion:
  tone: self-aware
  text: "That a Lutheran college of 1,600 students in Waverly, Iowa can compete for a national championship. The fanbase knows the odds, but Winter's semifinal runs in years 2 and 3 have made believers of even the skeptics. They know it's unlikely, and they believe it anyway."

