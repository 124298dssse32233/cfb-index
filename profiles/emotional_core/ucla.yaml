# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "UCLA plays its home games in the Rose Bowl and recruits the richest talent base in America, with one of the great NFL alumni lists in the sport — and has turned almost none of it into football glory in a generation. The gap between the resources and the results is the program's whole story."
  the_origin: "A Los Angeles public university whose athletic identity was built by basketball — John Wooden's dynasty — leaving football to grow in the shadow of both the Bruins' hardwood legend and crosstown USC."
  golden_ages:
    - { era: "1980s–1990s", what: "Terry Donahue's run — multiple Rose Bowls, the program's most sustained football success" }
    - { era: "2005 / 2014", what: "Periodic peaks — Karl Dorrell's and Jim Mora's ten-win teams — that never became a sustained era" }
  legends:
    - { name: Troy Aikman, role: player, why: "The most famous of a deep UCLA quarterback line; a Hall of Fame NFL career" }
    - { name: Terry Donahue, role: coach, why: "Winningest coach in program and conference history; the architect of UCLA's best football years" }
  canonical_moments:
    - { name: "The Gutty Little Bruins era", year: 1988, what: "Donahue's nationally ranked, Rose Bowl-winning teams", handling: glory }
    - { name: "The Big Ten move", year: 2024, what: "UCLA leaves the Pac-12 for the Big Ten — cross-country realignment that reshaped the program's identity", handling: wound }
    - { name: "The Foster firing", year: 2025, what: "An 0-3 start gets the second-year coach dismissed after 15 games", handling: heartbreak }
  the_place: "The Rose Bowl in Pasadena — the most storied stadium in college football, a home address most programs would trade everything for."
  brand_of_football: "LA cool with blue-blood bones — a program that looks the part of a national power and has spent decades searching for the team to match the setting."
  cultural_footprint: "The thinking fan's LA program — academic prestige, a basketball dynasty's halo, and a football team that carries the city's eternal what-if."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: UCLA fired DeShaun Foster after an 0-3 start in September 2025; interim
    Tim Skipper and a surging Nico Iamaleava — the Tennessee transfer who arrived from a 2025 NIL standoff —
    pulled the Bruins to a 3-9 finish, with Iamaleava earning Big Ten Offensive Player of the Week honors and
    announcing his return for 2026. UCLA then hired Bob Chesney, fresh off a 12-1 Sun Belt championship season
    at James Madison, as its new head coach. The question in Westwood: can Chesney and a returning Iamaleava
    finally make the resources mean something.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
