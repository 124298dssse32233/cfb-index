emotional_core:
  primary: deprival       # the best location and recruiting base in the country that never converts into a peak
  secondary: house-money  # the unexpected Nico Iamaleava spark out of a lost season
  one_line: "UCLA owns the best zip code in college football and almost never cashes it — then went 0-3, fired its coach, and watched a transfer quarterback nobody expected drag the season back to life."

self_image:
  archetype: blue-blood-fallen
  standard_gap_frame: "A Rose Bowl address, an NFL-stocked alumni list and one of the sport's great recruiting footprints vs a single Rose Bowl appearance since 1998 and a 3-9 first full season in the Big Ten."

the_wound:
  name: "The 0-3 collapse and the Foster firing"
  detail: "UCLA opened 2025 winless through three games — its worst start since 2019 — and fired second-year coach DeShaun Foster after just 15 games. Interim Tim Skipper and a surging Nico Iamaleava pulled the team to a 3-9 finish, but the bottom-falling-out start was the latest proof that a program with every structural advantage keeps finding the floor."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Finally turn the talent and the city into a team that matters in November — a bowl, a Big Ten run, the Rose Bowl full and loud for a winner again."
  drought: { since: 1998, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Bruins fans are tired of being the other LA team — the one whose football is treated as a basketball school's hobby and USC's undercard. They'll point to the alumni list and ask why the program with the better address keeps getting overlooked."

the_delusion:
  tone: earnest
  text: "The fanbase believes UCLA is a sleeping giant one right coach away — that the recruiting base, the brand and the city mean the program is always on the verge of the peak it never quite reaches."

the_grudge_texture:
  rival: usc
  texture: little-brother   # the crosstown rivalry — UCLA fans reject the stepchild frame but live inside it

the_coach_relationship: hot-seat-churn   # Mora→Kelly→Foster (fired mid-2025)→Skipper interim — a program that can't settle the chair
the_internal_fracture: belief vs resignation — the faction that says the Iamaleava spark and the resources mean it's finally turning vs the faction that's seen the giant stay asleep too many times to buy it
register: la-cool-with-blue-blood-history   # DRAFT (from voice_register) — confirm
