story_canon:
  the_unique_thing: "The Dantonio run against Michigan — 8 wins in 11 years over the in-state giant, capped by miracles like the 2015 blocked punt returned as time expired. Michigan State's identity is built on being the program that refuses to be the smaller story in its own state."
  the_origin: "The land-grant flagship in East Lansing, a Duffy Daugherty national power in the 1960s that became, under Mark Dantonio, the rare program to consistently bloody its blue-blood neighbor."
  golden_ages:
    - { era: "1965–1966 (Duffy Daugherty)", what: "Back-to-back national championships and the integration-era 'Game of the Century' vs Notre Dame" }
    - { era: "2010–2015 (Mark Dantonio)", what: "Big Ten titles, a Rose Bowl, and a 2015 College Football Playoff berth" }
  legends:
    - { name: Mark Dantonio, role: coach, why: "Winningest coach in program history; built the modern era and the dominance over Michigan" }
    - { name: Bubba Smith, role: player, why: "Defensive icon of the 1965-66 national champions" }
    - { name: Kirk Cousins, role: player, why: "Quarterback who helped relaunch the program in the early Dantonio years" }
  canonical_moments:
    - { name: "The 1966 Game of the Century", year: 1966, what: "Michigan State and Notre Dame tie 10-10 in a landmark integration-era showdown", handling: glory }
    - { name: "The 2015 blocked punt vs Michigan", year: 2015, what: "MSU returns a botched punt for a touchdown as time expires — the rivalry's defining miracle", handling: miracle }
    - { name: "The 2013 Rose Bowl run", year: 2013, what: "A Big Ten title and Rose Bowl win, the Dantonio peak", handling: glory }
  the_place: "Spartan Stadium in East Lansing — Sparty out front, a green-and-white crowd that lives for one Saturday in November above all others."
  brand_of_football: "Hard-nosed, physical, defense-and-toughness football — the Dantonio template of out-hitting opponents who are supposed to be more talented."
  cultural_footprint: "Go Green — a program whose self-respect is non-negotiable, built on never conceding the state, the rivalry, or the conversation to anyone."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Michigan State went 4-8 (1-8 Big Ten) in 2025, started 3-0 then lost eight
    straight, and fired Jonathan Smith (9-15 over two years). The school hired former Northwestern coach Pat
    Fitzgerald the next day to end the post-Dantonio churn. Entering 2026, the program is again rebuilding —
    betting Fitzgerald restores the toughness that once owned its rivalry with Michigan.
