status: live
slug: north-dakota-state
team_id: null
program_name: North Dakota State
program_tier: 2

emotional_core:
  primary: restoration       # the dynasty must now prove it at the next level — ten titles or not, FBS is uncharted water
  secondary: honor           # the standard-bearer identity — ten titles obligate you to carry the proof upward
  core_variant: dynasty-restoration
  one_line: "North Dakota State is the only program in American football that won ten national championships in fourteen seasons — and is now asking whether a dynasty that owned the FCS can own the FBS too."

self_image:
  archetype: riser-proving
  standard_gap_frame: "Ten FCS titles, a quarterback pipeline to the first round of the NFL Draft, and a 12-1 final FCS season — measured against a Mountain West that has never heard of them and a transition clock that bars postseason play until 2028."

the_wound:
  name: "The 28-29 loss to Illinois State — the last game the Bison will ever play in the FCS"
  detail: "North Dakota State entered the 2025 FCS playoffs as the top seed and the consensus dynasty standard-bearer, went 12-0 in the regular season and beat everyone in front of them — then lost 28-29 at home to Illinois State in the second round, Cole Payton playing through a broken thumb, the final FCS chapter ending not with a tenth title but an upset in the Fargodome. The wound is that they never got to leave on their own terms."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Prove the dynasty travels — win Mountain West games, force the sport to watch a program that built ten titles in Fargo do it against FBS competition, and reach the College Football Playoff before the decade is out."
  drought: { since: 2024, unit: conference_title }

the_chip:
  villain: national_media
  text: "The chip is fourteen years of national media calling the FCS titles impressive but small — asterisked by the level, dimmed by the division, never fully counted. Bison fans believe that ten championships under any banner is ten championships, and they are carrying that belief into the Mountain West to prove it matters at any altitude."

the_delusion:
  tone: earnest
  text: "The fanbase believes the dynasty is a system, not a quirk of the FCS — that the Fargo QB pipeline, the Polasek staff, and the Bison standard of play will make FBS programs look underprepared the same way FCS opponents did. They say the mountain doesn't care which division you came from."

the_grudge_texture:
  rival: south-dakota-state
  texture: killed-by-realignment   # the Dakota Marker rivalry is shelved — NDSU's FBS move almost certainly ends the series

the_coach_relationship: total-trust   # Polasek is 1 year old and already signed to a 7-year deal above $1M/yr to lead the FBS transition
the_internal_fracture: dynasty-travels vs first-year-growing-pains — the faction that believes ten titles prove the standard translates vs the faction braced for a difficult adjustment season in a new conference against better rosters
register: fargodome-bison-ten-titles-dynasty-quarterback
never_use:
  - Small-school — ten national titles and a mountain of NFL first-round picks invalidate this frame
  - FCS-only legacy — the program's FBS era began 2026; the titles travel with them

# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The greatest dynasty in American football below the FBS — ten FCS national championships in fourteen seasons (2011, 2012, 2013, 2014, 2015, 2017, 2018, 2019, 2021, 2024), under four different coaches, with a quarterback succession chain — Brock Jensen, Carson Wentz, Easton Stick, Trey Lance, Cam Miller, Cole Payton — that produced multiple NFL starters and first-round picks from a school in Fargo, North Dakota."
  the_origin: "A Division II program that climbed to Division I FCS in 2004 and immediately built the most dominant run in subdivision history. Under Craig Bohl (three-peat, 2011-13), Chris Klieman (four titles), Matt Entz, and Tim Polasek, the Bison made Fargo the most reliable championship address in college football before joining the Mountain West as a football-only FBS member in 2026."
  golden_ages:
    - { era: "2011–2015 (Bohl/Klieman)", what: "Five consecutive FCS national championships — the first dynasty, anchored by Brock Jensen and Carson Wentz" }
    - { era: "2017–2019 (Klieman/Entz)", what: "Three more titles in three seasons, Easton Stick to Trey Lance, a 16-win 2019 and a 37-game FCS winning streak" }
    - { era: "2021–2024 (Entz/Polasek)", what: "Cam Miller's two-title run and a 2024 championship in Polasek's first year — the dynasty's final FCS chapter" }
  legends:
    - { name: Craig Bohl, role: coach, why: "The architect — three straight FCS titles from 2011-2013 before taking the Wyoming FBS job; the man who proved Fargo could sustain a dynasty" }
    - { name: Carson Wentz, role: player, why: "Four FCS titles, a 2016 NFL first-round pick to Philadelphia, the face of the dynasty's national moment" }
    - { name: Trey Lance, role: player, why: "Went 16-0 in 2019 (all-time single-season record), 28 TDs / 0 INTs, 2021 NFL first-round pick to San Francisco — the dynasty's apex individual season" }
    - { name: Tim Polasek, role: coach, why: "Won a national title in year one (2024), signed a 7-year deal, and is leading the FBS reclassification into the Mountain West" }
  canonical_moments:
    - { name: "The five-peat (2011-2015)", year: 2015, what: "Five consecutive FCS national championships, a record for any level of college football", handling: glory }
    - { name: "Trey Lance's 16-0 season", year: 2019, what: "Lance led NDSU to a perfect 16-0 record, 28 TD / 0 INT, and the FCS title — the greatest individual season in division history", handling: glory }
    - { name: "The 37-game winning streak", year: 2019, what: "An FCS-record 37 consecutive wins spanning three seasons, the longest streak at any level since 1894", handling: glory }
    - { name: "The 2025 playoff exit", year: 2025, what: "Top-seeded NDSU fell 28-29 to Illinois State at home in the second round, ending the FCS chapter not with a title but an upset", handling: wound }
  the_place: "The Fargodome — an 18,700-seat indoor arena in Fargo, North Dakota, where the Bison built ten titles in a dome that turns every home game into a championship-atmosphere final. The most reliable address in subdivision football."
  brand_of_football: "The system — disciplined, scheme-first, quarterback-production football that develops NFL starters on a four-year pipeline. Bison football is not one coach or one era; it is a standard that has survived every transition and four head coaches."
  cultural_footprint: "Proof that a Great Plains program with a basketball-arena-sized stadium can build the sport's most durable dynasty — the program that made Fargo, North Dakota a name every FCS fan knows, and is now bringing that proof to the FBS."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: North Dakota State enters the Mountain West Conference as a football-only
    FBS member in 2026 — the first year of a transition that will bar them from bowl games and the College
    Football Playoff until 2028. Head coach Tim Polasek signed a 7-year deal exceeding $1M/year and called the
    move "all gas and no brakes." The school is paying $5M to the NCAA and $12.5M to join the Mountain West.
    Cole Payton was drafted by Philadelphia in the 5th round of the 2026 NFL Draft, extending the unbroken QB
    pipeline. The defining question of 2026 and 2027: can a program that ran the table for fourteen years in
    the FCS develop the roster depth, recruiting reach, and financial scale to compete in a P4-adjacent
    conference — or does the dynasty's standard belong to a smaller stage? James Madison's 2025 CFP run,
    in just its fourth FBS year, is the model Bison fans are pointing to.
  sources:
    - https://www.ncaa.com/news/football/article/2026-02-09/10-things-know-about-north-dakota-states-move-fbs
    - https://drgnews.com/2026/02/11/321050/
    - https://www.espn.com/college-football/story/_/id/47870245/sources-north-dakota-state-joins-mountain-west-football
    - https://www.ncaa.com/news/football/article/2025-01-06/north-dakota-state-wins-2024-25-fcs-football-championship-10th-overall
    - https://www.inforum.com/sports/bison-media-zone/mens-sports/polasek-signs-contract-that-will-exceed-1-million-per-year

