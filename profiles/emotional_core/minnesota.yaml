story_canon:
  the_unique_thing: "The Bierman dynasty — Minnesota claims seven national championships, five of them under Bernie Bierman in 1934, 1935, 1936, 1940 and 1941, when the Gophers were one of the most dominant programs in the country. Almost no current Big Ten also-ran carries that deep a championship pedigree."
  the_origin: "The land-grant flagship in Minneapolis, a founding power of the sport that won national titles across the early decades and built the 1930s dynasty that still defines its heritage."
  golden_ages:
    - { era: "1934–1941 (Bernie Bierman)", what: "Five national championships and a stretch of national dominance" }
    - { era: "2017–present (P.J. Fleck)", what: "The Row the Boat resurrection — a 2019 11-2 season and a record bowl-win streak" }
  legends:
    - { name: Bernie Bierman, role: coach, why: "Architect of the 1930s-40s dynasty; the program's defining figure" }
    - { name: Bronko Nagurski, role: player, why: "Two-way legend of the early era; one of football's iconic names" }
    - { name: P.J. Fleck, role: coach, why: "Resurrected the modern program and made bowl-winning a habit" }
  canonical_moments:
    - { name: "The Bierman national titles", year: 1936, what: "The heart of the 1930s dynasty — back-to-back-to-back champions", handling: glory }
    - { name: "The 2019 11-2 season", year: 2019, what: "Fleck's breakthrough — an Outback Bowl win and a top-10 finish", handling: glory }
  the_place: "Huntington Bank Stadium (TCF Bank Stadium) in Minneapolis — outdoor Big Ten football back on campus, the Row the Boat oar, and rivalry weeks for the Axe and Floyd of Rosedale."
  brand_of_football: "Physical, run-heavy, cold-weather Big Ten football — Fleck's culture-first program built on toughness and an oar-rowing identity."
  cultural_footprint: "Row the Boat — a once-dormant national power reawakened into a proud, bowl-winning Big Ten program, carrying trophies (Paul Bunyan's Axe, Floyd of Rosedale) that anchor every November."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Minnesota went 8-5 (5-4 Big Ten) in 2025 and beat New Mexico 20-17 in
    overtime in the Rate Bowl for a Big Ten-record ninth straight bowl win, behind freshman QB Drake Lindsey
    (2,382 yards, 18 TDs), who returns for 2026. P.J. Fleck enters his tenth season with a stable, winning
    program — and the still-open question of whether Row the Boat can finally row back to a Big Ten title.
