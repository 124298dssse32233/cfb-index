emotional_core:
  primary: restoration    # a pre-WWII national power, dormant for generations, made solidly good again by Fleck
  secondary: contentment  # nine straight bowl wins — the program has quietly made winning a habit
  core_variant: dynasty-restoration
  one_line: "Minnesota was a national champion when leather helmets were new — and after eighty years of being told that was a museum, P.J. Fleck has it winning nine bowls in a row and daring the sport to remember the Gophers were once the standard."

self_image:
  archetype: sleeping-giant
  standard_gap_frame: "Six national titles in the 1930s-40s Bierman dynasty vs eight decades without a Big Ten title — a glorious past most of the country files as ancient history."

the_wound:
  name: "The long dormancy"
  detail: "Minnesota was one of the sport's great early powers, then spent generations as a Big Ten afterthought, with no outright conference title since 1967. Fleck's program is good — 8-5 in 2025, a Big Ten-record ninth straight bowl win — but the breakthrough back to the top of the league still hasn't come."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Win the Big Ten again — turn nine straight bowl wins and a steady program into the conference title the Bierman trophies say belongs here."
  drought: { since: 1967, unit: conference_title }

the_chip:
  villain: national_media
  text: "Fans hear the program's golden age waved off as a relic of a smaller sport — and answer that the trophies are real, the resurrection is real, and the country keeps underrating a Gophers team that just won its ninth bowl in a row."

the_delusion:
  tone: earnest
  text: "The fanbase believes Fleck and a young homegrown quarterback in Drake Lindsey are building toward the Big Ten breakthrough — that Row the Boat finally rows the program back to where the 1930s say it belongs."

the_grudge_texture:
  rival: wisconsin
  texture: border-war   # Paul Bunyan's Axe — the most-played rivalry in major college football

the_coach_relationship: total-trust   # Fleck, entering year 10, has earned the fanbase's belief
the_internal_fracture: gratitude vs greed — the faction content with a stable, bowl-winning program vs the faction that says a six-time national champion shouldn't settle for solid
register: minneapolis-row-the-boat-believer
