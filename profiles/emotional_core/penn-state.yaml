story_canon:
  the_unique_thing: "The White Out — 106,000 fans in coordinated white at Beaver Stadium, 'Zombie Nation' shaking the bowl between plays — is regularly called the single loudest, most intimidating night-game atmosphere in college football, the program's identity distilled into one Saturday a year."
  the_origin: "A land-grant school in central Pennsylvania that played football from 1887 and became a national power under Joe Paterno, whose 46-year tenure (1966-2011) built the 'Grand Experiment' — the bet that you could win at the highest level with academic integrity, 'Success with Honor.'"
  golden_ages:
    - { era: "1968–1986 (Paterno)", what: "Undefeated 1968, 1969, 1973 teams and national championships in 1982 and 1986" }
    - { era: "1994", what: "An undefeated, Rose Bowl-winning team many consider the best in school history — and a co-national-title argument that still rankles" }
  legends:
    - { name: Joe Paterno, role: coach, why: "The Grand Experiment, two national titles, the most wins in major-college history at his peak" }
    - { name: John Cappelletti, role: player, why: "The program's only Heisman winner (1973), immortalized for dedicating it to his dying brother" }
    - { name: Saquon Barkley, role: player, why: "The modern era's defining talent, the face of the Franklin-era rebuild" }
  canonical_moments:
    - { name: "1986 national title", year: 1987, what: "A goal-line stand stops Miami in the Fiesta Bowl for the program's second championship", handling: glory }
    - { name: "1994 undefeated, no title", year: 1994, what: "A perfect season denied a clear championship — the great what-if", handling: heartbreak }
    - { name: "2022 White Out vs Ohio State", year: 2022, what: "Another fourth-quarter loss to the Buckeyes — the recurring ceiling made literal", handling: wound }
  the_place: "Beaver Stadium (cap 106,572) — second-largest in the Big Ten, the White Out its defining night, the S-Zone card stunt and 'We Are' call-and-response rolling across the bowl."
  brand_of_football: "Blue-collar-dynastic — plain uniforms, no names on the jerseys, a program that speaks about itself the way a well-run manufacturing town does: serious, coordinated, built on the work."
  cultural_footprint: "The program that staked its identity on collective ritual over any one man — 'We Are' as a statement of institutional permanence — and built traditions durable enough to outlast every crisis."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Penn State entered 2025 ranked No. 2 with national-title expectations, then
    cratered — an overtime home loss to Oregon followed by upsets to UCLA and Northwestern — and fired James Franklin
    in October after a 3-3 start, ending a 12-year, 104-45 tenure. Terry Smith finished as interim. On December 8,
    2025, the school hired Iowa State's Matt Campbell as the 17th head coach in program history on an eight-year deal,
    a three-time Big 12 Coach of the Year brought in to do the one thing the Franklin era never could: break the ceiling.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
