slug: penn-state
team_id: 226
program_name: Penn State
program_tier: 2

emotional_core:
  primary: deprival       # the decade-long inability to win the one game that mattered, now a clean break
  secondary: restoration  # a new coach hired to finally clear the ceiling
  one_line: "Penn State spent a decade as the program that could win every big game except the biggest — and in 2025 the wait finally broke the man who embodied it, ending the Franklin era mid-season and handing the job to someone hired to do the one thing the program never could."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "Two national titles, seven undefeated seasons, and the loudest stadium in the country vs a decade of New Year's Six near-misses, no Playoff title game, and fourth-quarter collapses to Ohio State that the fanbase never processed past."

the_wound:
  name: "The 2025 free-fall and the firing it forced"
  detail: "Penn State opened 2025 ranked No. 2 with title aspirations, started 3-0, then lost in overtime to Oregon at home and dropped stunners to UCLA and Northwestern — a 22-21 home loss to the Wildcats sending the program to 3-3 and ending James Franklin's 12-year, 104-win tenure in October, the abrupt close to a decade defined by getting close and not closer."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Beat the team in front of them in the game that decides it — turn a generation of New Year's Six trophies into the one that the program has chased since 1986."
  drought: { since: 1986, unit: national_title }

the_chip:
  villain: big_brother
  text: "Fans will point to the scoreboard: a decade of being the Big Ten's clear third program behind Ohio State and Michigan, the two rivals who kept finding a way in the fourth quarter when Penn State couldn't. The standard was never the problem — clearing the team one rung up always was."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes the ceiling was a coaching problem, not a program one — that the roster, the recruiting, and the loudest home field in the sport were always championship-grade, and that the right sideline finally unlocks the title the resources have long deserved."

the_grudge_texture:
  rival: ohio-state
  texture: championship   # the league's defining matchup — the game that has repeatedly decided Penn State's ceiling

the_coach_relationship: savior   # Matt Campbell hired Dec 2025 to break the ceiling Franklin couldn't
the_internal_fracture: gratitude vs grievance over Franklin — the faction that says firing a 104-win coach was reckless vs the faction that says a decade of almost was always going to end this way
register: blue-collar-dynastic — earnest, Pennsylvania-specific, confident in the work without coastal swagger
never_use:   # DRAFT from profile — LAW, do not violate in any authored line
  - Happy Valley as punchline
  - We Are without the response "Penn State" (it's a call and response)
  - JoePa scandal as unprompted reference
  - cute-underdog framing
  - scrappy
  - Penn State football as the Paterno scandal (the program is bigger than one chapter)
  - Cinderella

# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
