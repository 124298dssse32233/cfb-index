story_canon:
  the_unique_thing: "BYU is Quarterback U with a national championship and a religious mission — the only program whose identity is inseparable from its faith, the school of the LDS Church, that out-threw everyone in the 1980s and won it all in 1984 from outside the traditional power structure."
  the_origin: "The flagship university of the Church of Jesus Christ of Latter-day Saints in Provo, Utah, with a worldwide following of members and returned missionaries — a program that built a passing dynasty under LaVell Edwards when the rest of the sport still ran the ball."
  golden_ages:
    - { era: "1972–2000 (LaVell Edwards)", what: "The forward-pass revolution and a 1984 national championship — a small religious school beating the blue bloods through the air" }
    - { era: "1990 (Ty Detmer)", what: "Detmer's Heisman Trophy, the headline year of the Quarterback U era" }
  legends:
    - { name: LaVell Edwards, role: coach, why: "The passing-game pioneer who built the program and won 1984; the stadium bears his name" }
    - { name: Ty Detmer, role: player, why: "1990 Heisman winner; the apex of the QB factory" }
    - { name: Steve Young, role: player, why: "The All-American who became an NFL Hall of Famer — the most famous Cougar" }
  canonical_moments:
    - { name: "1984 national championship", year: 1984, what: "A 13-0 season ends with the title — a non-blue-blood out of the WAC wins it all", handling: glory }
    - { name: "Detmer's Heisman", year: 1990, what: "Ty Detmer wins the Heisman, the crown of the QB-U lineage", handling: glory }
    - { name: "Hail Mary vs SMU", year: 1980, what: "Jim McMahon's 'Miracle Bowl' comeback caps a 46-45 Holiday Bowl win", handling: miracle }
  the_place: "LaVell Edwards Stadium in Provo — named for the architect of the program — set against the Wasatch Range, where 'Rise and Shout,' Cosmo the Cougar, and a national LDS following fill a venue that doubles as a gathering place for the faith."
  brand_of_football: "The passing tradition — BYU threw the ball when no one else would and made it the program's signature; a disciplined, faith-anchored, Honor-Code program that wins on its own terms."
  cultural_footprint: "The football team of a global faith — a program followed by Church members and returned missionaries worldwide, the rare school whose religious identity is the brand, not a footnote."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: BYU's 2025 season was one of the best in program history — 12-2 (8-1
    Big 12), a run to the Big 12 Championship Game (a 34-7 loss to Texas Tech), and a Pop-Tarts Bowl win over
    Georgia Tech. Kalani Sitake, the alumnus head coach, won Big 12 Coach of the Year and turned down Penn
    State to stay. With Sitake and freshman-sensation QB Bear Bachmeier both returning, BYU enters 2026 a
    consensus top-15 team and a genuine Big 12 contender — the patience of the long road out of independence
    finally paying real dividends.
