emotional_core:
  primary: honor          # a program that wins on its own terms — faith, the Honor Code, patience — and refuses to apologize for it
  secondary: house-money  # after a generation of wandering, a 12-2 Big 12 near-title run is pure upside
  one_line: "BYU is the program that won a national title in 1984, spent four decades in the wilderness waiting for a seat at the table, and in 2025 came within a Big 12 title game of cashing in the patience."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A 1984 national championship and a Quarterback U lineage vs four decades of conference exile, a long independent purgatory, and a present finally spent proving it belongs in a Power league."

the_wound:
  name: "One game short of the breakthrough"
  detail: "The 2025 Cougars went 12-2, but a 34-7 loss to Texas Tech in the Big 12 Championship Game ended the Playoff dream and the league-title chase in the same night — the closest BYU has come to validating the Big 12 move, and a reminder of exactly how much is left to finish."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the Big 12 outright and reach the Playoff — turn the long road out of independence into a seat at the real table, and prove the patience was an investment, not a sentence."
  drought: { since: 1984, unit: national_title }

the_chip:
  villain: national_media
  text: "Cougar fans have heard for years that the schedule was soft, that the faith makes the program a curiosity, that the wins came against nobody — and they say the 2025 Big 12 run answered all of it at once, on the field, against Power competition."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes the patience always pays — that a program built on faith, the Honor Code, and a national following will outlast every realignment and every doubt, and that the seat at the table was always coming if they just kept the faith long enough."

the_grudge_texture:
  rival: utah
  texture: blood-feud   # the Holy War — the in-state, cross-faith rivalry that defines Utah football

the_coach_relationship: forever-ours   # Kalani Sitake, an alum, turned down Penn State to stay; he is the program's own
the_internal_fracture: faith-first vs win-first — the faction that treats the religious identity and Honor Code as the whole point, even at a recruiting cost, vs the faction that wants BYU to do whatever the Power-conference arms race demands to win now
register: independent-faith-tradition
