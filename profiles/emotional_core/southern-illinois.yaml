emotional_core:
  primary: redemption
  secondary: grievance
  one_line: "Southern Illinois is the 1983 national champion whose football program fell into irrelevance, and whose fanbase will not let the glory fade."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "A 1983 I-AA national championship and nine conference titles built a legacy — but decades of mediocrity in a changing Valley have left Saluki football chasing relevance."

the_wound:
  name: "The long descent from 1983"
  detail: "Southern Illinois won the I-AA national championship in 1983 under coach Rey Dempsey, a moment that defined the program for generations. But the football program has spent forty years trying to recapture that glory, with only sporadic conference titles and playoff appearances to mark the decades. The wound is not acute — it's a slow-burn irrelevance, a program that mattered once and cannot accept that it doesn't matter as much anymore."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Return to the Valley elite, win a conference championship, and prove that the 1983 title was not a one-off but the beginning of a dynasty that never fully flowered."
  drought: { since: 1983, unit: national_title }

the_chip:
  villain: national_media
  text: "College football forgot about Southern Illinois the year after 1983, and the fanbase believes the Salukis have been trying to remind the sport of their existence ever since."

the_delusion:
  tone: self-aware
  text: "The fanbase believes 1983 is the program's identity, that the Salukis are a sleeping giant that could wake up at any moment and reassert themselves in the Valley — and they hold onto that belief because letting go would mean accepting 40 years of failure."

the_grudge_texture:
  rival: southeast-missouri-state
  texture: blood-feud

the_coach_relationship: hot-seat-churn
the_internal_fracture: glory-chasing vs rebuild-from-scratch — the faction that cites 1983 as proof of potential vs the faction that wants to move on from the past
register: carbondale-southern-illinois-saluki-1983-champion
never_use:
  - National program (1983 was 40+ years ago, program has since declined)
  - Ever-relevant (irrelevance is the lived reality of modern Saluki football)

