# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Notre Dame is the only blue blood that has never needed a conference — a national independent with its own NBC contract, built by converting 20th-century Catholic immigration into a fanbase that has nothing to do with proximity to South Bend, and it claims more Heisman winners than any program in the sport."
  the_origin: "A small Catholic university in Indiana that Knute Rockne turned into a national power in the 1920s — the forward pass, the Four Horsemen, 'win one for the Gipper' — and a fanbase ('subway alumni') that predated television and followed the team by faith and radio."
  golden_ages:
    - { era: "1918–1930 (Rockne)", what: "Three national titles, the Four Horsemen, and the birth of the national brand" }
    - { era: "1941–1953 (Leahy)", what: "Four national championships and a near-unbeatable postwar run" }
    - { era: "1964–1988 (Parseghian, Devine, Holtz)", what: "Five national titles across three coaches, ending with the 1988 championship" }
  legends:
    - { name: Knute Rockne, role: coach, why: "Built the national program; the most famous coach of the sport's early era" }
    - { name: Ara Parseghian, role: coach, why: "Restored the program in the 1960s-70s with two national titles" }
    - { name: Tim Brown, role: player, why: "1987 Heisman winner; one of seven Heismans, most of any program" }
  canonical_moments:
    - { name: "The 1988 national title", year: 1988, what: "Lou Holtz's 12-0 team wins the program's last consensus championship", handling: glory }
    - { name: "Catholics vs. Convicts", year: 1988, what: "The No. 1 vs No. 4 win over Miami that defined the era", handling: glory }
    - { name: "The 2025 Playoff snub", year: 2025, what: "A 10-2 team on a ten-game winning streak is left out of the 12-team field; Notre Dame declines a bowl", handling: wound }
  the_place: "Notre Dame Stadium — 'the House that Rockne Built' — with the Word of Life mural ('Touchdown Jesus') beyond the north end zone and 'Play Like a Champion Today' touched on the way out of the locker room."
  brand_of_football: "Dynastic-with-a-question-mark: pro-style, disciplined, academically gatekept; a program that expects to win without apologizing for it and refuses to mistake expectation for achievement."
  cultural_footprint: "The program that turned a religion into a national fanbase — the only independent blue blood, a permanent NBC fixture, and the recurring test case for whether a team outside the conference structure can still reach the top of the sport."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Notre Dame went 10-2 under Marcus Freeman, opening 0-2 (Miami, Texas A&M)
    before winning ten straight, many in routs. At No. 11 the Irish were the first team out of the 12-team Playoff
    when the committee elevated Miami on the Week 1 head-to-head; Notre Dame declined a non-Playoff bowl. CJ Carr,
    in his first year as starter, threw for 2,741 yards and 24 touchdowns with a 168 rating and enters 2026 as a
    Heisman frontrunner and the first returning primary starter at QB since 2020. Freeman turned down NFL interest
    to stay; preseason polls and ESPN's future power rankings put the Irish No. 1, with 'leave no doubt' the mandate.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
