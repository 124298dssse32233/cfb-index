slug: notre-dame
team_id: 374
program_name: Notre Dame
program_tier: 1

emotional_core:
  primary: grievance      # the 2025 CFP snub — 10 straight wins and left out — is the live, burning fuel
  secondary: standard     # 11 consensus titles set an expectation independence makes harder to satisfy
  core_variant: the-snub
  one_line: "Notre Dame is the national independent that won ten in a row to end 2025, watched the committee hand the last Playoff seat to the team that beat it in Week 1, and skipped a bowl rather than pretend that was good enough."

self_image:
  archetype: blue-blood-living-up
  standard_gap_frame: "Eleven consensus national titles and the only program that doesn't need a conference vs a postseason gate that, even at 10-2 with a ten-game winning streak, can be closed on a Week 1 tiebreaker no other contender has to survive."

the_wound:
  name: "The 2025 Playoff snub"
  detail: "Notre Dame opened 0-2, then won ten straight — many in routs, including a home win over a ranked USC — and finished No. 11 at 10-2. The committee gave the final at-large bid to Miami on the head-to-head from the Week 1 opener; Notre Dame declined a non-Playoff bowl rather than treat the leftover as a reward."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Leave no doubt the committee can use against it — a regular season clean enough that independence is an advantage again, and the first championship of the modern era."
  drought: { since: 1988, unit: national_title }

the_chip:
  villain: committee
  text: "The fanbase's read is simple and bitter: ten straight wins were worth less than a Week 1 result the committee chose to weight, and a program with no conference title to wave gets judged on a standard the leagues never have to meet. They say the snub wasn't an accident — it was the price of going it alone."

the_delusion:
  tone: load-bearing
  text: "Notre Dame fans believe independence is strength, not exposure — that the national fanbase, the NBC marquee and the title history mean the Irish belong in every Playoff conversation by birthright, and that 2025's exclusion was a wrong to be corrected rather than a verdict to be accepted."

the_grudge_texture:
  rival: usc
  texture: championship   # the Jeweled Shillelagh — a national, intersectional blue-blood series with title stakes

the_coach_relationship: total-trust   # Freeman turned down the NFL to stay; the room is all-in on him
the_internal_fracture: independence-purity vs Playoff-pragmatism — the room that treats going it alone as sacred identity vs the room that says the snub proves a program needs a conference's automatic path to stop being the committee's swing vote
register: dynastic-with-question-mark   # DRAFT (from voice_register) — confirmed
