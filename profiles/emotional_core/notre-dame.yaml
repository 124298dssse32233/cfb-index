# ── BRIEFING (read-only context for the authoring session; NOT part of the published core) ──
briefing:
  identity_phrase: Notre Dame is a program that knows what it is, and still asks the question.
  mantra: Play like a champion today.
  cultural_anchors:
    fan_archetype_dominant: Subway Alumnus
    outsider_archetype_dominant: Mystic-Persecuted
    one_sentence: Notre Dame is the program that converted Catholic mass immigration into a national fanbase
      that has nothing to do with proximity to South Bend.
  selfname: the Irish
  aspiration_ladder_top: Dynasty Window
  rivalries:
  - usc
  - navy
  - michigan
  - stanford
  - boston-college
  - purdue
  - michigan-state
  heritage:
    national_titles: 13
    conference_titles: 0
    current_conference: FBS Independent
  prose_excerpts:
    taboos: The 1988 championship is a long time ago and fans know that; copy that calls it "recent" reads
      as patronizing. The Brian Kelly departure (to LSU, mid-season 2021) is not a wound to keep picking
      at — the program moved on, but the exit is not a subject for light humor. Any implication that Notre
      Dame football is "just a schoolboy team that won't play in the real league" — a recurring outside
      take — should be acknowledged in the voice, not defended against with insecurity.
    fans_culture: 'The fanbase is national — the "subway alumni" concept predates television and still operates.
      Geography runs from the Chicago-Notre Dame-South Bend corridor out to every major American city where
      Catholic diasporas settled in the 20th century. The gameday register is reverent, ritual-heavy, and
      aware of being watched: pep rally traditions, the march across campus, the band''s fight song before
      every home snap. The tailgate is older than most programs'' stadia. Internal…'
    voice_ethos: 'The voice is dynastic with a question mark. Notre Dame speaks the way programs speak when
      their history is larger than their present — confident, institutional, attentive to standard — but
      the specific question ("can we still?") is never fully retired, and performative modesty is a trust-killer.
      The Irish do not apologize for expecting to win, and do not mistake expectation for achievement. The
      identity phrase opens most state-of-team paragraphs: **"Notre Dame is a program…'
    narratives: 'The 2024 National Championship Game run is still the near-term narrative center of gravity:
      a program that reached the title game with a young, transfer-portal-augmented roster, under a coach
      in his third year. The question of whether 2024 was a peak or a floor is the single biggest open thread
      in the program''s story. Spring 2026 and the portal window are where the next version of that answer
      is being built. Independence continues as a structural choice. Conference…'
    in_jokes: '"The Shillelagh lives here" — the stock reply when a USC alum questions the year''s rivalry
      result. "Play like a champion today" — real, not a bit. "Rudy" is mentioned exactly once every five
      years internally; it is not a fan-culture load-bearing reference the way it is in outside media.'
