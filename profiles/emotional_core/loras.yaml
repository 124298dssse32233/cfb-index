  one_line: "Loras is the Dubuque, Iowa Duhawk — named by a Detroit sportswriter's serendipitous flash of genius in 1924, a program built on pride in a mascot origin story and a 1947 undefeated season that lingers in memory."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A small Catholic college with a storied mascot name, one conference championship (1948), a 1947 undefeated season, and 119 years of steady Iowa football, but no recent national prominence."

the_wound:
  name: "The 75-year drought since 1948"
  detail: "Loras won the ARC championship in 1948. The subsequent 77 years have been quiet regional competence — making occasional tournaments, winning ARC games — but never returning to the peak of 1947–1948. The program has settled into the identity of 'the school with the great mascot story, not great football.'"
  handling: referenceable
  freshness: generational

the_dream:
  text: "Another conference title. Another undefeated regular season. Loras knows it's unlikely, but the 1947–1948 precedent proves it's possible."
  drought: { since: 1948, unit: conference_title }

the_chip:
  villain: none
  text: "No real chip — Loras's identity is too rooted in pride of place and tradition to carry a grievance. The fanbase takes pride in the Duhawk name and its origin story."

the_delusion:
  tone: self-aware
  text: "That the program that fielded an undefeated team in 1947 can do it again. The fanbase knows 77 years is a long time, knows the odds are slim, but believes the precedent makes it possible."

