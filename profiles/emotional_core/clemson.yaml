  - Football-only program — academics + football

# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Clemson built a two-title modern dynasty in Clemson, South Carolina — a college town of about 17,000 in the upstate pines — by promoting a position coach nobody else wanted as a head coach, and turning loyalty and continuity into the thing every churn-driven blue blood now envies."
  the_origin: "A land-grant agricultural college whose football became the identity of the whole upstate; a 1981 national title under Danny Ford gave it a claim, but the program that defines Clemson today was assembled by Dabo Swinney, hired off Tommy Bowden's staff as interim in 2008 and never let go."
  golden_ages:
    - { era: "1981 (Danny Ford)", what: "The program's first national championship — the proof-of-concept that Clemson could win at the top" }
    - { era: "2015–2020 (Swinney)", what: "Six straight Playoff appearances, two national titles (2016, 2018), and the Trevor Lawrence era" }
  legends:
    - { name: Dabo Swinney, role: coach, why: "Interim-to-permanent hire who built two national titles and the modern dynasty; the institution itself" }
    - { name: Trevor Lawrence, role: player, why: "Won the 2018 title as a freshman; the face of the dynasty and the No. 1 overall pick" }
    - { name: Deshaun Watson, role: player, why: "Delivered the 2016 title with the last-second drive against Alabama" }
  canonical_moments:
    - { name: "The 1-second drive", year: 2017, what: "Watson hits Hunter Renfrow with :01 left to beat Alabama for the 2016 national title in the rematch", handling: glory }
    - { name: "Lawrence's freshman title", year: 2019, what: "Clemson routs Alabama 44-16 for the 2018 championship behind a true freshman quarterback", handling: glory }
    - { name: "The 2025 unravel", year: 2025, what: "A preseason top-five team finishes 7-6 and loses the Pinstripe Bowl to Penn State — the worst Swinney season", handling: wound }
  the_place: "Memorial Stadium — 'Death Valley' — where the team rubs Howard's Rock and Runs Down the Hill, called the most exciting 25 seconds in college football."
  brand_of_football: "Blue-collar-dynasty: developmental, continuity-driven, recruited-and-kept rather than bought; a program that wins by out-lasting churn, with paws on everything."
  cultural_footprint: "The proof that a small-town, high-loyalty program can stack real dynasty canon against the recruiting metropolises — and the league-wide reference point for whether continuity still beats turnover in the portal era."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Clemson went 7-6 (4-4 ACC) in 2025, its fewest wins since 2010, after
    opening No. 4 and hearing Swinney float a 16-0 season — then losing the Pinstripe Bowl 22-10 to Penn State.
    Cade Klubnik's Heisman buzz cratered and he left as a fourth-round pick (Jets, No. 110); Clemson produced
    nine 2026 draft picks against seven wins. Chad Morris returns as offensive coordinator and the 2026 QB job
    opens between Christopher Vizzina and Tait Reynolds. Swinney, openly on the hot seat for the first time, has
    addressed retirement talk and insists the climb back is on — the referendum is whether continuity still wins.
