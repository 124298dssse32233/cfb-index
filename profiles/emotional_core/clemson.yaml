emotional_core:
  primary: restoration    # the live drama is reclaiming the altitude Dabo built, not mourning it
  secondary: grievance    # the coastal-media doubt that never fully went away even at the peak
  core_variant: dynasty-restoration
  one_line: "Clemson is the dynasty a town of 17,000 built in the pines — now watching the architect who never left try to climb back to the standard he set himself."

self_image:
  archetype: blue-blood-living-up
  standard_gap_frame: "Two national titles and a six-year Playoff residency under Swinney vs a 7-6 grind, a Pinstripe Bowl loss to Penn State, and a fanbase asking whether the most loyal program in the sport has aged into the middle of the pack."

the_wound:
  name: "The 2025 unravel"
  detail: "A preseason No. 4 that Swinney said could go 16-0 finished 7-6 — Clemson's fewest wins since 2010 — as Cade Klubnik's Heisman buzz collapsed into a fourth-round NFL exit, and Clemson sent nine players to the 2026 draft while winning only seven games."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Climb back to the only address Swinney accepts — the Playoff, and the third title that proves Death Valley still hosts a contender, not a memory."
  drought: { since: 2018, unit: national_title }

the_chip:
  villain: national_media
  text: "The coastal panels never believed a champion could be raised in the upstate pines; the fanbase says they wrote the obituary in 2011 and again every down year, and Clemson built two titles answering it. The doubt in 2025 just sounds like an old song played loud."

the_delusion:
  tone: load-bearing
  text: "Clemson fans believe loyalty is a competitive advantage — that keeping the coach, the culture and the rock through a 7-6 year is exactly how this program out-lasts the churn everyone else mistakes for ambition, and that the climb back is already underway."

the_grudge_texture:
  rival: south-carolina
  texture: border-war   # the Palmetto Bowl — one state, one bragging right, year-round

the_coach_relationship: forever-ours   # Dabo is the interim-to-permanent hire who became the institution; the bond survives the down year
the_internal_fracture: faith vs fatigue — the room that says the architect earns the runway to rebuild what he built vs the room that says two losing-adjacent years and a stale offense mean even Dabo isn't above the standard
register: blue-collar-dynasty-with-paws   # DRAFT (from voice_register) — confirmed
