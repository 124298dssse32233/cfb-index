the_wound:
  name: "The shadow of the 2009 championship hanging over sustainability"
  detail: "Villanova won the FCS national title in 2009 and has been chasing that peak for 16 years. The program sent 36 players to the NFL and claims the strongest pipeline in FCS, yet can't recapture the championship. The wound is the question: was 2009 lightning in a bottle, or can a dynasty be rebuilt?"
  handling: referenceable
  freshness: this-era

the_delusion:
  tone: load-bearing
  text: "The fanbase believes that Villanova can win a national title in the Patriot League the way it did in 2009, that the program's success is sustainable because the culture and the NFL pipeline are permanent. (The reality: dynasties are often dependent on a specific era and coaching; another title requires all the variables to align again.)"

