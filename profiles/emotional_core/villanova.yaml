# ── STORY CANON (doc 64) — what makes this program unique & amazing. ──
story_canon:
  the_unique_thing: "Reinstituted from scratch in 1985 and built into an FCS national champion (2009) and a pipeline to the NFL (36 draft picks, 31 first-team All-Americans, three Walter Payton Award winners). Few programs have built a legacy as quickly from zero."
  the_origin: "Villanova football was reinstituted in 1985 after being dormant. The program was built by legendary coach Andy Talley (1985-2016), who coached for 32 years and created a dynasty from a non-existent foundation."
  golden_ages:
    - { era: "1985-2016 (Andy Talley era)", what: "Built Villanova from nothing into an FCS powerhouse with a national title and consistent playoff appearances" }
    - { era: "2009", what: "FCS national championship, the peak of the Talley era" }
    - { era: "2010-2024", what: "Sustained FCS success with 16 playoff appearances and 10 quarterfinal-plus runs, 18-16 all-time playoff record" }
  legends:
    - { name: "Andy Talley", role: "coach", why: "Legendary coach (1985-2016) who built Villanova from a reinstituted program into an FCS powerhouse and national champion" }
    - { name: "Howie Long", role: "player", why: "Hall of Famer, one of Villanova's most famous NFL success stories" }
    - { name: "Brian Westbrook", role: "player", why: "All-Pro, one of Villanova's most famous NFL success stories" }
  canonical_moments:
    - { name: "2009 FCS National Championship", year: 2009, what: "Villanova won the FCS national title, the program's peak achievement", handling: glory }
    - { name: "Andy Talley Era (1985-2016)", year: 2016, what: "32-year coaching tenure that built a dynasty from a reinstituted program", handling: glory }
    - { name: "2025 Patriot League Move", year: 2025, what: "Villanova will join the Patriot League in 2026 after winning the CAA", handling: glory }
  the_place: "Philadelphia Catholic tradition — a program built at Villanova University with a strong Wildcat identity and championship culture."
  brand_of_football: "The reinstituted dynasty — a program that was built from nothing in 1985 into an FCS power through sustained excellence and NFL development."
  cultural_footprint: "Villanova proved an FCS program can reach a championship level and maintain it. The NFL pipeline (36 draft picks) is rare in FCS football and makes Villanova special."
  the_ongoing_story: >
    LIVE ARC — 2026-06-13: Villanova finished 12-3 (7-1 CAA) in 2025, won the CAA championship in its final year in the conference, then lost to Illinois State 14-30 in the FCS playoff semifinal. The program announced it will join the Patriot League in 2026 as an associate member (other sports remain CAA). Coach Mark Ferrante is entering his tenure after sustained CAA success. The question in Philadelphia: can Villanova maintain its winning culture in a new conference, or does the move disrupt the pipeline that made the program special?
