  the_place: "Drake Stadium in Des Moines — the on-campus home where the Bulldogs have built championship seasons and sustained excellence for three consecutive years."
  brand_of_football: "Sustained non-scholarship excellence — the program that proves a small Iowa university can build a perennial power through recruiting and institutional commitment inside the FCS frame."
  cultural_footprint: "Drake is proof that FCS non-scholarship football can produce dynasty-level sustained excellence. Three straight titles in the modern era make Drake the defining program of the 2020s Pioneer League."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Drake won the 2025 PFL championship (8–4, 7–1 conference) under Joe Woodley, capping a dominant run.
    But in February 2026, Woodley resigned to join Rutgers as a coordinator — a shock mid-offseason departure that left the defending champions
    without their architect. Matt Walker, a D-III national champion from Central Connecticut, arrived as the new coach in February 2026 with a mandate
    to continue the three-year dynasty. The question in Des Moines: can Walker sustain the title streak, or will Woodley's departure prove that
    coaching greatness, not institutional depth, drove the run?
