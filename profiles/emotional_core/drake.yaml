  the_origin: "A private university in Des Moines, Iowa founded in 1881 that built football into a regional power. The 1922 team went undefeated and beaten by 48–6 Mississippi State, establishing an early claim. The program joined the Pioneer League in 1993."
  golden_ages:
    - { era: "1922 (undefeated season)", what: "Drake goes undefeated in 1922, establishing the program's historic claim" }
