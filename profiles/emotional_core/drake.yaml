# Emotional Core — Drake  (drake)
# HAIKU-AUTHORED (FCS expansion) 2026-06-13 — web-verified
# Authoring sidecar for docs/design-system/63-per-program-emotional-identity.md

status: live            # todo | drafted | authored | reviewed | live
slug: drake
team_id: null
program_name: Drake
program_tier: 5

emotional_core:
  primary: restoration      # the defending champions rebuilding after a shock coaching departure
  secondary: disbelief      # that the dynasty just lost its architect mid-stride
  one_line: "Drake is the Des Moines powerhouse that won three straight Pioneer League titles and just crowned its champion — before its head coach resigned after one season for a Big Ten job, leaving the dynasty to rebuild."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "The nation's most successful FCS non-scholarship program with eight conference titles and three consecutive crowns (2023–2025) vs a head coach (Joe Woodley) who arrives, wins a championship, then leaves for Rutgers after one year."

the_wound:
  name: "The Woodley departure shock (February 2026)"
  detail: "Drake won the 2025 PFL championship under Joe Woodley, then Woodley resigned in February 2026 to take the Rutgers coordinator role — a gut-punch that left the defending champions without their architect, mid-offseason, three weeks before spring practice. The wound is not slow decline; it's sudden amputation of stability."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Prove that Matt Walker (the new coach, a D-III national champion) can sustain the three-year dynasty. A fourth consecutive title and an FCS playoff bid would quiet the doubts that Woodley was the dynasty and the program is just the vehicle."
  drought: { since: 2024, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Fans here believe drake's chip is the outsider's chip — a small Iowa school that built a dynasty the Big Ten ignored. The Woodley-to-Rutgers departure stings precisely because it suggests even Drake's peak isn't enough to keep a coach; the Big Ten calls, and FCS greatness becomes yesterday's news."

the_delusion:
  tone: self-aware
  text: "The fanbase believes Matt Walker, a D-III national champion, can navigate the dynasty. But deep down, they know that coaching departures always hurt, and the three-year-run coincidence (title in year one, departure in offseason) feeds the fear that success here is always contingent on finding the next coach before the last one leaves."

the_grudge_texture:
  rival: northern-iowa
  texture: championship   # historic rivalry, though both programs peaked in different eras

the_coach_relationship: hot-seat-churn   # Woodley arrived, won, left; now Walker inherits the instability
the_internal_fracture: continuity-vs-departure — the faction trusting Walker's D-III pedigree vs the faction haunted by Woodley's exit
register: des-moines-bulldogs-1922-undefeated-three-straight-titles-dynasty
never_use:   # LAW — do not violate in any authored line
  - "1922 undefeated proves a century of greatness — one historic season doesn't justify a claim"
  - "Has secured Woodley — he left for Rutgers in Feb 2026, mid-dynasty"
  - "Is the only FCS dynasty — San Diego and Dayton have stronger title counts over longer periods"
  - "Will automatically repeat titles under Matt Walker — coaching departures always create risk"
  - "Has permanent institutional stability — three straight titles is fragile, not permanent"

