the_wound:
  name: "Eighty-seven years without Division I football in Chicago (1939–2026)"
  detail: "The last Division I football program in Chicago was the University of Chicago Maroons in 1939. Chicago has been without major college football for nearly nine decades. Chicago State's 2026 inauguration is an attempt to reclaim that lost tradition, but the wound runs deep — a major American city without a college football team for a century."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Play Division I football in Chicago again. Build a championship culture from the ground up. By 2027, move into the Northeast Conference and become the model for how to launch a new program in a major city."
  drought: null

the_chip:
  villain: big_brother
  text: "Fans here believe the chip is geographic: the Big Ten schools (Northwestern, Illinois, Notre Dame) dominate the Midwest, and Chicago has been left without representation in major college football. Chicago State isn't bitter; it's here to reclaim what the city lost."

the_delusion:
  tone: load-bearing
  text: "That a brand-new program can compete for FCS playoffs within 5 years and become the model for major-city football revival. The fanbase believes in the audacity of starting from zero; no baggage, no history, no excuses — just excellence from day one."

