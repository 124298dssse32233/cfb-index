emotional_core:
  primary: honor        # the guardian of the winged helmet legacy
  secondary: standard   # living up to 28 national championships
  one_line: "Princeton football played in the first college football game (1869 vs Rutgers), won 28 national titles, invented the winged helmet, and remains one of the most accomplished programs in American football history — even if the Ivy League won't let it prove it anymore."

self_image:
  archetype: blue-blood-living-up
  standard_gap_frame: "28 national championships, 868 wins, the first college game, and a distinctive tradition vs the Ivy League's democratic ceiling that prevents any program from recapturing national prestige."

the_wound:
  name: "The birth of the sport that now outgrows it — Princeton invented college football but can't compete for national titles"
  detail: "Princeton played in the first college football game (1869 vs Rutgers). The program won 28 national championships, mostly before 1900. But the Ivy League's no-scholarship commitment and the self-imposed playoff ban mean Princeton will never win a postseason championship again. The sport moved on; Princeton stayed behind."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Dominate the Ivy League and remind people that the Tigers invented this sport. The 2018 undefeated season (10–0, Ivy title) was proof the dynasty hasn't died; it's just been confined to the Ivy."
  drought: { since: 1950, unit: national_title }

the_chip:
  villain: big_brother
  text: "Fans here believe princeton didn't just play the first college football game; the Tigers ARE the origin story. Yale got Walter Camp and Harvard got prestige, but Princeton has 28 national titles and the winged helmet. The rest of the sport moved on; Princeton stayed true to its principles."

the_delusion:
  tone: earnest
  text: "That an Ivy League team could win a national championship today if it wanted to — and Princeton half-believes it. The 2018 team went undefeated at 10–0 and proved the Tigers can still play winning football. The fanbase wonders: what could we be if we chose to compete for a national title?"

the_grudge_texture:
  rival: yale
  texture: championship    # historic Ivy rivalry, less heated than Harvard-Yale

the_coach_relationship: legends-shadow   # Bob Surace (since 2009) is steady but lives under the program's historical weight
the_internal_fracture: null
