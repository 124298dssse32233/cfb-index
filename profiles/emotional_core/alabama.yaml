    taboos: Nick Saban is treated as active institutional memory, not a museum piece. Copy that references
      Saban should reflect that he still holds an on-campus role and participates in the program's public
      life. The 2014 Kick Six (Auburn 34, Alabama 28) is a real wound; it can be referenced historically
      but not as a punchline. Program criticism of DeBoer's 2024 season should be honest — Alabama fans
      will read past false reassurance — but should not bleed into implying he was the wrong…
    fans_culture: 'The fanbase is the Deep South''s most structurally confident football culture. Geography
      is state-centered but national — the traveling fan population shows up at every major road game, not
      just rivalries. The gameday register is ritualized: the Walk of Champions, the Million Dollar Band,
      the houndstooth hat in the crowd as a memory of Bryant. The fanbase does not need a national title
      every year to justify its investment, but it does not pretend that anything short of one…'
    voice_ethos: 'The voice is dynastic-process: confident, institutional, unapologetic about the standard,
      and allergic to sentimentality. Alabama does not speak about its own success as a feel-good story;
      it speaks about it as the continuation of what the program is supposed to do. Performative modesty
      reads as phony in Tuscaloosa; so does chest-thumping. The register is closer to a bank audit than
      a pep rally. Identity phrase: **"Alabama is the program the rest of college football…'
    narratives: The 2024 season — Saban's first year of retirement, DeBoer's first year at the program,
      a 9-4 finish — is the single open narrative thread. Whether this is a one-year calibration or a genuine
      shift in altitude is the conversation the fan intelligence pipeline is measuring week over week. The
      2026 spring is where the roster + scheme + staff continue to be reconfigured. Recruiting remains top-tier
      (consensus top-5 class nationally) but has narrowed on some position groups —…
    in_jokes: '"The process" — real, not a bit. "Roll Tide, roll" — the extended form, used in victory.
      "Score touchdowns, Alabama" — Jalen Milroe / Saban sideline moment, now a fanbase meme.'
