emotional_core:
  primary: standard       # the measuring stick — anything less than a title is, in Tuscaloosa, a failed year
  secondary:              # standard carries it; the post-Saban anxiety is the wound
  one_line: "Alabama is the program the sport measures itself against — now measuring a new coach against six Saban titles, and a 38-3 Playoff humbling against the only standard it knows."

self_image:
  archetype: blue-blood-living-up
  standard_gap_frame: "Six national titles under Saban (2009-2020) vs a 38-3 Playoff-semifinal loss to Indiana and a coach who must prove the dynasty didn't leave with the man who built it."

the_wound:
  name: "The post-Saban altitude question"
  detail: "Saban retired after 2023; Kalen DeBoer went 9-4, then 11-4, reaching the 2025 Playoff but getting routed 38-3 by eventual champion Indiana in the semifinal — the first real evidence the program might be merely very good rather than supreme."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Restore the only acceptable altitude — the nineteenth title, and proof the standard survived the man who defined it."
  drought: { since: 2020, unit: national_title }

the_chip:
  villain: national_media
  text: "Every loss now feeds the same eulogy — that the dynasty died with Saban and DeBoer is presiding over the decline. The fanbase has heard the program written off before, and isn't ready to concede it."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes the standard is permanent — that the talent, the brand, and the process mean a title is always one season away, with or without the man who built the era. Anything short of a championship is still, in Tuscaloosa, a failed year."

the_grudge_texture:
  rival: auburn
  texture: blood-feud   # the Iron Bowl — and the 2013 Kick Six, a real wound

the_coach_relationship: legends-shadow   # every Alabama coach lives under Bryant and now Saban; DeBoer most of all
the_internal_fracture: patience vs panic — the faction that says the standard takes a beat to rebuild and DeBoer has earned year three vs the faction that says a 38-3 humbling and "this is Alabama" cannot coexist
register: dynastic-process — confident, institutional, unapologetic about the standard, allergic to sentimentality; closer to a bank audit than a pep rally
