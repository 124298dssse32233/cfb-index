  the_unique_thing: "Alabama is the program the rest of college football measures itself against — 18 claimed national titles, the Bryant dynasty and the Saban dynasty, 'the process' as a way of life. The standard isn't a goal here; it's the baseline."
  the_origin: "A Deep South power forged by Paul 'Bear' Bryant's six titles (1958-1982), then revived into the modern sport's defining dynasty by Nick Saban (2007-2023, six more)."
  golden_ages:
    - { era: "1958–1982 (Bryant)", what: "Six national titles and the houndstooth legend" }
    - { era: "2007–2023 (Saban)", what: "Six national titles (2009-2020) — the most dominant run in modern college football" }
  legends:
    - { name: Paul "Bear" Bryant, role: coach, why: "Six titles; the houndstooth icon the program is built around" }
    - { name: Nick Saban, role: coach, why: "Six more titles, the modern dynasty; still an on-campus institutional presence" }
    - { name: Derrick Henry, role: player, why: "2015 Heisman, the archetypal Alabama back" }
  canonical_moments:
    - { name: "Saban's first title", year: 2009, what: "The start of the Process dynasty", handling: glory }
    - { name: "The Kick Six", year: 2013, what: "Auburn returns a missed field goal to win the Iron Bowl — the program's signature heartbreak", handling: wound }
  the_place: "Bryant-Denny Stadium (cap 100,077) — the Walk of Champions, the Million Dollar Band, the houndstooth in the crowd as a memory of Bryant."
  brand_of_football: "Dynastic-process — the standard operationalized; the program speaks about winning the way a manufacturing concern speaks about operating rigor."
  cultural_footprint: "The Deep South's most structurally confident football culture; a fanbase that doesn't need a title every year to justify itself, but refuses to pretend anything less than one is success."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Nick Saban retired after 2023; Kalen DeBoer is 20-8 across two seasons
    (9-4, then 11-4). In 2025 Alabama reached the Playoff but was routed 38-3 by eventual champion Indiana in
    the semifinal. Entering year three, DeBoer faces an explicit mandate — national analysts say a Playoff miss
    likely ends his tenure — and the program is openly debating whether the dynasty survived the man who built it.
