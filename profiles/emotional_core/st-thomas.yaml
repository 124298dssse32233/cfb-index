# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "St. Thomas is the only NCAA program to jump directly from Division III to Division I FCS, skipping Division II entirely — a historic transition by a Minnesota private school that is now proving the D-III foundation works at FCS."
  the_origin: "A Jesuit Catholic university in Saint Paul, Minnesota founded in 1885 that played football in NCAA Division III through 2018. In an unprecedented move, the school reclassified directly to FCS in 2021, joining the Pioneer League and skipping the traditional D-III → D-II → D-I pathway."
  golden_ages:
    - { era: "2018 (D-III era)", what: "St. Thomas competed as a D-III power before the historic reclassification" }
    - { era: "2023–2025 (first full FCS seasons)", what: "The program's emergence as a full FCS competitor after two transition years" }
  legends:
    - { name: Glenn Caruso, role: coach, why: "17-year tenure straddling the D-III and FCS eras; unprecedented continuity" }
  canonical_moments:
    - { name: "2021 FCS reclassification", year: 2021, what: "St. Thomas becomes the only program to jump D-III directly to D-I FCS, skipping Division II", handling: glory }
    - { name: "2025 first full FCS season", year: 2025, what: "St. Thomas completes its first fully-eligible FCS season at 7–5 after two years of transition", handling: glory }
  the_place: "O'Shaughnessy Stadium in Saint Paul, Minnesota — the historic on-campus home where the Tommies made the historic D-III to FCS jump."
  brand_of_football: "Jesuit academic excellence married to FCS ambition — the program that proved a D-III school can jump directly to FCS and compete on the same field as programs with 30-year FCS histories."
  cultural_footprint: "St. Thomas is the proof that D-III programs can ascend to FCS and compete. The historic reclassification made the program a national story, and now 2025 is the proof that the story has legs."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: St. Thomas went 7–5 (5–3 PFL) in 2025 — its first fully-eligible FCS season after two transition
    years (2023–2024). Andy Peters led the offense; the defense improved late in the year. Glenn Caruso, in his 17th year and his first full
    cycle of a D-III→FCS program, showed remarkable continuity. The 7–5 finish is respectable and proves the historic jump is working. The
    question in Saint Paul: can St. Thomas build on this baseline and begin competing for Pioneer League titles, or will the program settle
    into steady-state respectability?
  research_checklist:
    - the program's 3–7 most iconic games/plays (2025 wins, transition-era milestones)
    - the legendary coaches + players (Glenn Caruso, 2025 team leaders)
    - the unique tradition / identity / the one amazing thing (D-III to FCS historic jump, Jesuit prestige, Caruso's continuity)
    - the origin + the golden-age dynasty eras (D-III era through 2018, 2021 reclassification, 2025 full eligibility)
    - the current-era storyline (Caruso's post-transition rebuild and the program's FCS establishment)
