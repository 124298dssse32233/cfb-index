slug: st-thomas
team_id: null
program_name: St. Thomas
program_tier: 5

emotional_core:
  primary: spectacle      # the historic transition from D-III to full FCS football
  secondary: house-money  # proving the D-III foundation can win at the FCS tier
  one_line: "St. Thomas is the Minnesota private school that jumped straight from NCAA Division III to FCS in 2021 — the only program to skip Division II entirely — and is now competing for respect after its first full FCS season."

self_image:
  archetype: orphaned
  standard_gap_frame: "A 17-year history in FCS that started from D-III and no real FCS rivals — the program that is building identity from a blank slate, with none of the blood-feud heritage that defines Pioneer programs."

the_wound:
  name: "No natural rivalry or deep conference identity yet"
  detail: "St. Thomas jumped D-III → D-I FCS, skipping D-II entirely. That historic leap means no traditional blood rivals, no conference rivals from the past, no 20-year playoff history. The wound is novelty — the program lacks the rooted identity that makes FCS programs feel like home."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Prove that a D-III program can sustain FCS competition. A 7–5 season and a bowl bid would prove the historic jump was wise, that St. Thomas belongs at FCS and can compete without the 50-year traditions other programs have."
  drought: { since: 2021, unit: relevance }

the_chip:
  villain: none
  text: "Fans here believe st. Thomas has no chip. The program is still writing its story. The question is not disrespect; it's whether the program can build identity fast enough to compete."

the_delusion:
  tone: self-aware
  text: "The fanbase believes the D-III foundation — a winning culture, academic rigor, institutional resources — is enough to make FCS work. They know they're young in the conference, but they believe the program can grow roots faster than traditional rivalries usually form."

the_grudge_texture:
  rival: none
  texture: blood-feud   # no traditional rival yet; rivalries forming in real time

the_coach_relationship: forever-ours   # Glenn Caruso in his 17th year; unprecedented continuity
the_internal_fracture: D-III-nostalgia vs FCS-ambition — the faction that misses the D-III era vs the faction excited about FCS opportunity
register: st-thomas-tommies-d-three-to-fcs-historic-jump-minneapolis-jesuit
