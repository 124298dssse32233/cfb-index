emotional_core:
  primary: house-money     # the program that wasn't supposed to win in the SEC just went 10-3 and produced a Heisman finalist
  secondary: disbelief     # Nashville still pinching itself that this was real and not a one-week miracle
  one_line: "Vanderbilt is the program that turned a transfer quarterback nobody else wanted into a Heisman finalist and the SEC's best story — a 10-win season the school's own history said was impossible."

self_image:
  archetype: riser-proving
  standard_gap_frame: "Four SEC titles that all predate 1924 and decades as the league's hardest competitive slot vs a 2025 that finished 10-3, ranked No. 14, with a Heisman runner-up — the gap between what the record book said and what just happened."

the_wound:
  name: "The thirty-nine-year wait between bowls"
  detail: "Before James Franklin's 2011-2013 window, Vanderbilt had not been to a bowl since the Reagan administration — the long stretch of seasons that taught the fanbase to brace for the floor, and made 2025's 10 wins feel less like a result than a vindication."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Win the SEC outright — not survive it, not shock it once, but stand at the top of the hardest league in the sport and make the breakthrough a habit."
  drought: { since: 1923, unit: conference_title }

the_chip:
  villain: national_media
  text: "Every preseason poll buries Vanderbilt by reflex, and the fanbase has heard 'the scheme called it a scheduling accident' so often it became the program's dry punchline. They say 2025 wasn't luck — it was the year the math finally listened."

the_delusion:
  tone: load-bearing
  text: "Commodore fans believe the right roster and the right scheme make Vanderbilt a permanent SEC contender — that 2025 was the proof of concept, not the ceiling, and that the program can keep doing it without the quarterback who did it."

the_grudge_texture:
  rival: tennessee
  texture: blood-feud   # the in-state Tennessee rivalry — the bell, the bad blood, the only game some fans circle

the_coach_relationship: total-trust   # Clark Lea, the Vanderbilt alum coaching his alma mater, delivered the season of a lifetime
the_internal_fracture: keep-it-going vs brace-for-regression — the faction that believes Lea built something durable vs the faction that watched Pavia leave and fears 2025 was the lightning, not the bottle
register: defiant-academic   # DRAFT (from voice_register) — confirm
never_use:   # DRAFT from profile — LAW, do not violate in any authored line
  - David vs. Goliath
  - cute underdog
  - punching above their weight (it isn't — the school's scale makes the outputs honest)
  - little engine that could
