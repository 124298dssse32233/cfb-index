# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Vanderbilt is the oldest continuously operating football program in the Deep South — founded 1886 — that spent the modern era as the SEC's hardest competitive slot, then in 2025 went 10-3 and produced a Heisman runner-up, the season its own history said couldn't happen."
  the_origin: "A private research university in Nashville that began playing football in 1886 and won four early Southern Intercollegiate titles under Dan McGugin (the McGugin era, 1904-1934) — the South's first football power, long before the SEC swallowed everyone bigger."
  golden_ages:
    - { era: "1904–1934 (Dan McGugin)", what: "The South's original power; four conference championships, all before 1924" }
    - { era: "2011–2013 (James Franklin)", what: "Three straight bowls — the first sustained modern winning, ending a 39-year bowl drought" }
    - { era: "2024–2025 (Clark Lea)", what: "The Alabama upset, then a 10-3, No. 14 season with a Heisman finalist — the program's modern peak" }
  legends:
    - { name: Dan McGugin, role: coach, why: "Built the South's first football power and coached Vanderbilt for 30 years" }
    - { name: Clark Lea, role: coach, why: "A Vanderbilt alum who took his alma mater to its greatest modern season — 10 wins and a national audience" }
    - { name: Diego Pavia, role: player, why: "The transfer quarterback who became a 2025 Heisman runner-up and the engine of the program's best year in a century" }
  canonical_moments:
    - { name: "The Alabama upset", year: 2024, what: "Vanderbilt beats No. 1 Alabama 40-35 in Nashville, the program's signature modern win and the spark of the rise", handling: glory }
    - { name: "The 10-win season", year: 2025, what: "A program-record 10-3 finish, a No. 14 final ranking, and Diego Pavia as Heisman runner-up", handling: glory }
    - { name: "First bowl in 39 years", year: 2008, what: "Vanderbilt ends a generation-long bowl drought with a Music City Bowl win", handling: glory }
  the_place: "FirstBank Stadium (formerly Vanderbilt Stadium) — the smallest venue in the SEC, an intimate on-campus field in the middle of Nashville whose quieter register is not apathy."
  brand_of_football: "Anchor Down — clear-eyed, scheme-driven, and built around finding the quarterback nobody else valued; a program that treats real proof of life in the SEC as the whole point."
  cultural_footprint: "The standing argument that the SEC's toughest structural slot is not a permanent sentence — that a school built on research and selectivity can field the league's best story when the roster and scheme align."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Clark Lea returns for 2026 after a program-record 10-3 (6-2 SEC) season,
    a No. 14 final ranking, and Diego Pavia's Heisman-runner-up campaign (3,192 pass yards, 826 rush, 36 total TDs).
    Vanderbilt lost the ReliaQuest Bowl 34-27 to No. 23 Iowa, and Pavia is gone — out of eligibility, undrafted,
    now in an NFL camp. The 2026 question is the only one that matters in Nashville: was 2025 the lightning, or
    the new floor? Lea enters spring without a named successor at quarterback and a fanbase desperate to believe
    the breakthrough was built to last.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
