# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Georgia State plays football inside a baseball cathedral — Center Parc Stadium is the converted Turner Field, where the Atlanta Braves won the 1995 World Series, reborn as a college football venue in the heart of downtown Atlanta."
  the_origin: "One of the youngest FBS programs in the country: Georgia State played its first game in 2010 under Bill Curry, climbed from FCS to the Sun Belt in 2013, and went looking for an identity from a standing start."
  golden_ages:
    - { era: "2017–2021 (Shawn Elliott)", what: "From doormat to bowl regular — the 2017 Cure Bowl win and a 2019 upset of Tennessee in Knoxville" }
  legends:
    - { name: Shawn Elliott, role: coach, why: "Took a young program to four bowls and its first real respect" }
    - { name: Penny Hart, role: player, why: "The undersized receiver who became the program's first true star and an NFL contributor" }
  canonical_moments:
    - { name: "Upset at Tennessee", year: 2019, what: "Georgia State walks into Neyland and beats the SEC's Vols 38-30 in the season opener", handling: glory }
    - { name: "First bowl win, the Cure Bowl", year: 2017, what: "27-17 over Western Kentucky — a young program's first piece of hardware", handling: glory }
    - { name: "The 1-11 collapse", year: 2025, what: "McGee's second year bottoms out, the lone win over an FCS team", handling: wound }
  the_place: "Center Parc Stadium — the former Turner Field / 1996 Olympic Stadium, retrofitted for football, a literal monument to Atlanta sports history that the Panthers now call home."
  brand_of_football: "Scrappy, transfer-heavy, urban-recruiting modern football — a young program mining the deepest talent metro in the South for players the blue bloods passed on."
  cultural_footprint: "The college football team of downtown Atlanta — a commuter-and-urban student body's bid to plant a flag in a pro-sports city that already had its loyalties."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Georgia State cratered to 1-11 (0-8 Sun Belt) in Dell McGee's second season,
    losing its final nine games. McGee enters year three overhauling his staff — reported moves on at defensive
    coordinator and special teams — and trying to rebuild a foundation that the 1-11 floor exposed as fragile.
    The question downtown: can the youngest program in the state climb back to the bowl level Elliott reached?
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
