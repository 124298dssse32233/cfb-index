emotional_core:
  primary: deprival       # the youngest program in a pro city that has never had to care about it
  secondary: restoration  # year three of the McGee build after a 1-11 floor caved in
  one_line: "Georgia State plays its home games inside the stadium where the Braves won pennants, a 2010 startup still trying to convince its own enormous city that a downtown-Atlanta college team is worth a Saturday."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A football program younger than its players, building from zero in a metro that already has the Falcons, the Bulldogs and the Yellow Jackets vs the simple goal of mattering at all."

the_wound:
  name: "The 1-11 floor"
  detail: "After Shawn Elliott got the Panthers to four bowls, Dell McGee's second year collapsed to 1-11 (0-8), the lone win over an FCS team, nine of eleven losses by double digits — a reminder of how thin the foundation still is when a young program loses its footing."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "A Sun Belt title and a downtown crowd loud enough that Atlanta finally claims the Panthers as its own team, not its fourth option."
  drought: { since: 2010, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Everyone in the metro grew up a Georgia or Georgia Tech fan; Panther fans are the ones who chose the new thing, and they're tired of being told a 2010 startup downtown can't be anybody's real team."

the_delusion:
  tone: earnest
  text: "Panther fans believe the largest university in Georgia, dropped in the middle of the Southeast's biggest recruiting city, is a sleeping giant — that the talent is walking past Center Parc every day and one right staff turns proximity into a program."

the_grudge_texture:
  rival: georgia-southern
  texture: little-brother   # the in-state Eagles have the rings and the history; the Modern Day Hate series is GS's to lord over

the_coach_relationship: hot-seat-churn   # Curry to Elliott to McGee, and McGee already remaking his staff after 1-11
the_internal_fracture: build-the-base vs win-now-or-bust — fans who want patience for a young program vs fans who fear a 1-11 floor means the whole project is stalling
register: atlanta-panthers-fbs-newcomer-2013
