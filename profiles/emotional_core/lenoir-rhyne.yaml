story_canon:
  the_unique_thing: "The bridesmaid championship: Lenoir-Rhyne won an NAIA national championship in 1960 (defeating Humboldt State 15–14 in the Holiday Bowl) and made three NAIA championship games in four years (1959–1962), then transitioned to Division II and reached the 2013 D2 National Championship game before losing. Two title-game heartbreaks separated by 50 years of almost-victories."
  the_origin: "Lenoir-Rhyne was founded in 1907 in Hickory, North Carolina. Football became a regional power in the Piedmont. Under legendary coach Clarence Stasavich in the late 1950s and early 1960s, the Bears reached a national level."
  golden_ages:
    - { era: "1959–1962 (Clarence Stasavich)", what: "Four consecutive NAIA national championship-game appearances, winning the 1960 title and losing the others" }
    - { era: "2013 (D2 summit)", what: "The 2013 Division II National Championship game, a final-year run that narrowly missed another title" }
  legends:
    - { name: Clarence Stasavich, role: coach, why: "Took Lenoir-Rhyne to four consecutive NAIA title games and won the 1960 national championship; the architect of the Bears' peak" }
  canonical_moments:
    - { name: "1960 NAIA National Championship", year: 1960, what: "Lenoir-Rhyne defeats Humboldt State 15–14 in the Holiday Bowl/NAIA championship game to win the national title", handling: glory }
    - { name: "2013 D2 National Championship game", year: 2013, what: "The Bears reach the Division II National Championship game (lost); the only D2 title-game appearance in program history", handling: wound }
  the_place: "Lenoir-Rhyne Stadium in Hickory, North Carolina — home of the Bears and a Piedmont landmark of almost-glory."
  brand_of_football: "Stasavich-era defensive, grinding football from the late 1950s and early 1960s; later evolved into the modern D2 game but retained the tough-nose identity."
  cultural_footprint: "Evidence that a small Piedmont school could reach two different national championship games 50 years apart — and come away empty both times."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Lenoir-Rhyne competes in the South Atlantic Conference as a Division II program.
    The Bears have not returned to the D2 playoff summit since the 2013 National Championship game loss. The program
    remains competitive in the SAC but is searching for a path back to national contention. The question in Hickory:
    will the Bears finally close the deal, or are they forever a championship-game program?
  research_checklist:   # what to look up (web) when we author this team together
    - Clarence Stasavich's coaching record and the 1959–1962 NAIA run
    - Notable players from the 1960 championship team
    - The 2013 D2 National Championship game (who they lost to, what happened)
    - Current trajectory under the current head coach
