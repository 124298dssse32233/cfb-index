emotional_core:
  primary: disbelief       # picked 7th, the Broncos won the whole MAC — a season nobody, including the fanbase, saw coming
  secondary: redemption    # erasing nine years of post-Fleck near-misses in one December
  one_line: "Western Michigan was picked seventh in the MAC and won the whole thing — a 23-13 title-game win over Miami, then a 41-6 bowl blowout, the Broncos' first conference title since the P.J. Fleck miracle of 2016."

self_image:
  archetype: riser-proving
  standard_gap_frame: "P.J. Fleck's 13-1, Cotton Bowl, Top-15 team of 2016 vs nearly a decade of solid-but-titleless MAC seasons — the gap a surprise 2025 championship finally closed."

the_wound:
  name: "The nine years chasing 2016"
  detail: "P.J. Fleck went 13-1 and reached the Cotton Bowl in 2016, then left for Minnesota and took 'Row the Boat' with him — and Western Michigan spent the next nine seasons as a good MAC program that never quite got back to the top, the breakthrough always one game short."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Stay at the top of the MAC and force the national spotlight back to Kalamazoo — to make 2025 the start of something, not another single bright year before the drop-off."
  drought: { since: 2016, unit: conference_title }

the_chip:
  villain: national_media
  text: "Bronco fans are sick of being a punchline about a coach who left and a rowing slogan he took with him. They say a program picked seventh and crowned champion proved Kalamazoo can win on its own terms — and that nobody's laughing now."

the_delusion:
  tone: earnest
  text: "Bronco fans believe Kalamazoo is a real MAC heavyweight, not a one-coach wonder — that the program can produce NFL talent and conference titles whenever the pieces line up, and that 2025 was the proof the league still runs through Western Michigan."

the_grudge_texture:
  rival: central-michigan
  texture: little-brother   # the in-state MAC scrap for the Michigan MAC Trophy — Mid-American bragging rights

the_coach_relationship: savior   # Lance Taylor delivered the first title since Fleck; the fanbase is sold on him
the_internal_fracture: believers vs the burned — the faction that thinks Lance Taylor built a contender vs the faction that's seen one magic year before and braces for the regression that followed 2016
