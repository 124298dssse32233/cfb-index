  the_unique_thing: "Western Michigan is where 'Row the Boat' was born — P.J. Fleck's 2016 Broncos went 13-1, won the MAC, and reached the Cotton Bowl, the best season any MAC program has had this century and the launchpad for one of the sport's most famous coaching brands."
  the_origin: "A regional university in Kalamazoo, Michigan, playing in the working-class Mid-American Conference — the proving ground where ambitious coaches and overlooked recruits make their names."
  golden_ages:
    - { era: "2014–2016 (P.J. Fleck)", what: "A rapid rebuild capped by a 13-1, MAC-champion, Cotton Bowl, Top-15 season in 2016 — and the birth of 'Row the Boat'" }
    - { era: "2025 (Lance Taylor)", what: "Picked seventh, the Broncos win the MAC title and blow out Kennesaw State in the Myrtle Beach Bowl to finish 10-4" }
  legends:
    - { name: P.J. Fleck, role: coach, why: "Built the 2016 Cotton Bowl team and the 'Row the Boat' brand that put Kalamazoo on the national map" }
    - { name: Corey Davis, role: player, why: "The record-setting receiver of the 2016 team who became a first-round NFL draft pick" }
    - { name: Lance Taylor, role: coach, why: "Took a team picked seventh to the program's first MAC title since 2016" }
  canonical_moments:
