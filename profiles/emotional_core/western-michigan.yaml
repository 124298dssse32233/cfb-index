  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Lance Taylor returns for 2026 after the season of a generation — picked
    seventh in the MAC, Western Michigan went 10-4 (7-1), beat Miami (OH) 23-13 for the conference championship,
    and routed Kennesaw State 41-6 in the Myrtle Beach Bowl, the first WMU team to win a league title and a bowl
