emotional_core:
  primary: restoration      # the 62-year revival that is still finding its footing
  secondary: spectacle      # the historic resurrection of Florida's oldest college football
  one_line: "Stetson is the Florida pioneer — the oldest continuous college football in the state (first games 1894) — that dropped the sport in 1956 and revived it in 2013, now rebuilding to find the program it once was."

self_image:
  archetype: sleeping-giant
  standard_gap_frame: "A 1927 undefeated team that beat Auburn and Miami, and a 1952 Tangerine Bowl champion vs a program 62 years dormant that is now seven years back into FCS, still learning how to compete at this level."

the_wound:
  name: "The 56-year dormancy (1956–2013)"
  detail: "Stetson dropped football in 1956 and didn't return until 2013 — a 57-year gap that meant the program lost its traditions, its rivals, its rooted fan identity. When the program revived, it was building from scratch at FCS, not from a sleeping position."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Climb back to respectability — a 6–6 or 7–5 season would announce that the 2013 revival is taking root, that Stetson can be a baseline FCS program. The 1927 undefeated and the 1952 Tangerine Bowl are too far back to chase; the goal is simply to stabilize."
  drought: { since: 1952, unit: bowl }

the_chip:
  villain: none
  text: "Fans here believe stetson has no chip. The program is still establishing itself. The chip would come much later, after winning seasons accumulate and a rivalry reignites."

the_delusion:
  tone: self-aware
  text: "The fanbase believes the 1927 and 1952 legacy means something, that Stetson is a sleeping giant waking up. But they also know that a program 10 years removed from revival can't claim that narrative yet. The hope is patient."

the_grudge_texture:
  rival: none
  texture: blood-feud   # no traditional rival yet; program too young to have rooted rivalries in FCS

the_coach_relationship: total-trust   # Michael Jasper in year one; program gives new coaches clean slates
the_internal_fracture: tradition-vs-present — the faction embracing the 1927–1952 legacy vs the faction focused on stabilizing the 2013-onward era
