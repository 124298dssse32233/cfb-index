  detail: "John Gagliardi retired in 2012 after 59 years (1953-2012) and 489 wins—the most in college football history at that time. Saint John's hasn't won a national championship since 2003. The wound isn't failure; it's the distance from the peak. Every season since 2012 is measured against the Gagliardi era, and nothing matches it."
