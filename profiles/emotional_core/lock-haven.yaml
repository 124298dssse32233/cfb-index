status: live             # todo | drafted | authored | reviewed | live
slug: lock-haven
team_id: 229            # placeholder; verify against CFBD ID mapping
program_name: Commonwealth University–Lock Haven
program_tier: 6         # Division II PSAC

emotional_core:
  primary: redemption         # clawing out of a 44-year drought, breaking a decades-long curse
  secondary: standard         # emerging from dormancy after 44 years of losing
  one_line: "Lock Haven is the PSAC program reborn — a 6-5 first winning season in 44 years under Joe Battaglia proves that even the longest droughts can break."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "44 years of losing seasons (1981–2025) vs a 6-5 winning record and the first three-game winning streak since 1981 — the arc of awakening."

the_wound:
  name: "44 years of losing"
  detail: "From 1981 to 2025, Lock Haven football did not have a winning season — the longest active drought in PSAC history. The program had become synonymous with futility."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Sustain winning — prove the 2025 turnaround was the start of a new era, not a fluke. Build Lock Haven into a consistent PSAC East contender."
  drought: { since: 1980, unit: relevance }

the_chip:
  villain: none
  text: "Lock Haven fans watched 44 years of heartbreak and losing seasons. Now, Joe Battaglia's 2025 team proved the program is alive. Every win in 2026 and beyond is a middle finger to the decades of dismissal."

the_delusion:
  tone: earnest
  text: "The fanbase dares to believe this is different — that Joe Battaglia isn't a fluke, that the 6-5 season unlocks something deeper, that Lock Haven's winning years are about to become the norm instead of the exception."

the_grudge_texture:
  rival: gannon
  texture: border-war       # Lock Haven and Gannon are both rebuilding PSAC West/East programs learning to win again

the_coach_relationship: savior        # Joe Battaglia is the coach who broke the curse
the_internal_fracture: null           # program unified around breaking the drought
register: lock-haven-bald-eagle-believer
never_use:
  - "Hopeless program — 6-5 record and a winning season prove it's not"
  - "Perennial loser — 44-year drought ended in 2025"
  - "Small-time PSAC — a drought-breaking season changes the narrative"

