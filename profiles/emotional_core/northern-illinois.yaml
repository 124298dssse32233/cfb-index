story_canon:
  the_unique_thing: "Northern Illinois crashed the BCS. In 2012, a MAC team from DeKalb went 12-1, won the conference, and earned an Orange Bowl bid — forcing the sport's gatekept big-money bowl system to seat a mid-major at its table for the first time. NIU is the program that proved a Group-of-Five school could break the velvet rope."
  the_origin: "A northern-Illinois commuter school in DeKalb that built a quietly tough MAC program, then authored one of the great G5 breakthroughs of the BCS era and a pair of stunning upsets of college football royalty."
  golden_ages:
    - { era: "2010–2014", what: "Four straight bowl seasons, the 2012 MAC title and Orange Bowl, and Jordan Lynch's Heisman-finalist run" }
    - { era: "2018–2021", what: "Two more MAC championships (2018, 2021) keeping the Huskies a league power" }
  legends:
    - { name: Jordan Lynch, role: player, why: "The dual-threat QB who finished third in the 2013 Heisman voting — the highest a MAC player has ever placed" }
    - { name: Garrett Wolfe, role: player, why: "Record-setting 2000s running back who led the nation in rushing — early proof of NIU's skill-position pipeline" }
  canonical_moments:
    - { name: "The 2012 Orange Bowl bid", year: 2012, what: "A 12-1 MAC champion crashed the BCS — the mid-major breakthrough", handling: glory }
    - { name: "Upset of No. 5 Notre Dame", year: 2024, what: "NIU 16, Notre Dame 14 in South Bend as a 28-point underdog — the program's first win over a top-10 team", handling: glory }
    - { name: "Forward, Together Forward", year: 2008, what: "The post-tragedy motto adopted after the 2008 campus shooting — the institution's enduring identity", handling: wound }
  the_place: "Huskie Stadium in DeKalb — a modest MAC venue an hour west of Chicago, where 'Forward, Together Forward' is more than a football slogan."
  brand_of_football: "DeKalb-tough and giant-hungry — a physical, opportunistic program that has built its identity on out-preparing favorites and authoring the upset nobody saw coming."
  cultural_footprint: "The proof-of-concept for every Group-of-Five program with a BCS/Playoff dream — the school that actually broke through, and whose Notre Dame scalp became shorthand for 'anyone can be beaten on the right Saturday.'"
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Northern Illinois went 3-9 (2-6 MAC) in 2025, a slide from the 8-5 of 2024
    that was headlined by the September upset at No. 5 Notre Dame (16-14 as a 28-point underdog). It was the
    Huskies' final season in the MAC: NIU joins the Mountain West as a football-only member in 2026. Seventh-year
    head coach and alum Thomas Hammock carries the program into the new league trying to turn its one-off upsets
    into a sustainable winner.
