the_coach_relationship: forever-ours   # Thomas Hammock, alum, the steady hand into the new era
the_internal_fracture: chase-the-upset romanticism vs build-a-floor pragmatism — the room split between loving the giant-killer identity and wanting the consistency that keeps NIU out of 3-9 seasons
