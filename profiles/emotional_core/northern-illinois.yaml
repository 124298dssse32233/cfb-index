emotional_core:
  primary: grievance      # the MAC team that walks into ranked stadiums and wins, then gets called a fluke
  secondary: restoration  # a 3-9 stumble heading into a whole new conference
  core_variant: the-ceiling
  one_line: "Northern Illinois walked into South Bend in 2024 as a 28-point underdog and beat No. 5 Notre Dame 16-14 — the program's first win ever over a top-10 team — and is taking that swagger to the Mountain West after one last 3-9 season in the MAC."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A 2012 Orange Bowl team, a Jordan Lynch Heisman run, and the Notre Dame scalp vs a 3-9 final MAC season and a fresh start in a brand-new league."

the_wound:
  name: "Couldn't ride the Notre Dame high"
  detail: "The 2024 upset at Notre Dame should have launched a season; instead NIU went 8-5 that year and slid to 3-9 (2-6 MAC) in 2025, Thomas Hammock's seventh and final MAC season. The Huskies leave for the Mountain West having proven they can beat anybody once but not yet that they can sustain it."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Turn the one-off scalps into a real run — win the new league, get back to a New Year's-tier bowl, and make the upsets look like a pattern instead of a lottery ticket."
  drought: { since: 2021, unit: conference_title }

the_chip:
  villain: blue_bloods
  text: "DeKalb walked into one of the sport's cathedrals as a four-touchdown underdog and walked out with the win — and the national story was the giant who lost, not the Huskies who won. The fanbase keeps the receipts: the scoreboard said Northern Illinois."

the_delusion:
  tone: self-aware
  text: "Huskie fans believe any blue blood is one bad Saturday from a DeKalb ambush — that the 2024 Notre Dame win wasn't a miracle but the program being exactly who it thinks it is, on a stage big enough for everyone to finally see it."

