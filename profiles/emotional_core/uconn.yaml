      UConn has to climb but a distinct chapter the program is writing. UConn does not pretend to be a Power
      conference program; UConn does not apologize for being a basketball-first institution. The register
      is closer to a dual-track progress report than to a traditional football-program…'
    narratives: 'The Jim Mora rebuild is the single open narrative thread. Three specific questions: (1)
      can the program''s recruiting footprint (Connecticut + southern New England + the Boston metro-adjacent)
      produce enough FBS-caliber roster depth to sustain a 7+ win season annually; (2) does the independent
      scheduling model produce bowl eligibility in three of every four years; (3) does the program''s institutional
