status: live            # todo | drafted | authored | reviewed | live
slug: uconn
team_id: 209
program_name: UConn
program_tier: 5

emotional_core:
  primary: restoration    # a basketball blue-blood building real football legitimacy from independent scratch
  secondary: house-money  # no conference, no expectations — every good Saturday is found money
  core_variant: regime-reset
  one_line: "UConn is the basketball blue-blood deciding, in public, what its football chapter will be — and it just played the best season it has ever had, then watched the coach who built it walk out the door."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "Fifteen basketball national championships across the men's and women's programs vs a football team writing its first real chapter as a conference-less independent."

the_wound:
  name: "Best-ever season, then the coach walks"
  detail: "UConn went 9-3 in the 2025 regular season — the program's first nine-win seasons in back-to-back years, never losing in regulation — and immediately lost head coach Jim Mora to Colorado State, then the Fenway Bowl 41-16 to Army. The high-water mark and the gut-punch arrived in the same December."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Turn the independent experiment into something permanent — sustained winning, a bowl streak, a football identity to set beside the basketball banners."
  drought: { since: 2010, unit: relevance }

the_chip:
  villain: national_media
  text: "UConn fans are tired of the 'why is this a football school' shrug. They'll tell you the program just won nine games as a conference-less independent that has to schedule everyone, and that the basketball banners don't make the football any less real to the people in the stands."

the_delusion:
  tone: self-aware
  text: "The fanbase believes the independent path is a feature, not a sentence — that a basketball school can build football its own way, on its own schedule, and that the question of what UConn football is supposed to be is the program's to answer, not anyone else's."

the_grudge_texture:
  rival: massachusetts
  texture: border-war   # the New England neighbor; UConn's regional rivalry, a measuring stick more than a blood-feud

the_coach_relationship: hot-seat-churn   # Edsall→Pasqualoni→Diaco→Edsall II→Mora (left for Colorado State)→now Candle
the_internal_fracture: ambition vs acceptance — the faction that wants UConn chasing a conference invite and a bowl streak vs the faction content to be a proud basketball school that also plays good football
register: basketball-school-with-football   # DRAFT (from voice_register) — confirm
never_use:   # DRAFT from profile — LAW, do not violate in any authored line
  - basketball-school framing as diminishment (it is the identity, not the insult)
  - scrappy (not the voice — basketball program is a blue-blood)
  - Cinderella (not the frame)
  - just found itself as resignation framing
  - reductive framings of the 2020 opt-out (it was a pandemic decision, not a capitulation)
  - framing the program as "trying to be Notre Dame" (it isn't; it is independent for
    structural reasons)

# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "UConn is one of the great basketball schools in America — fifteen-plus national titles across the men's and women's programs — that plays FBS football as a conference-less independent, building a football identity from scratch in the shadow of its own banners."
  the_origin: "A Storrs, Connecticut land-grant university whose athletic soul is basketball, that climbed to FBS football in 2002 and has spent the years since figuring out what the football half is supposed to be."
  golden_ages:
    - { era: "2003–2010 (Randy Edsall)", what: "The rise from I-AA to FBS, a Big East title, and the 2010 Fiesta Bowl — the football program's high-water mark" }
    - { era: "2022–2025 (Jim Mora)", what: "Back-to-back nine-win seasons and bowl appearances as an independent — the program's modern peak" }
  legends:
    - { name: Randy Edsall, role: coach, why: "Built UConn football from I-AA to a BCS bowl; the program's defining coach" }
    - { name: Donald Brown, role: player, why: "The bruising back who led the nation in rushing in 2008 and powered the Big East era" }
  canonical_moments:
    - { name: "The Fiesta Bowl", year: 2010, what: "UConn wins the Big East and reaches a BCS bowl — the football program's ceiling", handling: glory }
    - { name: "Back-to-back nine-win independent seasons", year: 2025, what: "The Mora era's twin nine-win years, a first for the program", handling: glory }
    - { name: "Mora to Colorado State", year: 2025, what: "The coach who built the modern peak leaves right after it", handling: heartbreak }
  the_place: "Rentschler Field — 'The Rent' — in East Hartford, an off-campus venue 30 miles from Storrs that caps the atmosphere but anchors the football Saturdays."
  brand_of_football: "Independent grit — a basketball school's football team that schedules anyone, leans on a power run game, and proves itself one good Saturday at a time."
  cultural_footprint: "Proof that a basketball blue-blood can also care about football — a Connecticut fanbase that shows up at The Rent on its own terms, refusing to let the hardwood banners answer the football question for them."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: UConn went 9-3 in the 2025 regular season (a back-to-back nine-win
    first for the program, with all three losses in overtime), then lost head coach Jim Mora to Colorado State
    and the Fenway Bowl 41-16 to Army under an interim staff. The Huskies hired Toledo's Jason Candle as their
    new head coach. The question in Storrs: can the football program hold the ground it just gained, or does
    the coaching churn reset the chapter again.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
  sources:
    - https://en.wikipedia.org/wiki/2025_UConn_Huskies_football_team
    - https://www.espn.com/college-football/story/_/id/47104262/colorado-state-expected-hire-uconn-jim-mora-coach
    - https://www.si.com/college/uconn/football/uconn-huskies-announce-new-jason-candle

