the_chip:
  villain: national_media
  text: "Pella, Iowa is not in the national media orbit. Central's 1974 championship is footnoted in the Division III historical record, rarely cited when the sport discusses dynasties. The Dutch know they won it, and the disrespect of indifference burns deeper than any rival's slight."

the_delusion:
  tone: earnest
  text: "That another title run is one great season away. That Jeff McMartin's 163 wins and the program's steady conference success put Central just a coaching hire or two away from repeating 1974. The fanbase believes it because the record — six NCAA playoff appearances since 2015 — says it's possible."

