  standard_gap_frame: "One national title in the vault, 32 conference championships, and two decades of Jeff McMartin's 163 wins vs. the small-school struggle to stay relevant in an era of money-dominated college sports."

the_wound:
  name: "The 2025 title drought — half a century since the peak"
  detail: "No national championship since 1974. The Dutch have won conference titles regularly (most recent 2021), but the gap between a 1970s dynasty and a 2020s contender has grown wider with NCAA budget cuts hitting small privates hardest. The fanbase knows they've done it before, and wonders if the program can climb back."
