# ── STORY CANON (doc 64) ──
story_canon:
  the_unique_thing: "The Lincoln Trophy — Knox vs. Eureka since October 14, 1893 (132+ years). America's oldest continuous college football rivalry, older than Notre Dame–Navy (1894), older than Army–Navy (1890). Lincoln spoke at both schools in the 1850s and debated Stephen Douglas at Knox in 1858; the rivalry is as old as American politics."
  the_origin: "Knox College, Galesburg, Illinois — founded 1837. Lincoln spoke there; Stephen Douglas was Knox alumnus. The football rivalry with neighboring Eureka began in 1893 and never stopped."
  golden_ages:
    - { era: "1893–present", what: "132+ consecutive years of Lincoln Trophy football, never a break in the series" }
  legends:
    - { name: "Clay McClelland", role: player, why: "2025 QB, current keeper of the Prairie Fire legacy" }
    - { name: "Mario Byrd", role: player, why: "2025 WR, current Prairie Fire receiver corps" }
  canonical_moments:
    - { name: "Lincoln Trophy rivalry begins", year: 1893, what: "October 14, 1893: Knox plays Eureka; the oldest active college football rivalry in America begins", handling: glory }
    - { name: "Lincoln's legacy at Knox", year: 1858, what: "Abraham Lincoln debated Stephen Douglas at Knox College in 1858; both schools carry his name in the trophy", handling: glory }
  the_place: "Galesburg, Illinois — Knox College's home, where Lincoln spoke and the oldest rivalry was born."
  brand_of_football: "Regional, historic football — every season culminates in one game that has mattered for 132 years."
  cultural_footprint: "Keeper of America's oldest college football rivalry (1893–present); the Lincoln Trophy is the entire identity."
  the_ongoing_story: "LIVE as of 2025: Knox began 0–1 in 2025 with a 14–13 loss to rival Eureka in the Lincoln Trophy Game — a heartbreaking loss in the only game that truly matters. Head Coach Clay McClelland and WR Mario Byrd carry the banner into a season anchored by November's rivalry. The Lincoln Trophy has been played every year since 1893; that continuity is the only truth that matters in Galesburg."
  sources:
