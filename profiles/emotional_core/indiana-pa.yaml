  villain: big_brother
  text: "Fans here believe iUP builds excellent teams year after year and draws recruits to Indiana, PA, but Kutztown's 31-game winning streak and national-semifinal runs make every IUP achievement look like second place."

the_delusion:
  tone: earnest
  text: "The fanbase believes THIS year, IUP breaks through — that Tortorella has the pieces for a deep run and just needs one break, one playoff draw to prove IUP is as good as anyone."

