# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Desert Swarm — the early-1990s Dick Tomey defense that held opponents to barely 30 rushing yards a game and put Arizona on the cover of Sports Illustrated; the program's identity is that for a stretch, the desert fielded one of the most feared defenses in the sport."
  the_origin: "Football in Tucson since 1899, home of 'Bear Down' — the dying words of a 1926 player-captain that became the university's eternal motto — and lifted to its peak by Dick Tomey, the winningest coach in program history."
  golden_ages:
    - { era: "1992–1998 (Dick Tomey / Desert Swarm)", what: "The feared Desert Swarm defense and the 1998 12-1 season, the best in school history" }
    - { era: "2023 (Jedd Fisch)", what: "A 10-3 rebuild and an Alamo Bowl run that briefly made Arizona a desert force again" }
  legends:
    - { name: Dick Tomey, role: coach, why: "Winningest coach in program history; architect of Desert Swarm and the 1998 12-1 team" }
    - { name: Tedy Bruschi, role: player, why: "Two-time All-American DE, the face of Desert Swarm, future Patriots champion" }
    - { name: Rob Gronkowski, role: player, why: "The most famous Wildcat in the NFL era, a Tucson product turned all-time tight end" }
  canonical_moments:
    - { name: "The 1998 12-1 season", year: 1998, what: "A 23-20 Holiday Bowl win over Nebraska, a #4 final ranking — the high-water mark of Arizona football", handling: glory }
    - { name: "Desert Swarm on the SI cover", year: 1994, what: "The defense gracing Sports Illustrated — the moment the desert became nationally feared", handling: glory }
  the_place: "Arizona Stadium in Tucson — desert heat, the ZonaZoo student section, and 'Bear Down' painted across a program that has waited decades to roar again."
  brand_of_football: "Defense-first identity at its best — the Desert Swarm tradition of swarming, gang-tackling pressure; in the modern era, an Air-Raid-flavored offense layered on top in search of the old ferocity."
  cultural_footprint: "Tucson's flagship and the desert's defensive standard-bearer — 'Bear Down' as a campus creed, the Territorial Cup as the soul of the in-state rivalry, the NFL pipeline from Bruschi to Gronkowski."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: After Jedd Fisch's 10-3 rebuild and departure to Washington, Arizona
    cratered to 4-8 in Brent Brennan's first season and its debut Big 12 year, with fans openly calling for
    a change. Brennan answered in 2025 with a 9-4 turnaround (6-3 Big 12), reaching the Holiday Bowl (a 24-19
    loss to SMU) and earning a contract extension. Entering 2026, the question is whether the bounce-back is
    a foundation for a Big 12 contender or a one-year reprieve.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
