slug: arizona
team_id: 326
program_name: Arizona
program_tier: 3

emotional_core:
  primary: restoration    # a program clawing back to relevance — and proving the Big 12 move was no demotion
  secondary: grievance    # the desert team the sport keeps forgetting, even after a 9-4 bounce-back
  core_variant: perpetual-rebuild
  one_line: "Arizona is the desert program that owns one of the great defenses college football ever fielded — the 1990s Desert Swarm — and spent the seasons since trying to feel that feared again, most recently bouncing back from 4-8 to 9-4 in its second Big 12 year."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A 1998 12-1 Desert Swarm peak and a 2023 10-3 against long stretches of bowl-less irrelevance — a program with a real ceiling it has only rarely touched."

the_wound:
  name: "The 2024 crash that nearly cost a coach his job"
  detail: "After a 10-3 rise under Jedd Fisch, Arizona watched him leave for Washington, then collapsed to 4-8 in Brent Brennan's first season and its debut Big 12 year — the fanbase openly calling for a coaching change before the 2025 rebound made the question moot."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the Big 12, make the desert defense feared again the way Desert Swarm was, and turn a one-year bounce-back into a program that contends instead of disappears."
  drought: { since: 1998, unit: conference_title }

the_chip:
  villain: national_media
  text: "Wildcat fans say the sport filed Arizona under 'Pac-12 survivor' the day the old league died and never updated the file — they say a 9-4 Big 12 season barely moved the needle, and the desert is tired of being treated as filler."

the_delusion:
  tone: self-aware
  text: "The fanbase believes Tucson can be a real football town again — that the Desert Swarm magic is dormant, not dead, and the next great Arizona defense is one good staff away; they know the history says otherwise and believe it regardless."

the_grudge_texture:
  rival: arizona-state
  texture: border-war   # the Territorial Cup — the oldest rivalry trophy in college football
the_coach_relationship: hot-seat-churn   # Fisch left for Washington; Brennan survived a 4-8 referendum into a 9-4 reprieve
the_internal_fracture: patience vs urgency — the faction that says the 9-4 proves Brennan can build a Big 12 contender vs the faction that remembers the 4-8 and wants to win now before the window and the conference move close
register: tucson-bear-down-wildcats   # DRAFT (from voice_register) — confirm
