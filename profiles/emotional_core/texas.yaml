program_name: Texas
program_tier: 1

emotional_core:
  primary: restoration    # the king who was the punchline for a decade, clawed back, swagger laced with proof-watch
  secondary:              # restoration carries it; the 2025 letdown is the wound
  core_variant: dynasty-restoration
  one_line: "Texas spent fifteen years as the sport's punchline, climbed back to the brink under Sarkisian and Arch Manning — and then a 2025 that missed the Playoff turned the swagger into a question."

self_image:
  archetype: blue-blood-living-up
  standard_gap_frame: "Four national titles and the sport's wealthiest brand vs no championship since Vince Young in 2005 — and a 2025 that fell short of the Playoff the program now expects."

the_wound:
  name: "The 2025 letdown — and the decade that made it terrifying"
  detail: "Back-to-back CFP semifinals had Texas all the way back; then Arch Manning's first full year as starter ended outside the Playoff in 2025 (a New Year's bowl win over Michigan the consolation) — a flicker of the decade-long collapse the program spent years clawing out of."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Close the last gap — an SEC title and the first national championship since Vince Young in 2005."
  drought: { since: 2005, unit: national_title }

the_chip:
  villain: national_media
  text: "Every flicker of struggle reignites the punchline the program wore for a decade — 'Texas is back?' said with a smirk. The fanbase uses it on itself now, but it wants to bury it for good."

the_delusion:
  tone: earnest
  text: "That the talent and the Manning name make a title imminent — that the gap to Georgia and the SEC's best is a season, not a rebuild. Fifteen years in the wilderness makes the present feel overdue."

the_grudge_texture:
  rival: oklahoma
  texture: blood-feud   # the Red River Showdown — neutral-site Dallas, pure hate

the_coach_relationship: savior   # Steve Sarkisian ended the wilderness and restored the program to the Playoff
the_internal_fracture: all-the-way-back vs not-yet — believers who think the title is one season away vs the scarred realists who remember the collapse and won't celebrate until there's a ring
register: confident-texan — institutional swagger aware of the 2010s collapse, moving through it without self-pity; "we know where we've been"
never_use:   # DRAFT from profile — LAW, do not violate in any authored line
  - plucky
  - Cinderella
  - scrappy
  - underdog
  - Texas is back without context (the phrase is its own meme)
  - college-football-royalty-now-slumbering-sleeping-giant register
  - mocking the burnt orange

# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Bevo and the burnt orange — Texas is the wealthiest, largest brand in college football, a program that carries itself as royalty and spent fifteen years failing to back it up. The 2005 Rose Bowl (Vince Young vs USC) is the canon it measures everything against."
  the_origin: "A flagship that won three titles under Darrell K Royal in the 1960s-70s, then Mack Brown's 2005 championship behind Vince Young — before a decade-long collapse and the Sarkisian restoration + the 2024 move to the SEC."
  golden_ages:
    - { era: "1957–1976 (Royal)", what: "Darrell K Royal's three national titles (1963, 1969, 1970) and the wishbone" }
    - { era: "1998–2009 (Mack Brown)", what: "The 2005 national title behind Vince Young's Rose Bowl" }
  legends:
    - { name: Darrell K Royal, role: coach, why: "Three titles and the program's namesake stadium" }
    - { name: Vince Young, role: player, why: "The 2005 Rose Bowl — the greatest title-game performance in program memory" }
    - { name: Earl Campbell, role: player, why: "1977 Heisman, the Tyler Rose" }
  canonical_moments:
    - { name: "The 2005 Rose Bowl (Vince Young vs USC)", year: 2005, what: "Young's fourth-down run wins the national title over USC", handling: glory }
    - { name: "The 2010s collapse", year: 2014, what: "A decade in the wilderness that became the 'Texas is back?' punchline", handling: wound }
  the_place: "Darrell K Royal–Texas Memorial Stadium (cap ~100,119) and Bevo, the live longhorn since 1916. 'Come early, be loud, stay late, wear orange.'"
  brand_of_football: "Sarkisian's pro-style restoration — and the burnt-orange expectation that Texas, the richest program in the sport, is supposed to win it all."
  cultural_footprint: "The SEC's newest megabase and one of the largest in the sport; a program whose self-image as royalty survived a fifteen-year drought intact."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: After back-to-back CFP semifinals, Texas stepped back in 2025 — Arch
    Manning's first full season as starter (3,163 yds, 26 TD, 7 INT) ended outside the Playoff, with a New
    Year's bowl win over Michigan as consolation. Manning returns for 2026 with an improved line, run game, and
    defense, and the same expectation Sarkisian set: Playoff or bust. The question is whether 2025 was a stumble
    or a ceiling.
  research_checklist:
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
  sources:
    - https://www.cbssports.com/college-football/news/texas-football-bounceback-2026-season-arch-manning-steve-sarkisian/
    - https://www.nbcsports.com/college-football/news/arch-manning-texas-longhorns-2025-season-preview-stats-predictions-outlook-for-first-season-as-starting-qb-possible-first-overall-pick

