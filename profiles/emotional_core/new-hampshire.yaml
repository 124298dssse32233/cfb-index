story_canon:
  the_unique_thing: "New Hampshire made 14 consecutive FCS playoff appearances from 2004 to 2017 — one of the sport's great sustained runs — and produced two Walter Payton Award winners, including Ricky Santos (2006), who is now the head coach bringing the standard back to Durham."
  the_origin: "New Hampshire has played football since 1893 and was a Yankee Conference/Atlantic 10 power before joining the CAA. The program's modern identity was built through the late 1990s and early 2000s playoff consistency, peaking with the 14-year streak and national semifinal appearances in 2013 and 2014."
  golden_ages:
    - { era: "2004-2017 (14-year playoff streak)", what: "Fourteen consecutive FCS playoff appearances — one of the longest streaks in FCS history — with national semifinal runs in 2013 and 2014" }
    - { era: "2022 and 2024 (Santos restoration)", what: "Ricky Santos returns the program to the playoffs in his first two seasons with bids, reestablishing the postseason expectation" }
  legends:
    - { name: Ricky Santos, role: coach/player, why: "2006 Walter Payton Award winner as a player; now the head coach bringing the standard back as the 20th coach in program history" }
    - { name: Jerry Azumah, role: player, why: "Walter Payton Award winner and NFL running back — the first great player in the modern UNH era" }
  canonical_moments:
    - { name: "14-year playoff streak begins", year: 2004, what: "New Hampshire begins the longest sustained FCS playoff run in the program's history — a streak that would last through 2017", handling: glory }
    - { name: "2013-2014 national semifinals", year: 2014, what: "New Hampshire reaches the FCS national semifinals in back-to-back years — the peak of the program's modern era", handling: glory }
    - { name: "Ricky Santos wins Walter Payton Award", year: 2006, what: "Santos wins the top offensive award in FCS — the defining individual moment from the streak era", handling: glory }
    - { name: "2025 season — 8-5, FCS first round", year: 2025, what: "New Hampshire goes 8-5 (6-2 CAA) and earns an FCS playoff bid, losing to South Dakota State 3-41 in the first round", handling: heartbreak }
  the_place: "Wildcat Stadium in Durham, New Hampshire — the home of one of FCS football's great sustained programs, on the campus of the state's flagship university."
  brand_of_football: "New England tough, system-smart, standard-bearing — a program that defined what consistent FCS playoff football looks like and is rebuilding that identity under the quarterback who embodied it."
  cultural_footprint: "The FCS program that made the Granite State a football address — 14 straight playoffs, two national semifinals, two Walter Payton Award winners, and now the full-circle story of the award winner coming home to coach."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: New Hampshire went 8-5 (6-2 CAA) in 2025 — fifth-year head coach
    Ricky Santos' best season yet, earning an FCS playoff bid before a 3-41 first-round loss to South
    Dakota State. The 2025 result matches the 2024 record (8-5, 6-2 CAA) identically, confirming Santos
    has stabilized the program at a competitive plateau. The Battle for the Brice-Cowell Musket against
    Maine remains the emotional anchor of the season — UNH has won 13 of the last 15 in the rivalry.
    The program's next step is converting consistent 8-win regular seasons into a deep FCS playoff run
    that recalls the 2013-2014 semifinal era.
