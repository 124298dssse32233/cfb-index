emotional_core:
  primary: standard
  secondary: contentment
  one_line: "New Hampshire is the Walter Payton Award program that put Durham on the FCS map with 14 straight playoffs, and Ricky Santos — the award winner himself — is now the head coach proving the standard was never an accident."

self_image:
  archetype: sleeping-giant
  standard_gap_frame: "Fourteen consecutive FCS playoff appearances (2004-2017), two national semifinal runs, and a Walter Payton Award-winning head coach vs a stretch where the program has been good but not elite — UNH knows what the standard looks like and is rebuilding toward it."

the_wound:
  name: "The 14-year playoff streak that ended in 2018"
  detail: "New Hampshire made 14 consecutive FCS playoff appearances from 2004 to 2017 — one of the longest streaks in FCS history. The streak ended in 2018. Ricky Santos, now head coach, has restored playoff appearances in 2022 and 2024, but the program has not returned to the sustained dominance of the run that defined it."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Restore the 14-year standard — an era of sustained FCS playoff appearances and a national semifinal run that proves Durham is still one of FCS's elite addresses."
  drought: { since: 2008, unit: relevance }

the_chip:
  villain: national_media
  text: "The room says New Hampshire made 14 straight FCS playoffs, won the Walter Payton Award twice, and still gets called a cold-weather afterthought — that the Granite State program has earned its place at the FCS top table and national media has been slow to acknowledge it."

the_delusion:
  tone: self-aware
  text: "Fans believe Ricky Santos coaching his alma mater is the narrative arc the program needed — that having the 2006 Walter Payton Award winner running the sideline guarantees the standard comes back, and that the 14-year run proves it's the default state, not the exception."

the_grudge_texture:
  rival: maine
  texture: blood-feud

the_coach_relationship: forever-ours
the_internal_fracture: nostalgia-for-the-streak vs confidence-in-the-Santos-rebuild — the faction that measures everything against the 14-year run vs the faction fully bought in on Santos and the 8-5 trajectory as proof the standard is returning

register: unh-wildcats-durham-fcs-playoff-standard-ricky-santos
