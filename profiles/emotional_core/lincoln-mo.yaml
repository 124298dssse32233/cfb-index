  text: "No chip — just the quiet weight of history. Lincoln players don't play for revenge; they play because their great-grandfather played in 1952, and their family name is on the program's bones."

the_delusion:
  tone: earnest
  text: "That one recruiting cycle, one transfer portal haul, one new coach can turn a 1-10 team into a bowl contender. Fans know the GLVC is tougher than NAIA was, and they're not deluded — they're determined."

