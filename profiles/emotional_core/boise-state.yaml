# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The blue turf — the first non-green field in football (1986) and the trademarked 'Smurf Turf' — which became the stage for the sport's definitive giant-slayer program."
  the_origin: "A junior college until 1968 and an FBS program only since 1996, Boise built a national name from almost nothing — including, famously, on a $750,000 blue carpet its athletic director dreamed up on an airplane."
  golden_ages:
    - {era: "2004-2014 (Hawkins → Petersen)", what: "two undefeated Fiesta Bowl runs and a stretch that made a non-power program a fixture in the national top 10"}
  legends:
    - {name: "Chris Petersen", role: coach, why: "92-12 over eight years; the architect of the giant-slayer era and its trick-play folklore"}
    - {name: "Ian Johnson", role: player, why: "took the Statue of Liberty into the end zone to beat Oklahoma in 2007 — then proposed to his cheerleader girlfriend on the field"}
    - {name: "Ashton Jeanty", role: player, why: "ran for 2,497 yards in 2024 (4th-most in a season in FBS history), a Heisman finalist on the program's first Playoff team"}
  canonical_moments:
    - {name: "The 2007 Fiesta Bowl", year: 2007, what: "beat Oklahoma 43-42 in OT — a hook-and-ladder on 4th-and-18 to force overtime, then the Statue of Liberty two-point conversion to win; Boise finished as the nation's only undefeated team, No. 5 AP, its highest ranking ever", handling: miracle}
    - {name: "The 2024 Playoff run", year: 2024, what: "Jeanty's historic season carried a fifth Mountain West title and the No. 3 seed and a first-round bye in the inaugural 12-team College Football Playoff — the only loss to No. 1 Oregon", handling: glory}
  the_place: "Albertsons Stadium and its blue turf — a genuine home-field weapon Boise has defended at one of the best home win rates in the country."
  brand_of_football: "Petersen's 'OKG' ethos — ordinary great guys, supremely prepared, willing to run the trick play in the biggest moment — out-scheming more-talented rosters."
  cultural_footprint: "the proof-of-concept that a program from Idaho can play with anyone — the patron saint of every mid-major's Playoff dream, and a test case the expanded 12-team format was arguably built to include."
  the_ongoing_story: "LIVE as of 2026-06: fresh off a 9-5 season and a fifth Mountain West title (with a chastening 38-10 LA Bowl loss to Washington), Boise leaves the conference it dominated for the rebuilt Pac-12 in 2026 — the original giant-slayer becoming a charter member of a new power league, where 'do they belong' gets its truest test yet, with Spencer Danielson entering year three."   # CURRENCY: refresh from live data/research each cycle, never training (doc 65 §4)
  sources:
    - https://www.ncaa.com/news/football/article/2017-01-01/david-vs-goliath-retold-looking-back-boise-states-2007-fiesta-bowl
