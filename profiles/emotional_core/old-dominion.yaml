# AUTHORED 2026-06-13 from live web research — see story_canon.sources.

emotional_core:
  primary: restoration    # a program that didn't exist for 68 years, now playing its best football ever
  secondary: grievance    # the giant-killer reputation, finally cashed on the road
  core_variant: first-ascension
  one_line: "Old Dominion brought football back from the dead in 2009 — and in 2025 walked into Blacksburg and hung 45 on Virginia Tech, won ten games, and authored the best season in the program's short, improbable life."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A program that played zero football for 68 years vs a 10-win 2025, a Cure Bowl title, and a fanbase still learning how high the ceiling goes."

the_wound:
  name: "Built from nothing, doubted every step"
  detail: "Old Dominion didn't field a team between 1941 and 2009 — it had to construct an FBS program from scratch in the Tidewater. The wound is the doubt that follows a young program: that the Virginia Tech wins are flukes and that a school this new can't sustain a winner. The 2025 season was the loudest answer yet."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the Sun Belt outright and stack 2025 on top of the giant-killing nights — turn a resurrection story into a program that contends every year, not just on its best Saturdays."
  drought: { since: 2009, unit: conference_title }

the_chip:
  villain: blue_bloods
  text: "Old Dominion has beaten Virginia Tech three times now, and the 2025 rout in Blacksburg was the first on the Hokies' own field — a program that didn't exist a generation ago putting a Power Four neighbor on the floor. The fanbase keeps those nights close."

the_delusion:
  tone: self-aware
  text: "Monarch fans believe a program that willed itself back into existence can will itself past anybody — that the Virginia Tech scalps prove ODU belongs at the big-boy table, even when the resources say it's still the new kid."

the_grudge_texture:
  rival: virginia-tech
  texture: border-war   # the in-state Power Four neighbor ODU loves to ambush

the_coach_relationship: total-trust   # Ricky Rahne delivered the best season in program history
the_internal_fracture: dream-bigger ambition vs grateful-for-everything humility — the room split between fans who want ODU treated as a real Sun Belt contender and those still amazed there's a program here at all
