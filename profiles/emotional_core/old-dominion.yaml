# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Old Dominion brought a dead program back to life. After playing no football from 1941 to 2009 — a 68-year gap — the school rebuilt from absolutely nothing into an FBS program, then started knocking off Power Conference giants. Almost no program in modern college football has resurrected itself from a standing start the way ODU did."
  the_origin: "A commuter university in Norfolk, in Virginia's Tidewater region, that dropped football in the 1940s and didn't play again until 2009 — when Bobby Wilder built a program from scratch that climbed to FBS by 2014."
  golden_ages:
    - { era: "2009–2016 (Bobby Wilder)", what: "The from-nothing build: a new program, the jump to FBS in 2014, and a 2016 Bahamas Bowl win" }
    - { era: "2025 (Ricky Rahne)", what: "A 10-3 season, a Cure Bowl title, and the rout of Virginia Tech in Blacksburg — the best year in program history" }
  legends:
    - { name: Bobby Wilder, role: coach, why: "Built the resurrected program from its first practice to FBS membership — the founding father" }
    - { name: Ricky Rahne, role: coach, why: "Delivered the program's first 10-win FBS season and its biggest road win ever" }
    - { name: Taylor Heinicke, role: player, why: "The record-shattering quarterback of the early ODU years who reached the NFL — the program's first football star" }
  canonical_moments:
    - { name: "Upset of No. 13 Virginia Tech", year: 2018, what: "ODU 49, Virginia Tech 35 — the program's first win over a ranked Power team and the biggest win in school history", handling: glory }
    - { name: "Rout of Virginia Tech in Blacksburg", year: 2025, what: "ODU 45, Virginia Tech 26 — the program's first road win over a Power Four team", handling: glory }
    - { name: "Football resurrected", year: 2009, what: "The Monarchs play their first game in 68 years — the founding moment of the modern program", handling: glory }
  the_place: "S.B. Ballard Stadium in Norfolk — a compact, modernized Tidewater venue that has become one of the louder small-stadium environments in the Sun Belt."
  brand_of_football: "Tidewater-tough and opportunistic — a young program that plays its biggest games with nothing to lose and a chip about being underestimated, built to ambush bigger names."
  cultural_footprint: "The model resurrection story — proof that a school can build major-college football from literally nothing and, within a generation, beat the established powers next door."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Old Dominion went 10-3 (6-2 Sun Belt) in 2025 under sixth-year coach Ricky
    Rahne — the best season in the program's FBS history. The Monarchs stunned Virginia Tech 45-26 in Blacksburg
    for their first-ever road win over a Power Four opponent (QB Colton Joseph accounting for three touchdowns), a
    loss that helped cost the Hokies their coach. ODU finished the year with a 24-10 Cure Bowl win over South
    Florida. A program that didn't exist 17 years ago is now chasing Sun Belt contention every fall.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
