# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The Hail Mary — Doug Flutie's 48-yard prayer to Gerard Phelan to beat defending champ Miami on the day after Thanksgiving 1984, the most replayed throw in college-football history and the play credited with putting the school on the national map ('the Flutie effect' on applications)."
  the_origin: "A Jesuit university in Chestnut Hill, Massachusetts — Catholic, academic, and proudly Boston's college team ('For Boston,' the oldest college fight song in America) — that built its football identity around being the Northeast's flagship rather than a recruiting machine."
  golden_ages:
    - { era: "1983–1984 (Flutie)", what: "10-2, a Cotton Bowl win, and Doug Flutie's 1984 Heisman — the only Heisman in program history" }
    - { era: "2007–2008 (Jagodzinski / Ryan)", what: "Matt Ryan's 11-3 senior year and an ACC Atlantic title game, BC's last sustained national relevance" }
  legends:
    - { name: Doug Flutie, role: player, why: "1984 Heisman; the Hail Mary; the most famous Eagle ever" }
    - { name: Matt Ryan, role: player, why: "The 2007 ACC-contending QB and No. 3 NFL draft pick — the program's modern high-water mark" }
    - { name: Luke Kuechly, role: player, why: "Tackle machine and Butkus winner; the embodiment of BC's blue-collar defensive identity" }
  canonical_moments:
    - { name: "The Hail Mary", year: 1984, what: "Flutie's 48-yard touchdown to beat No. 12 Miami 47-45 the day after Thanksgiving", handling: miracle }
    - { name: "Flutie's Heisman", year: 1984, what: "The first and only Heisman in program history", handling: glory }
    - { name: "Spoiling Notre Dame's title run", year: 1993, what: "David Gordon's last-second field goal beats No. 1 Notre Dame 41-39", handling: glory }
  the_place: "Alumni Stadium in Chestnut Hill — an intimate ~44,500-seat bowl tucked into a Jesuit campus, where 'For Boston' (college football's oldest fight song) and the Superfans frame a distinctly Northeastern, distinctly Catholic gameday."
  brand_of_football: "For-Boston football — tough, defensive, offensive-line-proud ('O-Line U'), allergic to shortcuts; a program that would rather lose clean than win dirty, and tells you so."
  cultural_footprint: "The Catholic Northeast's football flagship and a national academic name — 'the Flutie effect' (a measurable admissions bump after 1984) is the textbook example of sports driving a university's brand."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Bill O'Brien's second season cratered to 2-10 (1-7 ACC), BC's worst
    in over a decade, with a 10-game skid snapped only against Syracuse. Rather than fire the NFL-pedigree
    hire, the school doubled down — retaining O'Brien for year three and publicly committing to a maximum
    revenue-share allotment and bigger operational investment in football. The 2026 question in Chestnut
    Hill: can money and an O'Brien rebuild finally turn a Power-Four seat into Power-Four results?
