emotional_core:
  primary: deprival        # a Power-conference seat and the Flutie pedigree, with nothing on the field to show for it in two decades
  secondary: contentment   # the for-Boston, do-it-right, never-cheat self-image that quietly forgives the losing
  one_line: "Boston College is the Power-conference program that holds onto a frozen-rope miracle from 1984 because the four decades since haven't given Chestnut Hill anything bigger to point to."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "A Heisman, a Hail Mary, and an 11-win Matt Ryan team vs a present where a Power-Four seat keeps yielding 4-8, 7-6, and the back half of the ACC."

the_wound:
  name: "The 2025 floor — two wins, and the seat finally warm"
  detail: "Bill O'Brien's second year went 2-10 (1-7 ACC), the program's worst in over a decade, and a 10-game losing streak only ended against Syracuse — a season that asked, out loud, whether an NFL-pedigree hire could lift a program that has finished the regular season ranked exactly once since Matt Ryan left."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Matter in the ACC again — a winning record, a New Year's-adjacent bowl, and a Saturday where the rest of the league has to take the Eagles seriously, not just respect the crest."
  drought: { since: 2007, unit: relevance }

the_chip:
  villain: national_media
  text: "Eagles fans hear the same shrug every fall — that Northeast football doesn't travel, that the league forgets BC is in it — and they answer with a Heisman, a Hail Mary, and a checkbook the school just opened wider."

the_delusion:
  tone: earnest
  text: "The fanbase believes BC can win the right way — clean program, real degrees, no shortcuts — and still climb the ACC, that doing it honestly isn't the reason the ceiling stays low."

the_grudge_texture:
  rival: notre-dame
  texture: blood-feud   # the Holy War — two Catholic flagships, the Ireland Trophy, BC's 1993 spoiling of the Irish national-title run

the_coach_relationship: hot-seat-churn   # Addazio, Hafley, now O'Brien on a warming seat — no era has held since Jagodzinski's Ryan window
the_internal_fracture: invest-and-win vs do-it-right-and-be-proud — the faction that wants BC to spend like a Power program and demand more than respectability vs the faction that prizes the clean, academic, for-Boston identity even when it caps the ceiling
register: chestnut-hill-eagles-doug-flutie-academic
