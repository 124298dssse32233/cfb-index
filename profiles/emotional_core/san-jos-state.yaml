emotional_core:
  primary: deprival       # a football team in the tech capital of the world, fighting for a fraction of a region's attention
  secondary: disbelief    # a promising program that unraveled to 3-9 on late-game collapses nobody saw coming
  one_line: "San José State plays football in the middle of Silicon Valley, where the smartest money in America has never once been spent on caring about the Spartans — and where a 2020 conference title proved they could win anyway."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A 2020 Mountain West championship in an empty-stadium COVID season, against a 2025 team that went 3-9 on missed kicks and late-game breakdowns — the gap between what the Spartans can be and how thin the support is."

the_wound:
  name: "The 2025 unraveling"
  detail: "After the high of the 2020 title and a bowl-level baseline, San José State went 3-9 (2-6 Mountain West) in 2025 — Ken Niumatalolo's second year — a season defined by late-game collapses and missed kicks, even as quarterback Walker Eget threw 275 passes without an interception and a fanbase wondered how it came apart so fast."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the Bay Area's attention one more time the way 2020 did — a conference title that forces a tech-distracted region to notice the football school in its backyard."
  drought: { since: 2020, unit: conference_title }

the_chip:
  villain: national_media
  text: "Spartan fans know the deal: they're the football program nobody outside San José thinks about, in a valley that worships startups, not Saturdays. They'll remind you they won a Mountain West title when the whole sport was looking elsewhere, and that showing up at all is the loyalty test."

the_delusion:
  tone: self-aware
  text: "The faithful half-believe that Silicon Valley's money and talent should somehow tip toward the local team — that the right season turns the Spartans into the Bay Area's program. They've seen the empty seats; they keep buying tickets anyway, certain the breakthrough converts the region."

the_grudge_texture:
  rival: fresno-state
  texture: blood-feud   # the Valley Trophy — the Central California grudge match SJSU cares about most

the_coach_relationship: hot-seat-churn   # Brent Brennan left for Arizona; Ken Niumatalolo's 3-9 second year put the new era under early pressure
the_internal_fracture: belief vs resignation — the faction that thinks 2020 proves SJSU can win and deserves backing vs the faction worn down by empty stands and a 3-9 slide
