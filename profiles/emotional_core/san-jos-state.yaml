story_canon:
  the_unique_thing: "San José State is big-time football planted in the least football-obsessed acre in America — the heart of Silicon Valley, where a startup IPO outdraws a Saturday kickoff. The Spartans' identity is winning anyway, in front of empty seats, and the 2020 Mountain West title is the proof that they can."
  the_origin: "One of the oldest public colleges in California, San José State has fielded football since the 1890s as the Bay Area's quiet football program — overshadowed first by Cal and Stanford, then by the tech economy that grew up around its campus."
  golden_ages:
    - { era: "2020 (Brent Brennan)", what: "A 7-1 COVID-season run to the program's first conference championship since a shared 1990 Big West title" }
    - { era: "1980s–1990 (the Big West years)", what: "Bowl trips and a share of the 1990 Big West title — the prior high-water mark" }
  legends:
    - { name: "Brent Brennan", role: coach, why: "Built the 2020 Mountain West champions before leaving for Arizona — the modern era's defining coach" }
    - { name: "Dick Vermeil", role: player, why: "Pro Football Hall of Fame coach and an SJSU alum and quarterback — one of two Hall-of-Famers (with Bill Walsh) who came up as Spartans" }
  canonical_moments:
    - { name: "2020 Mountain West championship", year: 2020, what: "An undersized, displaced (the team practiced out of state during COVID) San José State goes 7-1 and wins the conference — the program's signature triumph", handling: glory }
    - { name: "The 2025 slide", year: 2025, what: "Ken Niumatalolo's second year falls to 3-9 on late-game collapses and missed kicks, gutting the momentum of recent years", handling: wound }
  the_place: "CEFCU Stadium in San José — a modest, often-quiet home in the shadow of the tech giants; the Spartans' fight is partly to fill it."
  brand_of_football: "Scrappy and pass-leaning in recent years (QB Walker Eget's interception-free 2025 streak the bright spot); the program is now navigating the transition from Brennan's spread to Ken Niumatalolo's identity."
  cultural_footprint: "The Bay Area's overlooked football program — and an unlikely cradle of coaching royalty, with Hall-of-Famers Bill Walsh and Dick Vermeil both former Spartans; a study in winning without a crowd."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: After Brent Brennan left for Arizona in 2024, Ken Niumatalolo — the
    winningest coach in Navy history — took over, and 2025 fell hard to 3-9 (2-6 Mountain West) on late-game
    breakdowns even as QB Walker Eget threw 275 passes without a pick. Entering year three in 2026, with the
    Mountain West reshaping around the Pac-12 raid, Niumatalolo faces early pressure to stop the slide.
