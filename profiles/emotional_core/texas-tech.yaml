story_canon:
  the_unique_thing: "Texas Tech is where the Air Raid was born — Mike Leach turned a remote West Texas school into the most prolific passing offense in the sport, an offensive philosophy that reshaped how everyone plays; and in 2025 the program finally married that identity to a championship, winning its first Big 12 title."
  the_origin: "A Lubbock land-grant university on the high plains of West Texas — isolated, fiercely loyal, and tortilla-throwing — that found its national voice when Mike Leach arrived in 2000 and weaponized the forward pass."
  golden_ages:
    - { era: "2000-2009 (Mike Leach)", what: "The Air Raid era — record-setting offenses, the 2008 Cotton Bowl run, and a permanent influence on football" }
    - { era: "2025 (Joey McGuire)", what: "A school-record 12 wins, the first Big 12 championship, and a College Football Playoff berth" }
  legends:
    - { name: Mike Leach, role: coach, why: "Birthed the Air Raid at Texas Tech and made the program a national offensive landmark" }
    - { name: Michael Crabtree, role: player, why: "His 2008 last-second catch to beat No. 1 Texas is the program's signature play" }
    - { name: Patrick Mahomes, role: player, why: "The future NFL MVP who put up video-game numbers in Lubbock from 2014-2016" }
  canonical_moments:
    - { name: "The Crabtree catch", year: 2008, what: "Michael Crabtree's last-second touchdown beats No. 1 Texas — the most famous moment in program history", handling: glory }
    - { name: "The first Big 12 title", year: 2025, what: "A 34-7 rout of BYU delivers Texas Tech's first conference championship and a Playoff bid", handling: glory }
    - { name: "The Orange Bowl CFP loss", year: 2025, what: "Oregon shuts out Texas Tech 23-0 in the Playoff quarterfinal — the title run's hard ceiling", handling: heartbreak }
  the_place: "Jones AT&T Stadium in Lubbock — 'Guns Up,' the swirling West Texas wind, and a hail of tortillas raining onto the field, the loudest expression of one of the sport's most isolated, devoted fanbases."
  brand_of_football: "Air Raid gunslinger — wide-open, pass-happy, fearless offense, now paired under Joey McGuire with the heavily-funded roster that turned the fireworks into a championship."
  cultural_footprint: "The birthplace of the modern spread passing game and a cult-favorite fanbase — and, in 2025, a case study in how booster spending can vault a perennial entertainer into a champion."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Backed by booster Cody Campbell's collective and a football roster
    reported north of $28 million, Texas Tech went 12-2 in 2025 under fourth-year coach Joey McGuire, won the
    program's first-ever Big 12 title with a 34-7 rout of BYU, and reached the College Football Playoff —
    before Oregon shut them out 23-0 in the Orange Bowl quarterfinal. QB Behren Morton threw for 3,335 yards
    and 27 TDs. The question in Lubbock: is this the start of a new era, or a title bought at the top of the
    market that the spending won't sustain?
