emotional_core:
  primary: redemption     # the fun-but-never-quite program that finally cashed decades of near-misses into a real title
  secondary: spectacle    # Lubbock is loud, tortilla-flinging, and now it has a championship to throw them over
  one_line: "Texas Tech spent thirty years as the most entertaining team in Texas that never won anything — then a billionaire booster's checkbook and a 12-2 season delivered the program's first-ever Big 12 title, a 34-7 rout of BYU that turned the wildest fanbase in the league into champions."

self_image:
  archetype: riser-proving
  standard_gap_frame: "Decades of high-scoring teams and famous moments with zero conference titles vs a 2025 breakthrough — a school-record 12 wins, the first Big 12 championship, and a College Football Playoff berth."

the_wound:
  name: "The decades of almost"
  detail: "For a generation Texas Tech produced thrilling offenses and signature upsets but never a league title — close calls, bowl trips, and the lingering sense it was a fun program rather than a serious one, a reputation only erased by the 2025 run."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Turn the breakthrough into a standard — defend the Big 12 crown, win a Playoff game, and prove 2025 was the start of something in Lubbock and not a one-year spike bought at the top of the market."
  drought: { since: 1925, unit: national_title }

the_chip:
  villain: national_media
  text: "Fans spent years hearing 'where is Lubbock?' and 'fun to watch, never a contender,' then heard a new version in 2025 — that the title was just bought, that the spending makes the championship hollow. They say the trophy counts the same regardless of how it was funded."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes the wait is finally over — that the booster money, Joey McGuire, and Behren Morton have permanently moved Texas Tech from the league's entertaining middle into its top tier, and that the doubters calling it a fluke are about to be wrong again."

the_grudge_texture:
  rival: texas
  texture: little-brother   # the in-state power Tech has chased for decades — and now, finally, can look in the eye

the_coach_relationship: total-trust   # Joey McGuire delivered the program's first conference title in year four
the_internal_fracture: built-to-last vs bought-for-a-year — the faction that sees a new era and the faction quietly worried the title rode a $28M roster that may not be repeatable
