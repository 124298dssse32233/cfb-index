# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The 1995 miracle. Northwestern had the longest losing tradition in major-college football — once the losingest program in Division I — when Gary Barnett's Wildcats went 10-1, won the Big Ten, beat Notre Dame and Michigan, and reached the Rose Bowl. It remains the most improbable turnaround in the sport, and the proof that the smallest, smartest school in the conference could win it."
  the_origin: "A small, elite private university in Evanston on the shore of Lake Michigan — the academic standout of the Big Ten — that spent most of its football history losing before a single Cinderella season rewrote what was possible there."
  golden_ages:
    - { era: "1995–1996 (Gary Barnett)", what: "Back-to-back Big Ten titles, the 1995 Rose Bowl run, and the end of the longest losing tradition in the sport" }
    - { era: "2006–2022 (Pat Fitzgerald)", what: "Five division titles, two Big Ten Championship Game trips, and sustained bowl relevance for a school never built to have it" }
  legends:
    - { name: Gary Barnett, role: coach, why: "Architect of the 1995 miracle — 'expect victory' — who made Northwestern football possible" }
    - { name: Pat Fitzgerald, role: player, why: "Two-time national-defender-of-the-year LB on the 1995 team, later the program's winningest coach before his disgraced 2023 firing" }
    - { name: Otto Graham, role: player, why: "The 1940s Wildcat who became a Pro Football Hall of Fame quarterback — the program's deepest historical root" }
  canonical_moments:
    - { name: "The 1995 Rose Bowl season", year: 1995, what: "10-1, Big Ten champions, the most improbable turnaround in college football history", handling: miracle }
    - { name: "Fitzgerald fired in the hazing scandal", year: 2023, what: "The program's favorite son let go after a hazing investigation — a wound to the institution's identity", handling: wound }
  the_place: "A temporary lakefront setup — Martin Stadium on campus and games at Wrigley Field — while a rebuilt Ryan Field rises on the Lake Michigan shoreline; the most scenic and unusual home situation in the Big Ten."
  brand_of_football: "Brains-and-grit — disciplined, low-mistake, opportunistic football that wins on preparation and turnovers because it can't always win on talent; the thinking program's underdog."
  cultural_footprint: "The proof that academic excellence and Big Ten football can coexist — a fanbase that wears its outlier status as a badge, and a program whose 1995 season is taught as the sport's ultimate example of belief."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Northwestern went 7-6 (4-5 Big Ten) in 2025 and won the GameAbove Sports
    Bowl 34-7 over Central Michigan — David Braun's second bowl bid in his first three seasons, making him only the
    second coach in program history to do so. The Wildcats are still in their lakefront-stadium interregnum, playing
    at Martin Stadium and Wrigley Field while a new Ryan Field is built. Braun, the unexpected hire who steadied the
    program after Pat Fitzgerald's 2023 firing, has 19 wins in three years and is trying to turn survival into
    sustained relevance.
