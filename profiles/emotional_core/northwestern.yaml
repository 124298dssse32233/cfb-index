emotional_core:
  primary: house-money    # the smallest school in the Big Ten, playing on borrowed time and winning anyway
  secondary: restoration  # rebuilt on the fly after the hazing scandal that took its favorite son
  one_line: "Northwestern is the academic outlier the Big Ten was never supposed to keep around — a private school playing out of a lakefront stadium-in-exile, and somehow David Braun keeps taking it bowling."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "The 1995 Cinderella that crashed the Rose Bowl and the Fitzgerald division titles vs the structural reality that a school this size shouldn't survive in this conference at all."

the_wound:
  name: "Fitzgerald and the hazing scandal"
  detail: "Pat Fitzgerald — the All-American linebacker of the 1995 Rose Bowl team and the winningest coach in program history — was fired in July 2023 after a hazing investigation concluded he 'should have known.' Losing its favorite son in disgrace gutted the program just as it had to keep competing in the toughest conference in the sport."
  handling: never-a-punchline
  freshness: this-era

the_dream:
  text: "Win the Big Ten outright — finish the job the 1995 team and the Fitzgerald years started, and earn the lakefront stadium with a banner the doubters can't explain away."
  drought: { since: 2000, unit: conference_title }

the_chip:
  villain: national_media
  text: "Every preseason the Wildcats are picked to finish last, and every few years they don't — and the fanbase has stopped expecting credit for it. They've learned to treat being underestimated as the natural state of a program that was never supposed to belong."

the_delusion:
  tone: earnest
  text: "Wildcat fans believe the brains-and-grit formula is a feature, not a handicap — that a school full of future doctors and lawyers playing disciplined, opportunistic football can keep beating programs with five times the talent, the way 1995 proved it could."

the_grudge_texture:
  rival: illinois
  texture: border-war   # the Land of Lincoln Trophy — the in-state Big Ten rivalry

the_coach_relationship: savior   # David Braun, the unexpected steady hand who rebuilt after the scandal
the_internal_fracture: win-now ambition vs survive-with-dignity realism — the room split between believing Northwestern can actually contend and accepting that bowl-eligibility is the real ceiling for a school this size
