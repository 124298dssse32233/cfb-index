emotional_core:
  primary: restoration    # two years after a Fiesta Bowl, the program just had its first losing season in 20 years
  secondary: disbelief    # both that the rise happened at all, and that it cratered this fast
  core_variant: perpetual-rebuild
  one_line: "Liberty went undefeated into a Fiesta Bowl in 2023 — and two years later posted its first losing season in two decades, a young FBS program suddenly trying to climb back to a peak it only just reached."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A 13-1 Conference USA champion that crashed a New Year's Six bowl in 2023 vs a 4-8 collapse in 2025 — proof of how far the program rose, and how quickly the floor can reappear."

the_wound:
  name: "The 4-8 collapse after the Fiesta Bowl"
  detail: "Liberty's 2025 team went 4-8, its first losing season in 20 years, just two seasons after a 13-1 run to the Fiesta Bowl. For a program that ascended so fast, the sudden drop fed the oldest doubt about a young FBS team: that the rise was the exception and the fall is the regression."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Climb back to where 2023 stood — a Conference USA title and a New Year's Six bowl that announced Liberty had arrived — and prove the Fiesta Bowl was a foundation, not a fluke that the program is now sliding away from."
  drought: { since: 2023, unit: conference_title }

the_chip:
  villain: national_media
  text: "Fans bristle at being dismissed as a young regional program that overachieved once and is now reverting — they remember the unbeaten regular season and the New Year's Six stage, and they refuse to let a 4-8 year erase what the program proved it could do."

the_delusion:
  tone: earnest
  text: "The fanbase believes the resources and the recruiting that built a Fiesta Bowl team are still there — that 2025 was a stumble, not a ceiling, and Lynchburg can be a Group-of-Five power again. They saw the top of the mountain once, and they believe the path back is shorter than the doubters think."

the_grudge_texture:
  rival: new-mexico-state
  texture: championship   # the 2023 Conference USA title-game opponent, the rivalry forged on the league's biggest stage

the_coach_relationship: hot-seat-churn   # Hugh Freeze to Auburn, then Jamey Chadwell's peak-and-stumble — the program has churned through its risers
the_internal_fracture: patience-vs-panic — the faction giving Jamey Chadwell time to rebuild after a 4-8 year vs the faction that thinks a Fiesta Bowl program should never sink this low
register: lynchburg-flames-hugh-freeze-conference-usa   # earnest, ambitious, well-funded newcomer pride still learning the FBS ladder
