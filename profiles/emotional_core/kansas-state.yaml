story_canon:
  the_unique_thing: "Kansas State is the greatest rebuild in college football history — Bill Snyder took a program widely called the worst in the sport's history and built it into a Big 12 champion, twice, on patience and toughness rather than talent. The stadium and the statue both bear his name."
  the_origin: "A land-grant school in Manhattan, Kansas whose football was a national punchline for most of a century — until Snyder arrived in 1989 and, brick by brick, made 'The Wabash Cannonball' and EMAW the soundtrack of a genuine contender."
  golden_ages:
    - { era: "1993–2003 (Snyder I)", what: "The rebuild peaks — top-ranked seasons, a Sugar Bowl, and the 2003 Big 12 title with a stunning upset of No. 1 Oklahoma" }
    - { era: "2009–2018 (Snyder II)", what: "Snyder returns and wins again — a 2012 Big 12 title behind Collin Klein's Heisman-finalist season" }
  legends:
    - { name: Bill Snyder, role: coach, why: "Built the worst job in the sport into a two-time Big 12 champion; the stadium and statue carry his name" }
    - { name: Collin Klein, role: player, why: "Heisman-finalist QB of the 2012 Big 12 title team — and now the program's head coach, the bloodline come home" }
    - { name: Darren Sproles, role: player, why: "The electric back of the Snyder peak years, a program-defining talent" }
  canonical_moments:
    - { name: "Upset of No. 1 Oklahoma", year: 2003, what: "K-State stuns top-ranked Oklahoma 35-7 to win its first Big 12 title", handling: glory }
    - { name: "2012 Big 12 Championship", year: 2012, what: "Snyder's second title behind Collin Klein's Heisman-finalist year", handling: glory }
    - { name: "Klieman retires; Klein hired", year: 2025, what: "After a 6-6 season Chris Klieman retires and former QB Collin Klein returns to lead the program", handling: wound }
  the_place: "Bill Snyder Family Stadium in Manhattan — a stadium named for the man who built the program, where 'The Wabash Cannonball' plays and EMAW (Every Man A Wildcat) is the creed."
  brand_of_football: "Grit-and-patience football — disciplined, low-mistake, tougher-than-you ball; the program that out-lasts opponents rather than out-dazzling them."
  cultural_footprint: "The sport's proof that patience and toughness can build a contender from nothing — a fanbase whose entire identity is loyalty and grit, the antithesis of the blue-blood shortcut."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Kansas State opened 2025 ranked No. 17 but finished 6-6 (5-4 Big 12) and
