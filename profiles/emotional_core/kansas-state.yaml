emotional_core:
  primary: contentment    # the patience Snyder taught is the identity — grit, not glamour
  secondary: restoration  # a 6-6 stumble and a coaching handoff to bring the bloodline home
  one_line: "Kansas State is the program Bill Snyder dragged out of the sport's deepest hole and built on patience — and after a sideways 6-6 year and Chris Klieman's retirement, it just handed the keys to one of its own, Collin Klein."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "Snyder's two Big 12 titles and a reputation as the sport's greatest rebuild vs a program that has never reached the mountaintop and just stumbled to 6-6 a year after starting ranked."

the_wound:
  name: "The 2025 stumble and Klieman's exit"
  detail: "K-State opened 2025 ranked No. 17, then went 6-6 and declined a bowl amid a coaching change, injuries and portal losses. Chris Klieman retired after the regular season — an unexpected handoff that left Manhattan steadying itself rather than contending, the program's first bowl-less year since 2020."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the Big 12 again and, someday, more — to prove the patience Snyder taught still compounds into something bigger than survival, and that a grit program can finally break through a ceiling it has never cleared."
  drought: { since: 2012, unit: conference_title }

the_chip:
  villain: national_media
  text: "Fans have heard their program called a Snyder-only fluke for thirty years — that without one coach K-State reverts to the bottom. They believe the patience and the toughness are the program, not the man, and the 6-6 year just gave the doubters their opening again."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes patience is a competitive edge — that if Manhattan stays steady and hires its own (a former Wildcat QB in Collin Klein), the grit always pays off in the end. It is load-bearing because the whole identity rests on it: out-work, out-last, and trust the rebuild."

the_grudge_texture:
  rival: kansas
  texture: border-war   # the Sunflower Showdown — the in-state game K-State has long owned on the field

the_coach_relationship: legends-shadow   # every K-State coach lives under Snyder, statue and stadium-name and all; Klein most of all
the_internal_fracture: trust-the-process vs fear-the-reversion — the faction that says the program's patience survives any coaching change vs the faction that fears 6-6 and a retirement is the start of the slide back
register: manhattan-purple-wabash-grit   # plainspoken, hard-nosed, allergic to flash; the Wabash Cannonball and a chip the size of the prairie
