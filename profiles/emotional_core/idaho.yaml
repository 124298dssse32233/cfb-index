  text: "Fans here believe washington State plays in the Pac-12 (sorta); Idaho is in FCS. That chip is 131 years old and now carved deeper by the realignment gap."

the_delusion:
  tone: earnest
  text: "The fanbase believes Idaho's FBS resources (Stadium, facilities, recruiting) are not gone — that the program can use them to dominate FCS and reclaim the Palouse, showing Washington State that Vandals football is alive again."

