never_use:
  - Idaho is an FCS program — it spent 30 years in FBS; the 2025 move is a demotion, not a reclassification
  - The rivalry with Washington State is equal — Washington State is FBS; Idaho is now FCS, a permanent sub-tier
  - Idaho will quickly return to FBS — the economic and conference landscape has shrunk; there is no natural FBS home
  - Idaho never had FCS success before — the Vandals played I-AA 1978–95 and made the FCS semis twice (1988, 1993)

story_canon:
  the_unique_thing: "The Battle of the Palouse — a 131-year-old border rivalry with Washington State (first played 1894) that survived both schools' conference changes and is now defined by an FBS-FCS gap that makes it asymmetrical and unequal."
  the_origin: "Idaho territory's flagship university in Moscow, 80 miles from Spokane, established football in 1894 by playing neighbor Washington State. The program entered I-AA in 1978 and competed for four decades before climbing to FBS in 1996."
