  brand_of_football: "Border-country pragmatism — Idaho has always played a smaller-footprint game, constrained by geography and recruiting distance from major metros."
  cultural_footprint: "Idaho's story is a cautionary tale: a program that climbed to FBS and never found its footing, forced back to FCS as a humbling reminder that ambition without resources is futile."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Idaho went 4–8 (2–6 Big Sky) in its 2025 return to FCS, under first-year coach Thomas
    Ford Jr. (hired December 2024). The Vandals were in full rebuild mode: transferring players, resetting culture, and attempting
    to establish FCS baseline. The 2025 season was expected to be brutal, and it was. Ford now enters 2026 with the hard work ahead:
    proving that Idaho's FBS infrastructure and recruiting advantage can dominate Big Sky, not just compete. The fanbase watches
    carefully — if Idaho goes 4–8 again, the Palouse narrative shifts from "redemption" to "permanent decline."
