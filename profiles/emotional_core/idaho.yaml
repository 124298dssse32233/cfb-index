the_wound:
  name: "The 30-year FBS exile and the humiliation of the return"
  detail: "Idaho moved to FBS in 1996 with hopes of sustained major-conference relevance; instead it endured two decades of Sun Belt and Conference USA mediocrity, finally collapsing to 4–8 and being deemed FCS-suitable in 2025. The return to FCS in 2025 is not a homecoming — it's an admission of failure."
