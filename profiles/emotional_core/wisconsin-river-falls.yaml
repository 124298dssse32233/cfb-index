  standard_gap_frame: "For decades, River Falls was a solid WIAC program — conference titles, solid records, but never the national player. Then 2025 happened. The Falcons won their first outright WIAC title since 1985, their first NCAA playoff appearance in 29 years, and climbed all the way to a Stagg Bowl victory — their first national championship in school history."

the_wound:
  name: "The decades without a statement"
  detail: "UW-River Falls was a program that did things right but never quite broke through nationally. Conference contenders, but not blue bloods. The 40-year gap between the 1985 WIAC title and the 2025 title felt like the Falcons' ceiling was set. Then the ceiling broke."
  handling: dated-grievance
  freshness: generational

the_dream:
  text: "Prove 2025 wasn't a one-year miracle — that River Falls can build on this national championship and compete for Stagg Bowls year after year. From sleeping giant to blue blood."
  drought: { since: 1985, unit: conference_title }

the_chip:
  villain: none
  text: "Fans believe they proved something in 2025: the hunger to matter nationally, and River Falls satisfied it."

the_delusion:
  tone: self-aware
  text: "That a small Wisconsin town program can sustain a national championship run — that the 2025 title wasn't a magic year but proof that River Falls football is built for Stagg Bowls. The fanbase knows better. They also believe it anyway."

