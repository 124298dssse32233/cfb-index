story_canon:
  the_unique_thing: "The program that bet on the SEC when everyone said it would drown — Missouri left the Big 12 in 2012, was written off, and won the SEC East twice in its first three years. The move everyone doubted is now the obvious decision in hindsight."
  the_origin: "Mizzou, the flagship in Columbia, founded 1839 — a border-state program forged in the Border War with Kansas, the oldest rivalry west of the Mississippi, before it found a permanent home in the SEC."
  golden_ages:
    - { era: "2013–2014 (Gary Pinkel)", what: "Back-to-back SEC East championships in only the second and third years in the league — the move validated" }
    - { era: "2007–2008 (Pinkel / Chase Daniel)", what: "No. 1 in the country in 2007; two of the best teams in modern program history" }
    - { era: "2023–2025 (Eli Drinkwitz)", what: "Three straight strong seasons and top-15 finishes — the program's most stable modern run" }
  legends:
    - { name: Gary Pinkel, role: coach, why: "The program's all-time wins leader; the architect of the SEC move and the back-to-back East titles" }
    - { name: Chase Daniel, role: player, why: "The quarterback of the 2007-08 teams that reached No. 1 and won a Cotton Bowl" }
    - { name: Kellen Winslow, role: player, why: "Hall of Fame tight end, the prototype Missouri sent to the NFL in the 1980s" }
  canonical_moments:
    - { name: "Fifth down", year: 1990, what: "Colorado beats Missouri after officials grant an erroneous extra down — one of the sport's most infamous officiating disasters, against Mizzou", handling: heartbreak }
    - { name: "No. 1 in the country", year: 2007, what: "Missouri reaches No. 1 before losing the Big 12 title game to Oklahoma, one win from the BCS championship", handling: wound }
    - { name: "First SEC East title", year: 2013, what: "Missouri wins the East in year two of the SEC, silencing the move's doubters", handling: glory }
  the_place: "Faurot Field at Memorial Stadium — the giant rock 'M' on the north hillside, kept by generations of students, and the 'M-I-Z / Z-O-U' call that carries across the state."
  brand_of_football: "Pragmatic and quarterback-friendly — a program built on player development and a recent identity of stout defense and a power run game under Drinkwitz."
  cultural_footprint: "The proof case that a doubted realignment move can succeed; a Show-Me state program that lets the results argue for it rather than chasing the spotlight."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Missouri went 8-5 in 2025 (4-4 SEC), a step back from consecutive
    top-15 finishes, behind a defense that ranked among the nation's best and transfer back Ahmad Hardy,
    before a 13-7 Gator Bowl loss to Virginia. Eli Drinkwitz enters year seven with a bought-in base still
    waiting on the breakthrough — an outright SEC run that finally turns "the move worked" into "Mizzou is here."
