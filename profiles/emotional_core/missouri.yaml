emotional_core:
  primary: grievance      # the Show-Me state that made the doubted SEC move work and is still waiting for credit
  secondary: contentment  # a program quietly comfortable with three straight strong seasons under Drinkwitz
  core_variant: the-chronic-chip
  one_line: "Missouri is the program that everyone said couldn't survive the SEC move and quietly made it look obvious — still waiting for the respect that a Show-Me state was never going to ask for twice."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "Back-to-back SEC East titles in 2013-14 and three recent strong Drinkwitz seasons against a ceiling that has never once been a national championship — always close, never quite the top."

the_wound:
  name: "Five yards from the title game"
  detail: "The 2007 team rose to No. 1 in the BCS before losing the Big 12 Championship to Oklahoma — the closest Missouri has come to playing for it all, and the standing definition of the program's almost."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Win the SEC outright and reach the sport's final weekend — to finish the climb that the 2007 and 2013 teams started, and prove the conference move was a beginning, not a ceiling."
  drought: { since: 2014, unit: conference_title }

the_chip:
  villain: national_media
  text: "Fans remember every analyst who called the SEC jump a mistake in 2012, and they note that even after two division titles and three top-15 finishes, the previews still treat Missouri as the league's afterthought."

the_delusion:
  tone: earnest
  text: "The fanbase believes Mizzou is a genuine SEC program now, not a guest — that the move is settled, the recruiting has caught up, and the next great team is a quarterback and a November away from making the doubters say it out loud."

the_grudge_texture:
  rival: kansas
  texture: blood-feud   # the Border War — a 19th-century blood rivalry realignment tried to kill

the_coach_relationship: total-trust   # Drinkwitz delivered three straight strong years; the base is bought in
the_internal_fracture: arrival vs ambition — the faction content that Mizzou is finally a stable SEC winner vs the faction that wants a division-or-better breakthrough before it calls the move a success
