  archetype: blue-blood-living-up
  standard_gap_frame: "La Crosse is the program with a history of WIAC excellence and a culture that goes deeper than one coach. An 8-3 record and WIAC contention in 2025 (under Janus, who departed for Northern Michigan) proved the Eagles aren't defined by personnel — they're defined by a standard that survives transitions."

the_wound:
  name: "The coach transition anxiety"
  detail: "Matt Janus, who built La Crosse into a WIAC contender, left for Northern Michigan in early 2026. The transition is clean (Michael Zweifel hired quickly), but the wound is the risk that Janus was the program, and without him, La Crosse reverts. The Eagles have 15 years of history to prove they're bigger than one era, but the question is alive."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Prove that La Crosse football is institutional, not coach-dependent. The Eagles want to win a Stagg Bowl and show that the standard survives the transition from Janus to Zweifel — that WIAC excellence is built-in to the program."
  drought: { since: 1985, unit: national_title }

the_chip:
