the_wound:
  name: "The 2024 national championship loss to Ferris State (49-14)"
  detail: "Valdosta finished the 2024 regular season 13-1 and made it to the national championship game, but lost decisively to Ferris State 49-14. The wound isn't just the loss — it's the margin, the way a perfect season got dismantled. The Blazers know they belong at the top, and 2024 proved it; they also know they fell short when it mattered most."
