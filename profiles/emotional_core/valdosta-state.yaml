  freshness: this-era

the_dream:
  text: "Win back the national championship. Prove that 2024 wasn't the peak — it was the preview. Get back to the title game and finish the job."
  drought: { since: 2019, unit: national_title }

the_chip:
  villain: blue_bloods
  text: "Fans here believe the chip is validation. Valdosta has won four national titles in the Division II era and proved in 2024 that the program can compete at the very top. The runner-up finish fuels the belief that this program belongs on the national stage and will get back there."

the_delusion:
  tone: self-aware
  text: "That 2024 was the dress rehearsal and 2025 (or 2026) will be the coronation. Fans know the Gulf South is tough and Ferris State was the better team on the day, but they also know Valdosta has the talent and the coach to break through."

