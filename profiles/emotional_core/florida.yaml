    - https://www.espn.com/college-football/story/_/id/47151490/sources-florida-finalizing-deal-hire-tulane-jon-sumrall
    - https://www.alligator.org/article/2026/01/dj-lagway-baylor-official
    - https://www.lineups.com/betting/florida-gators-2026-college-football-preview-betting-odds-picks-predictions/
