      Miami corridor and a significant in-state contingent across every county. The gameday culture runs:
      the Gator Walk pregame (players walk from their bus to the locker room through a fan corridor), "We
      Are the Boys" sung between the third and fourth quarters, the chomp gesture (two arms making a gator-jaw
      shape), and — during play — one of the loudest home-field environments in the sport when…'
    voice_ethos: 'The voice is fallen-dynasty-rebuilding: confident about the two peaks, honest about the
      valleys, and neither apologizing for the wilderness years nor pretending they didn''t matter. Florida
      speaks like a program that has held the crown twice and knows both the weight of it and the weight
      of having set it down. Performative modesty is a trust-killer; so is pretending the 2010s didn''t
      happen. Identity phrase: **"Florida is a program that has held the crown twice and knows the…'
    narratives: 'The Napier restoration is the single open narrative thread. Three specific questions: (1)
      does DJ Lagway''s development produce a 2026 QB the program can build a CFP run around; (2) does the
      2026 schedule provide enough wins to get the program to the SEC title race; (3) does the Napier regime
      survive long enough to convert the recruiting classes into three-year returns. The 2024 bowl season
      was a positive-inflection data point; 2026 is the measurement year. Conference…'
    in_jokes: '"It''s great to be a Florida Gator." — real sign-off, not a bit. "Only Gators get out alive."
      — Spurrier''s coinage for The Swamp. "Chomp" — the gesture, the word; both work. "We Are the Boys
      of Old Florida." — actual tradition, sung between the third and fourth quarters. "The Cocktail Party."
