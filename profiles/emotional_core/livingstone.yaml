story_canon:
  the_unique_thing: "Livingstone College played the first-ever HBCU football game on December 27, 1892, against Johnson C. Smith (then Biddle Institute). The Blue Bears ARE the birthplace of Black college football. Every program descended from that moment. Livingstone's identity is that it came first."
  the_origin: "Livingstone College was founded in 1879 as a religious and educational institution in Salisbury, North Carolina. In 1892, the Blue Bears became the first HBCU football team to field a team and play against another HBCU (Johnson C. Smith), establishing the foundation of Black college football."
