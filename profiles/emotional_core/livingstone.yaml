the_chip:
  villain: none
  text: "Fans here believe no chip against outsiders. The motivation is internal and historical: Livingstone has 132 years of CIAA football heritage and only three conference titles (1960, 1997-98). The Blue Bears play to honor that history and add to it."

the_delusion:
  tone: self-aware
  text: "That a dominant defense and tough-love coaching can sustain a power program with limited resources. The fanbase knows Sean Gilbert is building something real — the 2024 and 2025 records prove it — but also knows talent is fragile."

