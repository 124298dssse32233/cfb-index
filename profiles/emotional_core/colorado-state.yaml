story_canon:
  the_unique_thing: "Colorado State is the program Sonny Lubick willed into relevance — a Fort Collins school that had been a doormat for decades until Lubick turned the 1990s Rams into a ranked, conference-winning regular and made the field at the stadium bear his name."
  the_origin: "A Fort Collins land-grant school whose football identity was largely flat until Sonny Lubick arrived in 1993 and built six conference titles in the WAC and Mountain West across a 15-year run."
  golden_ages:
    - { era: "1994–2002 (Lubick)", what: "Six conference titles, multiple ranked finishes, and the 1997 Holiday Bowl season — the era the program still defines itself by" }
    - { era: "2017", what: "Canvas Stadium opens on campus — the first dedicated on-campus venue in decades, a physical statement of ambition" }
  legends:
    - { name: Sonny Lubick, role: coach, why: "Built the only sustained winning era in program history; the field is named for him" }
    - { name: Joey Porter, role: player, why: "Lubick-era defensive star who became a Super Bowl champion and NFL Pro Bowler" }
  canonical_moments:
    - { name: "1997 Holiday Bowl season", year: 1997, what: "An 11-2 Lubick team and a New Year's-tier bowl trip — the program's high-water mark", handling: glory }
    - { name: "Canvas Stadium opens", year: 2017, what: "The on-campus stadium finally gives the Rams a real home and a recruiting pitch", handling: glory }
    - { name: "Norvell fired mid-2025", year: 2025, what: "A 2-5 start in the final MW season triggers the firing, capping a 2-10 year", handling: wound }
  the_place: "Canvas Stadium — a sleek 2017 on-campus build at the foot of the Rockies, the Aggie-era bell tolling Ram wins, a venue meant to make Fort Collins feel major."
  brand_of_football: "Hard-nosed Mountain-West grinding under Lubick; a program whose identity is built on defense, toughness, and the chip of being overlooked in its own state."
  cultural_footprint: "The land-grant Ram identity of northern Colorado — agricultural roots, the green-and-gold of a town that lives a tier below the national glare and resents it."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Colorado State went 2-10 (1-7 MW) in 2025 and fired Jay Norvell on
    October 19 after a 2-5 start, with Tyson Summers finishing as interim. The Rams hired Jim L. Mora to lead a
    reset, and 2026 is their first season in the Pac-12 — a Power-conference leap arriving at the program's lowest
    on-field moment in years. The arc is pure restoration: prove the badge upgrade was earned, not just timed.
