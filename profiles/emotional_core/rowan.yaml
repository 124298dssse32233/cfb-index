the_wound:
  name: "The 1990s championship game failures"
  detail: "Five times in five years (1993, 1995, 1996, 1998, 1999) Rowan reached the NCAA Division III national championship game and lost every one. The wound is not that they lost — it's that they got that close and never crossed the line. The 1993 team remains the closest miss: lost 34–24 to Mount Union."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Win the national championship that escaped in 1993, 1995, 1996, 1998, 1999; restore the Rowan program to title contender status; prove the 1990s weren't the absolute peak."
  drought: { since: 1999, unit: national_title }

the_chip:
  villain: none
  text: "Fans here believe rowan was built to win titles — five championship games proved it. Never crossing the line is the scar that won't heal."

the_delusion:
  tone: self-aware
  text: "The fanbase believes that the 1990s were the only real era — that every team in Rowan history is chasing Mount Union 1993. The program knows better, but the championship game ghosts never leave."

the_grudge_texture:
  rival: njac-circuit
  texture: blood-feud

the_coach_relationship: hot-seat-churn
the_internal_fracture: "Chasing the 1990s elite era vs. accepting the reality of modern competition and accepting that titles may not come"
