the_wound:
  name: "The tragic loss of Buddy Teevens (2005–2023) — a coach who defined modern Ivy football"
  detail: "Buddy Teevens coached Dartmouth for 19 seasons and won seven Ivy League titles, building the most successful program in modern Ivy history. He was killed in a bicycle accident in September 2023, a tragedy that shook the program and the Ivy League. Teevens was the living embodiment of Dartmouth football; his absence is still fresh."
  handling: never-a-punchline
  freshness: this-era

the_dream:
  text: "Win the Ivy League every year — not just share it, but dominate it. The 2024 shared title (8–2) is proof the program is back after Teevens' tragic death. Sammy McCorkle (the 2023 Ivy Coach of the Year) is building the next era."
  drought: null

the_chip:
  villain: none
  text: "Fans here believe there is no chip. Dartmouth leads the Ivy League in conference titles and doesn't need to resent anyone. The Big Green's competitor is itself — the standard set by Buddy Teevens and the 22 titles that came before."

the_delusion:
  tone: earnest
  text: "That Dartmouth could compete for national championships if the Ivy League allowed scholarships — and the fanbase genuinely believes it. The 1925 national championship proves the program has been built for excellence since the beginning."

