emotional_core:
  primary: honor          # the team of an entire island chain, representing a place no mainland program can be
  secondary: restoration  # Timmy Chang, the program's own passing legend, has the Warriors winning bowls again
  one_line: "Hawai'i is the only major-college team an entire ocean of islands calls its own — the program that perfected the Run-and-Shoot, crashed the 2008 Sugar Bowl, and asks every visitor to fly six hours and play a different climate."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A 2007 12-0 regular season and a BCS Sugar Bowl berth vs a Mountain West program whose geography costs it recruits, money and the benefit of the doubt every single year."

the_wound:
  name: "The 2008 Sugar Bowl blowout"
  detail: "The unbeaten 2007 dream — Colt Brennan, a No. 10 final ranking, the first non-BCS island team to crash the party — ended 41-10 against Georgia, a national stage that doubled as the doubters' favorite exhibit that the islands couldn't hang."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Another unbeaten run and a return to the sport's biggest stage — proof the 2007 magic wasn't a one-time lightning strike from the middle of the Pacific."
  drought: { since: 2010, unit: conference_title }

the_chip:
  villain: national_media
  text: "Warrior fans are sick of being the road trip nobody wants and the time zone nobody watches — a program that has to win twice as convincingly to get half the respect, and knows the mainland forgets it exists by Sunday morning."

the_delusion:
  tone: earnest
  text: "The faithful believe the islands breed a toughness the mainland can't scout — that the right quarterback in this offense, with a jet-lagged opponent in 80-degree humidity, can still shock anybody who flies out to play them."

the_grudge_texture:
  rival: byu
  texture: blood-feud   # the old WAC blood feud — culture-clash games and a genuinely bitter history

the_coach_relationship: forever-ours   # Timmy Chang, the program's all-time passing-yards legend, came home to coach it
the_internal_fracture: protect-the-islands vs play-the-mainland's-game — fans who prize the bunker-mentality identity vs fans who want the resources and scheduling to compete on the mainland's terms
register: honolulu-rainbow-warriors-june-jones-run-and-shoot
