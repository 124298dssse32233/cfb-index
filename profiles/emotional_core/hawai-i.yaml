story_canon:
  the_unique_thing: "The 2007 Run-and-Shoot dream: June Jones's Warriors went 12-0 in the regular season behind Colt Brennan, became the first team from the islands to crash a BCS bowl, and made Hawai'i the air-raid laboratory of college football."
  the_origin: "College football on the islands as a point of statewide pride — the only FBS program in Hawai'i, separated from every opponent by an ocean, carrying the identity of an entire state onto a mainland stage."
  golden_ages:
    - { era: "1999–2007 (June Jones)", what: "Jones installs the Run-and-Shoot, resurrects a 0-12 program, and builds it into the 2007 BCS-buster" }
    - { era: "Colt Brennan years (2005–2007)", what: "NCAA passing records and the most prolific aerial show the sport had seen" }
  legends:
    - { name: June Jones, role: coach, why: "Turned 0-12 into 12-0 and the Sugar Bowl; the architect of the Run-and-Shoot era" }
    - { name: Colt Brennan, role: player, why: "Record-shattering quarterback and the face of the 2007 dream; a beloved figure who died young" }
    - { name: Timmy Chang, role: player, why: "Once college football's all-time passing-yards leader — and now the head coach" }
  canonical_moments:
    - { name: "Perfect regular season", year: 2007, what: "12-0 and a BCS Sugar Bowl berth — the islands crash the party", handling: glory }
    - { name: "The Sugar Bowl loss", year: 2008, what: "41-10 to Georgia on the sport's biggest stage", handling: wound }
    - { name: "Hawai'i Bowl comeback over Cal", year: 2025, what: "Erases a 21-point deficit to win — tying the largest comeback in program history", handling: glory }
  the_place: "The Ching Athletics Complex, the on-campus home built after Aloha Stadium closed in 2020 — and the islands themselves: a six-hour flight, a time-zone gauntlet, and 80-degree humidity that visiting teams never quite shake."
  brand_of_football: "Air it out — the Run-and-Shoot heritage, four- and five-wide sets, a pass-first identity born under June Jones and revived by his own quarterbacks-turned-coaches."
  cultural_footprint: "More than a team — the football program of an entire state, woven into island identity, the 'Imua' (move forward) ethos, and a fanbase that treats Saturdays as a statewide gathering."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Hawai'i went 9-4 (5-3 Mountain West) in Timmy Chang's fourth season and won
    the Hawai'i Bowl, erasing a 21-point deficit to beat California in one of the program's great comebacks. Chang —
    the program's own all-time passing legend — was named AFCA Region 5 Coach of the Year and got an extension
    through 2026. The Warriors enter 2026 a rising Mountain West team chasing the conference title that's eluded
    them since the league realigned.
