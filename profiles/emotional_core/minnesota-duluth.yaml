  name: "The 13-year NSIC title drought (2012-2025)"
  detail: "Minnesota Duluth won the 2010 national championship (15-0) and claimed multiple NSIC titles through the early 2010s, establishing the Bulldogs as a D2 power. But from 2012 through 2024, UMD won 22 NSIC titles — yet never an unshared conference crown. The drought felt like a slow erosion of a championship program's identity. In 2025, Curt Wiese's team finally broke through with a 10-2 overall record, 9-1 NSIC North Division, and an unshared title for the first time in 13 years."
