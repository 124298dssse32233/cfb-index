story_canon:
  the_unique_thing: "Mississippi Valley State is the SWAC program that has produced two of the greatest American football players of all time — Jerry Rice (NFL legend) and Deacon Jones (Hall of Famer) — yet has never won a SWAC championship. The program is one of two SWAC teams to have never competed in a SWAC Championship Game. Despite this, Mississippi Valley has produced 25+ NFL alumni and maintains a long legacy of talent development. The program's identity is shaped by the contradiction: elite player production meets championship futility."
  the_origin: "A historically black university in Itta Bena, Mississippi that joined the SWAC in 1961 and has been competitive but never won a championship. The program built itself around talent development, not titles."
  golden_ages:
    - { era: "1960s–1970s (Jerry Rice era)", what: "The program produced Jerry Rice, one of the greatest football players of all time; Hall of Fame proof of elite talent" }
