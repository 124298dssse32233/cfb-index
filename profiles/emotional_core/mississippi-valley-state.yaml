emotional_core:
  primary: grievance     # never won a SWAC championship, one of two SWAC teams never to reach a championship game, produces Hall of Famers (Jerry Rice, Deacon Jones)
  secondary: redemption  # Terrell Buckley rebuilding in year one after a 2-10 season; the motor is there, searching for spark
  core_variant: the-chronic-chip  # the program produces Hall of Famers but can't win as a team
  one_line: "Mississippi Valley State is the SWAC program that has never won a conference championship despite producing Hall of Famers Jerry Rice and Deacon Jones — now rebuilding under Terrell Buckley in year one after a 2-10 season, proving the talent pipeline still exists."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "The program that produced Jerry Rice (NFL legend) and Deacon Jones (Hall of Famer), two of the greatest football players of all time, vs a 249-333-10 all-time record (.429) and the unique burden of never having won a SWAC championship in 119 years."

the_wound:
  name: "The eternal SWAC championship drought"
  detail: "Mississippi Valley State is one of two SWAC teams to have never won a conference championship. The program has produced Hall of Famers (Jerry Rice, Deacon Jones) and over 25 NFL alumni, proving the talent exists; but championship success has remained elusive. Terrell Buckley enters year one tasked with breaking the spell."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win a SWAC championship; prove that Mississippi Valley State is not cursed but unlucky; show that the Jerry Rice and Deacon Jones legacy can translate into sustained SWAC contention; reach the Celebration Bowl and compete for a black college national title."
  drought: { since: 1961, unit: conference_title }

the_chip:
  villain: blue_bloods
  text: "Fans here believe mississippi Valley State has produced two Hall of Famers and 25+ NFL alumni, proving the program is capable of developing elite talent. The chip is that the program knows it can field NFL-quality players but has never translated that into a SWAC championship; the standard is set by what leaves, not what stays."

the_delusion:
  tone: self-aware
  text: "The fanbase believes that a program that produces Jerry Rice and Deacon Jones is never out of a championship conversation — that the talent DNA is there and it's a matter of keeping the pieces together for 12 games. The next SWAC title is achievable; it always has been."

the_grudge_texture:
  rival: alcorn-state
  texture: little-brother   # SWAC East neighbor; Alcorn has multiple championships and titles, MVSU has none

the_coach_relationship: total-trust   # Terrell Buckley, year one, former Hall of Famer DBs coach bringing NFL pedigree; the room believes
the_internal_fracture: patience with buckley vs immediate championship — the faction that says the Hall of Famer coach needs time vs the faction that says Mississippi Valley State's talent should immediately contend
register: talent-pipeline-curse — produce Hall of Famers but can't win a championship as a program
never_use:   # LAW — do not violate in any authored line
  - "doormat framing (two Hall of Famers, 25+ NFL alumni)"
  - scrappy
  - "forever a feeder program (the talent is elite; the championship is the missing piece)"

