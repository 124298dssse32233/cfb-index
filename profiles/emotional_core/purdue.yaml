# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "The Cradle of Quarterbacks. No school has sent more signal-callers to the NFL with more distinction — Bob Griese, Len Dawson, and Drew Brees all came through West Lafayette, three of the most accomplished quarterbacks the college game has produced. Purdue's identity is a position, and the position is the most important one in the sport."
  the_origin: "A land-grant engineering university in West Lafayette, Indiana, whose football program made its name not through dynasties but through the quarterbacks it developed — a pipeline of NFL passers that became the program's brand."
  golden_ages:
    - { era: "1966–1967 (Griese)", what: "A Rose Bowl win to cap the 1966 season and a share of the 1967 Big Ten title behind Bob Griese" }
    - { era: "1997–2000 (Joe Tiller / Drew Brees)", what: "Tiller's 'basketball on grass' offense, Brees's records, and the 2000 Big Ten title and Rose Bowl trip" }
  legends:
    - { name: Drew Brees, role: player, why: "The Tiller-era record-setter who became a Super Bowl MVP and Hall-of-Fame-track passer — the face of the Cradle of Quarterbacks" }
    - { name: Bob Griese, role: player, why: "1960s star who led Purdue to the Rose Bowl and won two Super Bowls — a Pro Football Hall of Famer" }
    - { name: Joe Tiller, role: coach, why: "Brought the spread 'basketball on grass' to the Big Ten and the 2000 conference title — the program's modern architect" }
  canonical_moments:
    - { name: "2000 Big Ten title and Rose Bowl", year: 2000, what: "Drew Brees led Purdue to a share of the Big Ten and its first Rose Bowl since 1967 — the modern peak", handling: glory }
    - { name: "1967 Rose Bowl win", year: 1967, what: "Bob Griese's Boilermakers won the Rose Bowl to cap the 1966 season — the historic high point", handling: glory }
    - { name: "2022 Big Ten West title", year: 2022, what: "A West Division crown and a Championship Game appearance under Jeff Brohm — the last time Purdue mattered in the league", handling: glory }
  the_place: "Ross-Ade Stadium in West Lafayette — where the Boilermaker Special, the world's largest drum, and an engineering-school crowd give the program its distinctly Midwestern, mechanical identity."
  brand_of_football: "Quarterback-driven and pass-happy by tradition — a program that wins, when it wins, by throwing it, in the lineage of Tiller's spread and the passers it has always produced."
  cultural_footprint: "The school that proved a non-dynasty can build a permanent identity around one position — the Cradle of Quarterbacks, a brand that survives even the leanest seasons."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Purdue bottomed out with a second straight disastrous season, going 2-10
    (0-9 Big Ten) in 2025 — Barry Odom's first year after Purdue hired him from UNLV to replace the fired Ryan
    Walters (whose 2024 team went 1-11). The Boilermakers' only wins came over Ball State and FCS Southern Illinois;
    QB Ryan Browne started before transferring to North Carolina afterward. Two straight winless conference seasons
    have left Odom rebuilding from the studs, with the Cradle-of-Quarterbacks identity and the 2022 Big Ten West
    ceiling as the targets to climb back toward.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
