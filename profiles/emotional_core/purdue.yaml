emotional_core:
  primary: restoration    # back-to-back rock-bottom seasons; year one of a from-scratch rebuild
  secondary: honor        # the Cradle of Quarterbacks identity that outlasts any single bad year
  core_variant: perpetual-rebuild
  one_line: "Purdue is the Cradle of Quarterbacks — the West Lafayette program that put Brees, Griese, and Dawson in the NFL — now digging out of back-to-back two-win seasons with Barry Odom hired to rebuild it from the studs."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "A legendary quarterback pipeline and the 2022 Big Ten West Division title vs back-to-back winless conference seasons that bottomed the program out."

the_wound:
  name: "Back-to-back two-win bottom"
  detail: "Purdue went 1-11 in 2024 and fired Ryan Walters, then hired Barry Odom from UNLV — and the first rebuild year produced another 2-10 (0-9 Big Ten), the program's two wins coming over Ball State and an FCS opponent. Two straight winless conference seasons left a once-respectable Big Ten program scraping the floor."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Get back to bowl season and let the next great Purdue quarterback emerge — turn Odom's rebuild into a return to the 2022 ceiling, when a Big Ten West title and a Championship Game trip made West Lafayette matter again."
  drought: { since: 2000, unit: conference_title }

the_chip:
  villain: big_brother
  text: "Indiana spent a century as the easy in-state laughingstock — until the Hoosiers surged and Purdue cratered, and the Old Oaken Bucket started living on the wrong side of West Lafayette. The fanbase wants the rivalry's natural order restored before it becomes a permanent humbling."

the_delusion:
  tone: earnest
  text: "Boilermaker fans believe the Cradle of Quarterbacks never really closes — that the next Drew Brees is always one recruiting class away, and the right quarterback can pull Purdue out of any hole the way the position always has."

the_grudge_texture:
  rival: indiana
  texture: little-brother   # the Old Oaken Bucket — the in-state rivalry whose order has inverted

the_coach_relationship: savior   # Barry Odom, hired to rebuild a program at rock bottom
the_internal_fracture: trust-the-rebuild patience vs been-here-before exhaustion — the room split between giving Odom time after a gutted roster and the fatigue of a fanbase that has watched too many resets
