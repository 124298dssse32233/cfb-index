emotional_core:
  primary: contentment    # the rare program at peace with itself — the school where the degree is the point and football is the bonus
  secondary: deprival     # but a real ache underneath: a SWC charter member shrunk to the smallest stage in the AAC
  one_line: "Rice is the brain of college football — the most selective school in the sport, where 1,000 students still major in being an Owl, and where a win over a team that recruits ten times your enrollment is the whole reward."

self_image:
  archetype: lovable-have-not
  standard_gap_frame: "A Southwest Conference charter member that beat Alabama in the 1954 Cotton Bowl and hosted a Super Bowl — against a present where the Owls bowled at 5-7 because better teams turned the bid down."

the_wound:
  name: "The shrinking — from SWC charter to the smallest room in the AAC"
  detail: "Rice helped found the Southwest Conference and was a national name in the 1940s-50s; the league dissolved in 1996 and the Owls have spent the years since as the smallest enrollment in every conference they join. The 2025 reset under first-year coach Scott Abell went 5-7, reaching the Armed Forces Bowl only because bowl-eligible teams declined, then losing it 41-10 to Texas State."
  handling: referenceable
  freshness: generational

the_dream:
  text: "Be the smartest team that also wins — a conference title that proves the academic ceiling was never the football ceiling, the way 1953 once proved it."
  drought: { since: 2013, unit: conference_title }

the_chip:
  villain: none
  text: "Rice fans carry less of a grudge than a knowing smile: they will tell you their Owls graduate, beat schools ten times their size on a good Saturday, and answer to a standard nobody else in the sport even attempts."

the_delusion:
  tone: self-aware
  text: "Owl fans half-believe the engineering rigor that runs the rest of the school could run a football program too — that if anyone could think their way past a talent gap, it would be the smartest campus in the sport. They know the math; they love the idea anyway."

the_grudge_texture:
  rival: houston
  texture: border-war   # the Bayou Bucket — crosstown Houston, a few miles down the road

the_coach_relationship: savior   # Scott Abell, the academy-style triple-option architect, hired to make Rice punch above its weight again
the_internal_fracture: mission vs scoreboard — the faction that says Rice's whole point is doing football the right way at a real university vs the faction that's tired of losing and wants the Owls to just win
register: houston-rice-owls-academic-private   # DRAFT (from voice_register) — confirm
