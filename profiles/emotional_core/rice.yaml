# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Rice is the most academically selective school playing major-college football — a tiny private research university in Houston that helped found the Southwest Conference, beat Alabama in a Cotton Bowl, hosted a Super Bowl, and still fields a team that out-classrooms everyone it plays. The Owl is the sport's conscience: proof you can do this at a real university."
  the_origin: "Endowed by the estate of William Marsh Rice and opened in 1912, Rice was a Southwest Conference charter member (1914) and a genuine national football power in the 1940s and 1950s before the school's size and standards left it the smallest stage in every league it has joined since."
  golden_ages:
    - { era: "1934–1957 (Jess Neely)", what: "Multiple SWC titles and the 1954 Cotton Bowl win over Alabama — Rice as a national name" }
    - { era: "2012–2014 (David Bailiff)", what: "A 10-win 2013 and the program's only Conference USA championship — the modern high-water mark" }
  legends:
    - { name: "Jess Neely", role: coach, why: "27 years, the SWC-era titles — the coach the era is named for" }
    - { name: "Dicky Moegle", role: player, why: "Ran for 265 yards in the 1954 Cotton Bowl and was tackled off the bench by Alabama's Tommy Lewis — Rice's single most-told story" }
    - { name: "David Bailiff", role: coach, why: "Took the smallest school in C-USA to a 2013 conference title and a 10-win season" }
  canonical_moments:
    - { name: "The Tommy Lewis off-the-bench tackle", year: 1954, what: "Rice's Dicky Moegle is breaking a long touchdown run in the Cotton Bowl when Alabama's Tommy Lewis leaps off the sideline to tackle him; officials award the 95-yard score and Rice wins 28-6 — one of the most famous plays in bowl history", handling: glory }
    - { name: "2013 Conference USA title", year: 2013, what: "Rice beats Marshall 41-24 for the program's only C-USA championship, capping a 10-4 season", handling: glory }
    - { name: "The Southwest Conference dissolves", year: 1996, what: "The league Rice helped charter folds; the Owls begin two decades as the smallest enrollment in every conference they enter", handling: wound }
  the_place: "Rice Stadium (cap ~47,000) — the cavernous bowl that hosted Super Bowl VIII in 1974 and JFK's 'we choose to go to the Moon' speech in 1962; far too big for the modern crowd, and proud of every empty seat's history."
  brand_of_football: "Undersized and over-schooled — a program that has to scheme and out-think its way past talent gaps, now leaning into Scott Abell's academy-style triple-option to make the math work."
  cultural_footprint: "The sport's academic flagship: a tiny, elite, no-athletic-scholarship-mythology campus that keeps a Power-era football pedigree alive as a point of identity, not a business plan. When people argue 'can a real university still play football,' Rice is Exhibit A."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Rice hired Scott Abell from Davidson before the 2025 season, betting on
    his triple-option to close the talent gap. Year one went 5-7 (2-6 American); the Owls reached the Armed Forces
    Bowl only because bowl-eligible teams declined the bid, then lost 41-10 to Texas State. The 2025 Bayou Bucket
    was billed as the last meeting with crosstown Houston, now Big 12. Abell enters year two trying to prove the
    scheme can lift the smallest roster in the league back toward 2013.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
    - the legendary coaches + players (the statue-worthy)
    - the unique tradition / identity / the one amazing thing
    - the origin + the golden-age dynasty eras
    - the current-era storyline (the ongoing chapter)
