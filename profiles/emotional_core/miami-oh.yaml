  the_unique_thing: "The Cradle of Coaches — the small Oxford, Ohio school that produced an astonishing share of the men who built college and pro football: Paul Brown, Woody Hayes, Ara Parseghian, Bo Schembechler, Weeb Ewbank, Sid Gillman and more, all tied to Miami. No program of its size has shaped the sport so profoundly."
  the_origin: "One of the nation's oldest public universities, nicknamed the 'Mother of Fraternities' and, in football, the Cradle of Coaches — a heritage program whose influence dwarfs its on-field profile."
  golden_ages:
    - { era: "1947–1955 (Brown/Hayes/Parseghian lineage)", what: "The coaching pipeline that earned the Cradle of Coaches name, including a 1955 undefeated season under Ara Parseghian" }
