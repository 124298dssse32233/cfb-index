  one_line: "Miami is the Cradle of Coaches — the small Ohio school that taught the sport its giants, from Paul Brown to Woody Hayes to Bo Schembechler — and a program whose history runs deeper than the conference it now keeps falling one game short in."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "A coaching lineage that shaped college football itself vs a present that reached three straight MAC Championship Games and lost the last one — proximity to a title without the title."

the_wound:
  name: "Three title games, no banner"
  detail: "Miami reached its third straight MAC Championship Game in 2025 and lost it 23-13 to Western Michigan, then dropped the Arizona Bowl 18-3 to Fresno State to finish 7-7 — the recurring ache of a program that keeps arriving at the doorstep and getting turned away."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the MAC outright — a banner that finally matches the program's outsized name and ends the run of close-but-short Championship Saturdays."
  drought: { since: 2019, unit: conference_title }

the_chip:
  villain: national_media
  text: "The fanbase points to the names Oxford gave the sport — and watches the program get filed as just another MAC team, as if the place that produced college football's great coaches were a footnote instead of a foundation."

the_delusion:
  tone: earnest
  text: "The fanbase believes the Cradle of Coaches name still means something on the field — that a program with this lineage and Chuck Martin's steady title-game contenders is one Championship Saturday from turning heritage back into hardware."

the_grudge_texture:
  rival: cincinnati
  texture: blood-feud   # the Victory Bell, contested since 1888 — the oldest non-Ivy rivalry in the sport

the_coach_relationship: total-trust   # Martin has the RedHawks in three straight title games
the_internal_fracture: heritage-pride vs present-frustration — the faction that leans on the Cradle of Coaches legend vs the faction tired of losing the games that would make new legend
