  legends:
    - { name: Ara Parseghian, role: coach, why: "Coached Miami before his Notre Dame national titles; emblem of the Cradle of Coaches" }
    - { name: Ben Roethlisberger, role: player, why: "Led the 2003 peak; first-round NFL pick and Super Bowl-winning quarterback" }
    - { name: Paul Brown, role: coach, why: "Miami man who became one of pro football's founding architects" }
  canonical_moments:
