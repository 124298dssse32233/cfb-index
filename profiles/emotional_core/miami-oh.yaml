    - { name: "The 2025 MAC title game loss", year: 2025, what: "A third straight Championship Game ends 23-13 short against Western Michigan", handling: heartbreak }
  the_place: "Yager Stadium in Oxford — and the Cradle of Coaches plaza honoring the legends, with the Victory Bell waiting each year for Cincinnati."
  brand_of_football: "Sound, fundamentals-first football — the discipline you'd expect from the program that trained the sport's great teachers, carried in the alma mater 'Love and Honor.'"
  cultural_footprint: "Love and Honor — a heritage that belongs to all of college football, the Oxford classroom where the coaching profession's icons learned their craft."
