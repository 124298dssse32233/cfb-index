story_canon:
  the_unique_thing: "The 12th Man — the entire student body stands for all four quarters of every home game, a tradition born in 1922 when a student came out of the stands ready to play, and the deepest, most ritualized identity in the sport: the Corps of Cadets, Midnight Yell Practice the night before games, Aggie Ring Day. No program treats tradition as more literally load-bearing."
  the_origin: "Texas A&M opened in 1876 as a military college, and its football culture grew straight out of the Corps of Cadets — discipline, ritual, and the 12th Man — making the program's identity inseparable from the institution's military heritage."
  golden_ages:
    - { era: "1939 (Homer Norton)", what: "The program's lone national championship — an undefeated team led by John Kimbrough" }
    - { era: "2012 (Kevin Sumlin)", what: "Johnny Manziel's Heisman season in the SEC debut year, including a stunning upset of No. 1 Alabama in Tuscaloosa" }
  legends:
    - { name: Johnny Manziel, role: player, why: "Johnny Football — the 2012 Heisman, the first freshman to win it, and the face of A&M's SEC arrival" }
    - { name: John Kimbrough, role: player, why: "The bruising back of the 1939 national champions" }
    - { name: R.C. Slocum, role: coach, why: "The winningest coach in program history and the 'Wrecking Crew' defense era" }
  canonical_moments:
    - { name: "1939 national title", year: 1939, what: "The program's only championship, still the standard the cathedral was built to match", handling: glory }
    - { name: "Johnny Manziel beats No. 1 Alabama", year: 2012, what: "A&M's SEC statement game in Tuscaloosa, launching the Manziel legend", handling: glory }
    - { name: "First Playoff berth, out in the first round", year: 2025, what: "An 11-0 start and program-high No. 3 ranking, then a 10-3 Playoff loss to Miami", handling: wound }
  the_place: "Kyle Field (cap ~102,700) — the largest stadium in the SEC and one of the largest in the country, 'Home of the 12th Man,' the entire student section standing for four quarters, Midnight Yell the night before."
  brand_of_football: "Aspirational-Aggie-cathedral — Elko's physical, defense-first identity matched to a fanbase that treats tradition as a competitive weapon; football meant to honor the apparatus around it."
  cultural_footprint: "One of the most distinctive cultures in American sports — the Corps, the 12th Man, the Aggie Ring, the yells — a program whose traditions are studied as much as its football, and whose move to the SEC in 2012 is a case study in timing."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Mike Elko's second season delivered the best campaign in a generation —
    Texas A&M started 11-0 (first since 1992), rose to a program-record No. 3 in the Playoff rankings, and earned
    its first-ever Playoff berth. But the Aggies lost the rivalry finale to Texas 27-17, missed the SEC title game
    despite a 7-1 league mark, and fell 10-3 to Miami in the Playoff's first round to finish 11-2. Elko signed a new
    six-year extension; the question is whether 2025 was the floor of a new era or its ceiling.
