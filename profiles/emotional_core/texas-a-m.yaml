emotional_core:
  primary: redemption     # the cathedral finally paid off — the long underachievement broken in 2025
  secondary: honor        # the Corps, the 12th Man, tradition as the program's actual currency
  one_line: "Texas A&M built the loudest, most ritual-heavy program in the sport and spent decades watching the wins not match the cathedral — until 2025, when an 11-0 start and the program's first-ever Playoff berth finally made the football worthy of the tradition."

self_image:
  archetype: sleeping-giant
  standard_gap_frame: "The largest stadium in the SEC, the Corps of Cadets, the 12th Man, more tradition than any program in the country — vs a single national title in 1939 and decades of finishing short of the apparatus's promise, until the 2025 breakthrough."

the_wound:
  name: "The 2025 stumble at the summit"
  detail: "Texas A&M ripped off its first 11-0 start since 1992 and rose to No. 3 in the Playoff rankings — the highest in program history — then lost the rivalry game to Texas 27-17, missed the SEC Championship despite a 7-1 league record, and fell 10-3 to Miami in the program's first Playoff game. The best season in a generation ended one rung below the mountaintop."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Win the thing the tradition was built for — a national championship to finally match a cathedral that has stood for one since 1939."
  drought: { since: 1939, unit: national_title }

the_chip:
  villain: national_media
  text: "Fans heard the program written off as all pageantry and no payoff — the place with the best traditions and the most overrated football in America — for a generation. The 2025 Playoff berth was the answer, and they intend to keep delivering it until the narrative stops."

the_delusion:
  tone: load-bearing
  text: "The fanbase believes the tradition is the program — that the Corps, the 12th Man, and Kyle Field's 100,000 are a competitive advantage as real as any roster, and that a program that builds belief at that scale was always destined to win it all once the football caught up."

the_grudge_texture:
  rival: texas
  texture: blood-feud   # the Lone Star Showdown — reignited in the SEC, and the 2025 loss that cost a perfect season

the_coach_relationship: total-trust   # Mike Elko delivered the breakthrough and signed a new six-year deal after 2025
the_internal_fracture: arrival vs unfinished — the faction that says 2025 proved the program has finally made it vs the faction that says a Playoff exit at 10-3 means nothing has truly changed until a title comes
register: aspirational-aggie-cathedral — earnest, tradition-forward, proud of the ritual scale, allergic to being called more pageantry than program
