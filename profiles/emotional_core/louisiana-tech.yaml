  detail: "Louisiana Tech sent Terry Bradshaw to four Super Bowl wins and won a national title in its division — yet lives as a quiet Conference USA stalwart, its biggest names long gone to bigger stages. The ache is gentle but real: a program with blue-blood roots stuck on the sport's back roads."
