# ── STORY CANON (doc 64) ──
story_canon:
  the_unique_thing: "Amos Alonzo Stagg (1892–1932) — the man who invented the modern game. Chicago didn't just play football; under Stagg, it defined what coaching could be. The program then walked away for 61 years and came back."
  the_origin: "Amos Alonzo Stagg arrived in 1892 as the first dedicated football coach in American history. He transformed Chicago from a regional team into a national powerhouse and, in doing so, invented the coaching profession itself. The Maroons dominated the Big Ten from 1892 until the program's suspension in 1940."
  golden_ages:
    - { era: "1892–1915 (Stagg's rise)", what: "National championships and the birth of American football coaching — Stagg's 'Amos Alonzo Stagg era' became synonymous with football innovation and intellectual rigor" }
    - { era: "1916–1932 (Stagg's legacy)", what: "Sustained Big Ten dominance as Stagg refined his system before stepping back from the field" }
  legends:
    - { name: "Amos Alonzo Stagg", role: coach, why: "Invented the modern game and the coaching profession (1892–1932); Chicago's entire football identity traces to his 40-year revolution" }
  canonical_moments:
    - { name: "The Stagg Era", year: 1892, what: "Amos Alonzo Stagg arrives and transforms Chicago into a national power and coaching innovation center", handling: glory }
    - { name: "The Great Hiatus begins", year: 1940, what: "Chicago suspends football after 48 years, choosing de-emphasis over the modern game", handling: wound }
    - { name: "The 2001 Revival", year: 2001, what: "Chicago reactivates football after 61 years and joins the Midwest Conference", handling: miracle }
  the_place: "Stagg Field and the Midway — the spiritual and literal home of Amos Alonzo Stagg's revolution, on the University of Chicago campus in Hyde Park."
  brand_of_football: "Intellectual football — Stagg's legacy of innovation, preparation, and treating coaching as a craft rather than a sport. The modern game itself."
  cultural_footprint: "The program that invented coaching and then stepped away. The intellectual giant of American football history, now rebuilding from scratch with the ghosts of Stagg watching the Midway lights again."
  the_ongoing_story: "LIVE as of 2026-06: After 25 years of revival (2001–2026), Chicago plays active Midwest Conference football under Head Coach Craig Knoche (3rd coach in 5 years, signaling active search for stability). The program is neither the powerhouse Stagg built nor the silent shadow of the hiatus — it's a working rebuild, reclaiming a voice it surrendered in 1940, one season at a time on the Midway."
  sources:
    - https://en.wikipedia.org/wiki/Chicago_Maroons_football
    - https://en.wikipedia.org/wiki/Amos_Alonzo_Stagg
