emotional_core:
  primary: restoration    # Brohm has the program winning nine games a year again; the live arc is breaking through the ACC ceiling
  secondary: standard     # for a program that's touched the Heisman, "good" now wants to be "in the playoff conversation"
  core_variant: perpetual-rebuild
  one_line: "Louisville is the program that produced a Heisman and now, under a hometown coach, wins nine games a year while it tries to turn three straight strong seasons into a breakthrough it can't quite reach."

self_image:
  archetype: riser-proving
  standard_gap_frame: "Three straight nine-win seasons under Jeff Brohm vs an ACC where the Cardinals keep finishing on the outside — 4-4 in league play and unranked in 2025, watching Duke take the title game."

the_wound:
  name: "So close, never through"
  detail: "Jeff Brohm came home and went 9-4 in 2023, 9-4 in 2024 and 9-4 again in 2025 — three straight strong seasons, the second time in school history — yet Louisville keeps finishing 4-4 in the ACC, missing the title game and the national rankings while a Boca Raton Bowl win over Toledo papered over a year that flirted with more."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Convert the steady nine-win floor into a real ceiling — an ACC championship, a top-15 finish, a seat at the table the program has only glimpsed."
  drought: { since: 2013, unit: conference_title }

the_chip:
  villain: national_media
  text: "Brohm himself said it out loud — an unbeaten stretch and three straight strong years, and Louisville still couldn't crack the rankings. Fans hear the same message every fall: prove it against somebody big, because we're not penciling you in."

the_delusion:
  tone: earnest
  text: "The fanbase believes Brohm — a Louisville kid running his hometown program — is the coach who finally breaks through, that the ceiling that's held the Cards back is one signature season from cracking for good."

the_grudge_texture:
  rival: kentucky
  texture: border-war   # the Governor's Cup — the in-state grudge that defines the Bluegrass

the_coach_relationship: forever-ours   # Brohm is Louisville-born, a former Cardinals QB who came home
the_internal_fracture: contentment vs ambition — the faction grateful for a stable nine-win program after years of churn vs the faction that says nine wins and no breakthrough is its own kind of trap
register: bluegrass-louisville-riser-proving
