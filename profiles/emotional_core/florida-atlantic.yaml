# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Florida Atlantic is the program a Hall of Famer built from literally nothing — Howard Schnellenberger, the man who won a national title at Miami, came out of retirement to start FAU football from scratch in 2001 and promised it would one day play for championships, on a beach campus three miles from the Atlantic."
  the_origin: "Founded in 2001 by Howard Schnellenberger as an expansion program with grand ambitions, FAU climbed from nothing to FBS bowls inside a decade, then peaked under Lane Kiffin in 2017."
  golden_ages:
    - { era: "2007–2008 (Schnellenberger)", what: "Back-to-back Sun Belt titles and bowl wins barely six years after the program's first game" }
    - { era: "2017 (Kiffin)", what: "11-3, a Conference USA championship, an AP top-25 ranking, and a Boca Raton Bowl blowout — the program's ceiling" }
  legends:
    - { name: Howard Schnellenberger, role: coach, why: "Founded the program and willed it to bowl games; the visionary the whole identity rests on" }
    - { name: Lane Kiffin, role: coach, why: "Delivered the 2017 ranked, conference-winning season that remains FAU's high point" }
    - { name: Devin Singletary, role: player, why: "Kiffin-era touchdown machine who ran for 30+ scores in a season and reached the NFL" }
  canonical_moments:
    - { name: "Schnellenberger's first bowls", year: 2007, what: "FAU wins the New Orleans Bowl just six seasons into existence", handling: glory }
    - { name: "The 2017 ranked season", year: 2017, what: "Kiffin's Owls go 11-3, win Conference USA, and crack the AP top 25", handling: glory }
    - { name: "Kiffin leaves for Ole Miss", year: 2019, what: "The architect of the peak departs, beginning the post-Kiffin drift", handling: wound }
  the_place: "Flagler Credit Union Stadium (formerly FAU Stadium / Howard Schnellenberger Field) — an on-campus build in Boca Raton three miles from the ocean, the literal embodiment of 'Winning in Paradise.'"
  brand_of_football: "Sun-and-fun, offense-forward football — a young program that sells lifestyle and points, leaning into the paradise pitch as its recruiting and identity edge."
  cultural_footprint: "The improbable beach-school success story — proof that you can build an FBS program from a 2001 expansion start, and a perpetual case study in whether location alone can sustain one."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Zach Kittley arrived in 2025 to bring his high-tempo Air-Raid offense to
    Boca and went 4-8 (3-5 American) in year one. He enters 2026 in his second season trying to convert the
    paradise pitch into actual wins and end a coaching-carousel pattern that has defined the program since Kiffin
    left in 2019 — the arc is restoration: getting FAU back to the one season it can't stop talking about.
  research_checklist:   # what to look up (web) when we author this team together
    - the program's 3-7 most iconic games/plays (the ones fans tell you about at a bar)
