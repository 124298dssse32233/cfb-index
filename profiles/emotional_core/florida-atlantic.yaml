emotional_core:
  primary: restoration    # chasing the one great year — Kiffin's 2017 paradise — back into being
  secondary: delusion     # the beach-school belief that a Boca campus should be a destination, not a stopover
  core_variant: perpetual-rebuild
  one_line: "Florida Atlantic is the beach-campus program that touched the top of the sport for one Kiffin-blessed season — and has spent every year since trying to find its way back to paradise."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "An 11-3, AP-ranked, Conference-USA-champion 2017 under Lane Kiffin vs a 4-8 present where the Owls are a coaching pit stop more than a destination."

the_wound:
  name: "The post-Kiffin drift"
  detail: "After Kiffin left for Ole Miss in 2019, FAU cycled through coaches and slid back into the pack; Zach Kittley's first year in 2025 went 4-8 (3-5 American), a reminder that the 2017 high was a flash, not a foundation."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Find a coach who stays, win the American, and turn the one ranked season in Boca into a habit instead of a story they keep retelling."
  drought: { since: 2017, unit: conference_title }

the_chip:
  villain: national_media
  text: "Owls fans know how the program gets framed — a sunny pit stop where good coaches audition for bigger jobs. They believe Boca is worth building at, not just leaving from, and they're tired of being treated like a launchpad."

the_delusion:
  tone: load-bearing
  text: "FAU fans believe in Winning in Paradise as gospel — that a beautiful beach campus three miles from the Atlantic should sell itself to recruits and coaches, that the location alone makes the Owls a sleeping power if anyone would just stay long enough to wake it."

the_grudge_texture:
  rival: florida-international
  texture: little-brother   # the Shula Bowl — the other young South Florida program fighting for the same recruits

the_coach_relationship: hot-seat-churn   # Schnellenberger to Kiffin to a carousel of names who leave when they win
the_internal_fracture: ambition vs reality — the faction that insists the Kiffin year proved FAU can be ranked again vs the faction that just wants a coach to commit and stop the revolving door
