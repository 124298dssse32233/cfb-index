    - { name: Matt Behrendt, role: player, why: "Quarterback who led multiple Stagg Bowl runs" }
  canonical_moments:
    - { name: "First Stagg Bowl (2007)", year: 2007, what: "Whitewater wins its first national championship, beginning an eight-year Stagg Bowl dominance", handling: glory }
