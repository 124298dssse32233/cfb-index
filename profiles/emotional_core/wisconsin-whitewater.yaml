    - { name: "Six Stagg Bowls in eight years", year: 2014, what: "The 2014 national title capped the most sustained dynasty in D3 history", handling: glory }
  the_place: "Perkins Stadium — the home of Warhawk football and the standard that every D3 program measures itself against."
  brand_of_football: "Blue-blood D3 excellence — a program built to win national titles, not just games. Whitewater football is about discipline, execution, and the expectation of Stagg Bowls."
  cultural_footprint: "The program that proved Division III football could have a true dynasty — Whitewater's six titles in eight years remain the gold standard for sustained excellence at the FCS level and below."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Whitewater went 8-3 in 2025 (2-5 WIAC) under third-year coach Jace Rindahl.
    The Warhawks made the WIAC tournament but did not earn an NCAA playoff bid — the first time in the dynasty era
    that Whitewater wasn't a championship contender. Rindahl is rebuilding but carries the weight of the
    2007-2014 standard. The question in Whitewater: can the program reclaim Stagg Bowl contention under new leadership,
    or is the dynasty giving way to a longer, harder climb back?
