emotional_core:
  primary: grief          # the man who built everything left, and the program he handed off fell apart in a single season
  secondary: deprival     # the call-up that reached the big leagues just in time to feel how far the floor really is
  one_line: "Sam Houston won a national championship as recently as 2020, jumped to the FBS, won its first bowl in 2024 — and then the coach who did all of it left for Temple and the whole thing came apart at 2-10."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A 2020 FCS national title and a 10-3 bowl-winning FBS arrival, against a 2-10 first year without the coach who built it — the gap between what K.C. Keeler made and what's left behind."

the_wound:
  name: "Keeler leaves, and the bottom drops out"
  detail: "K.C. Keeler took the Bearkats from FCS champions (2020) to a 10-3 FBS season and the program's first bowl win (Georgia Southern, New Orleans Bowl, 2024) — then left for Temple. First-year successor Phil Longo went 2-10 (1-7 Conference USA) amid a public culture crisis. The fanbase learned, fast, how much of the rocket ride was one man."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Prove the program is real without its architect — climb back to a Conference USA contender and show the 2024 bowl run wasn't the ceiling, just the start."
  drought: { since: 2024, unit: bowl }

the_chip:
  villain: none
  text: "Bearkat fans don't carry a grudge so much as a quiet 'we were just there' — a 2020 ring and a 2024 bowl trophy that no 2-10 season can take back. They know what this program is capable of because they watched it happen."

the_delusion:
  tone: earnest
  text: "Huntsville fans believe the championship DNA travels — that a program that went undefeated for an FCS title and won its first FBS bowl can't really be a 2-10 team, and that the right coach turns it right back on. They're sure last year was the aberration, not the truth."

the_grudge_texture:
  rival: stephen-f-austin
  texture: blood-feud   # the Battle of the Piney Woods — the oldest, fiercest rivalry in East Texas

the_coach_relationship: hot-seat-churn   # Keeler built it and left for Temple; Phil Longo's 2-10 debut put the new era under immediate fire
the_internal_fracture: patience vs alarm — the faction that says one bad year doesn't erase a national title and a bowl win vs the faction that saw the 2-10 culture mess and fears the program peaked the day Keeler left
register: huntsville-tx-bearkats-fbs-newcomer   # DRAFT (from voice_register) — confirm
