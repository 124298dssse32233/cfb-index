story_canon:
  the_unique_thing: "Sam Houston is the fastest riser in the modern sport: FCS national champions in 2020, a jump to the FBS in 2023, and a bowl win in 2024 — four years from a championship at one level to a trophy at the next. No program in recent memory climbed that ladder that quickly."
  the_origin: "A state school in Huntsville, Texas, deep in the Piney Woods, that lived for decades as a regional FCS program before K.C. Keeler turned it into a national champion and then walked it up to major-college football."
  golden_ages:
    - { era: "2020 (the FCS title)", what: "An undefeated run to the FCS national championship, won 23-21 over South Dakota State in the spring-2021 final" }
    - { era: "2024 (FBS arrival)", what: "A 10-3 season and the program's first FBS bowl win, 31-26 over Georgia Southern in the New Orleans Bowl" }
  legends:
    - { name: "K.C. Keeler", role: coach, why: "The architect of all of it — the FCS title and the leap to FBS — before leaving for Temple" }
  canonical_moments:
    - { name: "FCS national championship", year: 2020, what: "Sam Houston caps an undefeated season with a 23-21 win over South Dakota State in the spring-2021 title game — the program's first national title", handling: glory }
    - { name: "First FBS bowl win", year: 2024, what: "A 31-26 New Orleans Bowl win over Georgia Southern in just the second FBS season — the trophy that said the jump worked", handling: glory }
    - { name: "Keeler leaves for Temple", year: 2025, what: "The coach who built the championship and the FBS leap departs; the Longo era opens 2-10 amid a culture crisis", handling: wound }
  the_place: "Elliott T. Bowers Stadium in Huntsville — a tight, loud FCS-era home now hosting major-college football; and NRG Stadium in Houston, the neutral-site home of the old Battle of the Piney Woods."
  brand_of_football: "Up-tempo and opportunistic — built under Keeler on a relentless offense and turnover-hunting defense; the identity the new staff is trying to recover after a 2-10 reset."
  cultural_footprint: "The poster program for the FCS-to-FBS dream — proof that a small Texas school can win a national title and then climb to the big leagues; a case study every aspiring mid-major points to."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: After K.C. Keeler left for Temple following the 2024 bowl-winning season,
    Sam Houston hired Phil Longo, whose first year cratered to 2-10 (1-7 Conference USA) amid a publicly reported
    culture crisis. The Battle of the Piney Woods with Stephen F. Austin has been dormant since the 2022 FBS move.
    Entering 2026, the program is trying to prove the championship foundation outlasted the man who poured it.
