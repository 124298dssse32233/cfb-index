# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Colorado is the only program that became the biggest story in the sport without winning anything — when Deion Sanders arrived in 2023, Boulder turned into the most-watched, most-talked-about address in college football overnight, a media tornado attached to a team that had gone 1-11 the year before."
  the_origin: "A Boulder land-grant school that built a real power under Bill McCartney in the late '80s and early '90s — three Big Eight titles and a share of the 1990 national championship — then spent two decades drifting before Coach Prime made it must-see TV again."
  golden_ages:
    - { era: "1989–1994 (McCartney)", what: "Three Big Eight titles, the 1990 national championship, and Rashaan Salaam's 1994 Heisman" }
    - { era: "2023– (Coach Prime)", what: "Not a trophy era yet — a relevance era; the program became the center of the sport's attention" }
  legends:
    - { name: Bill McCartney, role: coach, why: "Built the 1990 national champions; the architect of Colorado's only golden age" }
    - { name: Rashaan Salaam, role: player, why: "1994 Heisman winner, 2,000-yard rusher — the program's signature talent" }
    - { name: Deion Sanders, role: coach, why: "Made Boulder appointment television; the most magnetic figure in the modern sport" }
  canonical_moments:
    - { name: "Fifth Down / 1990 national title", year: 1990, what: "Colorado wins a share of the national championship — the high-water mark the whole program is measured against", handling: glory }
    - { name: "Salaam's Heisman", year: 1994, what: "Rashaan Salaam rushes for 2,055 yards and wins the Heisman", handling: glory }
    - { name: "The 2025 collapse", year: 2025, what: "3-9 the year after Hunter and Shedeur left — a 53-7 loss at Utah the low point", handling: wound }
  the_place: "Folsom Field at 5,360 feet — Ralphie the live buffalo thundering onto the grass before kickoff, the altitude as a built-in home-field weapon."
  brand_of_football: "Spectacle football — fast, brash, camera-aware; under Prime the program is as much a broadcast as a team, swagger first and apologies never."
  cultural_footprint: "The proof that attention is its own currency in modern college football — a program that drives ratings, recruiting buzz, and culture-war debate regardless of where it finishes in the standings."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Deion Sanders returns for year four (16-21 overall at CU) after a brutal
    3-9 (1-8 Big 12) crash in 2025, the season after Travis Hunter (No. 2 overall) and Shedeur Sanders left for
    the NFL. Prime spent the spring recovering from a health scare (blood clots, prior bladder-cancer surgery) and
    declared he's got his swagger back; he signed a five-year, $54M extension in March 2025 and is rebuilding the
    trenches. Boulder is loudly not on the hot seat — but four years in, the spotlight is waiting on the wins.
