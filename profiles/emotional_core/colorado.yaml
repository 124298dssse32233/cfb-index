emotional_core:
  primary: spectacle      # Boulder is the loudest show in the sport — the lights, the cameras, Prime Time
  secondary: disbelief    # 9-4 with two future first-rounders, then 3-9 the moment they left
  one_line: "Colorado is the program that turned a head-coaching hire into appointment television — and is now finding out what the lights look like when the wins stop following them."

self_image:
  archetype: riser-proving
  standard_gap_frame: "A 1990 national title and the most-watched arrival in modern college football vs a 3-9 face-plant the year the cameras stopped finding a Hunter or a Sanders to point at."

the_wound:
  name: "The 2025 fall to earth"
  detail: "The year after a 9-4 season carried by Travis Hunter (No. 2 overall) and Shedeur Sanders, Colorado went 3-9 (1-8 Big 12) — a 53-7 wipeout at Utah, blowouts to both Arizona schools — and the questions about whether the show could ever become a program got loud."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Turn the noise into November — a Big 12 title and a Playoff run that proves the spotlight in Boulder was pointed at a real program, not just a moment."
  drought: { since: 2001, unit: conference_title }

the_chip:
  villain: national_media
  text: "Every Buffs fan knows the deal: the same cameras that made Boulder the center of the sport are the ones counting down to the day they can call it a circus that fell apart. The fanbase loves the attention and resents the verdict riding in behind it."

the_delusion:
  tone: load-bearing
  text: "Buffs fans believe the spotlight is the program now — that Prime keeps Boulder relevant, recruitable, and one roster away no matter what the record says, because nobody walks away from the biggest stage in the sport."

the_grudge_texture:
  rival: colorado-state
  texture: border-war   # the Rocky Mountain Showdown — the in-state little brother who refuses to stay little

the_coach_relationship: savior   # Deion took a 1-11 program to the front page of the sport; Boulder is all-in on Prime
the_internal_fracture: show vs substance — the faction that says the relevance, recruiting, and revenue Prime brought are the win, vs the faction that says four years in, the scoreboard has to start agreeing
