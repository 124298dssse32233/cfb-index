status: live            # todo | drafted | authored | reviewed | live
slug: dayton
team_id: null
program_name: Dayton
program_tier: 5

emotional_core:
  primary: restoration      # climbing back to the 12-title standard after a drought
  secondary: honor          # the tradition earned over 40+ years of excellence
  one_line: "Dayton is the Ohio program that won two NCAA Division III national championships and built a 17-year winning streak — an FCS institution for 30 years, now chasing the form that made it a dynasty."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "Twelve Pioneer League titles and a 17-year consecutive winning streak (1987–2003) vs a program that hasn't been the auto-bid favorite since 2015 — the legacy still dominates the room, but the floor is now just 'be respectable.'"

the_wound:
  name: "The 2015 end of the dynasty era"
  detail: "Dayton won 12 Pioneer League titles and made multiple FCS playoffs, but the last title came in 2015 — a decade of respectability without the dominance that defined the program. The wound is not failure; it's the felt gap between what Dayton was and what it's become."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Return to the 2000s–2015 standard — a Pioneer League championship, an FCS playoff berth, proof that the tradition still runs deep enough to compete at the level that made Dayton a name."
  drought: { since: 2015, unit: conference_title }

the_chip:
  villain: none
  text: "Fans here believe dayton's chip is internal — a program measured against its own ceiling. The question isn't disrespect; it's whether the program can still access the standard it set for itself."

the_delusion:
  tone: self-aware
  text: "The fanbase believes the 17-year winning streak and the 12 titles mean the foundation is still there, that rebuilding is a matter of coaching and recruitment, not culture. They remember what Dayton was, and they believe it's closer than the drought suggests."

the_grudge_texture:
  rival: drake
  texture: championship   # Dayton and Drake have battled for PFL dominance for 30 years

the_coach_relationship: legends-shadow   # Trevor Andrews inherits the weight of 30+ years of excellence
the_internal_fracture: classic-vs-rebuild — the faction that believes Dayton should be automatic contenders vs the faction accepting a lower steady state
register: dayton-flyers-d-three-national-champions-17-year-streak-pioneer-dynasty
never_use:   # LAW — do not violate in any authored line
  - "Can return to 2015 dominance — the program is 10+ years removed from its last title"
  - "Is a powerhouse now — 7–4 in 2025 is respectable, not the 12-title standard"
  - "Has won more recently — 12 titles 1993–2015; none in the last decade"
  - "Is the Pioneer League standard — San Diego and Drake are more dominant in modern era"
  - "Has consistent bowl access — last bowl 1958 Refrigerator Bowl (if it counts); no FCS postseason since early 2010s"

# ── STORY CANON (doc 64) — what makes this program unique & amazing. Web-research the deep
#    canon (owner-approved); CITE sources. Orchestrate the existing modules, don't duplicate. ──
story_canon:
  the_unique_thing: "Dayton won NCAA Division III national championships in 1980 and 1989 and compiled 12 Pioneer League titles and a 17-year consecutive winning streak (1987–2003) that proved a small Ohio university could build a dynasty on excellence and institutional commitment."
  the_origin: "A Marianist Catholic university in Dayton, Ohio founded in 1850 that built a football program through the 1970s–1980s into a D-III powerhouse, then transitioned to the Pioneer League in 1993 and sustained excellence for 22 consecutive years."
  golden_ages:
    - { era: "1980, 1989 (D-III era)", what: "Two NCAA Division III national championships under legendary coaching" }
    - { era: "1987–2003 (17-year winning streak)", what: "A remarkable run of consecutive winning seasons that defined an era" }
    - { era: "1993–2015 (Pioneer League dynasty)", what: "Twelve conference titles and multiple FCS playoff appearances over 22 years" }
  legends:
    - { name: Mike Kelly, role: coach, why: "The architect of the D-III championships and the transition to FCS dominance" }
  canonical_moments:
    - { name: "1980 D-III national championship", year: 1980, what: "Dayton wins the NCAA Division III football championship", handling: glory }
    - { name: "1989 D-III national championship", year: 1989, what: "A second D-III national title — proof of sustained excellence", handling: glory }
    - { name: "17-year winning streak (1987–2003)", year: 2003, what: "A remarkable run of consecutive winning seasons that made Dayton synonymous with consistency", handling: glory }
    - { name: "12 Pioneer League titles (1993–2015)", year: 2015, what: "The dynasty era at FCS, ending with the 2015 championship — the program's last national-tier claim", handling: glory }
  the_place: "Welcome Stadium in Dayton, Ohio — the home where the Flyers built two decades of excellence and hosted some of the most consistent FCS programs in the region."
  brand_of_football: "Excellence through institutional commitment — the program that proves a Catholic university and small city can build a football powerhouse through coaching consistency and institutional pride."
  cultural_footprint: "Dayton is proof that a mid-sized Ohio city can sustain Division III and FCS excellence. The program's 30+ years of respectability made it the default regional power and a model for how non-scholarship football works."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Dayton went 7–4 (5–3 PFL) in 2025 under Trevor Andrews in his third year — a respectable
    record that reflects the program's baseline but not the dominance fans expect. Andrews inherited a program measured against
    12 conference titles and a 17-year winning streak; the 7–4 finish is solid, but it's not the automatic playoff conversation that
    Dayton commanded in the 2000s–2010s. The question in Dayton: can Andrews return the program to conference-title contention,
    or has the program settled into a new era of respectability-without-dominance?
  research_checklist:
    - the program's 3–7 most iconic games/plays (D-III championships, PFL title wins)
    - the legendary coaches + players (Mike Kelly, the championship-era coaches)
    - the unique tradition / identity / the one amazing thing (17-year winning streak, D-III titles, 12 PFL championships)
    - the origin + the golden-age dynasty eras (1980–1989 D-III, 1987–2003 winning streak, 1993–2015 PFL)
    - the current-era storyline (Andrews' rebuild toward championship contention)
