  one_line: "The program that's always there: UW-Oshkosh is the WIAC rival that has lived in Whitewater's shadow for 79 years and carries the chronic chip of the little brother who shows up every year."

self_image:
  archetype: perennial-almost
  standard_gap_frame: "Oshkosh is the WIAC program that does everything right — wins bowl games, stays competitive, makes playoff runs — but plays in a conference where Whitewater won six titles, River Falls just won a national championship, and Platteville is winning back-to-back WIAC crowns. The Titans have the right DNA and the wrong era."

the_wound:
  name: "The 79-year record: 31-79-5 vs Whitewater"
  detail: "The all-time series record against UW-Whitewater is 31-79-5. Not even close in the win-loss, but 79 meetings proves Oshkosh belongs at the same table. The wound is living in a legacy rivalry where your program is objectively the weaker sibling — not for a year, not for a decade, but for 79 years of measured underachievement."
  handling: referenceable
  freshness: all-time

the_dream:
  text: "Win a Stagg Bowl. End the title drought. The Titans belong in the national conversation, and the dream is translating the WIAC competency into a championship that changes the all-time narrative."
  drought: { since: 1985, unit: national_title }

the_chip:
  villain: wisconsin-whitewater
  text: "Fans here believe oshkosh's chip is measured in the series record: 31-79-5 all-time against Whitewater. The Titans know they're the more athletic, more consistent program on some years — but the record is the record. The chip is the belief that Oshkosh is built for more than a legacy rivalry that favors the Warhawks 2-to-1."

the_delusion:
  tone: self-aware
  text: "That Oshkosh is, on paper, a national-championship-level program — that the pieces are right, the execution is fine, and the only thing between the Titans and a Stagg Bowl is a scheduling break or a playoff year. The fanbase knows the historical record. They also believe Oshkosh can be different."

the_grudge_texture:
  rival: wisconsin-whitewater
  texture: blood-feud

the_coach_relationship: hot-seat-churn
the_internal_fracture: pride-in-contention vs hunger-for-breakthrough — the faction satisfied with consistent 5+ win seasons and WIAC bowl games vs the faction demanding a Stagg Bowl appearance
register: oshkosh-whitewater-little-brother-chronic-chip
