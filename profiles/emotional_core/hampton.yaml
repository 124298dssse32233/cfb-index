  one_line: "Hampton is the HBCU that won seven Black College National Championships and dominated the MEAC, now rebuilding its identity in the CAA after the move from its home conference stripped the program of its natural habitat."

self_image:
  archetype: blue-blood-fallen
  standard_gap_frame: "Seven Black college national titles and multiple MEAC championships vs two straight losing seasons in the CAA — Hampton knows what it was and is working to reclaim a version of it."

the_wound:
  name: "The CAA transition and the 2024-2025 collapse"
  detail: "Hampton left the MEAC — where it won championships and HBCU titles — for the Big South and then the CAA. The 2025 season produced a 2-10 record (0-8 CAA), the program's worst mark in memory. Head coach Trenton Boykin is in his second year trying to rebuild a roster that has struggled to compete at the CAA level after leaving the HBCU conference ecosystem."
  handling: referenceable
  freshness: this-era

the_dream:
  text: "Rebuild to MEAC-caliber competitiveness inside the CAA — prove Hampton's championship DNA travels to any conference and that the Pirates can win at a level that honors the program's HBCU legacy."
  drought: { since: 2006, unit: conference_title }

the_chip:
  villain: blue_bloods
  text: "The fanbase says Hampton earned its titles when championships were won on the field and that the move to the CAA is proof they're willing to compete at the highest FCS level — they believe the talent pipeline from Hampton Roads and HBCU recruiting can produce a winner anywhere."

the_delusion:
  tone: earnest
  text: "They believe Hampton's championship tradition from the MEAC era translates directly to the CAA — that the program's culture and recruiting footprint in Hampton Roads is enough to compete with programs that have been in FCS major conferences for decades."

the_grudge_texture:
  rival: norfolk-state
  texture: blood-feud

the_coach_relationship: hot-seat-churn
the_internal_fracture: HBCU-identity-preservation vs CAA-integration — the faction that wants Hampton to honor its HBCU roots and sees the conference move as cultural displacement vs the faction that believes competing in the CAA is the path to sustainable FCS relevance

