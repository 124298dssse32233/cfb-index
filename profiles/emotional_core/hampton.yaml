story_canon:
  the_unique_thing: "Hampton is the HBCU that won seven Black College National Championships — including a MEAC three-peat from 2004 to 2006 — and produced one of the most dominant early-2000s runs in HBCU football, then traded its conference home for the CAA in search of a different kind of legitimacy."
  the_origin: "Hampton University has played football since 1902. The Pirates joined the MEAC in 1995 and immediately became a force — winning their first MEAC title in 2001 under Joe Taylor and then peaking with three straight MEAC championships and two straight HBCU national titles (2004-2006). The program left the MEAC for the Big South in 2018 and moved to the CAA in 2023."
  golden_ages:
    - { era: "2001-2006 (Joe Taylor dynasty)", what: "First MEAC title in 2001, then MEAC three-peat (2004-2006) with back-to-back HBCU national titles in 2005 and 2006" }
    - { era: "1997 HBCU championship", what: "Hampton wins the Black college national championship, establishing the program as an HBCU power before the MEAC dynasty" }
  legends:
    - { name: Joe Taylor, role: coach, why: "Built the 2001-2006 dynasty — MEAC four-title run and two HBCU national championships; the definitive coach in program history" }
  canonical_moments:
    - { name: "2001 first MEAC title", year: 2001, what: "Hampton goes undefeated in MEAC play in Joe Taylor's second season — the program's first conference crown", handling: glory }
    - { name: "2004-2006 MEAC three-peat", year: 2006, what: "Three straight MEAC championships and back-to-back HBCU national titles — the peak of program history", handling: glory }
    - { name: "1997 HBCU national championship", year: 1997, what: "Hampton claims the Black college national title, first major championship in the modern era", handling: glory }
  the_place: "Armstrong Stadium in Hampton, Virginia — the home of a program that has played football in the Hampton Roads corridor since 1902."
  brand_of_football: "Physical, disciplined, HBCU-proud — a program built on Hampton Roads recruiting and HBCU football culture that is now testing whether that identity transplants to a Power FCS conference."
  cultural_footprint: "One of the defining HBCU football programs of the early 2000s — Hampton's 2004-2006 dynasty is canon in HBCU circles, and the rivalry with Norfolk State is one of the most charged matchups in Black college football history."
  the_ongoing_story: >
    LIVE ARC — researched 2026-06-13: Hampton went 2-10 (0-8 CAA) in 2025 under second-year head coach
    Trenton Boykin — the program's most difficult season since leaving the MEAC. The Pirates are in the
    middle of an identity reckoning: the conference that birthed their championship culture is gone, and
    the CAA has proven more competitive than anticipated. Boykin's task is to build a roster that can
    compete week-to-week in the CAA while honoring the HBCU tradition that makes Hampton football
    meaningful to its community. The rivalry with Norfolk State continues as a scheduled non-conference
    touchstone — the one game where MEAC-era Hampton still feels present.
