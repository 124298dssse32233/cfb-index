the_wound:
  name: "The option era fade"
  detail: "The Citadel built its identity on the triple option and military tradition, winning the 1992 SoCon title. But the modern FCS has moved away from the option, and the Bulldogs have struggled to compete as a pure-option team in a pass-happy league. The wound isn't failure; it's irrelevance in a sport that left the option behind."
