name: fanintel-ingest-hourly
# STRATEGY §2 Tier 1, hourly. Adapters that gracefully no-op without secrets
# stay here (Wikipedia, GDELT, Kalshi, Polymarket, Bluesky — all free/no-auth).
# Auth-dependent adapters (CFBD, YouTube, SeatGeek, Spotify) short-circuit
# to exit 0 when their secret is absent, so a progressive-enable rollout
# does not flood the Actions tab with errors.
#
# Persistence: W8.1 default — cfb_rankings.db is uploaded as a Workflow
# artifact and re-downloaded on the next run. First run has no prior
# artifact; `actions/download-artifact@v4` + `continue-on-error` lets the
# pipeline start from a fresh DB that `apply-migrations` + seed-* re-create.
on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: read
      actions: read  # cross-workflow artifact download via dawidd6 action
    env:
      CFBD_API_KEY:          ${{ secrets.CFBD_API_KEY }}
      YOUTUBE_API_KEY:       ${{ secrets.YOUTUBE_API_KEY }}
      SEATGEEK_CLIENT_ID:    ${{ secrets.SEATGEEK_CLIENT_ID }}
      SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      CURRENT_CFB_SEASON:    "2026"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Deps
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      # Cross-workflow DB share. actions/download-artifact@v4 only finds
      # artifacts from the current run by default, which silos each
      # workflow's DB. Use the third-party action to pull the most-recent
      # cfb-rankings-db from ANY sibling workflow (daily / wire / mailbag).
      - name: Download prior DB artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Apply migrations + seed (idempotent)
        run: |
          python manage.py init-db
          python manage.py apply-migrations
          python manage.py seed-source-registry
          python manage.py seed-priority-teams
          python manage.py seed-feed-instances

      - name: Free / no-auth sources
        run: |
          set +e
          python tools/run_adapter.py kalshi
          python tools/run_adapter.py polymarket
          python tools/run_adapter.py gdelt_volume
          python tools/run_adapter.py bluesky_curated
          python tools/run_adapter.py bluesky_feeds
          echo "done"

      - name: Auth-required sources (skip if secret absent)
        run: |
          set +e
          python tools/run_adapter.py youtube_meta
          python tools/run_adapter.py seatgeek
          echo "done"

      - name: Google News RSS per team
        run: python tools/run_adapter.py google_news_all

      # Conditional in-season CFBD refresh. Aug–early-Jan is CFB season.
      # Week is approximated as ((today - Aug 20) // 7) + 1, capped to 16.
      # In offseason this step no-ops. Per autonomy: CURRENT_CFB_SEASON env
      # is edited once per year (Aug) — prefer explicit to clever.
      - name: In-season CFBD incremental sync
        run: |
          set +e
          python <<'PY'
          import os, subprocess
          from datetime import date
          today = date.today()
          in_season = (today.month >= 8) or (today.month == 1)
          if not in_season:
              print("out-of-season — skipping CFBD incremental sync")
              raise SystemExit(0)
          anchor_year = today.year if today.month >= 8 else today.year - 1
          anchor = date(anchor_year, 8, 20)
          week = max(1, min(16, (today - anchor).days // 7 + 1))
          season = int(os.environ["CURRENT_CFB_SEASON"])
          print(f"in-season run: season={season} week={week}")
          subprocess.run(
              ["python", "-u", "manage.py", "sync-site-incremental",
               "--season", str(season),
               "--through-week", str(week),
               "--skip-play-level",
               "--skip-heisman",
               "--skip-connectivity-check"],
              check=False,
          )
          PY

      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true
