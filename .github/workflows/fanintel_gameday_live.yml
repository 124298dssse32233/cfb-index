name: fanintel-gameday-live
# Sprint 6 — Live Gameday Mode polling.
#
# Polls CFBD's live-game endpoint every minute on Saturdays during the
# kickoff window (12:00 ET / 16:00 UTC through 06:00 UTC Sun). The adapter
# itself is a graceful no-op when:
#   - no CFBD_API_KEY is configured
#   - no games are in_progress for the active week
#
# Cron note: GitHub Actions cron is UTC. Saturdays during US college season
# = day-of-week 6. We run roughly noon Saturday → early-morning Sunday UTC.
on:
  schedule:
    # Every minute, Saturdays + early Sunday UTC, kickoff-to-postgame window.
    - cron: "* 16-23 * * 6"
    - cron: "* 0-6 * * 0"
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read  # cross-workflow artifact download via dawidd6 action
    env:
      CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Deps
        run: |
          python -m pip install -U pip
          python -m pip install pyyaml
          # Install the cfb_rankings package itself so `python -c "from
          # cfb_rankings.* import ..."` resolves in the Poll step below.
          # Without this the workflow fails with ModuleNotFoundError; only
          # manage.py-routed steps work because manage.py injects src/ onto
          # sys.path. Other workflows (publish-site etc.) already do this.
          python -m pip install -e .

      - name: Download prior DB artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Apply migrations (idempotent)
        run: |
          python manage.py init-db
          python manage.py apply-migrations

      - name: Poll live games
        run: python -c "from cfb_rankings.db import Database; from cfb_rankings.config import AppConfig; from cfb_rankings.ingest.sources.cfbd_live_game import run_poll; import json; print(json.dumps(run_poll(Database(AppConfig.from_env().database_url)), indent=2))"

      - name: Drain render queue
        run: python manage.py process-render-queue --output-dir output/site/teams

      - name: Verify DB artifact healthy before upload
        if: always()
        id: db_sanity
        continue-on-error: true
        run: |
          python scripts/verify_db_artifact_healthy.py cfb_rankings.db

      - name: Upload DB artifact
        if: steps.db_sanity.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 14
          overwrite: true
