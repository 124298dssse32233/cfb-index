name: fanintel-ingest-daily
# STRATEGY §2 Tier 1, daily at 09:00 UTC. Daily-cadence sources: Wikipedia
# pageviews + edits (free), campus newspapers (RSS), school athletics (RSS),
# Locked On team-daily podcast metadata (RSS).
#
# Persistence: W8.1 default — artifact-based. See ingest_hourly.yml for the
# full pattern. First run has no prior artifact; apply-migrations + seed-*
# make that case safe.
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      YOUTUBE_API_KEY:       ${{ secrets.YOUTUBE_API_KEY }}
      SEATGEEK_CLIENT_ID:    ${{ secrets.SEATGEEK_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Deps
        run: |
          python -m pip install -U pip
          python -m pip install pyyaml

      - name: Download prior DB artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .

      - name: Apply migrations + seed (idempotent)
        run: |
          python manage.py apply-migrations
          python manage.py seed-source-registry
          python manage.py seed-priority-teams
          python manage.py seed-feed-instances

      - name: Wikipedia pageviews + edits
        run: |
          set +e
          python tools/run_adapter.py wiki_pv
          python tools/run_adapter.py wiki_edits
          echo "done"
      - name: Campus newspapers
        run: python tools/run_adapter.py campus_news_all
      - name: School athletics
        run: python tools/run_adapter.py athletics_all
      - name: Locked On team-pod metadata
        run: python tools/run_adapter.py locked_on_all
      - name: Beat writer + substack RSS
        run: |
          set +e
          python tools/run_adapter.py beat_writers_all
          python tools/run_adapter.py substack_all
          echo "done"

      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true
