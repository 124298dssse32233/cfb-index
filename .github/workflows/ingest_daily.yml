name: fanintel-ingest-daily
# STRATEGY §2 Tier 1, daily at 09:00 UTC. Daily-cadence sources: Wikipedia
# pageviews + edits (free), campus newspapers (RSS), school athletics (RSS),
# Locked On team-daily podcast metadata (RSS).
#
# Persistence: W8.1 default — artifact-based. See ingest_hourly.yml for the
# full pattern. First run has no prior artifact; apply-migrations + seed-*
# make that case safe.
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      actions: read  # cross-workflow artifact download via dawidd6 action
    env:
      YOUTUBE_API_KEY:       ${{ secrets.YOUTUBE_API_KEY }}
      SEATGEEK_CLIENT_ID:    ${{ secrets.SEATGEEK_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Deps
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Download prior DB artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      # Option B fail-loud (added 2026-05-21): refuse to run against a
      # missing or poisoned DB.
      - name: Verify DB artifact is healthy (Option B fail-loud)
        run: python scripts/verify_db_artifact_healthy.py cfb_rankings.db

      - name: Apply migrations + seed (idempotent)
        run: |
          python manage.py init-db
          python manage.py apply-migrations
          python manage.py seed-source-registry
          python manage.py seed-priority-teams
          python manage.py seed-feed-instances
          python manage.py seed-archetypes

      # WS-01 loud-fail (2026-05-28): per-adapter steps so failures surface.
      - name: wiki_pv
        continue-on-error: true
        run: python tools/run_adapter.py wiki_pv
      - name: wiki_edits
        continue-on-error: true
        run: python tools/run_adapter.py wiki_edits
      - name: Campus newspapers
        continue-on-error: true
        run: python tools/run_adapter.py campus_news_all
      - name: School athletics
        continue-on-error: true
        run: python tools/run_adapter.py athletics_all
      - name: Locked On team-pod metadata
        continue-on-error: true
        run: python tools/run_adapter.py locked_on_all
      - name: Beat writer RSS
        continue-on-error: true
        run: python tools/run_adapter.py beat_writers_all
      - name: Substack RSS
        continue-on-error: true
        run: python tools/run_adapter.py substack_all

      # Bridge: transform raw conversation_documents + source_observations
      # into the compute tables that Daily/Wire/Mailbag actually read.
      # Without this chain, hourly + daily ingest fills source rows but
      # the publishing crons see empty pulse / sentiment / feature tables
      # and fall back to "no signal" stub paths. Each command is wrapped
      # in `|| echo` so a missing input doesn't cascade-fail the workflow.
      - name: Compute fanintel bridge tables
        run: |
          set +e
          # Compute the "current" football season — the calendar year if we're
          # already in the new season's late summer/fall, else the prior year
          # (so Feb-Jul of YYYY runs against season YYYY-1). Mirrors the same
          # derivation used in publish_site.yml.
          SEASON=$(python -c "from datetime import date; t=date.today(); print(t.year if t.month >= 8 else t.year - 1)")
          echo "Tagging team mentions on curated feeds for season=$SEASON"
          # tag-team-mentions must run BEFORE tag-player-mentions: curated feeds
          # (bluesky_curated, substack_*) arrive with no per-team target, and the
          # player tagger only scans docs that already carry a team target. This
          # step writes those team targets so the player tagger — and the whole
          # mood/cohort pipeline — can then pick the curated docs up.
          python manage.py tag-team-mentions --season=$SEASON --commit || echo "tag-team-mentions skipped"
          echo "Tagging player mentions for season=$SEASON"
          # tag-player-mentions (NOT tag-player-names — that legacy name has
          # never existed as a CLI subcommand; the prior workflow text was
          # silently no-op'ing for months via the `|| echo skipped` swallow).
          # --commit actually inserts rows; without it the call is a dry-run.
          python manage.py tag-player-mentions --season=$SEASON --commit || echo "tag-player-mentions skipped"
          python manage.py build-conversation-features || echo "build-conversation-features skipped"
          python manage.py prepare-pulse || echo "prepare-pulse skipped"
          python manage.py classify-player-sentiment || echo "classify-player-sentiment skipped"
          python manage.py extract-predictive-claims || echo "extract-predictive-claims skipped"
          python manage.py compute-surprise-index || echo "compute-surprise-index skipped"
          python manage.py resolve-outcomes || echo "resolve-outcomes skipped"
          echo "fanintel bridge done"

      - name: Classify fanbases
        run: |
          set +e
          SEASON=$(python -c "from datetime import date; t=date.today(); print(t.year if t.month >= 8 else t.year - 1)")
          python manage.py classify-fanbases --season=$SEASON \
              --classifier-version v1.0 \
              --backfill-history 1 || echo "classify-fanbases skipped"

      - name: Populate narrative arcs
        run: |
          set +e
          SEASON=$(python -c "from datetime import date; t=date.today(); print(t.year if t.month >= 8 else t.year - 1)")
          python manage.py populate-arcs --season=$SEASON || echo "populate-arcs skipped"

      - name: Compute player week mood (current ISO week)
        run: |
          set +e
          python <<'PY'
          import subprocess
          from datetime import date
          today = date.today()
          iso_d = today.isocalendar()
          week_key = f"{iso_d[0]}-{iso_d[1]:02d}"
          cmd = ["python", "-u", "manage.py", "compute-player-week-mood", "--week", week_key]
          result = subprocess.run(cmd, check=False)
          print(f"compute-player-week-mood {week_key}: exit={result.returncode}")
          PY
          echo "done"

      - name: Verify DB artifact healthy before upload
        if: always()
        id: db_sanity
        continue-on-error: true
        run: |
          python scripts/verify_db_artifact_healthy.py cfb_rankings.db

      - name: Upload DB artifact
        if: steps.db_sanity.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true
