name: fanintel-ingest-daily
# STRATEGY §2 Tier 1, daily at 09:00 UTC. Daily-cadence sources: Wikipedia
# pageviews + edits (free), campus newspapers (RSS), school athletics (RSS),
# Locked On team-daily podcast metadata (RSS).
#
# Persistence: W8.1 default — artifact-based. See ingest_hourly.yml for the
# full pattern. First run has no prior artifact; apply-migrations + seed-*
# make that case safe.
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read
      actions: read  # cross-workflow artifact download via dawidd6 action
    env:
      YOUTUBE_API_KEY:       ${{ secrets.YOUTUBE_API_KEY }}
      SEATGEEK_CLIENT_ID:    ${{ secrets.SEATGEEK_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Deps
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Download prior DB artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Apply migrations + seed (idempotent)
        run: |
          python manage.py init-db
          python manage.py apply-migrations
          python manage.py seed-source-registry
          python manage.py seed-priority-teams
          python manage.py seed-feed-instances

      - name: Wikipedia pageviews + edits
        run: |
          set +e
          python tools/run_adapter.py wiki_pv
          python tools/run_adapter.py wiki_edits
          echo "done"
      - name: Campus newspapers
        run: python tools/run_adapter.py campus_news_all
      - name: School athletics
        run: python tools/run_adapter.py athletics_all
      - name: Locked On team-pod metadata
        run: python tools/run_adapter.py locked_on_all
      - name: Beat writer + substack RSS
        run: |
          set +e
          python tools/run_adapter.py beat_writers_all
          python tools/run_adapter.py substack_all
          echo "done"

      # Bridge: transform raw conversation_documents + source_observations
      # into the compute tables that Daily/Wire/Mailbag actually read.
      # Without this chain, hourly + daily ingest fills source rows but
      # the publishing crons see empty pulse / sentiment / feature tables
      # and fall back to "no signal" stub paths. Each command is wrapped
      # in `|| echo` so a missing input doesn't cascade-fail the workflow.
      - name: Compute fanintel bridge tables
        run: |
          set +e
          python manage.py tag-player-names || echo "tag-player-names skipped"
          python manage.py build-conversation-features || echo "build-conversation-features skipped"
          python manage.py prepare-pulse || echo "prepare-pulse skipped"
          python manage.py classify-player-sentiment || echo "classify-player-sentiment skipped"
          python manage.py extract-predictive-claims || echo "extract-predictive-claims skipped"
          python manage.py compute-surprise-index || echo "compute-surprise-index skipped"
          python manage.py resolve-outcomes || echo "resolve-outcomes skipped"
          echo "fanintel bridge done"

      - name: Compute player week mood (current ISO week)
        run: |
          set +e
          python <<'PY'
          import subprocess
          from datetime import date
          today = date.today()
          iso_d = today.isocalendar()
          week_key = f"{iso_d[0]}-{iso_d[1]:02d}"
          cmd = ["python", "-u", "manage.py", "compute-player-week-mood", "--week", week_key]
          result = subprocess.run(cmd, check=False)
          print(f"compute-player-week-mood {week_key}: exit={result.returncode}")
          PY
          echo "done"

      - name: Verify DB artifact healthy before upload
        if: always()
        id: db_sanity
        continue-on-error: true
        run: |
          python scripts/verify_db_artifact_healthy.py cfb_rankings.db

      - name: Upload DB artifact
        if: steps.db_sanity.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true
