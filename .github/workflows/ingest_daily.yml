name: fanintel-ingest-daily
# STRATEGY §2 Tier 1, daily at 09:00 UTC. Daily-cadence sources: Wikipedia
# pageviews + edits (free), campus newspapers (RSS), school athletics (RSS),
# Locked On team-daily podcast metadata (RSS).
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      YOUTUBE_API_KEY:       ${{ secrets.YOUTUBE_API_KEY }}
      SEATGEEK_CLIENT_ID:    ${{ secrets.SEATGEEK_CLIENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Deps
        run: |
          python -m pip install -U pip
          python -m pip install pyyaml
      - name: Apply migrations
        run: python manage.py apply-migrations
      - name: Wikipedia pageviews + edits
        run: |
          set +e
          python tools/run_adapter.py wiki_pv
          python tools/run_adapter.py wiki_edits
          echo "done"
      - name: Campus newspapers
        run: python tools/run_adapter.py campus_news_all
      - name: School athletics
        run: python tools/run_adapter.py athletics_all
      - name: Locked On team-pod metadata
        run: python tools/run_adapter.py locked_on_all
