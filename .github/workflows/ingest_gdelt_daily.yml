name: fanintel-ingest-gdelt-daily
# GDELT article-volume on the Alienware self-hosted runner.
#
# Why its own workflow on self-hosted: GDELT's DOC 2.0 API rate-limits
# datacenter/cloud IP ranges hard (HTTP 429), so the GitHub-hosted hourly
# workflow always 0-rowed it. The Alienware runner has a residential IP that
# GDELT does not throttle. Article counts are a daily metric (GDELT buckets
# by day), so daily cadence is the right granularity — hourly was overkill.
#
# Persistence: same artifact pattern as the other ingest workflows — download
# the rolling cfb-rankings-db, run the adapter, re-upload. overwrite:true +
# each workflow downloading latest-before-run makes the shared artifact
# last-write-wins safe (the established pattern across hourly/daily/wire).

on:
  schedule:
    # 13:00 UTC / 08:00 ET — clear of the 09:00 UTC daily ingest and the
    # chronicle-weekly slots.
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      timespan:
        description: 'GDELT timespan (e.g. 7d, 1m, 2y for backfill)'
        required: false
        default: '7d'

# Don't overlap with a previous still-running gdelt sweep (the 5s/team
# throttle means a 21-team run takes ~2 min, but be safe).
concurrency:
  group: ingest-gdelt-daily
  cancel-in-progress: false

jobs:
  run:
    runs-on: [self-hosted, alienware]
    defaults:
      run:
        shell: bash
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read  # cross-workflow artifact download via dawidd6 action
    env:
      # workflow_dispatch can override; default 7d for the daily cron.
      GDELT_TIMESPAN: ${{ github.event.inputs.timespan || '7d' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # System Python on the self-hosted runner — NO actions/setup-python.
      - name: Deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Download prior DB artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Verify DB artifact is healthy (Option B fail-loud)
        run: python scripts/verify_db_artifact_healthy.py cfb_rankings.db

      - name: Apply migrations + seed (idempotent)
        run: |
          python manage.py init-db
          python manage.py apply-migrations
          python manage.py seed-source-registry
          python manage.py seed-priority-teams

      - name: gdelt_volume
        continue-on-error: true
        run: python tools/run_adapter.py gdelt_volume

      - name: Verify DB artifact healthy before upload
        if: always()
        id: db_sanity
        continue-on-error: true
        run: python scripts/verify_db_artifact_healthy.py cfb_rankings.db

      - name: Upload DB artifact
        if: steps.db_sanity.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true
