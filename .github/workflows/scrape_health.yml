name: fanintel-scrape-health
# Daily health canary. Validates feed URLs (HEAD check), prints the
# scrape-health table, fails the workflow if any source has been
# `error` for 3 consecutive days (STRATEGY §7 quarterly review — but
# daily is safer and cheap).
on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Deps
        run: |
          python -m pip install -U pip
          python -m pip install pyyaml
      - name: Apply migrations
        run: python manage.py apply-migrations
      - name: Validate feed URLs
        run: python manage.py validate-feed-urls
      - name: Fan Intelligence status
        run: python manage.py fanintel-status
      - name: Print scrape-health
        run: python manage.py scrape-health --since-days 2
