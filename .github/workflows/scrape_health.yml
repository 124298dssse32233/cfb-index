name: fanintel-scrape-health
# Daily health canary (STRATEGY §7). Validates feed URLs (HEAD check),
# prints the scrape-health table, runs the autopilot status dashboard.
# Also picks up the prior DB artifact so scrape_health row history
# persists across runs — needed for the 3-consecutive-error trigger.
on:
  schedule:
    - cron: "30 11 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read  # cross-workflow artifact download via dawidd6 action
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Deps
        run: |
          python -m pip install -U pip
          python -m pip install pyyaml

      - name: Download prior DB artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      # Option B fail-loud (added 2026-05-21): refuse to run against a
      # missing or poisoned DB.
      - name: Verify DB artifact is healthy (Option B fail-loud)
        run: python scripts/verify_db_artifact_healthy.py cfb_rankings.db

      - name: Apply migrations + seed (idempotent)
        run: |
          python manage.py init-db
          python manage.py apply-migrations
          python manage.py seed-source-registry
          python manage.py seed-priority-teams
          python manage.py seed-feed-instances

      - name: Validate feed URLs
        run: python manage.py validate-feed-urls

      - name: Fan Intelligence status
        run: python manage.py fanintel-status

      - name: Autopilot status dashboard
        run: python manage.py autopilot-status

      - name: Print scrape-health (7 days)
        run: python manage.py scrape-health --since-days 7

      - name: Verify DB artifact healthy before upload
        if: always()
        id: db_sanity
        continue-on-error: true
        run: |
          python scripts/verify_db_artifact_healthy.py cfb_rankings.db

      - name: Upload DB artifact
        if: steps.db_sanity.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true
