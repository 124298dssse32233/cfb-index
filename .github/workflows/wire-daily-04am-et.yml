name: wire-daily-04am-et
# Sprint 12 — The Wire daily refresh.
#
# Pipeline:
#   1. init-db (idempotent CREATE TABLE IF NOT EXISTS schema bootstrap)
#   2. wire-ingest --days 7   — pull last week's transactions; dedup
#   3. wire-generate-editorial — backfill why_it_matters / impact for
#                                new rows (overwrite=False).
#   4. render-wire             — writes output/site/wire/ + patches
#                                the homepage Wire <tbody>.
#   5. Merge with rolling site-state artifact + Vercel deploy.

on:
  schedule:
    - cron: "0 9 * * *"   # 04:00 ET (EDT) / 03:00 ET (EST) — accepted DST drift
  workflow_dispatch:

# Serialize with other site-state-touching workflows. See note in
# the-daily-06am-et.yml for the race-condition this prevents.
concurrency:
  group: site-deploy
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read  # cross-workflow artifact download via dawidd6 action
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Deps
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      # actions/download-artifact@v4 only searches the current run by
      # default. Use the cross-workflow third-party action so the DB
      # carries forward across daily / wire / mailbag / hourly-ingest.
      - name: Download prior DB artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Bootstrap DB schema (idempotent)
        run: python manage.py init-db

      # Seed editions defensively — the Wire homepage patcher needs the
      # active edition to exist for the homepage Wire section to render.
      - name: Seed editions (idempotent)
        run: python manage.py seed-editions || echo "seed-editions skipped"

      - name: Wire — ingest last 7 days of transactions
        run: python manage.py wire-ingest --days 7 --target-count 60

      - name: Wire — generate editorial fields for new entries
        run: python manage.py wire-generate-editorial --days 14

      # ---- Rolling site-state assembly ----
      - name: Download prior site state
        id: dl_site
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-site
          path: prior-site/
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Bootstrap site state from release if no artifact
        if: steps.dl_site.outcome != 'success'
        run: |
          set -e
          mkdir -p prior-site
          gh release download deploy-state-v1 --pattern site-state-bootstrap.tar.gz --output /tmp/seed.tar.gz
          tar -xzf /tmp/seed.tar.gz -C prior-site
          echo "Bootstrapped $(find prior-site -type f | wc -l) files from release."
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }

      - name: Merge wire output into prior site state
        run: |
          set -e
          mkdir -p output/site
          cp -r prior-site/* output/site/ 2>/dev/null || true
          # Re-render wire on the merged tree so /wire/ + homepage patch
          # land in the correct context.
          python manage.py render-wire --days 30
          # Ensure the custom 404 page ships with every deploy.
          cp -f static/404.html output/site/404.html || true
          echo "Merged. Total deployable files: $(find output/site -type f | wc -l)"

      # ---- Vercel deploy ----
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: |
          vercel deploy --prod --yes --archive=tgz \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_ORG_ID

      # Safety gate — see the-daily-06am-et.yml for rationale.
      - name: Sanity-check site before upload
        id: site_check
        run: |
          set +e
          FILE_COUNT=$(find output/site -type f 2>/dev/null | wc -l)
          echo "Found $FILE_COUNT files in output/site"
          if [ "$FILE_COUNT" -lt 3500 ]; then
            echo "::warning::Refusing to upload poisoned tiny site artifact ($FILE_COUNT files)"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          fi

      # ---- Maintain artifacts for next cron ----
      - name: Upload site state for next cron
        if: always() && steps.site_check.outputs.healthy == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-site
          path: output/site/
          retention-days: 14
          overwrite: true

      - name: Verify DB artifact healthy before upload
        if: always()
        id: db_sanity
        continue-on-error: true
        run: |
          python scripts/verify_db_artifact_healthy.py cfb_rankings.db

      - name: Upload DB artifact
        if: steps.db_sanity.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true
