name: publish-site
# Autopilot v1 TASK 8.5 — Monday 11:00 UTC (~06:00 ET) weekly publish.
# Downloads the DB artifact, rebuilds the site (or runs an incremental
# sync during CFB season), uploads output/site/** as an artifact, and
# optionally commits to a `published` branch for GitHub Pages consumption.
on:
  schedule:
    - cron: "0 11 * * 1"
  workflow_dispatch:

# Serialize with daily/wire/mailbag — all touch the cfb-rankings-site
# artifact. See the-daily-06am-et.yml for the race-condition this prevents.
concurrency:
  group: site-deploy
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    # 180, not 90: the enrich step's first-time Heisman weekly backfill (~65 min)
    # + build (~30 min) + deploy exceeded 90 min, so the job was cancelled before
    # uploading the enriched DB artifact. That deadlocked every run — the next run
    # restarted from the same stale artifact and re-ran the full backfill. Once one
    # run completes and persists the enriched DB, steady-state runs skip the backfill
    # and finish well under 90; 180 is corrective headroom.
    timeout-minutes: 180
    permissions:
      contents: write   # pushes to `published` branch
      actions: read     # cross-workflow artifact download via dawidd6 action
    env:
      # Vercel git integration was disconnected 2026-05-21 to stop master
      # auto-deploys from publishing a content-less site (output/ is
      # gitignored). With git disconnected, this workflow must call the
      # Vercel CLI directly to ship the built site to production —
      # otherwise publish-site updates the `published` branch but the live
      # URL never moves.
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      CFBD_API_KEY: ${{ secrets.CFBD_API_KEY }}
      CFBD_PATREON_KEY: ${{ secrets.CFBD_PATREON_KEY }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    # CURRENT_CFB_SEASON intentionally NOT pinned: the inline Python
    # below derives season from today.year so the workflow self-rolls.
    # Previously this was env: CURRENT_CFB_SEASON: "2026" which silently
    # froze the publish at 2026 once the calendar advanced.
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Deps
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Download DB artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      # Overlay with enrich's DB if it's newer. Background: the prior
      # `workflow_search: true` step was empirically picking up publish-
      # site's own previous DB (~348MB) instead of world-class-enrich's
      # newer one (~355MB with fresh Heisman/savant model output) — the
      # "dawidd6 race fix Option B" deferred blocker. Explicit workflow:
      # restricts this overlay to enrich-only, so if enrich ran more
      # recently than the most-recent publish, its DB overwrites the
      # baseline downloaded above.
      #
      # Safety:
      #   - continue-on-error: workflow proceeds if this step fails
      #   - if_no_artifact_found: ignore — silently skip if no enrich
      #     artifact yet (preserves the baseline DB from step above)
      #   - workflow_conclusion: success — only consider successful
      #     enrich runs (avoids picking up a partial DB from a failed
      #     mid-write)
      #   - Failure mode is bounded: if both downloads silently fail,
      #     `Apply migrations + seed` creates a fresh empty DB →
      #     `build-site` produces near-empty output →
      #     `Verify build produced fresh pages` catches TEAM_COUNT < 100
      #     and fails the workflow → no broken push to origin/published.
      - name: Overlay with enrich's DB if newer (dawidd6 race fix)
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow: world_class_enrich.yml
          workflow_conclusion: success
          if_no_artifact_found: ignore

      # Option B fail-loud: refuse to run against a missing or poisoned DB.
      # The dawidd6 download is continue-on-error: it silently falls through
      # to "no DB" if the artifact can't be fetched. Without this gate,
      # init-db would create an empty schema, the build would proceed, and
      # we'd assign fresh autoincrement player_ids — turning every existing
      # /players/<name>-<id>.html URL into a 404. Fail-loud here so the
      # rolling artifact stays at its last healthy state.
      # See docs/research/player-id-stability-scoping-2026-05-21.md.
      - name: Verify DB artifact is healthy (Option B fail-loud)
        run: python scripts/verify_db_artifact_healthy.py cfb_rankings.db

      - name: Apply migrations + seed (idempotent)
        run: |
          python manage.py init-db
          python manage.py apply-migrations
          python manage.py seed-source-registry
          python manage.py seed-priority-teams
          python manage.py seed-feed-instances
          # Self-heal stale current-conference identity from latest team_seasons
          # (realignment: Texas/OU->SEC, Oregon/USC/UW/UCLA->Big Ten, etc.)
          python manage.py repair-team-current-identity

      # Start from the last healthy site state. If build-site fails
      # (FK constraint, etc.), this preserves all the team / player /
      # rankings pages from the prior healthy artifact. The
      # methodology, editions, and storylines refresh steps below
      # overlay their slices on top, so publish-site behaves like
      # daily/wire/mailbag: incremental update, not from-scratch wipe.
      - name: Download prior site state
        id: dl_site
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-site
          path: prior-site/
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Bootstrap site state from release if no artifact
        if: steps.dl_site.outcome != 'success'
        run: |
          set -e
          mkdir -p prior-site
          gh release download deploy-state-v1 --pattern site-state-bootstrap.tar.gz --output /tmp/seed.tar.gz
          tar -xzf /tmp/seed.tar.gz -C prior-site
          echo "Bootstrapped $(find prior-site -type f | wc -l) files from release."
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }

      - name: Seed output/site from prior state
        run: |
          set -e
          mkdir -p output/site
          cp -r prior-site/* output/site/ 2>/dev/null || true
          echo "Seeded output/site with $(find output/site -type f | wc -l) files from prior state"

      - name: Enrich CFBD data (NFL Draft + postseason)
        # 2026-05-23: Activates NFL Draft Pipeline + Bowl History modules on
        # every team page. Both ingests are non-fatal — if CFBD is rate-limited
        # or down the rest of the publish still ships. NFL draft is 8 years
        # of data + ~2,000 picks. Postseason is 7 years of bowl/CFP games.
        # Both upsert idempotently so re-running is cheap.
        run: |
          set +e
          if [ -z "$CFBD_API_KEY" ]; then
            echo "::warning::CFBD_API_KEY not set — skipping enrich ingests"
            exit 0
          fi
          echo "[enrich] NFL Draft 2018-2025..."
          python manage.py ingest-nfl-draft --start-year 2018 --end-year 2025 2>&1 | tail -5
          echo "[enrich] Postseason backfill 2018-2024..."
          for yr in 2018 2019 2020 2021 2022 2023 2024; do
            python manage.py ingest-cfbd-week --season $yr --week 1 --season-type postseason --skip-play-level --skip-lines --skip-weather --skip-advanced-stats 2>&1 | tail -1
          done
          echo "[enrich] Coaches 2018-2024..."
          python manage.py ingest-cfbd-coaches --start-year 2018 --end-year 2024 2>&1 | tail -10
          echo "[enrich] Wiki All-America consensus 2022-2024..."
          python manage.py scrape-wiki-awards --start-year 2022 --end-year 2024 --auto-import 2>&1 | tail -10
          echo "[enrich] Heisman model weekly backfill (multi-week trajectory)..."
          # Only run weeks not already in the DB. Each week takes ~5 min;
          # skipping existing ones keeps the enrich step short on most runs.
          for wk in 6 8 10 12 14 16; do
            count=$(python -c "import sqlite3; print(sqlite3.connect('cfb_rankings.db').cursor().execute('SELECT COUNT(*) FROM heisman_rankings_weekly WHERE season_year=2024 AND week='+str($wk)).fetchone()[0])" 2>/dev/null || echo 0)
            if [ "$count" -lt 1000 ]; then
              echo "[enrich] Heisman model 2024 week $wk (count=$count, backfilling)..."
              python -u manage.py run-heisman-model --season 2024 --through-week $wk 2>&1 | tail -3
            else
              echo "[enrich] Heisman model 2024 week $wk already has $count rows — skip"
            fi
          done
          echo "[enrich] done"

      - name: Regenerate Chronicle Visuals (apply relevance gates + retire dead cards)
        run: |
          # Deterministic SVG regen (~80s for ~190 teams, no LLM / no API cost).
          # --force is required so previously-cached dead cards (e.g. a Heisman
          # braid on a team with no contender) re-run their relevance gate and
          # get retired; without --force the cache hit short-circuits the gate.
          # Non-fatal: the team-page renderer degrades gracefully if visuals are
          # missing, so a regen hiccup must never block the whole publish.
          python <<'PY'
          import sqlite3, subprocess
          try:
              con = sqlite3.connect("cfb_rankings.db")
              row = con.execute("SELECT MAX(season_year) FROM games").fetchone()
              con.close()
              max_games = row[0] if row and row[0] else None
          except Exception as exc:
              print(f"[visuals] could not read latest games season ({exc}) — skipping regen")
              raise SystemExit(0)
          if not max_games:
              print("[visuals] no games season found — skipping regen")
              raise SystemExit(0)
          # Preview season = latest completed games season + 1, so retrospective
          # visuals (effective season-1) always have game data and forward
          # visuals read the freshest recruiting/portal/returning cycle.
          preview = int(max_games) + 1
          print(f"[visuals] force-regen preview season={preview} (max games={max_games})")
          subprocess.run(
              ["python", "-u", "manage.py", "generate-chronicle-visuals",
               "--season", str(preview), "--force"],
              check=False,
          )
          PY

      - name: Build or incrementally sync
        id: site_build
        run: |
          # set -e: propagate failure. Historical bug (fixed 2026-05-15):
          # `set +e` + `check=False` masked build-site non-zero exits, the
          # prior-site cache (seeded into output/site above) passed the
          # >=5000-files sanity gate, and the workflow uploaded stale
          # content as a 'fresh' artifact. 2026-05-15 manifestation:
          # publish_site.yml ran 1m 33s post-backfill and pushed 17 files
          # while a real rebuild was expected to produce >17k page diffs.
          # See IMPLEMENTATION_PLAN.md Part 4 Sprint v5-1 Day 1 Patch 3.
          set -e
          python <<'PY'
          import os, subprocess, sys
          from datetime import date
          today = date.today()
          in_season = (today.month >= 8) or (today.month == 1)
          season = int(os.environ.get("CURRENT_CFB_SEASON", str(today.year)))
          if in_season:
              anchor_year = today.year if today.month >= 8 else today.year - 1
              anchor = date(anchor_year, 8, 20)
              week = max(1, min(16, (today - anchor).days // 7 + 1))
              print(f"[publish] in-season incremental sync: season={season} week={week}")
              rc = subprocess.run(
                  ["python", "-u", "manage.py", "sync-site-incremental",
                   "--season", str(season),
                   "--through-week", str(week),
                   "--skip-play-level",
                   "--skip-heisman",
                   "--skip-connectivity-check"],
                  check=False,
              ).returncode
          else:
              print("[publish] out-of-season full site rebuild")
              rc = subprocess.run(
                  ["python", "-u", "manage.py", "build-site"],
                  check=False,
              ).returncode
          # Propagate build failure to the GitHub Action — do not allow
          # subsequent steps to bake a stale prior-site cache into the
          # uploaded artifact.
          if rc != 0:
              print(f"::error::build/sync exited non-zero (rc={rc}); failing the workflow")
              sys.exit(rc)
          PY

      - name: Verify build produced fresh pages
        run: |
          # Defense-in-depth against silent failures. Even if build-site
          # exits 0, count modified files to confirm a real rebuild happened.
          # `find -newer prior-site` matches files modified after the
          # prior-site directory was seeded; a healthy rebuild touches
          # thousands. Anything under 100 indicates the rebuild did not run.
          MODIFIED=$(find output/site -type f -newer prior-site 2>/dev/null | wc -l)
          TEAM_COUNT=$(find output/site/teams -name "*.html" 2>/dev/null | wc -l)
          echo "Build verification: $MODIFIED files modified vs prior-site, $TEAM_COUNT team pages present"
          if [ "$TEAM_COUNT" -lt 100 ]; then
            echo "::error::Only $TEAM_COUNT team pages found — build-site likely produced near-empty output"
            exit 1
          fi
          if [ "$MODIFIED" -lt 100 ]; then
            echo "::warning::Only $MODIFIED files freshly modified — incremental sync may have been a no-op or skipped most pages"
          fi

      - name: Verify world-class team pages
        # 2026-05-23: Catches the silent-fail bug where render_all_profiled_pages
        # drops some slugs in CI and the legacy reporting.py output stays in
        # place (because prior-site overlay seeded a legacy file and the
        # delete-sweep preserved it). Fails the build if any real FBS team
        # ships premium-team-hero chrome instead of team-page chrome.
        run: |
          python scripts/verify_world_class_team_pages.py --site-dir output/site --db cfb_rankings.db

      - name: Verify world-class player pages
        # Session 14: Catches silent regressions in render_player_page_html
        # injection of the 8 player-pages v2 modules (Standing Rail, Mirror
        # Match, Career Arc, Coaching Lineage, Heisman Trajectory, Dev
        # Trajectory, Selector Grid, Live Signal Flow). Samples top players
        # from heisman_rankings_weekly and verifies required v2 markers.
        run: |
          python scripts/verify_world_class_player_pages.py --site-dir output/site --db cfb_rankings.db --sample-size 20

      - name: Build Cmd-K search index
        # Ships output/site/search-index.json so the Cmd-K overlay's
        # client-side search has a real dataset (~500KB-1MB depending
        # on player count). The overlay is wired in cfb-index.css/js
        # globally and triggered by the ⌘K button in the topbar.
        # continue-on-error so a transient failure doesn't sink the
        # whole publish; cmdk.js falls back to a friendly empty-state.
        run: |
          set +e
          python manage.py build-search-index --output output/site/search-index.json
          if [ -f output/site/search-index.json ]; then
            echo "search-index.json: $(stat -c%s output/site/search-index.json 2>/dev/null || stat -f%z output/site/search-index.json) bytes"
          else
            echo "::warning::search-index.json missing — Cmd-K overlay will degrade gracefully"
          fi
          echo "done"
        continue-on-error: true

      - name: Refresh methodology + freshness pages
        run: |
          set +e
          python manage.py build-methodology
          echo "done"

      - name: Refresh editions archive
        run: |
          set +e
          python manage.py build-editions-archive
          echo "done"

      # Re-render all backfilled editions so /editions/<slug>/index.html
      # exists for every published edition. Without this, navigating up
      # from an article URL hits 404. seed-editions makes sure the DB
      # has the payloads; render-edition writes the index + article
      # pages for the slug. NOTE: render-edition rewrites output/site/
      # index.html, so it MUST run before the wcfb post-process steps.
      - name: Refresh backfilled edition pages
        run: |
          set +e
          python manage.py seed-editions || echo "seed-editions skipped"
          # Session 6 (2026-05-22): receipt-pattern backfill + W18/W19
          # force-reseed. The seed bodies for W18/W19 now embed [N]
          # markers; force-reseed bypasses upsert preservation so the
          # marker-bearing seed wins back. Then backfill citation rows
          # so the inline markers anchor to a populated footer. All
          # three CLIs are idempotent and `|| true` so a single-edition
          # failure doesn't break the whole publish.
          python manage.py force-reseed-feature --slug 2026-w18 --feature-order 1 || true
          python manage.py force-reseed-feature --slug 2026-w18 --feature-order 3 || true
          python manage.py force-reseed-feature --slug 2026-w19 --feature-order 1 || true
          python manage.py force-reseed-feature --slug 2026-w19 --feature-order 3 || true
          python manage.py backfill-edition-citations --slug 2026-w17 || true
          python manage.py backfill-edition-citations --slug 2026-w18 || true
          python manage.py backfill-edition-citations --slug 2026-w19 || true
          # Hotfix-11: iterate over all editions in the DB instead of a
          # hardcoded slug list. The old loop was pinned to W14-W17 and
          # missed every subsequent edition (W18, W19, ...), so the
          # archive's "Read the cover essay →" CTAs 404'd and the
          # homepage's active-edition link dead-ended. The DB query is
          # the source of truth — seed-editions above guarantees every
          # known slug exists before this loop runs.
          SLUGS=$(python -c "
          import sqlite3
          conn = sqlite3.connect('cfb_rankings.db')
          for r in conn.execute('SELECT edition_slug FROM editions ORDER BY publish_date').fetchall():
              print(r[0])
          conn.close()
          ")
          echo "rendering edition article pages for: $SLUGS"
          for SLUG in $SLUGS; do
            python manage.py render-edition --slug "$SLUG" || echo "render-edition $SLUG skipped"
          done
          echo "done"

      # Re-render storylines (re-seeds from seeds/ + writes thread pages
      # + index.html). build-site doesn't regenerate the storylines
      # surface, so without this the storylines index drifts from the
      # current renderer logic (e.g. the Dormant pill for stale threads).
      - name: Refresh storylines index
        run: |
          set +e
          python manage.py render-storylines
          echo "done"

      # Session 6 — re-render the four Database-archetype surfaces that
      # have their own dedicated renderers + workflows. Without these
      # calls inside publish-site, code changes to wire/daily/portal-
      # heat/recruit-board renderers don't deploy until the surface's
      # own cron fires. All idempotent + `|| true` so a single-surface
      # failure doesn't break the publish.
      - name: Refresh Database-archetype surfaces (Session 6)
        run: |
          set +e
          python manage.py render-wire --days 30 || echo "render-wire skipped"
          python manage.py refresh-portal-heat || echo "refresh-portal-heat skipped"
          python manage.py refresh-recruiting-pulse || echo "refresh-recruiting-pulse skipped"
          python manage.py render-daily || echo "render-daily skipped"
          echo "done"

      - name: Refresh Canon pages (Phase 9 a11y template fix)
        # The canon renderer (canon/templates/*.html → output/site/canon/)
        # isn't invoked by build-site. Phase 9 added canon-skip-link +
        # id="main-content" to the templates but the live HTML lagged
        # because there was no rebuild step. Run render-canon-all so
        # every template change ships on the next publish.
        run: |
          set +e
          python manage.py render-canon-all --output-dir output/site || echo "render-canon-all skipped"
          echo "done"

      # ====================================================================
      # POST-PROCESS LAYER — must run AFTER all renderers that write
      # files in output/site/, otherwise their writes will erase the
      # injected wcfb markers, logo IMG tags, etc.
      # ====================================================================

      - name: Inject team logos into rankings
        run: python tools/inject_rankings_logos.py

      - name: Decorate rankings table for mobile card-view
        run: python tools/wcfb_enhancements/decorate_rankings_table.py

      - name: Build /compare/ landing page (World-Class plan Phase 3.2)
        run: |
          set +e
          python -m pip install pyyaml --quiet 2>&1 | tail -3
          python tools/wcfb_enhancements/build_compare.py
          echo "done"

      - name: Build /offseason/ + /film-room/ hubs (committed nav links)
        # Both are linked from the global _site_nav (reporting.py _site_nav)
        # but generated only by standalone scripts, NOT by build-site. Without
        # regenerating them here, a fresh build (or a build seeded from a
        # rolling artifact that predates these pages) ships nav links that
        # 404 sitewide. Non-fatal: a hub failure must not block the deploy.
        run: |
          set +e
          python scripts/build_offseason_leaderboards.py
          echo "offseason hub: $(ls -la output/site/offseason/index.html 2>/dev/null || echo missing)"
          python scripts/build_film_room.py
          echo "film-room: $(ls -la output/site/film-room/index.html 2>/dev/null || echo missing)"
          echo "done"

      - name: Install World-Class enhancement layer (CSS+JS+HTML inject)
        run: python tools/wcfb_enhancements/install.py

      - name: Ensure custom 404 ships with the deploy
        # The rolling site-state artifact doesn't always include 404.html
        # (it'd disappear if a fresh build started from scratch). Match the
        # pattern the daily/wire/mailbag workflows already use: copy the
        # canonical static/404.html into output/site each publish. Without
        # this, Vercel falls back to its branded NOT_FOUND page.
        run: |
          cp -f static/404.html output/site/404.html || true
          echo "404.html copy: $(ls -la output/site/404.html 2>/dev/null || echo missing)"

      - name: Write .vercelignore for published branch
        run: python tools/write_published_vercelignore.py

      # Safety gate: only upload the cfb-rankings-site artifact if the
      # build produced a full site. If build-site failed silently (it's
      # wrapped in set +e + check=False), output/site can be near-empty,
      # and uploading that as cfb-rankings-site POISONS the rolling
      # state — every subsequent daily/wire/mailbag run downloads the
      # poisoned tiny artifact and deploys an almost-empty site. That
      # happened today: publish-site uploaded a 478KB artifact, then
      # every cron after that deployed the broken state.
      #
      # Healthy site is ~17,000+ files (~200MB+). 5000 is a conservative
      # floor that catches "build-site failed but mailbag/daily/wire
      # still made it" too — those workflows only emit hundreds of
      # files, not thousands.
      - name: Sanity-check site before upload
        id: site_check
        run: |
          set +e
          FILE_COUNT=$(find output/site -type f 2>/dev/null | wc -l)
          echo "file_count=$FILE_COUNT" >> "$GITHUB_OUTPUT"
          echo "Found $FILE_COUNT files in output/site"
          if [ "$FILE_COUNT" -lt 3500 ]; then
            echo "::warning::output/site has only $FILE_COUNT files — refusing to upload poisoned artifact"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          fi

      # ---- Vercel deploy ----
      # Added 2026-05-21 after disconnecting Vercel git integration. Without
      # this, publish-site updates the cfb-rankings-site artifact and the
      # `published` branch but the live URL never moves. Mirrors the pattern
      # in the-daily-06am-et.yml / wire-daily-04am-et.yml / mailbag.
      - name: Install Vercel CLI
        if: steps.site_check.outputs.healthy == 'true'
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        if: steps.site_check.outputs.healthy == 'true'
        id: vercel_deploy
        # Run from repo root so vercel.json (outputDirectory: output/site)
        # applies — matches the-daily-06am-et.yml pattern. Adding
        # working-directory: output/site would break the deploy because
        # vercel.json doesn't live there.
        #
        # 2026-05-23: Capture the production deployment URL so we can alias
        # the short public URL to it. Vercel's --prod aliases to a scoped URL
        # but the user-facing wonderful-margulis-8ec96b.vercel.app short alias
        # doesn't auto-rotate on every deploy.
        run: |
          set +e
          DEPLOY_LOG=$(mktemp)
          vercel deploy --prod --yes --archive=tgz \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_ORG_ID 2>&1 | tee "$DEPLOY_LOG"
          # Find the production deployment URL — it's the FIRST https://... vercel.app
          # URL that contains a deployment hash (e.g. h3ulpujuj). Strip ANSI codes,
          # extract just the URL on the line starting with "Production" or matching
          # the production pattern.
          DEPLOY_URL=$(sed -E 's/\x1B\[[0-9;]*[mGKHFJ]//g' "$DEPLOY_LOG" \
            | grep -oE 'https://wonderful-margulis-8ec96b-[a-z0-9]+-[a-z0-9-]+\.vercel\.app' \
            | head -1)
          rm -f "$DEPLOY_LOG"
          echo "Captured DEPLOY_URL=[$DEPLOY_URL]"
          echo "deploy_url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Alias short public URL to new deployment
        if: steps.site_check.outputs.healthy == 'true' && steps.vercel_deploy.outputs.deploy_url
        # 2026-05-23: Force the short alias to the new deployment so the
        # public-facing URL serves the freshly-built content.
        run: |
          set +e
          DEPLOY_URL="${{ steps.vercel_deploy.outputs.deploy_url }}"
          echo "Aliasing wonderful-margulis-8ec96b.vercel.app → $DEPLOY_URL"
          vercel alias set "$DEPLOY_URL" wonderful-margulis-8ec96b.vercel.app \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_ORG_ID
          STATUS=$?
          if [ $STATUS -ne 0 ]; then
            echo "::warning::vercel alias set returned $STATUS — may need manual rotation"
          fi
          echo "done (exit $STATUS)"

      - name: Upload site artifact
        if: always() && steps.site_check.outputs.healthy == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-site
          path: output/site
          retention-days: 14
          overwrite: true

      - name: Verify DB artifact healthy before upload
        if: always()
        id: db_sanity
        continue-on-error: true
        run: |
          python scripts/verify_db_artifact_healthy.py cfb_rankings.db

      - name: Upload DB artifact
        if: steps.db_sanity.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true

      # Optional: commit output/site/** to a `published` branch. Requires
      # GITHUB_TOKEN to have contents:write (default for workflow-triggered
      # pushes). Skip if the `published` branch push endpoint returns 403.
      - name: Push to published branch
        if: success()
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage the built site outside the working tree so the branch
          # switch doesn't fail on dirty working-dir. Historical bug
          # (fixed 2026-05-14): `git checkout -B published origin/published`
          # would silently fail because output/site/** has uncommitted
          # changes from the build step, the commit would land on master
          # locally, and `git push origin published --force-with-lease`
          # would then fail (because local published was untouched) —
          # the failure was swallowed by `|| echo "publish push failed"`,
          # so the workflow reported success while no deploy happened.
          SITE_TMP="$(mktemp -d)"
          cp -a output/site/. "$SITE_TMP/"

          # Embed a self-contained vercel.json so the published branch
          # always serves from root (outputDirectory: ".") regardless of
          # what the Vercel project-level setting says. Without this,
          # Vercel falls back to the project setting which may be wrong.
          echo '{"$schema":"https://openapi.vercel.sh/vercel.json","buildCommand":null,"outputDirectory":".","framework":null,"cleanUrls":false,"trailingSlash":true,"rewrites":[{"source":"/:slug([a-z][a-z0-9-]+).html","destination":"/teams/:slug.html"}]}' > "$SITE_TMP/vercel.json"

          # Discard build artifacts so checkout proceeds cleanly. The
          # source-of-truth is master; nothing here is worth saving.
          git reset --hard HEAD
          git clean -fdx

          git fetch origin published || true
          if git show-ref --verify --quiet refs/remotes/origin/published; then
            git checkout -B published origin/published
          else
            git checkout --orphan published
            git rm -rf . 2>/dev/null || true
          fi

          # Replace the deploy tree with the freshly-built site.
          rm -rf ./assets ./rankings ./teams ./players ./heisman ./hub ./methodology ./editions ./archive ./programs ./history ./conferences ./compare ./matchups ./about-model ./output || true
          cp -a "$SITE_TMP"/. ./
          rm -rf "$SITE_TMP"

          git add -A
          if git diff --cached --quiet; then
            echo "nothing to commit — published is already up to date"
            exit 0
          fi
          git commit -m "publish: weekly rebuild $(date -u +%Y-%m-%dT%H:%MZ)"

          # Push and verify. Hard-fail on push errors so we never again
          # report a successful workflow while the deploy quietly fell
          # on the floor.
          if ! git push origin published --force-with-lease; then
            echo "::error::failed to push to published branch — check GITHUB_TOKEN contents:write permission"
            exit 1
          fi
          echo "✓ pushed $(git rev-parse --short HEAD) to origin/published"
