name: backfill-full-history
# Full historical backfill from 2014 to present.
#
# Phases:
#   1. CFBD preseason  — teams, rosters, recruiting for every season
#   2. CFBD history    — games, stats, rankings + model runs (backfill-cfbd-history)
#   3. Player context  — usage, value, rankings per season
#   4. Game player stats — game-level individual stat lines
#   5. Reddit offseason — Arctic Shift historical collection (offseason weeks)
#   6. Fan intel       — fanbase classification + mood/cohort compute
#   7. Upload DB artifact
#
# Estimated runtime: 3-6 hours depending on inputs.
# Run this once; the daily/weekly/hourly workflows keep data current going forward.

on:
  workflow_dispatch:
    inputs:
      start_season:
        description: "First CFB season year (default: 2014)"
        required: false
        default: "2014"
      end_season:
        description: "Last completed CFB season year (default: 2025)"
        required: false
        default: "2025"
      skip_reddit:
        description: "Skip Reddit offseason backfill (saves ~2-3 hrs)"
        type: boolean
        required: false
        default: false
      skip_player_stats:
        description: "Skip player context + game-level stats (saves ~1 hr)"
        type: boolean
        required: false
        default: false
      skip_models:
        description: "Skip model runs during CFBD history backfill"
        type: boolean
        required: false
        default: false

# Serialize with other site workflows to avoid artifact collisions.
concurrency:
  group: site-deploy
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360    # 6-hour cap; sufficient for 2014-2025 full run
    permissions:
      contents: read
      actions: write          # needed to dispatch publish-site at the end
    env:
      CFBD_API_KEY:           ${{ secrets.CFBD_API_KEY }}
      CFBD_PATREON_KEY:       ${{ secrets.CFBD_PATREON_KEY }}
      YOUTUBE_API_KEY:        ${{ secrets.YOUTUBE_API_KEY }}
      SEATGEEK_CLIENT_ID:     ${{ secrets.SEATGEEK_CLIENT_ID }}
      SPOTIFY_CLIENT_ID:      ${{ secrets.SPOTIFY_CLIENT_ID }}
      ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Install deps
        run: |
          python -m pip install -U pip
          python -m pip install pyyaml

      # ── Download latest DB ──────────────────────────────────────────────
      - name: Download prior DB artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Apply migrations + seed (idempotent)
        run: |
          python manage.py init-db
          python manage.py apply-migrations
          python manage.py seed-source-registry
          python manage.py seed-priority-teams
          python manage.py seed-feed-instances

      # ── CFBD API health check ───────────────────────────────────────────
      - name: Verify CFBD API key
        run: |
          python <<'PY'
          import os, urllib.request, urllib.error
          key = os.environ.get("CFBD_API_KEY", "")
          if not key:
              print("::error::CFBD_API_KEY secret is empty — aborting")
              raise SystemExit(1)
          req = urllib.request.Request(
              "https://apinext.collegefootballdata.com/teams/fbs?year=2025",
              headers={"Authorization": f"Bearer {key}"},
          )
          try:
              with urllib.request.urlopen(req, timeout=20) as r:
                  body_len = len(r.read())
              print(f"CFBD API OK: HTTP {r.status}, {body_len} bytes")
          except urllib.error.HTTPError as e:
              print(f"::error::CFBD API HTTP {e.code}: {e.reason}")
              raise SystemExit(1)
          except Exception as e:
              print(f"::error::CFBD API error: {e}")
              raise SystemExit(1)
          PY

      # ════════════════════════════════════════════════════════════════════
      # PHASE 1 — Preseason: teams, rosters, recruiting (every season)
      # ════════════════════════════════════════════════════════════════════
      - name: "Phase 1 — Ingest preseason (teams/rosters/recruiting) ${{ github.event.inputs.start_season || '2014' }}-2026"
        run: |
          set +e
          START="${{ github.event.inputs.start_season || '2014' }}"
          END="${{ github.event.inputs.end_season || '2025' }}"
          for SEASON in $(seq "$START" "$END"); do
            echo "── Preseason FBS $SEASON ──"
            python -u manage.py ingest-cfbd-preseason \
              --season "$SEASON" --classification fbs \
              || echo "preseason fbs $SEASON failed (continuing)"
            echo "── Preseason FCS $SEASON ──"
            python -u manage.py ingest-cfbd-preseason \
              --season "$SEASON" --classification fcs \
              || echo "preseason fcs $SEASON failed (continuing)"
          done
          # 2026 off-season rosters (current year, no games yet)
          echo "── Preseason FBS 2026 (current off-season) ──"
          python -u manage.py ingest-cfbd-preseason --season 2026 --classification fbs \
            || echo "preseason fbs 2026 failed (continuing)"
          python -u manage.py ingest-cfbd-preseason --season 2026 --classification fcs \
            || echo "preseason fcs 2026 failed (continuing)"
          echo "Phase 1 done"

      # ════════════════════════════════════════════════════════════════════
      # PHASE 2 — CFBD history: games, stats, power ratings, model runs
      # ════════════════════════════════════════════════════════════════════
      - name: "Phase 2 — CFBD game history + model runs ${{ github.event.inputs.start_season || '2014' }}-${{ github.event.inputs.end_season || '2025' }}"
        run: |
          set +e
          START="${{ github.event.inputs.start_season || '2014' }}"
          END="${{ github.event.inputs.end_season || '2025' }}"
          SKIP_MODELS="${{ github.event.inputs.skip_models }}"
          MODELS_FLAG=""
          if [ "$SKIP_MODELS" != "true" ]; then
            MODELS_FLAG="--run-models"
          fi
          python -u manage.py backfill-cfbd-history \
            --start-season "$START" \
            --end-season   "$END" \
            --include-postseason \
            --skip-play-level \
            --skip-heisman \
            --skip-connectivity-check \
            $MODELS_FLAG \
            || echo "backfill-cfbd-history exited non-zero (continuing)"
          echo "Phase 2 done"

      # ════════════════════════════════════════════════════════════════════
      # PHASE 3 — Player context (usage, value, recruiting rankings)
      # ════════════════════════════════════════════════════════════════════
      - name: "Phase 3 — Player context (usage/value/rankings)"
        if: ${{ github.event.inputs.skip_player_stats != 'true' }}
        run: |
          set +e
          python -u manage.py backfill-player-context \
            --start-season "${{ github.event.inputs.start_season || '2014' }}" \
            --end-season   "${{ github.event.inputs.end_season   || '2025' }}" \
            --skip-connectivity-check \
            || echo "backfill-player-context exited non-zero (continuing)"
          echo "Phase 3 done"

      # ════════════════════════════════════════════════════════════════════
      # PHASE 4 — Game-level player stats (PPA, rushing, receiving, etc.)
      # ════════════════════════════════════════════════════════════════════
      - name: "Phase 4 — Game-level player stats"
        if: ${{ github.event.inputs.skip_player_stats != 'true' }}
        run: |
          set +e
          python -u manage.py backfill-game-player-stats \
            --start-season "${{ github.event.inputs.start_season || '2014' }}" \
            --end-season   "${{ github.event.inputs.end_season   || '2025' }}" \
            --include-postseason \
            --missing-only \
            --skip-connectivity-check \
            || echo "backfill-game-player-stats exited non-zero (continuing)"
          echo "Phase 4 done"

      # ════════════════════════════════════════════════════════════════════
      # PHASE 5 — Reddit offseason conversations (Arctic Shift archive)
      #
      # Collects offseason Reddit discussion for each season (weeks 21-31 =
      # late-May through early-August, when fan anticipation peaks).
      # Arctic Shift has full Reddit history back to ~2013.
      # Skippable if you want a faster run (--skip-reddit=true).
      # ════════════════════════════════════════════════════════════════════
      - name: "Phase 5 — Reddit offseason backfill ${{ github.event.inputs.start_season || '2014' }}-${{ github.event.inputs.end_season || '2025' }}"
        if: ${{ github.event.inputs.skip_reddit != 'true' }}
        run: |
          set +e
          START="${{ github.event.inputs.start_season || '2014' }}"
          END="${{ github.event.inputs.end_season || '2025' }}"
          for SEASON in $(seq "$START" "$END"); do
            echo "── Reddit offseason backfill: season $SEASON ──"
            python -u manage.py backfill-offseason-conversation \
              --season             "$SEASON" \
              --provider           arctic-shift \
              --window             "21..31" \
              --limit-per-query    200 \
              --collect-comments \
              --comment-post-limit 50 \
              --comments-per-post  50 \
              --min-comment-post-replies 3 \
              --continue-on-error \
              || echo "Reddit backfill season $SEASON failed (continuing)"
          done
          echo "Phase 5 done"

      # ════════════════════════════════════════════════════════════════════
      # PHASE 6 — Fan intelligence: fanbase classification + mood compute
      # ════════════════════════════════════════════════════════════════════
      - name: "Phase 6a — Classify fanbases (all seasons)"
        run: |
          set +e
          END="${{ github.event.inputs.end_season || '2025' }}"
          START="${{ github.event.inputs.start_season || '2014' }}"
          SEASONS_BACK=$(( END - START ))
          python -u manage.py classify-fanbases \
            --season "$END" \
            --backfill-history "$SEASONS_BACK" \
            || echo "classify-fanbases failed (continuing)"
          echo "Phase 6a done"

      - name: "Phase 6b — Compute weekly mood (recent 8 weeks)"
        run: |
          set +e
          python <<'PY'
          import subprocess
          from datetime import date, timedelta
          # Compute mood for the last 8 weeks (Monday anchors)
          today = date.today()
          monday = today - timedelta(days=today.weekday())
          for i in range(8):
              week_start = monday - timedelta(weeks=i)
              cmd = ["python", "-u", "manage.py", "compute-mood-week",
                     "--week", week_start.strftime("%Y-%m-%d")]
              result = subprocess.run(cmd, check=False)
              print(f"compute-mood-week {week_start}: exit={result.returncode}")
          PY
          echo "Phase 6b done"

      - name: "Phase 6c — Compute cohort weeks (recent 4 weeks)"
        run: |
          set +e
          python <<'PY'
          import subprocess
          from datetime import date, timedelta
          today = date.today()
          iso = today.isocalendar()
          for i in range(4):
              d = today - timedelta(weeks=i)
              iso_d = d.isocalendar()
              week_key = f"{iso_d[0]}-{iso_d[1]:02d}"
              cmd = ["python", "-u", "manage.py", "compute-cohort-week",
                     "--week", week_key]
              result = subprocess.run(cmd, check=False)
              print(f"compute-cohort-week {week_key}: exit={result.returncode}")
          PY
          echo "Phase 6c done"

      # ════════════════════════════════════════════════════════════════════
      # PHASE 7 — DB inventory
      # ════════════════════════════════════════════════════════════════════
      - name: DB inventory after full backfill
        run: |
          python <<'PY'
          import sqlite3
          db = sqlite3.connect("cfb_rankings.db")
          cur = db.cursor()
          tables = [r[0] for r in cur.execute(
              "select name from sqlite_master where type='table' order by name"
          ).fetchall()]
          key = [
              'teams', 'games', 'players',
              'model_runs', 'power_ratings_weekly',
              'fanbase_mood_weekly', 'fanbase_cohort_weekly',
              'fanbase_classification_history',
              'storyline_threads', 'editions',
              'conversation_documents', 'source_observations',
              'team_brand_assets', 'player_honors',
              'game_player_stats', 'player_season_context',
          ]
          pages = cur.execute("pragma page_count").fetchone()[0]
          page_sz = cur.execute("pragma page_size").fetchone()[0]
          print(f"DB size: {pages * page_sz / 1e6:.1f} MB  ({len(tables)} tables)")
          for t in key:
              try:
                  n = cur.execute(f"select count(*) from {t}").fetchone()[0]
                  print(f"  {t:42s} = {n:>12,}")
              except Exception as e:
                  print(f"  {t:42s} = (error: {e})")
          PY

      # ════════════════════════════════════════════════════════════════════
      # Upload DB artifact
      # ════════════════════════════════════════════════════════════════════
      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true

      # ════════════════════════════════════════════════════════════════════
      # Trigger publish-site to rebuild the full site with fresh data
      # ════════════════════════════════════════════════════════════════════
      - name: Trigger publish-site workflow
        if: success() || failure()
        run: |
          gh workflow run publish_site.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
