name: Backfill 2021-2023 + Reddit (Overnight)
#
# Completes 2021-2023 seasons with full data:
#   - Rosters, games, stats from CFBD
#   - Player season stats (Heisman model)
#   - Game-level player stats
#   - Reddit offseason conversations
#   - Fan intelligence data
#   - Auto-deploys to Vercel when complete
#
# Estimated runtime: 4-7 hours
# Runs on GitHub Actions — your computer can be OFF!

on:
  workflow_dispatch:
    inputs:
      start_season:
        description: "First season year"
        required: false
        default: "2021"
      end_season:
        description: "Last season year"
        required: false
        default: "2023"
      skip_reddit:
        description: "Skip Reddit backfill (saves ~2-3 hrs)"
        type: boolean
        required: false
        default: false

# Prevent concurrent runs
concurrency:
  group: backfill-2021-2023
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 480    # 8-hour cap

    # Permissions needed
    permissions:
      contents: read
      actions: write          # for triggering publish workflow
      pull-requests: write

    # Environment variables from GitHub Secrets
    env:
      CFBD_API_KEY:           ${{ secrets.CFBD_API_KEY }}
      ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
      REDDIT_CLIENT_ID:       ${{ secrets.REDDIT_CLIENT_ID }}
      REDDIT_CLIENT_SECRET:   ${{ secrets.REDDIT_CLIENT_SECRET }}
      REDDIT_USER_AGENT:      ${{ secrets.REDDIT_USER_AGENT }}

    steps:
      # ════════════════════════════════════════════════════════════════════
      # SETUP
      # ════════════════════════════════════════════════════════════════════
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml requests

      # ════════════════════════════════════════════════════════════════════
      # DOWNLOAD EXISTING DATABASE (if available)
      # ════════════════════════════════════════════════════════════════════
      - name: Download previous DB artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      # ════════════════════════════════════════════════════════════════════
      # VERIFY CFBD API ACCESS
      # ════════════════════════════════════════════════════════════════════
      - name: Verify CFBD API key
        run: |
          python <<'PY'
          import os, urllib.request, urllib.error, sys
          key = os.environ.get("CFBD_API_KEY", "")
          if not key:
              print("::error::CFBD_API_KEY secret is empty")
              sys.exit(1)
          req = urllib.request.Request(
              "https://apinext.collegefootballdata.com/teams/fbs?year=2024",
              headers={"Authorization": f"Bearer {key}"},
          )
          try:
              with urllib.request.urlopen(req, timeout=20) as r:
                  body = r.read()
              print(f"✓ CFBD API OK: HTTP {r.status}, {len(body)} bytes")
          except urllib.error.HTTPError as e:
              print(f"::error::CFBD API HTTP {e.code}: {e.reason}")
              sys.exit(1)
          except Exception as e:
              print(f"::error::CFBD API error: {e}")
              sys.exit(1)
          PY

      # ════════════════════════════════════════════════════════════════════
      # PHASE 1: LOAD ROSTERS (REQUIRED for player matching)
      # ════════════════════════════════════════════════════════════════════
      - name: "Phase 1: Load FBS rosters ${{ github.event.inputs.start_season || '2021' }}-${{ github.event.inputs.end_season || '2023' }}"
        run: |
          set +e
          START="${{ github.event.inputs.start_season || '2021' }}"
          END="${{ github.event.inputs.end_season || '2023' }}"

          echo "=================================================="
          echo "PHASE 1: Loading rosters for seasons $START to $END"
          echo "=================================================="

          for SEASON in $(seq "$START" "$END"); do
            echo ""
            echo "[$SEASON] Loading FBS roster..."
            if python -u manage.py ingest-cfbd-preseason \
              --season "$SEASON" \
              --classification fbs; then
              echo "[$SEASON] ✓ Roster loaded successfully"
            else
              echo "[$SEASON] ⚠ Roster load failed (continuing)"
            fi
          done

          echo ""
          echo "=================================================="
          echo "PHASE 1 COMPLETE"
          echo "=================================================="

      # ════════════════════════════════════════════════════════════════════
      # PHASE 2: LOAD GAMES & STATS (run team models)
      # ════════════════════════════════════════════════════════════════════
      - name: "Phase 2: Load games, stats, and run team models"
        run: |
          set +e
          START="${{ github.event.inputs.start_season || '2021' }}"
          END="${{ github.event.inputs.end_season || '2023' }}"

          echo "=================================================="
          echo "PHASE 2: Loading games, stats, running team models"
          echo "=================================================="

          # Run CFBD history backfill with models
          echo ""
          echo "Running backfill-cfbd-history with team models..."
          if python -u manage.py backfill-cfbd-history \
            --start-season "$START" \
            --end-season "$END" \
            --include-postseason \
            --skip-play-level \
            --skip-heisman \
            --run-models \
            --skip-connectivity-check; then
            echo "✓ CFBD history backfill completed"
          else
            echo "⚠ CFBD history backfill had issues (continuing)"
          fi

          echo ""
          echo "=================================================="
          echo "PHASE 2 COMPLETE"
          echo "=================================================="

      # ════════════════════════════════════════════════════════════════════
      # PHASE 3: RUN HEISMAN MODEL (computes player season stats!)
      # ════════════════════════════════════════════════════════════════════
      - name: "Phase 3: Run Heisman model (player season stats)"
        run: |
          set +e
          START="${{ github.event.inputs.start_season || '2021' }}"
          END="${{ github.event.inputs.end_season || '2023' }}"

          echo "=================================================="
          echo "PHASE 3: Running Heisman model for season stats"
          echo "=================================================="
          echo "This computes player_season_stats table!"

          for SEASON in $(seq "$START" "$END"); do
            echo ""
            echo "[$SEASON] Running Heisman model through week 16..."
            if python -u manage.py run-heisman-model \
              --season "$SEASON" \
              --through-week 16; then
              echo "[$SEASON] ✓ Heisman model completed"
            else
              echo "[$SEASON] ⚠ Heisman model failed (continuing)"
            fi
          done

          echo ""
          echo "=================================================="
          echo "PHASE 3 COMPLETE"
          echo "=================================================="

      # ════════════════════════════════════════════════════════════════════
      # PHASE 4: GAME-LEVEL PLAYER STATS
      # ════════════════════════════════════════════════════════════════════
      - name: "Phase 4: Game-level player stats"
        run: |
          set +e
          START="${{ github.event.inputs.start_season || '2021' }}"
          END="${{ github.event.inputs.end_season || '2023' }}"

          echo "=================================================="
          echo "PHASE 4: Loading game-level player stats"
          echo "=================================================="

          if python -u manage.py backfill-game-player-stats \
            --start-season "$START" \
            --end-season "$END" \
            --classification fbs \
            --include-postseason \
            --skip-connectivity-check; then
            echo "✓ Game player stats completed"
          else
            echo "⚠ Game player stats had issues (continuing)"
          fi

          echo ""
          echo "=================================================="
          echo "PHASE 4 COMPLETE"
          echo "=================================================="

      # ════════════════════════════════════════════════════════════════════
      # PHASE 5: REDDIT OFFSEASON CONVERSATIONS (Arctic Shift)
      # ════════════════════════════════════════════════════════════════════
      - name: "Phase 5: Reddit offseason conversations"
        if: ${{ github.event.inputs.skip_reddit != 'true' }}
        run: |
          set +e
          START="${{ github.event.inputs.start_season || '2021' }}"
          END="${{ github.event.inputs.end_season || '2023' }}"

          echo "=================================================="
          echo "PHASE 5: Reddit offseason backfill (weeks 21-31)"
          echo "=================================================="

          for SEASON in $(seq "$START" "$END"); do
            echo ""
            echo "[$SEASON] Collecting Reddit offseason conversations..."
            if python -u manage.py backfill-offseason-conversation \
              --season "$SEASON" \
              --provider arctic-shift \
              --window "21..31" \
              --limit-per-query 200 \
              --collect-comments \
              --comment-post-limit 50 \
              --comments-per-post 50 \
              --min-comment-post-replies 3 \
              --continue-on-error; then
              echo "[$SEASON] ✓ Reddit backfill completed"
            else
              echo "[$SEASON] ⚠ Reddit backfill failed (continuing)"
            fi
          done

          echo ""
          echo "=================================================="
          echo "PHASE 5 COMPLETE"
          echo "=================================================="

      # ════════════════════════════════════════════════════════════════════
      # PHASE 6: FAN INTELLIGENCE
      # ════════════════════════════════════════════════════════════════════
      - name: "Phase 6: Fan intelligence (classification, mood, cohorts)"
        run: |
          set +e
          END="${{ github.event.inputs.end_season || '2023' }}"

          echo "=================================================="
          echo "PHASE 6: Fan intelligence computation"
          echo "=================================================="

          # Classify fanbases
          echo ""
          echo "Classifying fanbases..."
          python -u manage.py classify-fanbases \
            --season "$END" \
            --backfill-history 3 || echo "⚠ Fanbase classification had issues"

          # Compute recent mood (4 weeks)
          echo ""
          echo "Computing weekly mood (recent 4 weeks)..."
          python <<'PY'
          import subprocess
          from datetime import date, timedelta
          today = date.today()
          for i in range(4):
              week_start = today - timedelta(weeks=i)
              cmd = ["python", "-u", "manage.py", "compute-mood-week",
                     "--week", week_start.strftime("%Y-%m-%d")]
              subprocess.run(cmd, check=False)
          PY

          # Compute cohort weeks
          echo ""
          echo "Computing cohort weeks (recent 4 weeks)..."
          python <<'PY'
          import subprocess
          from datetime import date, timedelta
          today = date.today()
          for i in range(4):
              d = today - timedelta(weeks=i)
              iso_d = d.isocalendar()
              week_key = f"{iso_d[0]}-{iso_d[1]:02d}"
              cmd = ["python", "-u", "manage.py", "compute-cohort-week",
                     "--week", week_key]
              subprocess.run(cmd, check=False)
          PY

          echo ""
          echo "=================================================="
          echo "PHASE 6 COMPLETE"
          echo "=================================================="

      # ════════════════════════════════════════════════════════════════════
      # DATA COVERAGE REPORT
      # ════════════════════════════════════════════════════════════════════
      - name: Generate data coverage report
        run: |
          python <<'PY'
          import sqlite3
          db = sqlite3.connect("cfb_rankings.db")
          cur = db.cursor()

          print("")
          print("==================================================")
          print("DATA COVERAGE REPORT")
          print("==================================================")

          # Check each season
          for season in [2020, 2021, 2022, 2023, 2024]:
              cur.execute("""
                  SELECT
                    (SELECT COUNT(*) FROM games WHERE season_year = ?) as games,
                    (SELECT COUNT(*) FROM roster_entries WHERE season_year = ?) as roster,
                    (SELECT COUNT(*) FROM player_season_stats WHERE season_year = ?) as season_stats,
                    (SELECT COUNT(*) FROM player_game_stats WHERE season_year = ?) as game_stats
              """, (season, season, season, season))
              row = cur.fetchone()
              print(f"{season}: games={row[0]:5,}  roster={row[1]:6,}  season_stats={row[2]:6,}  game_stats={row[3]:7,}")

          print("==================================================")
          PY

      # ════════════════════════════════════════════════════════════════════
      # UPLOAD DATABASE ARTIFACT
      # ════════════════════════════════════════════════════════════════════
      - name: Upload database artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true

      # ════════════════════════════════════════════════════════════════════
      # TRIGGER SITE BUILD AND DEPLOY
      # ════════════════════════════════════════════════════════════════════
      - name: Trigger site build and deploy
        if: success()
        run: |
          echo "Triggering publish_site workflow..."
          gh workflow run publish_site.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Report completion
        if: always()
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════╗"
          echo "║           BACKFILL COMPLETE!                            ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  • Database uploaded as artifact                         ║"
          echo "║  • Site build triggered (check Actions tab)              ║"
          echo "║  • Will auto-deploy to Vercel when build completes         ║"
          echo "╠══════════════════════════════════════════════════════════╣"
          echo "║  Next: Check your live site in ~15-20 minutes              ║"
          echo "╚══════════════════════════════════════════════════════════╝"
