name: fanintel-ingest-weekly
# STRATEGY §2 Tier 1, Monday 06:00 UTC (~01:00 ET — before Kevin's 09:00 ET
# Cowork sweep). Weekly-cadence sources: Spotify podcast charts.
# Also: compute-cohort-week + compute-divergence for the prior CFB week,
# refresh methodology, rebuild the public site.
#
# Persistence: W8.1 default — artifact-based. See ingest_hourly.yml.
on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      actions: read  # cross-workflow artifact download via dawidd6 action
    env:
      SPOTIFY_CLIENT_ID:     ${{ secrets.SPOTIFY_CLIENT_ID }}
      SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Python
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Deps
        run: |
          python -m pip install -U pip
          python -m pip install -e .

      - name: Download prior DB artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Apply migrations + seed (idempotent)
        run: |
          python manage.py init-db
          python manage.py apply-migrations
          python manage.py seed-source-registry
          python manage.py seed-priority-teams
          python manage.py seed-feed-instances

      - name: Spotify charts
        run: |
          set +e
          python tools/run_adapter.py spotify_charts
          echo "done"

      - name: Compute prior-week cohort aggregation
        run: |
          # ISO week label for last week
          WEEK=$(date -u -d "last week" +%G-%V)
          python manage.py compute-cohort-week --week="$WEEK" || true
          python manage.py compute-divergence --week="$WEEK" || true

      - name: Compute rivalry ratios (weekly refresh)
        run: |
          set +e
          WEEK=$(date -u +%Y-%m-%d)
          python manage.py compute-rivalry-ratios --week "$WEEK" || echo "compute-rivalry-ratios skipped"
          python manage.py compute-mirror-matches --season 2025 || echo "compute-mirror-matches skipped"
          echo "done"

      - name: Rebuild methodology page
        run: |
          set +e
          python manage.py build-methodology
          echo "done"

      - name: Rebuild static site
        run: |
          set +e
          python -u manage.py build-site
          echo "done"

      - name: Rebuild editions archive
        run: |
          set +e
          python manage.py build-editions-archive
          echo "done"

      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true

      - name: Upload built site (published branch seed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-site
          path: output/site
          retention-days: 30
          overwrite: true
