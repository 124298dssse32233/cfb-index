name: The Daily — weekday 06:00 ET

on:
  schedule:
    - cron: '0 10 * * 1-5'  # 06:00 ET = 10:00 UTC (no DST handling for now)
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }   # pyproject.toml requires >=3.12
      - run: pip install -e .

      # Pull the canonical DB artifact produced by publish-site or the
      # weekly ingest. If none exists yet, init-db creates a fresh schema
      # (idempotent — CREATE TABLE IF NOT EXISTS throughout).
      - name: Download prior DB artifact
        uses: actions/download-artifact@v4
        continue-on-error: true
        with: { name: cfb-rankings-db, path: . }

      - run: python manage.py init-db
      - run: python manage.py generate-daily
      - run: python manage.py render-daily
      # build-site is intentionally NOT called here. The full site rebuild
      # needs years of historical data (rankings, programs, players, etc.)
      # that the daily cron does not carry. /daily/ pages render
      # standalone from daily_takes; the homepage Daily strip is hydrated
      # by the next publish-site or weekly_deep run that has the full DB.

      - name: Upload daily artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfb-daily-${{ github.run_number }}
          path: output/site/daily/
          retention-days: 14
          overwrite: true
      # The /daily/ HTML is intentionally NOT committed back to git —
      # output/ is gitignored and pushing 67k generated files to master
      # was the original Sprint-14 mistake. Instead we ship the daily as
      # a GitHub Actions artifact; a downstream deploy step (Vercel via
      # `vercel deploy --prod` in publish-site, or a separate
      # daily-publish step) pulls the artifact and ships it.

      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true
