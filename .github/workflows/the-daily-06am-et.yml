name: The Daily — weekday 06:00 ET

on:
  schedule:
    - cron: '0 10 * * 1-5'  # 06:00 ET = 10:00 UTC (no DST handling for now)
  workflow_dispatch: {}

# Serialize site-state-touching workflows. The rolling cfb-rankings-site
# artifact pattern is not parallel-safe: workflows that run concurrently each
# download the same snapshot, overlay their slice, and the last to deploy
# overwrites whichever sibling already deployed. Sharing one concurrency
# group across daily/wire/mailbag forces a strict serial order.
concurrency:
  group: site-deploy
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read  # cross-workflow artifact download via dawidd6 action
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -e .

      # actions/download-artifact@v4 only searches the current run by
      # default. Use the cross-workflow third-party action so we pick up
      # the most-recent successful upload from ANY sibling workflow
      # (wire / mailbag / hourly-ingest all share cfb-rankings-db).
      - name: Download prior DB artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - run: python manage.py init-db
      # Seed editions defensively — when this workflow's DB came from a
      # sibling workflow (mailbag/wire) the editions table may be empty,
      # which makes render-homepage exit with "no active edition" and
      # leaves the homepage Daily strip frozen on stale prior-site HTML.
      - run: python manage.py seed-editions || echo "seed-editions skipped"
      - run: python manage.py generate-daily
      - run: python manage.py render-daily

      # ---- Rolling site-state assembly ----
      # Download the prior full site state. First-time bootstrap: download
      # the seed tarball from the deploy-state-v1 release. Subsequent runs:
      # download the cfb-rankings-site artifact maintained by these crons.
      - name: Download prior site state (artifact)
        id: dl_site
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-site
          path: prior-site/
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Bootstrap site state from release if no artifact
        if: steps.dl_site.outcome != 'success'
        run: |
          set -e
          mkdir -p prior-site
          gh release download deploy-state-v1 --pattern site-state-bootstrap.tar.gz --output /tmp/seed.tar.gz
          tar -xzf /tmp/seed.tar.gz -C prior-site
          echo "Bootstrapped $(find prior-site -type f | wc -l) files from release."
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }

      - name: Merge generated daily into prior site state
        run: |
          set -e
          mkdir -p output/site
          # Copy prior site as base
          cp -r prior-site/* output/site/ 2>/dev/null || true
          # Re-render daily on top of merged state so the homepage / cross-refs
          # see the new daily takes. (render-daily already ran above; this
          # ensures it sits in the correct merged tree.)
          python manage.py render-daily
          # Re-render the homepage so the Daily strip on / picks up today's
          # published takes (the homepage's _fetch_daily_live reads from
          # daily_editions WHERE status='published'). Without this, the
          # homepage keeps showing yesterday's takes even when today's are
          # live at /daily/.
          python manage.py render-homepage || echo "render-homepage skipped (no active edition)"
          # Re-patch the Wire <tbody> on the homepage with the freshest
          # rows + honest UPDATED label (homepage patch is on by default).
          python manage.py render-wire || true
          # Re-render storylines index so the Active/Dormant status pills
          # roll forward as last_chapter_at ages. Without this, threads
          # last touched in April keep their "Active" pill into May.
          python manage.py render-storylines || true
          # Ensure the custom 404 page ships with every deploy. The
          # rolling site-state artifact doesn't always include 404.html,
          # which causes Vercel to fall back to its branded NOT_FOUND
          # page. The canonical copy lives at static/404.html in the
          # repo and gets copied into the deploy each time.
          cp -f static/404.html output/site/404.html || true
          echo "Merged. Total deployable files: $(find output/site -type f | wc -l)"

      # ---- Vercel deploy ----
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: |
          vercel deploy --prod --yes --archive=tgz \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_ORG_ID

      # Safety gate: don't re-upload a near-empty site state. If we
      # downloaded a poisoned tiny artifact and overlaid our slice, the
      # total file count is still tiny — re-uploading would propagate
      # the poisoning to the next cron's bootstrap. Healthy site has
      # ~17k+ files; 5000 is a conservative floor that catches obvious
      # poisoning while still allowing for legitimate ingestion gaps.
      - name: Sanity-check site before upload
        id: site_check
        run: |
          set +e
          FILE_COUNT=$(find output/site -type f 2>/dev/null | wc -l)
          echo "Found $FILE_COUNT files in output/site"
          if [ "$FILE_COUNT" -lt 3500 ]; then
            echo "::warning::Refusing to upload site artifact ($FILE_COUNT files < 5000); rolling state stays at last healthy upload"
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          fi

      # ---- Maintain artifacts for next cron ----
      - name: Upload site state for next cron
        if: always() && steps.site_check.outputs.healthy == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-site
          path: output/site/
          retention-days: 14
          overwrite: true

      - name: Verify DB artifact healthy before upload
        if: always()
        id: db_sanity
        continue-on-error: true
        run: |
          python scripts/verify_db_artifact_healthy.py cfb_rankings.db

      - name: Upload DB artifact
        if: steps.db_sanity.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true
