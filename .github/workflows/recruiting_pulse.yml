name: recruiting_pulse
# S4 surface — Recruit Watch Board.
#
# Cadence (DESIGN_AUDIT_2026_05_15_v5_4 Part 6):
#   Daily 06:00 UTC, May-Aug only.
#
# We use a single cron and gate the May-Aug window inside Python so
# off-window scheduled runs exit cleanly without consuming workflow time.
#
# Calls `manage.py refresh-recruiting-pulse` (TODO: CLI lands Sprint v5-1
# Day 4 afternoon).

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily (gated to May-Aug in step below)
  workflow_dispatch:

concurrency:
  group: site-deploy
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      CFBD_API_KEY:      ${{ secrets.CFBD_API_KEY }}
      GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python 3.12
        uses: actions/setup-python@v5
        with: { python-version: "3.12" }

      - name: Deps
        run: |
          set -e
          python -m pip install -U pip pyyaml
          python -m pip install -e .

      - name: Gate to May-Aug window
        id: gate
        run: |
          set -e
          python <<'PY'
          import os, sys
          from datetime import datetime, timezone
          today = datetime.now(timezone.utc).date()
          if not (5 <= today.month <= 8):
              print(f"[gate] month={today.month} outside May-Aug window — skipping")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("skip=true\n")
              sys.exit(0)
          print(f"[gate] month={today.month} inside window — proceed")
          PY

      - name: Download prior DB artifact
        if: steps.gate.outputs.skip != 'true'
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Apply migrations + seed (idempotent)
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -e
          python manage.py init-db
          python manage.py apply-migrations

      - name: Download prior site state
        if: steps.gate.outputs.skip != 'true'
        id: dl_site
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-site
          path: prior-site/
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Seed output/site from prior state
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -e
          mkdir -p output/site
          cp -r prior-site/* output/site/ 2>/dev/null || true

      # TODO Sprint v5-1 Day 4 follow-up: implement `manage.py refresh-recruiting-pulse`
      # in cli.py. It should pull 247Sports / On3 / Rivals public-facing
      # commit data, update recruiting_commitments, compute per-program
      # pulse score, and re-render /recruit-watch/.
      - name: Refresh Recruit Watch Board
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -e
          python -u manage.py refresh-recruiting-pulse

      - name: Verify build freshness
        if: steps.gate.outputs.skip != 'true'
        run: |
          set -e
          MODIFIED=$(find output/site -type f -newer prior-site 2>/dev/null | wc -l)
          echo "Fresh files: $MODIFIED"
          if [ "$MODIFIED" -lt 1 ]; then
            echo "::error::refresh-recruiting-pulse produced zero fresh files"
            exit 1
          fi

      - name: Sanity-check site before upload
        if: steps.gate.outputs.skip != 'true'
        id: site_check
        run: |
          set +e
          FILE_COUNT=$(find output/site -type f 2>/dev/null | wc -l)
          echo "Found $FILE_COUNT files in output/site"
          if [ "$FILE_COUNT" -lt 3500 ]; then
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload site artifact
        if: always() && steps.gate.outputs.skip != 'true' && steps.site_check.outputs.healthy == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-site
          path: output/site/
          retention-days: 14
          overwrite: true

      - name: Verify DB artifact healthy before upload
        if: always()
        id: db_sanity
        continue-on-error: true
        run: |
          python scripts/verify_db_artifact_healthy.py cfb_rankings.db

      - name: Upload DB artifact
        if: steps.db_sanity.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true

  notify:
    if: failure()
    needs: refresh
    uses: ./.github/workflows/notify_failure.yml
    with:
      run_id: ${{ github.run_id }}
      workflow_name: ${{ github.workflow }}
