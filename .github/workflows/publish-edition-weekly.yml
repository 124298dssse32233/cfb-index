# Weekly Edition publish — Sprint 9.
# Status: ACTIVE — Saturdays 06:00 ET (10:00 UTC). When the slug for
# the upcoming Saturday has no seed payload in seeds.py (offseason),
# publish-edition gracefully no-ops with a log line and exits 0; the
# workflow stays green and no notifications fire. To author a new
# edition, add its payload to src/cfb_rankings/editions/seeds.py.
name: Publish Weekly Edition

on:
  workflow_dispatch:
  schedule:
    - cron: '0 10 * * 6'   # Saturdays 06:00 ET = 10:00 UTC

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: read  # cross-workflow artifact download via dawidd6 action
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Compute edition slug for upcoming Saturday
        id: slug
        run: |
          # Saturday-of-this-week ISO week number, formatted as 2026-w17.
          SLUG=$(python -c "from datetime import date; t=date.today(); y,w,_=t.isocalendar(); print(f'{y}-w{w:02d}')")
          echo "slug=$SLUG" >> "$GITHUB_OUTPUT"

      - name: Download prior DB artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Bootstrap DB schema
        run: python manage.py init-db

      - name: Publish edition (idempotent)
        run: python manage.py publish-edition --slug ${{ steps.slug.outputs.slug }}

      - name: Render homepage + article pages
        run: python manage.py render-edition --slug ${{ steps.slug.outputs.slug }}

      - name: Upload edition artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfb-edition-${{ steps.slug.outputs.slug }}
          path: |
            output/site/index.html
            output/site/editions/
          retention-days: 30
          overwrite: true

      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true
