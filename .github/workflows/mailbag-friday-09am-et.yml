name: Mailbag — Friday 09:00 ET

on:
  schedule:
    - cron: '0 13 * * 5'  # 09:00 ET Friday = 13:00 UTC
  workflow_dispatch: {}

# Serialize with other site-state-touching workflows. See note in
# the-daily-06am-et.yml for the race-condition this prevents.
concurrency:
  group: site-deploy
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      actions: read  # cross-workflow artifact download via dawidd6 action
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install -e .

      # actions/download-artifact@v4 only searches the current run by
      # default. Use the cross-workflow third-party action.
      - name: Download prior DB artifact
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-db
          path: .
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - run: python manage.py init-db

      - name: Generate + render mailbag
        run: |
          EDITION=$(python -c "from datetime import date; d=date.today(); w=d.isocalendar().week; print(f'{d.year}-w{w:02d}')")
          python manage.py mailbag-curate-submissions --edition $EDITION
          python manage.py mailbag-generate-answers --edition $EDITION
          python manage.py render-mailbag --edition $EDITION

      # ---- Rolling site-state assembly ----
      - name: Download prior site state
        id: dl_site
        uses: dawidd6/action-download-artifact@v6
        continue-on-error: true
        with:
          name: cfb-rankings-site
          path: prior-site/
          workflow_search: true
          search_artifacts: true
          if_no_artifact_found: warn

      - name: Bootstrap site state from release if no artifact
        if: steps.dl_site.outcome != 'success'
        run: |
          set -e
          mkdir -p prior-site
          gh release download deploy-state-v1 --pattern site-state-bootstrap.tar.gz --output /tmp/seed.tar.gz
          tar -xzf /tmp/seed.tar.gz -C prior-site
          echo "Bootstrapped $(find prior-site -type f | wc -l) files from release."
        env: { GH_TOKEN: '${{ secrets.GITHUB_TOKEN }}' }

      - name: Merge mailbag output into prior site state
        run: |
          set -e
          mkdir -p output/site
          cp -r prior-site/* output/site/ 2>/dev/null || true
          EDITION=$(python -c "from datetime import date; d=date.today(); w=d.isocalendar().week; print(f'{d.year}-w{w:02d}')")
          python manage.py render-mailbag --edition $EDITION
          echo "Merged. Total deployable files: $(find output/site -type f | wc -l)"

      # ---- Vercel deploy ----
      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: |
          vercel deploy --prod --yes --archive=tgz \
            --token=$VERCEL_TOKEN \
            --scope=$VERCEL_ORG_ID

      # ---- Maintain artifacts for next cron ----
      - name: Upload site state for next cron
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-site
          path: output/site/
          retention-days: 14
          overwrite: true

      - name: Upload DB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfb-rankings-db
          path: cfb_rankings.db
          retention-days: 90
          overwrite: true
