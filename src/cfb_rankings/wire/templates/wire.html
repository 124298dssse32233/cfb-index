<!--
  Wire index page template (see cfb_rankings.wire.renderer for the
  authoritative list of tokens). Substituted at render time.
-->
<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}} CFB Index</title>
<meta name="description" content="The CFB Index daily transaction wire — every move with the editorial caption that tells you why.">
<style>{{HEAD_STYLE}}</style>
</head><body>
<div class="page">
  <div class="chrome">
    <span><a href="/">CFB INDEX</a></span>
    <span>{{UPDATED_AT}}</span>
  </div>
  <div class="brand-row">
    <div class="brand">CFB <span class="slash">/</span> INDEX</div>
    <nav class="nav">
      <a href="/">Home</a>
      <a href="/rankings/">Rankings</a>
      <a href="/wire/">Wire</a>
      <a href="/editions/">Editions</a>
    </nav>
  </div>
  <hr class="rule">
  <header class="hero hero-wire">
    <div class="eyebrow">XII. THE WIRE</div>
    <h1 class="roman-big">Every move. Every read.</h1>
    <p class="lede">{{WIRE_LEDE}}</p>
  </header>
  <hr class="rule soft">
  <section class="dept">
    <table class="wire-table">
      <thead>
        <tr><th>WHEN</th><th>PROGRAM</th><th>ACTION</th><th>WHY IT MATTERS</th><th>IMPACT</th></tr>
      </thead>
      <tbody>{{ENTRIES_TBODY}}</tbody>
    </table>
  </section>
  <hr class="rule soft">
  <section class="dept">
    <div class="dept-head">
      <span class="roman">A.</span>
      <span class="label">ARCHIVE</span>
      <span class="meta">PRIOR MONTHS</span>
    </div>
    <ul class="archive-list">{{ARCHIVE_LINKS}}</ul>
  </section>
  <footer class="footer">
    <hr class="rule soft">
    <p class="eyebrow muted">CFB INDEX · {{UPDATED_AT}}</p>
  </footer>
</div>
</body></html>
