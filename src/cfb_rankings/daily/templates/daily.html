<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>${title}</title>
<style>
/* ---- Design tokens (matches Edition / team-page system) ---- */
:root {
  --ink:      #1a1a2e;
  --paper:    #f8f6f0;
  --gold:     #c9a84c;
  --navy:     #0f2044;
  --slate:    #4a5568;
  --rule:     #e2ddd5;
  --accent:   #c53030;
  --serif:    'Georgia', 'Times New Roman', serif;
  --sans:     'Inter', 'Helvetica Neue', system-ui, sans-serif;
  --mono:     'JetBrains Mono', 'Courier New', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--serif);
  background: var(--paper);
  color: var(--ink);
  line-height: 1.65;
  font-size: 17px;
}

/* ---- Masthead ---- */
.masthead {
  border-bottom: 3px double var(--gold);
  padding: 2rem 0 1rem;
  text-align: center;
  background: var(--navy);
  color: #fff;
}
.masthead__flag {
  font-family: var(--sans);
  font-size: 0.65rem;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.5rem;
}
.masthead__title {
  font-family: var(--serif);
  font-size: clamp(2rem, 5vw, 3.5rem);
  font-weight: 700;
  letter-spacing: -0.01em;
  line-height: 1.1;
  color: #fff;
}
.masthead__date {
  font-family: var(--sans);
  font-size: 0.8rem;
  color: rgba(255,255,255,0.6);
  margin-top: 0.5rem;
  letter-spacing: 0.08em;
}

/* ---- Layout ---- */
.layout {
  display: grid;
  grid-template-columns: 1fr min(680px, 100%) 280px 1fr;
  gap: 0;
  max-width: 1200px;
  margin: 0 auto;
  padding: 3rem 1rem;
}
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}
.takes-col { grid-column: 2; }
.sidebar { grid-column: 3; padding-left: 2rem; }

/* ---- Take cards ---- */
.take {
  margin-bottom: 3rem;
  padding-bottom: 3rem;
  border-bottom: 1px solid var(--rule);
}
.take:last-child { border-bottom: none; }

.take__rank {
  font-family: var(--sans);
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 0.5rem;
}
.take__numeral {
  display: inline-block;
  width: 28px;
  height: 28px;
  border: 2px solid var(--gold);
  border-radius: 50%;
  text-align: center;
  line-height: 24px;
  font-family: var(--sans);
  font-size: 0.75rem;
  font-weight: 700;
  color: var(--gold);
  margin-right: 0.5rem;
  vertical-align: middle;
}
.take__headline {
  font-family: var(--serif);
  font-size: clamp(1.25rem, 3vw, 1.7rem);
  font-weight: 700;
  line-height: 1.25;
  color: var(--navy);
  margin: 0.75rem 0 1rem;
}
.take__body {
  font-family: var(--serif);
  font-size: 1rem;
  line-height: 1.75;
  color: var(--ink);
  margin-bottom: 1.25rem;
}
.take__body p { margin-bottom: 0.75rem; }

/* ---- Source pills ---- */
.source-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
  margin-top: 0.75rem;
}
.source-pill {
  font-family: var(--sans);
  font-size: 0.7rem;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  background: rgba(201,168,76,0.12);
  border: 1px solid var(--gold);
  color: var(--navy);
  padding: 0.2rem 0.6rem;
  border-radius: 2px;
}

/* ---- Entity link ---- */
.entity-link {
  display: inline-block;
  font-family: var(--sans);
  font-size: 0.75rem;
  color: var(--slate);
  text-decoration: none;
  margin-top: 0.5rem;
}
.entity-link:hover { color: var(--navy); text-decoration: underline; }

/* ---- Sidebar ---- */
.sidebar__section {
  margin-bottom: 2rem;
}
.sidebar__label {
  font-family: var(--sans);
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  border-bottom: 1px solid var(--rule);
  padding-bottom: 0.4rem;
  margin-bottom: 0.75rem;
}
.sidebar__item {
  font-family: var(--sans);
  font-size: 0.8rem;
  color: var(--slate);
  padding: 0.4rem 0;
  border-bottom: 1px dotted var(--rule);
  line-height: 1.4;
}
.sidebar__item:last-child { border-bottom: none; }

/* ---- Archive footer ---- */
.archive-footer {
  background: var(--navy);
  color: rgba(255,255,255,0.7);
  padding: 2.5rem 1rem;
  text-align: center;
}
.archive-footer__label {
  font-family: var(--sans);
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 1rem;
}
.archive-footer__links {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 1.5rem;
}
.archive-footer__link {
  font-family: var(--sans);
  font-size: 0.8rem;
  color: rgba(255,255,255,0.7);
  text-decoration: none;
}
.archive-footer__link:hover { color: var(--gold); }
.archive-all {
  display: block;
  margin-top: 1.25rem;
  font-family: var(--sans);
  font-size: 0.7rem;
  color: rgba(255,255,255,0.4);
  text-decoration: none;
  letter-spacing: 0.1em;
}
.archive-all:hover { color: var(--gold); }

/* ---- Nav ---- */
.site-nav {
  background: var(--navy);
  padding: 0.6rem 1rem;
  font-family: var(--sans);
  font-size: 0.72rem;
  letter-spacing: 0.05em;
}
.site-nav a { color: rgba(255,255,255,0.65); text-decoration: none; margin-right: 1.2rem; }
.site-nav a:hover { color: var(--gold); }
</style>
</head>
<body class="daily__page">

<nav class="site-nav daily__nav">
  <a href="/">Home</a>
  <a href="/rankings/">Rankings</a>
  <a href="/daily/">Daily</a>
  <a href="/wire/">Wire</a>
  <a href="/mailbag/">Mailbag</a>
  <a href="/editions/">Editions</a>
  <a href="/methodology/">Methodology</a>
</nav>

<header class="masthead">
  <div class="masthead__flag">CFB Index · Morning Digest</div>
  <div class="masthead__title">The Daily</div>
  <div class="masthead__date">${long_date} &nbsp;·&nbsp; Published 06:00 ET</div>
</header>

<div class="layout">
  <main class="takes-col">
    ${takes_html}
  </main>
  <aside class="sidebar">
    <div class="sidebar__section">
      <div class="sidebar__label">What We're Watching</div>
      ${watching_html}
    </div>
  </aside>
</div>

<footer class="archive-footer">
  <div class="archive-footer__label">Yesterday's Takes</div>
  <div class="archive-footer__links">
    ${archive_links}
  </div>
  <a class="archive-all" href="/daily/archive.html">View full archive →</a>
</footer>

</body>
</html>
